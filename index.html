const headline={topic:"Middle East Diplomacy",h:"The U.S. and Iran finalize a ceasefire framework tied to reopening Hormuz",deck:"The Friday signing can lower immediate war and energy risks, but nuclear terms, asset releases and Israel-Lebanon enforcement still require implementation.",image:"https://dims.apnews.com/dims4/default/9e54558/2147483647/strip/true/crop/3540x2360+0+0/resize/1200x800!/quality/90/?url=https%3A%2F%2Fassets.apnews.com%2Fdb%2Fda%2F62a9a57a8e4a39669fe20a109d46%2Fc6f19d1cc1784c13a9c7c66cd7814aca",imageAlt:"Tankers anchored near the Strait of Hormuz off Iran",imageCredit:"Vahid Salemi / AP",imageCreditUrl:"https://apnews.com/article/82b8e51b557af2d54050d3ef9a069560"};
const wire={
"US Economy":[
W("Warsh's first Fed meeting becomes an independence test",`The Federal Reserve enters this week's meeting with May inflation at 4.2%, a solid labor market and no market expectation of an immediate rate change. <span class='change'>Kevin Warsh will chair his first policy meeting since replacing Jerome Powell, with the target range expected to remain at 3.5%-3.75%.</span> Investors will focus less on the unchanged rate than on whether Warsh preserves the Fed's inflation-first credibility despite President Trump's preference for cuts. Any move to reduce guidance or the dot plot could make markets more sensitive to each data release because officials would provide less information about their likely path.`,[S("Financial Times","https://www.ft.com/content/0b984a9e-8ea5-48e5-98cc-5d9751a118a3"),S("Federal Reserve","https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm")],`The <span class='jargon'>federal funds target range (the Fed's benchmark overnight interest-rate setting)</span> influences borrowing costs across the economy.`,["Credibility: holding steady would show policy remains tied to inflation data.","Political risk: an early easing signal could look responsive to the White House.","Communication: less forward guidance may increase market volatility."],"Watch Wednesday's statement, projections and Warsh's press conference."),
W("Hormuz deal lowers the risk premium before oil flows normalize",`More than 100 days of conflict and restricted passage through the Strait of Hormuz had lifted energy, freight and food costs worldwide. <span class='change'>Washington and Tehran announced a completed framework that ends military operations, removes the U.S. naval blockade and schedules a formal signing in Switzerland on Friday.</span> The strait normally handles about one-fifth of globally traded oil and liquefied natural gas, so restored passage could ease inflation and import bills. Prices will not fully normalize until tankers move safely, insurers reduce war-risk charges and the parties publish a workable inspection and enforcement sequence.`,[S("AP","https://apnews.com/article/82b8e51b557af2d54050d3ef9a069560"),S("Financial Times","https://www.ft.com/content/423e2773-96ab-45d1-94b7-e61d360c282e")],`A <span class='jargon'>war-risk premium (the extra cost attached to trade exposed to armed conflict)</span> affects crude prices, shipping insurance and freight rates.`,["Disinflation: reliable passage would lower transport and production costs.","Implementation risk: an announcement does not immediately restore physical supply.","Distribution: oil-importing poorer states gain more fiscal relief than exporters."],"Watch tanker transits, insurance quotes and sanctions guidance before Friday.")],
"US Politics":[
W("Section 702 lapses without causing an immediate intelligence shutdown",`Congress had repeatedly extended <span class='jargon'>Section 702 (the Foreign Intelligence Surveillance Act authority used to target foreigners abroad without individual warrants)</span> while debating protections for Americans whose communications are incidentally collected. <span class='change'>The House rejected a short extension 198-218 and lawmakers left Washington with the statute expired.</span> Existing court certifications can sustain much current collection into 2027, but new directives and long-term provider planning now lack a renewed statutory base. The June 23 return will test whether the lapse produces a warrant compromise or another temporary patch.`,[S("ODNI","https://www.dni.gov/index.php/ic-legal-reference-book/fisa-section-702"),S("Guardian","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates")],`An American's messages can enter the database when that person communicates with a lawful foreign target.`,["Security: uncertainty complicates future targeting and provider cooperation.","Privacy: the operational cushion creates bargaining space for a warrant rule.","Governance: repeated deadline votes prevent durable oversight."],"Watch the June 23 vote and rules for U.S.-person database searches."),
W("White House UFC event intensifies conflict-of-interest scrutiny",`Presidents regularly host public ceremonies, but a commercial mixed-martial-arts card on federal grounds has no close modern precedent. <span class='change'>UFC Freedom 250 proceeded on the South Lawn after court challenges failed, while a National Park Service filing said more than $60 million and extensive labor from seven agencies had been allocated.</span> World Liberty Financial, a cryptocurrency company co-owned by the Trump family and founded with envoy Steve Witkoff, also sponsored a $250,000 fighter bonus pool. The central issue is whether public resources and presidential access are being used in ways that confer private commercial value, even if the event was formally permitted.`,[S("AP","https://apnews.com/article/82b8e51b557af2d54050d3ef9a069560"),S("AP court background","https://apnews.com/article/b222d1ae6a3d206b67ca5abb145dc711")],`A <span class='jargon'>conflict of interest (a situation in which public duties can affect private financial interests)</span> may exist even without proof of a direct payment to an official.`,["Civic spectacle: the presidency can use major events to broaden public engagement.","Ethics: family-linked sponsorship blurs official and private benefit.","Institutional: courts may distinguish permitting legality from appropriateness."],"Watch expense disclosures, congressional inquiries and sponsorship records.")],
"Healthcare":[
W("Congo's Ebola outbreak accelerates faster than contact tracing",`Eastern Congo entered the outbreak with armed violence, poor roads and mistrust already limiting health access. <span class='change'>Confirmed Bundibugyo Ebola cases reached 676 with 136 deaths, while only 57% of roughly 5,000 listed contacts were being monitored even though responders estimate as many as 24,000 may need follow-up.</span> The outbreak is now the third largest recorded, and the widely deployed Ervebo vaccine is designed for the Zaire strain rather than Bundibugyo. Containment depends on faster testing, protective equipment, safe burials and access to communities before transmission crosses mining and trade routes into neighboring states.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/14/drcs-ebola-outbreak-become-the-most-deadly-yet"),S("WHO","https://www.who.int/health-topics/ebola")],`<span class='jargon'>Contact tracing (identifying and monitoring people exposed to an infected person)</span> breaks transmission only when most contacts are reached quickly.`,["Capacity: Congo has experienced responders and known outbreak protocols.","Access crisis: insecurity and shortages can defeat technically sound plans.","Regional risk: incomplete tracing makes border screening less reliable."],"Watch weekly case growth, contact coverage, vaccine guidance and cross-border cases.")],
"Climate":[
W("World Cup heat protections face a worker-enforcement test",`The expanded World Cup is operating across cities where summer heat and humidity routinely push outdoor labor beyond recommended exposure limits. <span class='change'>Worker advocates warned that staff in Miami, Houston, Dallas and Atlanta may face temperatures above 90°F, while only seven U.S. states maintain enforceable heat-safety standards.</span> FIFA has planned later matches, cooling stations and medical teams, but temporary security, hospitality and costume workers may have less ability to stop work or report symptoms. The tournament therefore tests whether event-level safeguards can compensate for uneven labor law and whether employers treat acclimatization and rest as operational requirements rather than optional guidance.`,[S("Guardian","https://www.theguardian.com/us-news/2026/jun/14/world-cup-heat-workers"),S("OSHA","https://www.osha.gov/heat-exposure")],`<span class='jargon'>Acclimatization (the body's gradual adjustment to repeated heat exposure)</span> reduces but does not eliminate heat-illness risk.`,["Preparedness: cooling, water and schedule changes can prevent severe illness.","Enforcement: protections fail when temporary workers cannot pause safely.","Climate adaptation: mega-events expose gaps in ordinary workplace rules."],"Watch heat indexes, work stoppages, emergency calls and venue compliance.")],
"Tech / AI":[
W("Organized labor makes AI a national electoral issue",`U.S. unions have accepted that artificial intelligence will expand while arguing that firms should not unilaterally decide how it changes jobs, surveillance and creative rights. <span class='change'>At the AFL-CIO convention, leaders from 65 affiliated unions began organizing around AI as a major 2028 election issue under the message that the technology should work for workers.</span> The coalition opposes invasive bossware, unauthorized digital replicas and discriminatory algorithms, but it is divided over proposals to halt data-center growth because construction can create union jobs. That tension will shape whether labor pursues broad restrictions or sector-specific bargaining rights, disclosure rules and benefit sharing.`,[S("Axios","https://www.axios.com/2026/06/14/unions-ai-2028-elections"),S("NIST","https://www.nist.gov/itl/ai-risk-management-framework")],`<span class='jargon'>Bossware (software used by employers to monitor, score or direct workers)</span> can shift workplace power even when it does not eliminate jobs.`,["Worker voice: bargaining can distribute productivity gains and govern surveillance.","Competitiveness: rigid rules may slow investment and adoption.","Infrastructure bargain: labor may support data centers in return for job standards."],"Watch union contract language, federal disclosure bills and party platforms.")],
"Latin America":[
W("U.S. strike in Venezuela expands the war-on-drugs model",`Washington traditionally supported regional police and militaries with intelligence, training and equipment rather than conducting routine U.S. strikes. <span class='change'>A U.S. airstrike in Venezuela's Bolívar state killed Tren de Aragua leader Héctor Rusthenford Guerrero in an operation Caracas described as joint.</span> The group is tied more closely to extortion, trafficking and illegal mining than to leadership of the global cocaine trade, so removing its leader does not prove the underlying revenue networks have been dismantled. The operation creates a precedent for direct force against designated criminal groups and raises questions about host-country consent, civilian safeguards and whether mining access is becoming part of security strategy.`,[S("AP analysis","https://apnews.com/article/222081f38ff0a9d205bf0a63868cfac3"),S("AP announcement","https://apnews.com/article/344db66dfac87df7ca93d57ea77cd520")],`A <span class='jargon'>kingpin strategy (targeting senior criminal leaders to disrupt an organization)</span> often removes symbols faster than it destroys finance and recruitment.`,["Deterrence: direct action raises the cost of sanctuary.","Fragmentation: successor factions may become less predictable and more violent.","Resource politics: security operations may also reshape control of mineral zones."],"Watch evidence on civilian harm, successor leadership and future strike permissions.")],
"Africa / Middle East":[
W("Iran deal moves from negotiation to a Friday implementation test",`The U.S.-Iran conflict had left sanctions intact, Gulf shipping constrained and ceasefires across Iran and Lebanon vulnerable to repeated violations. <span class='change'>Pakistan announced that the parties finalized a framework ending military operations, lifting the U.S. blockade and setting a Friday signing in Switzerland, while Trump said Hormuz would reopen.</span> The parties still describe authority over the strait and the nuclear phase differently, and reported asset releases must be sequenced with verifiable steps. The agreement can lower immediate escalation, but a durable settlement requires a published timeline, a named verifier and procedures for Israeli, Hezbollah or maritime violations.`,[S("AP","https://apnews.com/article/82b8e51b557af2d54050d3ef9a069560"),S("Guardian live","https://www.theguardian.com/world/live/2026/jun/14/iran-us-middle-east-crisis-donald-trump-peace-deal-strait-hormuz-open-pakistan-latest-news-updates")],`A <span class='jargon'>framework agreement (a negotiated outline that leaves technical implementation for later talks)</span> can stop fighting without resolving every underlying dispute.`,["Breakthrough: phased rewards let both sides test compliance.","Paper truce: incompatible public descriptions can trigger an early crisis.","Mediator power: Pakistan, Qatar and Switzerland may become operational guarantors."],"Watch the text, Friday ceremony, tanker rules and asset-release sequence."),
W("Congo term-limit protest links national legitimacy to multiple crises",`President Félix Tshisekedi is due to complete his second term in 2028 under a constitution that protects presidential term limits from amendment. <span class='change'>Police used tear gas after government and opposition supporters clashed near Parliament over a bill that could permit constitutional changes during a major state dysfunction, potentially opening a route to a third term.</span> Opposition leader Martin Fayulu appeared injured, and previously divided parties have rallied against the proposal. The dispute matters because the state is simultaneously managing Ebola and the M23 conflict, making a legitimacy crisis in Kinshasa more likely to weaken coordination and public trust far beyond the capital.`,[S("AP","https://apnews.com/article/f3ffbaaa242ff6dcf185ab1f54d86976"),S("Congo Constitution background","https://www.constituteproject.org/constitution/Democratic_Republic_of_the_Congo_2011")],`A <span class='jargon'>constitutional entrenchment clause (a rule protecting specified provisions from ordinary amendment)</span> is designed to prevent incumbents from rewriting core limits.`,["Popular sovereignty: a referendum could be presented as direct voter consent.","Incumbency risk: changing rules near the end of a term weakens trust.","State capacity: political conflict can divert attention from health and security emergencies."],"Watch the bill's text, opposition coalition and any referendum timetable.")],
"Europe / EU":[
W("Ukraine and Moldova open the first EU accession cluster",`Ukraine and Moldova received candidate status in 2022, but Hungary had blocked movement into detailed negotiations. <span class='change'>A change of government in Budapest enabled unanimous approval to open the first accession cluster, covering rule of law, democratic institutions and public administration.</span> Ukraine has completed only about 15% of a ten-point reform plan, so the opening is a strategic anchor rather than a promise of rapid membership. The process can guide investment and anti-corruption reform during war, but each later stage remains vulnerable to national vetoes and EU concerns about absorbing new members.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/14/ukraine-and-moldova-start-first-phase-of-eu-membership-negotiations"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],`An <span class='jargon'>accession cluster (a group of EU law and governance chapters negotiated together)</span> turns political candidacy into measurable reform conditions.`,["Strategic anchor: integration makes Russian coercion less likely to reverse alignment.","Absorption limits: technical progress does not guarantee unanimous membership approval.","Conditional reform: wartime governments gain incentives for rule-of-law changes."],"Watch benchmarks in the fundamentals cluster and renewed veto politics."),
W("G7 diplomacy tests whether Ukraine's battlefield gains become leverage",`Ukraine has reported renewed gains and deep strikes while Russia's territorial advances have largely stalled, but no durable negotiating forum exists. <span class='change'>Ahead of the G7 summit in Evian, Trump spoke separately with Vladimir Putin and Volodymyr Zelenskyy, although U.S. officials scheduled no formal Trump-Zelenskyy bilateral meeting.</span> The summit can connect sanctions, air defense and European integration to a negotiating position, but vague pressure for a quick settlement may instead reward whichever side can wait longer. The key measure is whether allies agree on concrete guarantees and enforcement rather than another general call for peace.`,[S("AP","https://apnews.com/article/2e289b307a65ea3ad2f51d91d3feafe4"),S("Guardian briefing","https://www.theguardian.com/world/2026/jun/14/ukraine-war-briefing-trump-g7-zelenskyy")],`The <span class='jargon'>G7 (a forum of seven major advanced economies plus the European Union)</span> coordinates sanctions and financing but is not a military alliance.`,["Leverage: stalled Russian gains give allies room to demand stronger terms.","Settlement pressure: Washington may prioritize speed over durable guarantees.","European role: accession and sanctions can make delay less favorable to Moscow."],"Watch the summit communiqué, Ukraine aid and any defined negotiation conditions.")],
"China":[
W("Philippines calls China's sanction on its defense chief unfriendly",`China and the Philippines already face repeated confrontations around disputed South China Sea features, despite a 2016 tribunal rejecting Beijing's expansive legal claim. <span class='change'>Manila formally protested China's entry and transaction ban on Defense Secretary Gilberto Teodoro and his family, calling it an unfriendly act that damages dialogue.</span> The sanctions do not change control at sea, but they personalize coercion and can make officials less willing to compromise publicly. Their practical significance depends on whether diplomatic channels remain open and whether China pairs the measure with a lasting structure or stronger patrol presence at Scarborough Shoal.`,[S("AP","https://apnews.com/article/89e6999d31d4338d1a3fc0187c1612b7"),S("PCA ruling","https://pca-cpa.org/en/cases/7/")],`The <span class='jargon'>2016 arbitral award (a binding decision under the U.N. Convention on the Law of the Sea)</span> rejected China's historic-rights claim, though Beijing refuses to recognize it.`,["Coercion: personal sanctions raise costs without crossing a military threshold.","Backlash: punishment may harden Philippine public support for alliances.","Facts at sea: physical presence matters more than diplomatic language."],"Watch patrol access, the floating structure and U.S. treaty statements.")],
"War / Active Conflicts":[
W("Zaporizhzhia nuclear plant reconnects after a localized ceasefire",`The Russian-occupied Zaporizhzhia plant depends on external electricity to cool reactors and spent fuel even while its generating units are shut down. <span class='change'>A localized ceasefire negotiated by the International Atomic Energy Agency allowed repairs after a strike cut grid power for nearly three days, one of the site's longest outages of the war.</span> Backup generators prevented an immediate accident, but every prolonged loss of outside power consumes fuel and narrows the margin for equipment failure or renewed attack. The repair shows that limited technical agreements are possible even when wider diplomacy is stalled.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/14/ukraine-war-briefing-trump-g7-zelenskyy"),S("IAEA","https://www.iaea.org/newscenter/focus/ukraine")],`A <span class='jargon'>station blackout (loss of off-site and on-site electrical power)</span> threatens the pumps and controls needed to remove residual heat.`,["Technical cooperation: narrow ceasefires can protect shared safety interests.","Recurring risk: repaired lines remain exposed to the same battlefield.","Governance: IAEA access is essential but cannot demilitarize the site."],"Watch grid redundancy, diesel stocks and future localized repair truces."),
W("Israeli strikes expose the regional ceasefire's weakest link",`The U.S.-Iran framework attempts to stop military operations across connected fronts, but Israel rejects provisions it believes constrain action against Hezbollah. <span class='change'>Israeli strikes in Beirut killed three people as mediators announced the completed framework, and Iran warned that further attacks could provoke retaliation.</span> The incident shows that Washington and Tehran cannot guarantee compliance by every armed actor affected by the bargain. Without a separate Lebanon enforcement channel, a local strike could restart wider attacks, delay Hormuz reopening and undermine the nuclear timetable.`,[S("Guardian live","https://www.theguardian.com/world/live/2026/jun/14/iran-us-middle-east-crisis-donald-trump-peace-deal-strait-hormuz-open-pakistan-latest-news-updates"),S("AP","https://apnews.com/article/82b8e51b557af2d54050d3ef9a069560")],`A <span class='jargon'>spoiler (an actor able to undermine an agreement it did not fully accept)</span> can defeat a broad settlement through a geographically limited attack.`,["Comprehensive bargain: linking fronts may reduce incentives for proxy escalation.","Veto multiplication: more actors create more points of failure.","Enforcement gap: mediators need a Lebanon-specific incident process."],"Watch Israeli operations, Hezbollah responses and the Friday signing schedule.")]
};
const weekly={
"US Economy":[
W("May inflation returned above 4%",`Inflation had eased from its post-pandemic peak but remained above the Federal Reserve's 2% objective. <span class='change'>May consumer prices rose 4.2% from a year earlier, the highest rate since 2023, while average hourly earnings increased only 3.4%.</span> Energy prices, including a 40.5% rise in gasoline, drove much of the pressure and reduced real purchasing power. The week's Hormuz diplomacy may improve the outlook, but the Fed must decide whether supply relief is durable enough to affect policy.`,[S("BLS","https://www.bls.gov/cpi/"),S("Financial Times","https://www.ft.com/content/c17424f0-244e-45f4-b1d7-a0ffcebc4cf0")],"Headline inflation measures the full consumer basket; core inflation excludes volatile food and energy.",["Hold rates","Energy reversal","Real-income squeeze"],"Watch the Fed, retail sales and gasoline prices."),
W("Consumer sentiment improved from a very low base",`Household confidence had fallen for four months as fuel and food costs rose. <span class='change'>The University of Michigan's preliminary June sentiment index rose to 48.9 from 44.8 in May as gasoline prices eased.</span> The improvement was strongest among lower-income households, but sentiment remains historically weak. Retail sales will show whether relief has created actual spending room.`,[S("University of Michigan","https://data.sca.isr.umich.edu/"),S("Guardian","https://www.theguardian.com/business/2026/jun/12/consumer-sentiment-june-data-gas-prices")],"Confidence can lead spending changes, although surveys and purchases often diverge.",["Relief","Fragile gain","Labor-market backstop"],"Watch final sentiment and retail sales.")],
"US Politics":[
W("Congress let Section 702 expire",`The foreign-surveillance authority had survived repeated extensions because both parties valued its intelligence while disagreeing over American privacy. <span class='change'>The House rejected another temporary renewal 198-218 before leaving Washington.</span> Existing certifications prevent an immediate shutdown, but the lapse raises legal and operational pressure. The June 23 return will determine whether Congress adopts a warrant rule or another patch.`,[S("ODNI","https://www.dni.gov/index.php/ic-legal-reference-book/fisa-section-702"),S("Guardian","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates")],"The lapse matters even though collection does not stop overnight.",["Security continuity","Privacy leverage","Deadline governance"],"Watch the renewal length and U.S.-person search rules."),
W("Florida's House map survived its immediate court test",`Republicans hold 20 of Florida's 28 U.S. House seats and adopted districts that could improve their chances in four more. <span class='change'>The Florida Supreme Court declined to block the map before the midterms while opponents continued their constitutional challenge.</span> With a narrow national House margin, state map timing can affect federal control. The case may remain unresolved through Election Day.`,[S("AP","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("Florida Supreme Court","https://supremecourt.flcourts.gov/")],"An interim injunction can determine which map governs even before final judgment.",["State power","Fair-district limits","Timing"],"Watch candidate filings and federal litigation.")],
"Healthcare":[
W("Congo's Ebola emergency became a regional threat",`The outbreak began in Ituri, where insecurity and transport gaps already limit care. <span class='change'>Cases climbed to 676 and deaths to 136, with transmission nearly doubling week over week at points.</span> The Bundibugyo strain and incomplete contact tracing complicate vaccination and containment. Neighboring states now need laboratory, screening and isolation capacity before sustained cross-border transmission appears.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/14/drcs-ebola-outbreak-become-the-most-deadly-yet"),S("Africa CDC","https://africacdc.org/")],"Outbreak control depends on tracing, isolation, safe care and public cooperation.",["Experienced system","Regional spread","Trust deficit"],"Watch contact coverage and case geography."),
W("Response funding rose but field delivery lagged",`International donors increased pledges as the outbreak accelerated. <span class='change'>WHO and Africa CDC estimated that $518 million is needed, while health workers reported shortages of protective gear, transport and timely laboratory support.</span> Money does not stop transmission until it reaches local teams and communities accept isolation and burial practices. The gap between announcement and delivery is now a measurable risk factor.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/14/drcs-ebola-outbreak-become-the-most-deadly-yet"),S("WHO","https://www.who.int/health-topics/ebola")],"Preparedness funding buys time only when supply chains and local trust function.",["Donor scale-up","Absorption bottleneck","Community legitimacy"],"Watch disbursements, gear supplies and testing delays.")],
"Climate":[
W("Early heat intensified across France",`France had already recorded an exceptional May heat episode before summer. <span class='change'>A second event brought forecasts above 35°C across the south and possible peaks of 40-42°C.</span> Dry soil raises wildfire risk and warm nights reduce recovery, especially for older people and outdoor workers. Repeated early-season events make adaptation capacity more important than isolated records.`,[S("Le Monde","https://www.lemonde.fr/en/environment/article/2026/06/13/france-prepares-for-another-very-intense-and-widespread-heat-event-possibly-over-40-c_6754428_114.html"),S("Météo-France","https://meteofrance.com/")],"Tropical nights prevent normal physiological recovery from daytime heat.",["Preparedness","Infrastructure stress","Longer heat season"],"Watch alerts, hospital visits and wildfire starts."),
W("World Cup heat moved climate adaptation into labor policy",`The tournament opened across 16 cities with thousands of temporary workers exposed to summer conditions. <span class='change'>Advocates highlighted that only seven U.S. states have enforceable heat protections even as multiple host cities face 90°F-plus conditions.</span> FIFA's cooling and scheduling plans may help, but enforcement depends on employers and worker power. The week turned heat from a match-scheduling issue into a workplace-rights test.`,[S("Guardian","https://www.theguardian.com/us-news/2026/jun/14/world-cup-heat-workers"),S("OSHA","https://www.osha.gov/heat-exposure")],"Heat policy includes water, shade, rest, acclimatization and emergency response.",["Event safeguards","Regulatory patchwork","Worker voice"],"Watch venue compliance and heat-related illness.")],
"Tech / AI":[
W("AI policy moved closer to defense procurement",`Government agencies have accelerated military adoption while national regulation remains fragmented. <span class='change'>Debate over civilian mapping data used for drone systems showed that procurement can expand faster than consent and provenance rules.</span> The government may regulate, buy from and support the same AI firms. Contract terms are therefore becoming a central tool for transparency and testing.`,[S("NIST","https://www.nist.gov/itl/ai-risk-management-framework"),S("Guardian Weekly","https://www.theguardian.com/news/2026/jun/10/its-all-kicking-off-again-inside-the-12-june-guardian-weekly")],"Data provenance documents where training inputs originated and how they were licensed.",["Capability first","Consent","Procurement leverage"],"Watch defense contracts and audit rights."),
W("Unions began organizing a national AI agenda",`Labor groups have opposed surveillance and job displacement while supporting infrastructure jobs. <span class='change'>The AFL-CIO's affiliates elevated AI as a likely 2028 election issue and rejected both laissez-faire adoption and a simple data-center moratorium.</span> That position points toward bargaining rights, disclosure and benefit sharing rather than a universal ban. It may become the clearest organized counterweight to growth-first policy.`,[S("Axios","https://www.axios.com/2026/06/14/unions-ai-2028-elections"),S("AFL-CIO","https://aflcio.org/")],"Sectoral rules can treat creative replicas, hiring algorithms and industrial automation differently.",["Worker agency","Innovation cost","Infrastructure bargain"],"Watch model contract language and party platforms.")],
"Latin America":[
W("Direct U.S. force entered Venezuela's anti-crime campaign",`Washington had generally relied on partner forces for regional counternarcotics operations. <span class='change'>A U.S. strike killed Tren de Aragua leader Héctor Guerrero in Venezuela's illegal-mining region.</span> Leadership removal may disrupt coordination but does not dismantle extortion, trafficking or corrupt protection. The precedent could spread to other governments willing to authorize U.S. strikes.`,[S("AP","https://apnews.com/article/222081f38ff0a9d205bf0a63868cfac3"),S("International Crisis Group","https://www.crisisgroup.org/latin-america-caribbean")],"Criminal networks often survive leadership loss because revenue systems are decentralized.",["Deterrence","Fragmentation","Sovereignty"],"Watch successor groups and operational agreements."),
W("Peru's close runoff shifted attention to governability",`Peru has cycled through presidents amid conflict with Congress, corruption cases and anger over crime. <span class='change'>The runoff remained exceptionally close as counting advanced, raising the importance of certification and legal challenges.</span> A narrow winner will need a legislative coalition more than a symbolic mandate. Cabinet choices and security policy will indicate whether the transfer stabilizes government.`,[S("AP","https://apnews.com/article/64563bb32dfc69c21302c9ce2d83e600"),S("ONPE","https://www.onpe.gob.pe/")],"Governability is the ability to convert legal authority into stable policy.",["Mandate","Legitimacy","Congressional power"],"Watch certification and coalition building.")],
"Africa / Middle East":[
W("The Iran war moved toward a signed framework",`Weeks of talks had repeatedly produced claims of imminent agreement without a final text. <span class='change'>Pakistan announced a completed U.S.-Iran framework that ends military operations, lifts the blockade and schedules a Friday signing.</span> The development lowered immediate oil and war risks, but detailed nuclear and sanctions sequencing remains unresolved. Implementation is now more important than declaration.`,[S("AP","https://apnews.com/article/82b8e51b557af2d54050d3ef9a069560"),S("Financial Times","https://www.ft.com/content/423e2773-96ab-45d1-94b7-e61d360c282e")],"A framework can stop fighting while deferring the hardest verification questions.",["Phased peace","Paper truce","Mediator architecture"],"Watch Friday's text and first tanker movements."),
W("Congo's political and health crises began to reinforce each other",`Kinshasa faced a dispute over presidential term limits while Ituri's Ebola outbreak accelerated. <span class='change'>Opposition parties united against a constitutional-change route as police dispersed clashes near Parliament.</span> National political conflict can reduce public trust and administrative focus during an epidemic. The combined burden tests whether Congo can coordinate security, health and constitutional governance at once.`,[S("AP","https://apnews.com/article/f3ffbaaa242ff6dcf185ab1f54d86976"),S("Guardian Ebola","https://www.theguardian.com/world/2026/jun/14/drcs-ebola-outbreak-become-the-most-deadly-yet")],"State legitimacy affects whether communities follow health directives and trust official information.",["Referendum claim","Incumbency risk","Capacity overload"],"Watch the bill and outbreak response leadership.")],
"Europe / EU":[
W("Ukraine and Moldova advanced into formal EU negotiations",`Candidate status had provided political recognition without a detailed legal pathway. <span class='change'>The EU opened its first accession cluster after Hungary's new government ended the veto.</span> The fundamentals cluster can anchor rule-of-law reform and investment, but membership remains years away and politically contingent. The step is strategically important because it makes European alignment more institutional and less reversible.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/14/ukraine-and-moldova-start-first-phase-of-eu-membership-negotiations"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],"EU accession requires adopting and enforcing a large body of common law.",["Strategic anchor","Absorption limits","Conditional reform"],"Watch the fundamentals benchmarks and vetoes."),
W("Britain's defense-spending dispute reached cabinet level",`European governments have promised rearmament while facing tight budgets and competing public services. <span class='change'>British Defense Secretary John Healey resigned after arguing that the investment plan could leave the country less safe.</span> The departure exposed the gap between spending targets and executable procurement. The replacement must decide whether to revise the plan or defend the same funding assumptions.`,[S("UK Ministry of Defence","https://www.gov.uk/government/organisations/ministry-of-defence"),S("Guardian briefing","https://www.theguardian.com/world/2026/jun/12/friday-briefing-inside-taylor-swifts-20-year-rise-to-pop-superstardom")],"Procurement converts political budgets into equipment only after production and training.",["Accountability","Fiscal reality","European coordination"],"Watch the successor and investment plan.")],
"China":[
W("Scarborough Shoal returned to the center of maritime competition",`China has controlled access around the shoal since a 2012 standoff while the Philippines relies on a tribunal ruling Beijing rejects. <span class='change'>Manila protested a Chinese floating structure and personnel, fearing an incremental move toward a permanent base.</span> Temporary equipment can alter patrol behavior before formal construction begins. The response will test alliance signaling below the threshold of armed attack.`,[S("AP","https://apnews.com/article/85fa9b923cdd17f150f424da7b23df77"),S("PCA","https://pca-cpa.org/en/cases/7/")],"Gray-zone coercion uses pressure below the clearest military threshold.",["Incremental gain","Alliance deterrence","Escalation control"],"Watch whether the structure remains and expands."),
W("Beijing personalized pressure on Manila",`Philippine officials have used direct language to challenge China's maritime claims. <span class='change'>China imposed an entry and transaction ban on Defense Secretary Gilberto Teodoro and his family, and Manila issued a formal protest.</span> The measure raises political costs without resolving the maritime dispute. It may also harden public support for closer U.S. and regional defense ties.`,[S("AP","https://apnews.com/article/89e6999d31d4338d1a3fc0187c1612b7"),S("China Foreign Ministry","https://www.fmprc.gov.cn/eng/")],"Personal sanctions target decision makers rather than an entire economy.",["Behavioral pressure","Domestic backlash","Channel preservation"],"Watch future senior-level contacts.")],
"War / Active Conflicts":[
W("Ukraine paired battlefield pressure with institutional integration",`Russia's strategy assumes time and defensive depth will outlast external support. <span class='change'>Ukraine continued deep strikes and reported stalled Russian advances while the EU opened accession negotiations.</span> Military and institutional tracks reinforce one another only if attacks affect operations and reforms continue. Together they challenge the premise that delay automatically favors Moscow.`,[S("AP","https://apnews.com/article/2e289b307a65ea3ad2f51d91d3feafe4"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],"War leverage includes logistics, sanctions and political alignment.",["Cumulative pressure","Russian resilience","Conditional integration"],"Watch combat tempo, sanctions and EU benchmarks."),
W("Middle East ceasefires remained connected and fragile",`Fighting in Iran, Lebanon and Gulf shipping lanes repeatedly crossed nominal pauses. <span class='change'>The completed U.S.-Iran framework linked Hormuz, nuclear talks and regional military operations while Israeli strikes continued in Lebanon.</span> Linking fronts can create a comprehensive bargain but gives more actors veto power. The first implementation failure may occur outside the room where the deal is signed.`,[S("Guardian live","https://www.theguardian.com/world/live/2026/jun/14/iran-us-middle-east-crisis-donald-trump-peace-deal-strait-hormuz-open-pakistan-latest-news-updates"),S("AP","https://apnews.com/article/82b8e51b557af2d54050d3ef9a069560")],"A linked settlement trades breadth for complexity.",["Comprehensive peace","Spoiler multiplication","Mediator power"],"Watch Israel, Hezbollah and maritime enforcement.")]
};
const analytical=[
{tag:"Middle East Diplomacy",headline:"The Iran framework is now an implementation problem",deck:"The announcement lowers immediate risk; sequencing will determine whether it becomes a settlement.",image:headline.image,imageAlt:headline.imageAlt,imageCredit:headline.imageCredit,imageCreditUrl:headline.imageCreditUrl,skeletonHTML:`<b>Baseline:</b> more than 100 days of conflict left Hormuz shipping constrained, sanctions and frozen assets in place, and ceasefires across Iran and Lebanon repeatedly violated. <b>Change:</b> Pakistan announced a completed U.S.-Iran framework ending military operations, lifting the U.S. blockade and setting a Friday signing in Switzerland. <b>Mechanism:</b> Iran wants authority over reopening arrangements and phased asset relief; Washington wants reliable commercial passage and verifiable nuclear limits; Israel and Hezbollah retain independent military choices. <b>Stakes:</b> the order of tanker access, asset releases, uranium steps and sanctions relief determines whether either government can defend the bargain at home. <b>Proof test:</b> durability requires a published timetable, named verifier, incident channel and consequences for noncompliance.`,stats:["The Strait normally carries about one-fifth of globally traded oil and liquefied natural gas, so implementation affects inflation far beyond the region.","The nuclear phase is expected to run for roughly 60 days, making the interim ceasefire the decisive bargaining window.","The conflict lasted more than 100 days before the completed framework was announced."],sideA:["Phased peace","Performance-based rewards allow both parties to test compliance before accepting a comprehensive bargain."],sideB:["Paper truce","Different public descriptions of authority and nuclear terms can produce an early implementation crisis."],sideC:["Mediator statecraft","Pakistan, Qatar and Switzerland may wield more operational influence than traditional great-power forums."],sources:[S("AP","https://apnews.com/article/82b8e51b557af2d54050d3ef9a069560"),S("Financial Times","https://www.ft.com/content/423e2773-96ab-45d1-94b7-e61d360c282e"),S("Guardian","https://www.theguardian.com/world/live/2026/jun/14/iran-us-middle-east-crisis-donald-trump-peace-deal-strait-hormuz-open-pakistan-latest-news-updates")]},
{tag:"U.S. Monetary Policy",headline:"Warsh must define Fed independence before he can redefine Fed communication",deck:"An unchanged rate can still produce a major institutional shift.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Federal_Reserve_Board_building.jpg",imageAlt:"The Federal Reserve Board building in Washington",imageCredit:"Federal Reserve / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Federal_Reserve_Board_building",skeletonHTML:`<b>Baseline:</b> inflation has remained above target for more than five years, while political pressure favors lower rates and the Fed's balance sheet remains around $6.7 trillion. <b>Change:</b> Kevin Warsh will lead his first meeting with inflation at 4.2% and the target rate expected to stay at 3.5%-3.75%. <b>Mechanism:</b> Warsh can influence the economy through rates, balance-sheet policy and communication; reducing the dot plot or forward guidance could alter market expectations even without a rate move. <b>Stakes:</b> an easing signal may lower borrowing costs but risk appearing politically directed, while a harder line may surprise supporters who expected cuts. <b>Proof test:</b> markets will judge whether his reasoning consistently follows data rather than presidential preferences.`,stats:["May consumer inflation reached 4.2%, its highest year-over-year rate since 2023.","The expected policy range is 3.5%-3.75%, with markets assigning little probability to an immediate change.","The Fed balance sheet is about $6.7 trillion, giving Warsh a second major policy lever beyond short-term rates."],sideA:["Institutional reset","Less rigid guidance and a smaller balance sheet could improve flexibility and reduce market dependence on Fed forecasts."],sideB:["Opacity risk","Removing communication tools while political pressure rises could weaken accountability and destabilize expectations."],sideC:["Productivity wager","Warsh may argue that AI-driven productivity permits faster growth with less inflation, changing the usual rate calculus."],sources:[S("Financial Times","https://www.ft.com/content/0b984a9e-8ea5-48e5-98cc-5d9751a118a3"),S("Financial Times markets","https://www.ft.com/content/c17424f0-244e-45f4-b1d7-a0ffcebc4cf0"),S("Federal Reserve","https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm")]},
{tag:"Global Health / Congo",headline:"Ebola control is losing the race against transmission",deck:"The central gap is no longer knowledge of the disease, but access, trust and strain-specific tools.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Ebola_Treatment_Centre.jpg",imageAlt:"Health workers at an Ebola treatment facility",imageCredit:"European Commission / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Ebola_treatment_centers",skeletonHTML:`<b>Baseline:</b> Congo has extensive Ebola experience, but Ituri combines armed violence, mining mobility, weak roads and distrust of authorities. <b>Change:</b> confirmed cases reached 676 and deaths 136, with responders monitoring only 57% of the contacts already listed. <b>Mechanism:</b> rapid testing, isolation and safe burial interrupt transmission, yet Bundibugyo virus complicates use of the vaccine designed for Zaire ebolavirus and insecurity blocks teams from reaching communities. <b>Stakes:</b> sustained spread into trade corridors would convert a provincial emergency into a multi-country crisis. <b>Proof test:</b> case growth must slow while contact coverage, test speed and protective-equipment delivery improve.`,stats:["The case-fatality count stood at 136 deaths among 676 confirmed infections on June 14.","Only 57% of about 5,000 listed contacts were being monitored, while the likely exposure pool may be close to 24,000.","WHO and Africa CDC estimate that roughly $518 million is needed for containment."],sideA:["Experienced response system","Congo and international partners know the isolation, tracing and care protocols required to break chains."],sideB:["Access failure","Conflict, shortages and mistrust can make technical capacity irrelevant where transmission is fastest."],sideC:["Regional governance test","Africa CDC coordination and neighboring-country readiness may matter as much as any single donor pledge."],sources:[S("Guardian","https://www.theguardian.com/world/2026/jun/14/drcs-ebola-outbreak-become-the-most-deadly-yet"),S("WHO","https://www.who.int/health-topics/ebola"),S("Africa CDC","https://africacdc.org/")]},
{tag:"Ukraine / European Strategy",headline:"Ukraine's EU track converts wartime support into conditional integration",deck:"The first accession cluster is strategic progress, not a shortcut to membership.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Flags_of_the_European_Union_and_Ukraine.jpg",imageAlt:"European Union and Ukrainian flags",imageCredit:"European Parliament / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Relations_of_Ukraine_and_the_European_Union",skeletonHTML:`<b>Baseline:</b> candidate status symbolized Ukraine's European direction, but Hungary's veto blocked detailed negotiations and battlefield support remained separate from institutional integration. <b>Change:</b> the EU opened the first cluster for Ukraine and Moldova after a political shift in Budapest, while G7 leaders prepared to discuss sanctions and war termination. <b>Mechanism:</b> accession benchmarks can discipline anti-corruption, judicial and administrative reform; sanctions and defense aid can preserve the military space needed to carry them out. <b>Stakes:</b> progress makes Ukraine's Western alignment harder to reverse, but slow reform or renewed vetoes could turn the process into a source of frustration. <b>Proof test:</b> watch completed benchmarks, financing, veto behavior and whether summit diplomacy includes enforceable security guarantees.`,stats:["Ukraine has completed about 15% of a ten-point reform plan cited in the accession process.","Officials estimate technical negotiations could take roughly four years even before final political approval.","The first cluster covers foundational areas including rule of law, democracy and public administration."],sideA:["Strategic anchor","Accession conditions can lock in reform, investment and alignment more durably than summit declarations."],sideB:["Promise gap","A long process with repeated veto points may raise expectations the EU cannot meet during wartime."],sideC:["Staged membership","Partial access to markets and defense structures may deliver value before full voting membership."],sources:[S("Guardian","https://www.theguardian.com/world/2026/jun/14/ukraine-and-moldova-start-first-phase-of-eu-membership-negotiations"),S("AP","https://apnews.com/article/2e289b307a65ea3ad2f51d91d3feafe4"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")]},
{tag:"Western Hemisphere Security",headline:"Direct U.S. strikes are changing the logic of the drug war",deck:"The Venezuela operation removed a leader; the harder test is whether it changes criminal markets.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Orinoco_River_Delta.jpg",imageAlt:"Aerial view of river and forest in Venezuela",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Bol%C3%ADvar_(state)",skeletonHTML:`<b>Baseline:</b> Washington usually supplied intelligence, training and equipment while host governments conducted arrests and raids. <b>Change:</b> a U.S. strike killed Tren de Aragua leader Héctor Guerrero in Venezuela's illegal-mining region with Caracas describing the mission as joint. <b>Mechanism:</b> direct force shortens the operational chain but raises intelligence-quality, civilian-harm, sovereignty and accountability risks. <b>Stakes:</b> the precedent may spread to other states and merge counter-crime policy with competition over mineral zones. <b>Proof test:</b> success requires measurable decline in extortion, trafficking and illegal-mining revenue rather than only leadership removal.`,stats:["Tren de Aragua is more closely associated with extortion, human trafficking and illegal mining than control of the global cocaine trade.","The strike occurred in mineral-rich Bolívar state, where illegal gold networks have operated for years.","Past kingpin campaigns across the region removed leaders without producing a durable decline in drug production."],sideA:["Operational deterrence","Direct strikes raise the cost of sanctuary and can remove leaders faster than extradition."],sideB:["Network resilience","Fragmented criminal markets replace leaders and may become more violent after succession battles."],sideC:["Resource statecraft","Security operations may also clear territory for formal mining investment and new political bargains."],sources:[S("AP analysis","https://apnews.com/article/222081f38ff0a9d205bf0a63868cfac3"),S("AP announcement","https://apnews.com/article/344db66dfac87df7ca93d57ea77cd520"),S("International Crisis Group","https://www.crisisgroup.org/latin-america-caribbean")]}
];
const opinion=[
{tag:"Financial Times Editorial",title:"Kevin Warsh enters the arena",author:"Editorial Board",pub:"Financial Times · June 14, 2026",thesis:"The new Fed chair's first obligation is to demonstrate independence by keeping policy anchored to inflation rather than presidential demands.",text:`The editorial argues that strong employment and 4.2% inflation support holding rates steady, despite political pressure for easier money. Warsh's mixed history makes the first meeting unusually important because markets are evaluating both the decision and the decision maker. The argument matters beyond one rate announcement: central-bank credibility influences wage bargaining, bond yields and how costly future disinflation becomes. The strongest pushback is that a new chair can reform communication and balance-sheet policy without sacrificing independence or immediately changing rates.`,claim:"Warsh should use his first meeting to prove that evidence, not patronage, sets monetary policy.",matters:"A credibility loss can raise long-term inflation expectations even if the current rate remains unchanged.",pushback:"Institutional reform and a less rigid communication system need not amount to political capture.",source:S("Read editorial","https://www.ft.com/content/0b984a9e-8ea5-48e5-98cc-5d9751a118a3")},
{tag:"Guardian Foreign Affairs",title:"Russia is losing the war, but a desperate Putin may be more dangerous",author:"Simon Tisdall",pub:"The Guardian · June 14, 2026",thesis:"Ukrainian gains and Russian economic strain increase the risk of escalation rather than guaranteeing a negotiated retreat.",text:`Tisdall argues that Ukrainian battlefield recovery, deep strikes and Russian domestic pressure have weakened Moscow's assumptions about a war of endurance. The thesis is live as the G7 meets and Trump again speaks separately with Putin and Zelenskyy. It matters because policies built on the expectation that battlefield setbacks automatically moderate Putin may underestimate cyber, sabotage, nuclear and NATO-border risks. The strongest pushback is that claims of Russian desperation rely heavily on incomplete battlefield and political evidence, while Moscow retains manpower, industry and escalation control.`,claim:"The West should treat Russian setbacks as a reason to strengthen deterrence, not relax it.",matters:"It separates improved Ukrainian leverage from the much stronger claim that the war is near a safe conclusion.",pushback:"Overstating Russian weakness can encourage risk-taking and obscure Moscow's remaining capacity.",source:S("Read column","https://www.theguardian.com/commentisfree/2026/jun/14/vladimir-putin-ukraine-war-borders-russian-president")},
{tag:"Le Monde Editorial",title:"Trump's powerlessness in the Iranian trap",author:"Editorial Board",pub:"Le Monde · June 9, 2026",thesis:"Military escalation strengthened Iran's bargaining leverage and exposed the limits of personalized coercive diplomacy.",text:`The editorial argues that the campaign failed to produce regime collapse or a clean strategic victory and instead allowed Tehran to use Hormuz as leverage over the global economy. The completed framework makes the thesis more testable because Washington is accepting a phased bargain after claiming force would compel decisive surrender. The argument matters as a warning that destructive capacity is not the same as political control. The strongest pushback is that military and economic pressure may have been necessary to bring Iran into a performance-based negotiation.`,claim:"Overwhelming military power produced an expensive negotiation on terms Iran can still contest.",matters:"It distinguishes battlefield damage from the ability to impose a durable political settlement.",pushback:"Coercion may have created the urgency and asset leverage that made the framework possible.",source:S("Read editorial","https://www.lemonde.fr/en/opinion/article/2026/06/09/trump-s-powerlessness-in-the-iranian-trap_6754283_23.html")},
{tag:"Technology Column",title:"All signs point to Trump pushing AI growth",author:"Blake Montgomery",pub:"The Guardian · June 8, 2026",thesis:"The administration's safety language is secondary to military adoption, strategic competition and the financial upside of AI firms.",text:`Montgomery reads voluntary model review, Pentagon acceleration and possible federal financial involvement as parts of a growth-first policy. The argument is newly relevant because unions are organizing around workplace surveillance and displacement while still supporting data-center jobs. It matters because government could become regulator, buyer and investor at once, creating both conflicts and leverage. Pushback is that procurement and ownership can support stronger disclosure and testing when those conditions are written into contracts.`,claim:"Expect U.S. policy to maximize capability and company value before constraining frontier development.",matters:"Connects national security, market incentives and worker governance in one policy framework.",pushback:"Government contracts or ownership stakes could impose conditions unavailable to a distant regulator.",source:S("Read column","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic")}
];
const editions={wire:["The Wire","Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer."],weekly:["The Weekly","The week in consequential developments, grouped like The Wire but selected for events still shaping the map today."],analytical:["The Analytical","Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points."],opinion:["The Opinion","Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."]};
const src=a=>'<div class="sources">'+a.map(x=>'<a href="'+x.u+'" target="_blank" rel="noopener">'+x.n+' ↗</a>').join('')+'</div>';
const learn=x=>'<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>'+x.context+'</p><h4>Three angles</h4><ul>'+x.angles.map(a=>'<li>'+a+'</li>').join('')+'</ul><h4>What to watch</h4><p>'+x.watch+'</p></div></details>';
function renderGroups(data){return Object.entries(data).map(([topic,items])=>'<details class="topic"><summary><span>'+topic+'</span><span class="count">'+items.length+' '+(items.length===1?'story':'stories')+'</span></summary><div class="stack">'+items.map(x=>'<article class="wire-item"><h3 class="wire-headline">'+x.h+'</h3><p class="wire-prose">'+x.proseHTML+'</p>'+src(x.sources)+learn(x.learn)+'</article>').join('')+'</div></details>').join('')}
function renderAnalytical(){return analytical.map(x=>'<details class="afile"><summary><div><div class="tag">'+x.tag+'</div><h3>'+x.headline+'</h3><p class="deck">'+x.deck+'</p></div></summary><div class="analysis-body"><img class="analysis-img" src="'+x.image+'" alt="'+x.imageAlt+'"><div class="credit"><a href="'+x.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+x.imageCredit+' ↗</a></div><p class="walk">'+x.skeletonHTML+'</p><div class="stats"><h4>Key Stats With Setup</h4><ul>'+x.stats.map(s=>'<li>'+s+'</li>').join('')+'</ul></div><h4 class="angles-title" style="margin-top:17px">Three Angles</h4><div class="angles">'+[["a",x.sideA],["b",x.sideB],["c",x.sideC]].map(([c,v])=>'<div class="angle '+c+'"><strong>'+v[0]+'</strong>'+v[1]+'</div>').join('')+'</div>'+src(x.sources)+'</div></details>').join('')}
function renderOpinion(){return opinion.map(x=>'<article class="opinion-card"><div class="tag">'+x.tag+'</div><h3>'+x.title+'</h3><div class="by">'+x.author+' · '+x.pub+'</div><p class="thesis">'+x.thesis+'</p><p>'+x.text+'</p><div class="op-grid"><div class="op-box"><strong>The Claim</strong>'+x.claim+'</div><div class="op-box"><strong>Why It Matters</strong>'+x.matters+'</div><div class="op-box"><strong>Pushback</strong>'+x.pushback+'</div></div>'+src([x.source])+'</article>').join('')}
const nav=document.getElementById("nav"),content=document.getElementById("content");Object.entries(editions).forEach(([k,v])=>{const b=document.createElement("button");b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById("edition").textContent=editions[k][0];document.getElementById("description").textContent=editions[k][1];document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.edition===k));content.innerHTML=k==="wire"?renderGroups(wire):k==="weekly"?renderGroups(weekly):k==="analytical"?renderAnalytical():renderOpinion()}
document.getElementById("headline").innerHTML='<div><div class="label">Headline of the Day · '+headline.topic+'</div><h2>'+headline.h+'</h2><p>'+headline.deck+'</p></div><figure style="margin:0"><img class="headline-photo" src="'+headline.image+'" alt="'+headline.imageAlt+'"><figcaption class="credit"><a href="'+headline.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+headline.imageCredit+' ↗</a></figcaption></figure>';
const saved=localStorage.getItem("dig-theme"),root=document.documentElement,toggle=document.getElementById("theme");function setTheme(t){root.dataset.theme=t;toggle.textContent='Theme: '+t[0].toUpperCase()+t.slice(1);localStorage.setItem("dig-theme",t)}setTheme(saved||"light");toggle.onclick=()=>setTheme(root.dataset.theme==="light"?"dark":"light");show("wire");
</script></body></html>
