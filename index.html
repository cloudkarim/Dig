<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dig | June 26, 2026</title><style>:root{--bg:#f8f4ed;--paper:#fffdf7;--rail:#eee6da;--ink:#6b5a4a;--title:#5d4b3d;--muted:#655f56;--faint:#91887d;--rule:#ddd3c6;--accent:#7b5843;--surface:#f6f0e8;--link:#7b5843;--a:#617b8a;--b:#9a6764;--c:#728063}[data-theme=dark]{--bg:#151412;--paper:#1d1c19;--rail:#201f1c;--ink:#f3eee7;--title:#f3eee7;--muted:#d2c7b8;--faint:#a99b8b;--rule:#39342e;--accent:#caa77d;--surface:#191815;--link:#caa77d;--a:#8eaeba;--b:#c58d88;--c:#9fad86}*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 Inter,system-ui,Segoe UI,Arial,sans-serif}.app{width:100%;max-width:none;margin:0;min-height:100vh;display:grid;grid-template-columns:238px minmax(0,1fr)}.rail{position:sticky;top:0;height:100vh;background:var(--rail);border-right:1px solid var(--rule);padding:30px 22px;display:flex;flex-direction:column}.brand-word{font:normal clamp(3rem,4.2vw,3.75rem)/.9 Georgia,Charter,serif;color:var(--title)}.rail-date{margin:16px 0 30px;color:var(--muted);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase}.nav{display:grid;gap:4px}.nav button,.theme{border:0;background:transparent;color:var(--muted);text-align:left;padding:9px 10px;font:inherit;cursor:pointer;border-left:2px solid transparent}.nav button.active{color:var(--title);border-color:var(--accent);background:color-mix(in srgb,var(--paper) 45%,transparent)}.theme{margin-top:auto;border-top:1px solid var(--rule);padding-top:16px}.main{padding:38px 42px 70px;min-width:0}.top{max-width:1050px;border-bottom:1px solid var(--rule);padding-bottom:25px}.kicker,.label,.tag{color:var(--accent);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}h1{font:normal clamp(2.2rem,3.8vw,3rem)/1.05 Georgia,Charter,serif;color:var(--title);margin:5px 0}.desc{max-width:780px;color:var(--muted);margin:0}.compiled{color:var(--faint);font-size:.76rem;margin-top:8px}.headline{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,430px);gap:28px;align-items:center;max-width:1050px;padding:28px 0;border-bottom:1px solid var(--rule)}.headline h2{font:normal 1.85rem/1.12 Georgia,Charter,serif;color:var(--title);margin:8px 0}.headline p{color:var(--muted);margin:0}.headline-photo,.analysis-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}.credit,.wire-sources{font-size:.75rem;color:var(--faint);margin-top:7px}.credit a,.wire-sources a{color:var(--link);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--link) 45%,transparent);margin-right:12px}.content{max-width:1050px;padding-top:12px}.topic,.afile{border-bottom:1px solid var(--rule)}summary{list-style:none;cursor:pointer}summary::-webkit-details-marker{display:none}.topic>summary{display:grid;grid-template-columns:1fr auto auto;gap:16px;align-items:center;padding:17px 0;color:var(--title);font-weight:650}.topic>summary:after,.afile>summary:after{content:'+';color:var(--faint);font-size:1.1rem}.topic[open]>summary:after,.afile[open]>summary:after{content:'-'}.count{color:var(--faint);font-size:.76rem;font-weight:400}.stack{max-width:800px}.wire-item{padding:22px 0;border-top:1px solid var(--rule)}.wire-headline{font:normal 1.32rem/1.22 Georgia,Charter,serif;color:var(--title);margin:0 0 9px}.wire-prose{margin:0;color:var(--ink)}.change{color:var(--title);font-weight:650}.jargon{border-bottom:1px dotted var(--faint)}.learn{margin-top:12px;background:var(--surface);border-left:2px solid var(--rule);padding:0 14px}.learn summary{padding:10px 0;color:var(--accent);font-size:.78rem;font-weight:650}.learn-body{padding:0 0 13px}.learn-body h4{margin:11px 0 3px;color:var(--title);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em}.learn-body p,.learn-body ul{margin:0}.learn-body ul{padding-left:18px}.afile>summary{display:grid;grid-template-columns:1fr auto;gap:20px;padding:22px 0}.afile h3{font:normal 1.38rem/1.2 Georgia,Charter,serif;color:var(--title);margin:5px 0}.deck{color:var(--muted);margin:0}.analysis-body{max-width:900px;padding:0 0 27px}.walk{margin:18px 0;color:var(--ink)}.stats{background:var(--surface);border-left:2px solid var(--accent);padding:15px 18px}.stats h4,.angles-title{margin:0 0 8px;color:var(--title);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em}.stats ul{margin:0;padding-left:18px}.angles{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:14px}.angle{padding:13px;border:1px solid var(--rule);background:var(--paper)}.angle.a{border-top:2px solid var(--a)}.angle.b{border-top:2px solid var(--b)}.angle.c{border-top:2px solid var(--c)}.angle strong{display:block;color:var(--title);margin-bottom:4px}.opinion-card{max-width:850px;border-bottom:1px solid var(--rule);padding:24px 0}.opinion-card h3{font:normal 1.5rem/1.2 Georgia,Charter,serif;color:var(--title);margin:5px 0}.by{color:var(--faint);font-size:.78rem}.thesis{color:var(--title);font-style:italic}.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.op-box{background:var(--surface);padding:12px;border-top:2px solid var(--rule)}.op-box strong{display:block;color:var(--title);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.footer{max-width:1050px;margin-top:34px;padding-top:16px;border-top:1px solid var(--rule);color:var(--faint);font-size:.74rem}@media(max-width:760px){.app{display:block}.rail{position:relative;width:100%;height:auto;padding:22px}.nav{grid-template-columns:repeat(2,1fr)}.theme{margin-top:15px}.main{padding:27px 21px}.headline{grid-template-columns:1fr}.angles,.op-grid{grid-template-columns:1fr}}</style></head><body><div class="app"><aside class="rail"><div class="brand-word">Dig</div><div class="rail-date">Friday, June 26, 2026</div><nav class="nav" id="nav"></nav><button class="theme" id="theme">Theme: Light</button></aside><main class="main"><header class="top"><div class="kicker">Morning Briefing</div><h1 id="edition"></h1><p class="desc" id="description"></p><div class="compiled">Compiled June 26, 2026 - 12:45 p.m. ET - America/New_York</div></header><section class="headline" id="headline"></section><section class="content" id="content"></section><footer class="footer">Dig - Compiled June 26, 2026 - America/New_York</footer></main></div><script>const S=(n,u)=>({n,u}),L=(context,angles,watch)=>({context,angles,watch}),W=(h,proseHTML,sources,learn)=>({h,proseHTML,sources,learn});const img={venezuela:'https://commons.wikimedia.org/wiki/Special:Redirect/file/La_Guaira,_Venezuela.jpg',heat:'https://commons.wikimedia.org/wiki/Special:Redirect/file/Heat_wave_in_Europe.jpg',ebola:'https://collection.nam.ac.uk/images/960/228000-228999/228459.jpg',taiwan:'https://commons.wikimedia.org/wiki/Special:Redirect/file/South_China_Sea_claims_map.jpg',ai:'https://commons.wikimedia.org/wiki/Special:Redirect/file/Wikimedia_Servers-0051_17.jpg'};const headline={topic:'Latin America',h:'Venezuela quake rescue becomes a hemispheric emergency',deck:'Twin major earthquakes have pushed Venezuela into a disaster-response test that now involves local rescuers, the UN and outside search teams.',image:img.venezuela,imageAlt:'View of La Guaira on Venezuela northern coast',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:La_Guaira,_Venezuela.jpg'};const wire={'US Economy':[W('Oil hits four-month low as Hormuz risk eases',`Energy markets spent the spring pricing a war premium into fuel, shipping and inflation expectations because the Strait of Hormuz carried a major share of Gulf crude and <span class="jargon">liquefied natural gas (natural gas chilled into liquid form for tanker shipment)</span>. <span class="change">On Friday, Brent crude fell to about $71.52 a barrel, a four-month low, as traders bet that reopening routes and higher Gulf output would offset lingering Iran risks.</span> The relief matters for consumers and central banks because cheaper oil can cool headline inflation, but the same reports still describe tanker-security problems and a fragile diplomatic process. The next inflation test is whether lower crude prices reach freight, fertilizer and gasoline costs before another maritime incident rebuilds the risk premium.`,[S('Guardian business live','https://www.theguardian.com/business/live/2026/jun/26/uk-food-drink-exports-fall-us-tariffs-brexit-trade-friction-stock-market-ftse-pound-oil-latest-news-updates'),S('New York Post oil report','https://nypost.com/2026/06/26/business/us-crude-oil-falls-below-70-despite-iranian-attack-on-cargo-ship/')],L(`<span class="jargon">Risk premium (extra price investors demand for uncertainty)</span> can fall quickly when shipping lanes reopen, even while physical security remains unsettled.`,['Disinflation case: cheaper oil lowers transport and fuel costs quickly.','Fragility case: one attack in Hormuz can restore insurance and shipping surcharges.','Asia case: importers benefit first because most Gulf barrels move east.'],'Watch tanker traffic, marine insurance quotes, gasoline averages and any Iran-Oman transit rules.')),W('Fed caution survives because core prices remain sticky',`U.S. investors entered the final week of June looking for proof that softer services inflation can survive higher energy uncertainty and AI-related cost pressure. <span class="change">Chicago Fed president Austan Goolsbee said recent data showed early relief in services prices, but he warned that core price pressures remain elevated.</span> That distinction matters because the <span class="jargon">Federal Reserve (the U.S. central bank that sets short-term interest rates)</span> usually looks through temporary energy swings but reacts to persistent labor-intensive service prices. If next week’s jobs and factory data stay firm, rate-cut expectations could fade even if oil remains lower.`,[S('Economic Times Fed report','https://m.economictimes.com/markets/us-stocks/news/us-stock-market-feds-goolsbee-sees-early-signs-of-relief-in-services-inflation-says-core-price-pressures-remain-elevated/articleshow/132006485.cms'),S('WSJ week ahead','https://www.wsj.com/economy/central-banking/week-ahead-for-fx-bonds-u-s-jobs-data-in-focus-as-markets-search-for-clues-on-fed-rate-path-a65678b4')],L(`<span class="jargon">Core inflation (inflation excluding volatile food and energy)</span> is watched because it can show underlying demand and wage pressure.`,['Soft-landing case: services inflation eases without job losses.','Hawkish case: sticky core prices force higher rates for longer.','Market case: bonds may move more on payrolls than on oil.'],'Watch nonfarm payrolls, wage growth, consumer confidence and Fed speakers before the July meeting.'))],'US Politics':[W('Supreme Court rulings give Trump wider border authority',`The Trump administration had asked the courts to revive a harder line on humanitarian immigration, especially <span class="jargon">Temporary Protected Status (a status that lets people from unsafe countries live and work legally in the U.S. for a limited period)</span> and asylum access at the southern border. <span class="change">The Supreme Court allowed the administration to end protections for Haitians and Syrians and cleared a policy that can turn back asylum seekers before they physically enter U.S. territory.</span> The decisions matter because they shift power from individual review toward executive border control while affecting hundreds of thousands of people with established U.S. lives. Politically, the rulings turn immigration from an administrative fight into a term-ending Supreme Court story before other executive-power decisions arrive.`,[S('AP Supreme Court divisions','https://apnews.com/article/e956f6a00f05f1d5f21cf824909a6bf7'),S('AP asylum ruling','https://apnews.com/article/d36d0092617c7115780c06de38e2000f'),S('Le Monde immigration rulings','https://www.lemonde.fr/en/international/article/2026/06/26/us-supreme-court-clears-way-for-trump-administration-s-anti-immigration-policies_6754895_4.html')],L('The legal dispute turns on where statutory asylum rights begin and how much review courts can apply when presidents terminate temporary humanitarian protections.',['Executive case: border agencies need workable intake rules during surges.','Rights case: technical entry rules can block people fleeing danger from even making a claim.','Election case: the Court has handed both parties a clear immigration-power argument.'],'Watch the pending birthright-citizenship case and DHS implementation notices.')),W('Visible justice clashes expose the stakes of final rulings',`Supreme Court terms often end with tense opinions, but this week the disagreement moved into unusually visible oral exchanges. <span class="change">After the Court’s immigration decisions, Justice Sonia Sotomayor read a forceful dissent and Justice Samuel Alito answered from the bench, a rare public sign of friction.</span> That matters because several major rulings on executive power and constitutional limits are still looming, and public legitimacy depends partly on whether decisions look legal rather than partisan. The clash also gives Congress and campaigns fresh language for debates over court expansion, emergency rulings and judicial restraint.`,[S('AP Supreme Court disagreements','https://apnews.com/article/e956f6a00f05f1d5f21cf824909a6bf7'),S('Guardian US politics live','https://www.theguardian.com/us-news/live/2026/jun/25/trump-housing-bill-senate-regulations-supreme-court-latest-news-updates')],L(`<span class="jargon">Oral dissent (a justice reading dissent from the bench)</span> is usually reserved for especially important disagreements.`,['Institutional case: public disagreement can clarify legal stakes.','Legitimacy case: visible anger can deepen perceptions of partisanship.','Campaign case: Court procedure becomes a midterm issue when decisions affect immigration and executive power.'],'Watch remaining term decisions and congressional responses from Judiciary Committee leaders.'))],Healthcare:[W('Missing Ebola patients make Congo outbreak a regional alarm',`Congo’s Ituri outbreak was already dangerous because conflict, displacement and weak roads limited the basic outbreak tools of isolation and tracing. <span class="change">Africa CDC warned Friday that the whereabouts of nearly 300 Ebola-positive people are unknown, while the outbreak has reached 1,118 confirmed cases and 291 deaths in Congo, with cases also reported in Uganda.</span> Because the Bundibugyo strain has no approved vaccine or specific treatment, a missing-patient problem can become a transmission-chain problem within crowded camps and mining corridors. The immediate public-health risk is not global panic; it is that underfunded local tracing fails before new treatment and prevention trials can begin.`,[S('Guardian DRC Ebola','https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc'),S('AP Congo Ebola cases','https://apnews.com/article/d298bfadf678a07412c8fbb8c46263ad'),S('WHO Ebola background','https://www.who.int/health-topics/ebola')],L(`<span class="jargon">Contact tracing (finding and monitoring people exposed to an infected patient)</span> is the main containment tool when a vaccine is unavailable.`,['Containment case: recruiting local workers can close tracing gaps faster than outside teams alone.','Failure case: missing confirmed cases make isolation mathematically weaker.','Regional case: Uganda’s lower toll shows the value of early border surveillance.'],'Watch tracing coverage, treatment-center occupancy and whether pledged donor money actually arrives.')),W('France Ebola case shifts attention to health-worker exposure',`Imported Ebola cases are rare, but they change the politics of an outbreak because the risk to international responders becomes visible. <span class="change">French authorities confirmed an Ebola infection in a doctor who had returned from a humanitarian mission in Congo, isolated the patient and began contact monitoring.</span> Officials say the public risk is low because Ebola spreads through direct contact with bodily fluids, not routine airborne exposure, but the case shows how front-line medical work connects Ituri’s outbreak to European preparedness systems. It may also complicate humanitarian staffing if travel monitoring rules make aid rotations harder.`,[S('AP France Ebola case','https://apnews.com/article/b6a854bf4ee2a0137c4fbd052f335bf9'),S('Le Monde Ebola monitoring','https://www.lemonde.fr/en/le-monde-africa/article/2026/06/26/monitoring-increases-after-france-reports-first-diagnosed-ebola-case_6754909_124.html')],L(`<span class="jargon">Incubation period (time between infection and symptoms)</span> matters because Ebola monitoring usually lasts 21 days.`,['Preparedness: isolation hospitals can prevent secondary spread.','Aid-risk: fear and quarantine burdens can deter field staff.','Communication: clear risk explanation prevents stigma and misinformation.'],'Watch French contact investigations and Congo’s new outbound monitoring rules.'))],Climate:[W('Europe heatwave becomes an attribution and health-system test',`European heat planning used to treat 2003-style extremes as rare reference points, but current conditions have moved the baseline. <span class="change">World Weather Attribution scientists said western Europe’s heatwave is the most severe and widespread on record and would have been impossible without fossil-fuel-driven warming.</span> The UK recorded its hottest June temperature, hospitals and rail systems faced disruption, and almost half of Europe’s 850 largest cities were expected to break heat-stress records. The policy impact is practical: cities now need cooling, housing, labor and hospital plans for heat that is no longer exceptional.`,[S('Guardian heat attribution','https://www.theguardian.com/environment/2026/jun/26/europe-heatwave-impossible-without-climate-crisis-scientists'),S('AP heat attribution','https://apnews.com/article/8633dbe64319523484c8feabf2205234'),S('Guardian heatwave live','https://www.theguardian.com/environment/live/2026/jun/26/europe-heatwave-extreme-heat-red-alert-weather-uk-england-france-climate-crisis-latest-news-updates')],L(`<span class="jargon">Heat stress (the combined physiological burden of heat, humidity, sunlight and wind)</span> can be more dangerous than temperature alone.`,['Adaptation case: cooling centers, shade and building upgrades can reduce deaths quickly.','Emissions case: attribution strengthens the argument that mitigation is a health policy.','Equity case: poor housing and outdoor work turn weather into unequal risk.'],'Watch death estimates, emergency-room reports and whether governments mandate workplace heat protections.')),W('Extreme heat is becoming a productivity problem',`Heatwaves now hit Europe’s aging buildings, transport systems and outdoor work at the same time. <span class="change">Oxford Economics warned that a four-day heatwave could reduce quarterly labor-productivity growth by up to 2 percentage points in western Europe, while Allianz projected large heat-stress losses this decade.</span> That matters because construction, agriculture and manufacturing cannot simply shift to remote work when heat becomes unsafe. The economic debate is moving from disaster response to labor law, building standards and whether countries should define maximum safe working temperatures.`,[S('Guardian heat productivity','https://www.theguardian.com/business/2026/jun/26/extreme-heat-europe-productivity-economic-growth'),S('OSHA heat exposure','https://www.osha.gov/heat-exposure')],L(`<span class="jargon">Labor productivity (output per hour worked)</span> falls when heat forces slower work, extra breaks or shutdowns.`,['Business case: adaptation protects output and insurance costs.','Labor case: workers need enforceable heat rules, not voluntary guidance.','Fiscal case: lost productivity can reduce tax revenue during already slow growth.'],'Watch union demands, school closures, grid warnings and national workplace-temperature rules.'))],'Tech / AI':[W('Anthropic-Alibaba dispute turns distillation into a security issue',`The AI race is increasingly about access to frontier model outputs, not only chips and data centers. <span class="change">Anthropic accused Alibaba of creating about 25,000 fake accounts and using 28.8 million Claude interactions to extract capabilities such as coding, agentic reasoning and long-horizon tasks.</span> The claim matters because <span class="jargon">model distillation (training a smaller model on outputs from a stronger model)</span> can be legitimate inside a company but becomes an intellectual-property and security fight when rivals use it without permission. Congress now has a concrete example for debates over export controls, account verification and whether AI capability should be treated like strategic technology.`,[S('FT Anthropic Alibaba','https://www.ft.com/content/8496c940-fdc7-4554-bc8d-7bcc93e7d75c'),S('Tom’s Hardware summary','https://www.tomshardware.com/tech-industry/artificial-intelligence/anthropic-claims-that-chinas-alibaba-illicitly-distilled-its-models-from-april-to-june-2026-says-effort-involved-25-000-fake-accounts-and-28-8-million-exchanges-on-claude')],L('Distillation lowers the cost of catching up because the second model learns from the first model’s answers rather than only from raw data.',['Security case: U.S. labs argue access controls must match chip controls.','Competition case: accusations can also protect incumbents from cheaper rivals.','Governance case: platform abuse rules may become part of AI diplomacy.'],'Watch Senate AI hearings, Alibaba’s response and whether Anthropic changes access screening.')),W('China robot strategy exposes the labor side of AI competition',`China’s demographic problem is usually described through aging and a shrinking workforce, but the policy answer is becoming industrial automation. <span class="change">FT reporting this week described China’s push toward robotics and humanoid automation, after JD.com’s founder warned that 700,000 delivery workers could eventually be replaced by robots.</span> The shift matters because automation can offset worker shortages while worsening youth and gig-worker insecurity if retraining does not keep up. For the global AI race, China is trying to turn demographic pressure into a manufacturing and logistics advantage.`,[S('FT robot nation','https://www.ft.com/content/c8731833-10ca-4a12-bfe4-8ebb2584ec68'),S('FT JD.com robots','https://www.ft.com/content/465635e2-633b-4311-afe5-9b3bff8c9240')],L(`<span class="jargon">Embodied intelligence (AI installed in physical robots that act in the real world)</span> is a major Chinese industrial-policy priority.`,['Productivity case: robots can preserve output as the labor force shrinks.','Social-risk case: replacing couriers can destabilize a huge gig-work sector.','Trade case: cheap automation can intensify China’s export competitiveness.'],'Watch robotics subsidies, youth unemployment data and pilot delivery systems in major cities.'))],'Latin America':[W('Venezuela doublet earthquakes leave rescuers racing rising toll',`Venezuela entered the week with fragile infrastructure and limited disaster capacity, which made the twin quakes especially destructive. <span class="change">AP and Guardian updates reported at least 589 dead and nearly 3,000 injured after magnitude 7.2 and 7.5 earthquakes struck northern Venezuela 39 seconds apart.</span> La Guaira and Caracas suffered major collapses, and citizens are digging through rubble while outside rescue teams and aid arrive. The disaster matters beyond Venezuela because humanitarian access, sanctions relief and information controls are now part of the rescue timeline.`,[S('AP Venezuela search','https://apnews.com/article/b07aff1cb886cfe616a0e89b3687b8b8'),S('Guardian Venezuela live','https://www.theguardian.com/world/live/2026/jun/26/venezuela-earthquakes-search-survivors-death-toll-rodriguez-rubio-latest-news-updates'),S('AP doublet explainer','https://apnews.com/article/f61cc9b92ba4e0735cfed6391c21e4fd')],L(`<span class="jargon">Earthquake doublet (two similarly sized quakes close together in time and location)</span> can multiply damage because already weakened structures are hit again almost immediately.`,['Humanitarian case: fast international aid can save lives in the first days.','Governance case: missing lists and social-media restrictions can slow rescue.','Regional case: aftershocks and airport damage complicate aid logistics.'],'Watch aftershock warnings, missing-person counts, airport reopening and UN coordination updates.')),W('U.S. aid to Venezuela becomes relief and diplomacy at once',`U.S.-Venezuela relations were already in a transitional phase after months of direct pressure on Caracas, but the earthquake forced a humanitarian channel to the center. <span class="change">Washington sent elite urban search-and-rescue teams and pledged major support while Venezuela accepted outside help and lifted some information restrictions to find missing people.</span> The aid matters because disaster cooperation can open practical coordination even when political trust is weak. It can also create tension if Venezuelans see relief as tied to outside leverage over reconstruction, oil and transition politics.`,[S('New York Post US rescue teams','https://nypost.com/2026/06/25/world-news/us-sending-elite-search-teams-to-venezuela-after-deadly-earthquakes/'),S('WSJ Venezuela earthquakes','https://www.wsj.com/world/americas/venezuela-earthquakes-caracas-damage-a5835528'),S('Guardian state of emergency','https://www.theguardian.com/world/2026/jun/25/earthquake-venezuela-caracas-tremors-aftershocks')],L(`<span class="jargon">Urban search and rescue (specialized teams trained to find and extract people from collapsed structures)</span> is most valuable in the first 72 hours after a quake.`,['Cooperation case: shared rescue work can rebuild diplomatic channels.','Sovereignty case: aid can become politically sensitive in a fragile transition.','Reconstruction case: outside funding may shape who controls rebuilding contracts.'],'Watch U.S.-Venezuela coordination, IMF or UN aid mechanisms and local complaints about rescue equipment.'))],'Africa / Middle East':[W('Iran deal mediation remains exposed to Lebanon and Hormuz',`The U.S.-Iran framework is no longer just a bilateral nuclear story because shipping lanes, Gulf energy and Lebanon enforcement are embedded in the same bargain. <span class="change">AP reported that mediators from Pakistan and Qatar worked through threats and strikes to broker the interim deal, while talks still face disputes over the Strait of Hormuz, sanctions relief and Hezbollah-Israel violence.</span> That matters because a diplomatic document can lower market panic but still fail if the implementation bodies cannot manage local violations. The concrete test is whether negotiators can turn a temporary understanding into inspection, shipping and regional-security rules by the next deadline.`,[S('AP Iran mediation','https://apnews.com/article/33e3fd72a890ff28e1b8401b51a25aa3'),S('Guardian Middle East live','https://www.theguardian.com/world/live/2026/jun/23/iran-us-israel-lebanon-un-peace-deal-nuclear-iaea-frozen-assets-strait-of-hormuz-latest-news-updates')],L(`<span class="jargon">Interim deal (a temporary agreement meant to create time for a final settlement)</span> only works if both sides believe the next phase is enforceable.`,['Optimistic case: Pakistan and Qatar give both sides face-saving channels.','Skeptical case: sanctions relief can arrive faster than verification.','Regional case: Lebanon can spoil a nuclear deal if ceasefire monitoring fails.'],'Watch August nuclear talks, Hormuz incidents and the Lebanon monitoring body.')),W('Congo Ebola response is a humanitarian-access story too',`The Congo outbreak is listed under health, but its causes also sit in Africa’s conflict and displacement map. <span class="change">More than one million displaced people are living in camps that health workers cannot reliably access, while only a small share of promised donor funding has been delivered.</span> That matters because outbreak control depends on roads, security, community trust and burial practices as much as laboratory diagnostics. If access does not improve, the disease can expose the same governance failures that already drive eastern Congo’s insecurity.`,[S('Guardian DRC Ebola','https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc'),S('AP Congo Ebola cases','https://apnews.com/article/d298bfadf678a07412c8fbb8c46263ad')],L('Eastern Congo combines armed conflict, mining mobility, displacement and weak public services, which makes even familiar disease-control tools hard to execute.',['Security case: safe access is a health intervention.','Funding case: pledges do not isolate patients unless money arrives.','Regional case: Uganda’s success depends on Congo reducing spillover pressure.'],'Watch humanitarian corridors, local hiring plans and donor disbursement rates.'))],'Europe / EU':[W('EU extends Ukrainian protection but limits new military-age male arrivals',`The EU’s temporary-protection system has been one of the largest refugee-policy responses since Russia’s full-scale invasion, covering housing, healthcare, schools and work access. <span class="change">The European Commission moved to extend protection for Ukrainians already in the bloc but exclude new arrivals who are men aged 23 to 60 and eligible for military service.</span> The policy matters because it balances refugee protection against Ukraine’s manpower crisis after years of heavy casualties. It also creates a legal and moral line between people already protected and future arrivals who may still face danger but are also subject to Ukraine’s mobilization needs.`,[S('AP Ukrainian protection','https://apnews.com/article/fad295461cf85b82a4d4f40dd78f7bd3'),S('Irish Sun EU proposal','https://www.thesun.ie/news/17185325/ukrainian-men-military-refuge-ban-ireland-eu-proposal/')],L(`<span class="jargon">Temporary protection (EU emergency status granting displaced people residence, work and basic services without normal asylum processing)</span> was activated for Ukrainians after 2022.`,['Ukraine case: manpower is a strategic resource in a long war.','Rights case: protection should not depend too bluntly on sex and age.','EU case: the bloc is trying to avoid abrupt legal uncertainty for 4.4 million people.'],'Watch Council approval, human-rights challenges and national implementation in Germany and Poland.')),W('Russia provocation warnings put NATO unity back on front line',`NATO’s eastern flank has been living with sabotage, drones and cyber pressure, but warnings this week made the risk more explicit. <span class="change">Western intelligence sources told the Guardian that Russia may be preparing a provocation against the Baltic states or Poland, likely below the threshold of a full-scale attack.</span> The warning matters because gray-zone incidents test whether allies respond collectively when an attack is ambiguous, limited or deniable. The next NATO summit now has to address not only Ukraine aid but also whether small allies can trust rapid U.S. and European backing.`,[S('Guardian Russia provocation','https://www.theguardian.com/world/2026/jun/26/russia-provocation-baltic-states-poland'),S('AP Ukrainian protection','https://apnews.com/article/fad295461cf85b82a4d4f40dd78f7bd3')],L(`<span class="jargon">Gray-zone action (coercion below open war, such as sabotage, cyberattacks or deniable drone incidents)</span> is designed to split allies over how strongly to respond.`,['Deterrence case: public warnings can make provocation riskier for Moscow.','Escalation case: ambiguous incidents can trigger overreaction or confusion.','Alliance case: smaller NATO states are testing U.S. reliability.'],'Watch Baltic airspace alerts, sabotage investigations and Ankara summit language.'))],China:[W('China coast-guard pressure near Taiwan draws Western rebukes',`Taiwan pressure increasingly includes maritime bureaucracy, not only aircraft and warships. <span class="change">Western governments rebuked China after coast-guard vessels asserted authority over foreign commercial ships east of Taiwan and demanded port-entry details during a five-day operation.</span> Analysts described the move as a possible rehearsal for a slow naval quarantine, which would isolate Taiwan without an immediate invasion. That matters for global supply chains because Taiwan’s security is also semiconductor security, and a quarantine scenario would challenge insurers, shipping firms and allied navies before shots are fired.`,[S('WSJ Taiwan coast guard','https://www.wsj.com/world/asia/chinas-assertions-of-authority-over-foreign-ships-near-taiwan-draw-u-s-rebuke-d0546eb0'),S('AP Fujian Taiwan Strait','https://apnews.com/article/1967779925e8f5192f42498d4379438e')],L(`<span class="jargon">Naval quarantine (controlling or pressuring maritime traffic without declaring a full blockade)</span> can create coercive leverage while avoiding a clear war trigger.`,['Deterrence case: allied rebukes signal that commercial coercion will not be ignored.','Coercion case: repeated inspections can normalize Chinese jurisdiction claims.','Supply-chain case: even limited disruption near Taiwan affects electronics planning.'],'Watch AIS shipping behavior, Taiwan exercises and U.S. naval statements.')),W('China defends industrial model as EU trade worries deepen',`Europe’s concern over a second China shock has grown as Chinese high-tech exports, batteries, solar and electric vehicles pressure local industries. <span class="change">Premier Li Qiang told the World Economic Forum’s Dalian meeting that China’s competitiveness comes from innovation rather than subsidies, rejecting complaints about state-driven overcapacity.</span> The claim matters because the EU is debating new tools to diversify away from Chinese inputs while trying to avoid retaliation. For extemp, the fight is whether green-transition supply chains should prioritize cheap imports, domestic resilience or trade defense.`,[S('FT Li Qiang subsidies','https://www.ft.com/content/ecf29df6-6838-4046-80a6-8cb676cfad91'),S('FT EU China talks','https://www.ft.com/content/e73b3c80-948c-4ea0-ae9a-d6c153871e7b')],L(`<span class="jargon">Overcapacity (production capacity greater than domestic or global demand at normal prices)</span> can push exports into foreign markets at prices competitors struggle to match.`,['China case: scale and R&D explain export strength better than subsidy charges.','EU case: dependence on Chinese green tech creates strategic vulnerability.','Consumer case: tariffs can make energy transition more expensive.'],'Watch EU diversification tools, rare-earth talks and any Chinese retaliation threats.'))],'War / Active Conflicts':[W('Ukraine refugee policy now reflects the manpower problem behind diplomacy',`Ukraine’s battlefield and diplomatic problems are linked because any ceasefire offer depends on whether Kyiv can sustain forces and pressure Russia. <span class="change">The EU proposal to block new military-age male arrivals from automatic temporary protection follows Ukrainian requests for help preserving mobilization capacity.</span> This matters because refugee policy is now part of the war effort: Europe wants to keep supporting displaced civilians without weakening Ukraine’s ability to fight. The next debate is whether the policy protects existing refugees while creating rights risks for people fleeing legitimate danger.`,[S('AP Ukrainian protection','https://apnews.com/article/fad295461cf85b82a4d4f40dd78f7bd3'),S('Guardian Ukraine briefing','https://www.theguardian.com/world/2026/jun/23/ukraine-war-briefing-our-patience-is-not-endless-kyiv-signals-peace-offer-may-expire')],L('Manpower has become a strategic variable alongside missiles, sanctions and air defense.',['Kyiv case: preserving eligible recruits strengthens bargaining power.','Humanitarian case: blanket exclusions can create unsafe returns or irregular routes.','EU case: temporary protection is becoming a tool of war policy.'],'Watch Ukraine mobilization changes, EU legal reviews and battlefield casualty reporting.')),W('Ukraine warns ceasefire offer may expire as deep strikes pressure Russia',`Kyiv’s ceasefire posture has shifted because Ukrainian long-range strikes are now imposing costs inside Russia and occupied Crimea. <span class="change">Ukraine’s UN envoy warned that Kyiv could revise its ceasefire offer if the Security Council remains passive, citing strikes that damaged about 40% of Russia’s oil refineries.</span> The warning matters because Ukraine is trying to convert military pressure into diplomatic leverage without appearing to reject negotiations. Russia’s continued attacks on civilian areas and Ukraine’s strikes on energy infrastructure both make any ceasefire harder to verify.`,[S('Guardian Ukraine briefing','https://www.theguardian.com/world/2026/jun/23/ukraine-war-briefing-our-patience-is-not-endless-kyiv-signals-peace-offer-may-expire'),S('Guardian Russia provocation','https://www.theguardian.com/world/2026/jun/26/russia-provocation-baltic-states-poland')],L(`<span class="jargon">Deep strike (attack far behind the front line against logistics, energy or military infrastructure)</span> can change bargaining power without immediately shifting the trench line.`,['Pressure case: refinery attacks raise the cost of occupation.','Civilian-risk case: infrastructure wars often invite retaliation against cities.','Diplomacy case: a time-limited offer can force mediators to move faster.'],'Watch UN votes, Russian fuel shortages and any changes to Ukraine’s ceasefire terms.'))],'Flex / Global Systems':[W('Papua New Guinea food shortages show El Nino hitting small states first',`Pacific food security depends heavily on local gardens, rain timing and road access, which makes climate shocks quickly social rather than abstract. <span class="change">Guardian reporting said El Nino-related frost and drought have put up to 3 million people in Papua New Guinea at risk, including 1.9 million Highlanders facing severe food shortages.</span> The crisis matters because small states often experience the food-price and health effects of global warming before larger emitters change policy. It also shows how drought, school disruption, pests and water scarcity combine into one rural governance problem.`,[S('Guardian PNG food shortages','https://www.theguardian.com/world/2026/jun/25/el-nino-pacific-papua-new-guinea-png-food-shortages'),S('Guardian Southeast Asia shock','https://www.theguardian.com/environment/2026/jun/23/iran-war-oil-prices-hormuz-el-nino-south-east-asia-impact')],L(`<span class="jargon">El Nino (periodic Pacific warming that shifts rainfall and temperature patterns worldwide)</span> can bring drought to some Pacific and Asian regions while increasing storms elsewhere.`,['Adaptation case: early food and water support can prevent displacement.','Equity case: low-emission countries face high climate harm.','Regional case: Pacific shortages can raise demand for Australian and Asian aid.'],'Watch PNG assessments, school closures and emergency food import requests.')),W('AI and heat expose infrastructure as hidden constraint on growth',`Two separate stories this week point to the same problem: modern economies need more physical capacity than their digital narratives admit. <span class="change">European heat stressed grids, workplaces and transport, while AI debates in the UK and China emphasized chips, energy, data centers and worker retraining.</span> That matters because productivity gains from AI or climate adaptation cannot arrive if power systems, buildings and labor institutions fail first. The next phase of industrial policy is therefore less about slogans and more about whether governments can permit, finance and staff the infrastructure behind growth.`,[S('FT UK AI minister','https://www.ft.com/content/ab90575d-03fe-40ac-be57-59817e50ca0e'),S('Guardian heat productivity','https://www.theguardian.com/business/2026/jun/26/extreme-heat-europe-productivity-economic-growth'),S('FT robot nation','https://www.ft.com/content/c8731833-10ca-4a12-bfe4-8ebb2584ec68')],L('Digital systems still depend on electricity, cooling, skilled labor, chips, insurance and public trust.',['Growth case: infrastructure investment unlocks both AI and climate resilience.','Bottleneck case: grid and permitting delays can waste innovation.','Distribution case: workers bear disruption if retraining and heat protection lag.'],'Watch data-center grid approvals, workplace heat law and automation retraining budgets.'))]};const weekly={};Object.entries(wire).forEach(([k,v])=>weekly[k]=v.slice());weekly.Climate.push(W('Pacific and Southeast Asian food stress became a second climate headline',`Europe’s heat dominated daily coverage, but the broader weekly climate arc stretched into food systems. <span class="change">Papua New Guinea reported El Nino-linked food shortages affecting up to 3 million people, while analysts warned Middle East energy disruption could threaten rice output across Asia-Pacific.</span> The significance is that climate does not move through one channel: it hits health in Europe, labor productivity in cities and subsistence agriculture in the Pacific. The next watch point is whether governments respond with emergency aid or longer-term water, seed and storage systems.`,[S('Guardian PNG food shortages','https://www.theguardian.com/world/2026/jun/25/el-nino-pacific-papua-new-guinea-png-food-shortages'),S('Guardian Southeast Asia shock','https://www.theguardian.com/environment/2026/jun/23/iran-war-oil-prices-hormuz-el-nino-south-east-asia-impact')],L('Food stress is often the point where climate becomes politically urgent because households feel prices and scarcity directly.',['Adaptation: local storage and drought-resistant crops reduce exposure.','Inflation: rice and fertilizer shocks can spread beyond Asia.','Justice: Pacific states face high damage despite low emissions.'],'Watch rice export policies, PNG aid appeals and Pacific drought updates.')));weekly['Tech / AI'].push(W('Middle powers are defining AI strategy between the U.S. and China',`This week’s AI stories were not limited to Big Tech rivalry; they also showed countries trying to find niches in a two-superpower race. <span class="change">The UK AI minister told the FT that Britain must build leverage across applications, governance, chips and partnerships because it cannot simply match U.S. or Chinese scale.</span> The weekly importance is that AI sovereignty now includes energy grids, copyright rules, drug discovery, chip access and alliances. Smaller advanced economies will need selective bets rather than broad claims that they can lead everywhere.`,[S('FT UK AI minister','https://www.ft.com/content/ab90575d-03fe-40ac-be57-59817e50ca0e'),S('FT Anthropic Alibaba','https://www.ft.com/content/8496c940-fdc7-4554-bc8d-7bcc93e7d75c')],L('AI industrial policy is becoming a stack problem: chips, energy, models, applications, regulation and talent all interact.',['Sovereignty: middle powers need domestic strengths to avoid dependence.','Openness: too much control can isolate researchers and firms.','Alliance: trusted partners may share models and compute if rules align.'],'Watch UK copyright policy, AI chip partnerships and U.S. export-control changes.')));const analytical=[{tag:'Disaster governance',headline:'Venezuela earthquake is a rescue race and a state-capacity test',deck:'The deeper extemp file is about institutions, information and international access.',image:img.venezuela,imageAlt:'La Guaira coast in Venezuela',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:La_Guaira,_Venezuela.jpg',skeletonHTML:`<b>Baseline:</b> Venezuela entered the disaster with fragile infrastructure, contested transition politics and limited trust in official information. <b>Change:</b> twin magnitude 7.2 and 7.5 earthquakes hit the northern coast 39 seconds apart, with AP and Guardian updates putting the confirmed death toll at 589 and injuries near 3,000. <b>Mechanism:</b> collapsed buildings, airport disruption, aftershock risk and missing-person uncertainty mean rescue speed depends on heavy equipment, social-media access and international search teams. <b>Stakes:</b> the event can become either a rare coordination moment among Venezuela, the U.S. and the UN or a legitimacy crisis if citizens believe the state is slower than volunteers at finding survivors.`,stats:['AP and Guardian updates put the confirmed death toll at 589, with nearly 3,000 injured as of June 26.','AP identified the event as an earthquake doublet: magnitude 7.2 followed by 7.5 only 39 seconds later.','Guardian live coverage reported international rescue teams from at least 17 countries.'],sideA:['Coordination opportunity','Humanitarian urgency can create working channels among Venezuela, U.S. teams, UN agencies and regional responders.'],sideB:['Capacity failure','Citizens digging by hand and missing-person confusion point to a state unable to deliver emergency response fast enough.'],sideC:['Political reconstruction','Who controls aid, rebuilding money and information flows may shape Venezuela’s transition.'],sources:[S('AP survivor search','https://apnews.com/article/b07aff1cb886cfe616a0e89b3687b8b8'),S('Guardian Venezuela live','https://www.theguardian.com/world/live/2026/jun/26/venezuela-earthquakes-search-survivors-death-toll-rodriguez-rubio-latest-news-updates'),S('AP doublet explainer','https://apnews.com/article/f61cc9b92ba4e0735cfed6391c21e4fd')]},{tag:'Climate adaptation',headline:'Europe heatwave turns climate into labor and infrastructure policy',deck:'Attribution science is now immediate political evidence.',image:img.heat,imageAlt:'Heatwave image for Europe',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:Heat_wave_in_Europe.jpg',skeletonHTML:`<b>Baseline:</b> Europe has warmed faster than the global average while many homes, workplaces and rail systems were built for a cooler climate. <b>Change:</b> WWA scientists said the current heatwave is the region’s most severe and widespread on record and would have been impossible without human-caused warming. <b>Mechanism:</b> heat stress combines temperature and humidity, so hospitals, night-time recovery, outdoor labor and rail infrastructure all fail before thermometer records alone explain the danger. <b>Stakes:</b> adaptation is becoming a productivity and labor-rights issue: if countries do not retrofit buildings and define enforceable workplace heat standards, climate risk becomes a recurring drag on growth.`,stats:['Guardian reported the UK reached a new June high of 36.7C in Somerset.','The WWA analysis found almost half of Europe’s 850 largest cities were experiencing record or near-record heat stress.','Oxford Economics warned a four-day heatwave could cut quarterly labor-productivity growth by up to 2 points.'],sideA:['Adaptation pays','Cooling centers, building upgrades and workplace rules can reduce deaths and economic losses quickly.'],sideB:['Mitigation first','Adaptation alone cannot keep pace if fossil-fuel warming makes each decade’s extreme more dangerous.'],sideC:['Equity lens','Heat policy is inequality policy because outdoor workers, renters and people without green space bear the largest risk.'],sources:[S('Guardian attribution','https://www.theguardian.com/environment/2026/jun/26/europe-heatwave-impossible-without-climate-crisis-scientists'),S('AP heat study','https://apnews.com/article/8633dbe64319523484c8feabf2205234'),S('Guardian productivity','https://www.theguardian.com/business/2026/jun/26/extreme-heat-europe-productivity-economic-growth')]},{tag:'Public health security',headline:'Congo Ebola outbreak is a test of access before medicine',deck:'When the strain has no approved vaccine, the technology is tracing and trust.',image:img.ebola,imageAlt:'Ebola treatment unit',imageCredit:'National Army Museum',imageCreditUrl:'https://collection.nam.ac.uk/detail.php?acc=2017-07-5-154',skeletonHTML:`<b>Baseline:</b> Congo has deep Ebola experience, but Ituri’s conflict, displacement camps and mining mobility make standard response playbooks harder to execute. <b>Change:</b> Africa CDC now says nearly 300 Ebola-positive people are unaccounted for, and confirmed cases have climbed above 1,100. <b>Mechanism:</b> Bundibugyo Ebola lacks the vaccine and approved treatment available for some other Ebola responses, so each missing case undermines isolation, contact tracing and safe burial. <b>Stakes:</b> the outbreak is a health-security problem because failure in one inaccessible region can spill into Uganda, South Sudan or European health-worker exposure.`,stats:['Guardian reported 1,118 confirmed DRC cases and 291 deaths.','WHO projections cited by the Guardian warned the outbreak could reach 8,210 cases by mid-September without stronger response.','Only 13% of the $910 million pledged by donors had reportedly been delivered.'],sideA:['Local response','Recruiting local workers can improve trust and tracing faster than distant command structures.'],sideB:['Access failure','Conflict and displacement can keep confirmed cases beyond reach even if money and science improve.'],sideC:['Border model','Uganda’s lower toll shows rapid tracing can work, but raises hard questions about rights-heavy border controls.'],sources:[S('Guardian missing Ebola patients','https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc'),S('AP France Ebola','https://apnews.com/article/b6a854bf4ee2a0137c4fbd052f335bf9'),S('Le Monde Ebola monitoring','https://www.lemonde.fr/en/le-monde-africa/article/2026/06/26/monitoring-increases-after-france-reports-first-diagnosed-ebola-case_6754909_124.html')]},{tag:'Indo-Pacific coercion',headline:'China pressure is moving from invasion scenarios to quarantine rehearsal',deck:'The warning is coast-guard authority over ordinary commerce.',image:img.taiwan,imageAlt:'South China Sea claims map',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:South_China_Sea_claims_map.jpg',skeletonHTML:`<b>Baseline:</b> Taiwan conflict analysis often centers on invasion, but Beijing can also pressure the island through coast guard commands, commercial shipping uncertainty and repeated military presence. <b>Change:</b> China’s coast guard asserted authority over foreign ships east of Taiwan while the Fujian carrier transit and Philippine Scarborough concerns kept the wider maritime theater active. <b>Mechanism:</b> a quarantine-like campaign would not need to fire first; it could ask ships for details, create insurance risk and force allies to decide when coercion becomes a blockade. <b>Stakes:</b> Taiwan’s semiconductor role turns maritime gray-zone pressure into a global economic risk before a formal war begins.`,stats:['WSJ reported a five-day Chinese coast-guard operation east of Taiwan.','FT reporting said Scarborough Shoal lies about 200km west of Luzon and has been under effective Chinese control since 2012.','AP identified Fujian as China’s newest and most advanced aircraft carrier.'],sideA:['Deterrence works early','Public allied rebukes and visible tracking can prevent coercion from becoming normalized practice.'],sideB:['China can move slowly','Gray-zone steps can alter the status quo without triggering an Article 5-style clarity moment.'],sideC:['Markets are the tripwire','Insurers and shippers may react to quarantine signals faster than diplomats can define them.'],sources:[S('WSJ Taiwan coast guard','https://www.wsj.com/world/asia/chinas-assertions-of-authority-over-foreign-ships-near-taiwan-draw-u-s-rebuke-d0546eb0'),S('AP Fujian transit','https://apnews.com/article/1967779925e8f5192f42498d4379438e'),S('FT Scarborough Shoal','https://www.ft.com/content/d5191b00-dccb-465e-8afb-e61cc8260f93')]},{tag:'AI governance',headline:'Anthropic-Alibaba fight shows AI access is export control by other means',deck:'The next AI-security fight may be account abuse, not only chips.',image:img.ai,imageAlt:'Rows of servers in a data center',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:Wikimedia_Servers-0051_17.jpg',skeletonHTML:`<b>Baseline:</b> U.S. AI policy has focused heavily on restricting advanced chips and model access to prevent strategic competitors from catching up. <b>Change:</b> Anthropic says Alibaba used 25,000 fake accounts and 28.8 million Claude interactions to extract high-value capabilities. <b>Mechanism:</b> distillation lets a firm train or tune a cheaper model from frontier outputs, reducing the cost of capability transfer if access controls fail. <b>Stakes:</b> Washington must decide whether frontier-model outputs are strategic assets that require identity checks, penalties and international rules, while avoiding rules so broad that they block normal research and competition.`,stats:['FT reported Anthropic’s allegation of 25,000 fraudulent accounts and more than 28.8 million Claude exchanges.','Anthropic said the campaign targeted agentic reasoning, software engineering and long-horizon tasks.','The letter urged Congress to close loopholes allowing PRC labs to access advanced U.S. chips and punish distillation attacks.'],sideA:['Security perimeter','Frontier models need stronger know-your-customer controls because outputs can transfer strategic capability.'],sideB:['Incumbent shield','Distillation claims can also become a way for leading labs to protect market share and slow competition.'],sideC:['Governance layer','The practical rulebook will involve cloud accounts, billing, APIs and audit logs as much as export law.'],sources:[S('FT Anthropic Alibaba','https://www.ft.com/content/8496c940-fdc7-4554-bc8d-7bcc93e7d75c'),S('Tom’s Hardware detail','https://www.tomshardware.com/tech-industry/artificial-intelligence/anthropic-claims-that-chinas-alibaba-illicitly-distilled-its-models-from-april-to-june-2026-says-effort-involved-25-000-fake-accounts-and-28-8-million-exchanges-on-claude'),S('FT robot nation','https://www.ft.com/content/c8731833-10ca-4a12-bfe4-8ebb2584ec68')]}];const opinion=[{tag:'Guardian Analysis',title:'Trump finds partner in Supreme Court in his war against immigration',author:'Guardian analysis writer',pub:'The Guardian - June 26, 2026',thesis:'The piece argues that the Court’s immigration rulings are enabling the administration’s hardline project rather than merely interpreting technical statutes.',text:'The argument responds to a week of Supreme Court victories for the administration on asylum, TPS and green-card enforcement. It is useful because it frames the rulings as a power transfer from courts and migrants toward executive discretion, while tying the legal shift to the administration’s broader political project. For extemp, the piece helps distinguish verified legal outcomes from the author’s claim that the Court is becoming an active partner in immigration restriction. The strongest pushback is that statutory immigration law already gives presidents broad authority, and the Court may be applying that authority rather than endorsing every policy goal.',claim:'The Court is not neutral in effect; it is giving the administration tools to narrow immigration rights.',matters:'It turns immigration cases into an institutional-power argument, not only a policy disagreement.',pushback:'Broad statutory authority may explain the rulings without proving ideological partnership.',source:S('Read the analysis','https://www.theguardian.com/us-news/2026/jun/26/trump-supreme-court-immigration')},{tag:'Climate Argument',title:'Too hot for work: why extreme heat is a threat to Europe’s productivity',author:'Guardian business analysis',pub:'The Guardian - June 26, 2026',thesis:'The essay argues that extreme heat should be treated as an economic and labor-rights problem, not only a weather emergency.',text:'The piece responds to Europe’s record heatwave and the immediate disruption to workers, schools, trains and hospitals. It matters because it converts climate adaptation into a productivity debate: if workers cannot safely work, economic output and inequality both worsen. For extemp, the argument is useful because it links climate, labor law and macroeconomic growth in one chain. The strongest counterargument is that productivity estimates are uncertain and may overstate losses if firms adapt schedules, technology and buildings quickly.',claim:'Heat rules and infrastructure upgrades are economic policy, not optional welfare measures.',matters:'It gives speakers a concrete bridge between climate evidence and growth policy.',pushback:'Adaptation by firms and workers could reduce the measured productivity hit over time.',source:S('Read the analysis','https://www.theguardian.com/business/2026/jun/26/extreme-heat-europe-productivity-economic-growth')},{tag:'Financial Times AI',title:'How to win at AI if you are not the U.S. or China',author:'FT Economics Show with Kanishka Narayan',pub:'Financial Times - June 26, 2026',thesis:'The discussion argues that middle powers need focused AI leverage across applications, governance and strategic partnerships rather than trying to match superpower scale.',text:'The argument responds to a live AI race where U.S. frontier labs and Chinese industrial policy dominate the headlines. It is useful because it gives an affirmative strategy for countries without the deepest compute pools: specialize in applications, trusted governance, chips niches and alliances. For extemp, the piece adds nuance to AI-sovereignty debates by showing that national strategy can be selective rather than all-or-nothing. The strongest pushback is that without enough capital, energy and compute, middle-power strategies may become branding exercises rather than durable capability.',claim:'A non-superpower can still build AI influence by choosing narrow strengths and trusted partnerships.',matters:'It supplies a realistic industrial-policy frame for AI speeches beyond U.S.-China rivalry.',pushback:'Selective strategy may fail if compute, grid capacity and investment remain insufficient.',source:S('Listen/read the FT transcript','https://www.ft.com/content/ab90575d-03fe-40ac-be57-59817e50ca0e')},{tag:'Iran Debate',title:'Iranian dissidents warn peace talks could hand Tehran a victory',author:'New York Post world analysis',pub:'New York Post - June 25, 2026',thesis:'The piece argues that a U.S.-Iran deal may reduce fighting while strengthening a regime that dissidents believe should not be rewarded.',text:'The argument is live because the interim U.S.-Iran framework is moving from battlefield pause to a 60-day negotiation over sanctions, Hormuz and nuclear limits. It matters because it presents the human-rights critique of de-escalation: stopping war is not the same as empowering democratic forces or restraining repression. For extemp, the piece is useful as the skeptical side of ceasefire diplomacy, especially when paired with energy-market relief and inspection claims. The strongest pushback is that dissident inclusion may be morally desirable but difficult to operationalize during urgent negotiations to prevent wider war.',claim:'Diplomacy that ignores Iranian dissidents risks converting battlefield survival into regime legitimacy.',matters:'It adds a human-rights lens to otherwise strategic Iran-deal analysis.',pushback:'Immediate de-escalation may save lives even if the political settlement is morally incomplete.',source:S('Read the piece','https://nypost.com/2026/06/25/world-news/iranian-dissidents-warn-of-handing-regime-a-victory-it-could-never-win-on-the-battlefield-in-peace-talks/')},{tag:'Europe Security',title:'Russia may be preparing provocation in the Baltics or Poland',author:'Guardian security analysis',pub:'The Guardian - June 26, 2026',thesis:'The piece argues that Russia may test NATO through deniable actions rather than open attack.',text:'The argument responds to intelligence warnings that Moscow may use a limited provocation to probe NATO unity while Ukraine’s strikes increase pressure on Russia. It matters because the article shifts focus from classic invasion scenarios to ambiguous coercion that can divide allies before they decide how to respond. For extemp, the piece helps build a deterrence speech around credibility, alliance signaling and gray-zone escalation. The strongest pushback is that intelligence warnings can be intentionally publicized to deter actions that may never have been fully planned.',claim:'NATO’s hardest test may be a small, deniable Russian move rather than a conventional invasion.',matters:'It clarifies why alliance credibility depends on response thresholds, not only troop numbers.',pushback:'Public warning may reflect deterrence messaging more than confirmed operational intent.',source:S('Read the analysis','https://www.theguardian.com/world/2026/jun/26/russia-provocation-baltic-states-poland')}];const editions={wire:['The Wire','Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer.'],weekly:['The Weekly','The week in consequential developments, grouped like The Wire but selected for events still shaping the map today.'],analytical:['The Analytical','Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points.'],opinion:['The Opinion','Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged.']};const src=a=>'<div class="wire-sources">'+a.map(x=>'<a href="'+x.u+'" target="_blank" rel="noopener">'+x.n+' &#8599;</a>').join('')+'</div>';const learn=x=>'<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>'+x.context+'</p><h4>Three angles</h4><ul>'+x.angles.map(a=>'<li>'+a+'</li>').join('')+'</ul><h4>What to watch</h4><p>'+x.watch+'</p></div></details>';function renderGroups(data){return Object.entries(data).map(([topic,items])=>'<details class="topic"><summary><span>'+topic+'</span><span class="count">'+items.length+' '+(items.length===1?'story':'stories')+'</span></summary><div class="stack">'+items.map(x=>'<article class="wire-item"><h3 class="wire-headline">'+x.h+'</h3><p class="wire-prose">'+x.proseHTML+'</p>'+src(x.sources)+learn(x.learn)+'</article>').join('')+'</div></details>').join('')}function renderAnalytical(){return analytical.map(x=>'<details class="afile"><summary><div><div class="tag">'+x.tag+'</div><h3>'+x.headline+'</h3><p class="deck">'+x.deck+'</p></div></summary><div class="analysis-body"><img class="analysis-img" src="'+x.image+'" alt="'+x.imageAlt+'"><div class="credit"><a href="'+x.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+x.imageCredit+' &#8599;</a></div><p class="walk">'+x.skeletonHTML+'</p><div class="stats"><h4>Key Stats With Setup</h4><ul>'+x.stats.map(s=>'<li>'+s+'</li>').join('')+'</ul></div><h4 class="angles-title" style="margin-top:17px">Three Angles</h4><div class="angles">'+[['a',x.sideA],['b',x.sideB],['c',x.sideC]].map(([c,v])=>'<div class="angle '+c+'"><strong>'+v[0]+'</strong>'+v[1]+'</div>').join('')+'</div>'+src(x.sources)+'</div></details>').join('')}function renderOpinion(){return opinion.map(x=>'<article class="opinion-card"><div class="tag">'+x.tag+'</div><h3>'+x.title+'</h3><div class="by">'+x.author+' - '+x.pub+'</div><p class="thesis">'+x.thesis+'</p><p>'+x.text+'</p><div class="op-grid"><div class="op-box"><strong>The Claim</strong>'+x.claim+'</div><div class="op-box"><strong>Why It Matters</strong>'+x.matters+'</div><div class="op-box"><strong>Pushback</strong>'+x.pushback+'</div></div>'+src([x.source])+'</article>').join('')}const nav=document.getElementById('nav'),content=document.getElementById('content');Object.entries(editions).forEach(([k,v])=>{const b=document.createElement('button');b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById('edition').textContent=editions[k][0];document.getElementById('description').textContent=editions[k][1];document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.edition===k));content.innerHTML=k==='wire'?renderGroups(wire):k==='weekly'?renderGroups(weekly):k==='analytical'?renderAnalytical():renderOpinion()}document.getElementById('headline').innerHTML='<div><div class="label">Headline of the Day - '+headline.topic+'</div><h2>'+headline.h+'</h2><p>'+headline.deck+'</p></div><figure style="margin:0"><img class="headline-photo" src="'+headline.image+'" alt="'+headline.imageAlt+'"><figcaption class="credit"><a href="'+headline.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+headline.imageCredit+' &#8599;</a></figcaption></figure>';const saved=localStorage.getItem('dig-theme'),root=document.documentElement,toggle=document.getElementById('theme');function setTheme(t){root.dataset.theme=t;toggle.textContent='Theme: '+t[0].toUpperCase()+t.slice(1);localStorage.setItem('dig-theme',t)}setTheme(saved||'light');toggle.onclick=()=>setTheme(root.dataset.theme==='light'?'dark':'light');show('wire');</script></body></html>
