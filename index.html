const headline={topic:"Middle East Diplomacy",h:"A proposed U.S.-Iran agreement reaches its implementation test",deck:"Officials point to a Sunday signing, but nuclear sequencing, sanctions relief, shipping access and Israel's role remain contested.",image:"https://dims.apnews.com/dims4/default/9e54558/2147483647/strip/true/crop/3540x2360+0+0/resize/1200x800!/quality/90/?url=https%3A%2F%2Fassets.apnews.com%2Fdb%2Fda%2F62a9a57a8e4a39669fe20a109d46%2Fc6f19d1cc1784c13a9c7c66cd7814aca",imageAlt:"Tankers anchored near the Strait of Hormuz off Iran",imageCredit:"Vahid Salemi / AP",imageCreditUrl:"https://apnews.com/article/949710df39e3f1033cbb6beda3955814"};
const wire={
"US Economy":[
W("Oil falls on diplomacy, not yet on restored supply",`The Iran war and restrictions through the Strait of Hormuz had pushed Brent crude above $90 a barrel and raised gasoline, freight and inflation risks. <span class='change'>Brent settled near $82.38 Friday as Washington and Tehran described a preliminary agreement that could be signed Sunday.</span> The decline reflects a smaller political risk premium, not proof that Gulf exports or marine insurance have normalized. A durable price break requires a signed text, safe-passage rules and visible growth in tanker traffic; failure at any stage could quickly restore the premium.`,[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("Guardian","https://www.theguardian.com/world/2026/jun/13/preliminary-peace-deal-could-be-signed-within-days-says-us-iran-and-mediators")],`A <span class='jargon'>risk premium (the extra price paid because supply may be disrupted)</span> can move before physical supply changes.`,["Disinflation: restored shipping would lower transport and consumer costs.","Skeptical: disputed sequencing leaves markets exposed to renewed strikes.","Distribution: oil-importing developing economies gain the largest fiscal relief."],"Watch the signing, tanker transits, insurance quotes and sanctions guidance."),
W("Consumer mood improves but remains historically weak",`Household confidence had fallen for four months as fuel and food costs rose. <span class='change'>The University of Michigan's preliminary June sentiment index rose to 48.9 from 44.8 in May as gasoline prices eased.</span> The largest relief appeared among lower-income households, for whom fuel consumes a larger share of income. Retail sales and inflation expectations will show whether cheaper gasoline creates real spending room or only a temporary improvement in mood.`,[S("University of Michigan","https://data.sca.isr.umich.edu/"),S("Guardian","https://www.theguardian.com/business/2026/jun/12/consumer-sentiment-june-data-gas-prices")],`The <span class='jargon'>consumer sentiment index (a survey of household views on finances and the economy)</span> can lead spending changes, although confidence and purchases often diverge.`,["Relief: lower fuel costs free cash for other purchases.","Inflation: oil volatility could reverse the gain.","Labor: job security may matter more than prices by midsummer."],"Watch final June sentiment, retail sales and the Federal Reserve's June 17 guidance.")],
"US Politics":[
W("Section 702 expires while existing certifications continue",`Congress has repeatedly renewed <span class='jargon'>Section 702 (the Foreign Intelligence Surveillance Act authority for targeting foreigners abroad without individual warrants)</span>, while privacy advocates seek warrants for searches involving Americans' incidentally collected messages. <span class='change'>The House rejected a short extension 198-218, allowing the statute to expire as lawmakers left Washington until June 23.</span> Existing annual court certifications can sustain current collection into 2027, so there is no immediate intelligence blackout, but new directives and provider planning now rest on weaker statutory footing. The return vote will test whether the lapse produces a warrant compromise or another temporary patch.`,[S("ODNI","https://www.dni.gov/index.php/ic-legal-reference-book/fisa-section-702"),S("Guardian","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates")],`Collection targets foreigners overseas, but an American's messages can enter the database when that person contacts a target.`,["Security: uncertainty complicates new targeting and provider cooperation.","Privacy: the operational cushion creates room for a warrant rule.","Governance: deadline politics substitutes for durable oversight."],"Watch the June 23 return and amendments governing U.S.-person searches."),
W("Court order forces Trump's name off the Kennedy Center",`The Kennedy Center's statutory name was created by Congress, but its presidentially appointed board added Donald Trump's name through an internal vote. <span class='change'>A federal judge refused to pause an order requiring removal of the name, finding that the board lacked authority to rename the institution without Congress.</span> The dispute is narrow, yet it defines a practical boundary between administrative control and the power to alter a congressionally chartered institution's legal identity. An appeal or congressional naming bill would determine whether the result becomes a durable precedent.`,[S("AP","https://apnews.com/article/b222d1ae6a3d206b67ca5abb145dc711"),S("Guardian","https://www.theguardian.com/us-news/2026/jun/14/trump-news-at-a-glance-president-claims-iran-no-longer-want-a-nuclear-weapon-amid-peace-deal-hopes")],`A <span class='jargon'>federally chartered institution (an organization whose legal status is established by Congress)</span> cannot necessarily be renamed by its managers.`,["Statutory: boards must follow the name Congress enacted.","Executive: presidents normally exercise broad control through appointed boards.","Political: cultural institutions have become proxies for executive-power disputes."],"Watch the appeal, signage removal and congressional reaction.")],
"Healthcare":[
W("Congo's Ebola outbreak becomes a regional preparedness test",`Eastern Congo entered the outbreak with conflict, population movement and limited health infrastructure already weakening surveillance. <span class='change'>Authorities have recorded more than 500 confirmed cases and about 90 deaths, while the United States raised its response contribution above $220 million for Congo and neighboring states.</span> The Bundibugyo strain complicates vaccination because the widely used Ervebo vaccine targets the Zaire strain. Border screening, laboratory turnaround and safe care practices will determine whether the outbreak remains concentrated in Ituri or spreads through mining and trade routes.`,[S("AP outbreak","https://apnews.com/article/63c078e0e43edfcb8b33e440a5c26ef9"),S("AP community impact","https://apnews.com/article/a8d2d61b2fb14d6d88b98d34a1199222")],`<span class='jargon'>Bundibugyo virus (one of the Ebola viruses that can cause severe hemorrhagic fever)</span> requires strain-specific planning and rapid isolation.`,["Capacity: Congo has experienced responders and established protocols.","Regional risk: mining, displacement and insecurity weaken contact tracing.","Social trust: gathering limits work only when communities understand and accept them."],"Watch confirmed-case geography, cross-border cases and vaccine or therapeutic guidance.")],
"Climate":[
W("France braces for a second exceptional early heat episode",`France had already experienced its most severe and widespread May heat event on record, leaving soils drier before summer. <span class='change'>Forecasts now show temperatures above 35°C across the south from June 13, with 40-42°C possible around Toulouse, Bordeaux and Aix-en-Provence as heat spreads north next week.</span> Tropical nights will reduce physiological recovery while dry vegetation raises wildfire risk. The timing also exposes students taking national examinations and workers not yet acclimatized to summer heat, making overnight lows and local warning levels as important as daytime records.`,[S("Le Monde","https://www.lemonde.fr/en/environment/article/2026/06/13/france-prepares-for-another-very-intense-and-widespread-heat-event-possibly-over-40-c_6754428_114.html"),S("Météo-France","https://meteofrance.com/")],`A <span class='jargon'>tropical night (a night when temperature does not fall below 20°C)</span> limits the body's ability to recover from daytime heat.`,["Adaptation: alerts and cooling access can sharply reduce mortality.","Infrastructure: sustained heat stresses power, rail and water systems.","Climate signal: spring heat is extending the season of extreme-temperature risk."],"Watch orange alerts, nighttime minima, wildfire starts and exam-day protections.")],
"Tech / AI":[
W("Civilian location data is repurposed for military AI",`Consumer augmented-reality products collect detailed maps of streets, landmarks and movement patterns to make digital experiences work. <span class='change'>Reporting that Pokémon Go-derived spatial data has been used to train AI systems for military drones has turned an old privacy concern into a defense-governance issue.</span> Consent given for a game does not necessarily cover downstream military use, especially when data is aggregated across millions of users. The policy question is whether location-data licenses should specify prohibited uses and whether model developers must disclose the provenance of geospatial training sets.`,[S("Guardian","https://www.theguardian.com/us-news/2026/jun/12/first-thing-us-iran-peace-deal-trump"),S("NIST AI framework","https://www.nist.gov/itl/ai-risk-management-framework")],`<span class='jargon'>Data provenance (the documented origin, ownership and transformations of a dataset)</span> determines whether an AI system's inputs were lawfully and appropriately obtained.`,["Innovation: existing maps can improve navigation without new collection.","Consent: commercial permission should not silently become military authorization.","Security: public mapping data may benefit both civilian resilience and autonomous targeting."],"Watch company disclosures, procurement rules and privacy-regulator investigations.")],
"Latin America":[
W("U.S. strike in Venezuela expands the war-on-drugs model",`Washington traditionally supported Latin American police and militaries with intelligence, training and equipment rather than conducting its own routine strikes. <span class='change'>A U.S. airstrike in Venezuela's Bolívar state killed Tren de Aragua leader Héctor Rusthenford Guerrero in what Caracas called a joint operation.</span> The target's group is associated with extortion, trafficking and illegal mining, but analysts note it is a minor actor in the global cocaine trade. The operation therefore tests whether direct strikes can dismantle criminal finance or instead create succession fights, sovereignty disputes and civilian-risk precedents.`,[S("AP","https://apnews.com/article/222081f38ff0a9d205bf0a63868cfac3"),S("U.S. State Department","https://www.state.gov/")],`A <span class='jargon'>kingpin strategy (targeting senior criminal leaders to disrupt an organization)</span> can remove symbols without destroying the networks that generate revenue and recruit replacements.`,["Deterrence: direct action raises the personal cost for leaders.","Fragmentation: removing a boss can produce smaller, more violent groups.","Resource politics: operations in mining zones may mix security and investment goals."],"Watch evidence on civilian harm, successor leadership and future host-country permissions."),
W("Peru's close runoff turns governability into the main question",`Peru has cycled through presidents amid repeated conflict with Congress, corruption cases and public anger over crime. <span class='change'>The presidential runoff remained exceptionally close with roughly 96% of ballots counted during the week, setting up another legitimacy test for a country headed toward its ninth president in a decade.</span> A narrow winner will need a functioning coalition in a fragmented legislature rather than relying on an electoral mandate alone. Legal challenges, cabinet choices and security policy will determine whether the transfer calms instability or opens another executive-legislative confrontation.`,[S("AP","https://apnews.com/article/64563bb32dfc69c21302c9ce2d83e600"),S("ONPE","https://www.onpe.gob.pe/")],`<span class='jargon'>Governability (the ability to convert legal authority into stable policy and working coalitions)</span> can be weaker than electoral victory.`,["Mandate: even a narrow win establishes a constitutional path forward.","Legitimacy: disputed counting can mobilize losing voters.","Institutional: congressional alliances may matter more than campaign ideology."],"Watch certification, challenges, cabinet appointments and legislative bargaining.")],
"Africa / Middle East":[
W("Iran framework nears signature while the parties describe different bargains",`Months of war left the Strait of Hormuz constrained, sanctions intact and ceasefires across Iran and Lebanon fragile. <span class='change'>U.S., Iranian and Pakistani officials pointed to a possible Sunday signature, but Washington says nuclear dismantlement is embedded while Tehran says detailed nuclear negotiations follow an interim agreement.</span> Reported provisions connect maritime reopening, sanctions relief, frozen assets and Lebanon, giving multiple actors leverage over implementation. A signature can reduce immediate escalation, but only a published order of performance and a named verifier can prevent incompatible expectations from reopening the conflict.`,[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("Guardian","https://www.theguardian.com/world/2026/jun/13/preliminary-peace-deal-could-be-signed-within-days-says-us-iran-and-mediators")],`A <span class='jargon'>memorandum of understanding (a negotiated framework that precedes detailed or binding implementation rules)</span> can stabilize fighting without resolving every dispute.`,["Breakthrough: phased rewards allow compliance to be tested.","Spoiler: Israel, Hezbollah or a maritime incident could unravel the package.","Sequencing: the order of sanctions, uranium and shipping steps is the real agreement."],"Watch the Sunday ceremony, published text, verification authority and Israeli response."),
W("Ebola and armed violence strain the same eastern Congo institutions",`Eastern Congo's health system and security forces already operate around militia attacks, displacement and weak transport links. <span class='change'>The expanding Ebola outbreak is now concentrated near areas where the Allied Democratic Forces and other armed groups threaten communities and humanitarian access.</span> Rangers and local authorities are being asked to support screening and isolation while also protecting civilians and critical conservation areas. The overlap matters because insecurity interrupts contact tracing, while fear of treatment centers can drive sick people away from formal care.`,[S("Financial Times","https://www.ft.com/content/1560124d-d3fa-4184-873b-c609dae8f00e"),S("AP","https://apnews.com/article/a8d2d61b2fb14d6d88b98d34a1199222")],`The <span class='jargon'>Allied Democratic Forces (an Islamic State-linked armed group active in eastern Congo and Uganda)</span> complicates both public-health access and civilian protection.`,["Integrated response: trusted local security can help health teams reach communities.","Overstretch: asking the same institutions to fight disease and militants weakens both missions.","Regional: an uncontrolled outbreak can cross borders faster than security coordination."],"Watch access to Ituri communities, attacks on health routes and regional case reporting.")],
"Europe / EU":[
W("British defense resignation exposes the fiscal limit of rearmament",`European governments have promised larger defense budgets as the Ukraine war and uncertainty about U.S. commitments increase pressure for self-reliance. <span class='change'>British Defense Secretary John Healey resigned after arguing that the government's investment plan fell short and could make the country less safe.</span> The resignation weakens Prime Minister Keir Starmer politically, but the larger issue is whether governments can reconcile defense pledges with constrained budgets and competing public services. Procurement schedules and replacement appointments will show whether the dispute changes policy or only personnel.`,[S("Guardian briefing","https://www.theguardian.com/world/2026/jun/12/friday-briefing-inside-taylor-swifts-20-year-rise-to-pop-superstardom"),S("UK Government","https://www.gov.uk/government/organisations/ministry-of-defence")],`<span class='jargon'>Defense procurement (the long process of buying and sustaining military equipment)</span> turns political spending promises into capabilities only after contracts, production and training.`,["Credibility: resignation can force a more realistic funding plan.","Fiscal: higher defense spending competes with health, welfare and debt service.","European: shared purchasing can reduce duplication but requires political compromise."],"Watch the replacement, investment-plan revisions and NATO spending commitments.")],
"China":[
W("China sanctions the Philippine defense chief as shoal tensions rise",`China and the Philippines already confront one another around Scarborough Shoal despite a 2016 tribunal ruling that rejected Beijing's expansive legal claim. <span class='change'>Beijing barred Philippine Defense Secretary Gilberto Teodoro and his family from entry after Manila protested a Chinese floating structure and personnel at the disputed shoal.</span> The measures are personal rather than military, but they narrow diplomatic space while the physical status quo at sea continues to change. The next test is whether the structure remains temporary or becomes infrastructure that is harder to remove without escalation.`,[S("AP sanctions","https://apnews.com/article/7a8a6f515acdf7b1f6b3d688d9bcc6f8"),S("AP shoal","https://apnews.com/article/85fa9b923cdd17f150f424da7b23df77")],`The <span class='jargon'>2016 arbitral ruling (a decision under the U.N. Convention on the Law of the Sea)</span> rejected China's historic-rights claim, but Beijing refuses to recognize it.`,["Coercion: personal sanctions punish outspoken officials without firing a shot.","Alliance: U.S. treaty commitments may deter a larger move.","Facts at sea: temporary structures can gradually create a new operational baseline."],"Watch the structure, Philippine patrols and U.S. statements on treaty coverage.")],
"War / Active Conflicts":[
W("U.S. downs Iranian drones while negotiators approach a deal",`Diplomacy is advancing against a background of continuing military contact rather than a stable ceasefire. <span class='change'>U.S. Central Command said it shot down Iranian attack drones targeting commercial vessels in the Strait of Hormuz even as mediators prepared a possible agreement.</span> Each interception creates a risk that casualties or misidentification will outrun the negotiating calendar. Rules for commercial passage and a direct incident-management channel are therefore immediate security requirements, not technical details to postpone until later talks.`,[S("Guardian live","https://www.theguardian.com/world/live/2026/jun/12/middle-east-crisis-live-us-iran-israel-lebanon-trump-hormuz-oil-peace-deal-doubt-latest-news-updates"),S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814")],`<span class='jargon'>Deconfliction (communication designed to prevent accidental clashes between armed forces)</span> is essential while political agreements remain incomplete.`,["Pressure: military defense protects commerce and improves bargaining leverage.","Escalation: one lethal incident could make signature politically impossible.","Commercial: insurers may wait for operating rules even after governments announce peace."],"Watch drone activity, commercial warnings and any hotline or maritime protocol."),
W("Ukraine pairs logistics attacks with a European institutional strategy",`Ukraine faces slow battlefield movement and no near-term path to NATO membership while Russia relies on occupied Crimea as a logistics platform. <span class='change'>Kyiv intensified attacks on Crimean transport and fuel networks as European governments moved to open formal accession talks with Ukraine.</span> The two tracks operate on different timelines: interdiction seeks immediate military cost, while accession builds legal, investment and governance ties over years. Their effectiveness will depend on measurable disruption to Russian operations and sustained unanimity among EU governments.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],`<span class='jargon'>Interdiction (attacks designed to disrupt the movement of supplies before they reach the front)</span> can impose cost without requiring a frontal breakthrough.`,["Time favors Kyiv: logistics pressure and accession strengthen future leverage.","Russia absorbs cost: strategic depth and industrial capacity limit the effect.","Conditional Europe: accession leverage may improve institutions before membership."],"Watch Russian resupply patterns, EU negotiation clusters and air-defense support.")]
};
const weekly={
"US Economy":[
W("The jobs report kept the Fed focused on inflation",`The labor market entered June slower than its post-pandemic peak but still resilient. <span class='change'>Employers added about 172,000 jobs in May and unemployment held near 4.3%, reducing pressure for an immediate rate cut.</span> Strong hiring gives households income support, yet it also lets the Federal Reserve wait for clearer inflation relief. The June 17 projections will show whether officials treat energy volatility as temporary or as a reason to keep policy restrictive.`,[S("BLS","https://www.bls.gov/news.release/empsit.toc.htm"),S("Federal Reserve","https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm")],"A strong labor market can coexist with weak household sentiment when prices rise faster than perceived security.",["Soft landing","Higher-for-longer rates","Uneven wage gains"],"Watch the Fed projections, jobless claims and real wage growth."),
W("Hormuz risk moved from oil markets into household budgets",`The week's diplomacy lowered crude prices after conflict had pushed Brent above $90. <span class='change'>Markets repriced the chance of a U.S.-Iran agreement, but physical shipping and insurance remained constrained.</span> The distinction matters because gasoline can fall quickly while freight, fertilizer and financing costs remain elevated. A deal that restores safe passage would deliver broader disinflation than a headline-driven oil move alone.`,[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("World Bank","https://www.worldbank.org/en/publication/global-economic-prospects")],"Energy shocks pass through at different speeds across retail fuel, food and transportation.",["Rapid relief","Persistent scarring","Developing-country exposure"],"Watch tanker traffic and consumer inflation expectations.")],
"US Politics":[
W("Congress let a central surveillance authority lapse",`Section 702 had survived repeated temporary extensions because both parties saw foreign-intelligence value while disagreeing over American privacy. <span class='change'>The House rejected another short extension 198-218 and left town.</span> Existing certifications prevent an immediate shutdown, but the lapse puts legal and operational pressure on the June 23 return. The eventual bargain will shape warrant rules and provider obligations for years.`,[S("ODNI","https://www.dni.gov/index.php/ic-legal-reference-book/fisa-section-702"),S("Guardian","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates")],"The expiration is consequential even though current collection does not stop overnight.",["Security continuity","Privacy leverage","Deadline governance"],"Watch warrant language and the duration of any renewal."),
W("Florida's map fight sharpened the midterm redistricting battle",`Republicans hold 20 of Florida's 28 House seats and adopted a map that could improve their chances in four more districts. <span class='change'>The Florida Supreme Court declined to block the map before the midterms, while opponents continued their constitutional challenge.</span> Because the U.S. House margin is narrow, state-level line drawing can influence national control. The case may not conclude before voting, making timing as important as the final legal merits.`,[S("AP","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("Florida Supreme Court","https://supremecourt.flcourts.gov/")],"An injunction can determine which map governs an election even when the underlying case remains unresolved.",["State authority","Anti-gerrymandering limits","Timing decides outcomes"],"Watch candidate filings and any federal challenge.")],
"Healthcare":[
W("Congo's Ebola outbreak crossed from local emergency to regional concern",`The outbreak began in remote Ituri communities where insecurity and transport gaps already limit care. <span class='change'>Confirmed infections rose above 500 and deaths approached 100, prompting additional U.S. funding and preparedness work in neighboring countries.</span> The Bundibugyo strain and cross-border movement complicate the response. Faster testing and trusted community engagement now matter as much as formal border controls.`,[S("AP","https://apnews.com/article/a8d2d61b2fb14d6d88b98d34a1199222"),S("Africa CDC","https://africacdc.org/")],"Outbreak control depends on isolation, contact tracing and public cooperation.",["Experienced responders","Regional spread","Trust deficit"],"Watch case growth and cross-border transmission."),
W("Public-health rules reshaped daily life in Ituri",`Ebola control requires reducing high-contact gatherings, but restrictions carry economic and cultural costs. <span class='change'>Local authorities limited weddings and religious events, with one reported ceremony cutting attendance from 300 guests to 50.</span> Such changes indicate public recognition of risk, yet prolonged limits can weaken compliance if support is absent. Authorities must pair rules with transparent case information and practical assistance.`,[S("AP","https://apnews.com/article/a8d2d61b2fb14d6d88b98d34a1199222"),S("WHO Ebola","https://www.who.int/health-topics/ebola")],"Behavioral measures work best when they are understandable, feasible and time-limited.",["Community adaptation","Economic burden","Misinformation risk"],"Watch compliance, funeral protocols and support for affected families.")],
"Climate":[
W("Europe entered summer with unusually early extreme heat",`France had already recorded an exceptional May heat episode before the official start of summer. <span class='change'>A second event began building this weekend, with southern temperatures forecast above 35°C and possible peaks of 40-42°C.</span> Dry soils amplify heat and fire risk, while tropical nights increase health danger. The recurrence makes adaptation capacity, not record counting, the central policy question.`,[S("Le Monde","https://www.lemonde.fr/en/environment/article/2026/06/13/france-prepares-for-another-very-intense-and-widespread-heat-event-possibly-over-40-c_6754428_114.html"),S("Copernicus","https://climate.copernicus.eu/")],"Early-season heat can be especially dangerous because people and institutions are less acclimatized.",["Preparedness","Infrastructure stress","Climate attribution"],"Watch hospital visits, wildfire alerts and overnight temperatures."),
W("Pacific climate risk became a national-identity issue",`Kiribati's low-lying islands face long-term habitability risks from sea-level rise. <span class='change'>Its football association used a bid for international recognition and a 2030 World Cup pathway to preserve identity and attract infrastructure support.</span> Sport cannot substitute for adaptation finance or migration planning, but it can create institutions and visibility for a state threatened with physical displacement. The case illustrates how climate loss reaches sovereignty and culture before territory disappears.`,[S("Guardian","https://www.theguardian.com/sport/2026/jun/08/this-may-be-our-last-chance-rising-sea-levels-threaten-kiribatis-world-cup-dream"),S("UN climate","https://www.un.org/en/climatechange")],"Climate mobility raises questions about whether statehood and citizenship can persist after large-scale relocation.",["Visibility","Adaptation diversion","Diaspora nationhood"],"Watch federation recognition and Kiribati's relocation planning.")],
"Tech / AI":[
W("AI policy moved closer to defense procurement",`The United States has debated frontier-model safety while agencies accelerate military adoption. <span class='change'>The week's controversy over consumer mapping data used for drone AI showed that procurement can expand faster than consent and disclosure rules.</span> Government may simultaneously regulate, buy from and financially support AI companies, creating conflicts of role. Dataset provenance and audit rights are becoming practical national-security questions.`,[S("Guardian","https://www.theguardian.com/us-news/2026/jun/12/first-thing-us-iran-peace-deal-trump"),S("NIST","https://www.nist.gov/itl/ai-risk-management-framework")],"Procurement terms can impose transparency requirements that general regulation does not.",["Capability first","Civilian consent","Government leverage"],"Watch defense contracts and provenance requirements."),
W("SpaceX's planned float tested the scale of AI-era valuations",`Technology investment has concentrated in firms combining launch, satellite, data and defense capabilities. <span class='change'>Reports of a potential SpaceX offering valued around $1.78 trillion prompted warnings that strategic importance may be getting priced as guaranteed commercial return.</span> A large float could deepen capital for infrastructure while exposing public investors to policy and execution risk. Disclosure quality will determine whether the offering is evaluated as a business or as a geopolitical asset.`,[S("Guardian","https://www.theguardian.com/us-news/2026/jun/12/first-thing-us-iran-peace-deal-trump"),S("SEC","https://www.sec.gov/")],"A public offering transfers valuation risk from private investors to a broader market.",["Infrastructure premium","Overvaluation","Strategic subsidy"],"Watch filings, revenue disclosures and government-contract concentration.")],
"Latin America":[
W("Washington used direct force against a Venezuelan criminal leader",`U.S. counternarcotics cooperation usually relied on host-country forces. <span class='change'>The strike that killed Tren de Aragua leader Héctor Guerrero marked a more direct model and occurred in a mineral-rich illegal-mining zone.</span> Removing the leader may disrupt coordination, but it does not automatically dismantle extortion, trafficking or corrupt protection. Future operations will test legal consent and civilian safeguards.`,[S("AP","https://apnews.com/article/222081f38ff0a9d205bf0a63868cfac3"),S("International Crisis Group","https://www.crisisgroup.org/latin-america-caribbean")],"Criminal networks often survive leadership loss because their revenue systems are decentralized.",["Deterrence","Fragmentation","Resource access"],"Watch successor groups and host-country agreements."),
W("Peru's runoff underscored chronic institutional fragility",`The campaign unfolded after years of presidential turnover and conflict with Congress. <span class='change'>A tightening count with 96% of ballots processed left the result vulnerable to legal and political contestation.</span> The winner's main challenge will be building enough legislative support to govern while addressing crime. Certification and coalition choices matter more than a symbolic victory margin.`,[S("AP","https://apnews.com/article/64563bb32dfc69c21302c9ce2d83e600"),S("ONPE","https://www.onpe.gob.pe/")],"A close election can be valid and still produce a weak governing mandate.",["Constitutional transfer","Polarization","Congressional power"],"Watch certification and cabinet composition.")],
"Africa / Middle East":[
W("Iran diplomacy and military contact advanced at the same time",`The Gulf ceasefire remained incomplete and Hormuz traffic constrained. <span class='change'>Negotiators moved toward a framework while U.S. forces reported downing Iranian drones near commercial shipping.</span> The overlap demonstrates why deconfliction and verification must begin before a final settlement. One incident could still reverse the economic and diplomatic gains.`,[S("Guardian live","https://www.theguardian.com/world/live/2026/jun/12/middle-east-crisis-live-us-iran-israel-lebanon-trump-hormuz-oil-peace-deal-doubt-latest-news-updates"),S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814")],"Negotiations conducted under fire require operational rules as well as political language.",["Coercive diplomacy","Accidental escalation","Mediator leverage"],"Watch the signing and maritime incident rules."),
W("Ebola funding rose as conflict complicated access",`Congo's outbreak expanded through areas where armed groups and weak roads already restrict health services. <span class='change'>The United States added $20 million, bringing its response contribution above $220 million for Congo and neighboring preparedness.</span> Money helps testing and border screening only if teams can safely reach communities. Security and public health are therefore linked operationally, not merely simultaneous crises.`,[S("AP","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("WHO","https://www.who.int/health-topics/ebola")],"Preparedness funding buys time only when local delivery systems function.",["Regional containment","Access bottleneck","Donor burden sharing"],"Watch European contributions and field access.")],
"Europe / EU":[
W("Healey's resignation turned defense spending into a leadership crisis",`Britain had promised a larger role in European security while facing tight fiscal constraints. <span class='change'>Defense Secretary John Healey resigned over an investment plan he said could leave the country less safe.</span> The departure weakened Starmer and exposed the gap between defense targets and executable procurement. A replacement must decide whether to revise the plan or defend the same numbers.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/12/friday-briefing-inside-taylor-swifts-20-year-rise-to-pop-superstardom"),S("UK MOD","https://www.gov.uk/government/organisations/ministry-of-defence")],"Personnel changes matter when they reveal disagreement over strategy and funding.",["Accountability","Fiscal reality","European coordination"],"Watch the successor and investment-plan publication."),
W("Ukraine's European path gained structure",`Candidate status had given Ukraine political recognition but not a detailed legal route into the EU. <span class='change'>European governments moved toward formal accession negotiations, tying wartime support to long-term institutional reform.</span> The process can anchor investment and rule-of-law changes, but every major stage remains vulnerable to national vetoes. Progress will be measured in negotiation clusters rather than summit language.`,[S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en"),S("Guardian","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks")],"Accession requires adoption and enforcement of the EU legal order across many policy fields.",["Strategic anchor","Absorption limits","Conditional reform"],"Watch the fundamentals cluster and veto politics.")],
"China":[
W("Scarborough Shoal returned to the center of maritime competition",`China has controlled access around the shoal since a 2012 standoff, while the Philippines relies on an arbitral ruling Beijing rejects. <span class='change'>Manila protested a new floating structure and personnel, fearing an incremental move toward a permanent base.</span> Temporary equipment can alter patrol patterns before formal construction begins. The response will test whether legal protest, coast-guard presence and alliance signaling can prevent a new status quo.`,[S("AP","https://apnews.com/article/85fa9b923cdd17f150f424da7b23df77"),S("PCA","https://pca-cpa.org/en/cases/7/")],"Maritime coercion often advances through reversible-looking steps that become difficult to undo.",["Gray-zone gain","Alliance deterrence","Escalation control"],"Watch whether the structure remains and expands."),
W("Beijing personalized pressure on Manila",`Philippine officials have used unusually direct language to challenge China's maritime claims. <span class='change'>China imposed an entry and transaction ban on Defense Secretary Gilberto Teodoro and his family.</span> The sanction raises political cost without changing the legal dispute, and may harden public positions on both sides. Its real effect will depend on whether diplomatic and military channels remain usable.`,[S("AP","https://apnews.com/article/7a8a6f515acdf7b1f6b3d688d9bcc6f8"),S("China Foreign Ministry","https://www.fmprc.gov.cn/eng/")],"Personal sanctions are coercive signals aimed at officials rather than national economies.",["Behavioral pressure","Domestic backlash","Channel preservation"],"Watch Manila's response and future senior-level contacts.")],
"War / Active Conflicts":[
W("Ukraine attacked logistics while Europe advanced accession",`Russia's occupation strategy assumes time and defensive depth will outlast outside support. <span class='change'>Ukraine paired strikes on Crimean supply routes with progress toward formal EU talks.</span> The military and institutional tracks reinforce each other only if attacks affect combat operations and European reforms continue. Neither produces immediate territorial reversal, but together they challenge the premise that delay automatically favors Moscow.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],"War leverage includes logistics and political alignment, not only front-line movement.",["Cumulative pressure","Russian resilience","Conditional integration"],"Watch fuel flows, combat tempo and EU benchmarks."),
W("Middle East ceasefires remained linked but incomplete",`Fighting in Iran, Lebanon and around Gulf shipping has repeatedly crossed nominal pauses. <span class='change'>The proposed U.S.-Iran framework attempted to connect Hormuz access, nuclear talks and Lebanon, while Israel rejected withdrawal demands.</span> Linking fronts can create a comprehensive bargain, but it also gives more actors veto power. The first implementation failure may occur outside the room where the agreement is signed.`,[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("Guardian","https://www.theguardian.com/world/2026/jun/13/preliminary-peace-deal-could-be-signed-within-days-says-us-iran-and-mediators")],"A linked settlement trades breadth for complexity.",["Comprehensive peace","Spoiler multiplication","Mediator architecture"],"Watch Israel, Hezbollah and maritime enforcement.")]
};
const analytical=[
{tag:"Middle East Diplomacy",headline:"The Iran agreement is a sequencing problem disguised as a peace announcement",deck:"A signature can stop immediate escalation; only implementation can reconcile incompatible public descriptions.",image:headline.image,imageAlt:headline.imageAlt,imageCredit:headline.imageCredit,imageCreditUrl:headline.imageCreditUrl,skeletonHTML:`<b>Baseline:</b> months of war left Hormuz traffic restricted, sanctions intact, frozen assets unresolved and nuclear material outside a verified settlement. <b>Move:</b> mediators pointed to a Sunday agreement, but Washington says dismantlement is included while Tehran says detailed nuclear talks follow implementation. <b>Mechanism:</b> Iran wants phased sanctions relief and authority over shipping; the United States wants verifiable maritime access and nuclear limits; Israel and Hezbollah retain independent capacity to disrupt the Lebanon track. <b>Stakes:</b> order determines whether either side can sell the bargain domestically without appearing to surrender first. <b>Proof test:</b> a durable deal needs a timetable, named verifier, tanker protocol, asset-release conditions and a process for violations.`,stats:["Brent settled near $82.38 Friday after trading above $90 during the disruption, showing the political risk premium.","The proposed nuclear phase is expected to last roughly 60 days, making the interim period decisive.","Shipping restrictions affect a route that normally carries a major share of globally traded oil and gas."],sideA:["Phased peace","Performance-based rewards let both parties test compliance before a grand bargain."],sideB:["Paper truce","Different public definitions of the same text can produce a rapid implementation crisis."],sideC:["Mediator power","Pakistan, Oman, Qatar, the UAE and Switzerland may control the channels that make compliance possible."],sources:[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("Guardian","https://www.theguardian.com/world/2026/jun/13/preliminary-peace-deal-could-be-signed-within-days-says-us-iran-and-mediators")]},
{tag:"Western Hemisphere Security",headline:"Direct U.S. strikes are changing the legal and strategic logic of the drug war",deck:"The Venezuela operation offers speed and spectacle, but network disruption is harder to prove.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Orinoco_River_Delta.jpg",imageAlt:"Aerial view of river and forest in Venezuela",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Bol%C3%ADvar_(state)",skeletonHTML:`<b>Baseline:</b> Washington generally trained and equipped regional partners while host governments conducted arrests and raids. <b>Change:</b> a U.S. strike killed Tren de Aragua leader Héctor Guerrero in Venezuela's illegal-mining region with Caracas describing a joint operation. <b>Mechanism:</b> direct force shortens the operational chain but raises sovereignty, intelligence-quality and civilian-harm risks. <b>Stakes:</b> the precedent may spread to other governments willing to authorize U.S. action against designated criminal groups. <b>Proof test:</b> success requires measurable decline in trafficking, extortion and mining finance rather than only leadership removal.`,stats:["Tren de Aragua is linked more heavily to extortion, trafficking and illegal mining than to leadership of the global cocaine market.","The strike occurred in mineral-rich Bolívar state, where criminal groups have controlled illegal gold operations for years.","Analysts note that decades of kingpin removals have not produced a durable fall in regional drug production."],sideA:["Operational deterrence","Direct strikes raise the cost of sanctuary and remove leaders faster than extradition."],sideB:["Network resilience","Fragmented criminal markets replace leaders and may become more violent."],sideC:["Resource statecraft","Security operations may also clear territory for formal mining investment."],sources:[S("AP","https://apnews.com/article/222081f38ff0a9d205bf0a63868cfac3"),S("International Crisis Group","https://www.crisisgroup.org/latin-america-caribbean")]},
{tag:"Global Health / Congo",headline:"Ebola control now depends on security, trust and strain-specific tools",deck:"Money and technical capacity cannot compensate for inaccessible communities and uncertain vaccine fit.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Ebola_Treatment_Centre.jpg",imageAlt:"Health workers at an Ebola treatment facility",imageCredit:"European Commission / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Ebola_treatment_centers",skeletonHTML:`<b>Baseline:</b> Congo has deep Ebola experience, but Ituri combines armed violence, mining mobility and weak infrastructure. <b>Change:</b> confirmed cases exceeded 500 and deaths neared 100 as regional preparedness funding increased. <b>Mechanism:</b> rapid testing and isolation can break transmission, but Bundibugyo virus complicates use of the vaccine designed for Zaire ebolavirus; conflict can interrupt every step from contact tracing to burial. <b>Stakes:</b> spread into trade corridors would turn a provincial outbreak into a multi-country emergency. <b>Proof test:</b> falling case counts must be accompanied by shorter test delays, complete contact follow-up and no sustained cross-border chains.`,stats:["More than 500 confirmed cases and roughly 90 deaths were reported by early June.","One wedding reduced attendance from 300 planned guests to 50 under gathering restrictions, showing the scale of behavioral adaptation.","U.S. support rose above $220 million for response and neighboring-country preparedness."],sideA:["Experienced system","Congo and partners have trained responders and established outbreak protocols."],sideB:["Access crisis","Militias, displacement and mistrust can defeat technically sound plans."],sideC:["Regional institution test","Africa CDC coordination may be as important as any single donor contribution."],sources:[S("AP","https://apnews.com/article/a8d2d61b2fb14d6d88b98d34a1199222"),S("AP funding","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("WHO","https://www.who.int/health-topics/ebola")]},
{tag:"China / Maritime Asia",headline:"Scarborough Shoal shows how temporary structures can create permanent strategy",deck:"The contest is less about one platform than about who defines the next operational baseline.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Scarborough_Shoal.jpg",imageAlt:"Aerial view of Scarborough Shoal in the South China Sea",imageCredit:"U.S. Navy / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Scarborough_Shoal",skeletonHTML:`<b>Baseline:</b> China controls access around Scarborough Shoal while rejecting the 2016 ruling that invalidated its broad maritime claim. <b>Change:</b> the Philippines protested a Chinese floating structure and personnel, then Beijing sanctioned Defense Secretary Gilberto Teodoro. <b>Mechanism:</b> physical presence changes patrol behavior while personal sanctions raise the cost of political resistance. <b>Stakes:</b> a structure that begins as temporary research or support equipment can become a durable node without the dramatic threshold of island construction. <b>Proof test:</b> the key indicators are duration, resupply, defensive equipment and whether Philippine vessels retain regular access.`,stats:["Scarborough lies inside the Philippines' exclusive economic zone but has been controlled in practice by China since the 2012 standoff.","A 2016 tribunal rejected China's historic-rights claim under the law of the sea; Beijing does not recognize the ruling.","The U.S.-Philippines defense treaty adds deterrence but leaves gray-zone coercion below the clearest armed-attack threshold."],sideA:["Alliance deterrence","Regular Philippine and U.S. presence can prevent a larger construction move."],sideB:["Incremental advantage","China can normalize each small step before opponents organize a response."],sideC:["Legal persistence","Documentation and arbitration do not compel withdrawal, but preserve coalition legitimacy."],sources:[S("AP structure","https://apnews.com/article/85fa9b923cdd17f150f424da7b23df77"),S("AP sanctions","https://apnews.com/article/7a8a6f515acdf7b1f6b3d688d9bcc6f8"),S("PCA","https://pca-cpa.org/en/cases/7/")]}
];
const opinion=[
{tag:"Le Monde Editorial",title:"Trump's powerlessness in the Iranian trap",author:"Editorial Board",pub:"Le Monde · June 9, 2026",thesis:"Military escalation strengthened Iran's bargaining leverage and exposed the limits of personalized coercive diplomacy.",text:`The editorial argues that the campaign failed to produce regime collapse or a clean strategic victory and instead allowed Tehran to use Hormuz as leverage over the global economy. The proposed preliminary agreement makes the thesis live because Washington may accept a phased bargain after claiming force would compel decisive surrender. The argument matters as a warning that destructive capacity is not the same as political control. The strongest pushback is that military and economic pressure may have been necessary to bring Iran into a performance-based negotiation.`,claim:"Trump converted overwhelming military power into an expensive negotiation on terms Iran can still contest.",matters:"Separates battlefield damage from the political ability to impose a durable settlement.",pushback:"Coercion may have created the urgency and asset leverage that made the current framework possible.",source:S("Read editorial","https://www.lemonde.fr/en/opinion/article/2026/06/09/trump-s-powerlessness-in-the-iranian-trap_6754283_23.html")},
{tag:"Guardian Foreign Affairs",title:"Trump's failure to maintain ceasefires is part of the new world disorder",author:"Simon Tisdall",pub:"The Guardian · June 7, 2026",thesis:"Headline truces fail when leaders neglect verification, sequencing and institutions.",text:`Tisdall links recurring violence in Iran, Lebanon, Gaza and Ukraine to diplomacy centered on declarations rather than enforceable architecture. The argument is newly relevant because the proposed U.S.-Iran memorandum still leaves nuclear sequencing, Israeli withdrawal and shipping rules disputed. Its value is to explain why a ceasefire can reduce immediate fire without resolving the incentives that restart it. Pushback is that even excellent process cannot manufacture compromise when armed actors still believe force will improve their terms.`,claim:"Durable peace requires mechanisms and patient implementation, not leader-to-leader spectacle.",matters:"Provides a common explanation for several formally separate ceasefires that keep producing combat.",pushback:"Institutions are ineffective without coercive leverage and willing parties.",source:S("Read column","https://www.theguardian.com/commentisfree/2026/jun/07/donald-trump-ceasefire-failure-ukraine-iran-gaza-lebanon-gaza")},
{tag:"Guardian Editorial",title:"Ukraine and the prospects of peace: time to ramp up pressure on Putin",author:"Editorial Board",pub:"The Guardian · June 9, 2026",thesis:"Ukraine's improving strike capacity gives Europe reason to increase support rather than negotiate from assumed defeat.",text:`The editorial argues that Russia's stalled territorial progress and Ukraine's deep-strike campaign have changed the immediate balance enough to justify stronger sanctions and air-defense support. Progress toward EU accession adds an institutional version of the same strategy: make time less favorable to Moscow. The argument matters because it rejects the claim that aid merely delays an inevitable outcome. Its limitation is that logistics pain and European integration do not erase Russia's manpower, industrial depth or escalation options.`,claim:"Sustained European pressure can improve the terms of eventual negotiations.",matters:"Reframes Ukraine as a contest in which outside policy still changes leverage.",pushback:"Higher pressure may increase costs without producing mutually acceptable territorial terms.",source:S("Read editorial","https://www.theguardian.com/commentisfree/2026/jun/09/the-guardian-view-on-ukraine-and-the-prospects-of-peace-time-to-ramp-up-the-pressure-on-putin-")},
{tag:"Technology Column",title:"All signs point to Trump pushing AI growth",author:"Blake Montgomery",pub:"The Guardian · June 9, 2026",thesis:"The administration's safety language is secondary to military adoption, strategic competition and the financial upside of AI firms.",text:`Montgomery reads voluntary model review, Pentagon acceleration and possible federal financial involvement as parts of a growth-first policy. The argument is live because frontier labs can benefit commercially from safety pauses while military procurement draws on civilian data and infrastructure. It matters because government could become regulator, buyer and investor at once. Pushback is that procurement and ownership can create leverage for stronger disclosure and testing if those conditions are explicit.`,claim:"Expect U.S. policy to maximize capability and company value before constraining frontier development.",matters:"Connects national security, market incentives and safety governance in one framework.",pushback:"A government stake or contract could impose conditions unavailable to a distant regulator.",source:S("Read column","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic")}
];
const editions={wire:["The Wire","Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer."],weekly:["The Weekly","The week in consequential developments, grouped like The Wire but selected for events still shaping the map today."],analytical:["The Analytical","Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points."],opinion:["The Opinion","Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."]};
const src=a=>'<div class="sources">'+a.map(x=>'<a href="'+x.u+'" target="_blank" rel="noopener">'+x.n+' ↗</a>').join('')+'</div>';
const learn=x=>'<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>'+x.context+'</p><h4>Three angles</h4><ul>'+x.angles.map(a=>'<li>'+a+'</li>').join('')+'</ul><h4>What to watch</h4><p>'+x.watch+'</p></div></details>';
function renderGroups(data){return Object.entries(data).map(([topic,items])=>'<details class="topic"><summary><span>'+topic+'</span><span class="count">'+items.length+' '+(items.length===1?'story':'stories')+'</span></summary><div class="stack">'+items.map(x=>'<article class="wire-item"><h3 class="wire-headline">'+x.h+'</h3><p class="wire-prose">'+x.proseHTML+'</p>'+src(x.sources)+learn(x.learn)+'</article>').join('')+'</div></details>').join('')}
function renderAnalytical(){return analytical.map(x=>'<details class="afile"><summary><div><div class="tag">'+x.tag+'</div><h3>'+x.headline+'</h3><p class="deck">'+x.deck+'</p></div></summary><div class="analysis-body"><img class="analysis-img" src="'+x.image+'" alt="'+x.imageAlt+'"><div class="credit"><a href="'+x.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+x.imageCredit+' ↗</a></div><p class="walk">'+x.skeletonHTML+'</p><div class="stats"><h4>Key Stats With Setup</h4><ul>'+x.stats.map(s=>'<li>'+s+'</li>').join('')+'</ul></div><h4 class="angles-title" style="margin-top:17px">Three Angles</h4><div class="angles">'+[["a",x.sideA],["b",x.sideB],["c",x.sideC]].map(([c,v])=>'<div class="angle '+c+'"><strong>'+v[0]+'</strong>'+v[1]+'</div>').join('')+'</div>'+src(x.sources)+'</div></details>').join('')}
function renderOpinion(){return opinion.map(x=>'<article class="opinion-card"><div class="tag">'+x.tag+'</div><h3>'+x.title+'</h3><div class="by">'+x.author+' · '+x.pub+'</div><p class="thesis">'+x.thesis+'</p><p>'+x.text+'</p><div class="op-grid"><div class="op-box"><strong>The Claim</strong>'+x.claim+'</div><div class="op-box"><strong>Why It Matters</strong>'+x.matters+'</div><div class="op-box"><strong>Pushback</strong>'+x.pushback+'</div></div>'+src([x.source])+'</article>').join('')}
const nav=document.getElementById("nav"),content=document.getElementById("content");Object.entries(editions).forEach(([k,v])=>{const b=document.createElement("button");b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById("edition").textContent=editions[k][0];document.getElementById("description").textContent=editions[k][1];document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.edition===k));content.innerHTML=k==="wire"?renderGroups(wire):k==="weekly"?renderGroups(weekly):k==="analytical"?renderAnalytical():renderOpinion()}
document.getElementById("headline").innerHTML='<div><div class="label">Headline of the Day · '+headline.topic+'</div><h2>'+headline.h+'</h2><p>'+headline.deck+'</p></div><figure style="margin:0"><img class="headline-photo" src="'+headline.image+'" alt="'+headline.imageAlt+'"><figcaption class="credit"><a href="'+headline.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+headline.imageCredit+' ↗</a></figcaption></figure>';
const saved=localStorage.getItem("dig-theme"),root=document.documentElement,toggle=document.getElementById("theme");function setTheme(t){root.dataset.theme=t;toggle.textContent='Theme: '+t[0].toUpperCase()+t.slice(1);localStorage.setItem("dig-theme",t)}setTheme(saved||"light");toggle.onclick=()=>setTheme(root.dataset.theme==="light"?"dark":"light");show("wire");
</script></body></html>
