const headline={topic:"Middle East",h:"A U.S.-Iran exchange puts the April ceasefire and Gulf bases at risk",deck:"American strikes near the Strait of Hormuz and Iranian attacks on bases in Bahrain, Kuwait and Jordan have pushed diplomacy behind a new cycle of retaliation.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Beirut%20skyline.jpg",imageAlt:"The Beirut skyline, part of the regional conflict linking Lebanon and Iran",imageCredit:"Laura C. Ellis / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Beirut_skyline.jpg"};
const wire={
"US Economy":[
W("Inflation reaches 4.2% as the oil shock moves into household prices",`U.S. inflation had already accelerated from 2.4% in February to 3.8% in April as the Iran war disrupted energy flows. <span class='change'>The May <span class='jargon'>consumer price index (CPI, the Labor Department measure of prices paid by urban consumers)</span> rose 4.2% from a year earlier, the highest rate in three years, while core inflation reached 2.9%.</span> Energy produced about 60% of the monthly increase, gasoline averaged roughly $4.15 a gallon and airline fares were 26.7% higher than a year ago. The data makes a June 17 Federal Reserve rate cut highly unlikely and raises the risk that expensive fuel will spread into freight, food and services even if the original shock is geopolitical.`,[S("Guardian","https://www.theguardian.com/business/2026/jun/10/inflation-report-rate"),S("BLS","https://www.bls.gov/cpi/")],L("A central bank can weaken demand with higher rates, but it cannot reopen a shipping lane or replace lost oil supply.",["Hold-rates case: prevent temporary energy inflation from becoming persistent.","Growth case: tighter credit compounds a supply shock and raises recession risk.","Distribution case: fuel and food inflation hits lower-income households first."],"Watch the June 17 Fed decision, oil prices, freight costs and whether core services accelerate.")),
W("Markets reprice the Fed as Brent moves above $92",`Investors entered the week hoping resilient hiring would coexist with cooling inflation. <span class='change'>Brent crude moved above $92 a barrel and U.S. stock futures weakened after the Gulf exchange and the 4.2% CPI reading.</span> Technology shares are especially exposed because higher bond yields reduce the present value of distant profits, while airlines and transport firms face immediate fuel costs. The market test is whether the move remains an energy-sector adjustment or becomes a broader tightening in mortgages, corporate credit and consumer confidence.`,[S("Guardian business live","https://www.theguardian.com/business/live/2026/jun/10/asian-stocks-fall-us-iran-exchange-fire-middle-east-strait-of-hormuz-oil-prices-latest-news-updates"),S("Investopedia","https://www.investopedia.com/5-things-to-know-before-the-stock-market-opens-june-10-2026-11994617")],L("Oil affects inflation directly at the pump and indirectly through aviation, trucking, chemicals and agriculture.",["Containment: a short exchange lets prices reverse quickly.","Persistence: damaged infrastructure and shipping risk keep insurance and freight elevated.","Policy: fiscal relief may support households but also sustain demand."],"Watch Hormuz shipping, Treasury yields, airline guidance and credit spreads."))],
"US Politics":[
W("House approves a $70 billion immigration enforcement package",`The administration has made mass deportation and expanded detention central to its second-term domestic agenda, but implementation requires sustained appropriations rather than executive orders alone. <span class='change'>The House approved a $70 billion immigration enforcement bill as federal inspectors separately criticized conditions at a major <span class='jargon'>ICE (Immigration and Customs Enforcement, the agency responsible for detention and removals)</span> facility.</span> The vote gives the administration resources to expand detention and operations while sharpening the midterm argument over cost, due process and federal-state cooperation. Senate treatment and litigation over detention standards will determine how much of the House plan becomes operational capacity.`,[S("AP latest","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("ICE detention standards","https://www.ice.gov/detention-standards")],L("Appropriations determine staffing, beds, transport and contracts; legal authority alone does not create enforcement capacity.",["Enforcement case: predictable resources restore control and deterrence.","Rights case: rapid expansion magnifies due-process and medical-care failures.","Federalism case: results depend on local police, courts and sanctuary policies."],"Watch Senate changes, inspector-general findings and detention litigation.")),
W("A renewed Iran exchange reopens Congress's war-powers dispute",`Congress rejected earlier efforts to limit the Iran campaign, leaving the administration broad practical freedom even as lawmakers disputed its constitutional basis. <span class='change'>New U.S. strikes on Iranian radar and air-defense sites, followed by Iranian attacks on regional bases, have renewed pressure for a vote under the <span class='jargon'>War Powers Resolution (the 1973 law requiring notification and limiting unauthorized hostilities)</span>.</span> The immediate political question is whether Republican concern over escalation becomes large enough to alter the vote count rather than produce only statements. Repeated retaliation also increases the budgetary and electoral costs of a conflict the White House says it is simultaneously trying to end.`,[S("AP escalation","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("House war-powers vote","https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536")],L("The resolution creates procedures for Congress to debate hostilities, but presidents of both parties have disputed its constitutional reach.",["Executive case: rapid force protection cannot wait for Congress.","Legislative case: recurring offensive strikes are war, not emergency self-defense.","Electoral case: fuel prices may move votes faster than legal doctrine."],"Watch whether congressional leaders schedule a new vote and whether U.S. casualties occur."))],
"Healthcare":[
W("Ebola controls become a fight over science, rights and travel",`The Bundibugyo Ebola outbreak in Congo and Uganda has required intensive tracing, treatment and regional preparedness, but the virus is far less transmissible than respiratory pathogens in countries with strong infection control. <span class='change'>Health experts are challenging U.S. travel bans, use of <span class='jargon'>Title 42 (a public-health statute used to restrict entry)</span> and a proposed quarantine center in Kenya as disproportionate and potentially harmful to response work.</span> Restrictions can deter clinicians and contacts from reporting travel or symptoms, while concentrating quarantine abroad raises legal and capacity questions. The policy test is whether measures shorten detection time without diverting personnel and trust from the outbreak zone.`,[S("Le Monde","https://www.lemonde.fr/en/environment/article/2026/06/10/ebola-virus-us-strategy-deemed-excessive-and-unethical-by-health-experts_6754297_114.html"),S("WHO Ebola","https://www.who.int/health-topics/ebola")],L("Ebola spreads through direct contact with infected bodily fluids, making tracing and protective equipment more important than blanket population controls.",["Precaution: border measures buy time against a high-fatality disease.","Public-health case: stigma and travel bans weaken surveillance.","Equity case: outsourcing quarantine transfers legal and health risks to Kenya."],"Watch court challenges, traveler guidance and confirmed-case trends."))],
"Climate":[
W("Solar passes coal in U.S. electricity generation",`Coal was once the dominant U.S. power source, while solar remained a small supplement dependent on rapid construction and falling equipment costs. <span class='change'>Federal data cited by AP show solar power has now surpassed coal in national electricity production for the first time.</span> The milestone reflects utility-scale projects, rooftop installations and coal retirements, although natural gas remains central to reliability and total generation. It matters politically because market deployment is moving faster than the administration's pro-coal rhetoric, making transmission, storage and permitting the next constraints rather than panel cost alone.`,[S("AP latest","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("EIA electricity data","https://www.eia.gov/electricity/monthly/")],L("Annual generation and installed capacity differ because solar output varies by time and weather.",["Transition case: economics are displacing coal despite political resistance.","Reliability case: firm capacity and grids must grow with variable power.","Regional case: the national milestone conceals very different state systems."],"Watch EIA revisions, storage additions and federal permitting decisions.")),
W("Asia enters the El Niño preparation window",`The tropical Pacific is shifting away from La Niña while food, fertilizer and power systems are already stressed by the Middle East energy shock. <span class='change'>The World Meteorological Organization puts the chance of <span class='jargon'>El Niño (periodic equatorial Pacific warming that reorganizes global rainfall and temperature)</span> at 80% before September and 90% before November.</span> India faces monsoon and heat risk, while Southeast Asia could see drought, wildfire smoke and pressure on rice, palm oil and hydropower. Governments have a narrow window to adjust reservoirs, food reserves, cooling plans and early warnings before forecast risk becomes simultaneous crop and health losses.`,[S("Guardian Asia","https://www.theguardian.com/environment/2026/jun/05/el-nino-asia-unpredictable-extreme-weather-climate-change-crisis"),S("WMO","https://wmo.int/topics/el-nino-la-nina")],L("El Niño changes probabilities rather than guaranteeing one outcome in every country.",["Preparedness: seasonal forecasts can materially reduce deaths and losses.","Uncertainty: local rainfall still depends on monsoons and other ocean patterns.","Compound-risk: war-driven fertilizer and fuel costs reduce adaptation capacity."],"Watch WMO and NOAA updates, Indian monsoon rainfall and Asian reservoir levels."))],
"Tech / AI":[
W("Washington chooses AI acceleration over binding model review",`Frontier AI systems are improving at cybersecurity and autonomous tasks faster than governments have built enforceable testing regimes. <span class='change'>President Trump issued a voluntary pre-release review order and directed the Pentagon to accelerate AI adoption, while discussing possible federal equity stakes in leading AI companies.</span> <span class='jargon'>Frontier models (the most capable general-purpose AI systems at a given time)</span> would therefore face government scrutiny without a mandatory stop mechanism. The structure may speed military and commercial deployment, but it also ties public incentives to company valuations and leaves unclear who bears liability when a voluntarily reviewed model causes harm.`,[S("Guardian TechScape","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic"),S("NIST AI Risk Framework","https://www.nist.gov/itl/ai-risk-management-framework")],L("Voluntary review can reveal risk, but enforcement depends on procurement rules, disclosure duties or statutory authority.",["Competition: speed is necessary to maintain an advantage over China.","Safety: firms can ignore or delay nonbinding findings.","Governance: government ownership would blur regulator and investor roles."],"Watch implementing guidance, Pentagon contracts and any proposed federal investment structure.")),
W("AI firms turn safety pauses into a competition question",`Labs have long argued that rapidly improving models require shared thresholds for testing or temporary restraint. <span class='change'>Anthropic called for an option to pause capability development while preparing for a major public offering and claiming progress toward recursive self-improvement.</span> <span class='jargon'>Recursive self-improvement (an AI system helping design more capable successors)</span> remains a forecast rather than an established deployed capability, but the claim raises the stakes of who would verify a pause. A freeze could reduce systemic risk or entrench the current leader, so credible policy requires common tests, coverage of all major labs and independent enforcement.`,[S("Guardian TechScape","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic"),S("NIST evaluations","https://www.nist.gov/artificial-intelligence")],L("A unilateral pause is commercially unstable when rivals can continue training and investors reward capability gains.",["Safety: a pause creates time for defenses and governance.","Competition: incumbents may use safety language to lock in advantage.","International: domestic rules fail if foreign labs remain outside them."],"Watch model-release schedules, IPO filings and whether competitors accept common thresholds."))],
"Latin America":[
W("Peru's runoff remains within twenty thousand votes",`Peru entered the runoff after years of presidential turnover and conflict between executives and Congress, with neither finalist broadly popular. <span class='change'>With 96% counted, Roberto Sánchez held 50.055% to Keiko Fujimori's 49.945%, a gap below 20,000 votes among more than 17.8 million ballots.</span> Overseas ballots and challenged tally sheets could keep the result unresolved for weeks, making transparency and restraint by both campaigns central to legitimacy. The winner, due to take office July 28 as Peru's ninth president in a decade, will still face a divided legislature and a crime crisis driven partly by extortion and illegal mining.`,[S("AP","https://apnews.com/article/34fd4442c382c64381b50e971966c5cd"),S("ONPE","https://www.onpe.gob.pe/")],L("Peru's manual and decentralized count can be slow without implying fraud; narrow margins make challenged records decisive.",["Legitimacy: patient adjudication protects the winner.","Instability: a refusal to concede can reproduce the 2021 crisis.","Governability: Congress may constrain either ideological program."],"Watch ONPE updates, overseas ballots, legal challenges and concession statements."))],
"Africa / Middle East":[
W("Iran strikes U.S. bases after American attacks near Hormuz",`The April ceasefire reduced direct U.S.-Iran fire but left the Strait of Hormuz, sanctions and nuclear limits unresolved. <span class='change'>After a U.S. Apache helicopter went down near the strait, Washington struck roughly 20 Iranian radar and air-defense targets; Iran answered with missiles and drones aimed at bases in Bahrain, Kuwait and Jordan.</span> Most incoming weapons were reportedly intercepted and no U.S. casualties were immediately reported, but the exchange is the most serious breach of the ceasefire. It raises risks for Gulf host states, shipping insurance and negotiations because each side now claims self-defense while threatening further costs.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/10/middle-east-peace-talks-iran-strikes"),S("AP","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8")],L("The Gulf bases support U.S. air and naval operations; attacks on them can pull host governments into escalation they did not choose.",["Deterrence: a proportional exchange may restore limits.","Spiral: ambiguous incidents and force protection create automatic retaliation.","Diplomacy: Iran can suspend talks without abandoning them permanently."],"Watch damage assessments, Iranian participation in talks and additional U.S. deployments.")),
W("Israel's Lebanon strikes reconnect a second front",`A U.S.-backed Lebanon framework was intended to separate Israel-Hezbollah fighting from negotiations with Iran. <span class='change'>Israeli strikes in southern Lebanon killed at least 11 people after an earlier attack near Beirut, while Israel said it was acting against Hezbollah threats.</span> Iran has linked a broader settlement to the Lebanon front, so casualties there can affect nuclear, sanctions and Hormuz bargaining even without direct command coordination. The humanitarian consequence is renewed displacement in communities that had begun returning under an unstable ceasefire.`,[S("Guardian live","https://www.theguardian.com/world/live/2026/jun/09/middle-east-crisis-iran-israel-us-donald-trump-strait-of-hormuz-peace-deal-latest-news-updates"),S("AP Beirut strike","https://apnews.com/article/28d80744e192ae0d5cce73a5a08af906")],L("Lebanon's government, Hezbollah, Israel, Iran and the United States have different definitions of compliance and leverage.",["Security: Israel argues unresolved threats require action.","Diplomacy: strikes weaken Lebanese intermediaries and verification.","Regional: Iran can respond directly, through partners or through shipping pressure."],"Watch Hezbollah fire, Israeli ground activity and emergency mediation."))],
"Europe / EU":[
W("Europe prepares a wider sanctions package as Ukraine strikes deeper",`European support has combined weapons, finance and sanctions, while Russia has adapted through shadow shipping, third-country trade and domestic production. <span class='change'>EU officials are preparing measures aimed at banks, crypto firms, oil revenue and defense inputs as Ukrainian missiles and drones hit factories, refineries and fuel infrastructure deep inside Russia.</span> The package tries to raise the cost of war without relying on one easily evaded oil restriction. Its effect will depend on enforcement against intermediaries and whether Europe can sustain Ukrainian air defense while energy prices are again rising.`,[S("Guardian Ukraine briefing","https://www.theguardian.com/world/2026/jun/10/ukraine-war-briefing-moscow-car-bomb-kills-russian-ammunition-chief-reports"),S("AP strikes","https://apnews.com/article/4a158f6273807683d48692dedb4121b8")],L("Sanctions work through accumulated constraints on finance, technology and revenue rather than immediate battlefield collapse.",["Pressure: broader enforcement can reduce Russia's replacement capacity.","Adaptation: intermediaries and high oil prices replenish revenue.","Alliance: uneven national politics may matter more than package size."],"Watch the final EU list, oil enforcement and Bulgaria's proposed end to arms support.")),
W("EU enlargement shifts toward staged membership",`The Western Balkans have waited years for accession while public confidence in the process has weakened and Russia has exploited frustration. <span class='change'>European leaders are considering faster, staged integration that could give candidate states access to programs and meetings before full voting rights.</span> Montenegro remains the most advanced candidate and is targeting 2028, but rule-of-law and veto concerns still slow the process. Associate integration could make benefits tangible sooner, though it may also create a permanent second tier if full membership deadlines remain vague.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/05/eu-new-members-bloc-leaders-summit-enlargement"),S("EU enlargement","https://enlargement.ec.europa.eu/")],L("Accession requires adopting EU law across policy chapters and unanimous approval by existing members.",["Strategic: faster entry closes space for Russian influence.","Institutional: premature voting rights could worsen veto paralysis.","Credibility: partial benefits must lead to full membership, not replace it."],"Watch Montenegro's chapters, reform benchmarks and the next European Council conclusions."))],
"China":[
W("Taiwan fires HIMARS westward in its first China-facing live test",`Taiwan has bought mobile long-range weapons to make an amphibious invasion more costly, but deliveries and realistic training have lagged behind China's military pressure. <span class='change'>Taiwan fired 32 rockets from U.S.-supplied <span class='jargon'>HIMARS (High Mobility Artillery Rocket System, a truck-mounted precision launcher)</span> toward waters facing China during an invasion-defense drill.</span> Mobility lets launchers fire and relocate before counterattack, while longer-range ATACMS missiles could threaten ports and staging areas. The test strengthens deterrence but also highlights delayed U.S. arms packages and Beijing's claim that the exercise is provocative theater.`,[S("Wall Street Journal","https://www.wsj.com/world/china/taiwan-test-fires-u-s-supplied-missile-launcher-toward-china-c23b4f44"),S("Taiwan Ministry of National Defense","https://www.mnd.gov.tw/English/")],L("HIMARS is valuable only if crews can disperse, receive targeting data and survive missile attacks on communications.",["Deterrence: mobile precision fire raises invasion costs.","Escalation: longer range creates pressure to strike early in a crisis.","Delivery gap: announced sales do not equal deployable units."],"Watch Chinese exercises, U.S. delivery schedules and Taiwan's dispersal drills."))],
"War / Active Conflicts":[
W("Ukraine expands a campaign against Russian energy and ammunition",`The ground front remains largely static, so Kyiv has increasingly used long-range systems to disrupt the factories, fuel and logistics supporting Russian operations. <span class='change'>Ukraine reported strikes on a military factory in Cheboksary, a Samara refinery and oil infrastructure in the Vladimir region, while Russia said it intercepted 326 drones overnight.</span> Kyiv also appears to have used FP-5 Flamingo missiles, showing a growing domestic strike capacity rather than total dependence on allied munitions. The campaign can force Russia to disperse air defenses and repair assets, but retaliation against Ukrainian cities and energy systems remains the immediate civilian cost.`,[S("AP","https://apnews.com/article/4a158f6273807683d48692dedb4121b8"),S("Guardian briefing","https://www.theguardian.com/world/2026/jun/10/ukraine-war-briefing-moscow-car-bomb-kills-russian-ammunition-chief-reports")],L("Deep strikes seek operational effects over time: less fuel, slower production and more air-defense diversion.",["Attrition: repeated attacks can reduce Russian sortie and supply capacity.","Escalation: Moscow may widen attacks on Ukrainian infrastructure.","Industrial: domestic missiles give Kyiv more autonomy over target selection."],"Watch refinery throughput, Russian air-defense redeployment and allied interceptor deliveries."))]
};
const weekly={
"US Economy":[
W("May payrolls showed resilience before the inflation shock",`Economists expected a pronounced slowdown under high rates and wartime energy costs. <span class='change'>Employers added 172,000 jobs in May and unemployment held at 4.3%, well above the 85,000 consensus for payroll growth.</span> The result preserved household income but reduced the Federal Reserve's room to look through accelerating inflation. The week therefore changed the policy debate from whether to cut rates to whether strong demand and expensive energy can coexist without a second inflation wave.`,[S("BLS","https://www.bls.gov/news.release/archives/empsit_06052026.htm"),S("Guardian CPI","https://www.theguardian.com/business/2026/jun/10/inflation-report-rate")],L("Payrolls and unemployment come from separate surveys and can move differently.",["Soft landing remains possible.","Strong demand may sustain inflation.","Sector concentration may overstate breadth."],"Watch wage revisions and the June Fed meeting.")),
W("The Nasdaq's fall exposed the rates sensitivity of the AI trade",`AI shares began the week priced for rapid profit growth and eventual rate relief. <span class='change'>The Nasdaq fell 4.2% after the jobs report pushed Treasury yields higher, and inflation then reached 4.2%.</span> Higher discount rates reduce the value of distant earnings and make debt-funded data centers more expensive. The lasting weekly question is whether profitable platforms separate from capital-hungry suppliers or the whole AI complex continues to trade as one crowded macro bet.`,[S("Investopedia","https://www.investopedia.com/5-things-to-know-before-the-stock-market-opens-june-10-2026-11994617"),S("Guardian business live","https://www.theguardian.com/business/live/2026/jun/10/asian-stocks-fall-us-iran-exchange-fire-middle-east-strait-of-hormuz-oil-prices-latest-news-updates")],L("Long-duration assets are most sensitive to changes in bond yields.",["Correction creates healthier valuations.","Funding costs threaten expansion.","Strong employment still supports revenue."],"Watch semiconductor guidance and credit spreads."))],
"US Politics":[
W("Republican issue-by-issue dissent became a governing constraint",`The White House had usually contained Republican defections to isolated votes. <span class='change'>Different GOP groups challenged the administration over Iran, surveillance, spending and Ukraine sanctions during the week.</span> Narrow majorities mean those coalitions do not need to become a unified faction to force changes. The pattern matters for the midterms because members can support the president broadly while separating themselves from policies with visible local costs.`,[S("AP war powers","https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536"),S("AP latest","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8")],L("Small majorities turn temporary coalitions into leverage.",["Congress is recovering institutional power.","Members are managing electoral risk.","Dissent may disappear on final passage."],"Watch Senate sanctions and budget votes.")),
W("Immigration spending moved from campaign promise to legislative scale",`The administration's enforcement program depended on funding for detention, transport and personnel. <span class='change'>House passage of a $70 billion package supplied a concrete scale for the deportation agenda.</span> The legislation also made detention conditions and oversight part of the same policy fight. Its weekly significance is that the debate is no longer only about presidential authority; it is about durable capacity, contractors and congressional ownership.`,[S("AP latest","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("ICE","https://www.ice.gov/")],L("Budget authority converts policy into operational systems.",["Capacity improves enforcement.","Expansion magnifies rights risks.","Implementation varies by state."],"Watch Senate negotiations and inspector reports."))],
"Healthcare":[
W("WHO and Africa CDC put a $518 million price on Ebola containment",`Conflict and distrust had slowed tracing in Congo and Uganda. <span class='change'>WHO and Africa CDC launched a six-month, $518 million response and preparedness plan.</span> The figure covers treatment, laboratories, vaccination, border readiness and logistics, but money cannot guarantee access to insecure communities. The week clarified that containment is a state-capacity and trust problem as much as a biomedical one.`,[S("WHO","https://www.who.int/health-topics/ebola"),S("Le Monde","https://www.lemonde.fr/en/environment/article/2026/06/10/ebola-virus-us-strategy-deemed-excessive-and-unethical-by-health-experts_6754297_114.html")],L("Ring vaccination depends on finding contacts quickly.",["Scale can overtake transmission.","Insecurity blocks response.","Trust determines reporting."],"Watch confirmed cases and unexplained deaths.")),
W("Food safety was reframed as a global mortality burden",`Food contamination is often treated as a local inspection issue. <span class='change'>WHO's updated estimate attributed 866 million illnesses and 1.5 million deaths annually to unsafe food.</span> The burden spans pathogens, chemicals, water systems and international supply chains. The weekly relevance is the pressure it creates for laboratories and surveillance in countries where weak reporting has made the problem appear small.`,[S("WHO food safety","https://www.who.int/health-topics/food-safety"),S("WHO news","https://www.who.int/news-room/headlines")],L("Foodborne disease includes chronic complications and deaths.",["Prevention lowers hospital costs.","Poor households carry disproportionate risk.","Better surveillance may initially raise counts."],"Watch country estimates and laboratory funding."))],
"Climate":[
W("El Niño probability moved into the action range",`Forecasters had expected a transition away from La Niña but remained uncertain about timing. <span class='change'>WMO raised the odds of El Niño to 80% before September and 90% before November.</span> That made drought, flood, heat and food preparation a current budget issue rather than a distant scenario. The event's importance is correlation: multiple agricultural and energy systems can fail in the same season.`,[S("Guardian","https://www.theguardian.com/environment/2026/jun/02/prepare-for-imminent-return-of-el-nino-un-warns"),S("WMO","https://wmo.int/topics/el-nino-la-nina")],L("Seasonal forecasts alter risk, not certainty.",["Preparation can reduce losses.","Regional forecasts remain uncertain.","Climate warming raises the heat ceiling."],"Watch monsoons, reservoirs and crop forecasts.")),
W("The U.S. power mix crossed a symbolic threshold",`Solar additions had been growing faster than coal generation for years. <span class='change'>Solar surpassed coal in national electricity generation for the first time.</span> The milestone does not eliminate reliability or transmission constraints, but it shows investment decisions moving independently of federal rhetoric. The next stage of the transition depends on grids, storage and permitting rather than panel deployment alone.`,[S("AP","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("EIA","https://www.eia.gov/electricity/monthly/")],L("Generation differs from nameplate capacity.",["Market economics drive transition.","Reliability requires firm resources.","Regional gaps remain large."],"Watch storage and transmission approvals."))],
"Tech / AI":[
W("Nvidia pushed AI computing from data centers onto PCs",`Generative AI had mostly depended on remote servers. <span class='change'>Nvidia introduced an Arm-based RTX Spark platform for laptops and desktops with large local memory and Blackwell-class graphics.</span> On-device inference can improve privacy and latency, but raises hardware cost and power demand. The weekly test is whether developers produce durable local applications rather than demonstrations that still need the cloud.`,[S("Tom's Hardware","https://www.tomshardware.com/tech-industry/computex-2026-day-zero-wrap-up-nvidia-launches-rtx-spark-superchip-assault-on-laptop-and-desktop-markets-intel-readies-xeon-6"),S("Guardian TechScape","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic")],L("Local inference shifts computing cost to the user's device.",["Privacy improves.","Premium cost may limit demand.","Memory supply faces more pressure."],"Watch launch prices, battery life and software support.")),
W("AI governance split between acceleration and pause proposals",`Governments and labs agreed that capabilities were rising but not on who should slow down. <span class='change'>The White House chose voluntary review and military adoption while Anthropic proposed a possible pause.</span> The contrast exposed incentives: the government prioritizes strategic competition, while a leading lab can gain from rules that freeze relative positions. Credible governance will require common tests and independent enforcement rather than trust in either side's stated motives.`,[S("Guardian","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic"),S("NIST","https://www.nist.gov/artificial-intelligence")],L("Rules must apply across competitors to be stable.",["Acceleration protects national advantage.","Pauses create safety time.","Incumbents can capture regulation."],"Watch model releases and federal procurement rules."))],
"Latin America":[
W("Peru's runoff became a legitimacy stress test",`The runoff began with two polarizing candidates and a long history of executive collapse. <span class='change'>The count narrowed to roughly one-tenth of one percentage point, with Sánchez slightly ahead.</span> A slow official process is legally normal, but a tiny margin makes rhetoric and challenged ballots politically explosive. The winner will inherit a divided Congress and organized-crime pressure regardless of ideology.`,[S("AP","https://apnews.com/article/34fd4442c382c64381b50e971966c5cd"),S("ONPE","https://www.onpe.gob.pe/")],L("Narrow counts require adjudication, not instant projections.",["Patience supports legitimacy.","Fraud narratives can destabilize transition.","Congress may dominate the next presidency."],"Watch the official certification.")),
W("Colombia's presidential race entered its post-first-round phase",`President Gustavo Petro cannot seek another term, leaving voters to judge his project through successors and opponents. <span class='change'>The May 31 first round narrowed the field and intensified debate over security, coca policy and relations with Washington.</span> The campaign matters regionally because Colombia anchors Andean migration, counter-narcotics and peace policy. Alliances formed after the first round may be more important than the original party labels.`,[S("Colombia election overview","https://www.registraduria.gov.co/"),S("Reuters background","https://www.reuters.com/world/americas/")],L("Runoffs reward coalition-building beyond a candidate's first-round base.",["Continuity defends social reforms.","Security voters may drive a rightward shift.","Fragmentation gives centrists leverage."],"Watch endorsements and runoff security proposals."))],
"Africa / Middle East":[
W("The Iran ceasefire survived on paper but not in military practice",`April's truce reduced direct fire without settling sanctions, nuclear limits or Hormuz control. <span class='change'>Israel struck near Beirut, Iran fired at Israel, the United States hit Iranian targets and Iran attacked Gulf bases within four days.</span> The sequence connected fronts mediators had tried to separate. It remains the week's dominant global story because every retaliatory step affects oil, food, shipping and diplomatic credibility far beyond the battlefield.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/10/middle-east-peace-talks-iran-strikes"),S("AP","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8")],L("A ceasefire without a shared incident mechanism is vulnerable to disputed triggers.",["Limited retaliation can restore deterrence.","Repeated breaches normalize escalation.","Economic pain may force talks."],"Watch whether Iran returns to negotiations.")),
W("Guinea's ruling coalition consolidated the post-coup order",`Guinea's military transition began with a 2021 coup and restrictions on major opposition parties. <span class='change'>The ruling coalition converted presidential control into a strong legislative position during the week.</span> Formal elections can therefore close a transition calendar without restoring full political competition. The practical question is whether legislative consolidation produces predictable mining policy and services or entrenches executive power around the security apparatus.`,[S("Reuters Africa","https://www.reuters.com/world/africa/"),S("African Union","https://au.int/")],L("Electoral completion and democratic competition are separate tests.",["Stability may improve investment.","Exclusion weakens legitimacy.","Mining revenue remains the key governance test."],"Watch opposition access and bauxite policy."))],
"Europe / EU":[
W("The EU tried to make enlargement credible again",`No state has joined the bloc for 13 years, weakening leverage in the Western Balkans. <span class='change'>Leaders backed faster and potentially staged integration, with Montenegro aiming for 2028.</span> The proposal can deliver benefits before full membership but risks institutionalizing a second tier. Its weekly importance lies in treating enlargement as security policy after Russia's invasion of Ukraine.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/05/eu-new-members-bloc-leaders-summit-enlargement"),S("European Commission","https://enlargement.ec.europa.eu/")],L("Every member can influence accession through unanimity.",["Faster entry counters Russia.","Rule-of-law standards must remain credible.","Partial membership could become permanent."],"Watch Council language and Montenegro's reforms.")),
W("Ukraine's deep-strike campaign broadened",`Kyiv had used drones against refineries and military facilities for months. <span class='change'>This week it combined drones and domestically produced missiles against factories, fuel and logistics across several Russian regions.</span> The campaign forces Russia to distribute air defenses and repair capacity away from the front. It also increases retaliation risk and makes European interceptor supply a central limiting factor.`,[S("AP","https://apnews.com/article/4a158f6273807683d48692dedb4121b8"),S("Guardian","https://www.theguardian.com/world/2026/jun/10/ukraine-war-briefing-moscow-car-bomb-kills-russian-ammunition-chief-reports")],L("Operational effects accumulate through repeated disruption.",["Domestic weapons increase autonomy.","Russia can absorb and retaliate.","Sanctions can magnify physical damage."],"Watch refinery output and air-defense deliveries."))],
"China":[
W("U.S. chip controls shifted from destination to ownership",`Export rules had focused on whether advanced processors were shipped to China. <span class='change'>Washington moved to restrict sales to Chinese-owned firms operating abroad, requiring beneficial-ownership checks.</span> That closes an obvious diversion route but imposes difficult compliance on chipmakers, cloud providers and distributors. Allied adoption will determine whether the rule changes access or merely redirects transactions through opaque jurisdictions.`,[S("Reuters syndicated","https://www.nst.com.my/amp/business/corporate/2026/06/1452639/us-takes-step-halt-nvidia-ai-chip-shipments-chinese-firms"),S("BIS","https://www.bis.gov/")],L("Ownership screening identifies who ultimately controls a buyer.",["Controls reduce circumvention.","Compliance costs rise.","China accelerates substitution."],"Watch Commerce guidance and enforcement cases.")),
W("Taiwan made mobile rocket deterrence visible",`Taiwan's strategy depends on surviving an opening attack and striking invasion forces before they land. <span class='change'>The first westward HIMARS live-fire drill demonstrated 32 precision rockets and rapid relocation.</span> The exercise improves realism and signals resolve, but also underscores delayed deliveries of larger U.S. packages. Deterrence depends on communications and dispersal as much as launcher range.`,[S("WSJ","https://www.wsj.com/world/china/taiwan-test-fires-u-s-supplied-missile-launcher-toward-china-c23b4f44"),S("Taiwan MND","https://www.mnd.gov.tw/English/")],L("Mobile launchers must survive surveillance and missile attack.",["They raise invasion costs.","Long range can intensify crisis pressure.","Training cannot replace delivery volume."],"Watch PLA responses and arms deliveries."))],
"War / Active Conflicts":[
W("A reported Chornobyl strike revived nuclear-safety risk",`Ukraine's nuclear sites have operated under wartime stress and repeated loss-of-power threats. <span class='change'>Kyiv said a Russian drone hit spent-fuel storage near Chornobyl; monitors found no radiation increase and Moscow denied responsibility.</span> The absence of release shows engineered resilience, not the absence of danger. Repeated attacks normalize combat near facilities where one successful strike or prolonged power loss could create cross-border consequences.`,[S("IAEA Ukraine","https://www.iaea.org/newscenter/focus/ukraine"),S("Guardian Ukraine","https://www.theguardian.com/world/2026/jun/10/ukraine-war-briefing-moscow-car-bomb-kills-russian-ammunition-chief-reports")],L("Spent fuel remains radioactive and needs durable containment.",["Safety systems worked.","Near-misses accumulate risk.","Independent verification is essential."],"Watch IAEA access and engineering assessments.")),
W("Lebanon, Gaza and Iran remained one humanitarian system",`Diplomats described separate ceasefires, but civilians experienced linked displacement, aid shortages and price shocks. <span class='change'>The week brought deeper Israeli operations in Lebanon, continued deaths in Gaza and renewed direct U.S.-Iran fire.</span> The connection is practical: fuel, shipping and aid budgets move across the same regional system. Political attention to one negotiation can therefore reduce capacity and leverage on the others.`,[S("Guardian briefing","https://www.theguardian.com/world/2026/jun/05/friday-briefing-how-gaza-lebanon-and-iran-have-found-themselves-caught-in-an-escalation-without-end"),S("Guardian latest","https://www.theguardian.com/world/2026/jun/10/middle-east-peace-talks-iran-strikes")],L("Separate command structures do not prevent shared economic and humanitarian effects.",["Sequencing can make negotiations manageable.","Fragmentation lets spoilers move between fronts.","Civilian costs may eventually create bargaining pressure."],"Watch aid access, displacement and mediation bandwidth."))]
};
const analytical=[
{tag:"Middle East",headline:"The ceasefire is becoming an escalation-management system, not peace",deck:"The U.S. and Iran can still limit each exchange, but every cycle makes diplomacy harder and Gulf states less secure.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Beirut%20skyline.jpg",imageAlt:"Beirut skyline representing the linked Lebanon and Iran fronts",imageCredit:"Laura C. Ellis / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Beirut_skyline.jpg",skeletonHTML:`<b>Baseline:</b> April's ceasefire reduced direct U.S.-Iran fighting but did not settle nuclear limits, sanctions relief, frozen assets or control of the Strait of Hormuz. <b>Move:</b> an Apache incident triggered U.S. strikes on Iranian radar and air defenses; Iran then targeted bases in Bahrain, Kuwait and Jordan while Israel continued attacks in Lebanon. <b>Mechanism:</b> each actor defines proportionality differently, and Gulf host states bear risk from U.S. operations without controlling Washington's decisions. <b>Stakes:</b> a military exchange can raise oil, insurance, food and borrowing costs before producing battlefield casualties. <b>Proof test:</b> the ceasefire remains usable only if Iran returns to talks, both sides halt follow-on strikes and mediators create a channel to investigate incidents before retaliation.`,stats:["The exchange was the most serious direct breach since the April ceasefire.","Roughly one quarter of seaborne oil trade normally passes through the Strait of Hormuz.","U.S. inflation reached 4.2% in May, with energy producing about 60% of the monthly increase."],sideA:["Managed deterrence","Limited retaliation can reestablish boundaries while preserving negotiations."],sideB:["Escalation trap","Automatic force-protection strikes make an ambiguous incident sufficient to restart war."],sideC:["Gulf leverage","Bahrain, Kuwait and Jordan may press Washington for restraint because they absorb direct risk."],sources:[S("Guardian","https://www.theguardian.com/world/2026/jun/10/middle-east-peace-talks-iran-strikes"),S("AP","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("Guardian CPI","https://www.theguardian.com/business/2026/jun/10/inflation-report-rate")]},
{tag:"US Economy",headline:"The Fed faces an inflation shock it cannot directly repair",deck:"Demand remains resilient while the main price impulse comes from oil, shipping and war.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/United%20States%20Capitol%20-%20west%20front.jpg",imageAlt:"The west front of the United States Capitol",imageCredit:"Architect of the Capitol / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:United_States_Capitol_-_west_front.jpg",skeletonHTML:`<b>Baseline:</b> the Fed expected gradual disinflation and slower hiring to create room for rate cuts. <b>Change:</b> May payrolls rose 172,000 while CPI accelerated to 4.2%, driven heavily by energy. <b>Transmission:</b> fuel raises transport and production costs; strong employment lets firms pass more of those costs to consumers; higher yields tighten mortgages and technology finance. <b>Policy dilemma:</b> cutting risks de-anchoring expectations, but hiking suppresses demand without producing oil. <b>Proof test:</b> if core services and wages accelerate, the shock is broadening; if oil retreats and core measures stabilize, holding rates avoids unnecessary recession.`,stats:["May payrolls increased 172,000, more than twice the 85,000 consensus forecast.","Headline CPI reached 4.2% year over year, compared with 2.4% before the Iran war in February.","Core CPI was 2.9%, showing less acceleration than the energy-heavy headline measure."],sideA:["Hold and wait","Credibility requires preventing a temporary shock from entering wages and expectations."],sideB:["Do not over-tighten","Interest rates cannot reopen Hormuz and may compound the supply shock."],sideC:["Fiscal targeting","Temporary, narrow relief can protect vulnerable households without broad demand stimulus."],sources:[S("Guardian CPI","https://www.theguardian.com/business/2026/jun/10/inflation-report-rate"),S("BLS jobs","https://www.bls.gov/news.release/archives/empsit_06052026.htm"),S("BLS CPI","https://www.bls.gov/cpi/")]},
{tag:"Ukraine",headline:"Deep strikes are becoming Ukraine's substitute for movement at the front",deck:"Kyiv is using domestic missiles and mass drones to attack the industrial system behind Russia's war.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Chernobyl%20nuclear%20plant.jpg",imageAlt:"The Chornobyl nuclear power plant in Ukraine",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Chernobyl_nuclear_plant.jpg",skeletonHTML:`<b>Baseline:</b> neither side has achieved decisive movement along the roughly 1,000-kilometer front, while Russia has greater mass and industrial depth. <b>Change:</b> Ukraine struck factories, refineries, pipelines and military logistics across multiple Russian regions using drones and FP-5 Flamingo missiles. <b>Mechanism:</b> repeated attacks reduce throughput, force air-defense dispersal and impose repair costs rather than seeking one spectacular knockout. <b>Constraint:</b> Russia can retaliate against Ukrainian cities and energy assets, and high oil prices can offset lost refinery output with revenue. <b>Proof test:</b> sustained reductions in Russian fuel supply, production tempo or front-line operations would show strategic effect beyond headlines.`,stats:["Russia said it intercepted 326 Ukrainian drones in one overnight wave.","Targets included a military factory in Cheboksary and a refinery in Samara, hundreds of kilometers from the front.","Ukraine is seeking near-expiry allied interceptors because defense against retaliation remains scarce."],sideA:["Asymmetric leverage","Cheap drones can impose expensive defense and repair burdens on a larger opponent."],sideB:["Absorption capacity","Russia's scale and oil revenue allow it to repair damage while escalating attacks."],sideC:["Sanctions multiplier","Financial and technology restrictions matter most when physical strikes also destroy replacement capacity."],sources:[S("AP","https://apnews.com/article/4a158f6273807683d48692dedb4121b8"),S("Guardian","https://www.theguardian.com/world/2026/jun/10/ukraine-war-briefing-moscow-car-bomb-kills-russian-ammunition-chief-reports"),S("IAEA","https://www.iaea.org/newscenter/focus/ukraine")]},
{tag:"AI Governance",headline:"A voluntary safety regime cannot resolve the AI race's incentive problem",deck:"Government wants faster deployment while leading labs can benefit from rules that freeze their advantage.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Artificial%20intelligence%20and%20machine%20learning.svg",imageAlt:"Diagram representing artificial intelligence and machine learning",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Artificial_intelligence",skeletonHTML:`<b>Baseline:</b> frontier labs compete for capital, talent and benchmark leadership, while U.S. oversight relies mainly on voluntary testing and procurement leverage. <b>Change:</b> the White House paired nonbinding pre-release review with accelerated military adoption, as Anthropic proposed an option to pause capability growth. <b>Incentive conflict:</b> firms gain from appearing responsible but lose if rivals continue; government gains strategically and financially from growth if it becomes an investor. <b>Stakes:</b> cybersecurity and autonomous-agent risks can spread faster than liability law or public institutions adapt. <b>Proof test:</b> governance becomes credible only when tests are common, results are independently auditable and failure has a defined consequence across all major developers.`,stats:["The proposed U.S. review is voluntary rather than a mandatory licensing gate.","Anthropic has discussed a pause while preparing for a public offering and claiming progress toward recursive self-improvement.","The Pentagon has been directed to accelerate AI adoption, creating a powerful buyer-side incentive for deployment."],sideA:["Race logic","Rapid deployment is necessary because China and other competitors will not pause."],sideB:["Systemic safety","Shared capability thresholds can prevent a competitive rush into poorly understood risks."],sideC:["Regulatory capture","Incumbents may support rules that raise entry costs and preserve their lead."],sources:[S("Guardian TechScape","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic"),S("Guardian lobbying report","https://www.theguardian.com/technology/2026/may/23/trump-ai-order-big-tech"),S("NIST","https://www.nist.gov/itl/ai-risk-management-framework")]},
{tag:"Climate & Food",headline:"El Niño can synchronize shortages that governments usually manage separately",deck:"The danger is not one failed harvest but correlated stress across food, water, power and public health.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/El%20Nino%20regional%20impacts.png",imageAlt:"Map illustrating common regional impacts of El Niño",imageCredit:"NOAA / Wikimedia Commons",imageCreditUrl:"https://www.noaa.gov/education/resource-collections/weather-atmosphere/el-nino",skeletonHTML:`<b>Baseline:</b> Asian food and energy systems entered the season with high fuel and fertilizer costs and uneven reservoir levels. <b>Change:</b> WMO now sees an 80% chance of El Niño before September and 90% before November. <b>Transmission:</b> weaker monsoons, drought and heat can reduce rice, palm oil and hydropower while wildfire smoke raises health costs; governments can amplify scarcity through export controls. <b>Stakes:</b> poor households face food and electricity inflation simultaneously, and aid agencies buy less with fixed budgets. <b>Proof test:</b> rainfall anomalies, crop-condition reports, reservoir levels and trade restrictions will show whether a climate forecast becomes a global price event.`,stats:["WMO estimates an 80% probability before September and 90% before November.","India, Southeast Asia and parts of China face different but overlapping heat, rainfall and water risks.","The previous 2023-24 El Niño helped make 2024 the hottest year then recorded."],sideA:["Forecast advantage","Governments can pre-position food, water and health resources months before peak impacts."],sideB:["Compound shock","War costs and climate change reduce the capacity to absorb even a moderate event."],sideC:["Policy amplifier","Export restrictions and panic procurement may drive prices more than the global harvest total."],sources:[S("Guardian Asia","https://www.theguardian.com/environment/2026/jun/05/el-nino-asia-unpredictable-extreme-weather-climate-change-crisis"),S("Guardian UN warning","https://www.theguardian.com/environment/2026/jun/02/prepare-for-imminent-return-of-el-nino-un-warns"),S("WMO","https://wmo.int/topics/el-nino-la-nina")]}
];
const opinion=[
{tag:"Guardian Editorial",title:"Ukraine and the prospects of peace: time to ramp up pressure on Putin",author:"Editorial Board",pub:"The Guardian · June 9, 2026",thesis:"Ukraine's improving strike capacity gives Europe a reason to increase support rather than negotiate from assumed weakness.",text:`The editorial argues that Russia's stalled offensive and Ukraine's deep-strike campaign have changed the immediate balance enough to justify stronger sanctions and air-defense aid. The argument is live because diplomacy has produced no leader-level talks while Kyiv is demonstrating new domestic missile capacity. Its value is to challenge the claim that military support only prolongs an inevitable defeat. The strongest pushback is that tactical resilience does not erase Russia's manpower, production and escalation advantages, so pressure still needs a realistic negotiating objective.`,claim:"Sustained European aid can force Moscow to reconsider the price of refusing a ceasefire.",matters:"Reframes Ukraine from a managed decline to a contest in which policy still changes leverage.",pushback:"More pressure may raise costs without producing terms Russia or Ukraine can accept.",source:S("Read editorial","https://www.theguardian.com/commentisfree/2026/jun/09/the-guardian-view-on-ukraine-and-the-prospects-of-peace-time-to-ramp-up-the-pressure-on-putin-")},
{tag:"Guardian Foreign Affairs",title:"Trump's failure to maintain ceasefires is part of the new world disorder",author:"Simon Tisdall",pub:"The Guardian · June 7, 2026",thesis:"Announcements fail when leaders substitute personal dealmaking for enforceable diplomatic architecture.",text:`Tisdall links collapsing or violated ceasefires in Iran, Lebanon, Gaza and Ukraine to weaker institutions, fewer trusted intermediaries and an emphasis on leader-to-leader spectacle. The June 10 U.S.-Iran exchange makes the thesis more urgent because an ambiguous incident moved directly into retaliation without a credible joint mechanism. The argument matters beyond Trump: fragmented wars include states and armed groups that no single negotiator commands. The strongest objection is that process cannot replace leverage when combatants still believe force will improve their terms.`,claim:"Durable peace requires sequencing, verification and enforcement, not a headline truce.",matters:"Explains why ceasefires can coexist with repeated violence and worsening civilian risk.",pushback:"Institutional design fails too when parties prefer war or lack authority over fighters.",source:S("Read column","https://www.theguardian.com/commentisfree/2026/jun/07/donald-trump-ceasefire-failure-ukraine-iran-gaza-lebanon-gaza")},
{tag:"Technology Column",title:"All signs point to Trump pushing AI growth",author:"Blake Montgomery",pub:"The Guardian · June 9, 2026",thesis:"The administration's safety language is secondary to strategic competition, military adoption and the financial upside of AI firms.",text:`Montgomery argues that voluntary model review, Pentagon acceleration and discussion of federal equity stakes all point toward growth rather than restraint. The argument is live because Anthropic is simultaneously proposing a pause and preparing for a public offering, exposing how safety claims can align with commercial advantage. It matters because public investment could make government both regulator and shareholder. Pushback is that procurement and ownership can also create leverage for stronger safety conditions if those conditions are explicit and enforceable.`,claim:"Expect U.S. AI policy to maximize capability and company value, not slow development.",matters:"Connects regulation, national security and financial incentives in one policy framework.",pushback:"Government investment could impose safety and disclosure duties unavailable to a distant regulator.",source:S("Read column","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic")},
{tag:"Development Essay",title:"The Iran War Is Fueling a Global Debt Shock",author:"Moussa Faki Mahamat",pub:"Project Syndicate · June 4, 2026",thesis:"The war's food and energy shock becomes a sovereign-finance crisis in countries that did not cause it.",text:`Mahamat argues that higher import bills and interest rates force developing governments to spend more on debt service just as households need food and fuel support. The 4.2% U.S. inflation reading and renewed Gulf attacks strengthen the causal chain from Hormuz to central banks and borrowing costs. The perspective matters because it identifies crowded-out health, education and climate investment as war damage even far from the region. Its limitation is variation: exporters, reserve-rich states and governments with targeted subsidies will not experience the same transmission.`,claim:"Treat the Middle East conflict as a development-finance emergency, not only an oil shock.",matters:"Shows how distant war reduces public services through exchange rates and debt service.",pushback:"Broad debt relief can be poorly targeted because exposure and policy capacity differ sharply.",source:S("Read essay","https://www.project-syndicate.org/commentary/iran-war-price-shock-global-debt-shock-by-moussa-faki-mahamat-2026-06")}
];
const editions={wire:["The Wire","Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer."],weekly:["The Weekly","The week in consequential developments, grouped like The Wire but selected for events still shaping the map today."],analytical:["The Analytical","Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points."],opinion:["The Opinion","Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."]};
const src=a=>`<div class="sources">${a.map(x=>`<a href="${x.u}" target="_blank" rel="noopener">${x.n} ↗</a>`).join("")}</div>`;
const learn=x=>`<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>${x.context}</p><h4>Three angles</h4><ul>${x.angles.map(a=>`<li>${a}</li>`).join("")}</ul><h4>What to watch</h4><p>${x.watch}</p></div></details>`;
function renderGroups(data){return Object.entries(data).map(([topic,items])=>`<details class="topic"><summary><span>${topic}</span><span class="count">${items.length} ${items.length===1?"story":"stories"}</span></summary><div class="stack">${items.map(x=>`<article class="wire-item"><h3 class="wire-headline">${x.h}</h3><p class="wire-prose">${x.proseHTML}</p>${src(x.sources)}${learn(x.learn)}</article>`).join("")}</div></details>`).join("")}
function renderAnalytical(){return analytical.map(x=>`<details class="afile"><summary><div><div class="tag">${x.tag}</div><h3>${x.headline}</h3><p class="deck">${x.deck}</p></div></summary><div class="analysis-body"><img class="analysis-img" src="${x.image}" alt="${x.imageAlt}"><div class="credit"><a href="${x.imageCreditUrl}" target="_blank" rel="noopener">Image: ${x.imageCredit} ↗</a></div><p class="walk">${x.skeletonHTML}</p><div class="stats"><h4>Key Stats With Setup</h4><ul>${x.stats.map(s=>`<li>${s}</li>`).join("")}</ul></div><h4 class="angles-title" style="margin-top:17px">Three Angles</h4><div class="angles">${[["a",x.sideA],["b",x.sideB],["c",x.sideC]].map(([c,v])=>`<div class="angle ${c}"><strong>${v[0]}</strong>${v[1]}</div>`).join("")}</div>${src(x.sources)}</div></details>`).join("")}
function renderOpinion(){return opinion.map(x=>`<article class="opinion-card"><div class="tag">${x.tag}</div><h3>${x.title}</h3><div class="by">${x.author} · ${x.pub}</div><p class="thesis">${x.thesis}</p><p>${x.text}</p><div class="op-grid"><div class="op-box"><strong>The Claim</strong>${x.claim}</div><div class="op-box"><strong>Why It Matters</strong>${x.matters}</div><div class="op-box"><strong>Pushback</strong>${x.pushback}</div></div>${src([x.source])}</article>`).join("")}
const nav=document.getElementById("nav"),content=document.getElementById("content");Object.entries(editions).forEach(([k,v])=>{const b=document.createElement("button");b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById("edition").textContent=editions[k][0];document.getElementById("description").textContent=editions[k][1];document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.edition===k));content.innerHTML=k==="wire"?renderGroups(wire):k==="weekly"?renderGroups(weekly):k==="analytical"?renderAnalytical():renderOpinion()}
document.getElementById("headline").innerHTML=`<div><div class="label">Headline of the Day · ${headline.topic}</div><h2>${headline.h}</h2><p>${headline.deck}</p></div><figure style="margin:0"><img class="headline-photo" src="${headline.image}" alt="${headline.imageAlt}"><figcaption class="credit"><a href="${headline.imageCreditUrl}" target="_blank" rel="noopener">Image: ${headline.imageCredit} ↗</a></figcaption></figure>`;
const saved=localStorage.getItem("dig-theme"),root=document.documentElement,toggle=document.getElementById("theme");function setTheme(t){root.dataset.theme=t;toggle.textContent=`Theme: ${t[0].toUpperCase()+t.slice(1)}`;localStorage.setItem("dig-theme",t)}setTheme(saved||"light");toggle.onclick=()=>setTheme(root.dataset.theme==="light"?"dark":"light");show("wire");
</script></body></html>
