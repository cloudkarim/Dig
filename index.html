argin:0}.compiled{color:var(--faint);font-size:.76rem;margin-top:8px}.headline{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,430px);gap:28px;align-items:center;max-width:1050px;padding:28px 0;border-bottom:1px solid var(--rule)}.headline h2{font:normal 1.85rem/1.12 Georgia,Charter,serif;color:var(--title);margin:8px 0}.headline p{color:var(--muted);margin:0}.headline-photo,.analysis-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}.credit,.wire-sources{font-size:.75rem;color:var(--faint);margin-top:7px}.credit a,.wire-sources a{color:var(--link);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--link) 45%,transparent);margin-right:12px}.content{max-width:1050px;padding-top:12px}.topic,.afile{border-bottom:1px solid var(--rule)}summary{list-style:none;cursor:pointer}summary::-webkit-details-marker{display:none}.topic>summary{display:grid;grid-template-columns:1fr auto auto;gap:16px;align-items:center;padding:17px 0;color:var(--title);font-weight:650}.topic>summary:after,.afile>summary:after{content:'+';color:var(--faint);font-size:1.1rem}.topic[open]>summary:after,.afile[open]>summary:after{content:'-'}.count{color:var(--faint);font-size:.76rem;font-weight:400}.stack{max-width:800px}.wire-item{padding:22px 0;border-top:1px solid var(--rule)}.wire-headline{font:normal 1.32rem/1.22 Georgia,Charter,serif;color:var(--title);margin:0 0 9px}.wire-prose{margin:0;color:var(--ink)}.change{color:var(--title);font-weight:650}.jargon{border-bottom:1px dotted var(--faint)}.learn{margin-top:12px;background:var(--surface);border-left:2px solid var(--rule);padding:0 14px}.learn summary{padding:10px 0;color:var(--accent);font-size:.78rem;font-weight:650}.learn-body{padding:0 0 13px}.learn-body h4{margin:11px 0 3px;color:var(--title);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em}.learn-body p,.learn-body ul{margin:0}.learn-body ul{padding-left:18px}.afile>summary{display:grid;grid-template-columns:1fr auto;gap:20px;padding:22px 0}.afile h3{font:normal 1.38rem/1.2 Georgia,Charter,serif;color:var(--title);margin:5px 0}.deck{color:var(--muted);margin:0}.analysis-body{max-width:900px;padding:0 0 27px}.walk{margin:18px 0;color:var(--ink)}.stats{background:var(--surface);border-left:2px solid var(--accent);padding:15px 18px}.stats h4,.angles-title{margin:0 0 8px;color:var(--title);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em}.stats ul{margin:0;padding-left:18px}.angles{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:14px}.angle{padding:13px;border:1px solid var(--rule);background:var(--paper)}.angle.a{border-top:2px solid var(--a)}.angle.b{border-top:2px solid var(--b)}.angle.c{border-top:2px solid var(--c)}.angle strong{display:block;color:var(--title);margin-bottom:4px}.opinion-card{max-width:850px;border-bottom:1px solid var(--rule);padding:24px 0}.opinion-card h3{font:normal 1.5rem/1.2 Georgia,Charter,serif;color:var(--title);margin:5px 0}.by{color:var(--faint);font-size:.78rem}.thesis{color:var(--title);font-style:italic}.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.op-box{background:var(--surface);padding:12px;border-top:2px solid var(--rule)}.op-box strong{display:block;color:var(--title);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.footer{max-width:1050px;margin-top:34px;padding-top:16px;border-top:1px solid var(--rule);color:var(--faint);font-size:.74rem}@media(max-width:760px){.app{display:block}.rail{position:relative;width:100%;height:auto;padding:22px}.nav{grid-template-columns:repeat(2,1fr)}.theme{margin-top:15px}.main{padding:27px 21px}.headline{grid-template-columns:1fr}.angles,.op-grid{grid-template-columns:1fr}}</style></head><body><div class='app'><aside class='rail'><div class='brand-word'>Dig</div><div class='rail-date'>Tuesday, June 23, 2026</div><nav class='nav' id='nav'></nav><button class='theme' id='theme'>Theme: Light</button></aside><main class='main'><header class='top'><div class='kicker'>Morning Briefing</div><h1 id='edition'></h1><p class='desc' id='description'></p><div class='compiled'>Compiled June 23, 2026 - 1:04 p.m. ET - America/New_York</div></header><section class='headline' id='headline'></section><section class='content' id='content'></section><footer class='footer'>Dig - Compiled June 23, 2026 - America/New_York</footer></main></div><script>const S=(n,u)=>({n,u}),L=(context,angles,watch)=>({context,angles,watch}),W=(h,proseHTML,sources,learn)=>({h,proseHTML,sources,learn});const headline={topic:`Middle East diplomacy`,h:`Iran inspection claims collide with Lebanon ceasefire enforcement`,deck:`Washington is trying to turn the Iran memorandum into a regional bargain while Tehran, Beirut and Israel dispute what was actually agreed.`,image:`https://dims.apnews.com/dims4/default/9e54558/2147483647/strip/true/crop/3540x2360+0+0/resize/1200x800!/quality/90/?url=https%3A%2F%2Fassets.apnews.com%2Fdb%2Fda%2F62a9a57a8e4a39669fe20a109d46%2Fc6f19d1cc1784c13a9c7c66cd7814aca`,imageAlt:`Oil tankers near the Strait of Hormuz`,imageCredit:`Vahid Salemi / AP`,imageCreditUrl:`https://apnews.com/article/e71ed869e09b20d26442418390feb9f3`};const wire={'US Economy':[W(`AI-led market selloff shifts attention from oil to valuation risk`,`Markets entered the week focused on whether the U.S.-Iran memorandum would lower fuel prices, but the larger shock on Tuesday came from technology valuations. <span class='change'>Global shares fell after the Nasdaq dropped more than 2% and AI-linked companies lost more than $1 trillion in market value, with investors questioning debt-funded data-center and model-building spending.</span> The economic importance is not just a stock-market story: AI leaders now occupy such a large share of U.S. indexes that a repricing can tighten financial conditions, hit retirement accounts and change corporate borrowing plans. Higher expected Federal Reserve rates amplify the effect because richly valued growth firms are most sensitive to the discount rate investors use for future profits.`,[S(`Guardian markets live`,`https://www.theguardian.com/business/live/2026/jun/23/crude-oil-falls-us-waiver-iran-sanctions-peace-talks-progress-live-updates`),S(`Guardian AI selloff`,`https://www.theguardian.com/business/2026/jun/23/ai-stocks-sell-off-us-markets`)],L(`<span class='jargon'>Discount rate (the interest-rate-based hurdle investors use to value future earnings)</span> matters more for companies whose profits are expected far in the future.`,[`Bubble case: debt-financed AI buildout is running ahead of proven revenue.`,`Productivity case: the selloff may reset prices without invalidating the technology.`,`Macro case: higher rates make speculative capital spending harder to finance.`],`Watch semiconductor ETFs, SpaceX debt terms, Fed pricing and whether large cloud companies cut AI capital-expenditure guidance.`)),W(`Oil relief is real, but Hormuz toll politics keeps inflation risk alive`,`Oil prices eased after Washington granted sanctions waivers tied to the Iran memorandum, but the energy system has not returned to a normal prewar baseline. <span class='change'>Iran and Oman formed a joint working group on Strait of Hormuz maritime services while Tehran signaled it may charge for passage after the agreement's 60-day window.</span> Because the strait handles a major share of seaborne oil and liquefied natural gas, even lower spot prices can coexist with higher insurance, shipping and fertilizer costs. The policy consequence is that central banks and emerging-market importers must plan for a partial reopening rather than a clean removal of the shock.`,[S(`Guardian Middle East live`,`https://www.theguardian.com/world/live/2026/jun/23/iran-us-israel-lebanon-un-peace-deal-nuclear-iaea-frozen-assets-strait-of-hormuz-latest-news-updates`),S(`Guardian business live`,`https://www.theguardian.com/business/live/2026/jun/23/crude-oil-falls-us-waiver-iran-sanctions-peace-talks-progress-live-updates`)],L(`<span class='jargon'>Liquefied natural gas (natural gas chilled into liquid form for tanker shipment)</span> is central to Asian power and fertilizer supply chains.`,[`Relief: waivers and diplomacy lower the probability of a sudden supply stop.`,`Fragility: maritime tolls and escort rules can keep a risk premium embedded.`,`Inflation: fertilizer and diesel channels can hit food prices before headline oil spikes again.`],`Watch tanker counts, insurance rates, Brent crude spreads and whether Oman publishes a transit mechanism.`))],'US Politics':[W(`Supreme Court expands immigration enforcement leeway for green-card holders`,`Lawful permanent residents have stronger U.S. ties than temporary visitors, but immigration law still treats reentry and criminal allegations as high-stakes administrative categories. <span class='change'>The Supreme Court ruled 6-3 for the Trump administration in a case involving a green-card holder accused of counterfeiting, saying officers did not have to prove the crime by clear and convincing evidence before acting.</span> The ruling matters because it lowers a procedural barrier in cases where removal consequences can be life-changing even before a new conviction is established. It also fits a broader Court term in which immigration enforcement, executive power and due-process limits are becoming central 2026 campaign issues.`,[S(`AP Supreme Court immigration`,`https://apnews.com/article/b9ea1079296c0d7be844213986f96e6f`),S(`Guardian politics live`,`https://www.theguardian.com/us-news/live/2026/jun/23/primary-elections-ny-maryland-utah-supreme-court-ruling-politics-latest-updates`)],L(`<span class='jargon'>Clear and convincing evidence (a civil-law proof standard stronger than preponderance but weaker than beyond a reasonable doubt)</span> can decide how much proof the government needs before imposing serious consequences.`,[`Executive case: immigration officers need flexible tools at the border.`,`Due-process case: long-term residents can be pushed into legal limbo without enough proof.`,`Politics case: the ruling gives both parties a concrete example for immigration messaging.`],`Watch related birthright-citizenship, asylum and fast-track deportation rulings.`)),W(`Judge blocks bulk citizenship checks using the SAVE database`,`The administration has tried to make voter eligibility a federal data problem by expanding use of <span class='jargon'>SAVE (Systematic Alien Verification for Entitlements, a Homeland Security database used to verify immigration or citizenship status for benefits)</span>. <span class='change'>A federal judge blocked the revised system's use for bulk voter-citizenship checks, warning that privacy shortcuts and data errors could trigger wrongful voter purges.</span> The ruling matters because several states had already used the system to cross-check large voter lists, turning an administrative database into an election-law instrument. The next fight is likely to ask whether fraud-prevention authority can override privacy rules when states, not presidents, usually run voter registration.`,[S(`New York Post SAVE ruling`,`https://nypost.com/2026/06/23/us-news/judge-blocks-trump-admin-from-using-federal-database-to-check-citizenship-warns-of-voter-purge/`),S(`Guardian politics live`,`https://www.theguardian.com/us-news/live/2026/jun/23/primary-elections-ny-maryland-utah-supreme-court-ruling-politics-latest-updates`)],L(`<span class='jargon'>Voter purge (removing names from registration rolls)</span> can protect list accuracy but can also disenfranchise eligible voters if data matching is wrong.`,[`Integrity: states need tools to identify ineligible registrations.`,`Rights: flawed federal databases can remove eligible citizens at scale.`,`Federalism: presidents have limited direct authority over state-run elections.`],`Watch appeal filings, state compliance notices and whether Congress demands DHS privacy documentation.`))],Healthcare:[W(`Congo Ebola cases pass 1,000 as tracing still misses nearly half of contacts`,`Eastern Congo's health system was already strained by displacement, armed groups and weak roads before the Bundibugyo Ebola outbreak began in Ituri. <span class='change'>Authorities reported 1,003 confirmed cases and 254 deaths by June 22, with only about 55% contact-tracing coverage and 365 people hospitalized or isolated.</span> The strain has no approved vaccine or specific treatment, so containment depends on finding exposed people, isolating cases and keeping treatment centers functioning. The risk is highest in displacement sites: UN agencies warned that 2 million displaced people live in Ebola-risk zones, where crowding and poor sanitation can turn missed cases into a much larger emergency.`,[S(`AP Congo Ebola`,`https://apnews.com/article/d298bfadf678a07412c8fbb8c46263ad`),S(`WHO Ebola background`,`https://www.who.int/health-topics/ebola`),S(`People Ebola summary`,`https://people.com/ebola-cases-surpass-1-000-with-death-toll-over-250-12004188`)],L(`<span class='jargon'>Contact tracing (identifying and monitoring people exposed to an infected person)</span> is the core Ebola containment tool when vaccines are unavailable.`,[`Capacity: Congo has outbreak experience and international partners.`,`Access: insurgent attacks and displacement make textbook tracing unrealistic.`,`Regional risk: Uganda-linked cases and mobile mining routes make border surveillance decisive.`],`Watch daily case growth, tracing coverage, treatment-bed occupancy and unexplained deaths in camps.`)),W(`Airport screening returns as Ebola risk becomes global health-security issue`,`Ebola outbreaks often remain regional, but global travel policy changes when case growth, unknown transmission chains and cross-border risk align. <span class='change'>U.S. officials are supporting Congo's response and enhancing screening at major airports after the outbreak topped 1,000 confirmed cases and Uganda reported linked cases.</span> Screening cannot stop every imported infection because Ebola symptoms can appear after travel, but it can speed isolation, contact notification and public communication. The political challenge is to prevent fear-driven restrictions from replacing the slower work of funding field teams, diagnostics and community trust in eastern Congo.`,[S(`AP Congo Ebola`,`https://apnews.com/article/d298bfadf678a07412c8fbb8c46263ad`),S(`CDC travelers health`,`https://wwwnc.cdc.gov/travel/`)],L(`<span class='jargon'>Public health emergency of international concern (WHO's highest alert category for cross-border health threats)</span> is meant to coordinate action, not automatically close borders.`,[`Preparedness: screening can reduce delay if an infected traveler arrives.`,`Limits: airport checks cannot substitute for containment at the source.`,`Trust: stigmatizing travelers can make contacts less willing to report exposure.`],`Watch CDC travel notices, WHO emergency updates and donor commitments for field response.`))],Climate:[W(`Southeast Asia faces a fuel, fertilizer and El Nino compound shock`,`Southeast Asia's food systems depend on imported fuel, fertilizer and predictable rainfall, so distant wars can become local price shocks. <span class='change'>New reporting warns that Middle East energy disruption plus a strengthening El Nino could double the region's energy import bill to about $160 billion this year and threaten up to 8 million tonnes of Asia-Pacific rice production.</span> The risk matters because fertilizer prices, diesel costs and drought can reinforce one another: farmers pay more to plant just as water and yields deteriorate. Governments may respond with subsidies, export controls or rationing, all of which can transmit the shock to global food markets.`,[S(`Guardian Southeast Asia shock`,`https://www.theguardian.com/environment/2026/jun/23/iran-war-oil-prices-hormuz-el-nino-south-east-asia-impact`),S(`Guardian El Nino Asia`,`https://www.theguardian.com/environment/2026/jun/05/el-nino-asia-unpredictable-extreme-weather-climate-change-crisis`)],L(`<span class='jargon'>El Nino (a periodic warming of the central and eastern Pacific that shifts rainfall and heat patterns worldwide)</span> often brings drought risk to parts of Southeast Asia.`,[`Food-security case: rice, fertilizer and fuel channels can produce broad inflation.`,`Adaptation case: storage, irrigation and targeted subsidies can blunt the worst effects.`,`Geopolitics case: Russia and Gulf exporters can gain leverage through emergency energy deals.`],`Watch rice export rules, fertilizer prices, reservoir levels and national energy-saving measures.`)),W(`World Cup heat analysis turns climate adaptation into a labor and public-health test`,`The 2026 World Cup is being played across North America during a period of above-normal heat, and venue cooling does not cover all workers and fans. <span class='change'>A Guardian analysis found two first-round matches were played in severe heat conditions above a 28C wet-bulb threshold, while worker advocates warned that southern U.S. host cities could expose staff to dangerous heat without enforceable protections.</span> The stakes extend beyond sports because mega-events concentrate contractors, security staff, EMTs, concession workers and tourists in heat-risk environments. The concrete policy issue is enforcement: hydration breaks and cooling stations help only if contractors actually allow workers to use them.`,[S(`Guardian match heat analysis`,`https://www.theguardian.com/football/2026/jun/19/world-cup-matches-severe-heat-level-analysis`),S(`Guardian worker heat`,`https://www.theguardian.com/us-news/2026/jun/14/world-cup-heat-workers`),S(`OSHA heat exposure`,`https://www.osha.gov/heat-exposure`)],L(`<span class='jargon'>Wet-bulb globe temperature (a heat-stress measure combining heat, humidity, sunlight and wind)</span> better captures danger than air temperature alone.`,[`Event-management case: scheduling, shade and medical teams reduce risk.`,`Labor case: temporary workers may not report unsafe conditions.`,`Climate case: future tournaments will need climate standards built into host contracts.`],`Watch emergency calls, worker complaints and whether FIFA or cities alter kickoff and staffing rules.`))],'Tech / AI':[W(`Debt-funded AI spending becomes a market-wide risk rather than a niche tech debate`,`AI investment has been treated as the main growth engine of U.S. equities, but Tuesday's selloff exposed how much of the story depends on cheap capital and confidence in future monetization. <span class='change'>The Guardian reported concerns that AI-related borrowings could reach roughly $500 billion, while SpaceX fell sharply after reports of a large bond sale to fund AI infrastructure.</span> The issue is not whether AI is useful; it is whether data centers, chips and model training can generate cash flows quickly enough to service debt. A prolonged repricing could slow hardware orders, hit Asian chipmakers and reduce the pace of AI deployment in businesses that were counting on falling compute costs.`,[S(`Guardian AI selloff`,`https://www.theguardian.com/business/2026/jun/23/ai-stocks-sell-off-us-markets`),S(`Guardian markets live`,`https://www.theguardian.com/business/live/2026/jun/23/crude-oil-falls-us-waiver-iran-sanctions-peace-talks-progress-live-updates`)],L(`<span class='jargon'>Capital expenditure (company spending on long-lived assets such as data centers, servers and power systems)</span> becomes riskier when financed with debt before revenue is proven.`,[`Buildout case: infrastructure spending may be necessary for a genuine general-purpose technology.`,`Bubble case: leverage can turn disappointment into forced retrenchment.`,`Supply-chain case: chip exporters are exposed even if the original overbuilding is in the U.S.`],`Watch bond spreads, cloud capex guidance and Korean and Taiwanese semiconductor earnings.`)),W(`Taiwan's carrier-tracked week highlights the military side of the chip economy`,`Taiwan's security and semiconductor position are now linked daily because pressure around the island can affect both military deterrence and the AI supply chain. <span class='change'>China's newest aircraft carrier Fujian transited the Taiwan Strait one day after Taiwan began a five-day military exercise, underscoring Beijing's ability to signal power during Taipei's readiness drills.</span> The Fujian is China's most advanced carrier and its movement through the strait forces Taiwan, the United States and Japan to track whether China's naval modernization is becoming routine coercive pressure. For technology policy, the message is indirect but clear: the world's most important chip island sits inside an increasingly active military theater.`,[S(`AP Fujian Taiwan Strait`,`https://apnews.com/article/1967779925e8f5192f42498d4379438e`),S(`U.S. Commerce BIS`,`https://www.bis.gov/`)],L(`<span class='jargon'>Taiwan Strait (the waterway between mainland China and Taiwan)</span> is both a military flashpoint and a route near critical semiconductor supply chains.`,[`Deterrence: routine Chinese carrier activity can normalize pressure.`,`Resilience: firms and governments may accelerate chip supply diversification.`,`Escalation: close naval and air operations increase accident risk.`],`Watch Taiwan's exercise results, U.S. naval responses and semiconductor export-control updates.`))],'Latin America':[W(`Venezuela gang strike raises mining, sovereignty and crime-policy questions`,`Tren de Aragua is no longer only a policing story because its networks overlap with migration routes, illegal gold mining and state authority in Venezuela's Orinoco Mining Arc. <span class='change'>The Guardian reported new scrutiny of a June 9 strike in Las Claritas that Trump said killed gang leader Hector Guerrero Flores, with questions over U.S. involvement, Venezuelan cooperation and nearby mining interests.</span> If confirmed, the operation would show a major shift from sanctions and deportations toward cross-border force justified by organized crime. The danger is that killing one leader may fragment the network while leaving illegal mining, corruption and armed control of mineral zones intact.`,[S(`Guardian Tren de Aragua`,`https://www.theguardian.com/world/2026/jun/23/venezuela-tren-de-aragua-assassination-mining`),S(`U.S. Treasury sanctions search`,`https://home.treasury.gov/news/press-releases`)],L(`<span class='jargon'>Orinoco Mining Arc (a mineral-rich region of southern Venezuela associated with gold extraction, armed groups and environmental harm)</span> gives criminal groups revenue beyond drugs.`,[`Security case: targeting leadership can disrupt a transnational gang.`,`Sovereignty case: foreign strikes blur law enforcement and military intervention.`,`Political economy case: mineral access may shape what governments call countercrime policy.`],`Watch confirmation of casualties, Venezuelan statements and whether mining concessions follow security operations.`)),W(`Brazil's Tren de Aragua arrests show regional gangs adapting across prison networks`,`Brazil already has powerful criminal organizations, so the key question is whether foreign gangs become clients, rivals or partners inside existing prison and drug systems. <span class='change'>Brazilian police arrested 25 people across five states in a crackdown on suspected Tren de Aragua links to groups including PCC and Red Command.</span> Authorities said the network helped move high-caliber weapons, which matters because arms logistics can connect migrant extortion, illegal mining and urban violence. The regional policy lesson is that treating gangs as purely national problems misses the way prison alliances and smuggling corridors cross borders.`,[S(`AP Brazil arrests`,`https://apnews.com/article/19d10d7f4f36e13ce3778f4bd9f4d679`),S(`U.S. Treasury press releases`,`https://home.treasury.gov/news/press-releases`)],L(`<span class='jargon'>PCC (Primeiro Comando da Capital, Brazil's most powerful prison-origin criminal group)</span> can extend influence through alliances rather than direct territorial control.`,[`Policing: coordinated raids can disrupt logistics.`,`Adaptation: arrests may push gangs into looser franchises.`,`Migration politics: criminal cases can harden policy toward Venezuelan migrants broadly.`],`Watch extradition requests, weapons seizures and whether Brazil links the network to mining or port routes.`))],'Africa / Middle East':[W(`Rubio's Gulf tour tests whether allies believe the Iran deal limits Tehran`,`Gulf states supported de-escalation but remain exposed to Iranian missiles, energy disruption and domestic pressure if the deal channels money to Tehran without binding limits. <span class='change'>Marco Rubio is visiting the UAE, Kuwait and Bahrain to reassure allies after a U.S.-Iran ceasefire deal that unfroze assets and expanded oil access while Iran disputed U.S. claims about inspection commitments.</span> The trip matters because Gulf cooperation is needed for sanctions enforcement, maritime security and any Lebanon monitoring body. If allies think Washington traded deterrence for a short-term ceasefire, they may hedge with China, pursue their own military buildouts or resist implementation.`,[S(`Guardian Rubio Gulf tour`,`https://www.theguardian.com/world/2026/jun/23/marco-rubio-gulf-allies-us-iran-ceasefire-deal`),S(`AP Iran inspection briefing`,`https://apnews.com/article/e71ed869e09b20d26442418390feb9f3`)],L(`<span class='jargon'>Sanctions waivers (temporary legal permissions that allow otherwise restricted transactions)</span> can provide economic relief without permanently repealing sanctions law.`,[`Reassurance: U.S. diplomacy can lock allies into implementation.`,`Skepticism: Gulf states may fear Iran uses new revenue for military recovery.`,`Regional realignment: the deal could accelerate hedging among U.S. partners.`],`Watch Gulf communiques, Iranian oil volumes and whether the IAEA confirms inspection access.`)),W(`Sudan testimony puts UAE ties and atrocity prevention under parliamentary scrutiny`,`Sudan's war has produced one of the world's worst humanitarian crises, but outside support networks remain difficult to prove publicly and diplomatically costly to confront. <span class='change'>A UK parliamentary committee is set to hear testimony alleging that London prioritized relations with the UAE over acting on intelligence about support to Sudan's Rapid Support Forces.</span> The claim matters because Britain is the UN Security Council penholder on Sudan, meaning it has special diplomatic responsibility to push action. If governments suppress or soften evidence to protect strategic partners, atrocity prevention becomes dependent on leaks, satellite labs and civil-society pressure rather than state policy.`,[S(`Guardian Sudan testimony`,`https://www.theguardian.com/global-development/2026/jun/23/uk-ties-uae-mass-atrocities-sudan-mps-select-committee-nathaniel-raymond`),S(`UN Sudan crisis`,`https://news.un.org/en/tags/sudan`)],L(`<span class='jargon'>Penholder (the Security Council member that leads drafting and negotiations on a country file)</span> has agenda-setting power even without controlling final votes.`,[`Diplomacy: quiet pressure may preserve access to regional partners.`,`Accountability: hiding evidence can enable further atrocities.`,`Information: satellite and telecom data are changing how war crimes are documented.`],`Watch the committee transcript, UAE responses and whether the UK changes its Sudan language at the UN.`))],'Europe / EU':[W(`UK services slump gives incoming Burnham government an immediate fiscal test`,`Britain's economy was already squeezed by high borrowing costs, weak productivity and energy-price uncertainty before the latest business surveys. <span class='change'>A June 23 market live report said the UK services sector shrank at its fastest pace since 2023, adding pressure on incoming prime minister Andy Burnham while Bank of England officials argued for holding rates amid geopolitical risk.</span> Services dominate UK output, so contraction there points to weaker tax receipts and less room for new spending. The political problem is timing: any attempt to stimulate growth can collide with gilt-market caution and imported inflation from the Middle East.`,[S(`Guardian business live`,`https://www.theguardian.com/business/live/2026/jun/23/crude-oil-falls-us-waiver-iran-sanctions-peace-talks-progress-live-updates`),S(`Bank of England`,`https://www.bankofengland.co.uk/`)],L(`<span class='jargon'>Services PMI (a survey-based purchasing managers index for service-sector activity)</span> signals contraction when readings fall below 50.`,[`Growth case: weak services strengthen the argument for targeted support.`,`Inflation case: energy risk makes rate cuts harder.`,`Market case: gilt investors may punish unfunded fiscal promises.`],`Watch PMI details, gilt yields and the Bank of England's next vote split.`)),W(`European markets feel the AI selloff through chips and industrial exposure`,`Europe is not the center of the AI boom, but its markets are exposed through semiconductor equipment, power infrastructure, data-center supply chains and export demand. <span class='change'>European markets fell Tuesday after the U.S. tech rout, with Germany and France hit even as eurozone business contraction eased slightly.</span> The significance is that a U.S. valuation reset can travel through Europe without a European policy mistake, because investors sell globally connected cyclicals when U.S. growth stories weaken. The next question is whether European policymakers see the selloff as a financial wobble or as evidence that industrial strategy tied to AI infrastructure needs more caution.`,[S(`Guardian business live`,`https://www.theguardian.com/business/live/2026/jun/23/crude-oil-falls-us-waiver-iran-sanctions-peace-talks-progress-live-updates`),S(`European Central Bank`,`https://www.ecb.europa.eu/`)],L(`<span class='jargon'>Cyclical stocks (companies whose earnings move strongly with economic growth)</span> often fall when investors fear a broad slowdown.`,[`Containment: Europe can weather a U.S. tech correction if credit remains calm.`,`Transmission: chip equipment and data-center exposure can turn U.S. repricing into European losses.`,`Policy: AI industrial subsidies may face more scrutiny if private capital pulls back.`],`Watch ASML-linked sentiment, eurozone credit spreads and ECB financial-stability comments.`))],China:[W(`Fujian carrier transit raises the pressure around Taiwan's military exercises`,`China has long used aircraft, ships and coast guard activity to signal that Taiwan's defenses are under constant observation. <span class='change'>Taiwan said China's newest and most advanced aircraft carrier, the Fujian, sailed through the Taiwan Strait one day after Taiwan began a five-day military exercise.</span> The transit matters because carriers are symbols of blue-water power and because normalization of such movements can make coercive activity look routine. The risk is not only invasion; it is a tempo of pressure that forces Taiwan to spend attention and resources every week while testing U.S. and allied reactions.`,[S(`AP Fujian Taiwan Strait`,`https://apnews.com/article/1967779925e8f5192f42498d4379438e`),S(`Taiwan Ministry of National Defense`,`https://www.mnd.gov.tw/english/`)],L(`<span class='jargon'>Blue-water navy (a naval force able to operate far from home waters)</span> gives China more options beyond its immediate coast.`,[`Beijing: carrier movement signals that Taiwan exercises do not deter PLA operations.`,`Taipei: public tracking shows readiness and helps internationalize the pressure.`,`Washington: routine transits complicate decisions about when to respond visibly.`],`Watch PLA air sorties, U.S. naval movements and whether Fujian begins more frequent strait transits.`)),W(`Scarborough Shoal fears keep the South China Sea on the extemp map`,`Scarborough Shoal has been a long-running China-Philippines flashpoint because China controls access while Manila cites its exclusive economic zone and the 2016 arbitration ruling. <span class='change'>Recent Philippine warnings about Chinese activity at the shoal remain active after satellite-linked reporting on rapid reef expansion elsewhere in the South China Sea.</span> The issue matters because construction can change legal and military realities before diplomats agree on what happened. If China builds or permanently stations assets there, Manila's choices narrow to protest, allied patrols or risky interdiction.`,[S(`FT Scarborough Shoal`,`https://www.ft.com/content/d5191b00-dccb-465e-8afb-e61cc8260f93`),S(`AP South China Sea Germany`,`https://apnews.com/article/5752f361a8b132cff0d8b05d2ab65cce`)],L(`<span class='jargon'>Exclusive economic zone (a maritime zone where a coastal state has rights to resources up to 200 nautical miles)</span> is not the same as full sovereignty, but it is central to fisheries and energy claims.`,[`Deterrence: allied patrols can raise costs before dredging starts.`,`Gray zone: research vessels and coast guard ships can change facts below the war threshold.`,`Europe: Hormuz has made sea-lane security feel globally connected.`],`Watch dredger sightings, Philippine coast guard patrols and U.S. treaty language.`))],'War / Active Conflicts':[W(`Ukraine warns its ceasefire offer is not open-ended`,`Ukraine has kept a diplomatic offer for a full and unconditional ceasefire on the table while also expanding attacks on Russia's energy and military supply systems. <span class='change'>Kyiv's UN envoy warned that Ukraine's patience is not endless if the Security Council does not back a resolution calling for an end to hostilities.</span> The warning comes as Ukraine claims drone and missile campaigns have damaged roughly 40% of Russia's oil refineries and disrupted occupied Crimea's fuel supply. The strategic impact is that Kyiv is trying to combine diplomatic legitimacy with battlefield leverage before Russia can frame negotiations as Western pressure on Ukraine alone.`,[S(`Guardian Ukraine briefing`,`https://www.theguardian.com/world/2026/jun/23/ukraine-war-briefing-our-patience-is-not-endless-kyiv-signals-peace-offer-may-expire`),S(`UN Ukraine updates`,`https://news.un.org/en/focus/ukraine`)],L(`<span class='jargon'>UN Security Council (the 15-member UN body responsible for international peace and security)</span> can create diplomatic pressure even when veto politics block enforcement.`,[`Kyiv: deadline pressure shows Russia cannot stall forever.`,`Moscow: Ukrainian strikes may be used to argue Kyiv is not serious about talks.`,`Markets: refinery damage can affect fuel availability inside Russia and occupied areas.`],`Watch the UN vote, Russian refinery repairs and whether Kyiv formally withdraws or revises the offer.`)),W(`Lebanon ceasefire enforcement becomes the weak link in the Iran deal`,`The U.S.-Iran memorandum ties regional de-escalation to concrete behavior by actors that were not all direct signatories, especially Hezbollah and Israel in southern Lebanon. <span class='change'>Two people were killed in southern Lebanon by Israeli forces, while Rubio and Vance spoke with Lebanese president Joseph Aoun about a ceasefire monitoring body.</span> The deaths matter because each alleged violation gives Iran, Israel or Hezbollah a reason to question the wider bargain. If monitoring is weak, Lebanon can become the route through which the Iran deal unravels even if nuclear negotiators keep meeting.`,[S(`Guardian Middle East live`,`https://www.theguardian.com/world/live/2026/jun/23/iran-us-israel-lebanon-un-peace-deal-nuclear-iaea-frozen-assets-strait-of-hormuz-latest-news-updates`),S(`AP Iran inspection briefing`,`https://apnews.com/article/e71ed869e09b20d26442418390feb9f3`)],L(`<span class='jargon'>Ceasefire monitoring body (a mechanism for documenting violations and communicating between parties)</span> is only useful if all key armed actors respect its findings.`,[`Implementation: verification can keep small incidents from becoming escalation.`,`Skepticism: Hezbollah's non-state role makes enforcement structurally hard.`,`Regional stakes: Lebanon violations can affect Hormuz, sanctions and nuclear talks.`],`Watch monitoring-body membership, UNIFIL reports and whether Iran conditions talks on Lebanon.`))],'Flex / Global Systems':[W(`Southeast Asia's energy import shock links food security to maritime diplomacy`,`The Middle East crisis is not only about oil consumers in rich economies because Southeast Asia imports fuel, fertilizer inputs and shipping services through the same stressed routes. <span class='change'>Reporting on Tuesday warned that the region's energy import bill could double this year while fertilizer shortages threaten rice output across the Asia-Pacific.</span> That matters because rice is politically sensitive, and even modest export restrictions by major producers can trigger panic buying and price spikes in poorer importing states. The broader extemp angle is compound vulnerability: climate, shipping, fertilizer and geopolitics are now one food-security problem.`,[S(`Guardian Southeast Asia shock`,`https://www.theguardian.com/environment/2026/jun/23/iran-war-oil-prices-hormuz-el-nino-south-east-asia-impact`),S(`FAO newsroom`,`https://www.fao.org/newsroom/en`)],L(`<span class='jargon'>Food-security shock (a disruption that limits affordability or availability of staple food)</span> can arise from energy prices even before crop failure occurs.`,[`Trade: governments may restrict exports to protect local consumers.`,`Development: fertilizer shortages can depress yields after the immediate crisis fades.`,`Diplomacy: energy suppliers can gain leverage through emergency supply deals.`],`Watch rice futures, export restrictions, fertilizer tenders and ASEAN energy announcements.`)),W(`Arctic security remains a strategic background story as NATO builds presence`,`The Arctic did not produce a single dramatic Tuesday headline, but it remains a live strategic file because Russia, China, Europe and the United States all treat northern access as a military and resource issue. <span class='change'>NATO's Arctic Sentry mission and the U.S. search for icebreaker capacity keep the region active as sea routes, submarines, critical minerals and Greenland politics overlap.</span> The significance is that Arctic capability depends on specialized ships, surveillance and allied trust, not only slogans about sovereignty. Any deterioration in U.S.-European relations over Greenland would create openings for Russia and China while making NATO's northern defense planning harder.`,[S(`AP icebreakers and Greenland`,`https://apnews.com/article/c69ac5648b97298c537619aa72be5e1f`),S(`NATO Arctic Sentry`,`https://www.nato.int/`)],L(`<span class='jargon'>Icebreaker (a reinforced ship able to clear sea ice for navigation)</span> is a strategic technology because ordinary vessels cannot reliably operate in many Arctic waters.`,[`Capability: the U.S. needs allied shipbuilding expertise.`,`Deterrence: NATO surveillance raises the cost of Russian or Chinese probing.`,`Alliance politics: Greenland disputes can weaken the trust required for Arctic defense.`],`Watch Ice PACT procurement, Danish-Greenlandic statements and NATO High North exercises.`))]};const weekly={'US Economy':[wire['US Economy'][0],wire['US Economy'][1],W(`Warsh-era Fed uncertainty became a borrowing-cost story this week`,`The week began with markets still digesting Kevin Warsh's early signal that the Fed would rely less on explicit forward guidance. <span class='change'>Investors increasingly treated that communication shift as a possible source of higher Treasury and mortgage risk premiums, especially as oil and AI valuation shocks complicated the inflation outlook.</span> The weekly importance is that a change in central-bank style can affect households before a single formal rate move. If markets think the Fed is less predictable, companies and borrowers may face tighter credit even while policymakers say they are only changing communication.`,[S(`FT Fed guidance`,`https://www.ft.com/content/6a9330ad-a2db-494b-bf61-7dd417ab9c9a`),S(`Federal Reserve calendar`,`https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm`)],L(`<span class='jargon'>Forward guidance (central-bank communication about likely future policy)</span> became a tool for moving expectations before rates changed.`,[`Credibility: less guidance can discourage speculative market dependence on the Fed.`,`Volatility: less information can raise risk premiums.`,`Politics: a new chair's style is also a test of independence.`],`Watch the two-year Treasury yield, mortgage rates and FOMC dissents.`))],'US Politics':[wire['US Politics'][0],wire['US Politics'][1],W(`Iran war-powers oversight remained unresolved after another Senate failure`,`Congress has tried repeatedly to force a vote on the legal basis for U.S. operations against Iran. <span class='change'>Last week the Senate again failed to advance a war-powers resolution, 47-48, with some Republicans joining most Democrats but not enough senators supporting the measure.</span> The weekly significance is that the conflict may be winding down diplomatically while the constitutional precedent remains unsettled. If the executive can end hostilities on paper while maintaining force posture, future presidents may cite the Iran episode to avoid authorization during limited wars.`,[S(`AP war powers vote`,`https://apnews.com/article/f50dcbe654c1e02292c0d3541f8e2ab2`),S(`Congress War Powers Resolution`,`https://www.congress.gov/bill/93rd-congress/house-joint-resolution/542`)],L(`<span class='jargon'>War Powers Resolution (1973 law requiring presidential consultation and limits on unauthorized hostilities)</span> was designed to prevent open-ended executive wars.`,[`Executive: presidents need speed in crisis.`,`Congress: repeated votes show the legislature has not surrendered the issue.`,`Precedent: ceasefire language can become a legal off-ramp without demobilization.`],`Watch classified briefings, subpoenas and any new vote after the Iran deal details are released.`))],Healthcare:[wire.Healthcare[0],wire.Healthcare[1],W(`The week made public-health trust a domestic and international issue`,`Congo's Ebola outbreak showed why technical containment depends on trust, while U.S. health politics kept raising questions about evidence review and agency credibility. <span class='change'>As Ebola contact tracing lagged and U.S. screening expanded, domestic fights over scientific independence under Health Secretary Robert F. Kennedy Jr. remained part of the public-health backdrop.</span> The weekly lesson is that institutions cannot improvise credibility during emergencies; they need it before outbreaks accelerate. For speakers, the issue links local compliance, federal expertise and global disease response in one governance frame.`,[S(`AP Congo Ebola`,`https://apnews.com/article/d298bfadf678a07412c8fbb8c46263ad`),S(`CDC`,`https://www.cdc.gov/`)],L(`<span class='jargon'>Scientific advisory committee (an expert panel that reviews evidence for agencies)</span> helps separate technical recommendations from political preference.`,[`Trust: credible agencies can persuade faster.`,`Skepticism: officials should still challenge weak evidence.`,`Emergency: politicized science fights reduce compliance when time matters.`],`Watch HHS procedures, CDC guidance and WHO outbreak updates.`))],Climate:[wire.Climate[0],wire.Climate[1],W(`UNICEF's climate-hazard report reframed adaptation around children`,`Climate policy is often discussed through emissions targets, but this week's UNICEF coverage emphasized bridges, schools, clinics and daily exposure. <span class='change'>The agency found that more than one billion children, about half the world's children, face at least three overlapping climate hazards.</span> The weekly importance is that adaptation can be measured through service failure: children miss school, clinics overheat, roads wash out and water systems fail. That makes climate finance easier to connect to concrete public goods rather than abstract resilience language.`,[S(`Guardian UNICEF climate`,`https://www.theguardian.com/environment/2026/jun/16/half-of-worlds-children-exposed-to-at-least-three-climate-hazards-unicef-says`),S(`UNICEF climate action`,`https://www.unicef.org/climate-action`)],L(`<span class='jargon'>Climate hazard overlap (simultaneous exposure to risks such as heat, floods, drought and storms)</span> makes recovery harder because each shock weakens the systems needed for the next one.`,[`Adaptation: child-centered infrastructure can save lives quickly.`,`Justice: poorer children face more hazards and fewer backups.`,`Politics: schools and clinics can broaden climate coalitions.`],`Watch adaptation pledges targeted to education, health and water infrastructure.`))],'Tech / AI':[wire['Tech / AI'][0],wire['Tech / AI'][1],W(`Unions turned AI into a 2028 labor-politics issue this week`,`AI policy is no longer limited to model safety or China competition because workplaces are already using automated monitoring and replacement tools. <span class='change'>AFL-CIO leaders used their Minneapolis convention to demand that AI work for workers and to prepare a 2028 fight over surveillance, bargaining rights and digital replicas.</span> The weekly significance is coalition-building before deployment becomes irreversible. Labor is trying to define AI as a bargaining and power issue, not merely a productivity upgrade.`,[S(`Axios unions AI`,`https://www.axios.com/2026/06/14/unions-ai-2028-elections`),S(`Guardian workers and AI`,`https://www.theguardian.com/us-news/2026/may/12/workers-ai-policy-unions`)],L(`<span class='jargon'>Bossware (software that tracks, directs or rates workers)</span> makes AI governance a workplace-rights issue.`,[`Worker voice: bargaining can share gains and limit surveillance.`,`Competitiveness: restrictions may slow useful deployment.`,`Politics: labor wants AI rules to shape the next presidential cycle.`],`Watch contract clauses, state AI bills and campaign language.`))],'Latin America':[wire['Latin America'][0],wire['Latin America'][1],W(`Venezuela-U.S. thaw kept minerals and security in the same frame`,`The last several months of U.S.-Venezuela normalization made this week's Tren de Aragua strike allegations more important than a single gang story. <span class='change'>Washington has reopened relations with Caracas while U.S. firms seek access to mining assets, making security cooperation in the Orinoco region politically sensitive.</span> The weekly lesson is that crime policy, sanctions relief and critical-minerals strategy can merge quickly when a resource zone is controlled by armed groups. That makes transparency about strikes and concessions essential.`,[S(`Guardian Venezuela mining`,`https://www.theguardian.com/world/2026/jun/23/venezuela-tren-de-aragua-assassination-mining`),S(`U.S. State Department Venezuela`,`https://www.state.gov/countries-areas/venezuela/`)],L(`<span class='jargon'>Critical minerals (materials important for energy, defense or electronics supply chains)</span> can turn remote security problems into strategic economic issues.`,[`Security: cooperation can weaken criminal control.`,`Accountability: opaque strikes can normalize military action under a policing label.`,`Investment: resource access may shape diplomatic incentives.`],`Watch Venezuelan investigations, U.S. confirmations and concession announcements.`))],'Africa / Middle East':[wire['Africa / Middle East'][0],wire['Africa / Middle East'][1],wire['War / Active Conflicts'][1]],'Europe / EU':[wire['Europe / EU'][0],wire['Europe / EU'][1],W(`NATO spending roadmaps kept Europe on a defense-fiscal clock`,`NATO's 2025 pledge to move toward a 5% defense and security-related spending target still requires national plans and budget tradeoffs. <span class='change'>This week European governments faced market volatility, Ukraine pressure and Middle East uncertainty while continuing to prepare roadmaps for higher defense spending by the mid-2026 review window.</span> The weekly importance is that defense policy is now a fiscal policy question: states must fund deterrence while protecting welfare systems and avoiding bond-market backlash. Countries that delay may face U.S. pressure; countries that accelerate may face domestic spending fights.`,[S(`NATO`,`https://www.nato.int/`),S(`Reuters NATO spending explainer`,`https://www.reuters.com/world/what-is-natos-new-5-defence-spending-target-2025-06-25/`)],L(`<span class='jargon'>Defense spending target (a NATO benchmark for member military and security-related outlays)</span> is politically important even when categories are flexible.`,[`Deterrence: higher spending can rebuild European capacity.`,`Budget risk: targets can crowd out domestic priorities.`,`Alliance politics: U.S. pressure can both motivate and alienate allies.`],`Watch national defense plans, 2029 review language and procurement bottlenecks.`))],China:[wire.China[0],wire.China[1],W(`Chip controls and Taiwan risk stayed linked all week`,`Washington's China policy now has two connected tracks: restrict advanced compute while deterring coercion around the island that manufactures many key chips. <span class='change'>Taiwan's military exercise, China's Fujian transit and continuing export-control enforcement debates all kept semiconductors inside the security frame this week.</span> The weekly significance is that export controls only work if enforcement covers smuggling routes, server assemblies and third-country workarounds. At the same time, a Taiwan crisis would threaten the very supply chains the controls are trying to protect.`,[S(`AP Fujian Taiwan Strait`,`https://apnews.com/article/1967779925e8f5192f42498d4379438e`),S(`BIS export controls`,`https://www.bis.gov/`)],L(`<span class='jargon'>Dual-use technology (civilian technology with military applications)</span> explains why chips and servers sit inside national-security law.`,[`Control: tighter enforcement can slow military AI development.`,`Leakage: small chips and whole servers are easier to reroute than factory tools.`,`Deterrence: Taiwan security is the ultimate supply-chain risk.`],`Watch Taiwan enforcement, U.S. license rules and Chinese retaliation.`))],'War / Active Conflicts':[wire['War / Active Conflicts'][0],wire['War / Active Conflicts'][1],W(`Sudan and Congo showed why undercovered crises still shape global policy`,`The week's largest headlines came from Iran, Ukraine and markets, but Africa's humanitarian crises kept deepening. <span class='change'>Congo's Ebola outbreak topped 1,000 confirmed cases while Sudan testimony in London put alleged outside support to the RSF back under scrutiny.</span> The weekly significance is that disease control, famine prevention and atrocity accountability all depend on access in conflict zones. These stories also show the limits of global attention: slower crises often produce higher human costs than the day's dominant diplomatic story.`,[S(`AP Congo Ebola`,`https://apnews.com/article/d298bfadf678a07412c8fbb8c46263ad`),S(`Guardian Sudan testimony`,`https://www.theguardian.com/global-development/2026/jun/23/uk-ties-uae-mass-atrocities-sudan-mps-select-committee-nathaniel-raymond`)],L(`<span class='jargon'>Humanitarian access (safe and sustained ability to reach civilians with aid)</span> is often the decisive variable in war-related health crises.`,[`Health: disease spreads faster where armed groups block teams.`,`Accountability: outside sponsors may face pressure through evidence disclosure.`,`Diplomacy: attention determines whether warnings become action.`],`Watch UN access reports, donor funding and parliamentary or Security Council follow-up.`))],'Flex / Global Systems':[wire['Flex / Global Systems'][0],wire['Flex / Global Systems'][1],W(`Food security became a global-systems story rather than a farm-only story`,`The week linked rice, fertilizer, energy, shipping insurance and El Nino in a way that makes the food system look like critical infrastructure. <span class='change'>Southeast Asia's projected fuel import jump and threatened rice output show how a maritime shock can move through farm costs before consumers see empty shelves.</span> The ongoing importance is political: food inflation can destabilize governments faster than abstract GDP weakness. It also gives extemp speakers a clear chain from war to chokepoints to fertilizer to harvests to household prices.`,[S(`Guardian Southeast Asia shock`,`https://www.theguardian.com/environment/2026/jun/23/iran-war-oil-prices-hormuz-el-nino-south-east-asia-impact`),S(`FAO newsroom`,`https://www.fao.org/newsroom/en`)],L(`<span class='jargon'>Staple crop (a basic food such as rice, wheat or maize that supplies a large share of calories)</span> creates political pressure when prices move sharply.`,[`Resilience: stockpiles and irrigation reduce panic.`,`Risk: export bans can spread local shocks globally.`,`Geopolitics: energy suppliers gain leverage over food importers.`],`Watch rice prices, fertilizer tenders and emergency subsidy plans.`))]};const analytical=[{tag:`Middle East diplomacy`,headline:`The Iran memorandum is now an implementation test, not a signing ceremony`,deck:`Inspections, Hormuz rules and Lebanon enforcement decide whether the deal becomes durable.`,image:headline.image,imageAlt:headline.imageAlt,imageCredit:headline.imageCredit,imageCreditUrl:headline.imageCreditUrl,skeletonHTML:`<b>Baseline:</b> the U.S.-Iran war made the Strait of Hormuz, Iranian enrichment and Israel-Hezbollah fighting one interconnected crisis rather than three separate files. <b>Change:</b> Washington now says Iran accepted long-term nuclear inspections, while Iranian officials dispute parts of that claim and Lebanon has already produced new ceasefire-death allegations. <b>Mechanism:</b> implementation requires IAEA access, sanctions-waiver administration, maritime procedures with Oman and a monitoring body that can restrain armed actors in southern Lebanon. <b>Stakes:</b> if these mechanisms work, the agreement can lower energy risk and open a nuclear track; if they fail, each local violation becomes a reason to restart the wider crisis. <b>Proof test:</b> public IAEA confirmation, tanker movement, Gulf ally statements and verified Lebanon ceasefire reports matter more than social-media victory claims.`,stats:[`Guardian reported that Rubio is reassuring Gulf allies after a deal that could give Iran more than $30 billion in oil income over a year, according to estimates cited in the coverage.`,`AP reported last week that Trump envoy Steve Witkoff told lawmakers Iran would invite the U.N. nuclear watchdog to inspect nuclear sites and identify enriched material.`,`Guardian live coverage reported two deaths in southern Lebanon and U.S. talks with Lebanese president Joseph Aoun on a monitoring body.`],sideA:[`Phased de-escalation`,`The deal can reduce immediate war risk while technical teams build verification and shipping rules step by step.`],sideB:[`Concession trap`,`Oil relief and asset access may arrive before Iran accepts enforceable nuclear and regional limits.`],sideC:[`Lebanon hinge`,`The agreement may fail through a non-nuclear channel if Hezbollah-Israel enforcement is too weak.`],sources:[S(`Guardian Middle East live`,`https://www.theguardian.com/world/live/2026/jun/23/iran-us-israel-lebanon-un-peace-deal-nuclear-iaea-frozen-assets-strait-of-hormuz-latest-news-updates`),S(`Guardian Rubio Gulf tour`,`https://www.theguardian.com/world/2026/jun/23/marco-rubio-gulf-allies-us-iran-ceasefire-deal`),S(`AP inspection briefing`,`https://apnews.com/article/e71ed869e09b20d26442418390feb9f3`)]},{tag:`AI and markets`,headline:`The AI selloff asks whether infrastructure is a moat or a debt problem`,deck:`The useful question is not whether AI matters, but whether the buildout can pay for itself fast enough.`,image:`https://commons.wikimedia.org/wiki/Special:Redirect/file/Data_center_servers.jpg`,imageAlt:`Rows of servers in a data center`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/Category:Data_centers`,skeletonHTML:`<b>Baseline:</b> AI leaders have carried a large share of U.S. equity gains because investors priced data centers, chips and frontier models as the next general-purpose infrastructure layer. <b>Change:</b> Tuesday's selloff hit AI and semiconductor names globally after concerns over debt-funded spending, SpaceX's bond plans and higher expected Fed rates. <b>Mechanism:</b> when companies borrow heavily for capital expenditure, the business case depends on fast utilization, pricing power and low enough interest costs. <b>Stakes:</b> a correction can discipline wasteful spending, but a credit-driven pullback can also slow deployment, hurt chip exporters and reduce investment in power and cooling infrastructure. <b>Proof test:</b> watch whether large cloud firms defend capex plans, whether AI bond spreads widen and whether chip order books weaken.`,stats:[`Guardian reported that the Nasdaq fell more than 2% and AI-linked market losses exceeded $1 trillion in value during the selloff.`,`The same coverage described investor concern that AI-related borrowings could reach roughly $500 billion.`,`Seven major technology companies account for about 30% of the S&P 500's value, according to the Guardian's market analysis.`],sideA:[`Buildout thesis`,`Expensive infrastructure can still be rational if AI becomes a broad productivity platform with durable demand.`],sideB:[`Bubble thesis`,`Debt, concentrated index exposure and unproven monetization make the boom financially fragile.`],sideC:[`Infrastructure thesis`,`The outcome may split: useful AI survives, but overleveraged data-center and model bets are repriced.`],sources:[S(`Guardian AI selloff`,`https://www.theguardian.com/business/2026/jun/23/ai-stocks-sell-off-us-markets`),S(`Guardian markets live`,`https://www.theguardian.com/business/live/2026/jun/23/crude-oil-falls-us-waiver-iran-sanctions-peace-talks-progress-live-updates`),S(`AI bubble paper`,`https://arxiv.org/abs/2606.01575`)]},{tag:`Public health security`,headline:`Congo's Bundibugyo Ebola outbreak is a governance failure detector`,deck:`When there is no vaccine, access and trust become the medical technology.`,image:`https://commons.wikimedia.org/wiki/Special:Redirect/file/Ebola_Treatment_Centre.jpg`,imageAlt:`Health workers at an Ebola treatment facility`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/Category:Ebola_treatment_centers`,skeletonHTML:`<b>Baseline:</b> eastern Congo has Ebola-response experience but also armed groups, displacement camps, mining mobility, weak roads and community distrust. <b>Change:</b> confirmed cases passed 1,000 with 254 deaths and contact tracing around 55%, while officials still have not identified the index case. <b>Mechanism:</b> Bundibugyo Ebola lacks the vaccine and specific treatment available for some other Ebola responses, so containment depends on isolation, safe burial, diagnostics and reaching exposed people before symptoms spread. <b>Stakes:</b> camps and border corridors can convert a provincial outbreak into regional health-security pressure. <b>Proof test:</b> the key indicators are new cases per day, tracing coverage, isolation capacity, unexplained camp deaths and Uganda-linked transmission.`,stats:[`AP reported 1,003 confirmed cases, 254 deaths, 100 recoveries and at least 365 patients hospitalized or isolated as of June 22.`,`Contact tracing coverage was about 55%, meaning nearly half of known contacts were not reliably monitored.`,`UNHCR warned that roughly 2 million displaced people live in Ebola-risk zones.`],sideA:[`Containment case`,`Experienced responders can still stop chains if tracing and isolation improve quickly.`],sideB:[`Access failure`,`Conflict, displacement and low trust can defeat the response before technical aid arrives.`],sideC:[`Global security case`,`Airport screening is useful, but the real border control is containment in Ituri.`],sources:[S(`AP Congo Ebola`,`https://apnews.com/article/d298bfadf678a07412c8fbb8c46263ad`),S(`WHO Ebola background`,`https://www.who.int/health-topics/ebola`),S(`People Ebola summary`,`https://people.com/ebola-cases-surpass-1-000-with-death-toll-over-250-12004188`)]},{tag:`Indo-Pacific security`,headline:`Taiwan and Scarborough show how China normalizes pressure without declaring a crisis`,deck:`Carrier transits and reef activity make gray-zone coercion a daily operating environment.`,image:`https://commons.wikimedia.org/wiki/Special:Redirect/file/South_China_Sea_claims_map.jpg`,imageAlt:`Map of overlapping South China Sea claims`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/Category:Maps_of_territorial_disputes_in_the_South_China_Sea`,skeletonHTML:`<b>Baseline:</b> China has increased military and coast guard pressure around Taiwan and contested reefs while avoiding a single clear trigger for U.S. or allied escalation. <b>Change:</b> Fujian's transit through the Taiwan Strait during Taiwanese exercises and continuing Philippine warnings over Scarborough Shoal show pressure moving across theaters. <b>Mechanism:</b> repeated carrier, coast guard, research-vessel and dredging activity can make presence look normal before political leaders decide it is a crisis. <b>Stakes:</b> Taiwan deterrence, Philippine alliance credibility, semiconductor resilience and sea-lane access are part of one regional balance. <b>Proof test:</b> look for frequency, not just drama: repeated transits, dredger sightings, coast guard confrontations and allied patrol language.`,stats:[`AP identified Fujian as China's newest and most advanced aircraft carrier and said the transit came a day after Taiwan began a five-day exercise.`,`Scarborough Shoal lies roughly 200km west of Luzon, inside the Philippines' claimed exclusive economic zone, according to FT reporting.`,`Recent satellite-linked reporting on reef expansion shows how quickly maritime geography can be altered when dredging begins.`],sideA:[`Deterrence case`,`Visible allied tracking and patrols can raise the cost of normalization before facts change permanently.`],sideB:[`Gray-zone case`,`China can gain leverage through repetitive activity below the threshold of armed attack.`],sideC:[`Economic-security case`,`The chip economy makes Taiwan pressure a global market risk, not only a military story.`],sources:[S(`AP Fujian Taiwan Strait`,`https://apnews.com/article/1967779925e8f5192f42498d4379438e`),S(`FT Scarborough Shoal`,`https://www.ft.com/content/d5191b00-dccb-465e-8afb-e61cc8260f93`),S(`AP South China Sea Germany`,`https://apnews.com/article/5752f361a8b132cff0d8b05d2ab65cce`)]},{tag:`Food and energy security`,headline:`Southeast Asia's compound shock is a preview of climate-era geopolitics`,deck:`War, shipping, fertilizer and El Nino now hit the same rice bowl.`,image:`https://commons.wikimedia.org/wiki/Special:Redirect/file/Rice_field_in_Thailand.jpg`,imageAlt:`Rice fields in Southeast Asia`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/Category:Rice_fields_in_Thailand`,skeletonHTML:`<b>Baseline:</b> Southeast Asia relies on imported energy and fertilizer while rice production depends on stable monsoon patterns and irrigation. <b>Change:</b> Middle East disruption has raised fuel and fertilizer pressure just as a severe El Nino risk threatens drought across key producers. <b>Mechanism:</b> higher diesel and fertilizer costs reduce planting incentives, drought lowers yields and export controls can transmit local stress into global prices. <b>Stakes:</b> food inflation can destabilize governments, worsen poverty and push importers toward emergency deals with energy exporters. <b>Proof test:</b> the indicators are rice production estimates, fertilizer tenders, water reservoirs, export restrictions and ASEAN energy-saving measures.`,stats:[`Guardian reporting said Southeast Asia's energy import bill could double to about $160 billion this year.`,`The same story warned that fertilizer shortages could threaten up to 8 million tonnes of rice production across Asia-Pacific.`,`Earlier June reporting cited an 80-90% chance of El Nino forming by November 2026.`],sideA:[`Resilience case`,`Strategic reserves, irrigation and targeted subsidies can prevent a temporary shock from becoming famine politics.`],sideB:[`Cascade case`,`Energy, fertilizer and drought can reinforce one another faster than governments can respond.`],sideC:[`Geopolitical case`,`Russia, Gulf producers and China can gain influence if they supply emergency energy, fertilizer or finance.`],sources:[S(`Guardian Southeast Asia shock`,`https://www.theguardian.com/environment/2026/jun/23/iran-war-oil-prices-hormuz-el-nino-south-east-asia-impact`),S(`Guardian El Nino Asia`,`https://www.theguardian.com/environment/2026/jun/05/el-nino-asia-unpredictable-extreme-weather-climate-change-crisis`),S(`FAO newsroom`,`https://www.fao.org/newsroom/en`)]}];const opinion=[{tag:`Guardian Column`,title:`In Iran, Trump's victory claims only deepened a self-made catastrophe`,author:`Guardian opinion writer`,pub:`The Guardian - June 23, 2026`,thesis:`The column argues that the Iran war and its ending weakened U.S. credibility more than Trump admits.`,text:`The argument responds to the ceasefire memorandum and the administration's public claim that the war ended on favorable terms. It is useful because it separates the fact of de-escalation from the claim of strategic success, arguing that concessions, allied alienation and spectacle politics damaged U.S. authority. For extemp, the piece supplies a critique of coercive diplomacy without denying that stopping a war has value. The strongest pushback is that the column may understate how a ceasefire, however messy, can still reduce immediate civilian and market harm.`,claim:`Trump turned a discretionary war into a credibility loss and then called the exit a victory.`,matters:`It helps speakers argue that outcomes should be judged against original objectives, not closing rhetoric.`,pushback:`A flawed settlement may still be better than continued war if it stops escalation.`,source:S(`Read the column`,`https://www.theguardian.com/commentisfree/2026/jun/23/trump-iran-victory-rationale`)},{tag:`Guardian Editorial`,title:`Trump and Iran: wishful thinking gives way to uncomfortable realities`,author:`Editorial Board`,pub:`The Guardian - June 18, 2026`,thesis:`The editorial argues that diplomacy is necessary but the deal exposes the weakness of maximalist war aims.`,text:`The piece remains relevant because the agreement's inspection and Lebanon provisions are being tested this week. It argues that Washington accepted less than its earlier rhetoric implied, so verification, congressional scrutiny and regional reassurance matter more than claims of triumph. For extemp, the editorial is valuable because it supports de-escalation while still criticizing the strategic path that made de-escalation necessary. The strongest pushback is that diplomacy often requires ambiguity at the start, especially when the alternative is renewed fighting around Hormuz.`,claim:`The Iran deal is a necessary off-ramp from a self-created crisis, not a clean strategic win.`,matters:`It gives a balanced pro-diplomacy but anti-hubris frame for Iran speeches.`,pushback:`Early ambiguity can be a feature of phased agreements rather than proof of failure.`,source:S(`Read the editorial`,`https://www.theguardian.com/commentisfree/2026/jun/18/the-guardian-view-on-trump-and-iran-a-presidents-wishful-thinking-gives-way-to-uncomfortable-realities`)},{tag:`Financial Times Opinion`,title:`We have to manage the AI revolution`,author:`FT opinion writer`,pub:`Financial Times - June 18, 2026`,thesis:`The essay argues that AI needs governance before market power, labor harms and safety risks harden.`,text:`The argument is more urgent after Tuesday's AI-led selloff because it treats the boom as an institutional problem, not just a stock-price story. It connects safety, labor, liability and concentration, warning that competition with China should not become an excuse for unaccountable deployment. For extemp, the piece offers a middle path: AI can be economically important while still requiring rules about auditing, responsibility and distribution. The strongest pushback is that slow or fragmented governance could weaken firms in a fast-moving global race.`,claim:`AI should be steered through accountability and distribution rules before its winners become too powerful.`,matters:`It links worker displacement, safety, competition and democracy in one usable argument.`,pushback:`Heavy regulation may lag the technology and push activity into less transparent jurisdictions.`,source:S(`Read the piece`,`https://www.ft.com/content/59024744-50bf-43f7-9d79-738deabc7a60`)},{tag:`Le Monde Opinion`,title:`Iran emerges in position of strength after ceasefire signed with U.S.`,author:`Le Monde editorial analysis`,pub:`Le Monde - June 18, 2026`,thesis:`The piece argues that sanctions relief and maritime leverage may leave Tehran stronger than Washington suggests.`,text:`This perspective matters because Iran's inspection commitments and Hormuz rules are now disputed in real time. The article argues that Tehran gained economic oxygen while keeping leverage over regional files such as Lebanon and shipping. For extemp, it supplies the skeptical case against front-loaded relief: money and oil access can arrive before enforceable nuclear concessions. The strongest counterargument is that Iran also needs normalization, investment and maritime stability, so its leverage may be narrower than the piece implies.`,claim:`The ceasefire improves Iran's bargaining position more than the U.S. victory narrative admits.`,matters:`It gives students a concise counterweight to deal-as-success claims.`,pushback:`Iran still needs the agreement to repair its economy and regain predictable trade access.`,source:S(`Read the piece`,`https://www.lemonde.fr/en/opinion/article/2026/06/18/iran-emerges-in-position-of-strength-after-ceasefire-signed-with-us_6754630_23.html`)},{tag:`Guardian Review Essay`,title:`The Reverse Centaur's Guide to Life After AI`,author:`Cory Doctorow, reviewed by The Guardian`,pub:`The Guardian - June 22, 2026`,thesis:`The review highlights Doctorow's argument that today's AI boom is driven by labor control and investor hype more than liberation.`,text:`The essay is useful this week because the market selloff and union organizing both raised doubts about who benefits from AI deployment. Doctorow's frame rejects the idea that workers are simply afraid of technology; he argues they are responding to systems designed to deskill, monitor and replace them. For extemp, that gives a labor-centered critique distinct from national-security or existential-risk debates. The strongest pushback is that the review may overgeneralize from exploitative uses and give too little weight to AI tools that genuinely augment workers.`,claim:`The danger is not autonomous machines alone, but executives using AI to discipline labor and inflate valuations.`,matters:`It gives a vivid argument for worker-centered AI regulation.`,pushback:`Some AI deployments can improve productivity and job quality when workers control the tool.`,source:S(`Read the review`,`https://www.theguardian.com/books/2026/jun/22/the-reverse-centaurs-guide-to-life-after-ai-by-cory-doctorow-review-the-real-price-of-artificial-intelligence`)}];const editions={wire:[`The Wire`,`Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer.`],weekly:[`The Weekly`,`The week in consequential developments, grouped like The Wire but selected for events still shaping the map today.`],analytical:[`The Analytical`,`Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points.`],opinion:[`The Opinion`,`Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged.`]};const src=a=>`<div class='wire-sources'>`+a.map(x=>`<a href='${x.u}' target='_blank' rel='noopener'>${x.n} &#8599;</a>`).join(``)+`</div>`;const learn=x=>`<details class='learn'><summary>Learn more</summary><div class='learn-body'><h4>Deeper context</h4><p>${x.context}</p><h4>Three angles</h4><ul>${x.angles.map(a=>`<li>${a}</li>`).join(``)}</ul><h4>What to watch</h4><p>${x.watch}</p></div></details>`;function renderGroups(data){return Object.entries(data).map(([topic,items])=>`<details class='topic'><summary><span>${topic}</span><span class='count'>${items.length} ${items.length===1?`story`:`stories`}</span></summary><div class='stack'>`+items.map(x=>`<article class='wire-item'><h3 class='wire-headline'>${x.h}</h3><p class='wire-prose'>${x.proseHTML}</p>${src(x.sources)}${learn(x.learn)}</article>`).join(``)+`</div></details>`).join(``)}function renderAnalytical(){return analytical.map(x=>`<details class='afile'><summary><div><div class='tag'>${x.tag}</div><h3>${x.headline}</h3><p class='deck'>${x.deck}</p></div></summary><div class='analysis-body'><img class='analysis-img' src='${x.image}' alt='${x.imageAlt}'><div class='credit'><a href='${x.imageCreditUrl}' target='_blank' rel='noopener'>Image: ${x.imageCredit} &#8599;</a></div><p class='walk'>${x.skeletonHTML}</p><div class='stats'><h4>Key Stats With Setup</h4><ul>${x.stats.map(s=>`<li>${s}</li>`).join(``)}</ul></div><h4 class='angles-title' style='margin-top:17px'>Three Angles</h4><div class='angles'>${[[`a`,x.sideA],[`b`,x.sideB],[`c`,x.sideC]].map(([c,v])=>`<div class='angle ${c}'><strong>${v[0]}</strong>${v[1]}</div>`).join(``)}</div>${src(x.sources)}</div></details>`).join(``)}function renderOpinion(){return opinion.map(x=>`<article class='opinion-card'><div class='tag'>${x.tag}</div><h3>${x.title}</h3><div class='by'>${x.author} - ${x.pub}</div><p class='thesis'>${x.thesis}</p><p>${x.text}</p><div class='op-grid'><div class='op-box'><strong>The Claim</strong>${x.claim}</div><div class='op-box'><strong>Why It Matters</strong>${x.matters}</div><div class='op-box'><strong>Pushback</strong>${x.pushback}</div></div>${src([x.source])}</article>`).join(``)}const nav=document.getElementById(`nav`),content=document.getElementById(`content`);Object.entries(editions).forEach(([k,v])=>{const b=document.createElement(`button`);b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById(`edition`).textContent=editions[k][0];document.getElementById(`description`).textContent=editions[k][1];document.querySelectorAll(`.nav button`).forEach(b=>b.classList.toggle(`active`,b.dataset.edition===k));content.innerHTML=k===`wire`?renderGroups(wire):k===`weekly`?renderGroups(weekly):k===`analytical`?renderAnalytical():renderOpinion()}document.getElementById(`headline`).innerHTML=`<div><div class='label'>Headline of the Day - ${headline.topic}</div><h2>${headline.h}</h2><p>${headline.deck}</p></div><figure style='margin:0'><img class='headline-photo' src='${headline.image}' alt='${headline.imageAlt}'><figcaption class='credit'><a href='${headline.imageCreditUrl}' target='_blank' rel='noopener'>Image: ${headline.imageCredit} &#8599;</a></figcaption></figure>`;const saved=localStorage.getItem(`dig-theme`),root=document.documentElement,toggle=document.getElementById(`theme`);function setTheme(t){root.dataset.theme=t;toggle.textContent=`Theme: `+t[0].toUpperCase()+t.slice(1);localStorage.setItem(`dig-theme`,t)}setTheme(saved||`light`);toggle.onclick=()=>setTheme(root.dataset.theme===`light`?`dark`:`light`);show(`wire`);</script></body></html>
