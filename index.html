<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dig - Daily Extemp Brief</title>
<style>
:root{--bg:#ede9df;--paper:#fbfaf5;--paper-2:#f6f1e8;--rail:#282a25;--rail-soft:#32342e;--rail-ink:#f4efe4;--rail-muted:#bdb5a7;--ink:#2e302d;--title:#171915;--muted:#5f625b;--faint:#8a8378;--rule:#d8d0c1;--accent:#8b4b32;--surface:#fff;--surface-tint:#f3eee5;--link:#7a3f2c;--blue:#536f85;--rose:#9b5c56;--olive:#647650;--shadow:0 22px 55px rgba(38,32,24,.11)}
[data-theme="dark"]{--bg:#11120f;--paper:#181916;--paper-2:#20211d;--rail:#0f100e;--rail-soft:#1b1d19;--rail-ink:#f4efe4;--rail-muted:#aaa294;--ink:#e9e3d8;--title:#fff9ed;--muted:#c5bcad;--faint:#948b7c;--rule:#36352f;--accent:#d09a72;--surface:#20211d;--surface-tint:#24241f;--link:#e0aa82;--blue:#82a8c1;--rose:#d18b82;--olive:#a8bd85;--shadow:0 22px 60px rgba(0,0,0,.28)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at top left,rgba(139,75,50,.09),transparent 34rem),linear-gradient(135deg,var(--bg),var(--paper));color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.55}a{color:inherit}button{border-radius:0}.app{width:100%;min-height:100vh;display:grid;grid-template-columns:280px minmax(0,1fr);background:transparent}.rail{min-height:100vh;position:sticky;top:0;align-self:start;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 34%),var(--rail);color:var(--rail-ink);border-right:1px solid rgba(255,255,255,.08);padding:34px 26px 26px;display:flex;flex-direction:column;gap:26px}.brand-word{margin:6px 0 8px;font-family:Georgia,Charter,"Times New Roman",serif;font-size:clamp(3.55rem,4.8vw,4.5rem);line-height:.9;font-weight:500;color:var(--rail-ink)}.date-line{color:var(--rail-muted)}.rail-rule{border-top:1px solid rgba(255,255,255,.13)}.kicker,.section-label,.topic-label,.headline-label,.opinion-label,.analytical-tag{color:var(--faint);font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase}.rail .section-label{color:var(--rail-muted);margin-bottom:12px}.nav{display:grid;gap:12px;counter-reset:tab}.tab-btn{width:100%;border:1px solid transparent;background:transparent;color:var(--rail-muted);font:inherit;text-align:left;padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;gap:14px;transition:background .16s ease,color .16s ease,border-color .16s ease}.tab-btn::after{content:"0" counter(tab);counter-increment:tab;color:rgba(244,239,228,.38);font-size:.72rem;letter-spacing:.08em}.tab-btn:hover,.tab-btn.active{color:var(--rail-ink);background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}.tab-btn.active{font-weight:700}.rail-panel{background:var(--rail-soft);border:1px solid rgba(255,255,255,.1);padding:16px}.rail-panel-title{color:var(--rail-muted);font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}.signal-list{display:grid;gap:11px}.signal{display:grid;grid-template-columns:7px 1fr auto;gap:10px;align-items:center;color:var(--rail-ink);font-size:.86rem}.signal::before{content:"";width:7px;height:7px;background:var(--accent)}.signal span{color:var(--rail-muted);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase}.theme-toggle{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--rail-ink);padding:10px 12px;width:100%;font:inherit;font-size:.86rem;cursor:pointer;text-align:left}.main{min-width:0;background:var(--paper);box-shadow:var(--shadow)}.topbar{min-height:168px;padding:36px 52px 30px;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:minmax(0,1fr) auto;gap:34px;background:linear-gradient(90deg,var(--paper),var(--paper-2))}h1{margin:5px 0 0;font-family:Georgia,Charter,"Times New Roman",serif;font-size:clamp(2.6rem,5.3vw,4.4rem);line-height:1;font-weight:500;color:var(--title)}.edition-desc{margin:12px 0 0;max-width:720px;color:var(--muted);font-size:1rem;line-height:1.55}.compiled{color:var(--muted);text-align:right;font-size:.92rem;line-height:1.65}.brief-stats{display:grid;grid-template-columns:repeat(3,minmax(86px,1fr));gap:10px;min-width:330px;margin-top:18px}.brief-stat{border:1px solid var(--rule);background:rgba(255,255,255,.46);padding:12px}.brief-stat strong{display:block;color:var(--title);font-family:Georgia,Charter,"Times New Roman",serif;font-size:1.35rem;line-height:1;font-weight:500}.brief-stat span{display:block;margin-top:5px;color:var(--faint);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}.main-inner{padding:42px 52px 72px}.main-section{max-width:1240px;margin:0 auto}.headline-day{display:grid;grid-template-columns:minmax(0,1fr) minmax(330px,.72fr);align-items:stretch;border:1px solid var(--rule);background:var(--surface);margin-bottom:28px}.headline-copy{padding:34px;min-height:330px;display:flex;flex-direction:column;justify-content:space-between;border-left:5px solid var(--accent)}.headline-copy h2{margin:12px 0 14px;font-family:Georgia,Charter,"Times New Roman",serif;font-size:clamp(2rem,3.8vw,3.35rem);line-height:1.08;color:var(--title);font-weight:500}.headline-copy p{margin:0;max-width:660px;color:var(--muted);font-size:1.06rem}.headline-media{margin:0;position:relative;min-height:100%;background:var(--surface-tint)}.headline-photo{display:block;width:100%;height:100%;min-height:330px;object-fit:cover;filter:saturate(.86) contrast(1.03)}.headline-media::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 54%,rgba(23,25,21,.42));pointer-events:none}.headline-media .image-credit{position:absolute;left:16px;bottom:14px;z-index:1;color:#fff8ec;text-shadow:0 1px 8px rgba(0,0,0,.4)}.headline-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:26px}.mini-story{border-top:1px solid var(--rule);padding-top:12px;color:var(--muted);font-size:.83rem;line-height:1.45}.mini-story strong{display:block;color:var(--title);font-family:Georgia,Charter,"Times New Roman",serif;font-size:1.04rem;line-height:1.15;font-weight:500;margin-bottom:6px}.image-credit{margin-top:7px;color:var(--faint);font-size:.78rem}.content-wrap{max-width:none;display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:28px;align-items:start}.content-wrap.file-layout{display:block;max-width:980px}.feed{min-width:0;display:grid;gap:16px}.desk-rail{display:grid;gap:14px;position:sticky;top:22px}.desk-card{background:var(--surface);border:1px solid var(--rule);padding:16px}.desk-card h3{margin:0 0 12px;color:var(--title);font-size:.76rem;letter-spacing:.12em;text-transform:uppercase}.desk-line{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--rule);padding:10px 0 0;margin-top:10px;color:var(--muted);font-size:.86rem}.desk-line strong{color:var(--title)}.topic{--topic-accent:var(--accent);background:var(--surface);border:1px solid var(--rule);border-left:4px solid var(--topic-accent)}.topic summary{list-style:none;cursor:pointer;padding:18px 20px;display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center}.topic summary::-webkit-details-marker,.learn summary::-webkit-details-marker,.analytical-file summary::-webkit-details-marker{display:none}.topic .topic-count{justify-self:end;color:var(--topic-accent);font-size:.78rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase}.topic-mark{width:9px;height:32px;background:var(--topic-accent);opacity:.88}.topic-brief{display:block;color:var(--muted);font-size:.88rem;margin-top:2px}.topic summary::after,.analytical-file summary::after{content:"+";color:var(--accent);font-size:1rem;font-weight:700;justify-self:end}.topic[open] summary::after,.analytical-file[open] summary::after{content:"-"}.topic-body{padding:0 20px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.wire-item{padding:18px;border:1px solid var(--rule);background:linear-gradient(180deg,var(--paper),var(--surface));min-height:100%;display:flex;flex-direction:column}.wire-headline{margin:0 0 9px;color:var(--title);font-family:Georgia,Charter,"Times New Roman",serif;font-size:clamp(1.25rem,2vw,1.62rem);line-height:1.22;font-weight:500}.wire-prose{margin:0;color:var(--ink);font-size:.96rem;line-height:1.68}.change{font-weight:700;color:var(--title)}.jargon{color:var(--muted);font-style:italic}.story-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;color:var(--faint);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}.story-meta span{border:1px solid var(--rule);background:var(--surface-tint);padding:4px 7px}.wire-sources{margin-top:auto;padding-top:14px;color:var(--faint);font-size:.82rem;display:flex;flex-wrap:wrap;gap:7px;align-items:center}.sources-label{color:var(--muted);font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.source-link{color:var(--link);font-weight:700;text-decoration:none;margin:0;border-bottom:1px solid rgba(122,63,44,.24)}.source-link:hover{text-decoration:underline;text-underline-offset:3px}.source-link::after{content:" ↗";font-size:.8em}.learn{margin-top:14px;color:var(--muted)}.learn summary{cursor:pointer;list-style:none;color:var(--title);font-weight:800;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--rule);background:var(--surface);padding:7px 10px;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase}.learn summary::before{content:"+";color:var(--accent)}.learn[open] summary::before{content:"-"}.learn-body,.stats-block,.opinion-box,.angle{background:var(--surface);border:1px solid var(--rule)}.learn-body{margin-top:12px;padding:15px 17px;border-left:3px solid var(--accent)}.learn-body h4,.stats-block h3,.angles-title{margin:14px 0 5px;color:var(--title);font-size:.78rem;text-transform:uppercase;letter-spacing:.12em}.learn-body h4:first-child{margin-top:0}.learn-body p{margin:0}.learn-body ul{margin:7px 0 0 18px;padding:0}.analytical-file,.opinion-card{border:1px solid var(--rule);background:var(--surface);margin-bottom:14px}.analytical-file summary{list-style:none;cursor:pointer;padding:24px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}.analytical-summary h2,.opinion-card h2{font-family:Georgia,Charter,"Times New Roman",serif;font-weight:500;line-height:1.14;color:var(--title);margin:7px 0 0}.analytical-deck{margin:7px 0 0;color:var(--muted);max-width:700px}.analytical-body{padding:0 24px 28px}.analytical-image{margin:0 0 22px}.analytical-image img{width:100%;max-height:360px;object-fit:cover;border:1px solid var(--rule);display:block}.skeleton{color:var(--ink);line-height:1.7;margin:0 0 18px}.stats-block{padding:16px 18px;margin:18px 0}.stats-block h3{margin-top:0}.stats-block p{margin:10px 0 0}.angles-grid,.opinion-boxes{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:12px}.angle,.opinion-box{padding:14px}.angle strong,.opinion-box strong{display:block;color:var(--title);margin-bottom:5px}.angle-a{border-left:2px solid var(--blue)}.angle-b{border-left:2px solid var(--rose)}.angle-c{border-left:2px solid var(--olive)}.opinion-card{padding:24px}.opinion-meta,.opinion-subtitle{color:var(--muted);margin:0 0 10px}.opinion-prose{margin:0;line-height:1.68}footer{border-top:1px solid var(--rule);color:var(--faint);padding-top:30px;margin-top:40px;font-size:.84rem}.loading,.error{background:var(--surface);border:1px solid var(--rule);padding:24px;color:var(--muted)}@media(max-width:900px){.app{grid-template-columns:1fr}.rail{position:relative;min-height:auto}.topbar{padding:30px 24px;display:block}.compiled{text-align:left;margin-top:18px}.main-inner{padding:32px 24px 54px}.headline-day,.content-wrap,.topic-body,.angles-grid,.opinion-boxes{grid-template-columns:1fr}.brief-stats{min-width:0;margin-top:24px}.desk-rail{position:static}.headline-copy,.headline-photo{min-height:auto}.headline-strip{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div><div class="brand-word">Dig</div><div class="date-line" id="dateLine">Loading briefing...</div></div>
    <div class="rail-rule"></div>
    <div><div class="section-label">Editions</div><nav class="nav" aria-label="Dig editions"><button class="tab-btn active" data-tab="wire">The Wire</button><button class="tab-btn" data-tab="weekly">The Weekly</button><button class="tab-btn" data-tab="analytical">The Analytical</button><button class="tab-btn" data-tab="opinion">The Opinion</button></nav></div>
    <div class="rail-panel"><div class="rail-panel-title">Desk Signals</div><div class="signal-list"><div class="signal">Energy <span>High</span></div><div class="signal">Public health <span>Live</span></div><div class="signal">Markets <span>Watch</span></div></div></div>
    <button class="theme-toggle" id="themeToggle" type="button">Theme: Light</button>
  </aside>
  <main class="main"><header class="topbar"><div><div class="kicker">Morning Briefing</div><h1 id="editionTitle">The Wire</h1><p class="edition-desc" id="editionDesc"></p></div><div><div class="compiled" id="compiledLine">Loading...</div><div class="brief-stats" id="briefStats"></div></div></header><div class="main-inner"><section class="main-section"><section class="headline-day" id="headlineDay"></section><div class="content-wrap" id="content"><div class="loading">Loading briefing desk...</div></div><footer id="footerLine">Dig briefing loading source links and edition data.</footer></section></div></main>
</div>
<script>
const DATA_BLOB_SHA="4f4c9a7308a0f6a08215b320f80181d26957fa13";
const DATA_URL=`https://api.github.com/repos/cloudkarim/Dig/git/blobs/${DATA_BLOB_SHA}`;
const accents={"US Economy":"#8b4b32","US Politics":"#7a4f68",Healthcare:"#536f85",Climate:"#647650","Climate / Energy":"#647650","Tech / AI":"#6d668d","Latin America":"#8a6740","Africa / Middle East":"#9b5c56","Europe / Ukraine":"#536f85","Asia / China":"#647650"};
const topicBriefs={"US Economy":"Rates, prices, oil, and household pressure.","US Politics":"Power, elections, courts, and institutional limits.",Healthcare:"Outbreaks, regulation, trust, and response capacity.",Climate:"Heat, grids, law, finance, and adaptation stress.","Climate / Energy":"Heat, grids, law, finance, and adaptation stress.","Tech / AI":"Compute, chips, minerals, controls, and enforcement.","Latin America":"Security, migration, sovereignty, and US pressure.","Africa / Middle East":"Conflict, energy, aid, and regional leverage.","Europe / Ukraine":"Air defense, accession politics, and NATO risk.","Asia / China":"Taiwan, trade, deterrence, and supply-chain leverage."};
let appData=null;
function plainText(html){return String(html||"").replace(/<[^>]+>/g,"").replace(/\s+/g," ").trim()}
function shortDeck(html){const t=plainText(html);return t.length>126?`${t.slice(0,126).trim()}...`:t}
function sourceHTML(sources=[]){return `<div class="wire-sources"><span class="sources-label">Sources</span>${sources.map(s=>`<a class="source-link" href="${s.url}" target="_blank" rel="noopener noreferrer">${s.name}</a>`).join("")}</div>`}
function learnHTML(learn){if(!learn)return"";return `<details class="learn"><summary>Dig deeper</summary><div class="learn-body"><h4>Deeper context</h4><p>${learn.context}</p><h4>Three angles</h4><ul>${learn.angles.map(a=>`<li>${a}</li>`).join("")}</ul><h4>What to watch</h4><p>${learn.watch}</p></div></details>`}
function decodeBlob(payload){const bin=atob(payload.content.replace(/\n/g,""));const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder().decode(bytes)}
async function loadData(){const res=await fetch(DATA_URL,{headers:{Accept:"application/vnd.github+json"}});if(!res.ok)throw new Error(`GitHub data load failed: ${res.status}`);const legacyHTML=decodeBlob(await res.json());const script=(legacyHTML.match(/<script>([\s\S]*)<\/script>/)||[])[1];if(!script)throw new Error("Briefing data script missing");const dataBlock=script.slice(0,script.indexOf("function sourceHTML"));const data=Function(`${dataBlock}\nreturn {headline,intros,titles,wire,weekly,analytical,opinion};`)();const dateLine=(legacyHTML.match(/<div class=['\"]date-line['\"]>(.*?)<\/div>/)||[])[1]||"Tuesday, June 2, 2026";const compiled=(legacyHTML.match(/<div class=['\"]compiled['\"]>(.*?)<\/div>/)||[])[1]||"Compiled June 2, 2026<br>America/New_York";const footer=(legacyHTML.match(/<footer>(.*?)<\/footer>/)||[])[1]||"Dig briefing compiled from verified source links.";return {...data,dateLine,compiled,footer}}
function renderHeadline(){const h=appData.headline;const miniStories=appData.wire.slice(0,3).map(group=>`<div class="mini-story"><strong>${group.topic}</strong>${shortDeck(group.stories[0]?.proseHTML)}</div>`).join("");document.getElementById("headlineDay").innerHTML=`<div class="headline-copy"><div><div class="headline-label">${h.topic}</div><h2>${h.h}</h2><p>${h.deck}</p></div><div class="headline-strip">${miniStories}</div></div><figure class="headline-media"><img class="headline-photo" src="${h.image}" alt="${h.imageAlt}" loading="lazy"><figcaption class="image-credit">Image: <a class="source-link" href="${h.imageCreditUrl}" target="_blank" rel="noopener noreferrer">${h.imageCredit}</a></figcaption></figure>`}
function renderStats(tab){const stories=tab==="analytical"?appData.analytical:tab==="opinion"?appData.opinion:appData[tab].flatMap(g=>g.stories);const topics=(tab==="wire"||tab==="weekly")?appData[tab].length:stories.length;const sources=stories.reduce((n,s)=>n+(s.sources?s.sources.length:0),0);document.getElementById("briefStats").innerHTML=`<div class="brief-stat"><strong>${stories.length}</strong><span>Stories</span></div><div class="brief-stat"><strong>${topics}</strong><span>${tab==="wire"||tab==="weekly"?"Topics":"Files"}</span></div><div class="brief-stat"><strong>${sources}</strong><span>Sources</span></div>`}
function renderDeskRail(list){const sourceCount=list.flatMap(g=>g.stories||[]).reduce((n,s)=>n+s.sources.length,0);const first=list[0]?.stories?.[0];return `<aside class="desk-rail" aria-label="Briefing desk"><div class="desk-card"><h3>Briefing Index</h3><div class="desk-line"><span>Topic desks</span><strong>${list.length}</strong></div><div class="desk-line"><span>Reported items</span><strong>${list.flatMap(g=>g.stories||[]).length}</strong></div><div class="desk-line"><span>Linked sources</span><strong>${sourceCount}</strong></div></div><div class="desk-card"><h3>Lead Thread</h3><p>${first?shortDeck(first.proseHTML):"Open a file to scan the strongest argument and source trail."}</p></div></aside>`}
function renderWireList(list){const feed=list.map((group,index)=>{const accent=accents[group.topic]||"#8b4b32";const summary=`<summary><span class="topic-mark" aria-hidden="true"></span><span><span class="topic-label">${group.topic}</span><span class="topic-brief">${topicBriefs[group.topic]||"Context, actors, stakes, and watch points."}</span></span><span class="topic-count">${group.stories.length} stories</span></summary>`;const body=`<div class="topic-body">${group.stories.map((story,i)=>`<article class="wire-item"><div class="story-meta"><span>${group.topic}</span><span>${story.sources.length} sources</span><span>${i===0?"Lead":"Brief"}</span></div><h2 class="wire-headline">${story.h}</h2><p class="wire-prose">${story.proseHTML}</p>${learnHTML(story.learn)}${sourceHTML(story.sources)}</article>`).join("")}</div>`;return `<details class="topic" style="--topic-accent:${accent}" ${index<2?"open":""}>${summary}${body}</details>`}).join("");return `<div class="feed">${feed}</div>${renderDeskRail(list)}`}
function imageHTML(item){if(!item.image)return"";return `<figure class="analytical-image"><img src="${item.image}" alt="${item.imageAlt||""}" loading="lazy"><figcaption class="image-credit">Image: <a class="source-link" href="${item.imageCreditUrl||item.image}" target="_blank" rel="noopener noreferrer">${item.imageCredit||"Source"}</a></figcaption></figure>`}
function renderAnalytical(){return appData.analytical.map(item=>`<details class="analytical-file"><summary><div class="analytical-summary"><div class="analytical-tag">${item.tag}</div><h2>${item.headline}</h2>${item.deck?`<p class="analytical-deck">${item.deck}</p>`:""}</div></summary><div class="analytical-body">${imageHTML(item)}<p class="skeleton">${item.skeletonHTML}</p><section class="stats-block"><h3>Key Stats With Setup</h3>${item.stats.map(s=>`<p>${s}</p>`).join("")}</section><div class="angles-title">Three Angles</div><div class="angles-grid"><div class="angle angle-a"><strong>${item.sideA.label}</strong>${item.sideA.text}</div><div class="angle angle-b"><strong>${item.sideB.label}</strong>${item.sideB.text}</div><div class="angle angle-c"><strong>${item.sideC.label}</strong>${item.sideC.text}</div></div>${sourceHTML(item.sources)}</div></details>`).join("")}
function renderOpinion(){return appData.opinion.map(item=>`<article class="opinion-card"><div class="opinion-label">${item.label}</div><h2>${item.title}</h2><p class="opinion-meta">${item.author} - ${item.publication}, ${item.date}</p><p class="opinion-subtitle"><strong>${item.subtitle}</strong></p><p class="opinion-prose">${item.proseHTML}</p><div class="opinion-boxes"><div class="opinion-box"><strong>The Claim</strong>${item.claim}</div><div class="opinion-box"><strong>Why It Matters</strong>${item.matters}</div><div class="opinion-box"><strong>Pushback</strong>${item.pushback}</div></div>${sourceHTML(item.sources)}</article>`).join("")}
function renderTab(tab){document.querySelectorAll(".tab-btn").forEach(btn=>btn.classList.toggle("active",btn.dataset.tab===tab));document.getElementById("editionTitle").textContent=appData.titles?.[tab]||({wire:"The Wire",weekly:"The Weekly",analytical:"The Analytical",opinion:"The Opinion"})[tab];document.getElementById("editionDesc").textContent=appData.intros[tab];renderStats(tab);const content=document.getElementById("content");content.className=`content-wrap ${tab==="wire"||tab==="weekly"?"wire-layout":"file-layout"}`;if(tab==="wire")content.innerHTML=renderWireList(appData.wire);if(tab==="weekly")content.innerHTML=renderWireList(appData.weekly);if(tab==="analytical")content.innerHTML=renderAnalytical();if(tab==="opinion")content.innerHTML=renderOpinion()}
function applyTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem("dig-theme",theme);document.getElementById("themeToggle").textContent=`Theme: ${theme==="dark"?"Dark":"Light"}`}
function initTheme(){applyTheme(localStorage.getItem("dig-theme")||"light")}
document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>renderTab(btn.dataset.tab)));document.getElementById("themeToggle").addEventListener("click",()=>applyTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"));
(async()=>{try{appData=await loadData();document.getElementById("dateLine").innerHTML=appData.dateLine;document.getElementById("compiledLine").innerHTML=appData.compiled;document.getElementById("footerLine").innerHTML=appData.footer;renderHeadline();initTheme();renderTab("wire")}catch(err){console.error(err);document.getElementById("content").innerHTML=`<div class="error">Briefing failed to load. ${err.message}</div>`}})();
</script>
</body>
</html>
