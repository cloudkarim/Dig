const headline={topic:"Middle East Diplomacy",h:"U.S. and Iran plan to sign a preliminary peace agreement Sunday",deck:"The proposed bargain could reopen the Strait of Hormuz, but nuclear sequencing, sanctions relief and Israeli withdrawal remain unresolved.",image:"https://dims.apnews.com/dims4/default/9e54558/2147483647/strip/true/crop/3540x2360+0+0/resize/1200x800!/quality/90/?url=https%3A%2F%2Fassets.apnews.com%2Fdb%2Fda%2F62a9a57a8e4a39669fe20a109d46%2Fc6f19d1cc1784c13a9c7c66cd7814aca",imageAlt:"Tankers anchored near the Strait of Hormuz off Iran",imageCredit:"Vahid Salemi / AP",imageCreditUrl:"https://apnews.com/article/949710df39e3f1033cbb6beda3955814"};
const wire={
"US Economy":[
W("Oil falls on the promise of a deal, not yet on restored supply",`The Iran war and severe restrictions through the Strait of Hormuz had pushed Brent crude above $90 a barrel and transmitted higher costs into gasoline, freight and inflation expectations. <span class='change'>Brent settled near $82.38 on Friday after Washington and Tehran said a preliminary agreement could be signed Sunday, even though tanker traffic remains constrained.</span> The move is a repricing of political risk rather than evidence that physical exports have normalized. A durable decline will require a signed text, safe-passage rules, lower maritime-insurance costs and visible growth in Gulf shipments; failure on any one of those steps could rapidly restore the war premium.`,[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("Guardian","https://www.theguardian.com/world/2026/jun/13/preliminary-peace-deal-could-be-signed-within-days-says-us-iran-and-mediators")],`A <span class='jargon'>risk premium (the extra price paid because supply might be disrupted)</span> can disappear before physical supply returns, making oil unusually sensitive to negotiating language.`,["Disinflation case: verified reopening lowers transport and consumer costs.","Skeptical case: disputed sequencing leaves the market vulnerable to renewed strikes.","Distribution case: energy-importing developing economies gain more fiscal relief than large producers."],"Watch Sunday's signing, tanker transits, insurance quotations and sanctions guidance."),
W("Consumer mood improves but remains near recessionary levels",`Household confidence had deteriorated for four months as fuel and food costs rose and consumers worried about the wider economy. <span class='change'>The University of Michigan's preliminary June sentiment index rose to 48.9 from 44.8 in May as gasoline prices eased, with the largest relief among lower-income households.</span> The rebound matters because fuel prices are unusually visible and consume a larger share of poorer households' budgets, but the level remains historically weak. Retail sales and inflation expectations will show whether cheaper gasoline creates real spending room or only a brief improvement in mood.`,[S("Guardian","https://www.theguardian.com/business/2026/jun/12/consumer-sentiment-june-data-gas-prices"),S("University of Michigan","https://data.sca.isr.umich.edu/")],`The <span class='jargon'>consumer sentiment index (a survey of household views on finances and the economy)</span> can signal spending changes, although confidence and actual purchases often diverge.`,["Relief case: lower fuel costs free cash for discretionary spending.","Inflation case: oil volatility can reverse the gain quickly.","Labor case: job security may matter more than prices by midsummer."],"Watch final June sentiment, retail sales and the Federal Reserve's June 17 guidance.")],
"US Politics":[
W("Section 702 expires while existing surveillance certifications continue",`Congress has repeatedly renewed <span class='jargon'>Section 702 (the Foreign Intelligence Surveillance Act authority for targeting foreigners abroad without individual warrants)</span>, while civil-liberties groups seek warrants for searches involving Americans' incidentally collected messages. <span class='change'>After the House rejected a short extension 198-218, the statute expired at midnight as lawmakers left Washington until June 23.</span> Existing annual court certifications can sustain current collection into 2027, so there is no immediate intelligence blackout, but new directives and provider cooperation now rest on a weaker legal foundation. The next debate will test whether Congress treats the lapse as pressure for a warrant compromise or simply another deadline for temporary renewal.`,[S("Guardian","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates"),S("ODNI","https://www.dni.gov/index.php/ic-legal-reference-book/fisa-section-702")],`Collection legally targets foreigners overseas, but an American's communications can enter the database when that person contacts a target.`,["Security case: uncertainty impedes new targeting and provider planning.","Privacy case: the operational cushion gives Congress room to add a warrant rule.","Governance case: recurring short extensions prevent durable oversight."],"Watch the June 23 return, warrant amendments and intelligence-agency provider guidance."),
W("A court order forces Trump's name off the Kennedy Center",`The Kennedy Center's statutory name was created by Congress, but the president's appointed board added his name through an internal vote. <span class='change'>A federal judge refused to pause an order requiring removal of the Trump name, holding that the board lacked authority to rename the institution without Congress.</span> The case is narrow, yet it draws a practical boundary between administrative control and the power to alter a congressionally chartered institution's legal identity. Compliance costs, an appeal and any congressional naming bill will determine whether the result becomes a durable separation-of-powers precedent.`,[S("AP","https://apnews.com/article/b222d1ae6a3d206b67ca5abb145dc711"),S("Guardian","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates")],`A <span class='jargon'>federally chartered institution (an organization whose legal status and powers are established by Congress)</span> cannot necessarily be renamed by its managers.`,["Statutory case: boards must follow the name Congress enacted.","Executive case: presidents normally exercise broad control through appointed boards.","Political case: cultural institutions are becoming proxies for executive-power disputes."],"Watch the appeal, physical signage removal and congressional reaction.")],
"Healthcare":[
W("Listeria recall widens around soft cheeses sold under multiple labels",`Listeria is uncommon but can cause miscarriage, meningitis and death, especially among pregnant people, older adults and immunocompromised patients. <span class='change'>Federal and state investigators linked recalled Clover Hill Dairy ricotta and requesón to nine illnesses, eight hospitalizations and one death, and the Maryland plant's license was suspended.</span> The products moved through multiple labels and jurisdictions, making plant number 24-128 more useful than brand recognition alone. Because symptoms can appear weeks after exposure and the bacterium survives refrigeration, case counts may rise after sales stop and consumers must clean surfaces as well as discard cheese.`,[S("FDA recalls","https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts"),S("CDC listeria","https://www.cdc.gov/listeria/about/index.html")],`<span class='jargon'>Whole-genome sequencing (comparing bacterial DNA from patients and foods)</span> lets investigators connect cases that occurred in different places or under different brand names.`,["Containment case: plant closure and recalls should stop new exposure.","Detection case: repackaging can hide the true distribution network.","Equity case: multilingual notices are essential for regional specialty foods."],"Watch CDC case updates, downstream recalls and inspection findings.")],
"Climate":[
W("Northeast heat and drought create a compound health and fire risk",`Large parts of the Northeast entered June with expanding drought and limited early-season heat acclimatization. <span class='change'>Forecasts put more than 100 million people under a corridor of temperatures roughly 10 to 15 degrees above normal, while Connecticut's moderate-drought area jumped from 29% to about 52% in one week.</span> Heat indices near 100°F raise immediate danger for outdoor workers, older adults and people without reliable cooling, while dry vegetation increases brush-fire risk even if scattered storms arrive. Overnight temperatures, not just daytime records, will determine whether bodies and power systems receive enough recovery time.`,[S("NWS heat safety","https://www.weather.gov/safety/heat"),S("U.S. Drought Monitor","https://droughtmonitor.unl.edu/")],`The <span class='jargon'>heat index (how hot conditions feel when humidity limits sweat evaporation)</span> can exceed the measured temperature and better reflect human stress.`,["Preparedness case: cooling centers and worker protections prevent deaths.","Grid case: sustained overnight demand exposes local power weaknesses.","Compound-risk case: drought, wind and lightning can raise fire starts during humid heat."],"Watch overnight lows, emergency-room visits, grid alerts and Thursday's drought map.")],
"Tech / AI":[
W("AI access becomes a development issue, not only a safety debate",`Frontier AI capacity is concentrated where electricity, advanced chips, cloud services, skilled workers and large datasets are already abundant. <span class='change'>The World Bank's June outlook warned that emerging and developing economies are slowing to about 3.6% growth in 2026 just as many need major investment to participate in the AI transition.</span> Countries without reliable compute or local-language data may pay for imported systems while capturing little of the high-value work or productivity gains. Regional data centers, open datasets and workforce financing will therefore shape whether AI narrows service gaps or compounds existing debt and infrastructure constraints.`,[S("World Bank GEP","https://www.worldbank.org/en/publication/global-economic-prospects"),S("NIST AI framework","https://www.nist.gov/itl/ai-risk-management-framework")],`<span class='jargon'>Compute infrastructure (chips, data centers, electricity and networks used to train or run AI)</span> is a prerequisite that software access alone cannot replace.`,["Leapfrog case: cloud tools spread expertise without domestic frontier labs.","Divergence case: infrastructure owners capture most rents.","Policy case: pooled regional compute can lower entry costs."],"Watch World Bank financing, local-language data programs and regional power projects.")],
"Latin America":[
W("Cuba offers investment reforms as fuel scarcity deepens",`Cuba's state-centered economy has struggled with blackouts, food shortages, currency instability and tighter U.S. pressure on oil supplies. <span class='change'>President Miguel Díaz-Canel proposed measures to draw foreign and diaspora capital, reduce some state intermediation and decentralize administration while acknowledging that the island is meeting only about 40% of its oil needs.</span> The announcement could improve access to production inputs, but investors have heard previous openings that did not create enforceable operating space or reliable currency conversion. The credibility test is whether implementing decrees grant private firms direct trade rights and whether electricity availability improves enough for factories and shops to use new capital.`,[S("AP","https://apnews.com/article/cbffe7cf4f435569e1a6d7e42a2bb5fd"),S("Reuters","https://www.reuters.com/world/americas/")],`The <span class='jargon'>state intermediary system (rules requiring many transactions to pass through government entities)</span> adds cost and political control to trade.`,["Reform case: diaspora capital can quickly revive small production.","Skeptical case: property and currency risks remain binding.","Humanitarian case: even partial liberalization can improve food and medicine distribution."],"Watch detailed decrees, remittance rules, import rights and power generation."),
W("Peru's narrow election result shifts attention from victory to governability",`Peru has removed or replaced presidents repeatedly amid conflict with Congress, making institutional durability more important than a campaign mandate. <span class='change'>Keiko Fujimori was declared the runoff winner by a razor-thin margin after a polarized contest shaped by crime and the legacy of her father, Alberto Fujimori.</span> She inherits a fragmented bicameral legislature and pressure for a hard security response to extortion and organized crime. Cabinet appointments, legal challenges and coalition building will show whether the vote produces stability or another cycle of executive-legislative confrontation.`,[S("WSJ","https://www.wsj.com/world/americas/the-daughter-of-a-dictator-wins-power-in-peru-d384158d"),S("ONPE","https://www.onpe.gob.pe/")],`<span class='jargon'>Fujimorismo (the movement built around Alberto Fujimori and continued by Keiko Fujimori)</span> combines market economics, hard-line security and a contested democratic record.`,["Stability case: a security mandate can restore state authority.","Legitimacy case: the margin and family legacy invite resistance.","Institutional case: Congress may determine outcomes more than presidential ideology."],"Watch challenges, cabinet choices, congressional alliances and the July 28 transfer.")],
"Africa / Middle East":[
W("Iran deal text nears signature while the parties describe different bargains",`Three months of war left the Strait of Hormuz constrained, sanctions intact and ceasefires across Iran and Lebanon repeatedly violated. <span class='change'>The United States and Iran said a preliminary agreement is scheduled for signature Sunday in Pakistan, but Washington says nuclear dismantlement is embedded while Tehran says detailed nuclear talks come only after the interim deal begins.</span> Reported provisions connect phased maritime reopening, sanctions relief, frozen assets and Israeli withdrawal, giving each front potential leverage over the others. A signature can stop immediate escalation, but only named verification rules and an agreed order of performance can prevent the same text from producing incompatible expectations.`,[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("Guardian","https://www.theguardian.com/world/2026/jun/13/preliminary-peace-deal-could-be-signed-within-days-says-us-iran-and-mediators")],`A <span class='jargon'>memorandum of understanding (a negotiated framework that precedes detailed or binding implementation rules)</span> can stabilize fighting without resolving every dispute.`,["Breakthrough case: phased rewards allow compliance to be tested.","Spoiler case: Israel, Hezbollah or a maritime incident can unravel the package.","Sequencing case: the order of sanctions, uranium and shipping steps is the real agreement."],"Watch Sunday's ceremony, the published text, verification authority and Israeli response."),
W("Congo term-limit proposal brings constitutional tension into Kinshasa's streets",`The Democratic Republic of Congo is already managing the M23 conflict in the east and fragile diplomacy with Rwanda. <span class='change'>Clashes broke out in Kinshasa over a proposal to change presidential term limits, opening a second front of political instability around President Félix Tshisekedi.</span> Constitutional change can redirect attention and security forces from the eastern war while weakening the legitimacy needed for regional negotiations. The decisive question is whether the proposal advances through formal institutions or becomes a test of whether opposition mobilization can still constrain the presidency.`,[S("AP","https://apnews.com/article/6a29a935dd3ff94f705b9043aaed5278"),S("UN Congo","https://monusco.unmissions.org/en")],`<span class='jargon'>M23 (a Rwanda-backed armed movement operating in eastern Congo)</span> has captured territory and displaced civilians, making national political cohesion strategically important.`,["Continuity case: supporters may argue reform provides time to finish security policy.","Democratic case: changing limits erodes peaceful alternation.","Conflict case: unrest in the capital can weaken leverage in the east."],"Watch the amendment process, opposition arrests and security-force deployment."),
W("MSF alleges abuse and forced returns around a Chad displacement camp",`Sudanese refugees in eastern Chad depend on overstretched camps and aid routes while the war across the border continues. <span class='change'>Médecins Sans Frontières said Chadian security forces abused Sudanese residents and pressured people to return from a camp, allegations authorities denied.</span> Forced or coerced return would violate the principle that refugees should not be sent to places where they face serious danger, while confrontation with aid groups could reduce already limited medical access. Independent investigation and continued humanitarian entry matter because displaced people have little bargaining power and may fear reporting abuse.`,[S("AP","https://apnews.com/article/1ae7e83a37bd8d7c46bda17d99d3e607"),S("MSF","https://www.msf.org/sudan")],`<span class='jargon'>Non-refoulement (the rule against returning refugees to a place where they face persecution or serious harm)</span> is a core protection in refugee law.`,["Accountability case: investigation can protect refugees and aid access.","State case: Chad faces real security and capacity pressures near the border.","Regional case: deteriorating camps can push movement toward Libya and Europe."],"Watch access for investigators, camp transfers and UN refugee-agency reporting.")],
"Europe / EU":[
W("EU accession talks give Ukraine a long-term security track",`Ukraine has candidate status but every major accession step requires unanimous agreement and years of legal reform. <span class='change'>All 27 EU governments cleared the opening of formal negotiations with Ukraine and Moldova, with the first intergovernmental work set to begin Monday.</span> The move cannot substitute for battlefield aid, yet it ties reconstruction, rule-of-law reform and market access to a durable European process. Progress through negotiating clusters and resistance from individual governments will show whether enlargement becomes a credible strategic anchor rather than a symbolic promise.`,[S("AP","https://apnews.com/article/6cd2ec3d41bd45c8115c6ee41eb1a114"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],`An <span class='jargon'>accession cluster (a group of EU law and policy chapters negotiated together)</span> opens and closes only after benchmarks are met.`,["Security case: membership reforms make occupation less likely to pay over time.","Capacity case: the EU may struggle to absorb large new members.","Conditionality case: the process can strengthen institutions even before membership."],"Watch Monday's opening session, the fundamentals cluster and veto threats.")],
"China":[
W("China's support for Iran exposes the limits of strategic partnership",`Beijing buys Iranian oil and presents itself as an alternative diplomatic pole, but it also depends on stable Gulf shipping and trade with Arab energy producers. <span class='change'>As Washington and Tehran moved toward a preliminary deal, attention shifted to China's inability or unwillingness to prevent the conflict from disrupting a route central to its own energy security.</span> China benefits if U.S.-led diplomacy reopens Hormuz without requiring Beijing to bear military costs, but that outcome also demonstrates the gap between rhetorical alignment and crisis management. Future Chinese guarantees, oil purchases and naval behavior will indicate whether it seeks a larger security role or remains a selective economic partner.`,[S("BBC","https://www.bbc.com/news/articles/c62xrm3wz21o"),S("China Foreign Ministry","https://www.fmprc.gov.cn/eng/")],`A <span class='jargon'>strategic partnership (coordinated political and economic alignment short of a formal defense alliance)</span> does not automatically require military support.`,["Restraint case: avoiding war protects China's broader Gulf relationships.","Credibility case: limited help makes partners doubt Beijing's security value.","Opportunity case: reconstruction and mediation can expand influence after a U.S.-brokered truce."],"Watch Chinese statements on verification, Iranian oil purchases and Gulf naval deployments.")],
"War / Active Conflicts":[
W("Ukraine combines EU integration with pressure on Russian logistics",`With front lines moving slowly, Kyiv has sought ways to raise the cost of occupation without relying on a rapid ground breakthrough. <span class='change'>Ukraine reported attacks on the Chonhar crossing, Crimean fuel networks and the R-280 corridor as EU governments simultaneously approved the opening of accession talks.</span> The two tracks work on different timelines: logistics interdiction can affect current combat operations, while accession builds legal and investment commitments that Russia would have to reverse politically. Evidence of reduced military cargo and sustained EU negotiating progress will determine whether time is shifting in Ukraine's favor.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],`<span class='jargon'>Interdiction (attacking routes and supplies before they reach frontline forces)</span> aims to reduce combat capacity without immediately seizing territory.`,["Pressure case: cumulative supply disruption weakens occupation.","Adaptation case: Russia can reroute and absorb costs.","Institutional case: EU integration may matter more than short-term territorial movement."],"Watch Russian fuel availability in Crimea, repair times and accession benchmarks."),
W("Gaza aid still depends on access rules rather than announced supply",`Humanitarian agencies have repeatedly warned that available food and medicine cannot reach civilians at sufficient scale when crossings, inspections and internal routes are restricted. <span class='change'>New diplomatic attention around the Iran framework has revived calls to connect regional de-escalation with reliable Gaza aid access, but no mechanism yet guarantees sustained delivery.</span> Announced truck totals matter less than the amount distributed safely inside Gaza, where displacement and damaged infrastructure magnify disease and malnutrition. A credible improvement requires predictable crossings, protected routes, fuel for hospitals and transparent monitoring rather than episodic surges.`,[S("UN OCHA","https://www.ochaopt.org/"),S("WHO occupied Palestinian territory","https://www.emro.who.int/countries/opt/index.html")],`<span class='jargon'>Humanitarian access (safe, sustained permission for relief staff and supplies to reach civilians)</span> includes internal movement, not only border entry.`,["Regional-deal case: linked diplomacy can create leverage for aid.","Insulation case: Gaza should not depend on unrelated nuclear bargaining.","Implementation case: distribution security is the binding constraint."],"Watch crossing hours, delivered aid, hospital fuel and independent monitoring.")]
};
const weekly={
"US Economy":[W("World Bank lowers the global growth path",`The global economy entered 2026 with high debt and weak investment after repeated pandemic, trade and energy shocks. <span class='change'>The World Bank projected 2.5% global growth and about 3.6% growth for emerging and developing economies, the weakest broad pace since the pandemic.</span> The forecast matters because poorer governments face higher food and energy bills while needing to finance climate adaptation and digital infrastructure. Watch whether an Iran agreement lowers borrowing and fertilizer costs, not only headline oil.`,[S("World Bank","https://www.worldbank.org/en/publication/global-economic-prospects")],"Debt service and imported inflation reduce the fiscal space available for investment.",["Fast normalization","Persistent scarring","Development divergence"],"Watch sovereign spreads, fertilizer prices and revised growth forecasts."),W("Gasoline prices dominate the household outlook",`The week's confidence data showed how quickly geopolitical energy costs reach household expectations. <span class='change'>Sentiment improved from 44.8 to 48.9 as gasoline eased, but remained at a level associated with acute economic stress.</span> Lower-income households reported the largest change because fuel consumes more of their budgets. The next test is whether spending improves before oil volatility returns.`,[S("Guardian","https://www.theguardian.com/business/2026/jun/12/consumer-sentiment-june-data-gas-prices")],"Visible prices often move political perceptions faster than aggregate inflation data.",["Consumer relief","Renewed shock","Labor-market override"],"Watch retail sales and inflation expectations.")],
"US Politics":[W("Congress lets Section 702 lapse",`Lawmakers spent the week divided between intelligence continuity and warrant protections for American searches. <span class='change'>A 198-218 House vote defeated the short extension and allowed the statute to expire while existing certifications remained in force.</span> That cushion prevents an immediate shutdown but also reduces pressure for a rushed bill. The June 23 return will reveal whether the lapse produces a durable compromise.`,[S("ODNI","https://www.dni.gov/index.php/ic-legal-reference-book/fisa-section-702")],"Annual court certifications and statutory authority operate on different clocks.",["Security continuity","Privacy leverage","Process failure"],"Watch warrant language and provider guidance."),W("Kennedy Center fight becomes a statutory-power test",`The board's decision to add President Trump's name transformed a cultural dispute into a legal question about who can rename a federal institution. <span class='change'>A judge ordered the name removed and denied a pause, emphasizing Congress's role.</span> The ruling is useful beyond the signage because it distinguishes appointment power from authority to rewrite a charter. An appeal will test the durability of that boundary.`,[S("AP","https://apnews.com/article/b222d1ae6a3d206b67ca5abb145dc711")],"Congress established the institution and its legal name.",["Separation of powers","Administrative control","Culture-war proxy"],"Watch the appeal and congressional action.")],
"Healthcare":[W("Soft-cheese outbreak demonstrates the difficulty of tracing repackaged food",`The outbreak unfolded across brands and jurisdictions rather than through a single familiar retail label. <span class='change'>Investigators linked nine illnesses, eight hospitalizations and one death to Clover Hill Dairy products and suspended the plant's license.</span> The case belongs in the weekly brief because long incubation and repackaging can generate delayed recalls. Plant codes, genome matches and distributor records will shape the final scope.`,[S("FDA","https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts")],"Listeria persists in cold processing environments and can cause severe invasive illness.",["Recall containment","Hidden distribution","Risk communication"],"Watch CDC sequencing and secondary recalls.")],
"Climate":[W("Early heat meets worsening drought in the Northeast",`The region moved from a mild spring into a broad heat event before many households and workplaces had acclimatized. <span class='change'>Forecast temperatures rose 10 to 15 degrees above normal while drought expanded sharply in parts of New England.</span> The combination raises health, electricity and brush-fire risks at the same time. Overnight lows and sustained rainfall will matter more than isolated record highs.`,[S("NWS","https://www.weather.gov/safety/heat"),S("Drought Monitor","https://droughtmonitor.unl.edu/")],"Compound events produce greater damage than heat or drought considered separately.",["Preparedness","Grid stress","Fire risk"],"Watch nighttime temperatures and drought updates.")],
"Tech / AI":[W("Washington tilts toward AI acceleration while development gaps widen",`Frontier labs and the U.S. government debated voluntary review, military adoption and strategic competition throughout the week. <span class='change'>At the same time, the World Bank highlighted that many developing countries lack the power, compute, skills and data needed to capture productivity gains.</span> The contrast creates two governance problems: restraining capability at the frontier and enabling access elsewhere. Policies that address only one can entrench incumbents.`,[S("NIST","https://www.nist.gov/itl/ai-risk-management-framework"),S("World Bank","https://www.worldbank.org/en/publication/global-economic-prospects")],"AI governance includes access and market structure as well as model safety.",["Accelerate","Regulate","Development compact"],"Watch procurement rules and regional compute financing.")],
"Latin America":[W("Peru's election ends but the governability test begins",`Peru's repeated presidential crises meant the runoff could not be judged only by the winner. <span class='change'>Keiko Fujimori emerged with a narrow victory and now must assemble support in a fragmented legislature.</span> Security policy, cabinet legitimacy and relations with Congress will determine whether the transfer restores stability. The close result also ensures that legal and political opposition will remain active.`,[S("ONPE","https://www.onpe.gob.pe/"),S("WSJ","https://www.wsj.com/world/americas/the-daughter-of-a-dictator-wins-power-in-peru-d384158d")],"Peru's institutional fragmentation has repeatedly shortened presidencies.",["Security mandate","Legitimacy constraint","Congressional dominance"],"Watch challenges, cabinet names and coalition agreements."),W("Cuba's oil shortage forces another reform opening",`Cuba's long economic contraction worsened as fuel shortages constrained electricity and production. <span class='change'>The government acknowledged meeting only about 40% of oil needs and promised wider access for foreign and diaspora investment.</span> The announcement matters only if decrees reduce state bottlenecks and currency risk. Electricity supply will be the clearest near-term measure of whether reform changes daily life.`,[S("AP","https://apnews.com/article/cbffe7cf4f435569e1a6d7e42a2bb5fd")],"Previous reform announcements often left implementation centralized.",["Opening","Credibility gap","Humanitarian relief"],"Watch import rights, remittances and generation data.")],
"Africa / Middle East":[W("Iran diplomacy links shipping, sanctions, nuclear issues and Lebanon",`The week began with renewed strikes and ended with plans for a preliminary agreement. <span class='change'>Mediators assembled a package built around phased Hormuz reopening, sanctions relief, frozen assets and a later nuclear track.</span> Linking fronts can create enough value for compromise, but it also gives every dispute a veto. The published sequencing and verification mechanism will matter more than the ceremony.`,[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("Guardian","https://www.theguardian.com/world/2026/jun/13/preliminary-peace-deal-could-be-signed-within-days-says-us-iran-and-mediators")],"Complex peace packages trade breadth for implementation risk.",["Comprehensive bargain","Too many spoilers","Mediator leverage"],"Watch Sunday's text and compliance timetable."),W("Political unrest compounds Congo's eastern security crisis",`Congo spent the week balancing regional diplomacy over M23 with a domestic constitutional dispute. <span class='change'>A term-limit proposal brought clashes to Kinshasa and threatened to divide attention and security capacity.</span> National legitimacy matters directly to negotiations with Rwanda and armed groups. A contested amendment could weaken both domestic stability and external bargaining power.`,[S("AP","https://apnews.com/article/6a29a935dd3ff94f705b9043aaed5278"),S("MONUSCO","https://monusco.unmissions.org/en")],"Capital-city instability can affect battlefield command and diplomatic credibility.",["Continuity","Democratic erosion","Conflict spillover"],"Watch parliamentary procedure and opposition mobilization.")],
"Europe / EU":[W("Ukraine and Moldova move from candidacy to negotiations",`EU candidate status was politically important but did not itself begin the detailed legal process of membership. <span class='change'>All 27 governments agreed to open formal talks, converting a wartime promise into a structured negotiation.</span> The process creates leverage for rule-of-law and market reforms while giving Ukraine a long-term institutional anchor. Unanimity at later stages remains the central vulnerability.`,[S("AP","https://apnews.com/article/6cd2ec3d41bd45c8115c6ee41eb1a114"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],"Accession negotiations measure compliance across the full body of EU law.",["Strategic enlargement","Absorption limits","Conditional reform"],"Watch the fundamentals cluster and veto politics.")],
"China":[W("The Iran war tests China's claim to be a security partner",`China's energy and diplomatic ties to Iran gave Beijing a direct stake in keeping Hormuz open. <span class='change'>The week's movement toward a U.S.-Iran deal highlighted that China had not supplied the decisive crisis-management mechanism.</span> Beijing can still benefit from de-escalation and reconstruction, but partners will compare its rhetoric with its willingness to assume risk. That credibility question will shape future Gulf alignments.`,[S("BBC","https://www.bbc.com/news/articles/c62xrm3wz21o"),S("China Foreign Ministry","https://www.fmprc.gov.cn/eng/")],"Economic partnership does not automatically translate into security guarantees.",["Prudent restraint","Credibility loss","Postwar opportunity"],"Watch guarantees, oil flows and mediation roles.")],
"War / Active Conflicts":[W("Ukraine targets logistics while Europe opens an institutional front",`Ukraine cannot rely on quick battlefield breakthroughs, and NATO membership remains unavailable during active war. <span class='change'>This week paired attacks on Crimean logistics with EU approval for accession talks.</span> The combined strategy raises current occupation costs while improving Ukraine's future political anchor. Its success depends on measurable supply disruption and continued European unity.`,[S("Guardian","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],"Military interdiction and institutional integration operate on different timelines.",["Time favors Kyiv","Russia absorbs cost","Conditional Europe"],"Watch Russian logistics and accession benchmarks."),W("Sudan's displacement crisis pressures neighboring Chad",`The Sudan war has pushed refugees into countries with limited aid capacity and their own security concerns. <span class='change'>MSF allegations of abuse and pressure to return refugees from a Chadian camp made protection policy a live regional issue.</span> Coerced return could expose people to renewed violence and undermine humanitarian operations. Independent access and donor support are necessary to prevent camps from becoming another source of instability.`,[S("AP","https://apnews.com/article/1ae7e83a37bd8d7c46bda17d99d3e607"),S("UNHCR Sudan","https://data.unhcr.org/en/situations/sudansituation")],"Neighboring states carry large costs when wars remain unresolved.",["Protection","Capacity pressure","Secondary migration"],"Watch investigations, funding and border movements.")]
};
const analytical=[
{tag:"Middle East Diplomacy",headline:"The Iran agreement is a sequencing problem disguised as a peace announcement",deck:"A signature can stop immediate escalation; only implementation can reconcile incompatible public descriptions.",image:headline.image,imageAlt:headline.imageAlt,imageCredit:headline.imageCredit,imageCreditUrl:headline.imageCreditUrl,skeletonHTML:`<b>Baseline:</b> months of war left Hormuz traffic restricted, sanctions intact, frozen assets unresolved and nuclear material outside a verified settlement. <b>Move:</b> mediators scheduled a preliminary agreement for Sunday, but Washington says nuclear dismantlement is included while Tehran says detailed nuclear talks follow implementation. <b>Mechanism:</b> Iran seeks phased sanctions relief and sovereignty over shipping; the United States seeks verifiable maritime access and nuclear limits; Israel and Hezbollah retain independent capacity to disrupt the Lebanon portion. <b>Stakes:</b> the order of compliance determines whether either side can sell the agreement domestically without appearing to surrender first. <b>Proof test:</b> a durable bargain requires a published timetable, named verifier, tanker protocol, asset-release conditions and a process for violations.`,stats:["Brent settled near $82.38 Friday after trading above $90 during the disruption, showing the size of the political risk premium.","The parties expect a later nuclear negotiating phase of roughly 60 days, making the interim verification period decisive.","Existing proposals involve billions of dollars in frozen Iranian assets, giving Gulf intermediaries material leverage."],sideA:["Phased peace","Performance-based rewards let both parties test compliance before a grand bargain."],sideB:["Paper truce","Different public definitions of the same text can produce a rapid implementation crisis."],sideC:["Mediator power","Pakistan, Oman, Qatar, the UAE and Switzerland may control the channels and assets that make compliance possible."],sources:[S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814"),S("Guardian","https://www.theguardian.com/world/2026/jun/13/preliminary-peace-deal-could-be-signed-within-days-says-us-iran-and-mediators")]},
{tag:"Global Economy",headline:"Hormuz turned energy security into a development and debt problem",deck:"Even a successful truce leaves fertilizer, borrowing and cancelled-investment damage behind.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Container_ship_at_the_port_of_Hamburg.jpg",imageAlt:"Container ship and cranes at a major commercial port",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/Category:Container_ships",skeletonHTML:`<b>Baseline:</b> developing economies entered 2026 with high debt, weak per-capita income gains and limited fiscal room. <b>Change:</b> the Iran shock raised oil, shipping and fertilizer costs while the World Bank lowered global growth to 2.5% and emerging-market growth to 3.6%. <b>Transmission:</b> import bills weaken currencies; central banks keep rates high; debt service crowds out health, climate and digital investment; fertilizer costs reach food prices with a lag. <b>Stakes:</b> countries least able to build AI and clean-energy infrastructure also bear the largest cost of stabilizing basic consumption. <b>Proof test:</b> normalization must lower sovereign spreads and farm-input costs, not only spot crude.`,stats:["The World Bank forecasts 2.5% global growth in 2026, the weakest pace since the pandemic.","Emerging and developing economies are forecast near 3.6%, with weak per-capita gains relative to pre-pandemic expectations.","Oil fell toward $82 on diplomacy, but shipping insurance and fertilizer contracts adjust more slowly."],sideA:["Fast normalization","Reopened shipping can lower inflation expectations and permit earlier rate relief."],sideB:["Persistent scarring","Debt, cancelled investment and food-production costs outlast the spot-price shock."],sideC:["Technology divide","Fiscal stress prevents poorer states from building the compute and power needed for future productivity."],sources:[S("World Bank","https://www.worldbank.org/en/publication/global-economic-prospects"),S("AP","https://apnews.com/article/949710df39e3f1033cbb6beda3955814")]},
{tag:"Ukraine / Europe",headline:"Accession and logistics pressure form Ukraine's two-track strategy",deck:"Kyiv is making occupation more expensive now while building a durable European anchor.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Flags_of_EU_and_Ukraine.jpg",imageAlt:"European Union and Ukrainian flags displayed together",imageCredit:"Yakovlev Sergey / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Flags_of_EU_and_Ukraine.jpg",skeletonHTML:`<b>Baseline:</b> battlefield movement is slow, NATO membership is unavailable during war and peace negotiations remain uncertain. <b>Change:</b> EU governments agreed to open accession talks while Ukraine intensified attacks on Crimean road, bridge and fuel networks. <b>Mechanism:</b> accession creates legal and investment commitments over years; interdiction imposes immediate costs without a risky frontal breakthrough. <b>Stakes:</b> the combination challenges Russia's theory that time automatically favors occupation. <b>Proof test:</b> logistics disruption must affect Russian combat tempo, and EU clusters must continue advancing through rule-of-law benchmarks.`,stats:["All 27 EU members approved opening talks; every later closing decision will also require unanimity.","Ukraine reported a 71% fall in military cargo on one targeted Crimean corridor over two weeks.","Fuel disruption across road, rail and sea routes raises the cost of sustaining occupied Crimea even without territorial movement."],sideA:["Time can favor Kyiv","Cumulative logistics pressure and EU integration improve leverage without costly offensives."],sideB:["Russia can absorb cost","Moscow retains strategic depth, oil income and escalation options against cities."],sideC:["Conditional integration","EU leverage may strengthen Ukrainian institutions even if full membership remains distant."],sources:[S("AP","https://apnews.com/article/6cd2ec3d41bd45c8115c6ee41eb1a114"),S("Guardian","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")]},
{tag:"US Law & Security",headline:"Section 702's lapse exposes the cost of governing surveillance by deadline",deck:"Collection continues for now, but Congress has postponed the privacy bargain until it became a crisis.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/United_States_Capitol_-_west_front.jpg",imageAlt:"West front of the United States Capitol",imageCredit:"Architect of the Capitol / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:United_States_Capitol_-_west_front.jpg",skeletonHTML:`<b>Baseline:</b> Section 702 allows warrantless targeting of foreigners abroad, while incidentally collected American communications may later be queried. <b>Change:</b> the House rejected a short extension 198-218 and the statute expired while lawmakers left town. <b>Mechanism:</b> existing Foreign Intelligence Surveillance Court certifications continue into 2027, but new directives, provider cooperation and long-term planning become harder. <b>Stakes:</b> both camps can overstate the immediate result: collection does not stop overnight, but statutory uncertainty is not costless. <b>Proof test:</b> a durable law needs targeting rules, auditable U.S.-person queries, a clear warrant standard and consequences for misuse.`,stats:["The House vote was 198-218, failing even a simple majority.","Existing annual certifications can continue into 2027, limiting the immediate operational gap.","Lawmakers are not scheduled to return until June 23, guaranteeing a statutory lapse."],sideA:["Security continuity","Foreign-intelligence collection is too central to expose to recurring expiration."],sideB:["Constitutional correction","The lapse creates leverage for warrants before searching Americans' messages."],sideC:["Process failure","Temporary extensions allow tactical disputes to replace durable surveillance design."],sources:[S("ODNI","https://www.dni.gov/index.php/ic-legal-reference-book/fisa-section-702"),S("Guardian","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates")]}
];
const opinion=[
{tag:"Le Monde Editorial",title:"Trump's powerlessness in the Iranian trap",author:"Editorial Board",pub:"Le Monde · June 9, 2026",thesis:"Military escalation strengthened Iran's bargaining leverage and exposed the limits of personalized coercive diplomacy.",text:`The editorial argues that the campaign failed to produce regime collapse or a clean strategic victory and instead allowed Tehran to use Hormuz as leverage over the global economy. The scheduled preliminary agreement makes the thesis live because Washington may accept a phased bargain after months of claiming force would compel decisive surrender. The argument matters as a warning that destructive capacity is not the same as political control. The strongest pushback is that military and economic pressure may have been necessary to bring Iran into a performance-based negotiation.`,claim:"Trump converted overwhelming military power into an expensive negotiation on terms Iran can still contest.",matters:"Separates battlefield damage from the political ability to impose a durable settlement.",pushback:"Coercion may have created the urgency and asset leverage that made the current framework possible.",source:S("Read editorial","https://www.lemonde.fr/en/opinion/article/2026/06/09/trump-s-powerlessness-in-the-iranian-trap_6754283_23.html")},
{tag:"Guardian Foreign Affairs",title:"Trump's failure to maintain ceasefires is part of the new world disorder",author:"Simon Tisdall",pub:"The Guardian · June 7, 2026",thesis:"Headline truces fail when leaders neglect verification, sequencing and institutions.",text:`Tisdall links recurring violence in Iran, Lebanon, Gaza and Ukraine to diplomacy centered on declarations rather than enforceable architecture. The argument is newly relevant because the proposed U.S.-Iran memorandum still leaves nuclear sequencing, Israeli withdrawal and shipping rules disputed. Its value is to explain why a ceasefire can reduce immediate fire without resolving the incentives that restart it. Pushback is that even excellent process cannot manufacture compromise when armed actors still believe force will improve their terms.`,claim:"Durable peace requires mechanisms and patient implementation, not leader-to-leader spectacle.",matters:"Provides a common explanation for several formally separate ceasefires that keep producing combat.",pushback:"Institutions are ineffective without coercive leverage and willing parties.",source:S("Read column","https://www.theguardian.com/commentisfree/2026/jun/07/donald-trump-ceasefire-failure-ukraine-iran-gaza-lebanon-gaza")},
{tag:"Guardian Editorial",title:"Ukraine and the prospects of peace: time to ramp up pressure on Putin",author:"Editorial Board",pub:"The Guardian · June 9, 2026",thesis:"Ukraine's improving strike capacity gives Europe reason to increase support rather than negotiate from assumed defeat.",text:`The editorial argues that Russia's stalled territorial progress and Ukraine's deep-strike campaign have changed the immediate balance enough to justify stronger sanctions and air-defense support. The EU decision to open accession talks adds an institutional version of the same strategy: make time less favorable to Moscow. The argument matters because it rejects the claim that aid merely delays an inevitable outcome. Its limitation is that logistics pain and European integration do not erase Russia's manpower, industrial depth or escalation options.`,claim:"Sustained European pressure can improve the terms of eventual negotiations.",matters:"Reframes Ukraine as a contest in which outside policy still changes leverage.",pushback:"Higher pressure may increase costs without producing mutually acceptable territorial terms.",source:S("Read editorial","https://www.theguardian.com/commentisfree/2026/jun/09/the-guardian-view-on-ukraine-and-the-prospects-of-peace-time-to-ramp-up-the-pressure-on-putin-")},
{tag:"Technology Column",title:"All signs point to Trump pushing AI growth",author:"Blake Montgomery",pub:"The Guardian · June 9, 2026",thesis:"The administration's safety language is secondary to military adoption, strategic competition and the financial upside of AI firms.",text:`Montgomery reads voluntary model review, Pentagon acceleration and possible federal equity stakes as parts of a growth-first policy. The argument is live because frontier labs can benefit commercially from safety pauses while poorer countries lack the infrastructure to participate at all. It matters because government could become regulator, buyer and shareholder at once. Pushback is that procurement and ownership can create leverage for stronger disclosure and testing if those conditions are explicit.`,claim:"Expect U.S. policy to maximize capability and company value before constraining frontier development.",matters:"Connects national security, market incentives and safety governance in one framework.",pushback:"A government stake could impose conditions unavailable to a distant regulator.",source:S("Read column","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic")}
];
const editions={wire:["The Wire","Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer."],weekly:["The Weekly","The week in consequential developments, grouped like The Wire but selected for events still shaping the map today."],analytical:["The Analytical","Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points."],opinion:["The Opinion","Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."]};
const src=a=>'<div class="sources">'+a.map(x=>'<a href="'+x.u+'" target="_blank" rel="noopener">'+x.n+' ↗</a>').join('')+'</div>';
const learn=x=>'<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>'+x.context+'</p><h4>Three angles</h4><ul>'+x.angles.map(a=>'<li>'+a+'</li>').join('')+'</ul><h4>What to watch</h4><p>'+x.watch+'</p></div></details>';
function renderGroups(data){return Object.entries(data).map(([topic,items])=>'<details class="topic"><summary><span>'+topic+'</span><span class="count">'+items.length+' '+(items.length===1?'story':'stories')+'</span></summary><div class="stack">'+items.map(x=>'<article class="wire-item"><h3 class="wire-headline">'+x.h+'</h3><p class="wire-prose">'+x.proseHTML+'</p>'+src(x.sources)+learn(x.learn)+'</article>').join('')+'</div></details>').join('')}
function renderAnalytical(){return analytical.map(x=>'<details class="afile"><summary><div><div class="tag">'+x.tag+'</div><h3>'+x.headline+'</h3><p class="deck">'+x.deck+'</p></div></summary><div class="analysis-body"><img class="analysis-img" src="'+x.image+'" alt="'+x.imageAlt+'"><div class="credit"><a href="'+x.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+x.imageCredit+' ↗</a></div><p class="walk">'+x.skeletonHTML+'</p><div class="stats"><h4>Key Stats With Setup</h4><ul>'+x.stats.map(s=>'<li>'+s+'</li>').join('')+'</ul></div><h4 class="angles-title" style="margin-top:17px">Three Angles</h4><div class="angles">'+[["a",x.sideA],["b",x.sideB],["c",x.sideC]].map(([c,v])=>'<div class="angle '+c+'"><strong>'+v[0]+'</strong>'+v[1]+'</div>').join('')+'</div>'+src(x.sources)+'</div></details>').join('')}
function renderOpinion(){return opinion.map(x=>'<article class="opinion-card"><div class="tag">'+x.tag+'</div><h3>'+x.title+'</h3><div class="by">'+x.author+' · '+x.pub+'</div><p class="thesis">'+x.thesis+'</p><p>'+x.text+'</p><div class="op-grid"><div class="op-box"><strong>The Claim</strong>'+x.claim+'</div><div class="op-box"><strong>Why It Matters</strong>'+x.matters+'</div><div class="op-box"><strong>Pushback</strong>'+x.pushback+'</div></div>'+src([x.source])+'</article>').join('')}
const nav=document.getElementById("nav"),content=document.getElementById("content");Object.entries(editions).forEach(([k,v])=>{const b=document.createElement("button");b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById("edition").textContent=editions[k][0];document.getElementById("description").textContent=editions[k][1];document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.edition===k));content.innerHTML=k==="wire"?renderGroups(wire):k==="weekly"?renderGroups(weekly):k==="analytical"?renderAnalytical():renderOpinion()}
document.getElementById("headline").innerHTML='<div><div class="label">Headline of the Day · '+headline.topic+'</div><h2>'+headline.h+'</h2><p>'+headline.deck+'</p></div><figure style="margin:0"><img class="headline-photo" src="'+headline.image+'" alt="'+headline.imageAlt+'"><figcaption class="credit"><a href="'+headline.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+headline.imageCredit+' ↗</a></figcaption></figure>';
const saved=localStorage.getItem("dig-theme"),root=document.documentElement,toggle=document.getElementById("theme");function setTheme(t){root.dataset.theme=t;toggle.textContent='Theme: '+t[0].toUpperCase()+t.slice(1);localStorage.setItem("dig-theme",t)}setTheme(saved||"light");toggle.onclick=()=>setTheme(root.dataset.theme==="light"?"dark":"light");show("wire");
</script></body></html>
