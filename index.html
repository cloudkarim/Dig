{label:'CFR Essay',title:'Trump Project Freedom Is Not Going to Open the Strait of Hormuz',author:'Max Boot',publication:'Council on Foreign Relations',date:'May 4, 2026',subtitle:'Boot argues that military pressure cannot substitute for diplomacy capable of making commercial shipping safe again.',proseHTML:`The essay responds to the live Hormuz crisis behind today energy story: the United States can deploy ships and strike targets without convincing private tankers and insurers that the route is safe. Its value is the distinction between tactical coercion and strategic access, which matters when oil prices and fertilizer supply chains become the scoreboard. The argument helps explain why a maritime framework may be necessary even for policymakers who favor pressure on Iran. The strongest pushback is that coercive leverage may be what brought Iran to negotiations at all.`,claim:'Military operations alone cannot reopen a chokepoint if the adversary retains credible ways to threaten commercial shipping.',matters:'It gives extemp speakers a clear distinction between battlefield action and strategic outcome.',pushback:'Force can still create bargaining leverage when diplomacy alone fails.',sources:[{name:'CFR',url:'https://www.cfr.org/articles/trumps-project-freedom-isnt-going-to-open-the-strait-of-hormuz'}]},
{label:'Chatham House Analysis',title:'Trump Approach to Taiwan Could Jeopardize Its Future',author:'Chatham House contributors',publication:'Chatham House',date:'May 2026',subtitle:'The piece argues that transactional Taiwan language can weaken alliance confidence even if formal policy does not change.',proseHTML:`The analysis starts from the Trump-Xi summit and the live concern that Taiwan arms sales, trade, rare earths, and AI chips could be treated as bargaining pieces in one grand negotiation. It matters now because allies in the Indo-Pacific judge US credibility partly by how Washington talks about another partner security. The argument adds value by framing Taiwan not only as a bilateral US-China issue but as a signal to Japan, Australia, the Philippines, and others. The limitation is that strategic ambiguity has always depended on avoiding rigid public commitments.`,claim:'Treating Taiwan as negotiable can weaken deterrence even before official policy changes.',matters:'It connects summit rhetoric to alliance behavior across the Indo-Pacific.',pushback:'Ambiguity can preserve flexibility and avoid automatic escalation.',sources:[{name:'Chatham House',url:'https://www.chathamhouse.org/2026/05/trumps-approach-taiwan-could-jeopardize-its-future-indo-pacific-allies-are-taking-note'}]},
{label:'Foreign Policy Analysis',title:'Washington Might Be Ready to Bargain With Beijing',author:'Robert A. Manning',publication:'Foreign Policy',date:'May 19, 2026',subtitle:'Manning argues the Trump-Xi summit shows the United States adjusting to managed rivalry with China.',proseHTML:`The article treats the summit as more than pageantry because both powers need economic calm while competing over Taiwan, rare earths, chips, and supply chains. The argument is live because this week chip loophole enforcement and rare-earth pressure moved alongside summit fallout. Its extemp value is a middle lane between appeasement and confrontation: durable China policy may require bargaining without pretending rivalry is over. The pushback is that bargaining can become concession if red lines are unclear or if allies suspect security issues are tradable.`,claim:'US-China policy is shifting toward managed bargaining from a position of constrained power.',matters:'It helps speakers avoid simplistic toughness-versus-weakness framing.',pushback:'Beijing may read bargaining as evidence that pressure works.',sources:[{name:'Foreign Policy',url:'https://foreignpolicy.com/2026/05/19/trump-xi-summit-china-relationship-trade-strategy/'}]},
{label:'Project Syndicate Essay',title:'American Superpower Suicide',author:'Timothy Snyder',publication:'Project Syndicate',date:'May 14, 2026',subtitle:'Snyder argues US power is being weakened by choices that damage institutions, alliances, and credibility from within.',proseHTML:`The essay uses current foreign-policy stress to make a broader argument about self-inflicted decline. It is live because the United States is simultaneously managing Iran, Ukraine, Taiwan, immigration-law disputes, and war-powers fights. The piece is useful because it defines power as institutional capacity and alliance trust, not only military hardware. The counterargument is that some voters see institutions as slow, costly, or unaccountable rather than automatic power multipliers.`,claim:'The United States weakens itself when it treats institutions and alliances as burdens instead of strategic assets.',matters:'It links several current stories into one thesis about credibility and national capacity.',pushback:'Some institutional constraints impose real costs and can deserve reform.',sources:[{name:'Project Syndicate',url:'https://www.project-syndicate.org/commentary/trump-committing-superpower-suicide-america-by-timothy-snyder-2026-05'}]}];
function sourceHTML(sources){return `<div class='wire-sources'>Sources:${sources.map(s=>`<a class='source-link' href='${s.url}' target='_blank' rel='noopener noreferrer'>${s.name}</a>`).join(' /')}</div>`}
function learnHTML(learn){if(!learn)return '';return `<details class='learn'><summary>Learn more</summary><div class='learn-body'><h4>Deeper context</h4><p>${learn.context}</p><h4>Three angles</h4><ul>${learn.angles.map(a=>`<li>${a}</li>`).join('')}</ul><h4>What to watch</h4><p>${learn.watch}</p></div></details>`}
function renderHeadline(){document.getElementById('headlineDay').innerHTML=`<div class='headline-copy'><div class='headline-label'>${headline.topic}</div><h2>${headline.h}</h2><p>${headline.deck}</p></div><figure class='headline-media'><img class='headline-photo' src='${headline.image}' alt='${headline.imageAlt}' loading='lazy'><figcaption class='image-credit'>Image:<a class='source-link' href='${headline.imageCreditUrl}' target='_blank' rel='noopener noreferrer'>${headline.imageCredit}</a></figcaption></figure>`}
function renderWireList(list){return list.map(group=>`<details class='topic'><summary><span class='topic-label'>${group.topic}</span><span class='topic-count'>${group.stories.length} stories</span></summary><div class='topic-body'>${group.stories.map(story=>`<article class='wire-item'><h2 class='wire-headline'>${story.h}</h2><p class='wire-prose'>${story.proseHTML}</p>${sourceHTML(story.sources)}${learnHTML(story.learn)}</article>`).join('')}</div></details>`).join('')}
function imageHTML(item){if(!item.image)return '';return `<figure class='analytical-image'><img src='${item.image}' alt='${item.imageAlt||''}' loading='lazy'><figcaption class='image-credit'>Image:<a class='source-link' href='${item.imageCreditUrl||item.image}' target='_blank' rel='noopener noreferrer'>${item.imageCredit||'Source'}</a></figcaption></figure>`}
function renderAnalytical(){return analytical.map(item=>`<details class='analytical-file'><summary><div class='analytical-summary'><div class='analytical-tag'>${item.tag}</div><h2>${item.headline}</h2>${item.deck?`<p class='analytical-deck'>${item.deck}</p>`:''}</div></summary><div class='analytical-body'>${imageHTML(item)}<p class='skeleton'>${item.skeletonHTML}</p><section class='stats-block'><h3>Key Stats With Setup</h3>${item.stats.map(s=>`<p>${s}</p>`).join('')}</section><div class='angles-title'>Three Angles</div><div class='angles-grid'><div class='angle angle-a'><strong>${item.sideA.label}</strong>${item.sideA.text}</div><div class='angle angle-b'><strong>${item.sideB.label}</strong>${item.sideB.text}</div><div class='angle angle-c'><strong>${item.sideC.label}</strong>${item.sideC.text}</div></div>${sourceHTML(item.sources)}</div></details>`).join('')}
function renderOpinion(){return opinion.map(item=>`<article class='opinion-card'><div class='opinion-label'>${item.label}</div><h2>${item.title}</h2><p class='opinion-meta'>${item.author} - ${item.publication}, ${item.date}</p><p class='opinion-subtitle'><strong>${item.subtitle}</strong></p><p class='opinion-prose'>${item.proseHTML}</p><div class='opinion-boxes'><div class='opinion-box'><strong>The Claim</strong>${item.claim}</div><div class='opinion-box'><strong>Why It Matters</strong>${item.matters}</div><div class='opinion-box'><strong>Pushback</strong>${item.pushback}</div></div>${sourceHTML(item.sources)}</article>`).join('')}
function renderTab(tab){document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.tab===tab));document.getElementById('editionTitle').textContent=titles[tab];document.getElementById('editionDesc').textContent=intros[tab];const content=document.getElementById('content');if(tab==='wire')content.innerHTML=renderWireList(wire);if(tab==='weekly')content.innerHTML=renderWireList(weekly);if(tab==='analytical')content.innerHTML=renderAnalytical();if(tab==='opinion')content.innerHTML=renderOpinion()}
function applyTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem('dig-theme',theme);document.getElementById('themeToggle').textContent=`Theme: ${theme==='dark'?'Dark':'Light'}`}
function initTheme(){const saved=localStorage.getItem('dig-theme');applyTheme(saved||'light')}
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>renderTab(btn.dataset.tab)));
document.getElementById('themeToggle').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
renderHeadline();initTheme();renderTab('wire');
</script>
</body>
</html>
