<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dig - Daily Extemp Brief</title>
<style>
  :root {
    --bg: #f8f4ed;
    --paper: #fffdf7;
    --rail: #eee6da;
    --ink: #6b5a4a;
    --title: #5d4b3d;
    --muted: #655f56;
    --faint: #91887d;
    --rule: #ddd3c6;
    --accent: #7b5843;
    --surface: #f6f0e8;
    --link: #7b5843;
    --blue: #5f7f9f;
    --rose: #a36a68;
    --olive: #79875a;
  }

  [data-theme="dark"] {
    --bg: #151412;
    --paper: #1d1c19;
    --rail: #201f1c;
    --ink: #f3eee7;
    --title: #f3eee7;
    --muted: #d2c7b8;
    --faint: #a99b8b;
    --rule: #39342e;
    --accent: #caa77d;
    --surface: #191815;
    --link: #caa77d;
    --blue: #77a3c8;
    --rose: #d08b8e;
    --olive: #aabb77;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.55;
  }

  a { color: inherit; }

  .app {
    width: 100%;
    max-width: none;
    min-height: 100vh;
    margin: 0;
    display: grid;
    grid-template-columns: 238px minmax(0, 1fr);
    background: var(--paper);
  }

  .rail {
    min-height: 100vh;
    position: sticky;
    top: 0;
    align-self: start;
    background: var(--rail);
    border-right: 1px solid var(--rule);
    padding: 32px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .kicker,
  .section-label,
  .topic-label,
  .headline-label,
  .opinion-label,
  .analytical-tag {
    color: var(--faint);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .brand-word {
    margin: 6px 0 8px;
    font-family: Georgia, Charter, "Times New Roman", serif;
    font-size: clamp(3rem, 4.2vw, 3.75rem);
    line-height: 0.9;
    letter-spacing: 0;
    font-weight: 500;
    color: var(--title);
  }

  .date-line,
  .compiled { color: var(--muted); }
  .rail-rule { border-top: 1px solid var(--rule); }

  .nav { display: grid; gap: 12px; }

  .tab-btn {
    width: 100%;
    border: 0;
    background: transparent;
    color: var(--muted);
    font: inherit;
    text-align: left;
    padding: 8px 0 8px 14px;
    border-left: 2px solid transparent;
    cursor: pointer;
  }

  .tab-btn.active {
    color: var(--title);
    border-left-color: var(--accent);
    font-weight: 700;
  }

  .theme-toggle {
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--muted);
    padding: 8px 10px;
    width: fit-content;
    font: inherit;
    font-size: 0.86rem;
    cursor: pointer;
  }

  .main { min-width: 0; background: var(--paper); }

  .topbar {
    min-height: 132px;
    padding: 36px 44px 30px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 32px;
  }

  h1 {
    margin: 5px 0 0;
    font-family: Georgia, Charter, "Times New Roman", serif;
    font-size: clamp(2.2rem, 3.8vw, 3rem);
    line-height: 1;
    font-weight: 500;
    letter-spacing: 0;
    color: var(--title);
  }

  .edition-desc { margin: 10px 0 0; max-width: 680px; color: var(--muted); font-size: 0.92rem; line-height: 1.45; }
  .compiled { text-align: right; font-size: 0.92rem; }
  .main-inner { padding: 40px 44px 66px; }
  .main-section { max-width: 1180px; margin: 0 auto; }

  .headline-day {
    display: grid;
    grid-template-columns: minmax(0, 0.95fr) minmax(280px, 0.75fr);
    gap: 36px;
    align-items: center;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 34px;
    margin-bottom: 30px;
  }

  .headline-copy {
    border-left: 1px solid var(--accent);
    padding-left: 20px;
  }

  .headline-copy h2 {
    margin: 9px 0 10px;
    font-family: Georgia, Charter, "Times New Roman", serif;
    font-size: clamp(1.7rem, 3vw, 2.45rem);
    line-height: 1.08;
    color: var(--title);
    font-weight: 500;
  }

  .headline-copy p { margin: 0; max-width: 520px; color: var(--muted); font-size: 0.98rem; }
  .headline-media { margin: 0; }

  .headline-photo {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border: 1px solid var(--rule);
    background: var(--surface);
  }

  .image-credit { margin-top: 7px; color: var(--faint); font-size: 0.78rem; }
  .content-wrap { max-width: 880px; }

  .topic { border-top: 1px solid var(--rule); }

  .topic summary {
    list-style: none;
    cursor: pointer;
    padding: 18px 0;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 22px;
    align-items: center;
  }

  .topic summary::-webkit-details-marker,
  .learn summary::-webkit-details-marker,
  .analytical-file summary::-webkit-details-marker { display: none; }

  .topic .topic-count {
    justify-self: end;
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
  }

  .topic summary::after,
  .analytical-file summary::after {
    content: "+";
    color: var(--accent);
    font-size: 1rem;
    font-weight: 700;
    justify-self: end;
  }

  .topic[open] summary::after,
  .analytical-file[open] summary::after { content: "-"; }
  .topic-body { padding: 0 0 8px; }

  .wire-item {
    padding: 24px 0 28px;
    border-top: 1px solid var(--rule);
  }

  .wire-headline {
    margin: 0 0 10px;
    color: var(--title);
    font-family: Georgia, Charter, "Times New Roman", serif;
    font-size: 1.32rem;
    line-height: 1.22;
    font-weight: 500;
    letter-spacing: 0;
  }

  .wire-prose { margin: 0; color: var(--ink); font-size: 0.96rem; line-height: 1.68; }
  .change { font-weight: 700; color: var(--title); }
  .jargon { color: var(--muted); font-style: italic; }

  .wire-sources { margin-top: 13px; color: var(--faint); font-size: 0.86rem; }

  .source-link {
    color: var(--link);
    font-weight: 700;
    text-decoration: none;
    margin: 0 7px;
  }

  .source-link:first-of-type { margin-left: 8px; }
  .source-link:hover { text-decoration: underline; text-underline-offset: 3px; }
  .source-link::after { content: " ↗"; font-size: 0.8em; }

  .learn { margin-top: 14px; color: var(--muted); }
  .learn summary { cursor: pointer; list-style: none; color: var(--link); font-weight: 700; display: inline-block; }
  .learn summary::before { content: "▸ "; }
  .learn[open] summary::before { content: "▾ "; }

  .learn-body,
  .stats-block,
  .opinion-box,
  .angle {
    background: var(--surface);
    border: 1px solid var(--rule);
  }

  .learn-body {
    margin-top: 12px;
    padding: 15px 17px;
    border-left: 2px solid var(--rule);
  }

  .learn-body h4,
  .stats-block h3,
  .angles-title {
    margin: 14px 0 5px;
    color: var(--title);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .learn-body h4:first-child { margin-top: 0; }
  .learn-body p { margin: 0; }
  .learn-body ul { margin: 7px 0 0 18px; padding: 0; }

  .analytical-file,
  .opinion-card { border-top: 1px solid var(--rule); }

  .analytical-file summary {
    list-style: none;
    cursor: pointer;
    padding: 24px 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
  }

  .analytical-summary h2,
  .opinion-card h2 {
    font-family: Georgia, Charter, "Times New Roman", serif;
    font-weight: 500;
    line-height: 1.14;
    letter-spacing: 0;
    color: var(--title);
    margin: 7px 0 0;
  }

  .analytical-deck { margin: 7px 0 0; color: var(--muted); max-width: 700px; }
  .analytical-body { padding: 0 0 34px; }

  .analytical-image {
    margin: 0 0 22px;
  }

  .analytical-image img {
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    border: 1px solid var(--rule);
    display: block;
  }

  .skeleton { color: var(--ink); line-height: 1.7; margin: 0 0 18px; }
  .stats-block { padding: 16px 18px; margin: 18px 0; }
  .stats-block h3 { margin-top: 0; }
  .stats-block p { margin: 10px 0 0; }

  .angles-grid,
  .opinion-boxes {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .angle,
  .opinion-box { padding: 14px; }
  .angle strong,
  .opinion-box strong { display: block; color: var(--title); margin-bottom: 5px; }
  .angle-a { border-left: 2px solid var(--blue); }
  .angle-b { border-left: 2px solid var(--rose); }
  .angle-c { border-left: 2px solid var(--olive); }

  .opinion-card { padding: 30px 0; }
  .opinion-meta,
  .opinion-subtitle { color: var(--muted); margin: 0 0 10px; }
  .opinion-prose { margin: 0; line-height: 1.68; }

  footer {
    border-top: 1px solid var(--rule);
    color: var(--faint);
    padding-top: 30px;
    margin-top: 40px;
    font-size: 0.84rem;
  }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .rail { position: relative; min-height: auto; }
    .topbar { padding: 30px 24px; display: block; }
    .compiled { text-align: left; margin-top: 18px; }
    .main-inner { padding: 32px 24px 54px; }
    .headline-day,
    .angles-grid,
    .opinion-boxes { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div>
      <div class="brand-word">Dig</div>
      <div class="date-line">Tuesday, May 26, 2026</div>
    </div>
    <div class="rail-rule"></div>
    <div>
      <div class="section-label">Editions</div>
      <nav class="nav" aria-label="Dig editions">
        <button class="tab-btn active" data-tab="wire">The Wire</button>
        <button class="tab-btn" data-tab="weekly">The Weekly</button>
        <button class="tab-btn" data-tab="analytical">The Analytical</button>
        <button class="tab-btn" data-tab="opinion">The Opinion</button>
      </nav>
    </div>
    <button class="theme-toggle" id="themeToggle" type="button">Theme: Light</button>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="kicker">Morning Briefing</div>
        <h1 id="editionTitle">The Wire</h1>
        <p class="edition-desc" id="editionDesc"></p>
      </div>
      <div class="compiled">Compiled May 26, 2026<br>America/New_York</div>
    </header>

    <div class="main-inner">
      <section class="main-section">
        <section class="headline-day" id="headlineDay"></section>
        <div class="content-wrap" id="content"></div>
        <footer>Dig briefing compiled May 26, 2026. Source links point to the reporting, official releases, and essays used for this edition.</footer>
      </section>
    </div>
  </main>
</div>

<script>
const briefing = {
  headline: {
    topic: "Iran / Energy",
    h: "Hormuz framework turns one war deal into a global price test",
    deck: "Today's central story is whether a negotiated reopening of the Strait of Hormuz can calm oil, inflation, Israel, Congress, and inspection politics at the same time.",
    image: "https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041",
    imageAlt: "Satellite view of the Strait of Hormuz separating Iran, Oman, and the United Arab Emirates",
    imageCredit: "NASA",
    imageCreditUrl: "https://www.nasa.gov/image-article/strait-of-hormuz/"
  },
  intros: {
    wire: "Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer.",
    weekly: "The week in consequential developments, grouped like The Wire but selected for events still shaping the map today.",
    analytical: "Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points.",
    opinion: "Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."
  },
  wire: [
    {topic: "US Economy", stories: [
      {h: "Warsh inherits a Fed boxed in by oil, tariffs, and bond yields", proseHTML: `The Federal Reserve was already holding rates steady because inflation remained above its 2% target and tariffs were feeding uncertainty into prices. <span class="change">Kevin Warsh has taken over as Fed chair just as oil-linked inflation risk and elevated Treasury yields are making rate cuts harder to justify</span>. Fed minutes from the April 28-29 meeting showed many officials discussing the possibility of additional policy firming if inflation stayed persistently high, while market reports last week put two-year Treasury yields a little above 4.1% and crude near the high-$90s. That matters because tighter bond markets raise mortgage, corporate, and federal borrowing costs even before the Federal Open Market Committee <span class="jargon">(the Fed committee that sets US interest-rate policy)</span> changes rates again.`, sources: [{name:"Federal Reserve",url:"https://www.federalreserve.gov/monetarypolicy/files/fomcminutes20260429.pdf"},{name:"Axios",url:"https://www.axios.com/2026/05/20/fed-rates-minutes-warsh"},{name:"Kiplinger",url:"https://www.kiplinger.com/investing/stocks/dow-hits-new-high-as-warsh-takes-fed-oath-stock-market-today"}], learn: {context:"Oil shocks matter for central banks because they can lift headline inflation directly and then spread into wages, shipping, food, and expectations if households and firms believe higher prices will last.", angles:["Inflation angle: the Fed can cool demand but cannot reopen a shipping choke point.","Markets angle: long yields can tighten financial conditions without a formal hike.","Political angle: a new Fed chair starts with less credibility if inflation is already accelerating."], watch:"Watch this week's personal consumption expenditures inflation data, speeches by Fed officials, and whether oil retreats if the Hormuz framework is finalized."}},
      {h: "Iran deal hopes lower crude but keep the inflation floor visible", proseHTML: `Energy markets had priced the Iran war as a supply shock because the Strait of Hormuz normally handles a large share of globally traded oil and liquefied natural gas. <span class="change">Reports that Washington and Tehran are close to a framework to reopen the strait have eased the immediate worst-case scenario, but they have not erased the inflation problem</span>. The economic issue is sequencing: prices can fall on headlines, while refiners, insurers, and shipping firms wait for mine clearance, naval posture changes, and verification before treating the corridor as normal. If oil remains high into June, the shock can feed airline fares, freight contracts, fertilizer, and food prices even if a diplomatic signing ceremony happens first.`, sources: [{name:"AP",url:"https://apnews.com/article/b1659232611edc10808612e30647c17d"},{name:"Axios",url:"https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear"},{name:"Reuters",url:"https://ca.investing.com/news/economy-news/morning-bid-bonds-get-a-taste-of-oils-demand-destruction-4644484"}], learn: {context:"The Strait of Hormuz is a narrow Gulf waterway; a disruption there affects global prices because many importers cannot quickly replace lost or delayed cargoes.", angles:["Consumer angle: energy prices reach households through gasoline, utilities, and freight-heavy goods.","Diplomacy angle: markets will judge behavior at sea more than public statements.","Global South angle: fuel and fertilizer costs hit poorer importing states fastest."], watch:"Watch tanker movements, Brent crude, insurance premiums, and any sanctions-waiver language in the final text."}}
    ]},
    {topic: "US Politics", stories: [
      {h: "Texas runoff tests Trump's pull inside a safe-red Senate race", proseHTML: `Texas usually gives Republicans a strong general-election advantage, but the party's Senate runoff has turned into a national signal about loyalty, electability, and institutional power. <span class="change">Voters are choosing between Sen. John Cornyn and Attorney General Ken Paxton today after President Donald Trump endorsed Paxton on May 19</span>. AP decision notes say no candidate won a majority in the March 3 primary, which forced the May 26 runoff, while campaign spending surged in the final day. The result matters beyond Texas because the winner faces Democrat James Talarico in November and because an incumbent senator losing a primary would show how far Trump can still reorder Republican coalitions.`, sources: [{name:"AP",url:"https://apnews.com/article/faec04ca286773a53cac190bd67fc9fe"},{name:"AP",url:"https://apnews.com/article/00cc96aa8db7fb1844f4ce8d39629f53"},{name:"Texas Secretary of State",url:"https://www.sos.texas.gov/elections/laws/2026-may-primay-election.shtml"}], learn: {context:"Texas uses runoffs when no primary candidate reaches a majority, so lower-turnout second elections can reward candidates with more intense supporters.", angles:["Party angle: a Paxton win would reinforce Trump's ability to punish incumbents.","Senate angle: Republicans must weigh ideological loyalty against general-election risk.","Legal angle: Paxton's statewide profile includes impeachment and legal controversies that Democrats would use in November."], watch:"Watch turnout, suburban margins, and whether national Republicans quickly unify behind the nominee."}},
      {h: "Iran war-powers fight remains alive even as deal talks advance", proseHTML: `Congress has struggled for decades to enforce the War Powers Resolution <span class="jargon">(a 1973 law meant to limit unauthorized presidential hostilities after notification and a 60-day clock)</span>. <span class="change">The Senate's recent vote to advance a measure curbing the Iran war keeps constitutional pressure on the White House while negotiators work on a settlement</span>. Reuters reported the Senate vote came 80 days after US and Israeli forces began striking Iran, while the House had narrowly rejected a similar attempt days earlier. The impact is that diplomacy and domestic law now move together: even a successful deal could leave a dispute over whether the president normalized a military campaign without clear congressional authorization.`, sources: [{name:"Reuters",url:"https://www.investing.com/news/world-news/us-senate-advances-measure-curbing-trumps-iran-war-powers-4699898"},{name:"AP",url:"https://apnews.com/article/41ef029df176a6486422e9d68aa6d872"},{name:"White House",url:"https://www.whitehouse.gov/wp-content/uploads/2026/05/SAP-HCR86.pdf"}], learn: {context:"War-powers resolutions rarely end conflicts by themselves, but they force lawmakers to record positions on who controls sustained military action.", angles:["Executive side: presidents argue they need speed to protect forces and shipping.","Congress side: authorization and funding powers are the constitutional check.","Strategic side: Tehran and allies watch whether Washington can sustain policy politically."], watch:"Watch House amendments, defense-bill riders, and whether a final Iran deal lowers or intensifies the authorization fight."}}
    ]},
    {topic: "Healthcare", stories: [
      {h: "US measles count nears 2,000 before summer travel season", proseHTML: `Measles was declared eliminated in the United States in 2000, which means sustained domestic transmission was no longer expected when vaccination coverage stayed high. <span class="change">CDC data updated May 22 show 1,952 confirmed measles cases reported in 2026 as of May 21 across 40 jurisdictions</span>. That number matters because measles is highly contagious and outbreaks expose pockets where the measles, mumps, and rubella vaccine <span class="jargon">(MMR, the standard two-dose childhood vaccine against three viral diseases)</span> is not reaching enough people. The next risk is travel amplification: summer movement can seed new clusters before local health departments identify exposed contacts.`, sources: [{name:"CDC",url:"https://www.cdc.gov/measles/data-research/"},{name:"AHA",url:"https://www.aha.org/topics/measles"},{name:"PAHO",url:"https://www.paho.org/sites/default/files/2026/05/measles-outbreak-situation-report-no3-21may-2026.pdf"}], learn: {context:"Measles elimination does not mean zero imported cases; it means outbreaks do not keep spreading for long inside the country.", angles:["Public-health angle: high coverage protects infants and immunocompromised people who cannot rely on vaccination alone.","Governance angle: local health capacity decides how quickly contacts are found.","Trust angle: outbreaks are also tests of vaccine communication and institutional credibility."], watch:"Watch CDC weekly totals, airport and school exposure notices, and whether PAHO raises concerns about US elimination status."}},
      {h: "Ebola crosses from Congo into Uganda as responders face attacks", proseHTML: `Congo's new Ebola outbreak is driven by the Bundibugyo species, a rarer Ebola virus with no approved vaccine or specific treatment ready for immediate deployment. <span class="change">Ugandan officials reported two new linked infections on Monday, bringing Uganda's confirmed cases to seven, while AP separately reported suspected Congo cases nearing 1,000 and repeated attacks on health workers</span>. The outbreak is harder than a normal emergency because trust, safe burials, and treatment-center security are now as important as laboratory testing. The human impact is immediate: if exposed patients flee or families hide symptoms, responders lose the contact chain that makes containment possible.`, sources: [{name:"AP",url:"https://apnews.com/article/8630b816e3f40f950fd90e44b0b3395c"},{name:"AP",url:"https://apnews.com/article/c43442fbc75ca31dfa948f08f9731526"},{name:"WHO",url:"https://www.who.int/emergencies/disease-outbreak-news"}], learn: {context:"Ebola spreads through bodily fluids after symptoms begin; safe isolation, tracing, and burials can stop outbreaks even when vaccines are limited.", angles:["Health-security angle: regional spread changes the response from local containment to border preparedness.","Trust angle: attacks on clinics can create hidden transmission chains.","Equity angle: frontline volunteers carry risk in areas already destabilized by armed groups."], watch:"Watch Uganda's Kampala contacts, WHO risk updates, and whether treatment centers regain community cooperation."}}
    ]},
    {topic: "Climate", stories: [
      {h: "India heat turns record power demand into an adaptation warning", proseHTML: `India enters each summer with rising cooling demand, a coal-heavy power system, and expanding solar output that helps daytime supply but not every evening peak. <span class="change">Peak electricity demand crossed 270 gigawatts for the first time on May 21, reaching about 270.8 GW during a severe heatwave</span>. AP reported parts of north India facing temperatures around 45 degrees Celsius, while power-sector reports said the new peak followed several consecutive record days. The broader climate lesson is that adaptation is no longer only cooling centers and health warnings; it is grid flexibility, storage, distribution reliability, and protection for workers who cannot move indoors.`, sources: [{name:"AP",url:"https://apnews.com/article/3aa179491366cc8a283907392c70c73d"},{name:"Reuters",url:"https://www.marketscreener.com/news/scorching-heat-drives-india-s-power-demand-to-a-record-270-gw-amid-outages-ce7f5adedd88f221"},{name:"India Meteorological Department",url:"https://mausam.imd.gov.in/"}], learn: {context:"Peak demand is the highest electricity load at one moment; grids must meet the peak even if average daily demand is much lower.", angles:["Adaptation angle: climate policy now includes transmission, storage, and city heat plans.","Health angle: high nighttime temperatures reduce recovery time for vulnerable people.","Energy angle: solar helps afternoon peaks but evening cooling can still stress coal, gas, and batteries."], watch:"Watch monsoon timing, distribution-company outages, and whether demand records keep moving earlier in the season."}},
      {h: "UN climate vote raises legal pressure but shows US resistance", proseHTML: `Climate diplomacy has increasingly moved from emissions pledges into courts and advisory opinions because vulnerable states want legal leverage against high emitters. <span class="change">The UN General Assembly voted 141-8 last week to back a world court opinion that countries have legal obligations to address climate change, with the United States among the few opposing votes</span>. The vote does not by itself create a treaty, but it matters because judges, negotiators, and domestic litigants can use it as evidence of international legal expectations. The next political test is whether states treat the opinion as a moral statement or as a tool in finance, loss-and-damage, and fossil-fuel litigation.`, sources: [{name:"Reuters",url:"https://www.investing.com/news/world-news/un-backs-world-court-climate-opinion-us-among-few-to-oppose-4702716"},{name:"UN",url:"https://www.un.org/en/ga/"},{name:"ICJ",url:"https://www.icj-cij.org/"}], learn: {context:"An International Court of Justice advisory opinion is not the same as a damages judgment, but it can shape how legal duties are understood.", angles:["Small-state angle: legal pressure can strengthen climate finance claims.","US angle: opposition signals fear of liability and policy constraint.","Diplomacy angle: abstentions by several major states show the limits of consensus."], watch:"Watch domestic climate lawsuits, COP31 positioning, and whether development banks cite the opinion in lending rules."}}
    ]},
    {topic: "Tech / AI", stories: [
      {h: "Taiwan chip-smuggling case turns export controls into criminal enforcement", proseHTML: `US controls on advanced artificial-intelligence chips are designed to slow restricted buyers by blocking access to high-end servers, not only individual chips. <span class="change">Taiwanese prosecutors are investigating three people accused of using forged documents to export Super Micro servers containing Nvidia chips to China, Hong Kong, or Macau</span>. AP and Reuters-linked reports say the case involves high-end AI servers subject to US trade rules, showing that the weak point is often resellers and shipping declarations rather than chip fabrication itself. The impact is strategic because compute clusters are a military and commercial resource; a small number of diverted servers can still help restricted firms train or run powerful models.`, sources: [{name:"AP",url:"https://apnews.com/article/175dfa061ade223086872c5810905815"},{name:"Reuters",url:"https://www.marketscreener.com/news/taiwan-investigates-three-for-alleged-illegal-export-of-high-end-ai-servers-ce7f5aded88ff72d"},{name:"Focus Taiwan",url:"https://focustaiwan.tw/society/202605220006"}], learn: {context:"End-use controls try to verify who ultimately receives sensitive technology after it moves through distributors and assembly firms.", angles:["Security angle: AI compute is treated like strategic capacity.","Business angle: hardware firms face compliance exposure in secondary markets.","Taiwan angle: enforcement ties chip policy to cross-strait pressure and US partnership."], watch:"Watch indictments, Commerce Department entity-list updates, and whether server makers tighten reseller audits."}},
      {h: "China rare-earth licensing stays a pressure point after trade talks", proseHTML: `Rare earths are a group of minerals used in magnets, electronics, defense systems, wind turbines, and electric vehicles, and China dominates key parts of processing. <span class="change">China's Commerce Ministry defended its export controls as lawful while saying it would work with the United States on reasonable concerns about shortages</span>. Reuters reported the statement after US officials said Beijing had agreed to address supply concerns, which shows how trade negotiations are now partly about administrative licenses rather than headline tariffs. The stakes are broad because a delayed license can slow production lines even when no formal embargo is announced.`, sources: [{name:"Reuters",url:"https://www.investing.com/news/commodities-news/china-says-rare-earth-controls-lawful-will-cooperate-with-us-reasonable-concerns-4700320"},{name:"Reuters",url:"https://www.investing.com/news/commodities-news/china-has-agreed-to-address-us-concerns-over-rare-earth-shortages-says-white-house-4694604"},{name:"USGS",url:"https://www.usgs.gov/centers/national-minerals-information-center/rare-earths-statistics-and-information"}], learn: {context:"Export licensing lets a government slow or approve shipments case by case, making supply pressure harder to measure than a simple tariff.", angles:["Industrial angle: autos, weapons, and clean-energy firms all compete for inputs.","China angle: licensing is leverage without a full trade break.","US angle: diversification takes years because processing capacity is hard to build quickly."], watch:"Watch license approvals, US stockpile actions, and whether talks produce measurable shipment increases."}}
    ]},
    {topic: "Latin America", stories: [
      {h: "Mexico-US security cooperation tries to avoid a sovereignty backlash", proseHTML: `Washington wants more measurable action against fentanyl networks, while Mexico's government has to show cooperation without appearing to accept unilateral US operations. <span class="change">President Claudia Sheinbaum and US Homeland Security Secretary Markwayne Mullin pledged continuing joint security efforts after talks in Mexico City last week</span>. AP reported the visit followed tensions over alleged US-linked operations and cartel investigations, while US sanctions separately targeted people and entities tied to a Sinaloa cartel fentanyl network. The significance is that security cooperation, migration pressure, and trade negotiations are now linked enough that a law-enforcement dispute can spill into tariffs and border politics.`, sources: [{name:"AP",url:"https://apnews.com/article/8e3e624162518272c840913fba25624f"},{name:"AP",url:"https://apnews.com/article/04a44c7845f267c8c52df08c6c753ebc"},{name:"El Pais",url:"https://elpais.com/mexico/2026-05-22/sheinbaum-pide-a-estados-unidos-mas-reuniones-de-seguridad-conjuntas-para-evitar-malos-entendidos.html"}], learn: {context:"US-Mexico security cooperation can include intelligence sharing, extraditions, financial sanctions, port inspections, and training, each with different sovereignty costs.", angles:["US angle: fentanyl gives Washington a domestic-politics reason to demand visible results.","Mexico angle: sovereignty limits how cooperation can be sold at home.","Trade angle: security disputes can threaten integrated auto, agriculture, and border supply chains."], watch:"Watch extraditions, Treasury sanctions, cartel-finance cases, and whether tariff threats return around USMCA review politics."}},
      {h: "World Cup logistics become entangled with Iran diplomacy", proseHTML: `The 2026 World Cup is supposed to be a sports and logistics event spread across North America, but the Iran war has made host-country decisions politically sensitive. <span class="change">Sheinbaum said Monday she had no issue with Mexico hosting Iran's team after its training base was moved from the United States</span>. The story is not strategically central by itself, but it shows how a diplomatic crisis can spill into visas, security planning, and public symbolism around a global event. The next question is whether tournament security arrangements stay routine or become another forum for US-Iran pressure.`, sources: [{name:"AP",url:"https://apnews.com/article/5bdfa21feccf35f0ed955b9dd1ab7244"},{name:"FIFA",url:"https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026"}], learn: {context:"The World Cup requires host governments to coordinate visas, training sites, policing, and diplomatic access for teams from rival states.", angles:["Sports diplomacy angle: tournament logistics can signal recognition or distance.","Security angle: high-profile teams need protection without politicizing the event.","Regional angle: Mexico can separate host obligations from Washington's Iran policy."], watch:"Watch visa decisions, security planning, and whether Iranian officials use the tournament for diplomatic messaging."}}
    ]},
    {topic: "Africa / Middle East", stories: [
      {h: "US-Iran framework faces Israeli opposition before it is final", proseHTML: `The Iran war began with US and Israeli goals that included curbing Iran's nuclear and missile programs, limiting proxy support, and reopening the Strait of Hormuz. <span class="change">AP reported Monday that Washington and Tehran appear close to a deal to end the war and open the strait, while Israeli opposition leader Yair Lapid called the emerging deal bad for the region</span>. The framework reportedly centers on a war-ending declaration, temporary ceasefire extension, Hormuz access, oil sales, and follow-on nuclear talks, which means many of the hardest questions are deferred rather than solved. The impact is that Israel, Gulf states, energy markets, and Congress will all judge the deal by enforcement, not by whether a text is announced.`, sources: [{name:"AP",url:"https://apnews.com/article/b1659232611edc10808612e30647c17d"},{name:"AP",url:"https://apnews.com/article/fa15b3bf47b0cd5ff2b3495644a9c32e"},{name:"Axios",url:"https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear"}], learn: {context:"Sequencing is the core diplomatic problem: Iran wants sanctions and oil access, while opponents want nuclear and maritime restraint first.", angles:["Israel angle: the deal may look like survival for Iran rather than defeat.","Energy angle: Hormuz reopening matters immediately for prices.","US angle: Trump needs a settlement that can be described as both peace and pressure."], watch:"Watch Israeli government statements, inspection language, oil-sanctions waivers, and whether mines are actually cleared."}},
      {h: "Sudan's planting season is threatened by Iran-driven input costs", proseHTML: `Sudan's civil war has already damaged farms, markets, roads, and aid delivery, leaving nearly 20 million people facing acute hunger according to UN agencies. <span class="change">Reuters reported Monday that farmers say higher global fuel and fertilizer costs from the Iran conflict may force them to cut back planting this summer</span>. The humanitarian link is direct: less planting today means less local food later in a country where conflict already restricts imports and aid access. The next risk is famine deepening in Darfur and Kordofan if fighting, displacement, and input shortages converge during the agricultural season.`, sources: [{name:"Reuters",url:"https://www.marketscreener.com/news/iran-war-poses-new-threat-to-harvests-in-hunger-stricken-sudan-ce7f5addd88aff25"},{name:"UN Geneva",url:"https://www.ungeneva.org/en/news-media/news/2026/05/118736/sudan-hunger-crisis-deepens-un-warns-millions-face-acute-food"},{name:"IPC",url:"https://www.ipcinfo.org/"}], learn: {context:"The Integrated Food Security Phase Classification, or IPC, is a global system that ranks hunger severity and helps identify famine risk.", angles:["Humanitarian angle: input prices can turn a war crisis into a harvest crisis.","Energy angle: Middle East shocks reach Africa through diesel, transport, and fertilizer.","Security angle: armed groups can weaponize food scarcity by blocking markets and farms."], watch:"Watch rainfall, fuel availability, aid access, and IPC updates for Darfur and Kordofan."}}
    ]},
    {topic: "Europe / EU", stories: [
      {h: "Zelensky rejects associate EU membership as Europe searches for an interim path", proseHTML: `Ukraine applied for European Union membership shortly after Russia's full-scale invasion, but accession requires legal reforms, budget decisions, and unanimous approval from existing members. <span class="change">Reuters reported that President Volodymyr Zelensky called Germany's proposal for associate EU membership unfair because it would give Ukraine participation without voting rights</span>. The German idea would bring Kyiv into EU structures faster than full accession, but Ukraine fears becoming symbolically included and institutionally voiceless. The next test is whether EU leaders can design a staged path that reassures Ukraine without triggering vetoes from members worried about cost, agriculture, migration, and war risk.`, sources: [{name:"AP",url:"https://apnews.com/article/f1c0b453fe6339858ad6c7932ce4e432"},{name:"Reuters",url:"https://www.investing.com/news/economy-news/exclusiveukraines-zelenskiy-says-proposal-of-associate-eu-membership-unfair-4708014"},{name:"European Commission",url:"https://enlargement.ec.europa.eu/countries/ukraine_en"}], learn: {context:"EU accession requires a candidate to adopt the acquis, the body of EU law and regulatory standards, before full membership can be completed.", angles:["Ukraine angle: symbolic status may weaken the promise of equal European belonging.","EU angle: staged access can avoid institutional shock.","Russia angle: Moscow watches whether Europe is making Ukraine's alignment permanent."], watch:"Watch EU summit language, accession-cluster openings, and whether Germany revises the proposal."}},
      {h: "Belarus becomes the flank to watch after Russia's Kyiv strike", proseHTML: `Belarus has aided Russia's war by allowing its territory to be used, but Belarusian troops have not formally joined the full-scale invasion. <span class="change">After Russia's latest mass attack on Kyiv, European leaders are watching whether Minsk offers deeper help as Russia uses nuclear-capable Oreshnik missiles and Belarusian basing as pressure points</span>. Le Monde reported that at least four people were killed and more than 100 wounded in the attack, and that France's Emmanuel Macron urged Alexander Lukashenko not to let Belarus be dragged further into the war. The impact is regional because Belarus borders Ukraine and NATO members Poland, Lithuania, and Latvia, making any deeper role an alliance security issue.`, sources: [{name:"Le Monde",url:"https://www.lemonde.fr/en/international/article/2026/05/26/war-in-ukraine-kyiv-grows-anxious-over-belarusian-threat_6753813_4.html"},{name:"AP",url:"https://apnews.com/article/e4bac36b2e74e67d64d23eeaac5885c0"},{name:"NATO",url:"https://www.nato.int/"}], learn: {context:"The Oreshnik is an intermediate-range ballistic missile that Russia says can carry a nuclear warhead, even when used conventionally.", angles:["Military angle: Belarusian territory can widen launch routes and stretch Ukrainian defenses.","NATO angle: Poland and the Baltic states treat Belarus as a direct flank risk.","Diplomacy angle: Macron's call shows Europe trying to deter escalation before it becomes formal."], watch:"Watch Belarus troop movements, Russian deployments in Belarus, and NATO eastern-flank alerts."}}
    ]},
    {topic: "China", stories: [
      {h: "Taiwan tracks second Chinese combat patrol in a week", proseHTML: `China conducts regular military activity around Taiwan, but clustered combat-readiness patrols raise the pressure on Taipei's air and naval monitoring systems. <span class="change">Reuters reported Tuesday that Taiwan sent ships and fighter jets to monitor a second Chinese joint combat readiness patrol in a week</span>. The patrol matters because it arrives as US-China tensions over Taiwan arms sales, rare earths, and AI chips are all active, making each military signal harder to separate from economic bargaining. The next thing to watch is whether Beijing keeps patrols routine or pairs them with exercises that simulate blockade, quarantine, or strike operations.`, sources: [{name:"Reuters",url:"https://uk.marketscreener.com/news/taiwan-tracks-second-chinese-combat-patrol-in-a-week-sends-ships-and-jets-to-monitor-ce7f5addda8bf021"},{name:"Taiwan MND",url:"https://www.mnd.gov.tw/english/"},{name:"Foreign Policy",url:"https://foreignpolicy.com/2026/05/14/trump-xi-meeting-summit-china-taiwan-arms-sale/"}], learn: {context:"Taiwan's air defense identification zone, or ADIZ, is a monitoring area where Taipei tracks aircraft before they reach sovereign airspace.", angles:["Deterrence angle: repeated patrols normalize Chinese presence and drain Taiwan's readiness.","US angle: ambiguous arms-sales messaging can alter Beijing's risk calculation.","Economic angle: chip and rare-earth disputes now sit beside military signaling."], watch:"Watch Taiwan's daily defense reports, Chinese exercise names, and US decisions on pending arms packages."}},
      {h: "Trump-Xi Taiwan messaging leaves arms-sale ambiguity unresolved", proseHTML: `US policy toward Taiwan depends on deterrence, unofficial ties, and longstanding assurances that Washington does not let Beijing veto arms sales. <span class="change">Foreign Policy reported contrasting US and Chinese readouts after the Trump-Xi summit, with the fate of a reported $14 billion Taiwan weapons package still unclear</span>. The ambiguity matters because Taiwan needs weapons delivery schedules more than rhetorical reassurance, while China can use uncertainty to test whether Washington is prioritizing trade stability over island security. The next concrete signal is whether the administration approves, delays, or narrows the package after the summit.`, sources: [{name:"Foreign Policy",url:"https://foreignpolicy.com/2026/05/14/trump-xi-meeting-summit-china-taiwan-arms-sale/"},{name:"AP",url:"https://apnews.com/article/75597b60d20980e7c29fefe48ebfd520"},{name:"Taiwan Foreign Ministry",url:"https://en.mofa.gov.tw/"}], learn: {context:"The Six Assurances are 1982 US commitments to Taiwan, including that Washington did not agree to consult Beijing before arms sales to Taipei.", angles:["Taiwan angle: delayed arms can be as important as denied arms if delivery timelines slip.","China angle: Beijing tries to turn arms sales into a bargaining topic.","US angle: economic talks with China can conflict with deterrence commitments."], watch:"Watch congressional pressure, notification of arms sales, and Chinese military activity after any announcement."}}
    ]},
    {topic: "War / Active Conflicts", stories: [
      {h: "Russia's Oreshnik strike makes Ukraine's air-defense shortage more urgent", proseHTML: `Ukraine has survived repeated Russian missile and drone campaigns by layering Western air defenses, electronic warfare, mobile teams, and warning systems. <span class="change">Russia used an Oreshnik hypersonic ballistic missile in one of the war's largest attacks on Kyiv, alongside hundreds of drones and missiles</span>. AP reported Ukraine said the attack included 600 drones and 90 missiles, while Le Monde reported at least four deaths and more than 100 wounded. The strategic effect is to turn each barrage into a production contest: Ukraine needs interceptors, radars, crews, and repairs faster than Russia can generate mixed strike packages.`, sources: [{name:"AP",url:"https://apnews.com/article/998aeaab5833ca397290d9ee2737b0e5"},{name:"Reuters",url:"https://www.investing.com/news/world-news/russia-hits-ukraine-with-oreshnik-missile-in-one-of-wars-biggest-attacks-on-kyiv-4708261"},{name:"Le Monde",url:"https://www.lemonde.fr/en/international/article/2026/05/26/war-in-ukraine-kyiv-grows-anxious-over-belarusian-threat_6753813_4.html"}], learn: {context:"Hypersonic missiles travel at very high speed and can be hard to intercept, but the broader threat is a mixed attack that overwhelms defenses with many types of targets.", angles:["Military angle: Ukraine cannot protect every city, grid node, and military site at once.","Industrial angle: allied production tempo matters as much as one-time donations.","Psychological angle: attacks on Kyiv signal that Russia can keep civilians under pressure even without a front-line breakthrough."], watch:"Watch NATO air-defense pledges, interceptor production, and any expanded Russian use of Belarusian launch territory."}},
      {h: "Gaza ceasefire frays as aid and displacement disputes deepen", proseHTML: `Gaza's ceasefire has depended on humanitarian access, phased security arrangements, and negotiations over Hamas disarmament and Israeli withdrawal. <span class="change">Fresh Israeli attacks and displacement orders over the weekend showed the truce continuing to erode while aid restrictions and reconstruction disputes remain unresolved</span>. Al Jazeera reported strikes in central Gaza and continued accusations over blocked aid, while Human Rights Watch last week said aid volumes had not recovered to the minimum level the UN says is needed. The impact is humanitarian and diplomatic: each new strike or aid incident makes it harder for mediators to turn a nominal ceasefire into a governing arrangement for Gaza.`, sources: [{name:"Al Jazeera",url:"https://www.aljazeera.com/news/2026/5/24/israeli-attack-on-gaza-kills-three-family-members-including-infant"},{name:"Al Jazeera",url:"https://www.aljazeera.com/news/2026/5/25/israel-escalates-gaza-attacks-as-netanyahu-stalls-ceasefire-for-polls"},{name:"Human Rights Watch",url:"https://www.hrw.org/news/2026/05/19/gaza-israel-curbs-aid-kills-civilians-during-ceasefire"}], learn: {context:"A ceasefire can reduce major combat while still failing if aid, governance, reconstruction, security forces, and displacement rules are not implemented.", angles:["Humanitarian angle: aid shortfalls compound malnutrition and disease risk.","Israeli politics angle: Netanyahu faces pressure over security and coalition survival.","Negotiation angle: Hamas disarmament and postwar administration remain core blockers."], watch:"Watch truck-entry data, mediator statements, and whether displacement orders expand or narrow."}}
    ]}
  ],
  weekly: [
    {topic: "US Economy", stories: [
      {h: "Fed politics shifted from cut timing to inflation credibility", proseHTML: `The week began with markets already questioning whether war-driven oil prices and tariffs would keep inflation above target. <span class="change">Fed minutes released Wednesday showed a majority of officials saw possible rate hikes if inflation stayed high, and Warsh's swearing-in made that debate the first test of a new chair</span>. This belongs in the weekly catch-up because it changes the policy baseline: investors are no longer only asking when cuts start, but whether the next move could be tighter. The next thing to watch is whether incoming inflation data confirm that energy and tariffs are spilling into core prices.`, sources: [{name:"Federal Reserve",url:"https://www.federalreserve.gov/monetarypolicy/files/fomcminutes20260429.pdf"},{name:"Axios",url:"https://www.axios.com/2026/05/20/fed-rates-minutes-warsh"},{name:"Reuters",url:"https://www.marketscreener.com/news/investors-gird-for-high-us-treasury-yields-as-new-fed-chair-warsh-battles-inflation-ce7f5bddd988f624"}], learn: {context:"Core inflation strips out food and energy, but energy shocks can still matter if they affect wages, transport costs, or expectations.", angles:["Hawkish angle: credibility may require holding or hiking despite political pressure.","Dovish angle: oil shocks can hurt growth and should not automatically trigger hikes.","Market angle: Treasury yields are already tightening conditions."], watch:"Watch PCE inflation, Fed speeches, and Treasury auctions."}},
      {h: "Oil prices kept global economic risk connected to diplomacy", proseHTML: `The week's macro story was not only US data; it was whether a Gulf settlement could remove the largest source of energy risk. <span class="change">Reports of a US-Iran framework to reopen Hormuz came after weeks in which crude prices, bond yields, and inflation expectations moved together</span>. The story still matters today because even a tentative reopening can affect shipping, fertilizer, airline, and food costs before a final nuclear deal exists. The next concrete test is whether oil traders see physical transit and insurance normalization, not just political optimism.`, sources: [{name:"AP",url:"https://apnews.com/article/b1659232611edc10808612e30647c17d"},{name:"Axios",url:"https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear"},{name:"Reuters",url:"https://ca.investing.com/news/economy-news/morning-bid-bonds-get-a-taste-of-oils-demand-destruction-4644484"}], learn: {context:"Energy shocks can become global because oil is priced in international markets, so even countries not directly involved pay more.", angles:["Inflation angle: lower crude can cool headline prices quickly.","Supply-chain angle: fertilizer and shipping costs lag oil headlines.","Diplomacy angle: sanctions relief is only credible if banks and insurers trust it."], watch:"Watch tanker traffic, Brent futures, and sanctions guidance."}}
    ]},
    {topic: "US Politics", stories: [
      {h: "Texas runoff became the week's clearest test of Trump-era party control", proseHTML: `Before this week, the Texas Senate race looked like a Republican nomination fight in a Republican-leaning state. <span class="change">Trump's endorsement of Ken Paxton and the final Paxton-Cornyn advertising surge made the May 26 runoff a national proxy for loyalty versus incumbency</span>. The event still matters today because the winner will shape whether Democrats see Texas as merely expensive or genuinely competitive in November. The next watch point is whether establishment Republicans treat the result as settled or continue to worry about candidate liabilities.`, sources: [{name:"AP",url:"https://apnews.com/article/adb4c7213fc2d0db0b29d0ab65d49384"},{name:"AP",url:"https://apnews.com/article/00cc96aa8db7fb1844f4ce8d39629f53"},{name:"Axios",url:"https://www.axios.com/2026/05/19/trump-endorsement-texas-senate-race-ken-paxton"}], learn: {context:"Primary runoffs often have lower turnout than first-round primaries, so organized and intense factions can gain influence.", angles:["Trump angle: endorsement power is measurable in a statewide race.","Senate angle: Republicans want to avoid making a safe seat expensive.","Democratic angle: James Talarico's fundraising gives the party a reason to watch the result closely."], watch:"Watch county-level turnout and post-runoff unity statements."}},
      {h: "Iran war powers became a rare intraparty pressure point", proseHTML: `Congressional war-powers disputes often split by party, but the Iran debate showed some Republican discomfort with an open-ended operation. <span class="change">The Senate advanced a measure to halt the Iran war absent congressional authorization while the House narrowly rejected a similar bid</span>. That matters over a weekly horizon because the issue did not disappear when ceasefire talks improved; lawmakers can still challenge funding, authorizations, and the legal theory behind the operation. The next question is whether a final deal defuses dissent or gives critics new grounds to say Congress was bypassed.`, sources: [{name:"Reuters",url:"https://www.investing.com/news/world-news/us-senate-advances-measure-curbing-trumps-iran-war-powers-4699898"},{name:"Reuters",url:"https://www.investing.com/news/politics-news/us-house-narrowly-rejects-bid-to-rein-in-trump-iran-war-powers-4690629"},{name:"AP",url:"https://apnews.com/article/41ef029df176a6486422e9d68aa6d872"}], learn: {context:"Congress can influence military policy through authorization votes, funding restrictions, and procedural pressure even when direct withdrawal measures fail.", angles:["Constitutional angle: the 60-day clock creates a public deadline.","Political angle: Republican defections carry more weight than Democratic opposition alone.","Diplomatic angle: US legal conflict can affect adversary and ally confidence."], watch:"Watch defense-bill amendments and any new legal letter from the White House."}}
    ]},
    {topic: "Healthcare", stories: [
      {h: "US measles remained a national surveillance problem", proseHTML: `The United States entered the week with measles outbreaks already challenging the country's elimination-era expectations. <span class="change">CDC's May 22 update put the 2026 total at 1,952 confirmed cases across 40 jurisdictions</span>. The weekly significance is that this is not a single local outbreak; it is a multi-jurisdiction public-health test of vaccination coverage, contact tracing, and school exposure response. The next thing to watch is whether summer travel turns scattered chains into new sustained outbreaks.`, sources: [{name:"CDC",url:"https://www.cdc.gov/measles/data-research/"},{name:"PAHO",url:"https://www.paho.org/sites/default/files/2026/05/measles-outbreak-situation-report-no3-21may-2026.pdf"}], learn: {context:"Measles can spread before a case is recognized because the virus is airborne and infectious in shared indoor spaces.", angles:["Health angle: infants and immunocompromised people carry disproportionate risk.","Policy angle: school vaccination rules and exemptions matter.","Data angle: official totals lag exposure events."], watch:"Watch CDC Friday updates and state outbreak declarations."}},
      {h: "Congo Ebola escalated from outbreak news to regional-health emergency", proseHTML: `At the start of the week, the Congo outbreak was already serious because Bundibugyo Ebola lacks an approved matching vaccine. <span class="change">By Monday, Uganda reported seven linked cases and AP reported suspected Congo cases nearing 1,000 amid attacks on health workers</span>. The story remains important because containment depends on community trust and border surveillance rather than a quick pharmaceutical solution. The next concrete watch point is whether known contact lists remain complete after patients fled or moved through clinics.`, sources: [{name:"AP",url:"https://apnews.com/article/c43442fbc75ca31dfa948f08f9731526"},{name:"AP",url:"https://apnews.com/article/8630b816e3f40f950fd90e44b0b3395c"},{name:"WHO",url:"https://www.who.int/emergencies/disease-outbreak-news"}], learn: {context:"The International Health Regulations let WHO raise alerts when a disease creates cross-border risk and needs coordinated response.", angles:["Regional angle: Uganda cases show the border risk is no longer theoretical.","Trust angle: violence against clinics slows tracing.","Science angle: vaccine gaps make classic containment more important."], watch:"Watch Kampala exposures and WHO risk assessments."}}
    ]},
    {topic: "Climate", stories: [
      {h: "India's heatwave showed climate adaptation is a power-system problem", proseHTML: `The week turned heat from a weather story into a systems story. <span class="change">India's power demand exceeded 270 GW for the first time while northern regions faced temperatures near 45 degrees Celsius</span>. That is why the event belongs in a weekly catch-up: it connects climate, electricity planning, labor productivity, water stress, and fossil-fuel dependence in one measurable shock. The next thing to watch is whether monsoon timing eases the load or whether evening peaks expose distribution bottlenecks.`, sources: [{name:"AP",url:"https://apnews.com/article/3aa179491366cc8a283907392c70c73d"},{name:"Reuters",url:"https://www.marketscreener.com/news/scorching-heat-drives-india-s-power-demand-to-a-record-270-gw-amid-outages-ce7f5adedd88f221"},{name:"IMD",url:"https://mausam.imd.gov.in/"}], learn: {context:"Heat adaptation includes cooling access, worker protections, reliable electricity, and public warnings, not just emissions policy.", angles:["Grid angle: record peaks require flexible supply and storage.","Health angle: high heat raises hospital and mortality risk.","Equity angle: poorer households face the worst tradeoff between cooling costs and safety."], watch:"Watch peak demand, outages, and monsoon onset."}},
      {h: "Climate law gained a new UN signal even without US backing", proseHTML: `Climate diplomacy spent years centered on voluntary pledges, but this week highlighted the legal route. <span class="change">The UN General Assembly backed an International Court of Justice climate opinion by 141-8, with the United States opposing it</span>. The weekly importance is that the vote gives vulnerable states and litigants a new reference point for arguing that climate inaction has legal consequences. The next test is whether courts and negotiators use it in finance and loss-and-damage disputes.`, sources: [{name:"Reuters",url:"https://www.investing.com/news/world-news/un-backs-world-court-climate-opinion-us-among-few-to-oppose-4702716"},{name:"ICJ",url:"https://www.icj-cij.org/"},{name:"UN",url:"https://www.un.org/en/ga/"}], learn: {context:"Loss and damage refers to climate harms that adaptation cannot prevent and that vulnerable countries argue should trigger support from richer emitters.", angles:["Legal angle: advisory opinions shape arguments even when not directly enforceable.","Diplomacy angle: US opposition shows liability concerns.","Equity angle: small states gain a tool they lack in power politics."], watch:"Watch national court cases and COP31 agenda language."}}
    ]},
    {topic: "Tech / AI", stories: [
      {h: "AI-chip controls moved from export rules to police files", proseHTML: `The week made clear that chip controls succeed or fail after the chips leave the factory. <span class="change">Taiwan detained or investigated suspects accused of forging documents to move Nvidia-equipped Super Micro servers toward restricted destinations</span>. This still matters today because enforcement against small diversion channels can reveal whether the larger US strategy of technology denial is practical. The next thing to watch is whether authorities name buyers, intermediaries, or cloud users rather than only shippers.`, sources: [{name:"AP",url:"https://apnews.com/article/175dfa061ade223086872c5810905815"},{name:"Reuters",url:"https://www.marketscreener.com/news/taiwan-investigates-three-for-alleged-illegal-export-of-high-end-ai-servers-ce7f5aded88ff72d"},{name:"Focus Taiwan",url:"https://focustaiwan.tw/society/202605220006"}], learn: {context:"AI servers combine many chips into systems powerful enough to train or run models, so server diversion can matter as much as chip diversion.", angles:["Compliance angle: documents and resellers are now strategic chokepoints.","China angle: gray-market demand remains high.","Taiwan angle: enforcement shows alignment with US rules but adds business pressure."], watch:"Watch court filings and export-control updates."}},
      {h: "Rare earths became the mirror image of chip leverage", proseHTML: `The United States uses export controls to slow Chinese access to advanced compute, while China uses its mineral-processing dominance to pressure US industry. <span class="change">China defended rare-earth export controls as lawful but said it would address reasonable US concerns after recent trade discussions</span>. The weekly significance is that the technology competition now has two administrative choke points: US chip licenses and Chinese mineral licenses. The next thing to watch is whether licensing promises produce actual shipments for defense, auto, and clean-energy supply chains.`, sources: [{name:"Reuters",url:"https://www.investing.com/news/commodities-news/china-says-rare-earth-controls-lawful-will-cooperate-with-us-reasonable-concerns-4700320"},{name:"Reuters",url:"https://www.investing.com/news/commodities-news/china-has-agreed-to-address-us-concerns-over-rare-earth-shortages-says-white-house-4694604"}], learn: {context:"Rare-earth magnets are hard to replace quickly in many industrial and defense uses, which makes processing control a strategic advantage.", angles:["US angle: diversification is urgent but slow.","China angle: licensing pressure is deniable and targeted.","Market angle: small administrative delays can ripple into inventories."], watch:"Watch shipment data and US domestic-processing announcements."}}
    ]},
    {topic: "Latin America", stories: [
      {h: "Mexico's security week balanced fentanyl pressure and sovereignty", proseHTML: `Mexico and the United States entered the week after a series of tensions over cartel operations, migrant deaths, sanctions, and claims of US involvement. <span class="change">Sheinbaum's meeting with DHS Secretary Markwayne Mullin produced a pledge of continued cooperation but also renewed insistence on intelligence-sharing over unilateral ground operations</span>. This is a weekly story because it connects fentanyl enforcement to trade and sovereignty politics, not just one police case. The next thing to watch is whether cooperation shows up in extraditions and financial cases or only in diplomatic language.`, sources: [{name:"AP",url:"https://apnews.com/article/8e3e624162518272c840913fba25624f"},{name:"AP",url:"https://apnews.com/article/04a44c7845f267c8c52df08c6c753ebc"},{name:"El Pais",url:"https://elpais.com/mexico/2026-05-22/sheinbaum-pide-a-estados-unidos-mas-reuniones-de-seguridad-conjuntas-para-evitar-malos-entendidos.html"}], learn: {context:"Fentanyl diplomacy involves law enforcement, finance, precursor chemicals, border control, and domestic politics in both countries.", angles:["US angle: overdose politics reward pressure on Mexico.","Mexico angle: sovereignty is a governing constraint.","Cartel angle: financial sanctions can disrupt networks without raids."], watch:"Watch extradition requests and Treasury designations."}},
      {h: "Sinaloa sanctions kept narco-finance in the spotlight", proseHTML: `US-Mexico tensions are not only about border crossings; they are also about money, logistics, and public corruption. <span class="change">The United States sanctioned more than a dozen people and entities tied to an alleged Sinaloa cartel fentanyl network, including a restaurant and a security firm</span>. The weekly value is that it shows the enforcement focus moving from street seizures to the commercial infrastructure that helps trafficking organizations function. The next watch point is whether Mexico opens matching financial or criminal cases.`, sources: [{name:"AP",url:"https://apnews.com/article/04a44c7845f267c8c52df08c6c753ebc"},{name:"US Treasury",url:"https://home.treasury.gov/news/press-releases"}], learn: {context:"Treasury sanctions can freeze assets under US jurisdiction and warn banks and companies away from listed people or businesses.", angles:["Finance angle: cartels need legitimate-looking businesses.","Diplomacy angle: sanctions can pressure Mexico without direct raids.","Rule-of-law angle: corruption allegations can destabilize state politics."], watch:"Watch bank compliance moves and Mexican prosecutorial responses."}}
    ]},
    {topic: "Africa / Middle East", stories: [
      {h: "Iran negotiations dominated the region's strategic map", proseHTML: `The week began with the Strait of Hormuz still central to oil markets, naval posture, and nuclear bargaining. <span class="change">By the weekend, AP and Axios reported that the United States and Iran were close to a framework to end the war, reopen the strait, and move nuclear issues into follow-on talks</span>. It remains relevant because the toughest parts are still sequencing and verification. The next concrete signs are mine clearance, oil-sale permissions, and inspection commitments.`, sources: [{name:"AP",url:"https://apnews.com/article/b1659232611edc10808612e30647c17d"},{name:"Axios",url:"https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear"},{name:"AP",url:"https://apnews.com/article/fa15b3bf47b0cd5ff2b3495644a9c32e"}], learn: {context:"A framework can stop immediate fighting while leaving major nuclear, missile, proxy, and sanctions issues for later negotiation.", angles:["Energy angle: Hormuz reopening can move global prices.","Israel angle: opponents may see the framework as too weak.","Iran angle: sanctions relief is leverage for Tehran."], watch:"Watch final text and regional reactions."}},
      {h: "Sudan's hunger crisis grew more vulnerable to global price shocks", proseHTML: `Sudan's war had already pushed millions into acute hunger before this week's input-cost warning. <span class="change">UN agencies warned nearly 20 million people face acute hunger, and Reuters reported the Iran conflict could raise fuel and fertilizer costs enough to reduce summer planting</span>. This matters today because food security depends on what farmers can plant now, not only on aid deliveries later. The next thing to watch is whether fighting blocks seed, fuel, and fertilizer movement into Darfur and Kordofan.`, sources: [{name:"UN Geneva",url:"https://www.ungeneva.org/en/news-media/news/2026/05/118736/sudan-hunger-crisis-deepens-un-warns-millions-face-acute-food"},{name:"Reuters",url:"https://www.marketscreener.com/news/iran-war-poses-new-threat-to-harvests-in-hunger-stricken-sudan-ce7f5addd88aff25"},{name:"UNICEF",url:"https://www.unicef.org/media/180736/file/Sudan-Humanitarian-Situation-Report-No.41%2C31-March-2026.pdf.pdf"}], learn: {context:"Acute hunger means people lack enough food in ways that can cause malnutrition, illness, or death if conditions persist.", angles:["Humanitarian angle: planting failures create future hunger.","Conflict angle: access restrictions magnify price shocks.","Global angle: a Middle East energy crisis can worsen an African food crisis."], watch:"Watch harvest forecasts and humanitarian access corridors."}}
    ]},
    {topic: "Europe / EU", stories: [
      {h: "Europe tried to invent a halfway house for Ukraine's EU future", proseHTML: `Ukraine's full EU accession remains slow because it changes budgets, law, voting power, and the bloc's relationship with an active war. <span class="change">Germany's Merz proposed associate membership for Ukraine, and Zelensky rejected the idea as unfair because it would leave Kyiv without a vote</span>. The weekly importance is that Europe is no longer debating whether Ukraine belongs in its orbit, but what institutional form that promise takes before full accession. The next watch point is whether staged membership becomes a serious negotiating track or a diplomatic placeholder.`, sources: [{name:"AP",url:"https://apnews.com/article/f1c0b453fe6339858ad6c7932ce4e432"},{name:"Reuters",url:"https://www.investing.com/news/economy-news/exclusiveukraines-zelenskiy-says-proposal-of-associate-eu-membership-unfair-4708014"},{name:"European Commission",url:"https://enlargement.ec.europa.eu/countries/ukraine_en"}], learn: {context:"Associate membership would give Ukraine participation in some EU structures without the rights of a full member.", angles:["Ukraine angle: no vote can look like second-class status.","EU angle: interim structures can manage risk.","Russia angle: any durable EU tie undermines Moscow's claim to a sphere of influence."], watch:"Watch council conclusions and accession-cluster decisions."}},
      {h: "Belarus returned as a live Ukraine-war risk", proseHTML: `Belarus was already a Russian ally and launch platform, but the week renewed concern that it could become more directly involved. <span class="change">After Russia's mass Kyiv attack using Oreshnik, European officials watched Minsk closely and Macron warned Lukashenko against deeper participation</span>. The story still matters because Belarus borders both Ukraine and NATO states, making any new deployment a European security issue. The next thing to watch is whether Russia shifts more systems or logistics through Belarus.`, sources: [{name:"Le Monde",url:"https://www.lemonde.fr/en/international/article/2026/05/26/war-in-ukraine-kyiv-grows-anxious-over-belarusian-threat_6753813_4.html"},{name:"AP",url:"https://apnews.com/article/e4bac36b2e74e67d64d23eeaac5885c0"}], learn: {context:"Belarusian territory can matter even if Belarusian troops do not fight because launch routes, staging areas, and logistics shape battlefield geography.", angles:["Ukraine angle: northern threats stretch defenses.","NATO angle: Poland and the Baltics face direct flank pressure.","Diplomacy angle: European calls try to keep Minsk below the threshold."], watch:"Watch troop movements and NATO eastern-flank alerts."}}
    ]},
    {topic: "China", stories: [
      {h: "Taiwan pressure combined military patrols and arms-sale ambiguity", proseHTML: `This week tied together two Taiwan risks: Beijing's military signaling and Washington's unclear arms-sales posture. <span class="change">Taiwan tracked a second Chinese combat-readiness patrol in a week while US reporting still left the fate of a major arms package unresolved after Trump-Xi talks</span>. The weekly importance is that ambiguity can be useful in diplomacy but dangerous in deterrence if either side misreads it. The next thing to watch is whether the United States approves the package or lets it become part of broader China bargaining.`, sources: [{name:"Reuters",url:"https://uk.marketscreener.com/news/taiwan-tracks-second-chinese-combat-patrol-in-a-week-sends-ships-and-jets-to-monitor-ce7f5addda8bf021"},{name:"Foreign Policy",url:"https://foreignpolicy.com/2026/05/14/trump-xi-meeting-summit-china-taiwan-arms-sale/"},{name:"Taiwan MND",url:"https://www.mnd.gov.tw/english/"}], learn: {context:"Deterrence depends on both capability and credibility; delayed weapons can weaken the first even if statements protect the second.", angles:["Taiwan angle: patrols create readiness fatigue.","China angle: Beijing probes for weak spots after summits.","US angle: trade and security priorities may conflict."], watch:"Watch US arms notifications and PLA exercise patterns."}},
      {h: "US-China economic talks exposed mutual chokepoints", proseHTML: `The week showed that neither side controls all the levers in the technology fight. <span class="change">Washington pressed rare-earth concerns while Taiwan enforced chip-smuggling rules, highlighting China's mineral leverage and America's compute restrictions at the same time</span>. This is useful for extemp because it moves the China story beyond tariffs into physical inputs, server clusters, and administrative licensing. The next thing to watch is which chokepoint proves easier to enforce.`, sources: [{name:"Reuters",url:"https://www.investing.com/news/commodities-news/china-says-rare-earth-controls-lawful-will-cooperate-with-us-reasonable-concerns-4700320"},{name:"AP",url:"https://apnews.com/article/175dfa061ade223086872c5810905815"},{name:"Foreign Policy",url:"https://foreignpolicy.com/2026/05/13/china-economy-us-trade-negotiations-trump-visit/"}], learn: {context:"A chokepoint is a supply-chain position where control over a small step can shape a much larger market.", angles:["US angle: chip controls need partner enforcement.","China angle: minerals offer leverage over US manufacturing.","Business angle: firms must plan around politics as much as prices."], watch:"Watch rare-earth license data and chip-enforcement cases."}}
    ]},
    {topic: "War / Active Conflicts", stories: [
      {h: "Ukraine's week became a test of air-defense endurance", proseHTML: `Russia's war strategy increasingly uses mixed drone and missile packages to drain Ukraine's defenses and keep civilians under pressure. <span class="change">The Kyiv attack with 600 drones, 90 missiles, and an Oreshnik missile made interceptor supply the week's key battlefield question</span>. It matters beyond one night because Ukraine's allies must replace expensive missiles while Russia can launch cheaper drones at scale. The next thing to watch is whether NATO support announcements translate into production and delivery timelines.`, sources: [{name:"AP",url:"https://apnews.com/article/998aeaab5833ca397290d9ee2737b0e5"},{name:"Reuters",url:"https://www.investing.com/news/world-news/russia-hits-ukraine-with-oreshnik-missile-in-one-of-wars-biggest-attacks-on-kyiv-4708261"},{name:"Le Monde",url:"https://www.lemonde.fr/en/international/article/2026/05/26/war-in-ukraine-kyiv-grows-anxious-over-belarusian-threat_6753813_4.html"}], learn: {context:"Layered air defense uses different systems for drones, cruise missiles, ballistic missiles, and aircraft because no single system covers every threat efficiently.", angles:["Military angle: saturation can succeed even when interception rates are high.","Industrial angle: production tempo is the real metric.","Civilian angle: repeated attacks keep economic and psychological pressure high."], watch:"Watch Patriot and interceptor pledges."}},
      {h: "Gaza's truce remained politically and humanitarianly unstable", proseHTML: `Gaza's ceasefire never resolved the central questions of aid, disarmament, reconstruction, and who governs the territory. <span class="change">This week brought fresh Israeli strikes, displacement orders, and rights-group warnings that aid has not reached the minimum level the UN says is needed</span>. The story remains important because a ceasefire that cannot feed people or define authority becomes a pause between escalations rather than a path to recovery. The next thing to watch is whether mediators can tie aid access to a workable administrative plan.`, sources: [{name:"Al Jazeera",url:"https://www.aljazeera.com/news/2026/5/25/israel-escalates-gaza-attacks-as-netanyahu-stalls-ceasefire-for-polls"},{name:"Human Rights Watch",url:"https://www.hrw.org/news/2026/05/19/gaza-israel-curbs-aid-kills-civilians-during-ceasefire"},{name:"Al Jazeera",url:"https://www.aljazeera.com/news/2026/5/24/israeli-attack-on-gaza-kills-three-family-members-including-infant"}], learn: {context:"Humanitarian access is a core ceasefire metric because food, medicine, fuel, and shelter determine whether civilians can survive after major combat declines.", angles:["Humanitarian angle: aid shortfalls worsen health and malnutrition.","Political angle: Israeli domestic politics shape truce incentives.","Governance angle: no reconstruction plan works without a legitimate administrator."], watch:"Watch aid-entry numbers and mediator proposals."}}
    ]}
  ],
  analytical: [
    {tag:"Iran / Energy", headline:"The Hormuz framework is a sequencing test, not just a ceasefire headline", deck:"The deal's credibility will be decided by maritime behavior, sanctions relief, inspections, and domestic politics moving in the right order.", image:"https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041", imageAlt:"Satellite view of the Strait of Hormuz", imageCredit:"NASA", imageCreditUrl:"https://www.nasa.gov/image-article/strait-of-hormuz/", skeletonHTML:`<strong>Baseline:</strong> The Iran war turned a nuclear and missile dispute into an energy-market crisis because Hormuz access, oil sales, and sanctions became bargaining chips. <strong>Move:</strong> The emerging framework reportedly links a war-ending declaration, temporary ceasefire extension, strait reopening, oil-sales space, and follow-on nuclear talks. <strong>Shift:</strong> That creates a sequencing problem: if sanctions relief moves faster than inspections and maritime guarantees, critics will call the deal a reward for coercion; if relief lags too long, Tehran has little incentive to keep the corridor calm. <strong>Why it matters:</strong> A real settlement can lower inflation pressure and reduce military risk, while a weak one can leave markets, Israel, Congress, and Gulf states preparing for the next crisis.`, stats:["AP reported the deal under discussion would end the war and reopen the Strait of Hormuz, the shipping choke point whose closure has driven the energy shock.","Axios reported a 60-day ceasefire extension and follow-on negotiations on Iran's nuclear program, meaning the hardest issues would continue after the immediate maritime step.","The US war-powers fight gives the deal a domestic clock as well as a diplomatic clock because Congress is challenging the legal basis for sustained hostilities."], sideA:{label:"Framework can de-escalate", text:"If the strait reopens and inspections resume, the deal can lower energy prices, reduce military exposure, and create space for nuclear bargaining."}, sideB:{label:"Framework can defer failure", text:"If Iran gains oil access before durable verification, the agreement may pause the war while preserving Tehran's leverage."}, sideC:{label:"Markets will audit the deal", text:"Tanker traffic, insurance costs, and crude prices will reveal whether private actors trust the framework faster than speeches will."}, sources:[{name:"AP",url:"https://apnews.com/article/b1659232611edc10808612e30647c17d"},{name:"Axios",url:"https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear"},{name:"AP",url:"https://apnews.com/article/fa15b3bf47b0cd5ff2b3495644a9c32e"}]},
    {tag:"Public Health", headline:"Bundibugyo Ebola makes trust the main containment technology", deck:"With vaccine options limited, the outbreak turns on tracing, safe burials, clinic security, and whether communities believe responders.", image:"https://www.cdc.gov/ebola/media/images/2024/04/Ebola_virus_purple.jpg", imageAlt:"Microscopic image of Ebola virus", imageCredit:"CDC", imageCreditUrl:"https://www.cdc.gov/ebola/about/index.html", skeletonHTML:`<strong>Baseline:</strong> Ebola response normally depends on fast diagnosis, isolation, contact tracing, safe burials, and community cooperation. <strong>Move:</strong> The current Congo outbreak involves the rarer Bundibugyo species, while Uganda has confirmed linked cases and health workers in Congo face attacks and suspicion. <strong>Shift:</strong> Because there is no approved vaccine or specific treatment immediately available for Bundibugyo, the response has less margin for breakdowns in trust or clinic security. <strong>Why it matters:</strong> Every attack, escaped patient, or hidden contact expands the surveillance burden and raises the chance that a regional outbreak becomes much harder to contain.`, stats:["AP reported suspected cases in Congo nearing 1,000, showing a scale that makes complete contact tracing labor-intensive.","Uganda reported seven confirmed infections linked to Congo, turning the outbreak into a cross-border health-security issue.","WHO and AP reporting describe no approved vaccine or specific treatment for Bundibugyo, putting more weight on classic public-health measures."], sideA:{label:"Containment remains possible", text:"Ebola can still be stopped when responders isolate cases, trace contacts, and make burials safer quickly enough."}, sideB:{label:"Trust is the decisive weakness", text:"If communities attack clinics or avoid reporting symptoms, official data lag reality and chains of transmission disappear."}, sideC:{label:"Regional preparedness test", text:"Uganda's cases show why border screening, hospital triage, and public communication matter before wider spread occurs."}, sources:[{name:"AP",url:"https://apnews.com/article/c43442fbc75ca31dfa948f08f9731526"},{name:"AP",url:"https://apnews.com/article/8630b816e3f40f950fd90e44b0b3395c"},{name:"WHO",url:"https://www.who.int/emergencies/disease-outbreak-news"}]},
