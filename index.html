    --text-3: #8a8a85;

    --border-2: rgba(0,0,0,0.18);
    --accent: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #232323;
      --surface-2: #2a2a2a;
      --text: #f0f0ed;
      --text-2: #b0b0a8;
      --text-3: #80807a;
      --border: rgba(255,255,255,0.1);
      --border-2: rgba(255,255,255,0.22);
      --accent: #f0f0ed;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 4rem;
  }
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.25rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  h1 { margin: 0; font-size: 26px; font-weight: 500; }
  .date { font-size: 13px; color: var(--text-2); }
  .lede { margin: 0 0 1.75rem; font-size: 14px; color: var(--text-2); }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
  .filter-btn {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: var(--text);
    border: 0.5px solid var(--border-2);
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .filter-btn:hover { background: var(--surface-2); }
  .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 16px;
  }
  .topic-tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 10px;
    background: var(--surface-2);
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  h3 { margin: 0 0 14px; font-size: 17px; font-weight: 500; line-height: 1.4; }
  .section { margin-bottom: 14px; }
  .section-label {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .section p { margin: 0; font-size: 14.5px; line-height: 1.6; }
  .stats-box {
    background: var(--surface-2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .stat { margin-bottom: 10px; font-size: 13.5px; line-height: 1.55; }
  .stat:last-child { margin-bottom: 0; }
  .stat-setup { color: var(--text-2); }
  .stat-num { color: var(--text); font-weight: 500; }
  .qs { font-size: 13.5px; line-height: 1.6; padding: 4px 0; }
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    margin-top: 4px;
    border-top: 0.5px solid var(--border);
    font-size: 12px;
    color: var(--text-3);
    flex-wrap: wrap;
    gap: 8px;
  }
  .site-footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
    font-size: 12px;
    color: var(--text-3);
    text-align: center;
  }
</style>
</head>
<body>

  <div class="filters" id="filters"></div>
  <div id="cards"></div>

  <div class="site-footer">
    Briefing compiled May 4, 2026 &middot; Updated manually. Refresh by editing data on GitHub.
  </div>
</div>

document.getElementById('datestamp').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

const topics = [...new Set(stories.map(s => s.topic))];
const filterRow = document.getElementById('filters');

function makeFilterBtn(label, topic, isActive) {
  const b = document.createElement('button');
  b.className = 'filter-btn' + (isActive ? ' active' : '');
  b.textContent = label;
  b.dataset.topic = topic;
  return b;
}

filterRow.appendChild(makeFilterBtn('All (' + stories.length + ')', 'all', true));
topics.forEach(t => {
  const count = stories.filter(s => s.topic === t).length;
  filterRow.appendChild(makeFilterBtn(t + ' (' + count + ')', t, false));
});

const container = document.getElementById('cards');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
}

function render(filter) {
  const list = filter === 'all' ? stories : stories.filter(s => s.topic === filter);
  container.innerHTML = '';
  list.forEach(s => {
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = [
      '<span class="topic-tag">' + escapeHtml(s.topic) + '</span>',
      '<h3>' + escapeHtml(s.headline) + '</h3>',
      '<div class="section"><div class="section-label">Status quo</div><p>' + escapeHtml(s.status) + '</p></div>',
      '<div class="section"><div class="section-label">What\u2019s developing</div><p>' + escapeHtml(s.developing) + '</p></div>',
      '<div class="section"><div class="section-label">Why it matters (impact)</div><p>' + escapeHtml(s.matters) + '</p></div>',
      '<div class="stats-box">',
      '  <div class="section-label" style="margin-bottom: 8px;">Key stats with setup</div>',
      s.stats.map(st => '<div class="stat"><span class="stat-setup">' + escapeHtml(st.setup) + '</span> <span class="stat-num">' + escapeHtml(st.number) + '</span></div>').join(''),
      '</div>',
      '<div class="section"><div class="section-label">Sample questions</div>',
      s.qs.map(q => '<div class="qs">\u2014 ' + escapeHtml(q) + '</div>').join(''),
      '</div>',
      '<div class="footer-row"><span>Sources: ' + escapeHtml(s.sources) + '</span></div>'
    ].join('');
    container.appendChild(card);
  });
}

filterRow.addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b) return;
  filterRow.querySelectorAll('button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  render(b.dataset.topic);
});

render('all');
</script>
</body>
</html>
