const headline={topic:'Iran / Energy',h:'Hormuz ceasefire strains become a global inflation test',deck:'New strike claims and oil gains show why reopening the strait is not the same as restoring confidence.',image:'https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041',imageAlt:'Satellite view of the Strait of Hormuz between Iran and Oman',imageCredit:'NASA',imageCreditUrl:'https://www.nasa.gov/image-article/strait-of-hormuz/'};
const intros={wire:'Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer.',weekly:'The week in consequential developments, grouped like The Wire but selected for events still shaping the map today.',analytical:'Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points.',opinion:'Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged.'};
const titles={wire:'The Wire',weekly:'The Weekly',analytical:'The Analytical',opinion:'The Opinion'};
const wire=[
{topic:'US Economy',stories:[
{h:'Oil rebound narrows Warsh Fed room before inflation data',proseHTML:`The Federal Reserve was already holding rates steady because inflation remained above its 2 percent target and tariffs were complicating goods prices. <span class='change'>Reuters-linked market reports said Brent crude rose about 3.5 percent to more than $99 after Iran accused the United States of new strikes in Hormozgan province, giving incoming Fed Chair Kevin Warsh a fresh supply-side inflation problem.</span> That matters because energy prices can move faster than wages or rents, but they still feed transport, food, fertilizer, and inflation expectations if the shock lasts. The next policy fight is whether the Federal Open Market Committee <span class='jargon'>(the Fed panel that sets US interest-rate policy)</span> treats oil as a temporary shock or a reason to delay cuts again.`,sources:[{name:'Reuters via GMA',url:'https://www.gmanetwork.com/news/topstories/world/989084/iran-says-new-us-strikes-violate-ceasefire-oil-rises-again/story/'},{name:'Federal Reserve',url:'https://www.federalreserve.gov/monetarypolicy/files/fomcminutes20260429.pdf'},{name:'Reuters via MarketScreener',url:'https://www.marketscreener.com/news/warsh-takes-over-fed-with-a-policy-problem-already-in-view-ce7f5adfdc8df624'}],learn:{context:'Central banks usually look through short oil jumps, but a strait disruption is harder because shipping, insurance, and sanctions risk can keep prices elevated after the first headline fades.',angles:['Inflation angle: oil can keep headline inflation high even if consumer demand cools.','Credibility angle: a new Fed chair has less room to appear politically driven.','Global angle: emerging-market importers feel dollar oil pressure before US consumers do.'],watch:'Watch Friday inflation data, Brent prices, Treasury yields, and whether tankers return to normal Hormuz routes.'}},
{h:'Markets test whether Hormuz deal headlines can beat shipping reality',proseHTML:`The Strait of Hormuz is a narrow waterway through which a major share of traded oil and liquefied natural gas normally moves. <span class='change'>Negotiators have discussed a framework to reopen the strait, but renewed strike allegations and oil gains show that traders are still pricing execution risk rather than only diplomatic language.</span> The evidence is in the gap between political optimism and private-market caution: insurers, tanker owners, and commodity buyers need naval posture changes, mine-risk clarity, and sanctions language before treating the route as normal. If freight and energy risk stay elevated, governments may face pressure for subsidies, reserve releases, or rate relief just as budgets and inflation targets are already strained.`,sources:[{name:'Reuters via GMA',url:'https://www.gmanetwork.com/news/topstories/world/989084/iran-says-new-us-strikes-violate-ceasefire-oil-rises-again/story/'},{name:'Axios',url:'https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear'},{name:'IMF',url:'https://mediacenter.imf.org/news/imf---world-economic-outlook-press-briefing/s/50073691-4f97-4b23-a3ab-35990f7e468f'}],learn:{context:'A diplomatic ceasefire can lower risk premiums, but shipping corridors reopen only when vessels, ports, navies, and insurers all believe the risk has actually changed.',angles:['Consumer angle: fuel and freight pass into food and goods prices.','Diplomacy angle: markets will punish vague verification language.','Food-security angle: fertilizer shortages can lag energy shocks by weeks.'],watch:'Watch tanker traffic, marine insurance costs, Brent crude, and whether any final text protects fertilizer shipments.'}}]},
{topic:'US Politics',stories:[
{h:'Texas runoff measures Trump leverage over the Senate GOP',proseHTML:`Texas is a safe Republican state in most federal cycles, but low-turnout runoffs can reveal which faction controls a party before the general election begins. <span class='change'>AP reported Texans voted Tuesday in a Republican Senate runoff between incumbent John Cornyn and Trump-backed Attorney General Ken Paxton after no candidate won a March primary majority.</span> The contest matters because Paxton carries legal controversies Democrats would weaponize, while Cornyn represents an older Senate institutional wing that Trump has criticized. The result will shape whether national Republicans treat loyalty to Trump as a stronger asset than incumbency, fundraising, and general-election caution.`,sources:[{name:'AP',url:'https://apnews.com/article/4fa609e7ddb93b47ac4e3398a12a472e'},{name:'AP live',url:'https://apnews.com/article/596173f3d9badf5a380bb9b58304ed30'},{name:'Texas Secretary of State',url:'https://www.sos.texas.gov/elections/laws/2026-may-primay-election.shtml'}],learn:{context:'Runoff electorates are often smaller and more ideological than first-round primary electorates, which can reward candidates with intense partisan support.',angles:['Trump angle: an incumbent loss would show endorsement power inside the GOP.','Senate angle: Republicans must decide how much nominee risk they can absorb.','Democratic angle: a damaged nominee can widen the map even in a red state.'],watch:'Watch final turnout, suburban counties, and how quickly Senate Republicans endorse the winner.'}},
{h:'Immigration-court rulings put executive power back at center stage',proseHTML:`The Trump administration has pushed immigration policy through detention rules, deportation arguments, and limits on federal employees who adjudicate cases. <span class='change'>AP reported the Supreme Court sided with the administration over speech restrictions for immigration judges, while a federal appeals court gave Mahmoud Khalil more time to fight deportation efforts but sent his case back toward immigration courts first.</span> The legal issue is institutional control: immigration judges sit inside the executive branch, yet they decide cases where liberty, speech, and foreign-policy claims collide. The rulings keep pressure on Congress and the courts to define how much process noncitizens, lawful permanent residents, and government adjudicators receive when national-security arguments are invoked.`,sources:[{name:'AP Supreme Court',url:'https://apnews.com/article/8e07afd9880bf12849f3251d3cb8d1bc'},{name:'AP Khalil case',url:'https://apnews.com/article/2b241fd84c2da3dffee696ed78c408e9'},{name:'Reuters via Investing',url:'https://www.investing.com/news/politics-news/supreme-court-rulings-loom-in-four-major-trumprelated-cases-4700670'}],learn:{context:'Immigration judges are not Article III federal judges; they are Justice Department employees, which makes independence disputes different from ordinary court cases.',angles:['Executive angle: presidents claim broad authority over border and foreign-policy consequences.','Rights angle: lawful residents and judges argue procedural protections cannot disappear inside immigration courts.','Institutional angle: the Supreme Court is defining where emergency executive power ends.'],watch:'Watch Supreme Court merits decisions on executive power, detention policy splits among appeals courts, and congressional oversight hearings.'}}]},
{topic:'Healthcare',stories:[
{h:'Canada adds Ebola travel isolation as Congo-Uganda outbreak widens',proseHTML:`Bundibugyo Ebola is a rarer Ebola virus species, and responders lack an approved vaccine or specific treatment for it. <span class='change'>AP reported Canada will require 21 days of self-isolation for travelers from Ebola-affected regions and temporarily suspend some immigration decisions from Congo, South Sudan, and Uganda as suspected cases and deaths rise.</span> WHO has declared the outbreak a <span class='jargon'>PHEIC (Public Health Emergency of International Concern, the legal alert used for serious cross-border health threats)</span>, and the Canada move shows governments are shifting from local containment to travel-risk management. The next danger is that fear-driven restrictions can discourage reporting unless they are paired with clear screening, support, and communication.`,sources:[{name:'AP',url:'https://apnews.com/article/3bcc0b83620cbbe88e8b37726b60fd20'},{name:'WHO',url:'https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026'},{name:'ECDC',url:'https://www.ecdc.europa.eu/en/ebola-virus-disease-outbreak-democratic-republic-congo-and-uganda'}],learn:{context:'Ebola spreads through contact with bodily fluids after symptoms begin, so tracing and isolation can stop outbreaks if communities cooperate quickly.',angles:['Health-security angle: travel rules signal cross-border concern.','Equity angle: restrictions can stigmatize communities if support is weak.','Response angle: clinic security and trust are as important as lab testing.'],watch:'Watch WHO case updates, Uganda contact tracing, and whether other countries copy Canada.'}},
{h:'US measles count keeps pressure on school and travel vaccination gaps',proseHTML:`Measles was declared eliminated in the United States in 2000, meaning imported cases should not produce sustained domestic spread when vaccination coverage is high. <span class='change'>CDC data updated in May showed more than 1,800 confirmed US measles cases this year, with later public-health dashboards pointing toward continued growth across dozens of jurisdictions.</span> Measles is so contagious that small pockets of under-vaccination can create outbreaks before health departments identify every exposed person. The summer-travel implication is concrete: airports, camps, and schools can connect clusters that were previously local.`,sources:[{name:'CDC',url:'https://www.cdc.gov/measles/data-research/index.html'},{name:'AHA',url:'https://www.aha.org/topics/measles'},{name:'PAHO',url:'https://www.paho.org/sites/default/files/2026/05/measles-outbreak-situation-report-no3-21may-2026.pdf'}],learn:{context:'The MMR vaccine is the routine measles, mumps, and rubella shot; two doses are highly protective, but community protection drops when local coverage falls.',angles:['Public-health angle: measles finds local coverage gaps quickly.','Governance angle: contact tracing is labor-intensive and expensive.','Trust angle: outbreaks test whether officials can communicate without politicizing vaccination.'],watch:'Watch CDC weekly totals, school exclusion notices, and any imported-case links to summer travel.'}}]},
{topic:'Climate / Energy',stories:[
{h:'India heat turns electricity demand into a climate-governance test',proseHTML:`India has expanded solar capacity, but hotter summers and rising air-conditioner use are pushing the grid toward sharper peaks. <span class='change'>Financial Express reported peak power demand crossed 270 gigawatts for the first time on May 21, reaching about 270.82 GW as a severe heatwave drove cooling demand.</span> The issue is not only total generation; distribution networks, evening ramping, storage, and affordable cooling decide whether vulnerable households can survive extreme heat. If outages spread during heat alerts, climate adaptation becomes a political accountability problem for power ministries and state governments.`,sources:[{name:'Financial Express',url:'https://www.financialexpress.com/policy/economy/indias-peak-power-demand-hits-record-270-8-gw-as-heatwave-intensifies/4247688/'},{name:'Reuters via WHTC',url:'https://whtc.com/2026/04/27/india-boosts-coal-and-gas-output-as-power-demand-hits-record-peak-in-heatwave/'},{name:'Al Jazeera',url:'https://www.aljazeera.com/news/2026/5/8/a-calamity-why-is-a-record-heatwave-sweeping-south-asia'}],learn:{context:'Peak demand is the highest instantaneous electricity load; grids can fail even if annual energy supply looks adequate.',angles:['Adaptation angle: cooling centers, demand response, and storage can lower deaths.','Equity angle: poor households may lack safe cooling even when cities have power.','Climate angle: hotter baselines turn once-rare peaks into planning assumptions.'],watch:'Watch India Meteorological Department heat alerts, outage reports, and whether coal and gas dispatch keep rising.'}},
{h:'Pacific growth downgrade shows energy shocks reaching small island economies',proseHTML:`Pacific island economies often rely on imported fuel, shipping, tourism, and narrow export bases, so external shocks travel quickly into public budgets. <span class='change'>Reuters reported the World Bank expects growth across 11 Pacific island countries to slow to 2.8 percent in 2026 as higher energy and shipping costs and softer tourism weigh on activity.</span> The downgrade matters because climate adaptation needs capital just as fuel and freight costs are squeezing fiscal space. For extemp, the story links faraway Hormuz energy risk to small-state debt, infrastructure, and migration pressure in Oceania.`,sources:[{name:'Reuters via Investing',url:'https://www.investing.com/news/economy-news/world-bank-sees-pacific-growth-slowing-to-28-in-2026-4678900'},{name:'Pacific Islands Forum',url:'https://forumsec.org/sites/default/files/2026-03/Pacific%20Security%20Report%202026_0.pdf'},{name:'Guardian Pacific',url:'https://www.theguardian.com/world/pacific-islands'}],learn:{context:'Small island states pay a large penalty when shipping and fuel rise because distance and scale limit substitution.',angles:['Climate-finance angle: slower growth makes adaptation harder to fund.','Security angle: Australia, China, and regional institutions compete through infrastructure and aid.','Migration angle: economic stress can reinforce climate-linked mobility.'],watch:'Watch World Bank regional updates, fuel-import costs, and security-pact negotiations involving Fiji and Vanuatu.'}}]},
{topic:'Tech / AI',stories:[
{h:'Taiwan chip-smuggling probe shows AI controls depend on paperwork',proseHTML:`US export controls are meant to keep advanced AI chips away from China, but those controls depend on firms, shippers, customs documents, and transit hubs. <span class='change'>AP reported Taiwanese prosecutors are investigating three people over alleged Nvidia-equipped server smuggling tied to forged declarations and Super Micro systems headed for China, Hong Kong, and Macau.</span> The case matters because AI competition is no longer only about chip design; it is about enforceable chokepoints across a global supply chain. If prosecutions reveal repeatable diversion routes, Washington and Taipei will face pressure to tighten compliance even at the cost of legitimate server trade.`,sources:[{name:'AP',url:'https://apnews.com/article/175dfa061ade223086872c5810905815'},{name:'Bloomberg',url:'https://www.bloomberg.com/news/articles/2026-05-21/taiwan-seeks-to-detain-three-in-ai-chip-smuggling-crackdown'},{name:'Reuters via Investing',url:'https://www.investing.com/news/stock-market-news/us-mulls-new-rules-for-ai-chip-exports-including-requiring-investments-by-foreign-firms-in-us-4545319'}],learn:{context:'Export controls restrict certain sales abroad; diversion happens when restricted goods are routed through intermediaries or mislabeled end users.',angles:['Security angle: compute access affects AI and military capability.','Business angle: compliance costs rise for server firms and cloud providers.','China angle: demand for restricted chips creates incentives for gray-market networks.'],watch:'Watch Taiwan indictments, US Commerce rules, and whether companies disclose new compliance costs.'}},
{h:'Pope Leo turns AI into a labor and dignity issue',proseHTML:`Technology regulation debates often focus on safety, competition, or national security, but religious and civil-society actors are reframing AI around work and human dignity. <span class='change'>AP reported Pope Leo XIV issued his first encyclical, Magnifica Humanitas, calling for robust AI regulation and warning developers not to put profit above the common good.</span> An encyclical <span class='jargon'>(a major papal teaching document addressed to the Catholic Church and often to wider society)</span> does not make law, but it can shape public ethics debates across governments, unions, and education systems. The practical impact is that AI regulation is likely to be argued not only as a tech-policy question but as a social-contract question about labor, autonomy, and accountability.`,sources:[{name:'AP via ABC',url:'https://www-cdn.abcnews.com/International/wireStory/pope-calls-robust-regulation-ai-manifesto-ponders-future-133279924'},{name:'Reuters Nvidia outlook',url:'https://www.investing.com/news/stock-market-news/nvidias-outlook-will-be-a-test-of-its-strategy-to-maintain-ai-dominance-4697870'},{name:'Chatham House',url:'https://www.chathamhouse.org/sites/default/files/2026-04/2026-04-28-how-surge-defence-dual-use-investment-could-reconfigure-global-AI-race-bego.pdf'}],learn:{context:'Rerum Novarum was an 1891 papal text on labor and capitalism; modern popes often use that tradition to address new economic technologies.',angles:['Labor angle: AI displacement can become a rights and dignity debate.','Regulation angle: moral pressure can move slower governments.','Geopolitics angle: military AI and chip controls make ethics part of security policy.'],watch:'Watch EU, Vatican, and US responses, plus whether labor groups cite the encyclical in bargaining.'}}]},
{topic:'Latin America',stories:[
{h:'Colombia election ceasefires expose both progress and state weakness',proseHTML:`Colombia enters its May 31 presidential vote with guerrilla violence still shaping local security and voter access. <span class='change'>Reuters reported the ELN and FARC dissident factions announced short unilateral ceasefires for the election period, saying they would respect Colombians right to vote.</span> The National Liberation Army <span class='jargon'>(ELN, Colombia oldest active guerrilla group)</span> and FARC dissidents <span class='jargon'>(armed groups that rejected or left the 2016 peace process)</span> can lower immediate election risk, but their ability to grant or withhold calm also shows how uneven state control remains. The next question is whether the winner inherits a temporary de-escalation or a bargaining landscape where armed groups use election security as leverage.`,sources:[{name:'Reuters via Investing',url:'https://www.investing.com/news/world-news/colombias-eln-rebels-call-threeday-ceasefire-for-presidential-election-4701514'},{name:'Reuters via Internazionale',url:'https://www.internazionale.it/ultime-notizie-reuters/2026/05/21/colombia-s-eln-rebels-farc-dissidents-announce-ceasefire-for-presidential-election'},{name:'Reuters Peru analysis',url:'https://www.investing.com/news/world-news/analysiskeiko-fujimori-leans-on-fathers-legacy-as-crime-fears-shape-peru-runoff-4697888'}],learn:{context:'Colombia peace process reduced the FARC as a national insurgency, but dissident groups and the ELN still control routes, coca zones, and local coercive power.',angles:['Democracy angle: a ceasefire can protect turnout.','Security angle: armed groups gain leverage by proving they can disrupt politics.','Regional angle: crime-driven elections are spreading across Latin America.'],watch:'Watch turnout in conflict regions, first-round margins, and whether ceasefires hold after polls close.'}}]},
{topic:'Africa / Middle East',stories:[
{h:'Congo funeral bans show Ebola response moving into social life',proseHTML:`Ebola control depends on safe burials because bodies can remain infectious and funerals can become transmission events. <span class='change'>AP reported authorities in northeastern Congo banned funeral wakes and gatherings of more than 50 people as the Bundibugyo outbreak spreads in Ituri and responders face mistrust, limited resources, and cross-border risk.</span> The policy is epidemiologically rational, but it is socially difficult because funeral rites are core community practices and coercive enforcement can deepen suspicion. If authorities cannot pair restrictions with trusted local leaders and safe alternatives, hidden deaths could make the outbreak harder to map.`,sources:[{name:'AP',url:'https://apnews.com/article/4e08d8df6d9c34039a9e0b8bad7a8954'},{name:'WHO Africa',url:'https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26'},{name:'ACAPS',url:'https://www.acaps.org/fileadmin/Data_Product/Main_media/20260522_ACAPS_DRC_-_Ebola_outbreak.pdf'}],learn:{context:'Safe-burial teams reduce infection risk while trying to preserve some ritual practices, but trust is fragile in conflict-affected areas.',angles:['Containment angle: gathering limits can slow spread.','Trust angle: bans can backfire if families hide deaths.','Security angle: Ituri violence makes health logistics harder.'],watch:'Watch suspected case totals, attacks on health workers, and Uganda border surveillance.'}},
{h:'Iran ceasefire allegations keep Middle East de-escalation fragile',proseHTML:`The Iran war ceasefire has been politically valuable because it creates space for Hormuz and nuclear talks, but it remains exposed to military incidents. <span class='change'>Iran foreign ministry statements accused new US strikes in southern Hormozgan province of violating the ceasefire, while oil prices rose and both sides kept negotiating a broader arrangement.</span> The key issue is verification: a ceasefire that cannot clearly distinguish enforcement, retaliation, and violation is vulnerable to competing narratives. The broader consequence is that Gulf states, Israel, China, and energy importers may make contingency plans even while publicly supporting a framework.`,sources:[{name:'Reuters via GMA',url:'https://www.gmanetwork.com/news/topstories/world/989084/iran-says-new-us-strikes-violate-ceasefire-oil-rises-again/story/'},{name:'Reuters via Investing',url:'https://www.investing.com/news/world-news/middle-east-truce-in-doubt-as-us-and-iran-fight-for-control-of-strait-of-hormuz-4657885'},{name:'UNOPS',url:'https://www.unops.org/news-and-stories/speeches/statement-on-plans-to-facilitate-the-movement-of-goods-for-humanitarian-purposes-through-the-strait-of-hormuz'}],learn:{context:'Ceasefire verification can involve monitors, defined zones, notification channels, and agreed rules for responding to alleged violations.',angles:['Diplomacy angle: a weak ceasefire can still buy time.','Military angle: one strike can reset escalation incentives.','Energy angle: oil traders respond to perceived risk faster than governments can publish proof.'],watch:'Watch official strike evidence, Gulf naval posture, and whether China or Oman pushes a monitoring mechanism.'}}]},
{topic:'Europe / EU',stories:[
{h:'NATO Arctic Sentry remains the quiet follow-on to Greenland turmoil',proseHTML:`Arctic security has shifted from a remote-planning issue to an alliance-management issue because melting routes, Russian activity, Chinese interest, and US pressure over Greenland now overlap. <span class='change'>Reuters and AP background on NATO Arctic Sentry remains relevant as allies try to fold High North surveillance under a single command after the Greenland dispute strained Denmark, the United States, and NATO.</span> The policy issue is that deterrence in the Arctic requires ports, sensors, ice-capable forces, and political unity, not only declarations. The next development to watch is whether NATO can build capabilities without making Greenland itself look like a bargaining chip.`,sources:[{name:'AP',url:'https://apnews.com/article/35855929d7709c60e1192bb6778df712'},{name:'Reuters via Investing',url:'https://www.investing.com/news/world-news/nato-has-begun-arctic-sentry-a-mission-to-strengthen-its-presence-in-the-arctic-4499501'},{name:'Reuters via Investing',url:'https://www.investing.com/news/world-news/nato-discussing-next-stepsto-ensurearctic-stays-safe-rutte-says-4445478'}],learn:{context:'The High North is strategically important for submarine routes, missile warning, minerals, shipping lanes, and control of approaches between North America and Europe.',angles:['Alliance angle: NATO unity is the capability.','Russia angle: Moscow sees Arctic access as military and economic depth.','China angle: Beijing uses research and shipping interests to enter polar politics.'],watch:'Watch NATO exercise plans, Danish-Greenlandic statements, and Arctic infrastructure funding.'}}]},
{topic:'China',stories:[
{h:'Rare earth and Taiwan questions outlast Trump-Xi summit pageantry',proseHTML:`The Trump-Xi summit produced friendlier choreography, but the core disputes involve Taiwan, chips, rare earths, and trade enforcement. <span class='change'>Reuters reporting before and after the Beijing meetings showed leaders weighing rare-earth truce extensions and Taiwan arms sales while Xi warned that mishandling Taiwan could make relations dangerous.</span> Rare earths <span class='jargon'>(minerals and processed materials used in magnets, defense systems, electronics, and clean-energy equipment)</span> give Beijing leverage because China dominates many refining stages. The next risk is that a warm summit lowers public tension while private controls, licensing, and arms decisions keep tightening the strategic rivalry.`,sources:[{name:'Reuters via Investing',url:'https://www.investing.com/news/stock-market-news/trump-and-xi-set-for-second-day-of-talks-after-taiwan-warning-4690818'},{name:'Reuters via MarketScreener',url:'https://www.marketscreener.com/news/trump-xi-to-weigh-rare-earth-truce-extension-but-china-s-curbs-still-bite-ce7f5bdfdd8bf325'},{name:'Axios',url:'https://www.axios.com/2026/05/15/trump-xi-china-summit'}],learn:{context:'China can use export licensing to slow rare-earth flows without announcing a total embargo, which makes enforcement and business uncertainty central.',angles:['Stability angle: leaders have incentives to avoid rupture before midterms and economic stress.','Taiwan angle: arms ambiguity can unsettle Taipei and embolden Beijing.','Supply-chain angle: licensing delays can be as powerful as tariff rates.'],watch:'Watch Taiwan arms-sale decisions, rare-earth license data, and new US chip-control rules.'}}]},
{topic:'War / Active Conflicts',stories:[
{h:'Russia keeps Kyiv under pressure after Oreshnik barrage',proseHTML:`Ukraine has spent years building layered air defense, but Russia is using mixed drone and missile attacks to exhaust interceptors and civilian resilience. <span class='change'>AP reported Russia fired more than 100 drones and two ballistic missiles overnight after a Sunday attack in which Ukraine said Russia used an Oreshnik hypersonic ballistic missile against Kyiv.</span> Oreshnik <span class='jargon'>(a Russian intermediate-range ballistic missile presented by Moscow as a high-speed, hard-to-intercept weapon)</span> matters less as a single weapon than as part of a saturation strategy. The practical effect is that Ukraine and its allies must measure success by production and replacement rates, not only by interception percentages after each attack.`,sources:[{name:'AP latest',url:'https://apnews.com/article/2abde640e27e7b320715d74358ba28f3'},{name:'AP Oreshnik',url:'https://apnews.com/article/998aeaab5833ca397290d9ee2737b0e5'},{name:'Reuters via Investing',url:'https://www.investing.com/news/world-news/russia-hits-ukraine-with-oreshnik-missile-in-one-of-wars-biggest-attacks-on-kyiv-4708261'}],learn:{context:'Mixed salvos force defenders to decide which targets deserve scarce interceptors while cheap drones complicate radar and command systems.',angles:['Ukraine angle: sustaining cities depends on allied supply chains.','Russia angle: repeated strikes can impose cost without a ground breakthrough.','NATO angle: Belarus and long-range missiles widen the security map.'],watch:'Watch interceptor pledges, Russian launch patterns, and whether Belarusian basing becomes more prominent.'}},
{h:'Sudan drone war keeps regional actors in the frame',proseHTML:`Sudan civil war has shifted from battles for Khartoum alone to a wider fight involving drones, external supply lines, and rival control zones. <span class='change'>Reuters reported this month that Sudan army officials accused the UAE and Ethiopia of links to a Khartoum drone attack, while conflict monitors describe continuing SAF and RSF drone campaigns across western and central Sudan.</span> The Rapid Support Forces <span class='jargon'>(RSF, the paramilitary force fighting Sudan armed forces since 2023)</span> and the Sudanese Armed Forces are now competing through reach as much as territory. The impact is humanitarian and diplomatic: regional accusations can harden proxy involvement while aid agencies face more displacement and access constraints.`,sources:[{name:'Reuters via Investing',url:'https://www.investing.com/news/world-news/sudan-army-says-uae-and-ethiopia-linked-to-khartoum-drone-attack-4660193'},{name:'Critical Threats',url:'https://www.criticalthreats.org/analysis/drc-m23-rwanda-somalia-fgs-sfc-sudan-rsf-saf-africa-file-may-14-2026'},{name:'Reuters displacement',url:'https://www.marketscreener.com/news/danish-refugee-council-warns-4-million-more-face-displacement-as-aid-drops-ce7e50dddd88ff27'}],learn:{context:'Drones let armed groups strike ports, airports, depots, and urban infrastructure without holding those areas.',angles:['Regional angle: outside support can prolong the war.','Humanitarian angle: displacement grows as front lines multiply.','Governance angle: control of skies can determine whether state institutions reopen.'],watch:'Watch Darfur, Blue Nile, Khartoum airport repairs, and UN warnings about aid funding.'}}]}];
const weekly=[
{topic:'US Economy',stories:[
{h:'Warsh week begins with inflation, oil, and bond markets all moving at once',proseHTML:`The week before today already showed why the new Fed leadership starts in a narrow corridor. <span class='change'>Reuters-linked reporting described Warsh taking the Fed helm as oil traded near or above $100, consumer sentiment weakened, and some officials questioned whether the central bank should keep an easing bias.</span> The evidence is a policy mix that normally points in opposite directions: consumers feel squeezed, but energy and tariffs can keep prices too hot for cuts. That is why the Fed story still matters today even without a new rate decision.`,sources:[{name:'Reuters via MarketScreener',url:'https://www.marketscreener.com/news/warsh-takes-over-fed-with-a-policy-problem-already-in-view-ce7f5adfdc8df624'},{name:'Reuters via Investing',url:'https://www.investing.com/news/economy-news/all-eyes-on-job-market-as-feds-ratecut-window-narrows-4659570'}],learn:{context:'An easing bias means policymakers are more likely to cut than hike if data arrive near expectations.',angles:['Hawkish angle: oil and tariffs argue against premature cuts.','Dovish angle: consumer strain can turn into weaker hiring.','Credibility angle: Warsh needs distance from White House rate pressure.'],watch:'Watch PCE inflation, jobless claims, and Fed speeches.'}},
{h:'Food and fertilizer risk made Hormuz an economic story beyond oil',proseHTML:`A weekly catch-up on energy has to include agriculture because natural gas and fertilizer are tied to global crop costs. <span class='change'>Reuters reported a UN-led effort to secure fertilizer passage through Hormuz after tanker traffic fell sharply and shortages threatened fertilizer-dependent countries.</span> That matters because food-price spikes often arrive later than oil shocks but hit fragile importers harder. The week left a clear watch point: whether a strait deal restores commodity logistics before planting and import windows close.`,sources:[{name:'Reuters via Investing',url:'https://www.investing.com/news/commodities-news/diplomatic-push-underway-on-hormuz-fertiliser-proposal-un-says-as-shortages-bite-4610288'},{name:'Global Report on Food Crises',url:'https://www.fsinplatform.org/grfc2026'}],learn:{context:'Fertilizer shortages can reduce yields months later, so a shipping interruption today can become a food-security problem next season.',angles:['Humanitarian angle: fragile countries have the least buffer.','Market angle: fertilizer and fuel prices can reinforce each other.','Diplomacy angle: humanitarian corridors may be easier than full commercial normalization.'],watch:'Watch UNOPS mechanism details and FAO food-price indicators.'}}]},
{topic:'US Politics',stories:[
{h:'Texas runoff dominated the midterm candidate-quality debate',proseHTML:`The last week made Texas a proxy for national Republican strategy. <span class='change'>Trump endorsed Ken Paxton shortly before the runoff, turning the Cornyn-Paxton race into a test of whether a scandal-heavy statewide figure can defeat a Senate incumbent by owning the MAGA lane.</span> The story matters because Senate control can turn on candidate quality even in states that usually lean one way. The outcome will still matter after today because donors, party committees, and Democrats will adjust their fall map around the nominee.`,sources:[{name:'AP',url:'https://apnews.com/article/4fa609e7ddb93b47ac4e3398a12a472e'},{name:'AP live',url:'https://apnews.com/article/596173f3d9badf5a380bb9b58304ed30'}],learn:{context:'Candidate-quality debates ask whether a nominee energizes base voters without alienating swing or suburban voters.',angles:['Base angle: Trump support can mobilize low-turnout primary voters.','General angle: legal baggage can create attack lines.','Institutional angle: incumbent senators no longer automatically command party loyalty.'],watch:'Watch national Republican spending and Democratic messaging.'}},
{h:'Courts kept remaking the boundaries of Trump executive power',proseHTML:`This week continued a longer judicial pattern: the administration wins some emergency-power fights and loses others on statutory limits. <span class='change'>AP and Reuters coverage highlighted immigration-judge speech, Khalil deportation procedure, and pending Trump-related Supreme Court disputes after tariff cases already forced the White House to seek alternative authorities.</span> The significance is structural because the same question appears across immigration, tariffs, agency independence, and war powers: when does energetic executive policy become unauthorized power? That framing will remain useful for nearly every major domestic-politics speech topic this summer.`,sources:[{name:'AP immigration judges',url:'https://apnews.com/article/8e07afd9880bf12849f3251d3cb8d1bc'},{name:'AP Khalil',url:'https://apnews.com/article/2b241fd84c2da3dffee696ed78c408e9'},{name:'Reuters via Investing',url:'https://www.investing.com/news/politics-news/supreme-court-rulings-loom-in-four-major-trumprelated-cases-4700670'}],learn:{context:'Statutory-authority cases often ask whether Congress clearly authorized the president to use a claimed power.',angles:['Pro-executive angle: crises require fast national action.','Separation angle: Congress writes the limits.','Court angle: conservative justices may split between deference and textual limits.'],watch:'Watch Supreme Court merits opinions and lower-court splits.'}}]},
{topic:'Healthcare',stories:[
{h:'Bundibugyo Ebola became a cross-border emergency this week',proseHTML:`Before this week, the outbreak could still look like a local Congo emergency with regional risk. <span class='change'>WHO declared a public-health emergency, Uganda confirmed linked infections, Congo restricted gatherings, and Canada announced isolation rules for travelers from affected areas.</span> The evidence of seriousness is not only case count; it is the combination of no approved Bundibugyo vaccine, attacks on responders, and travel-policy spillover. The story remains active today because containment now depends on trust across borders and not just treatment capacity.`,sources:[{name:'WHO',url:'https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026'},{name:'AP Canada',url:'https://apnews.com/article/3bcc0b83620cbbe88e8b37726b60fd20'},{name:'AP Congo',url:'https://apnews.com/article/4e08d8df6d9c34039a9e0b8bad7a8954'}],learn:{context:'Bundibugyo is one of several Ebola virus species; tools developed for Zaire Ebola may not transfer cleanly.',angles:['Containment angle: classic public health can still work.','Vaccine angle: missing specific tools increase risk.','Politics angle: travel rules can create stigma and compliance problems.'],watch:'Watch WHO situation reports and Uganda case chains.'}},
{h:'Medicare fraud crackdown signaled a broader health-payment fight',proseHTML:`US healthcare policy this week was not only outbreaks; it also involved payment integrity. <span class='change'>Reuters reported the administration temporarily blocked new home-health and hospice providers from enrolling in Medicare nationwide, citing fraud concerns.</span> Medicare <span class='jargon'>(the federal health-insurance program mainly for older and disabled Americans)</span> is large enough that enrollment controls can reshape provider markets quickly. The continuing relevance is access: anti-fraud pauses may protect public money but can also limit new legitimate providers in areas with aging populations.`,sources:[{name:'Reuters via Investing',url:'https://www.investing.com/news/stock-market-news/exclusiveus-halting-medicare-enrollments-for-new-home-healthcare-and-hospice-providers-4684384'},{name:'FDA MedSun',url:'https://www.fda.gov/media/192292/download?attachment='}],learn:{context:'Home-health and hospice providers bill Medicare for care delivered outside hospitals, a sector vulnerable to both essential access needs and billing abuse.',angles:['Fraud angle: moratoria can stop shell providers.','Access angle: rural and aging communities may need new providers.','Politics angle: anti-fraud enforcement is easier to defend than benefit cuts.'],watch:'Watch CMS guidance, lawsuits, and provider-access complaints.'}}]},
{topic:'Climate / Energy',stories:[
{h:'South Asia heatwave made adaptation a daily-life issue',proseHTML:`The week exposed how climate stress is experienced through power bills, school closures, work hours, and public-health alerts. <span class='change'>India recorded demand above 270 GW, while South Asia heat reporting described temperatures around or above 45 degrees Celsius in parts of India, Pakistan, and Bangladesh.</span> The number matters because heat risk is no longer only meteorological; it is an infrastructure and labor-productivity constraint. This remains relevant today because monsoon timing and grid reliability will decide whether the crisis eases or deepens.`,sources:[{name:'Financial Express',url:'https://www.financialexpress.com/policy/economy/indias-peak-power-demand-hits-record-270-8-gw-as-heatwave-intensifies/4247688/'},{name:'Al Jazeera',url:'https://www.aljazeera.com/news/2026/5/8/a-calamity-why-is-a-record-heatwave-sweeping-south-asia'},{name:'World Weather Attribution',url:'https://www.worldweatherattribution.org/climate-change-exposes-hundreds-of-millions-to-longer-and-deadlier-pre-monsoon-heat-in-south-asia/'}],learn:{context:'Wet-bulb stress combines heat and humidity, making human cooling harder even when shade exists.',angles:['Grid angle: peak load decides survival.','Labor angle: outdoor work becomes unsafe.','Equity angle: cooling access divides rich and poor households.'],watch:'Watch heat-health alerts and blackout reports.'}},
{h:'Offshore wind reversals showed US energy transition policy moving backward',proseHTML:`Energy policy over the week showed fossil-fuel security and climate goals pulling in opposite directions. <span class='change'>Reuters reported the Trump administration reached deals to end more offshore-wind leases in exchange for pledged domestic fossil-fuel investments.</span> The policy mechanism matters because lease cancellation does not only remove projects; it signals to capital markets that federal support for offshore wind can reverse by administration. The continuing impact is that states, utilities, and developers may demand higher returns or guarantees before committing to long-lived clean-energy infrastructure.`,sources:[{name:'Reuters via MarketScreener',url:'https://ca.marketscreener.com/news/us-in-deal-to-end-two-more-offshore-wind-leases-in-exchange-for-fossil-fuel-investments-ce7f59dddb8ff326'},{name:'Carbon Brief',url:'https://www.carbonbrief.org/debriefed-1-may-2026-countries-chart-path-away-from-fossil-fuels-chinas-clean-tech-surge-global-forest-loss-slows/'}],learn:{context:'Offshore wind requires long permitting, grid, vessel, and finance timelines, so policy reversals can affect projects years before construction.',angles:['Security angle: fossil investment can answer immediate fuel shock.','Climate angle: clean-power delays lock in emissions.','Finance angle: policy risk raises capital costs.'],watch:'Watch state responses and new lease litigation.'}}]},
{topic:'Tech / AI',stories:[
{h:'Chip controls moved from policy text to criminal enforcement',proseHTML:`For years the US-China AI fight centered on rules written in Washington. <span class='change'>This week, Taiwan raids and detentions over alleged Nvidia server diversion showed that enforcement in partner jurisdictions may decide whether those rules matter.</span> The story is important because global AI compute supply chains touch Taiwan, the United States, Southeast Asia, Hong Kong, and Chinese cloud demand. It remains live today because every new enforcement case teaches both regulators and smugglers how the system works.`,sources:[{name:'AP',url:'https://apnews.com/article/175dfa061ade223086872c5810905815'},{name:'Bloomberg',url:'https://www.bloomberg.com/news/articles/2026-05-21/taiwan-seeks-to-detain-three-in-ai-chip-smuggling-crackdown'},{name:'Tom Hardware',url:'https://www.tomshardware.com/desktops/servers/taiwan-raids-12-locations-in-its-first-formal-crackdown-on-nvidia-ai-chip-smuggling-hunts-three-fugitives-for-document-forgery-fraudulent-declarations-in-super-micro-smuggling-case'}],learn:{context:'Compute controls aim to limit access to chips used for training or running advanced AI models.',angles:['Enforcement angle: forged documents are now strategic evidence.','Market angle: restricted chips create high arbitrage value.','Alliance angle: Taiwan compliance matters to US policy success.'],watch:'Watch US indictments, Taiwan court action, and company disclosures.'}},
{h:'AI ethics entered the global public square through the Vatican',proseHTML:`The last week made AI a moral and labor question beyond technical regulation. <span class='change'>Pope Leo XIV first encyclical called for robust AI regulation, connecting automation to work, war, and human dignity.</span> The document matters because the Catholic social-teaching tradition has historically influenced debates over labor, welfare, and capitalism beyond Catholic voters alone. Its relevance today is that lawmakers can cite AI harms in ethical rather than purely technical language.`,sources:[{name:'AP via ABC',url:'https://www-cdn.abcnews.com/International/wireStory/pope-calls-robust-regulation-ai-manifesto-ponders-future-133279924'},{name:'arXiv military AI attitudes',url:'https://arxiv.org/abs/2605.25196'}],learn:{context:'An encyclical is not a statute, but it can shape civil-society pressure and political language.',angles:['Labor angle: AI regulation may focus on dignity and displacement.','Security angle: military AI raises separate legitimacy problems.','Corporate angle: developers face moral as well as legal scrutiny.'],watch:'Watch reactions from EU officials, labor groups, and tech companies.'}}]},
{topic:'Latin America',stories:[
{h:'Peru and Colombia showed crime shaping democratic choices',proseHTML:`Across Latin America, public safety has moved from a policing issue to a central electoral cleavage. <span class='change'>Reuters analysis of Peru described Keiko Fujimori leaning on her father political legacy as crime fears dominate the runoff, while Colombian rebels announced election-period ceasefires before the May 31 vote.</span> The evidence is regional: voters are rewarding or considering hardline candidates where extortion, homicide, and armed-group pressure feel more immediate than ideological platforms. The story still matters today because security politics can reshape institutions after the ballots are counted.`,sources:[{name:'Reuters Peru',url:'https://www.investing.com/news/world-news/analysiskeiko-fujimori-leans-on-fathers-legacy-as-crime-fears-shape-peru-runoff-4697888'},{name:'Reuters Colombia',url:'https://www.investing.com/news/world-news/colombias-eln-rebels-call-threeday-ceasefire-for-presidential-election-4701514'},{name:'Reuters Peru election',url:'https://www.investing.com/news/commodities-news/peru-faces-record-field-in-election-corruption-and-crime-top-voter-concerns-4605905'}],learn:{context:'Hardline security politics often promise fast order but can strain courts, prisons, and civil liberties.',angles:['Democracy angle: fear changes voting behavior.','Rule-of-law angle: anti-crime politics can weaken checks.','Regional angle: Bukele-style models are influencing debates beyond El Salvador.'],watch:'Watch Peru runoff polling and Colombia election security.'}}]},
{topic:'Africa / Middle East',stories:[
{h:'Ebola and Sudan kept African crisis risk on two tracks',proseHTML:`The week in Africa was not one crisis but two different types of fragility. <span class='change'>Congo and Uganda faced a cross-border Ebola emergency while Sudan fighting and drone allegations continued to deepen displacement and regional suspicion.</span> The contrast matters because health crises need trust and access, while civil-war crises need ceasefires and humanitarian corridors. Both remain active today because aid shortfalls and insecurity reduce the ability to respond before local emergencies become regional ones.`,sources:[{name:'WHO Ebola',url:'https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026'},{name:'Reuters Sudan',url:'https://www.investing.com/news/world-news/sudan-army-says-uae-and-ethiopia-linked-to-khartoum-drone-attack-4660193'},{name:'Reuters displacement',url:'https://www.marketscreener.com/news/danish-refugee-council-warns-4-million-more-face-displacement-as-aid-drops-ce7e50dddd88ff27'}],learn:{context:'Aid systems are stretched when health emergencies and armed conflicts occur in neighboring regions at the same time.',angles:['Capacity angle: responders compete for scarce funds.','Regional angle: borders spread both disease risk and arms flows.','Humanitarian angle: displacement makes surveillance and care harder.'],watch:'Watch UN appeals, WHO case updates, and Sudan ceasefire efforts.'}},
{h:'Hormuz war risk became a Middle East plus global-economy story',proseHTML:`The Middle East week centered on whether a ceasefire can reopen the world energy artery without settling the whole Iran question. <span class='change'>Reuters and Axios reporting described talks over Hormuz reopening, sanctions, ceasefire timing, and nuclear follow-on negotiations while new strike allegations kept the truce fragile.</span> The significance is that even a narrow maritime deal would affect oil, food, inflation, and US war-powers politics. It remains relevant today because the hardest issues may simply move into a 60-day negotiating clock.`,sources:[{name:'Reuters via GMA',url:'https://www.gmanetwork.com/news/topstories/world/989084/iran-says-new-us-strikes-violate-ceasefire-oil-rises-again/story/'},{name:'Axios',url:'https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear'},{name:'Reuters truce',url:'https://www.investing.com/news/world-news/middle-east-truce-in-doubt-as-us-and-iran-fight-for-control-of-strait-of-hormuz-4657885'}],learn:{context:'A narrow agreement can solve shipping access while leaving nuclear restrictions, sanctions, and regional proxy issues unresolved.',angles:['Optimistic angle: maritime reopening lowers immediate global costs.','Skeptical angle: unresolved nuclear issues can restart escalation.','Domestic angle: Congress may challenge war authority even if diplomacy advances.'],watch:'Watch verification terms and Senate war-powers votes.'}}]},
{topic:'Europe / EU',stories:[
{h:'Ukraine attacks made air-defense production the European security issue of the week',proseHTML:`This week Russia reminded Europe that Ukraine aid is an industrial race, not just a diplomatic position. <span class='change'>AP and Reuters reported major Kyiv strikes involving drones, missiles, and Oreshnik use, followed by continued overnight attacks.</span> The key evidence is scale: mixed barrages force Ukraine to spend scarce interceptors and expose whether Europe and the United States can replace them fast enough. The story remains relevant today because every air-defense shortage changes civilian risk and bargaining leverage.`,sources:[{name:'AP Oreshnik',url:'https://apnews.com/article/998aeaab5833ca397290d9ee2737b0e5'},{name:'AP latest Ukraine',url:'https://apnews.com/article/2abde640e27e7b320715d74358ba28f3'},{name:'Reuters via Investing',url:'https://www.investing.com/news/world-news/russia-hits-ukraine-with-oreshnik-missile-in-one-of-wars-biggest-attacks-on-kyiv-4708261'}],learn:{context:'Air defense depends on launchers, radars, trained crews, interceptors, and repair capacity.',angles:['Ukraine angle: survival depends on supply cadence.','Europe angle: defense industry must scale faster.','Russia angle: attrition can be strategic even without territorial gains.'],watch:'Watch Patriot and European interceptor pledges.'}},
{h:'Arctic security stayed in the NATO background but not off the map',proseHTML:`The Arctic did not dominate daily headlines, but it remained a major weekly security thread. <span class='change'>NATO Arctic Sentry reporting and Greenland-related tensions showed allies trying to strengthen High North monitoring while avoiding another public split over US designs on Greenland.</span> The issue matters because new sea routes, minerals, Russian military infrastructure, and Chinese interest are all converging. It still matters today because alliance trust is itself a deterrent asset.`,sources:[{name:'AP Arctic Sentry',url:'https://apnews.com/article/35855929d7709c60e1192bb6778df712'},{name:'Reuters Arctic Sentry',url:'https://www.investing.com/news/world-news/nato-has-begun-arctic-sentry-a-mission-to-strengthen-its-presence-in-the-arctic-4499501'}],learn:{context:'Arctic governance crosses defense, indigenous politics, climate change, mineral access, and shipping.',angles:['NATO angle: unity lowers Russian opportunity.','Denmark angle: Greenland sovereignty makes diplomacy sensitive.','China angle: economic entry can become strategic presence.'],watch:'Watch NATO exercises and Greenland-Denmark-US statements.'}}]},
{topic:'China',stories:[
{h:'Trump-Xi summit gave the week a managed-rivalry frame',proseHTML:`The summit did not resolve the rivalry, but it gave both governments a way to present competition as controlled. <span class='change'>Reuters reported Xi warned over Taiwan while trade, rare earths, Iran, and AI remained on the agenda; Axios described friendly choreography masking structural tension.</span> That matters because markets may price stability while militaries and regulators prepare for confrontation. The story remains relevant today because Taiwan arms sales and rare-earth licensing will reveal whether summit language changed behavior.`,sources:[{name:'Reuters summit',url:'https://www.investing.com/news/stock-market-news/trump-and-xi-set-for-second-day-of-talks-after-taiwan-warning-4690818'},{name:'Axios summit',url:'https://www.axios.com/2026/05/15/trump-xi-china-summit'},{name:'Reuters rare earths',url:'https://www.marketscreener.com/news/trump-xi-to-weigh-rare-earth-truce-extension-but-china-s-curbs-still-bite-ce7f5bdfdd8bf325'}],learn:{context:'Managed rivalry means adversaries preserve channels and trade while still competing over security and technology.',angles:['Stability angle: both leaders need economic calm.','Taiwan angle: ambiguity can become dangerous if read differently.','Tech angle: controls continue beneath diplomatic ceremony.'],watch:'Watch Taiwan arms-sale decisions and rare-earth export data.'}}]},
{topic:'War / Active Conflicts',stories:[
{h:'Russia, Iran, and Sudan made the week a test of endurance politics',proseHTML:`The biggest conflicts of the week shared a pattern: each side tried to prove it could absorb pressure longer than opponents expected. <span class='change'>Russia sustained air attacks on Ukraine, Iran kept Hormuz leverage alive despite ceasefire talks, and Sudan combatants continued drone-linked accusations and displacement.</span> The common metric is not one battlefield map; it is endurance across munitions, domestic politics, humanitarian capacity, and economic pain. That is why these conflicts remain useful extemp comparisons today.`,sources:[{name:'AP Ukraine',url:'https://apnews.com/article/2abde640e27e7b320715d74358ba28f3'},{name:'Reuters Iran',url:'https://www.gmanetwork.com/news/topstories/world/989084/iran-says-new-us-strikes-violate-ceasefire-oil-rises-again/story/'},{name:'Reuters Sudan',url:'https://www.investing.com/news/world-news/sudan-army-says-uae-and-ethiopia-linked-to-khartoum-drone-attack-4660193'}],learn:{context:'Endurance politics asks which actor can sustain costs, supply, and legitimacy longer than rivals.',angles:['Military angle: production matters as much as tactics.','Economic angle: oil and food shocks globalize local wars.','Humanitarian angle: aid shortfalls change political outcomes.'],watch:'Watch munitions deliveries, oil prices, and UN aid appeals.'}}]}];
const analytical=[
{tag:'Iran / Energy',headline:'Hormuz deal politics are really a verification problem',deck:'The decisive question is whether shipping, sanctions, and strike rules become credible enough for markets to trust.',image:'https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041',imageAlt:'Satellite view of the Strait of Hormuz',imageCredit:'NASA',imageCreditUrl:'https://www.nasa.gov/image-article/strait-of-hormuz/',skeletonHTML:`<strong>Baseline:</strong> Hormuz is a physical choke point and a political bargaining chip because energy, fertilizer, and security guarantees all pass through it. <strong>Move:</strong> A framework is reportedly under discussion, but renewed strike allegations and oil moving above $99 show that a ceasefire is not yet an operating system. <strong>Shift:</strong> The story has moved from whether diplomats can announce a deal to whether navies, insurers, tanker owners, and sanctions officials can verify it. <strong>Why it matters:</strong> A credible framework can lower inflation pressure and reduce war-powers tension; a vague one leaves every actor preparing for the next escalation while pretending de-escalation has begun.`,stats:['Reuters-linked reporting said Brent crude rose about 3.5 percent to more than $99 after new strike allegations, showing market sensitivity to ceasefire credibility.','Reuters earlier reported UN concern that a more-than-90 percent drop in tanker traffic threatened fertilizer supply chains, broadening Hormuz from oil to food security.','Axios reported discussions around a 60-day ceasefire extension and follow-on nuclear negotiations, meaning the hardest issues would survive the initial maritime deal.'],sideA:{label:'Framework can de-escalate',text:'If the strait reopens with monitoring and sanctions clarity, energy prices can fall before a full nuclear settlement exists.'},sideB:{label:'Framework can defer failure',text:'If Iran gains relief while verification stays weak, the deal may only pause escalation and preserve coercive leverage.'},sideC:{label:'Markets will audit first',text:'Oil, insurance, and tanker routes will reveal trust faster than speeches or communiques.'},sources:[{name:'Reuters via GMA',url:'https://www.gmanetwork.com/news/topstories/world/989084/iran-says-new-us-strikes-violate-ceasefire-oil-rises-again/story/'},{name:'Axios',url:'https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear'},{name:'Reuters fertilizer',url:'https://www.investing.com/news/commodities-news/diplomatic-push-underway-on-hormuz-fertiliser-proposal-un-says-as-shortages-bite-4610288'}]},
{tag:'Public Health',headline:'Bundibugyo Ebola makes trust the main containment technology',deck:'With no approved species-specific vaccine, classic outbreak control has less margin for social breakdown.',image:'https://www.cdc.gov/ebola/media/images/2024/04/Ebola_virus_purple.jpg',imageAlt:'Microscopic image of Ebola virus',imageCredit:'CDC',imageCreditUrl:'https://www.cdc.gov/ebola/about/index.html',skeletonHTML:`<strong>Baseline:</strong> Ebola response depends on diagnosis, isolation, tracing, safe burials, clinic security, and community consent. <strong>Move:</strong> WHO declared a PHEIC, Congo restricted funerals and gatherings, Uganda confirmed linked cases, and Canada imposed traveler isolation. <strong>Shift:</strong> The response is no longer a local medical campaign; it is a regional trust and mobility problem. <strong>Why it matters:</strong> If families avoid clinics or governments overreact with unsupported travel rules, hidden transmission can outrun official surveillance.`,stats:['AP reported Canada will require 21 days of self-isolation for travelers from affected regions, matching the outer edge of Ebola incubation planning.','WHO identified the outbreak as Bundibugyo virus disease in Congo and Uganda and declared a public-health emergency of international concern.','AP reported Congo banned funeral wakes and large gatherings, showing authorities are targeting social practices that can spread infection.'],sideA:{label:'Containment remains possible',text:'Ebola can still be stopped with isolation, tracing, safe burials, and trusted local engagement.'},sideB:{label:'Trust is the weak point',text:'Fear, attacks on responders, and hidden deaths can break the chain of surveillance.'},sideC:{label:'Travel policy cuts both ways',text:'Isolation rules can slow exportation but also stigmatize communities and discourage reporting.'},sources:[{name:'WHO',url:'https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026'},{name:'AP Canada',url:'https://apnews.com/article/3bcc0b83620cbbe88e8b37726b60fd20'},{name:'AP Congo',url:'https://apnews.com/article/4e08d8df6d9c34039a9e0b8bad7a8954'}]},
{tag:'Ukraine / Europe',headline:'Ukraine air defense has become an industrial endurance contest',deck:'Russia is testing whether mixed salvos can force Ukraine and allies to spend interceptors faster than they can build them.',image:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Building_on_Valeriya_Lobanovskoho_Avenue%2C_6A%2C_after_missile_strike%2C_2022-02-26_%2803%29.jpg/1280px-Building_on_Valeriya_Lobanovskoho_Avenue%2C_6A%2C_after_missile_strike%2C_2022-02-26_%2803%29.jpg',imageAlt:'Kyiv residential building damaged after a missile strike',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:Building_on_Valeriya_Lobanovskoho_Avenue,_6A,_after_missile_strike,_2022-02-26_(03).jpg',skeletonHTML:`<strong>Baseline:</strong> Ukraine can blunt attacks with layered defense, but every interceptor has a production chain, budget, crew, and delivery delay. <strong>Move:</strong> Russia used major mixed attacks around Kyiv and followed with more than 100 drones and ballistic missiles overnight. <strong>Shift:</strong> Moscow is turning air defense into a cost-exchange problem, where cheap drones and rare advanced missiles force expensive choices. <strong>Why it matters:</strong> If allied production lags Russian launch capacity, civilian damage and bargaining pressure can rise without a front-line breakthrough.`,stats:['AP reported Russia fired more than 100 drones and two ballistic missiles overnight after warning Kyiv could face more barrages.','AP reported Ukraine said Russia used Oreshnik in a mass Kyiv attack, the third reported use of the weapon in the war.','Reuters-linked reporting described one of the heaviest Kyiv attacks of the four-year war, emphasizing scale and saturation.'],sideA:{label:'Allied production can stabilize defense',text:'If NATO accelerates interceptors, radars, and repair support, Russia loses the strategic payoff from barrages.'},sideB:{label:'Cost exchange favors Russia',text:'Low-cost drones can drain expensive interceptors while missiles exploit gaps.'},sideC:{label:'Belarus widens pressure',text:'Launch geography and allied Russian basing can stretch Ukrainian planning and NATO attention.'},sources:[{name:'AP latest',url:'https://apnews.com/article/2abde640e27e7b320715d74358ba28f3'},{name:'AP Oreshnik',url:'https://apnews.com/article/998aeaab5833ca397290d9ee2737b0e5'},{name:'Reuters via Investing',url:'https://www.investing.com/news/world-news/russia-hits-ukraine-with-oreshnik-missile-in-one-of-wars-biggest-attacks-on-kyiv-4708261'}]},
{tag:'China / Technology',headline:'US-China competition is moving from tariff rates to enforceable chokepoints',deck:'Rare-earth licensing and AI-chip smuggling cases show that paperwork and partner enforcement now decide strategic capacity.',image:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/TSMC_Fab5.JPG/1280px-TSMC_Fab5.JPG',imageAlt:'TSMC fabrication plant in Taiwan',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:TSMC_Fab5.JPG',skeletonHTML:`<strong>Baseline:</strong> Washington limits Chinese access to advanced AI compute, while Beijing controls key rare-earth processing capacity. <strong>Move:</strong> Taiwan opened a formal smuggling crackdown as Trump and Xi tried to manage rare-earth and Taiwan disputes through summit diplomacy. <strong>Shift:</strong> Strategic competition now turns on customs declarations, export licenses, resellers, and enforcement in third jurisdictions. <strong>Why it matters:</strong> If chokepoints leak, strategic controls lose value; if they tighten too hard, global firms face higher costs and fragmented supply chains.`,stats:['AP reported Taiwanese prosecutors are investigating three people over alleged Nvidia-equipped server smuggling to China, Hong Kong, and Macau.','Reuters reported China and the United States were weighing rare-earth truce questions even as Chinese curbs continued to affect shipments.','Reuters summit coverage placed Taiwan, Iran, trade, and AI inside the same diplomatic package, showing how issue linkage shapes bargaining.'],sideA:{label:'Controls can bite',text:'Criminal enforcement and licensing data make evasion riskier and more expensive.'},sideB:{label:'Markets find leaks',text:'High demand, resale networks, and shell buyers can route around rules unless enforcement is constant.'},sideC:{label:'Partners decide outcomes',text:'Taiwan, Southeast Asia, and Hong Kong can determine whether US and Chinese controls become real.'},sources:[{name:'AP chip probe',url:'https://apnews.com/article/175dfa061ade223086872c5810905815'},{name:'Reuters rare earths',url:'https://www.marketscreener.com/news/trump-xi-to-weigh-rare-earth-truce-extension-but-china-s-curbs-still-bite-ce7f5bdfdd8bf325'},{name:'Reuters summit',url:'https://www.investing.com/news/stock-market-news/trump-and-xi-set-for-second-day-of-talks-after-taiwan-warning-4690818'}]},
{tag:'Climate / Development',headline:'South Asia heat shows adaptation is now peak-load politics',deck:'The electricity grid has become the front line between climate risk and ordinary public services.',image:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/India_Gate_in_New_Delhi_03-2016_img3.jpg/1280px-India_Gate_in_New_Delhi_03-2016_img3.jpg',imageAlt:'India Gate in New Delhi',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:India_Gate_in_New_Delhi_03-2016_img3.jpg',skeletonHTML:`<strong>Baseline:</strong> India has expanded clean power but still faces heavy coal reliance, fast-rising cooling demand, and uneven distribution capacity. <strong>Move:</strong> Peak demand crossed 270 GW during a severe heatwave, while regional heat stress spread across South Asia. <strong>Shift:</strong> Climate adaptation is now judged by whether grids, labor rules, water systems, and cooling centers work during peak stress. <strong>Why it matters:</strong> Governments can announce emissions targets, but citizens experience climate governance as power reliability, safe work hours, and heat-health warnings.`,stats:['Financial Express reported peak power demand reached about 270.82 GW on May 21, crossing 270 GW for the first time.','Reuters earlier reported India had boosted coal and gas output as demand approached record levels, showing the tension between adaptation and emissions.','Al Jazeera reported parts of South Asia approached or exceeded 45 degrees Celsius, which raises mortality and labor-productivity risk.'],sideA:{label:'Adaptation can scale',text:'Storage, demand response, cooling centers, and heat alerts can reduce deaths if planned as one system.'},sideB:{label:'Infrastructure can lag demand',text:'Peak loads may grow faster than distribution upgrades and affordable cooling access.'},sideC:{label:'Heat is politically visible',text:'Blackouts during heatwaves become governance failures, not abstract climate statistics.'},sources:[{name:'Financial Express',url:'https://www.financialexpress.com/policy/economy/indias-peak-power-demand-hits-record-270-8-gw-as-heatwave-intensifies/4247688/'},{name:'Reuters via WHTC',url:'https://whtc.com/2026/04/27/india-boosts-coal-and-gas-output-as-power-demand-hits-record-peak-in-heatwave/'},{name:'Al Jazeera',url:'https://www.aljazeera.com/news/2026/5/8/a-calamity-why-is-a-record-heatwave-sweeping-south-asia'}]}];
const opinion=[
{label:'CFR Analysis',title:'Trump Project Freedom Is Not Enough for Hormuz',author:'Steven A. Cook',publication:'Council on Foreign Relations',date:'May 2026',subtitle:'Cook argues that military pressure cannot substitute for a political mechanism that actually reopens and secures the strait.',proseHTML:`The essay responds to the same live problem driving today news: the United States and Iran can damage each other but still fail to restore normal shipping through Hormuz. Its value is that it separates battlefield dominance from strategic success, a distinction that matters when oil, fertilizer, and inflation are the scoreboard. The argument helps explain why a narrow deal may be necessary even for hawks who believe Iran should face pressure. The pushback is that coercive leverage may be what brought Tehran back to talks in the first place.`,claim:'Military superiority does not automatically produce maritime access or political settlement.',matters:'It gives speakers a clean way to separate tactical success from strategic outcome.',pushback:'Force can still create bargaining leverage when diplomacy alone has failed.',sources:[{name:'CFR',url:'https://www.cfr.org/articles/trumps-project-freedom-isnt-going-to-open-the-strait-of-hormuz'}]},
{label:'Chatham House Essay',title:'Taiwan as a Bargaining Chip Alarms US Allies',author:'Chatham House contributors',publication:'Chatham House',date:'May 2026',subtitle:'The essay argues that transactional Taiwan language weakens alliance confidence even if formal US policy does not change.',proseHTML:`The piece starts from the Trump-Xi summit and the live question of whether Taiwan arms sales are security commitments or negotiating assets. That argument matters now because rare earths, AI chips, and Iran diplomacy all tempt Washington to trade issues across the same table. The value for extemp is that it frames credibility as a regional public good: Japan, Australia, the Philippines, and Taiwan all listen to how Washington talks about one ally. The limitation is that strategic ambiguity has always required some refusal to state exact commitments.`,claim:'Treating Taiwan as negotiable can weaken deterrence even without an official policy reversal.',matters:'It connects summit rhetoric to Indo-Pacific alliance behavior.',pushback:'Ambiguity can preserve flexibility and avoid automatic escalation.',sources:[{name:'Chatham House',url:'https://www.chathamhouse.org/2026/05/trumps-approach-taiwan-could-jeopardize-its-future-indo-pacific-allies-are-taking-note'}]},
{label:'Foreign Policy Analysis',title:'Washington Might Be Ready to Bargain With Beijing',author:'Robert A. Manning',publication:'Foreign Policy',date:'May 19, 2026',subtitle:'Manning argues the Trump-Xi summit shows the United States adjusting to a managed-rivalry posture with China.',proseHTML:`The article treats the summit as more than pageantry because both powers need economic calm while still competing over Taiwan, chips, and supply chains. The argument is live because rare-earth licensing and AI-smuggling enforcement moved in the same week as summit fallout. Its extemp value is a middle lane between appeasement and confrontation: durable China policy may require bargaining without pretending rivalry is over. The pushback is that bargaining can become concession if red lines are unclear.`,claim:'US-China policy is shifting toward managed bargaining from a position of constrained power.',matters:'It helps speakers avoid simplistic toughness-versus-weakness framing.',pushback:'Beijing may read bargaining as evidence that pressure works.',sources:[{name:'Foreign Policy',url:'https://foreignpolicy.com/2026/05/19/trump-xi-summit-china-relationship-trade-strategy/'}]},
{label:'Project Syndicate Essay',title:'American Superpower Suicide',author:'Timothy Snyder',publication:'Project Syndicate',date:'May 14, 2026',subtitle:'Snyder argues US power is being weakened by choices that damage alliances, institutions, and credibility from within.',proseHTML:`The essay uses current foreign-policy stress to make a broader claim about self-inflicted decline. It is live because the United States is simultaneously managing Iran, Ukraine, Taiwan, immigration-law disputes, and war-powers fights. The piece is useful because it defines power as institutional capacity and alliance trust, not only military hardware. The counterargument is that voters may see some institutions as slow, costly, or unaccountable rather than automatic power multipliers.`,claim:'The United States weakens itself when it treats institutions and alliances as burdens instead of strategic assets.',matters:'It links several current stories into one thesis about credibility and national capacity.',pushback:'Some institutional constraints impose real costs and can deserve reform.',sources:[{name:'Project Syndicate',url:'https://www.project-syndicate.org/commentary/trump-committing-superpower-suicide-america-by-timothy-snyder-2026-05'}]}];
function sourceHTML(sources){return `<div class='wire-sources'>Sources:${sources.map(s=>`<a class='source-link' href='${s.url}' target='_blank' rel='noopener noreferrer'>${s.name}</a>`).join(' /')}</div>`}
function learnHTML(learn){if(!learn)return '';return `<details class='learn'><summary>Learn more</summary><div class='learn-body'><h4>Deeper context</h4><p>${learn.context}</p><h4>Three angles</h4><ul>${learn.angles.map(a=>`<li>${a}</li>`).join('')}</ul><h4>What to watch</h4><p>${learn.watch}</p></div></details>`}
function renderHeadline(){document.getElementById('headlineDay').innerHTML=`<div class='headline-copy'><div class='headline-label'>${headline.topic}</div><h2>${headline.h}</h2><p>${headline.deck}</p></div><figure class='headline-media'><img class='headline-photo' src='${headline.image}' alt='${headline.imageAlt}' loading='lazy'><figcaption class='image-credit'>Image:<a class='source-link' href='${headline.imageCreditUrl}' target='_blank' rel='noopener noreferrer'>${headline.imageCredit}</a></figcaption></figure>`}
function renderWireList(list){return list.map(group=>`<details class='topic'><summary><span class='topic-label'>${group.topic}</span><span class='topic-count'>${group.stories.length} stories</span></summary><div class='topic-body'>${group.stories.map(story=>`<article class='wire-item'><h2 class='wire-headline'>${story.h}</h2><p class='wire-prose'>${story.proseHTML}</p>${sourceHTML(story.sources)}${learnHTML(story.learn)}</article>`).join('')}</div></details>`).join('')}
function imageHTML(item){if(!item.image)return '';return `<figure class='analytical-image'><img src='${item.image}' alt='${item.imageAlt||''}' loading='lazy'><figcaption class='image-credit'>Image:<a class='source-link' href='${item.imageCreditUrl||item.image}' target='_blank' rel='noopener noreferrer'>${item.imageCredit||'Source'}</a></figcaption></figure>`}
function renderAnalytical(){return analytical.map(item=>`<details class='analytical-file'><summary><div class='analytical-summary'><div class='analytical-tag'>${item.tag}</div><h2>${item.headline}</h2>${item.deck?`<p class='analytical-deck'>${item.deck}</p>`:''}</div></summary><div class='analytical-body'>${imageHTML(item)}<p class='skeleton'>${item.skeletonHTML}</p><section class='stats-block'><h3>Key Stats With Setup</h3>${item.stats.map(s=>`<p>${s}</p>`).join('')}</section><div class='angles-title'>Three Angles</div><div class='angles-grid'><div class='angle angle-a'><strong>${item.sideA.label}</strong>${item.sideA.text}</div><div class='angle angle-b'><strong>${item.sideB.label}</strong>${item.sideB.text}</div><div class='angle angle-c'><strong>${item.sideC.label}</strong>${item.sideC.text}</div></div>${sourceHTML(item.sources)}</div></details>`).join('')}
function renderOpinion(){return opinion.map(item=>`<article class='opinion-card'><div class='opinion-label'>${item.label}</div><h2>${item.title}</h2><p class='opinion-meta'>${item.author} - ${item.publication}, ${item.date}</p><p class='opinion-subtitle'><strong>${item.subtitle}</strong></p><p class='opinion-prose'>${item.proseHTML}</p><div class='opinion-boxes'><div class='opinion-box'><strong>The Claim</strong>${item.claim}</div><div class='opinion-box'><strong>Why It Matters</strong>${item.matters}</div><div class='opinion-box'><strong>Pushback</strong>${item.pushback}</div></div>${sourceHTML(item.sources)}</article>`).join('')}
function renderTab(tab){document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.tab===tab));document.getElementById('editionTitle').textContent=titles[tab];document.getElementById('editionDesc').textContent=intros[tab];const content=document.getElementById('content');if(tab==='wire')content.innerHTML=renderWireList(wire);if(tab==='weekly')content.innerHTML=renderWireList(weekly);if(tab==='analytical')content.innerHTML=renderAnalytical();if(tab==='opinion')content.innerHTML=renderOpinion()}
function applyTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem('dig-theme',theme);document.getElementById('themeToggle').textContent=`Theme: ${theme==='dark'?'Dark':'Light'}`}
function initTheme(){const saved=localStorage.getItem('dig-theme');applyTheme(saved||'light')}
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>renderTab(btn.dataset.tab)));
document.getElementById('themeToggle').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
renderHeadline();initTheme();renderTab('wire');
</script>
</body>
</html>
