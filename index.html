<script>
const headline={topic:'Middle East / Energy',h:'Hormuz uncertainty turns ceasefire diplomacy into an inflation test',deck:'Oil held recent gains as US-Iran talks, Lebanon fighting, and tanker risk kept markets from treating de-escalation as settled.',image:'https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041',imageAlt:'Satellite view of the Strait of Hormuz between Iran and Oman',imageCredit:'NASA',imageCreditUrl:'https://www.nasa.gov/image-article/strait-of-hormuz/'};
const intros={wire:'Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer.',weekly:'The week in consequential developments, grouped like The Wire but selected for events still shaping the map today.',analytical:'Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points.',opinion:'Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged.'};
const titles={wire:'The Wire',weekly:'The Weekly',analytical:'The Analytical',opinion:'The Opinion'};
const wire=[
{topic:'US Economy',stories:[
{h:'Fed inflation warnings harden as oil stays elevated',proseHTML:`The Federal Reserve entered June with inflation still above its 2 percent target and with tariffs, energy risk, and war uncertainty all feeding into price expectations. <span class='change'>Cleveland Fed President Beth Hammack said the central bank may need to act soon if inflation pressures remain too high, while oil held most of Monday gains because the status of US-Iran talks and the Strait of Hormuz reopening remained uncertain.</span> That combination matters because a supply shock from oil is not the same as overheated consumer demand, but it can still raise transport, food, and inflation expectations if it lasts. The next data releases will test whether the Fed can keep rates steady without looking complacent about a second energy-driven inflation pulse.`,sources:[{name:'Reuters Fed',url:'https://www.investing.com/news/economy-news/feds-hammack-eyes-tighter-policy-if-inflation-doesnt-abate-4721958'},{name:'Reuters oil',url:'https://ca.investing.com/news/commodities-news/oil-steadies-as-uncertainty-over-usiran-talks-keeps-markets-on-edge-4670252'},{name:'Federal Reserve',url:'https://www.federalreserve.gov/monetarypolicy.htm'}],learn:{context:'Central banks often look through one-time oil jumps, but the calculation changes when the shock also affects shipping, insurance, fertilizer, and expectations.',angles:['Inflation angle: energy can keep headline inflation high even if services cool.','Growth angle: higher fuel costs work like a tax on households and firms.','Credibility angle: a new policy regime has less room to appear politically reactive.'],watch:'Watch Brent crude, market-implied inflation expectations, and Fed speeches before the next rate decision.'}},
{h:'Wall Street balances AI optimism against war-risk oil shock',proseHTML:`US equities have leaned on artificial-intelligence earnings and chip-sector enthusiasm to offset slower-growth fears. <span class='change'>Reuters-linked market reports said major indexes hovered near records even as oil jumped on skepticism that a durable US-Iran settlement could be reached quickly.</span> The market split is important because tech megacaps can lift indexes while energy and freight costs hit consumers, smaller firms, and import-heavy industries. If oil risk persists, the stock market could show resilience at the top while the real economy faces more uneven pressure through gasoline, borrowing costs, and business input prices.`,sources:[{name:'Reuters markets',url:'https://www.brecorder.com/news/40423551/wall-st-hovers-near-record-highs-tech-gains-eclipse-iran-war-anxiety'},{name:'Reuters oil',url:'https://ca.investing.com/news/commodities-news/oil-steadies-as-uncertainty-over-usiran-talks-keeps-markets-on-edge-4670252'},{name:'IMF outlook',url:'https://www.imf.org/en/Publications/WEO'}],learn:{context:'Indexes can hide sector divergence: a few large technology companies can support benchmark levels while energy-sensitive companies and households weaken.',angles:['Bull case: AI profits can keep capital spending and productivity hopes alive.','Bear case: oil shocks can squeeze margins and household spending.','Distribution angle: market strength may not mean broad economic comfort.'],watch:'Watch oil-sensitive sectors, Treasury yields, consumer sentiment, and Nvidia-led tech breadth.'}}]},
{topic:'US Politics',stories:[
{h:'Paxton win turns Texas Senate race into a GOP loyalty test',proseHTML:`Texas normally gives Republicans a large Senate advantage, but the party nomination now carries unusually sharp factional and general-election questions. <span class='change'>AP projected that Trump-backed Attorney General Ken Paxton defeated four-term Senator John Cornyn in the Republican runoff, making Cornyn the first Texas Republican senator to lose renomination.</span> Paxton credited Trump endorsement power, while Democrats immediately framed the general election around Paxton legal scandals and institutional baggage. The result gives extemp speakers a clean example of how presidential loyalty, candidate quality, and Senate control can collide even in a red state.`,sources:[{name:'AP runoff',url:'https://apnews.com/article/4fa609e7ddb93b47ac4e3398a12a472e'},{name:'AP live',url:'https://apnews.com/article/596173f3d9badf5a380bb9b58304ed30'},{name:'Texas Tribune',url:'https://www.texastribune.org/2026/05/26/texas-john-cornyn-ken-paxton-us-senate-republican-primary-runoff/'}],learn:{context:'Runoff electorates are smaller and often more ideological than first-round primaries, which can magnify endorsement power and activist intensity.',angles:['Trump angle: the endorsement defeated a long-serving incumbent.','Senate angle: Republicans must decide how much nominee risk they can tolerate.','Democratic angle: a controversial nominee could widen a race that otherwise leans Republican.'],watch:'Watch early polling against James Talarico, national GOP spending, and suburban Texas turnout signals.'}},
{h:'Immigration and administrative power stay in court spotlight',proseHTML:`The Trump administration has pushed immigration enforcement through detention rules, speech limits for immigration judges, and arguments that national-security concerns justify faster removals. <span class='change'>Recent appellate and Supreme Court actions kept those disputes alive by giving the administration room on immigration-judge speech restrictions while leaving individual deportation challenges to move through immigration-court channels first.</span> The legal structure matters because immigration judges sit inside the executive branch rather than the Article III judiciary <span class='jargon'>(the independent federal court system created by Article III of the Constitution)</span>. The next phase is less about one case than about whether courts treat immigration adjudication as ordinary agency management or as a due-process setting with special constitutional constraints.`,sources:[{name:'AP Supreme Court',url:'https://apnews.com/article/8e07afd9880bf12849f3251d3cb8d1bc'},{name:'AP Khalil case',url:'https://apnews.com/article/2b241fd84c2da3dffee696ed78c408e9'},{name:'Reuters court docket',url:'https://www.investing.com/news/politics-news/supreme-court-rulings-loom-in-four-major-trumprelated-cases-4700670'}],learn:{context:'Immigration courts are housed in the Justice Department, which makes independence disputes different from conflicts involving life-tenured federal judges.',angles:['Executive angle: presidents claim broad authority over border and foreign-policy consequences.','Rights angle: lawful residents and adjudicators argue process cannot vanish inside immigration courts.','Institutional angle: the Supreme Court is deciding how much deference agencies receive in politically charged enforcement.'],watch:'Watch emergency applications, circuit splits, and whether Congress revisits immigration-court independence.'}}]},
{topic:'Healthcare',stories:[
{h:'WHO reports Bundibugyo Ebola cases rising in Congo and Uganda',proseHTML:`Bundibugyo Ebola is a rarer Ebola virus species, and responders do not have an approved vaccine or specific treatment for it. <span class='change'>WHO officials said Tuesday that Congo had 321 confirmed cases, 116 suspected cases, 41 deaths, and six recoveries, while Uganda had nine confirmed cases and one associated death.</span> The outbreak was already declared a <span class='jargon'>PHEIC (Public Health Emergency of International Concern, the World Health Organization legal alert for serious cross-border health threats)</span>, and the latest numbers show response teams are still chasing transmission rather than clearly getting ahead of it. The most important governance issue is trust: isolation, contact tracing, and safe burials work only if families believe clinics and responders will help rather than punish them.`,sources:[{name:'Reuters via MarketScreener',url:'https://www.marketscreener.com/news/who-321-confirmed-ebola-cases-in-drc-116-more-suspected-cases-ce7f5dded98ff22d'},{name:'WHO DON605',url:'https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605'},{name:'AP field report',url:'https://apnews.com/article/abf02f3cc22777e6ce054273bb509104'}],learn:{context:'Ebola spreads through contact with bodily fluids after symptoms begin; classic control tools are powerful but labor-intensive and socially sensitive.',angles:['Health-security angle: cross-border cases justify international coordination.','Equity angle: travel restrictions can stigmatize communities if not paired with support.','Response angle: clinic safety and community trust are as important as lab capacity.'],watch:'Watch WHO situation reports, Uganda contact tracing, and whether treatment centers reduce fatality rates.'}},
{h:'US measles surge keeps vaccination gaps in the public-health foreground',proseHTML:`Measles was declared eliminated in the United States in 2000, which means imported cases should not sustain domestic spread when community vaccination coverage remains high. <span class='change'>AAP News, citing CDC data, reported 1,952 US measles cases for 2026 after 59 additional cases were added in the latest update, already 85 percent of last year record total.</span> Because measles is highly contagious, small local vaccination gaps can turn one exposure at an airport, school, camp, or clinic into a multi-state investigation. The summer implication is concrete: travel and school-prep season can connect undervaccinated clusters unless health departments move fast on isolation notices and MMR <span class='jargon'>(measles, mumps, and rubella vaccine)</span> outreach.`,sources:[{name:'AAP News',url:'https://publications.aap.org/aapnews/news/35248/CDC-reports-59-additional-measles-cases-1-952-in'},{name:'CDC measles data',url:'https://www.cdc.gov/measles/data-research/index.html'},{name:'PAHO measles report',url:'https://www.paho.org/sites/default/files/2026/05/measles-outbreak-situation-report-7may-2026.pdf'}],learn:{context:'Two MMR doses are highly protective, but measles can spread before officials identify every exposed person because the virus is airborne and extremely contagious.',angles:['Public-health angle: local coverage gaps can undo national elimination status.','Governance angle: contact tracing diverts scarce health-department staff.','Trust angle: officials must communicate risk without hardening vaccine polarization.'],watch:'Watch CDC weekly updates, state school-exclusion orders, and travel-linked outbreak clusters.'}}]},
{topic:'Climate / Energy',stories:[
{h:'India power record shows heat adaptation is now grid policy',proseHTML:`India has expanded renewable power, but extreme heat and rising air-conditioner use are pushing electricity demand toward sharper peaks. <span class='change'>Financial Express reported peak power demand reached 270.82 gigawatts on May 21, crossing 270 GW for the first time as a heatwave drove cooling loads.</span> The number matters because a grid can be stressed by peak load even when annual generation looks adequate; distribution wires, storage, evening ramping, and affordable cooling decide whether households survive heat alerts. If outages spread during extreme heat, climate adaptation becomes a direct political test for power ministries, state governments, and city disaster managers.`,sources:[{name:'Financial Express',url:'https://www.financialexpress.com/policy/economy/indias-peak-power-demand-hits-record-270-8-gw-as-heatwave-intensifies/4247688/'},{name:'Phys.org / Ministry summary',url:'https://phys.org/news/2026-05-india-generates-power-demand-surges.pdf'},{name:'Al Jazeera South Asia heat',url:'https://www.aljazeera.com/news/2026/5/8/a-calamity-why-is-a-record-heatwave-sweeping-south-asia'}],learn:{context:'Peak demand is the highest instantaneous electricity load; grids can fail during short stress periods even if they produce enough power over a full year.',angles:['Adaptation angle: storage, demand response, and cooling centers can reduce deaths.','Equity angle: poor households may lack safe cooling even when wealthy neighborhoods have power.','Climate angle: hotter baselines make once-exceptional peaks part of normal planning.'],watch:'Watch heat alerts, outage reports, and whether coal and gas dispatch rises to meet evening demand.'}},
{h:'Pacific growth downgrade links fuel prices to climate resilience',proseHTML:`Pacific island economies often rely on imported fuel, shipping, tourism, and narrow export bases, which makes external energy shocks especially expensive. <span class='change'>Reuters reported the World Bank expects growth across 11 Pacific island countries to slow to 2.8 percent in 2026 as higher energy and shipping costs and softer tourism weigh on activity.</span> The downgrade matters because climate adaptation needs capital just as fuel and freight costs are squeezing public budgets. For extemp, the story shows how a Middle East energy shock can become an Oceania debt, migration, and infrastructure problem.`,sources:[{name:'Reuters via Investing',url:'https://www.investing.com/news/economy-news/world-bank-sees-pacific-growth-slowing-to-28-in-2026-4678900'},{name:'World Bank Pacific',url:'https://www.worldbank.org/en/country/pacificislands'},{name:'Pacific Islands Forum',url:'https://forumsec.org/sites/default/files/2026-03/Pacific%20Security%20Report%202026_0.pdf'}],learn:{context:'Small island states pay a distance and scale penalty when shipping and fuel rise, because they have fewer local substitutes and smaller tax bases.',angles:['Climate-finance angle: slower growth narrows adaptation funding.','Security angle: Australia, China, and regional institutions compete through aid and infrastructure.','Migration angle: economic stress can reinforce climate-linked mobility.'],watch:'Watch fuel-import costs, tourism arrivals, and infrastructure financing from Australia, China, and multilateral banks.'}}]},
{topic:'Tech / AI',stories:[
{h:'US closes AI-chip loophole for Chinese-owned firms abroad',proseHTML:`US export controls aim to slow Chinese access to advanced AI compute, but controls are only as strong as their subsidiary, reseller, and customs rules. <span class='change'>Reuters reported the Commerce Department moved to close a loophole that allowed Chinese-owned entities outside China to receive advanced AI chips such as Nvidia Rubin and Blackwell processors without extra due diligence by foundries and suppliers.</span> The move matters because AI policy is shifting from headline bans to enforcement architecture: who owns the buyer, where the servers operate, and whether intermediaries can reroute supply. The next test is whether the rule can stop leakage without freezing legitimate cloud and data-center investment across Southeast Asia and Taiwan-linked supply chains.`,sources:[{name:'Reuters via Investing',url:'https://www.investing.com/news/stock-market-news/us-takes-step-to-halt-nvidia-ai-chip-shipments-to-chinese-firms-outside-china-4717939'},{name:'AP Taiwan probe',url:'https://apnews.com/article/175dfa061ade223086872c5810905815'},{name:'BIS',url:'https://www.bis.gov/'}],learn:{context:'BIS is the Bureau of Industry and Security, the Commerce Department office that administers many US export-control rules.',angles:['Security angle: compute access can support military AI and cyber capabilities.','Business angle: chip firms fear losing legal customers through broad restrictions.','Enforcement angle: shell buyers and third-country routing can weaken even strict rules.'],watch:'Watch Commerce guidance, Taiwan prosecutions, and chip shipment data through Malaysia, Thailand, and Japan.'}},
{h:'Europe plans cloud rules to reduce dependence on US tech giants',proseHTML:`European officials have long argued that strategic digital infrastructure should not depend entirely on a few foreign cloud providers. <span class='change'>Reuters reported the European Commission is preparing strict criteria for highly critical state cloud tenders that could exclude Amazon, Microsoft, and Google from some strategic projects under the planned Cloud and AI Development Act.</span> The move matters because cloud is no longer just business software; it hosts public-sector data, AI training, cybersecurity tools, and emergency systems. The tradeoff is that sovereignty rules can build local capacity but may raise costs or slow deployment if European alternatives are not ready at scale.`,sources:[{name:'Reuters cloud',url:'https://www.investing.com/news/stock-market-news/exclusiveeu-cloud-rules-to-curb-amazon-google-access-to-strategic-tenders-draft-document-shows-4719103'},{name:'EU AI Act track',url:'https://www.europarl.europa.eu/legislative-train/carriage/regulation-on-artificial-intelligence/report?sid=9901'},{name:'Reuters AI rules',url:'https://www.marketscreener.com/news/eu-countries-lawmakers-clinch-provisional-deal-on-watered-down-ai-rules-ce7f58d2d08ff220'}],learn:{context:'Digital sovereignty is the argument that governments need control over critical data, cloud systems, and AI infrastructure rather than relying fully on foreign platforms.',angles:['Sovereignty angle: strategic tenders can nurture European providers.','Competition angle: excluding US firms may reduce quality or raise costs.','Geopolitics angle: cloud rules are part of the wider US-EU tech power balance.'],watch:'Watch the Commission proposal, industry lobbying, and whether member states define critical tenders narrowly or broadly.'}}]},
{topic:'Latin America',stories:[
{h:'Mexico cartel finance dispute strains Sheinbaum governing coalition',proseHTML:`President Claudia Sheinbaum party, Morena, governs most Mexican states and holds large congressional majorities, but cartel-linked corruption allegations can expose factional weaknesses inside dominant parties. <span class='change'>Reuters reported Mexico froze bank accounts of former officials accused by the United States of ties to the Sinaloa Cartel after earlier US charges shook the ruling party and state-level politics.</span> The case matters because Mexico security challenge is not only violent crime; it is whether financial enforcement and political accountability can reach officials without becoming a partisan purge. The next issue is whether Washington-Mexico cooperation strengthens anti-cartel capacity or deepens nationalist backlash inside Mexican politics.`,sources:[{name:'Reuters account freeze',url:'https://www.investing.com/news/world-news/mexico-freezes-bank-accounts-of-exofficials-investigated-by-us-4696376'},{name:'Reuters party split',url:'https://www.investing.com/news/world-news/mexicos-sheinbaum-battles-party-split-over-us-cartel-charges-4664966'},{name:'Mexico presidency',url:'https://www.gob.mx/presidencia'}],learn:{context:'Morena is Mexico ruling party; its dominance makes internal factional fights especially important because many disputes happen inside the governing coalition.',angles:['Security angle: financial freezes target networks rather than only gunmen.','Politics angle: allegations can fracture Morena ahead of state contests.','US-Mexico angle: cooperation can look like pressure if Washington drives the evidence.'],watch:'Watch Mexican financial-intelligence actions, Sinaloa state politics, and US indictment updates.'}},
{h:'Brazil court and polling fights keep 2026 election polarized',proseHTML:`Brazil entered the 2026 campaign with former President Jair Bolsonaro barred and convicted, but his political network remains central to the right. <span class='change'>Reuters reported Lula and Senator Flavio Bolsonaro were statistically tied in a simulated runoff poll, while the Supreme Court suspended a congressional bill that would have sharply reduced Jair Bolsonaro sentence.</span> The story matters because Brazil institutional conflict is now folded directly into electoral strategy: Congress, the Supreme Court, and party machines are all shaping who can run and how legitimacy is argued. Watch whether Lula can rebuild a governing coalition after Senate defeats or whether anti-court backlash becomes the right main campaign frame.`,sources:[{name:'Reuters poll',url:'https://www.internazionale.it/ultime-notizie-reuters/2026/05/13/brazil-s-lula-flavio-bolsonaro-deadlocked-in-presidential-runoff-poll'},{name:'Reuters court',url:'https://m.investing.com/news/world-news/brazil-supreme-court-justice-suspends-bill-that-ordered-early-release-of-expresident-bolsonaro-4674678'},{name:'Reuters nominee defeat',url:'https://www.internazionale.it/ultime-notizie-reuters/2026/04/30/brazil-s-lula-suffers-heavy-defeat-as-senate-rejects-supreme-court-nominee'}],learn:{context:'Brazil Superior Electoral Court and Supreme Federal Court have become central actors because election eligibility, coup accountability, and campaign rules all run through courts.',angles:['Democracy angle: court enforcement can protect institutions after coup plotting.','Backlash angle: aggressive court power can energize anti-establishment voters.','Campaign angle: Flavio Bolsonaro can inherit the brand without the same legal status.'],watch:'Watch new Supreme Court nominations, runoff polling, and right-wing coalition discipline.'}}]},
{topic:'Africa / Middle East',stories:[
{h:'Middle East ceasefires increasingly mean managed fighting, not peace',proseHTML:`Ceasefires in Gaza, Lebanon, and Iran were announced as diplomatic off-ramps, but each has left major coercive tools active. <span class='change'>AP reported that Israeli forces have captured more territory in Gaza, Israel made its deepest Lebanon incursion in 26 years, Hezbollah kept firing rockets, and the United States and Iran traded fire while still discussing a longer truce.</span> The common issue is that the parties are using ceasefires as bargaining space while continuing military pressure. That matters because civilians, oil markets, and mediators experience the conflict as ongoing even when leaders describe it as de-escalation.`,sources:[{name:'AP ceasefires',url:'https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae'},{name:'Reuters Lebanon',url:'https://www.marketscreener.com/news/israel-strikes-south-lebanon-after-holding-off-beirut-attack-ce7f5dded880f321'},{name:'Reuters Iran oil',url:'https://ca.investing.com/news/commodities-news/oil-steadies-as-uncertainty-over-usiran-talks-keeps-markets-on-edge-4670252'}],learn:{context:'A ceasefire can mean full cessation, partial pause, geographic limitation, or political label; the details decide whether it protects civilians or just changes tempo.',angles:['Diplomacy angle: partial pauses can create space for talks.','Humanitarian angle: civilians may see little relief if operations continue.','Market angle: oil and insurance respond to behavior, not labels.'],watch:'Watch Lebanon de-escalation claims, Gaza aid access, and whether US-Iran talks produce enforceable maritime rules.'}},
{h:'South Africa xenophobic attacks highlight migration stress inside regional labor markets',proseHTML:`Southern African migration has long mixed formal labor flows, asylum claims, and informal cross-border movement, especially from countries with weaker economies or conflict pressure. <span class='change'>The Guardian latest-news feed reported Mozambique said five citizens were killed in xenophobic attacks in South Africa, putting regional pressure back on Pretoria.</span> The story matters because violence against migrants can spread quickly when unemployment, housing shortages, and political rhetoric turn foreign workers into scapegoats. For extemp, it connects migration governance to regional diplomacy: South Africa economic magnetism creates obligations beyond its borders.`,sources:[{name:'Guardian world feed',url:'https://www.theguardian.com/world/2026/jun/02/all'},{name:'IOM South Africa',url:'https://southafrica.iom.int/'},{name:'SADC',url:'https://www.sadc.int/'}],learn:{context:'Xenophobic violence in South Africa has recurred in past waves, often tied to local competition for jobs, housing, and informal commerce.',angles:['Rights angle: migrant safety is a state-protection obligation.','Economic angle: informal labor fills gaps but can generate resentment.','Regional angle: attacks can strain relations with Mozambique, Zimbabwe, and other neighbors.'],watch:'Watch South African police response, Mozambican diplomatic statements, and whether local leaders calm or amplify tensions.'}}]},
{topic:'Europe / EU',stories:[
{h:'EU return-platform deal marks a harder migration turn',proseHTML:`The European Union migration pact already reorganized screening, asylum decisions, and burden-sharing among member states. <span class='change'>Reuters and Le Monde reported EU governments and lawmakers agreed on new rules allowing countries to send migrants ordered to leave the bloc to centers in third countries, even as irregular arrivals fell 26 percent last year to their lowest level since 2021.</span> The policy matters because it shifts migration enforcement beyond EU territory, raising questions about rights monitoring, legal responsibility, and whether outside countries will accept return-platform arrangements. The political signal is clear: mainstream parties are adopting tougher tools under pressure from right-wing parties even when arrivals are down.`,sources:[{name:'Reuters via Internazionale',url:'https://www.internazionale.it/ultime-notizie-reuters/2026/06/02/eu-paves-way-to-allow-migrant-deportations-to-centres-outside-bloc'},{name:'Le Monde',url:'https://www.lemonde.fr/en/international/article/2026/06/02/eu-adopts-drastic-expulsion-rules-for-undocumented-migrants-including-return-platforms_6754045_4.html'},{name:'European Council migration',url:'https://www.consilium.europa.eu/en/policies/eu-migration-policy/'}],learn:{context:'Return platforms are proposed facilities outside the EU where people ordered removed could be sent while deportation or onward arrangements are processed.',angles:['Control angle: governments say returns must be credible for asylum systems to function.','Rights angle: outsourcing detention can reduce accountability and enable abuse.','Politics angle: falling arrivals do not necessarily reduce migration salience.'],watch:'Watch legal challenges, which third countries agree to host centers, and implementation before the migration pact deadline.'}},
{h:'Europe defense debate widens from Ukraine aid to interceptor scarcity',proseHTML:`Europe has promised to help Ukraine defend its cities, but the war in Iran and Russian strike tempo have exposed missile-defense supply limits. <span class='change'>The Guardian reported a Patriot interceptor shortage has created a window of vulnerability that Russia is exploiting in Ukraine, echoing earlier warnings that Iran-related usage drained systems needed by Ukraine and Taiwan.</span> The issue matters because air defense is both military and industrial policy: factories, procurement contracts, and ammunition choices decide whether allies can sustain protection. The next NATO debate is likely to focus less on abstract burden-sharing and more on how many interceptors can be built, bought, and delivered this year.`,sources:[{name:'Guardian Ukraine',url:'https://www.theguardian.com/world/2026/jun/02/patriot-missile-shortage-window-vulnerability-russia-exploiting-ukraine'},{name:'Axios missile gap',url:'https://www.axios.com/2026/05/28/iran-missile-defense-patriot-ukraine-taiwan'},{name:'Reuters Ukraine request',url:'https://www.investing.com/news/world-news/us-should-send-ukraine-more-air-defence-missiles-congressmen-say-4715223'}],learn:{context:'Patriot is a US-made air-defense system especially important against ballistic missiles; interceptors are expensive and slow to replace.',angles:['Ukraine angle: missile defense protects civilians and political resilience.','Industrial angle: allied promises fail if production cannot match consumption.','Asia angle: Taiwan planning is affected by the same scarce stockpiles.'],watch:'Watch NATO procurement announcements, US supplemental decisions, and Russia strike patterns around Kyiv.'}}]},
{topic:'China',stories:[
{h:'US-China chokepoint fight shifts to rare earths and chips',proseHTML:`The Trump-Xi summit lowered some tariff tension, but the most strategic fights now involve physical chokepoints rather than broad tariff rates. <span class='change'>Reuters reporting this week tied China rare-earth export curbs, US efforts to restrict AI-chip shipments to Chinese-owned firms abroad, and Taiwan smuggling probes into one enforcement contest.</span> Rare earths matter because they support magnets, defense systems, electric vehicles, and industrial equipment, while advanced AI chips determine frontier compute capacity. The next bargaining round will test whether both sides can trade limited relief without surrendering control over the supply chains they now treat as national-security infrastructure.`,sources:[{name:'Reuters chip rule',url:'https://www.investing.com/news/stock-market-news/us-takes-step-to-halt-nvidia-ai-chip-shipments-to-chinese-firms-outside-china-4717939'},{name:'Reuters rare earths',url:'https://www.marketscreener.com/news/trump-xi-to-weigh-rare-earth-truce-extension-but-china-s-curbs-still-bite-ce7f5bdfdd8bf325'},{name:'AP Taiwan probe',url:'https://apnews.com/article/175dfa061ade223086872c5810905815'}],learn:{context:'Rare earths are a group of elements used in high-performance magnets and electronics; China dominates much of the processing capacity.',angles:['US angle: export controls protect strategic advantage.','China angle: rare-earth licensing gives Beijing leverage.','Business angle: firms need predictable rules to plan production.'],watch:'Watch rare-earth license approvals, Commerce Department guidance, and chip enforcement cases in Taiwan and Southeast Asia.'}},
{h:'Taiwan warning remains the strategic ceiling over trade diplomacy',proseHTML:`US-China economic talks can produce tactical relief, but Taiwan remains the issue most likely to turn competition into crisis. <span class='change'>Reuters summit coverage reported Xi Jinping warned Trump that mishandling Taiwan could send relations down a dangerous path, even as the two sides discussed trade, rare earths, Iran, and AI.</span> The warning matters because Beijing, Taipei, Washington, and US allies all read summit language for clues about deterrence and credibility. The next risk is issue linkage: if Taiwan arms sales, chip controls, and trade concessions are bargained together, allies may worry that security commitments are becoming transactional.`,sources:[{name:'Reuters via GMA',url:'https://www.gmanetwork.com/news/topstories/world/987610/trump-visit-china-xi-jinping-trade-talks-taiwan/story/'},{name:'AP summit preview',url:'https://wtop.com/world/2026/05/trump-and-xi-dialed-down-the-trade-war-but-challenges-lurk-at-their-china-summit/'},{name:'Chatham House',url:'https://www.chathamhouse.org/2026/05/trumps-approach-taiwan-could-jeopardize-its-future-indo-pacific-allies-are-taking-note'}],learn:{context:'Strategic ambiguity is the long-standing US approach of not saying exactly how it would respond to a Chinese attack on Taiwan while maintaining deterrence.',angles:['Deterrence angle: vague commitments can still deter if credibility is high.','Alliance angle: allies react to tone as well as formal policy.','Trade angle: China may seek concessions across unrelated issues.'],watch:'Watch Taiwan arms sales, Chinese military exercises, and whether Xi reciprocal US visit proceeds.'}}]},
{topic:'War / Active Conflicts',stories:[
{h:'Russia exploits missile-defense shortages with heavier Ukraine strikes',proseHTML:`Ukraine air defense depends on layered systems, but ballistic-missile defense is especially reliant on scarce Patriot interceptors. <span class='change'>The Guardian reported Russia is exploiting a global Patriot shortage to intensify strikes, while Reuters-linked coverage said Zelensky asked Trump and Congress for more air defenses after major Russian threats against Kyiv.</span> The problem is not just one weapons transfer; it is a production race between Russian drone-and-missile launch capacity and allied interceptor manufacturing. If Ukraine must ration shots, Russia can increase civilian damage and bargaining pressure without winning major territory.`,sources:[{name:'Guardian',url:'https://www.theguardian.com/world/2026/jun/02/patriot-missile-shortage-window-vulnerability-russia-exploiting-ukraine'},{name:'Reuters Zelensky request',url:'https://www.investing.com/news/world-news/zelenskiy-asks-trump-for-air-defences-as-russia-escalates-strike-threats-4712749'},{name:'AP Ukraine',url:'https://apnews.com/article/2abde640e27e7b320715d74358ba28f3'}],learn:{context:'Ballistic missiles travel fast and are harder to intercept than many drones or cruise missiles, making Patriot-class systems unusually valuable.',angles:['Military angle: Russia is testing cost exchange, not only battlefield lines.','Industrial angle: Western factories are now strategic assets.','Political angle: civilian strikes pressure Kyiv and allies before negotiations.'],watch:'Watch interceptor pledges, Russian salvo size, and Ukrainian strikes on Russian logistics targets.'}},
{h:'Lebanon partial truce keeps failing the behavior test',proseHTML:`Israel and Hezbollah have repeatedly announced or discussed limited de-escalation, but both sides retain incentives to shape the battlefield before any broader Iran-linked settlement. <span class='change'>Reuters reported Israel kept striking southern Lebanon after holding off a Beirut attack, and AP said fighting continued after Trump again claimed both sides had agreed to de-escalate.</span> The gap matters because ceasefire credibility depends on observed restraint, not communique language. Continued fighting in Lebanon also feeds the Iran negotiations because Hezbollah military pressure is one of Tehran regional leverage points.`,sources:[{name:'Reuters Lebanon',url:'https://www.marketscreener.com/news/israel-strikes-south-lebanon-after-holding-off-beirut-attack-ce7f5dded880f321'},{name:'AP ceasefires',url:'https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae'},{name:'Reuters explainer',url:'https://www.investing.com/news/world-news/explainerwhats-in-the-lebanon-ceasefire-deal-and-will-it-hold-4619977'}],learn:{context:'Hezbollah is the Iran-backed Lebanese militant and political movement that has fought Israel for decades and controls significant armed capacity in Lebanon.',angles:['Israel angle: continued strikes aim to prevent Hezbollah recovery.','Lebanon angle: sovereignty erodes when southern territory remains militarized.','Iran angle: Hezbollah is bargaining leverage inside wider regional talks.'],watch:'Watch whether Israel withdraws from advanced positions and whether Hezbollah rocket fire declines.'}},
{h:'Congo fighting and Ebola response now collide in the same eastern region',proseHTML:`Eastern Congo already faces armed-group violence, displacement, weak roads, and fragmented local authority before the Ebola outbreak adds a second emergency. <span class='change'>Reuters has reported intensified clashes in remote eastern Congo challenging US mediation, while WHO and AP now describe Bundibugyo Ebola cases rising around the same conflict-stressed region.</span> The overlap matters because outbreak control requires access, trust, and rapid movement, exactly the things conflict weakens. The humanitarian risk is compounding: displacement can spread disease, disease can close markets and clinics, and insecurity can prevent both treatment and vaccination research from reaching communities.`,sources:[{name:'Reuters Congo clashes',url:'https://www.investing.com/news/world-news/clashes-intensify-in-remote-east-congo-challenging-us-mediation-4489468'},{name:'WHO Ebola',url:'https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026'},{name:'AP Ebola',url:'https://apnews.com/article/2e3bd2b74ccce26dd82984f26dabc4c7'}],learn:{context:'Eastern Congo has overlapping conflicts involving Congolese forces, local militias, and Rwanda-linked M23-related dynamics, plus mineral and land disputes.',angles:['Humanitarian angle: conflict turns disease control into logistics and security work.','Diplomacy angle: mediation fails if remote fighting keeps expanding.','Health angle: hidden transmission rises when people avoid authorities.'],watch:'Watch treatment-center access, M23-linked fighting, and whether WHO can keep contact tracing active.'}}]}];
const weekly=[
{topic:'US Economy',stories:[
{h:'Energy risk became the week main inflation variable',proseHTML:`The US economy entered the week with markets still optimistic about AI profits, but the Middle East war kept energy prices and inflation expectations in play. <span class='change'>Oil rose sharply Monday and held gains Tuesday as US-Iran talks, Hormuz access, and Lebanon fighting remained unresolved.</span> That matters because energy shocks can reach households through gasoline, firms through freight, and the Fed through inflation expectations. Watch whether the next inflation print shows energy passing into broader categories or remaining a geopolitical premium.`,sources:[{name:'Reuters oil',url:'https://ca.investing.com/news/commodities-news/oil-steadies-as-uncertainty-over-usiran-talks-keeps-markets-on-edge-4670252'},{name:'Reuters markets',url:'https://www.brecorder.com/news/40423551/wall-st-hovers-near-record-highs-tech-gains-eclipse-iran-war-anxiety'}],learn:{context:'A geopolitical risk premium is the extra price buyers pay because future supply is uncertain, not because current demand changed.',angles:['Fed angle: supply shocks complicate rate cuts.','Household angle: fuel and food costs hit sentiment quickly.','Market angle: AI strength can mask broader strain.'],watch:'Watch Brent crude, Fed comments, and inflation expectations.'}},
{h:'Fed officials kept the higher-for-longer argument alive',proseHTML:`Before the newest oil move, Fed officials were already warning that inflation was not safely back to target. <span class='change'>Hammack latest comments said the Fed may need to act soon if inflation pressures stay high, keeping tighter policy on the table.</span> The weekly significance is that markets cannot assume conflict risk automatically produces rate cuts if the same conflict also lifts prices. Watch whether policymakers emphasize growth risk, inflation risk, or both.`,sources:[{name:'Reuters Fed',url:'https://www.investing.com/news/economy-news/feds-hammack-eyes-tighter-policy-if-inflation-doesnt-abate-4721958'},{name:'Federal Reserve',url:'https://www.federalreserve.gov/monetarypolicy.htm'}],learn:{context:'Higher-for-longer describes a policy stance in which rates stay elevated because inflation remains too persistent for cuts.',angles:['Inflation hawks: waiting too long could make price pressure embedded.','Doves: oil shocks can weaken growth and should not trigger over-tightening.','Political angle: rate policy will be scrutinized in an election year.'],watch:'Watch FOMC minutes, CPI, and labor-market data.'}}]},
{topic:'US Politics',stories:[
{h:'Texas runoff reshaped the Senate map',proseHTML:`The most consequential US political event of the week was not a general-election vote but a Republican primary runoff in a state Republicans usually expect to hold. <span class='change'>Paxton defeated Cornyn, removing a four-term incumbent and making Trump endorsement power the central story of the Texas Senate race.</span> The race still leans Republican, but Democrats now have a nominee-facing argument built around scandals, extremism, and institutional instability. Watch whether national Republicans spend defensively in Texas or assume partisanship will carry Paxton.`,sources:[{name:'AP Paxton',url:'https://apnews.com/article/4fa609e7ddb93b47ac4e3398a12a472e'},{name:'Texas Tribune',url:'https://www.texastribune.org/2026/05/26/texas-john-cornyn-ken-paxton-us-senate-republican-primary-runoff/'}],learn:{context:'Candidate quality becomes more important when the nominee has legal or ethical baggage that can nationalize a race.',angles:['Trump power: the endorsement reshaped the field.','GOP risk: a red-state race can become expensive.','Democratic opportunity: scandals can mobilize suburbs.'],watch:'Watch fundraising, polling, and Senate Leadership Fund decisions.'}},
{h:'Courts kept immigration power in the national spotlight',proseHTML:`The administration legal fights this week reinforced that immigration enforcement is now one of the main venues for executive-power doctrine. <span class='change'>Supreme Court and appellate developments kept immigration-judge speech rules and deportation-process disputes moving through courts without resolving the broader institutional question.</span> The weekly importance is that these cases define how much process exists when the executive invokes border control or national security. Watch emergency orders and whether Congress takes up immigration-court independence.`,sources:[{name:'AP Supreme Court',url:'https://apnews.com/article/8e07afd9880bf12849f3251d3cb8d1bc'},{name:'AP Khalil',url:'https://apnews.com/article/2b241fd84c2da3dffee696ed78c408e9'}],learn:{context:'Immigration courts are executive-branch tribunals, so disputes over independence and speech differ from ordinary federal-court fights.',angles:['Order argument: agencies need control to run enforcement.','Rights argument: adjudicators and respondents need procedural safeguards.','Separation angle: courts are policing executive reach case by case.'],watch:'Watch Supreme Court emergency docket activity.'}}]},
{topic:'Healthcare',stories:[
{h:'Bundibugyo Ebola became a global-health emergency story',proseHTML:`The week saw Ebola move from a regional outbreak to a broader health-security concern. <span class='change'>WHO declared the Congo-Uganda Bundibugyo outbreak a PHEIC and later reported rapidly rising confirmed and suspected cases in Congo with linked cases in Uganda.</span> The story still matters today because there is no approved vaccine or treatment for this Ebola species, leaving trust-heavy outbreak basics as the main defense. Watch whether treatment centers and contact tracing begin to outpace new cases.`,sources:[{name:'WHO DON605',url:'https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605'},{name:'Reuters latest',url:'https://www.marketscreener.com/news/who-321-confirmed-ebola-cases-in-drc-116-more-suspected-cases-ce7f5dded98ff22d'},{name:'AP recovery story',url:'https://apnews.com/article/0adc9baa6828a95869febd14c78e8846'}],learn:{context:'Bundibugyo virus disease is an Ebola disease caused by Bundibugyo ebolavirus, first identified in Uganda in 2007.',angles:['Containment: classic tracing can work.','Risk: conflict and distrust can hide cases.','Equity: restrictions must not punish reporting.'],watch:'Watch WHO case curves and community-response reports.'}},
{h:'Measles remained the US vaccine-confidence warning light',proseHTML:`The US measles count kept climbing through the week as public-health officials prepared for summer travel and school planning. <span class='change'>CDC-linked reporting showed 1,952 cases for 2026, already approaching the record set last year.</span> The issue belongs in a weekly catch-up because measles is a stress test of local vaccination coverage and public-health communication, not a one-off outbreak. Watch whether states identify travel-linked clusters before the fall school year.`,sources:[{name:'AAP News',url:'https://publications.aap.org/aapnews/news/35248/CDC-reports-59-additional-measles-cases-1-952-in'},{name:'CDC',url:'https://www.cdc.gov/measles/data-research/index.html'}],learn:{context:'Elimination means continuous domestic transmission has ended; imported cases can still occur.',angles:['Coverage: two-dose MMR rates decide spread.','Capacity: tracing strains local health departments.','Politics: vaccine trust remains polarized.'],watch:'Watch CDC updates and state outbreak advisories.'}}]},
{topic:'Climate / Energy',stories:[
{h:'South Asia heat made electricity reliability a climate metric',proseHTML:`South Asia heat was one of the most consequential climate stories of the week because it translated temperature into power-system stress. <span class='change'>India peak electricity demand crossed 270 GW for the first time, reflecting widespread cooling demand during severe heat.</span> The story still matters because climate adaptation now depends on grid planning, storage, worker protections, and city heat alerts. Watch whether demand records produce blackouts or accelerate investment in storage and distribution.`,sources:[{name:'Financial Express',url:'https://www.financialexpress.com/policy/economy/indias-peak-power-demand-hits-record-270-8-gw-as-heatwave-intensifies/4247688/'},{name:'Al Jazeera heat',url:'https://www.aljazeera.com/news/2026/5/8/a-calamity-why-is-a-record-heatwave-sweeping-south-asia'}],learn:{context:'Adaptation is policy that reduces harm from climate impacts already occurring, such as heat plans and grid resilience.',angles:['Grid: peak load is the binding constraint.','Health: heat deaths rise when cooling fails.','Emissions: coal and gas can rise during demand spikes.'],watch:'Watch heat advisories and power ministry dispatch data.'}},
{h:'Food-security warnings linked war energy costs to vulnerable states',proseHTML:`Humanitarian agencies and financial institutions spent the week warning that Middle East energy and shipping shocks can hit food systems far from the battlefield. <span class='change'>World Bank food-security updates and Reuters-linked IMF/WFP warnings pointed to rising food-price and acute-hunger risks if conflict continues into June.</span> The story matters because energy affects fertilizer, shipping, cooking fuel, and national import bills at the same time. Watch countries with high import dependence and limited fiscal space.`,sources:[{name:'World Bank food security',url:'https://www.worldbank.org/en/topic/agriculture/brief/food-security-update?cid=ECR_TT_worldbank_EN_EXT'},{name:'Reuters via WHTC',url:'https://whtc.com/2026/04/08/imf-world-bank-and-uns-world-food-program-say-war-is-increasing-food-insecurity/'},{name:'World Bank commodities',url:'https://thedocs.worldbank.org/en/doc/f3138644a1e8e2bb631399ae11d6c408-0050012026/original/CMO-April-2026.pdf'}],learn:{context:'Acute food insecurity means people face immediate gaps in food access severe enough to threaten livelihoods or lives.',angles:['Humanitarian: aid budgets face simultaneous crises.','Economic: fuel and fertilizer lift food prices.','Security: food stress can feed unrest and migration.'],watch:'Watch WFP appeals and commodity-price indexes.'}}]},
{topic:'Tech / AI',stories:[
{h:'AI-chip enforcement became a customs-and-ownership fight',proseHTML:`The week showed that AI export controls are now being fought through paperwork, ownership structures, and transshipment routes. <span class='change'>Taiwan investigated alleged Nvidia-chip smuggling, and the United States moved to restrict shipments to Chinese-owned entities outside China.</span> This matters because strategic technology denial works only if partner countries enforce the same logic at ports, factories, and data centers. Watch whether more cases appear in Japan, Malaysia, Thailand, or Singapore.`,sources:[{name:'AP Taiwan',url:'https://apnews.com/article/175dfa061ade223086872c5810905815'},{name:'Reuters chip loophole',url:'https://www.investing.com/news/stock-market-news/us-takes-step-to-halt-nvidia-ai-chip-shipments-to-chinese-firms-outside-china-4717939'}],learn:{context:'Transshipment means routing goods through a third country before the final destination, sometimes to evade controls.',angles:['Security: controls target military-relevant AI.','Commerce: firms dislike uncertainty.','Enforcement: paperwork can become the weak link.'],watch:'Watch BIS rules and prosecutions.'}},
{h:'Europe cloud-sovereignty push widened the tech policy map',proseHTML:`Europe spent the week moving from content and platform regulation toward infrastructure regulation. <span class='change'>Reuters reported draft cloud criteria could bar US tech giants from some critical state tenders, while EU AI implementation debates continued.</span> The story remains relevant because cloud and AI are becoming national-security inputs, not ordinary procurement. Watch whether the EU can define sovereignty without locking itself into weaker services.`,sources:[{name:'Reuters cloud',url:'https://www.investing.com/news/stock-market-news/exclusiveeu-cloud-rules-to-curb-amazon-google-access-to-strategic-tenders-draft-document-shows-4719103'},{name:'Reuters AI delay',url:'https://www.marketscreener.com/news/eu-countries-lawmakers-clinch-provisional-deal-on-watered-down-ai-rules-ce7f58d2d08ff220'}],learn:{context:'Cloud infrastructure hosts government data, AI workloads, and cybersecurity tools, making provider control a strategic issue.',angles:['Sovereignty: EU providers could gain scale.','Cost: exclusion can reduce competition.','Alliance: US firms may treat it as protectionism.'],watch:'Watch Wednesday Commission announcement.'}}]},
{topic:'Latin America',stories:[
{h:'Mexico cartel-finance dispute tested US-Mexico cooperation',proseHTML:`Mexico political week centered on whether cartel-linked allegations can be handled as law enforcement rather than party war. <span class='change'>Sheinbaum government froze accounts of former officials after US accusations tied them to Sinaloa Cartel networks.</span> The story still matters because security cooperation with Washington is necessary but politically sensitive. Watch whether Mexico opens domestic cases or keeps the move framed as preventive finance control.`,sources:[{name:'Reuters account freeze',url:'https://www.investing.com/news/world-news/mexico-freezes-bank-accounts-of-exofficials-investigated-by-us-4696376'},{name:'Reuters Morena split',url:'https://www.investing.com/news/world-news/mexicos-sheinbaum-battles-party-split-over-us-cartel-charges-4664966'}],learn:{context:'Sinaloa Cartel networks mix trafficking, finance, local politics, and violence across both sides of the border.',angles:['Governance: finance tools can reach elite networks.','Politics: ruling-party factions may fight over blame.','Diplomacy: US evidence can be useful and inflammatory.'],watch:'Watch bank-freeze appeals and US indictment updates.'}},
{h:'Brazil election week linked courts, Congress, and Bolsonaro legacy',proseHTML:`Brazil campaign politics sharpened as courts and polling moved together. <span class='change'>A poll found Lula and Flavio Bolsonaro effectively tied in a runoff scenario, while the Supreme Court blocked a congressional bill that could shorten Jair Bolsonaro sentence.</span> The weekly lesson is that Brazil 2026 election is a fight over institutions as much as candidates. Watch whether Lula can nominate a Supreme Court justice after a historic Senate rejection.`,sources:[{name:'Reuters poll',url:'https://www.internazionale.it/ultime-notizie-reuters/2026/05/13/brazil-s-lula-flavio-bolsonaro-deadlocked-in-presidential-runoff-poll'},{name:'Reuters court',url:'https://m.investing.com/news/world-news/brazil-supreme-court-justice-suspends-bill-that-ordered-early-release-of-expresident-bolsonaro-4674678'}],learn:{context:'Lula is Brazil left-of-center incumbent; Flavio Bolsonaro is a senator and son of former President Jair Bolsonaro.',angles:['Institutional: courts enforce coup accountability.','Electoral: Bolsonaro brand still mobilizes voters.','Coalition: Senate resistance limits Lula appointments.'],watch:'Watch new polls and Supreme Court nomination politics.'}}]},
{topic:'Africa / Middle East',stories:[
{h:'Ceasefire language became less useful than battlefield behavior',proseHTML:`This week Gaza, Lebanon, and Iran all showed how ceasefire labels can coexist with active coercion. <span class='change'>AP reported fighting continued across all three tracks, with Israeli advances, Hezbollah rocket fire, and US-Iran exchanges still shaping negotiations.</span> The story remains central because diplomacy, humanitarian relief, and oil markets all depend on whether parties actually stop using force. Watch the difference between statements and verified movement on the ground.`,sources:[{name:'AP ceasefires',url:'https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae'},{name:'Reuters Lebanon',url:'https://www.marketscreener.com/news/israel-strikes-south-lebanon-after-holding-off-beirut-attack-ce7f5dded880f321'}],learn:{context:'Managed de-escalation can reduce some violence without ending the conflict, but it can also normalize continued attacks.',angles:['Diplomacy: partial pauses can create leverage.','Humanitarian: relief may not improve if routes remain unsafe.','Economy: oil markets respond to risk, not labels.'],watch:'Watch Gaza aid access, Lebanon strike tempo, and Hormuz shipping.'}},
{h:'Congo health and security crises converged',proseHTML:`Eastern Congo remained one of the week most consequential under-covered stories because conflict and disease are reinforcing each other. <span class='change'>Reuters reported clashes challenging mediation while WHO and AP documented a fast-moving Bundibugyo Ebola outbreak.</span> The overlap matters because every roadblock, militia zone, and displaced-person movement makes contact tracing harder. Watch whether health responders can operate safely in Ituri and North Kivu.`,sources:[{name:'Reuters Congo',url:'https://www.investing.com/news/world-news/clashes-intensify-in-remote-east-congo-challenging-us-mediation-4489468'},{name:'WHO Ebola hub',url:'https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026'}],learn:{context:'Ituri and North Kivu are eastern Congo provinces with recurring militia activity and severe humanitarian needs.',angles:['Health: hidden transmission can grow.','Security: mediation must reach remote zones.','Aid: disease and conflict compete for scarce logistics.'],watch:'Watch WHO access reports and militia activity.'}}]},
{topic:'Europe / EU',stories:[
{h:'EU migration hardened despite lower irregular arrivals',proseHTML:`The week biggest EU policy move was a returns deal that toughens enforcement even as arrivals have fallen. <span class='change'>EU institutions agreed to rules allowing deportation centers outside the bloc, with Reuters reporting irregular arrivals fell 26 percent last year.</span> The story still matters because it shows political salience, not raw arrival numbers, driving policy. Watch court challenges and third-country negotiations.`,sources:[{name:'Reuters EU migration',url:'https://www.internazionale.it/ultime-notizie-reuters/2026/06/02/eu-paves-way-to-allow-migrant-deportations-to-centres-outside-bloc'},{name:'Le Monde',url:'https://www.lemonde.fr/en/international/article/2026/06/02/eu-adopts-drastic-expulsion-rules-for-undocumented-migrants-including-return-platforms_6754045_4.html'}],learn:{context:'The EU migration pact is a package of laws governing screening, asylum processing, solidarity, and returns.',angles:['Control: failed returns undermine public trust.','Rights: offshore centers can evade scrutiny.','Politics: right-wing pressure is changing mainstream policy.'],watch:'Watch implementation details and host-country deals.'}},
{h:'European security shifted from pledges to production capacity',proseHTML:`Ukraine air-defense shortages and NATO Arctic concerns made Europe security debate more material this week. <span class='change'>Reports on Patriot scarcity, US-Iran interceptor usage, and NATO Arctic Sentry all point to the same question: what can allies actually produce and deploy?</span> The story matters because the next defense agenda is industrial capacity, not only strategy documents. Watch procurement, air-defense consortia, and Arctic deployments.`,sources:[{name:'Guardian Patriot shortage',url:'https://www.theguardian.com/world/2026/jun/02/patriot-missile-shortage-window-vulnerability-russia-exploiting-ukraine'},{name:'Reuters Arctic Sentry',url:'https://www.investing.com/news/world-news/nato-has-begun-arctic-sentry-a-mission-to-strengthen-its-presence-in-the-arctic-4499501'}],learn:{context:'Defense industrial capacity means the ability to build weapons, munitions, sensors, and logistics at wartime-relevant speed.',angles:['Ukraine: shortages have immediate civilian costs.','Arctic: NATO must handle Greenland tensions and Russia.','Industry: factories shape strategy.'],watch:'Watch NATO procurement announcements.'}}]},
{topic:'China',stories:[
{h:'Rare earths and AI chips defined the week in US-China rivalry',proseHTML:`The week showed a more technical but more consequential phase of US-China competition. <span class='change'>Rare-earth licensing, AI-chip export loopholes, and Taiwan-linked smuggling probes dominated the strategic economic agenda.</span> The issue remains live because both countries control pieces the other needs: China processing capacity and US-linked chip design. Watch whether negotiations produce narrow relief or more retaliation.`,sources:[{name:'Reuters rare earths',url:'https://www.marketscreener.com/news/trump-xi-to-weigh-rare-earth-truce-extension-but-china-s-curbs-still-bite-ce7f5bdfdd8bf325'},{name:'Reuters chip rule',url:'https://www.investing.com/news/stock-market-news/us-takes-step-to-halt-nvidia-ai-chip-shipments-to-chinese-firms-outside-china-4717939'}],learn:{context:'Chokepoints are points in a supply chain where one actor can restrict access to a scarce input or route.',angles:['US leverage: chips and tools.','China leverage: rare-earth processing.','Third countries: enforcement decides real outcomes.'],watch:'Watch licenses and customs cases.'}},
{h:'Taiwan remained the summit issue allies watched most closely',proseHTML:`Trade progress this week did not erase the security ceiling over US-China relations. <span class='change'>Xi warned Trump over Taiwan during the summit period, while analysis from regional experts warned US allies are watching whether Taiwan becomes a bargaining chip.</span> The story still matters because deterrence depends on confidence across the Indo-Pacific, not only official communiques. Watch arms sales and Chinese military exercises.`,sources:[{name:'Reuters via GMA',url:'https://www.gmanetwork.com/news/topstories/world/987610/trump-visit-china-xi-jinping-trade-talks-taiwan/story/'},{name:'Chatham House',url:'https://www.chathamhouse.org/2026/05/trumps-approach-taiwan-could-jeopardize-its-future-indo-pacific-allies-are-taking-note'}],learn:{context:'Taiwan is self-governed, while Beijing claims it as part of China; US policy has long avoided promising exact wartime responses.',angles:['Deterrence: credibility is partly psychological.','Diplomacy: leaders may link unrelated issues.','Allies: Japan and the Philippines watch US tone closely.'],watch:'Watch Taiwan arms-sales timing.'}}]},
{topic:'War / Active Conflicts',stories:[
{h:'Ukraine, Lebanon, and Congo showed conflict endurance as the weekly theme',proseHTML:`The week most important conflict pattern was endurance rather than decisive victory. <span class='change'>Russia pressed Ukraine through air attacks, Israel and Hezbollah kept fighting despite partial truce language, and eastern Congo violence collided with Ebola response needs.</span> These cases matter because modern conflicts often shape politics by exhausting civilians, budgets, and institutions. Watch production, humanitarian access, and whether mediators can create enforceable pauses.`,sources:[{name:'Guardian Ukraine',url:'https://www.theguardian.com/world/2026/jun/02/patriot-missile-shortage-window-vulnerability-russia-exploiting-ukraine'},{name:'AP ceasefires',url:'https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae'},{name:'Reuters Congo',url:'https://www.investing.com/news/world-news/clashes-intensify-in-remote-east-congo-challenging-us-mediation-4489468'}],learn:{context:'Endurance politics asks which side can sustain costs, supply, legitimacy, and civilian resilience longer.',angles:['Military: munitions and interceptors matter.','Humanitarian: aid access can change political outcomes.','Diplomatic: partial deals must be enforceable.'],watch:'Watch air-defense deliveries, Lebanon verification, and Congo access routes.'}},
{h:'Missile-defense scarcity became a global conflict constraint',proseHTML:`The Iran war, Ukraine war, and Taiwan planning all now compete for the same limited missile-defense inventory. <span class='change'>Axios reported CSIS analysis that US Patriot and THAAD stockpiles depleted by Iran-war usage may not be replenished until 2029, while Ukraine faces current strike pressure.</span> The weekly impact is that strategy cannot promise protection everywhere if factories cannot replace interceptors quickly enough. Watch whether governments fund cheaper drone defenses and faster missile production.`,sources:[{name:'Axios / CSIS',url:'https://www.axios.com/2026/05/28/iran-missile-defense-patriot-ukraine-taiwan'},{name:'Reuters Ukraine',url:'https://www.investing.com/news/world-news/us-should-send-ukraine-more-air-defence-missiles-congressmen-say-4715223'}],learn:{context:'THAAD is Terminal High Altitude Area Defense, a US system designed to intercept ballistic missiles at high altitude.',angles:['Ukraine: shortages cost lives now.','Taiwan: backlog shapes deterrence.','Budget: expensive interceptors need cheaper complements.'],watch:'Watch Pentagon procurement and allied production plans.'}}]}];
const analytical=[
{tag:'Middle East / Energy',headline:'Hormuz diplomacy is a verification problem, not a headline problem',deck:'The market question is whether shipping, insurance, sanctions, and strike rules become credible enough for tankers to return.',image:'https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041',imageAlt:'Satellite view of the Strait of Hormuz',imageCredit:'NASA',imageCreditUrl:'https://www.nasa.gov/image-article/strait-of-hormuz/',skeletonHTML:`<strong>Baseline:</strong> The Strait of Hormuz is both a physical energy chokepoint and a political lever because oil, liquefied natural gas, fertilizer inputs, and naval guarantees move through a narrow corridor. <strong>Move:</strong> Oil held gains on June 2 as US-Iran talks continued but Lebanon fighting and strike allegations kept traders skeptical. <strong>Shift:</strong> The active issue is no longer whether leaders can announce a ceasefire; it is whether navies, insurers, tanker operators, and sanctions officials can verify rules that lower actual operating risk. <strong>Why it matters:</strong> A credible maritime framework can lower inflation pressure and reduce war-powers stress, while a vague one lets every actor prepare for renewed escalation while publicly claiming de-escalation.`,stats:['Reuters reported oil held most of its previous-session gains on June 2 because uncertainty over US-Iran talks and Hormuz reopening persisted.','AP reported Gaza, Lebanon, and Iran ceasefires still involved ongoing fighting, showing why markets discount political labels.','The Strait of Hormuz is commonly treated as one of the world most important oil chokepoints, so shipping confidence matters beyond one regional war.'],sideA:{label:'Deal can still lower risk',text:'If negotiators produce enforceable maritime rules, energy prices can fall before every nuclear or regional dispute is solved.'},sideB:{label:'Ceasefire can mask coercion',text:'If Iran, Israel, Hezbollah, and the United States keep using force around the edges, tanker risk remains priced in.'},sideC:{label:'Markets audit diplomacy first',text:'Insurance rates, tanker movements, and Brent prices will reveal confidence faster than speeches.'},sources:[{name:'Reuters oil',url:'https://ca.investing.com/news/commodities-news/oil-steadies-as-uncertainty-over-usiran-talks-keeps-markets-on-edge-4670252'},{name:'AP ceasefires',url:'https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae'},{name:'CFR Hormuz essay',url:'https://www.cfr.org/articles/trumps-project-freedom-isnt-going-to-open-the-strait-of-hormuz'}]},
{tag:'Public Health',headline:'Bundibugyo Ebola makes trust the main containment technology',deck:'With no approved species-specific vaccine or treatment, response quality depends on classic outbreak control under conflict conditions.',image:'https://www.cdc.gov/ebola/media/images/2024/04/Ebola_virus_purple.jpg',imageAlt:'Microscopic image of Ebola virus',imageCredit:'CDC',imageCreditUrl:'https://www.cdc.gov/ebola/about/index.html',skeletonHTML:`<strong>Baseline:</strong> Ebola control depends on fast diagnosis, isolation, contact tracing, safe burials, clinic infection prevention, and local consent. <strong>Move:</strong> WHO declared the Congo-Uganda Bundibugyo outbreak a PHEIC and then reported rising confirmed and suspected cases. <strong>Shift:</strong> The outbreak has moved from a local clinical emergency into a cross-border trust and mobility problem. <strong>Why it matters:</strong> If conflict zones, fear, or unsupported travel restrictions discourage reporting, hidden transmission can outrun official surveillance even when international resources arrive.`,stats:['WHO-linked Reuters reporting on June 2 listed 321 confirmed Congo cases, 116 suspected cases, 41 deaths, and six recoveries.','Uganda had nine confirmed cases and one associated death, with several cases linked to travel from Congo according to ECDC and WHO summaries.','WHO determined the outbreak constitutes a PHEIC under the International Health Regulations, but not a pandemic emergency.'],sideA:{label:'Containment remains possible',text:'Ebola can still be stopped by tracing, isolation, safe burials, and trusted local engagement.'},sideB:{label:'Trust is the weak point',text:'Conflict, stigma, and fear can drive families away from responders and hide cases.'},sideC:{label:'Travel policy cuts both ways',text:'Screening and isolation can slow exportation, but punitive rules can discourage reporting.'},sources:[{name:'WHO DON605',url:'https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605'},{name:'Reuters latest',url:'https://www.marketscreener.com/news/who-321-confirmed-ebola-cases-in-drc-116-more-suspected-cases-ce7f5dded98ff22d'},{name:'ECDC',url:'https://www.ecdc.europa.eu/en/ebola-outbreak-democratic-republic-congo-and-uganda'}]},
{tag:'Ukraine / Defense Industry',headline:'Ukraine air defense is now an industrial endurance contest',deck:'Russia is testing whether mixed salvos can force Ukraine and allies to spend interceptors faster than they can produce them.',image:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Building_on_Valeriya_Lobanovskoho_Avenue%2C_6A%2C_after_missile_strike%2C_2022-02-26_%2803%29.jpg/1280px-Building_on_Valeriya_Lobanovskoho_Avenue%2C_6A%2C_after_missile_strike%2C_2022-02-26_%2803%29.jpg',imageAlt:'Kyiv residential building damaged after a missile strike',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:Building_on_Valeriya_Lobanovskoho_Avenue,_6A,_after_missile_strike,_2022-02-26_(03).jpg',skeletonHTML:`<strong>Baseline:</strong> Ukraine can blunt Russian attacks with layered air defense, but every interceptor has a factory, budget, crew, and delivery timeline behind it. <strong>Move:</strong> Russia has intensified strikes as Patriot shortages widen, and Ukraine has asked Washington for more interceptors and systems. <strong>Shift:</strong> Moscow is turning air defense into a cost-exchange problem, using drones and missiles to force expensive choices. <strong>Why it matters:</strong> If allied production lags Russian launch capacity, civilian damage and bargaining pressure can rise without a major Russian ground breakthrough.`,stats:['Guardian reporting on June 2 described a Patriot shortage creating a window of vulnerability Russia is exploiting.','Axios reported CSIS analysis that Iran-war usage of Patriot and THAAD interceptors may leave stockpiles unreplenished until 2029.','Reuters reported Zelensky asked Trump and Congress for more air defenses because Patriot interceptors are Ukraine key defense against ballistic missiles.'],sideA:{label:'Allied industry can stabilize defense',text:'If NATO accelerates interceptor, radar, and cheaper counter-drone production, Russia loses much of the coercive payoff.'},sideB:{label:'Cost exchange favors Russia',text:'Low-cost drones and mixed salvos can drain expensive interceptors faster than factories replace them.'},sideC:{label:'Global scarcity changes strategy',text:'Iran, Ukraine, Taiwan, and Gulf defense are now competing for the same scarce inventory.'},sources:[{name:'Guardian',url:'https://www.theguardian.com/world/2026/jun/02/patriot-missile-shortage-window-vulnerability-russia-exploiting-ukraine'},{name:'Axios / CSIS',url:'https://www.axios.com/2026/05/28/iran-missile-defense-patriot-ukraine-taiwan'},{name:'Reuters Ukraine',url:'https://www.investing.com/news/world-news/us-should-send-ukraine-more-air-defence-missiles-congressmen-say-4715223'}]},
{tag:'China / Technology',headline:'US-China competition is moving from tariffs to enforceable chokepoints',deck:'Rare-earth licensing and AI-chip enforcement show how supply-chain power now runs through paperwork and partner compliance.',image:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/TSMC_Fab5.JPG/1280px-TSMC_Fab5.JPG',imageAlt:'TSMC fabrication plant in Taiwan',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:TSMC_Fab5.JPG',skeletonHTML:`<strong>Baseline:</strong> Washington limits Chinese access to advanced AI compute, while Beijing controls large parts of rare-earth processing needed for magnets and defense-industrial supply. <strong>Move:</strong> The United States moved to close an overseas Chinese-subsidiary chip loophole, Taiwan pursued smuggling investigations, and rare-earth curbs remained a bargaining issue after Trump-Xi talks. <strong>Shift:</strong> Strategic competition now turns on customs declarations, end-user rules, export licenses, and enforcement in third jurisdictions. <strong>Why it matters:</strong> If chokepoints leak, controls lose strategic value; if they tighten too aggressively, firms face higher costs and fragmented supply chains.`,stats:['Reuters reported the Commerce Department moved to restrict AI-chip shipments to Chinese-owned firms outside China.','AP reported Taiwanese prosecutors investigated forged-document smuggling of Nvidia-equipped servers to China.','Reuters reporting on rare earths showed Chinese curbs still bite even as leaders discuss truce extensions.'],sideA:{label:'Controls can bite',text:'Criminal enforcement and tighter end-user rules make evasion riskier and more expensive.'},sideB:{label:'Markets find leaks',text:'Demand for compute creates incentives for shell buyers, resellers, and transshipment routes.'},sideC:{label:'Partners decide outcomes',text:'Taiwan, Japan, Malaysia, Thailand, and Singapore can determine whether controls become real.'},sources:[{name:'Reuters chip rule',url:'https://www.investing.com/news/stock-market-news/us-takes-step-to-halt-nvidia-ai-chip-shipments-to-chinese-firms-outside-china-4717939'},{name:'AP Taiwan probe',url:'https://apnews.com/article/175dfa061ade223086872c5810905815'},{name:'Reuters rare earths',url:'https://www.marketscreener.com/news/trump-xi-to-weigh-rare-earth-truce-extension-but-china-s-curbs-still-bite-ce7f5bdfdd8bf325'}]},
{tag:'Climate / Development',headline:'South Asia heat turns adaptation into peak-load politics',deck:'The electricity grid has become the front line between climate risk and ordinary public services.',image:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/India_Gate_in_New_Delhi_03-2016_img3.jpg/1280px-India_Gate_in_New_Delhi_03-2016_img3.jpg',imageAlt:'India Gate in New Delhi',imageCredit:'Wikimedia Commons',imageCreditUrl:'https://commons.wikimedia.org/wiki/File:India_Gate_in_New_Delhi_03-2016_img3.jpg',skeletonHTML:`<strong>Baseline:</strong> India has expanded solar capacity but still relies on coal, gas, and stressed distribution networks to meet evening cooling demand. <strong>Move:</strong> Peak demand crossed 270 GW during severe heat, breaking the previous major summer benchmarks. <strong>Shift:</strong> Climate adaptation is now judged by whether grids, labor rules, water systems, and cooling centers work during peak stress. <strong>Why it matters:</strong> Governments can announce emissions targets, but citizens experience climate governance as power reliability, safe work hours, and survivable indoor temperatures.`,stats:['Financial Express reported peak demand touched 270.82 GW on May 21, above the 242.77 GW recorded in June 2025.','The report said April 2026 all-India energy deficit was 0.2 percent and peak deficit was 0.1 percent, showing the system was close to balance but under stress.','South Asia heat reports described extreme temperatures approaching or exceeding 45 degrees Celsius in parts of the region.'],sideA:{label:'Adaptation can scale',text:'Storage, demand response, cooling centers, and heat alerts can reduce deaths if planned together.'},sideB:{label:'Infrastructure can lag demand',text:'Cooling demand may grow faster than distribution upgrades and affordable household access.'},sideC:{label:'Heat is politically visible',text:'Blackouts during heatwaves become governance failures, not abstract climate indicators.'},sources:[{name:'Financial Express',url:'https://www.financialexpress.com/policy/economy/indias-peak-power-demand-hits-record-270-8-gw-as-heatwave-intensifies/4247688/'},{name:'Phys.org',url:'https://phys.org/news/2026-05-india-generates-power-demand-surges.pdf'},{name:'Al Jazeera',url:'https://www.aljazeera.com/news/2026/5/8/a-calamity-why-is-a-record-heatwave-sweeping-south-asia'}]}];
