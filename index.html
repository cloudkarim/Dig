    {tag:"Ukraine / Europe", headline:"Russia is turning Ukraine's air defense into an industrial endurance test", deck:"The Kyiv strike matters because mixed attacks force Ukraine and its allies to spend scarce interceptors against a renewable Russian strike cycle.", image:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Building_on_Valeriya_Lobanovskoho_Avenue%2C_6A%2C_after_missile_strike%2C_2022-02-26_%2803%29.jpg/1280px-Building_on_Valeriya_Lobanovskoho_Avenue%2C_6A%2C_after_missile_strike%2C_2022-02-26_%2803%29.jpg", imageAlt:"Kyiv residential building damaged after a missile strike", imageCredit:"Wikimedia Commons", imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Building_on_Valeriya_Lobanovskoho_Avenue,_6A,_after_missile_strike,_2022-02-26_(03).jpg", skeletonHTML:`<strong>Baseline:</strong> Ukraine's defenses rely on layered Western and Ukrainian systems that can blunt attacks but require expensive interceptors, trained crews, radars, and repair capacity. <strong>Move:</strong> Russia's latest Kyiv strike combined hundreds of drones, dozens of missiles, and an Oreshnik ballistic missile while Belarus again drew attention as a launch and pressure flank. <strong>Shift:</strong> The war's air-defense question is less whether one attack can be stopped and more whether allies can replace missiles faster than Russia can manufacture or source strike systems. <strong>Why it matters:</strong> If the replacement pipeline lags, Russia can impose civilian, energy-grid, and economic costs without needing a dramatic front-line breakthrough.`, stats:["AP reported Ukraine said Russia launched 600 drones and 90 missiles in the attack, a scale designed to saturate defenses.","Le Monde reported at least four people killed and more than 100 wounded, showing the civilian cost even when many incoming weapons are intercepted.","Belarus borders Ukraine and NATO members Poland, Lithuania, and Latvia, which makes deeper Belarusian involvement a European security issue."], sideA:{label:"Allied production can stabilize defense", text:"If NATO countries sustain interceptor and radar deliveries, Russia's strike campaign loses strategic payoff."}, sideB:{label:"Russia can exploit cost exchange", text:"Cheap drones and mixed salvos force Ukraine to spend scarce, expensive interceptors on a constant cycle."}, sideC:{label:"Belarus widens the map", text:"Even without Belarusian troops, launch routes and basing can stretch Ukraine and alarm NATO's eastern flank."}, sources:[{name:"AP",url:"https://apnews.com/article/998aeaab5833ca397290d9ee2737b0e5"},{name:"Le Monde",url:"https://www.lemonde.fr/en/international/article/2026/05/26/war-in-ukraine-kyiv-grows-anxious-over-belarusian-threat_6753813_4.html"},{name:"AP",url:"https://apnews.com/article/e4bac36b2e74e67d64d23eeaac5885c0"}]},
    {tag:"China / Technology", headline:"US-China competition is now a fight over enforceable chokepoints", deck:"Washington has chip rules, Beijing has rare-earth licensing, and both systems depend on partners, paperwork, and firms complying under pressure.", image:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/TSMC_Fab5.JPG/1280px-TSMC_Fab5.JPG", imageAlt:"TSMC fabrication plant in Hsinchu Science Park, Taiwan", imageCredit:"Wikimedia Commons", imageCreditUrl:"https://commons.wikimedia.org/wiki/File:TSMC_Fab5.JPG", skeletonHTML:`<strong>Baseline:</strong> The US has tried to deny China access to top-end AI compute, while China retains leverage in rare-earth processing needed by defense, autos, clean energy, and electronics. <strong>Move:</strong> Taiwan's AI-server smuggling investigation and China's defense of rare-earth export controls arrived in the same week. <strong>Shift:</strong> The policy contest has moved from tariff rates to enforceability: documents, resellers, licenses, customs declarations, and end users now decide whether strategic controls work. <strong>Why it matters:</strong> If either side's chokepoint leaks, the other side gains capacity; if both tighten, global companies face higher compliance costs and more fragmented supply chains.`, stats:["Taiwanese prosecutors are investigating three people over alleged forged documents tied to Nvidia-equipped Super Micro servers.","Reuters reported China said it would work with the United States on reasonable rare-earth concerns while defending its controls as lawful.","Foreign Policy reporting on the Trump-Xi summit shows Taiwan arms sales and trade bargaining remain intertwined with the technology fight."], sideA:{label:"Controls can bite", text:"Criminal enforcement and licensing pressure raise the cost of evasion and make strategic goods harder to move quietly."}, sideB:{label:"Markets find leaks", text:"High demand and global resale networks make perfect enforcement unrealistic without damaging legitimate trade."}, sideC:{label:"Partners are decisive", text:"Taiwan, Thailand, Hong Kong, and other transit nodes can determine whether US and Chinese policies become real."}, sources:[{name:"AP",url:"https://apnews.com/article/175dfa061ade223086872c5810905815"},{name:"Reuters",url:"https://www.investing.com/news/commodities-news/china-says-rare-earth-controls-lawful-will-cooperate-with-us-reasonable-concerns-4700320"},{name:"Foreign Policy",url:"https://foreignpolicy.com/2026/05/14/trump-xi-meeting-summit-china-taiwan-arms-sale/"}]},
    {tag:"Climate / Energy", headline:"India's heatwave shows adaptation is now about peak-load politics", deck:"Record temperatures are turning electricity reliability into the front line of climate governance.", image:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/India_Gate_in_New_Delhi_03-2016_img3.jpg/1280px-India_Gate_in_New_Delhi_03-2016_img3.jpg", imageAlt:"India Gate in New Delhi", imageCredit:"Wikimedia Commons", imageCreditUrl:"https://commons.wikimedia.org/wiki/File:India_Gate_in_New_Delhi_03-2016_img3.jpg", skeletonHTML:`<strong>Baseline:</strong> India has expanded renewable power but still relies heavily on coal and faces fast-rising cooling demand during hotter summers. <strong>Move:</strong> This week's heat pushed peak power demand above 270 GW while cities opened cooling zones and workers shifted hours. <strong>Shift:</strong> The binding constraint is no longer only generation capacity; it is distribution reliability, storage, evening demand, and whether vulnerable people can access cooling safely. <strong>Why it matters:</strong> Climate adaptation will increasingly be judged by grids, water systems, labor rules, and public-health alerts rather than by emissions targets alone.`, stats:["India's peak demand reached roughly 270.8 GW on May 21, crossing 270 GW for the first time during the heatwave.","AP reported New Delhi was forecast around 45 degrees Celsius, or 113 Fahrenheit, during the heat spell.","Power-sector reporting said the peak followed several consecutive record days, showing a trend rather than one isolated spike."], sideA:{label:"Adaptation can scale", text:"Solar, storage, demand response, cooling centers, and heat alerts can reduce deaths and grid stress if planned together."}, sideB:{label:"Infrastructure will lag", text:"Demand is rising faster than distribution upgrades, and poor households cannot always convert grid supply into safe cooling."}, sideC:{label:"Political accountability", text:"Blackouts during heatwaves quickly become governance failures, not only climate statistics."}, sources:[{name:"AP",url:"https://apnews.com/article/3aa179491366cc8a283907392c70c73d"},{name:"Reuters",url:"https://www.marketscreener.com/news/scorching-heat-drives-india-s-power-demand-to-a-record-270-gw-amid-outages-ce7f5adedd88f221"},{name:"IMD",url:"https://mausam.imd.gov.in/"}]}
  ],
  opinion: [
    {label:"Project Syndicate Essay", title:"The World After the Iran War", author:"Shlomo Ben-Ami", publication:"Project Syndicate", date:"May 14, 2026", subtitle:"Ben-Ami argues that the Iran war is likely to leave a more fragmented order rather than a cleaner postwar settlement.", proseHTML:`The piece starts from a historical claim that major wars often reorder international systems, then asks whether the US-Israel war with Iran can do the same constructively. The argument is live now because Washington and Tehran appear close to a Hormuz framework that may stop immediate fighting without resolving the nuclear, sanctions, and regional-order questions underneath. Its value for extemp is that it pushes the topic beyond ceasefire terms toward the balance among the United States, China, Gulf states, Israel, and Iran after the shooting slows. The limitation is that order-level arguments can understate how much immediate energy relief and inspection access would still matter.`, claim:"The war is more likely to damage the existing order than to produce a durable new one.", matters:"It helps speakers connect Hormuz, China, sanctions, and postwar legitimacy in one frame.", pushback:"A limited deal could still be strategically useful even if it does not redesign the region.", sources:[{name:"Project Syndicate",url:"https://www.project-syndicate.org/commentary/iran-war-lead-to-less-stable-and-more-fragmented-world-order-by-shlomo-ben-ami-2026-05"}]},
    {label:"National Review Column", title:"The Wrong Way to Talk About the Iran War", author:"Noah Rothman", publication:"National Review", date:"May 13, 2026", subtitle:"Rothman argues that a president fighting a costly national campaign has to explain public sacrifice rather than wave away economic pain.", proseHTML:`The column responds to a live political problem: the Iran war is affecting prices, shipping, and public patience, while the administration wants to frame it mainly as nuclear necessity. Rothman's argument is live because a possible deal now has to be sold to a public that has felt the costs before seeing a final result. The piece is useful because it treats rhetoric as part of strategy; a policy can lose legitimacy if leaders refuse to explain why costs are being imposed. The strongest pushback is that wartime presidents also avoid emphasizing costs because adversaries watch domestic weakness.`, claim:"War leadership requires asking for public buy-in, not pretending economic costs are irrelevant.", matters:"It gives a domestic-politics lens for evaluating Iran policy and war powers.", pushback:"Acknowledging economic pain too openly can encourage adversaries to wait out US politics.", sources:[{name:"National Review",url:"https://www.nationalreview.com/corner/the-wrong-way-to-talk-about-the-iran-war/amp/"}]},
    {label:"Foreign Policy Analysis", title:"Washington Might Be Ready to Bargain With Beijing", author:"Robert A. Manning", publication:"Foreign Policy", date:"May 19, 2026", subtitle:"Manning argues that the Trump-Xi summit may show Washington adjusting to Chinese power, even if the stability is fragile.", proseHTML:`The essay reads the Trump-Xi summit as more than pageantry: it suggests the United States may be shifting from maximal confrontation toward a bargaining posture with China. That argument is live because Taiwan arms sales, rare-earth controls, AI chips, and trade disputes all moved in the same two-week window. Its value is that it gives extemp speakers a middle position between appeasement and confrontation: great-power competition may require managed bargaining even when rivalry remains deep. The pushback is that Beijing may interpret bargaining as a chance to press harder around Taiwan or supply-chain chokepoints.`, claim:"The United States may be accepting that durable China policy requires bargaining from a position of constrained power.", matters:"It reframes the China debate around equilibrium, not simple toughness or retreat.", pushback:"Stability can become concession if red lines around Taiwan and technology are blurred.", sources:[{name:"Foreign Policy",url:"https://foreignpolicy.com/2026/05/19/trump-xi-summit-china-relationship-trade-strategy/"}]},
    {label:"Project Syndicate Essay", title:"America's Superpower Suicide", author:"Timothy Snyder", publication:"Project Syndicate", date:"May 14, 2026", subtitle:"Snyder argues that US power is being weakened from within by choices that damage alliances, institutions, and strategic credibility.", proseHTML:`Snyder's essay uses the Iran war as evidence for a broader claim about American decline through self-inflicted strategic choices. The argument is live because the United States is simultaneously managing Iran, Ukraine, Taiwan, trade, and domestic war-powers fights, all of which depend on credibility and alliances. For extemp, the piece offers a thesis that power is not just military capacity but the ability to organize partners and sustain legitimate policy. The strongest limitation is that it can underweight voter frustration with institutions that sometimes distribute costs unevenly or move too slowly.`, claim:"The United States is weakening itself by treating institutions and alliances as burdens rather than power multipliers.", matters:"It links separate stories into one argument about credibility and national capacity.", pushback:"Some institutional constraints are real costs, not merely assets being misunderstood.", sources:[{name:"Project Syndicate",url:"https://www.project-syndicate.org/commentary/trump-committing-superpower-suicide-america-by-timothy-snyder-2026-05"}]}

const titles = {wire: "The Wire", weekly: "The Weekly", analytical: "The Analytical", opinion: "The Opinion"};

function sourceHTML(sources) {
  return `<div class="wire-sources">Sources:${sources.map(s => `<a class="source-link" href="${s.url}" target="_blank" rel="noopener noreferrer">${s.name}</a>`).join(" /")}</div>`;
}

function learnHTML(learn) {
  if (!learn) return "";
  return `<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>${learn.context}</p><h4>Three angles</h4><ul>${learn.angles.map(a => `<li>${a}</li>`).join("")}</ul><h4>What to watch</h4><p>${learn.watch}</p></div></details>`;
}

function renderHeadline() {
  const h = briefing.headline;
  document.getElementById("headlineDay").innerHTML = `<div class="headline-copy"><div class="headline-label">${h.topic}</div><h2>${h.h}</h2><p>${h.deck}</p></div><figure class="headline-media"><img class="headline-photo" src="${h.image}" alt="${h.imageAlt}" loading="lazy"><figcaption class="image-credit">Image: <a class="source-link" href="${h.imageCreditUrl}" target="_blank" rel="noopener noreferrer">${h.imageCredit}</a></figcaption></figure>`;
}

function renderWireList(list) {
  return list.map(group => `<details class="topic"><summary><span class="topic-label">${group.topic}</span><span class="topic-count">${group.stories.length} stories</span></summary><div class="topic-body">${group.stories.map(story => `<article class="wire-item"><h2 class="wire-headline">${story.h}</h2><p class="wire-prose">${story.proseHTML}</p>${sourceHTML(story.sources)}${learnHTML(story.learn)}</article>`).join("")}</div></details>`).join("");
}

function imageHTML(item) {
  if (!item.image) return "";
  return `<figure class="analytical-image"><img src="${item.image}" alt="${item.imageAlt || ""}" loading="lazy"><figcaption class="image-credit">Image: <a class="source-link" href="${item.imageCreditUrl || item.image}" target="_blank" rel="noopener noreferrer">${item.imageCredit || "Source"}</a></figcaption></figure>`;
}

function renderAnalytical() {
  return briefing.analytical.map(item => `<details class="analytical-file"><summary><div class="analytical-summary"><div class="analytical-tag">${item.tag}</div><h2>${item.headline}</h2>${item.deck ? `<p class="analytical-deck">${item.deck}</p>` : ""}</div></summary><div class="analytical-body">${imageHTML(item)}<p class="skeleton">${item.skeletonHTML}</p><section class="stats-block"><h3>Key Stats With Setup</h3>${item.stats.map(s => `<p>${s}</p>`).join("")}</section><div class="angles-title">Three Angles</div><div class="angles-grid"><div class="angle angle-a"><strong>${item.sideA.label}</strong>${item.sideA.text}</div><div class="angle angle-b"><strong>${item.sideB.label}</strong>${item.sideB.text}</div><div class="angle angle-c"><strong>${item.sideC.label}</strong>${item.sideC.text}</div></div>${sourceHTML(item.sources)}</div></details>`).join("");
}

function renderOpinion() {
  return briefing.opinion.map(item => `<article class="opinion-card"><div class="opinion-label">${item.label}</div><h2>${item.title}</h2><p class="opinion-meta">${item.author} - ${item.publication}, ${item.date}</p><p class="opinion-subtitle"><strong>${item.subtitle}</strong></p><p class="opinion-prose">${item.proseHTML}</p><div class="opinion-boxes"><div class="opinion-box"><strong>The Claim</strong>${item.claim}</div><div class="opinion-box"><strong>Why It Matters</strong>${item.matters}</div><div class="opinion-box"><strong>Pushback</strong>${item.pushback}</div></div>${sourceHTML(item.sources)}</article>`).join("");
}

function renderTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
  document.getElementById("editionTitle").textContent = titles[tab];
  document.getElementById("editionDesc").textContent = briefing.intros[tab];
  const content = document.getElementById("content");
  if (tab === "wire") content.innerHTML = renderWireList(briefing.wire);
  if (tab === "weekly") content.innerHTML = renderWireList(briefing.weekly);
  if (tab === "analytical") content.innerHTML = renderAnalytical();
  if (tab === "opinion") content.innerHTML = renderOpinion();
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem("dig-theme", theme);
  document.getElementById("themeToggle").textContent = `Theme: ${theme === "dark" ? "Dark" : "Light"}`;
}

function initTheme() {
  const saved = localStorage.getItem("dig-theme");
  applyTheme(saved || "light");
}

document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => renderTab(btn.dataset.tab)));
document.getElementById("themeToggle").addEventListener("click", () => applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark"));

renderHeadline();
initTheme();
renderTab("wire");
</script>
</body>
</html>
