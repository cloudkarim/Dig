const headline={topic:"Middle East",h:"Lebanon becomes the test case for a wider Iran exit",deck:"A ceasefire framework has shifted attention from battlefield announcements to enforcement, disarmament and the diplomatic sequence that follows.",image:"https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041",imageAlt:"The Strait of Hormuz photographed from orbit",imageCredit:"NASA",imageCreditUrl:"https://www.nasa.gov/image-article/strait-of-hormuz/"};
const wire={
"US Economy":[{h:"Jobless claims rise before a high-stakes payroll report",proseHTML:`Weekly applications for unemployment insurance had stayed low despite slower hiring. <span class='change'>Claims rose to a four-month high ahead of the federal payroll report.</span> The move is not yet a recession signal, but it raises the probability that the Federal Reserve will weigh labor weakness more heavily against inflation. Friday's payroll and wage figures will show whether the increase reflects temporary volatility or a broader loss of momentum.`,sources:[S("Labor data","https://www.bls.gov/news.release/pdf/empsit.pdf"),S("Claims report","https://ca.marketscreener.com/news/us-weekly-jobless-claims-increase-to-four-month-high-worker-productivity-revised-down-ce7f5ddcd08bf226")],learn:L("Claims measure layoffs quickly, while payrolls and unemployment describe the broader labor market.",["Rate-cut case: weaker demand reduces wage pressure.","Caution case: one weekly print is noisy.","Household case: slower hiring can hurt entrants before layoffs surge."],"Watch payroll growth, revisions, wages and the unemployment rate.")},{h:"Oil relief remains conditional on Middle East implementation",proseHTML:`Markets had priced a persistent risk premium into crude as war threatened shipping through the Strait of Hormuz. <span class='change'>Ceasefire diplomacy lowered prices, but renewed missile activity showed that relief depends on implementation rather than an announcement.</span> Energy costs feed inflation through fuel, freight and fertilizer, so an unstable truce can delay rate cuts even outside the region. Traders will focus on shipping traffic and whether parties verify compliance.`,sources:[S("Oil markets","https://www.investing.com/news/economy-news/oil-jumps-on-mideast-missiles-while-ai-bulls-carry-stocks-higher-4723282"),S("Iran diplomacy","https://www.investing.com/news/world-news/lebanon-ceasefire-raises-hopes-of-progess-for-iran-deal-4726027")],learn:L("The <span class='jargon'>risk premium (the extra price buyers pay for possible disruption)</span> can fall faster than physical supply changes.",["Consumers benefit if transport costs retreat.","Producers face weaker revenues.","Central banks need sustained, not one-day, relief."],"Watch tanker traffic, insurance rates and ceasefire verification.")}],
"US Politics":[{h:"House passes first Iran war-powers rebuke",proseHTML:`Congress has rarely forced a president to stop hostilities once operations begin. <span class='change'>The House voted 215-208 for a war-powers resolution directing an end to US hostilities with Iran, with four Republicans joining Democrats.</span> A difficult Senate path and likely veto mean the vote does not itself halt operations, but it creates the clearest institutional break over the war. The next test is whether gasoline prices and deployment length change Senate votes.`,sources:[S("AP","https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536"),S("White House","https://www.whitehouse.gov/wp-content/uploads/2026/05/SAP-HCR86.pdf")],learn:L("The <span class='jargon'>War Powers Resolution (the 1973 framework for unauthorized hostilities)</span> has seldom compelled withdrawal.",["Congress: reasserts legislative authority.","Executive: argues flexibility is essential.","Diplomatic: visible limits may alter bargaining leverage."],"Watch the Senate, veto arithmetic and any court challenge.")},{h:"Trump moves to install Todd Blanche permanently at Justice",proseHTML:`The Justice Department had been operating through an acting leadership arrangement. <span class='change'>President Trump said he would nominate Todd Blanche as attorney general, beginning a Senate confirmation fight.</span> The choice matters because the department controls federal prosecutions, antitrust enforcement and the government's position in major court cases. Hearings will test independence, past White House work and management of politically sensitive investigations.`,sources:[S("Axios","https://www.axios.com/2026/06/04/trump-nominate-todd-blanche-attorney-general"),S("Reuters report","https://www.ksl.com/article/51506817/trump-says-he-will-nominate-todd-blanche-as-us-attorney-general")],learn:L("The attorney general is both a Cabinet officer and the leader of a department expected to apply law independently.",["Supporters emphasize accountability to an elected president.","Critics emphasize conflict and prosecutorial independence.","Senators can use confirmation to demand commitments."],"Watch committee scheduling and recusal questions.")}],
"Healthcare":[{h:"Attack on Congo Ebola burial team raises transmission risk",proseHTML:`Safe burials are central to Ebola control because bodies remain highly infectious after death. <span class='change'>An attack on a burial team in the Democratic Republic of Congo disrupted response work as cases increased.</span> Violence can drive families away from official surveillance and delay contact tracing, allowing hidden chains of transmission. Authorities must now rebuild trust while protecting health workers without making care look militarized.`,sources:[S("WHO outbreak notice","https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605"),S("Attack report","https://uk.marketscreener.com/news/congo-reports-attack-on-ebola-burial-team-as-cases-rise-ce7f5ddcd18bff24")],learn:L("<span class='jargon'>Contact tracing (finding and monitoring people exposed to a patient)</span> works only when communities report illness quickly.",["Security: escorts may keep teams operating.","Trust: heavy security can discourage cooperation.","Regional: displacement can move cases across borders."],"Watch unexplained deaths, vaccination rings and health-worker access.")},{h:"WHO estimates unsafe food causes 1.5 million deaths",proseHTML:`Food safety is often treated as a local inspection issue rather than a global health burden. <span class='change'>The World Health Organization highlighted an estimated 1.5 million annual deaths linked to unsafe food.</span> The burden connects weak laboratories, water systems, informal markets and cross-border supply chains. The policy question is whether governments fund prevention and surveillance before outbreaks become trade or hospital crises.`,sources:[S("WHO headlines","https://www.who.int/news-room/headlines"),S("WHO food safety","https://www.who.int/health-topics/food-safety")],learn:L("Foodborne disease includes infections and toxic exposures, not only short episodes of stomach illness.",["Prevention is cheaper than outbreak response.","Small vendors can bear disproportionate compliance costs.","Better surveillance can initially make statistics look worse."],"Watch national reporting and Codex food-standard enforcement.")}],
"Climate":[{h:"El Nino crop stress spreads across Asia",proseHTML:`Agricultural markets were already absorbing fuel and fertilizer volatility. <span class='change'>A strengthening El Nino is now bringing heat and rainfall disruption to Asian crops before the seasonal peak.</span> Simultaneous pressure on rice, palm oil and other staples can turn a weather event into inflation and food-security stress. Forecast updates and export restrictions will determine whether local losses become a regional price shock.`,sources:[S("WMO","https://public.wmo.int/news/media-centre/wmo-prepare-el-nino"),S("Crop report","https://www.marketscreener.com/news/hot-weather-hurts-asian-crops-as-powerful-el-nino-takes-shape-ce7f5ddcda8cf525")],learn:L("<span class='jargon'>El Nino (warming in the tropical Pacific that shifts global weather)</span> produces different effects by region.",["Preparedness can protect yields.","Poor households face food-price exposure.","Export controls can amplify scarcity."],"Watch monsoon forecasts, crop conditions and export policy.")},{h:"Summer grid warnings shift from capacity to timing",proseHTML:`North American power systems may have enough annual generation while still failing during a narrow heat-wave peak. <span class='change'>Summer assessments emphasize transmission constraints, generator outages and the timing of demand.</span> Rapid data-center growth makes local bottlenecks more consequential even where total capacity appears adequate. Utilities will be judged on demand response, fuel security and coordination during simultaneous heat events.`,sources:[S("FERC assessment","https://www.ferc.gov/sites/default/files/2026-05/26_Summer%20Assessment_0529.pdf"),S("NERC snapshot","https://www.nerc.com/globalassets/our-work/assessments/2026-summer-reliability-assessment-snapshot.pdf")],learn:L("<span class='jargon'>Resource adequacy (enough deliverable power at peak demand)</span> depends on location and timing, not only total capacity.",["New generation expands supply.","Transmission delays strand capacity.","Demand response can cover brief peaks."],"Watch heat forecasts, outage rates and emergency alerts.")}],
"Tech / AI":[{h:"US chip controls target Chinese-owned buyers outside China",proseHTML:`Export controls had focused heavily on destination, leaving overseas subsidiaries as a possible route to advanced processors. <span class='change'>US authorities moved to restrict sales to Chinese-owned buyers operating outside China.</span> The ownership-based approach may close a loophole but increases compliance burdens for chipmakers and cloud providers. Enforcement will depend on tracing beneficial ownership and computing access across jurisdictions.`,sources:[S("Controls report","https://www.investing.com/news/stock-market-news/us-takes-step-to-halt-nvidia-ai-chip-shipments-to-chinese-firms-outside-china-4717939"),S("Industry detail","https://www.tomshardware.com/tech-industry/us-closes-loophole-that-allowed-chinese-owned-subsidiaries-located-outside-china-to-buy-ai-chips-report-claims-that-hundreds-of-thousands-of-advanced-ai-chips-have-been-acquired-through-bis-blind-spot")],learn:L("<span class='jargon'>Beneficial ownership (who ultimately controls a company)</span> can be harder to verify than a shipping address.",["Security case: closes diversion routes.","Business case: raises screening costs.","Strategic case: may accelerate alternative supply chains."],"Watch implementation guidance and allied alignment.")},{h:"Data-center opposition becomes an AI policy constraint",proseHTML:`AI infrastructure policy has concentrated on chips and electricity supply. <span class='change'>Local disputes over water, power rates and land use are now delaying or reshaping data-center projects.</span> That gives municipalities leverage over national technology strategy and forces developers to disclose community costs earlier. The next phase will turn on enforceable water standards and who pays for grid upgrades.`,sources:[S("Axios","https://www.axios.com/2026/06/03/google-pushes-water-standards-data-center-backlash"),S("Project Syndicate","https://www.project-syndicate.org/commentary/democratic-opposition-to-ai-data-centers-could-protect-us-from-bubble-by-angela-huyue-zhang-2026-06")],learn:L("Data centers concentrate electricity and cooling demand in specific communities.",["Growth: infrastructure supports productivity.","Local: residents can inherit costs.","Governance: permitting becomes de facto AI regulation."],"Watch utility tariffs, water rules and local ballot fights.")}],
"Latin America":[{h:"Colombia election authority rebuts Petro fraud claim",proseHTML:`Colombia entered its presidential runoff with intense polarization but established electoral observation. <span class='change'>Election authorities rejected President Gustavo Petro's fraud allegation as the runoff campaign opened.</span> Unsupported claims can reduce trust before ballots are cast and pressure administrators to prove neutrality in real time. Observer access, audit procedures and candidate acceptance will determine whether the dispute remains rhetorical.`,sources:[S("OAS observers","https://www.oas.org/fpdb/press/2026_EOM_Colombia_Presidential_Elections_Second_Report_ENG.pdf"),S("Election coverage","https://elpais.com/america-colombia/elecciones-presidenciales/2026-06-04/resultados-de-las-elecciones-en-colombia-2026-en-vivo.html")],learn:L("Election legitimacy depends on transparent procedures and losing candidates accepting verified results.",["Petro frames vigilance as protection.","Authorities warn premature claims erode trust.","Observers can provide an external record."],"Watch audits, campaign violence and runoff concessions.")},{h:"Cuba fuel blockade becomes a sanitation emergency",proseHTML:`Cuba's fuel shortage had already constrained transport and electricity. <span class='change'>The crisis is now disrupting waste collection, water pumping and other ordinary urban services.</span> That broadens an energy shock into a public-health and migration risk, especially where municipalities cannot run equipment. Watch whether outside fuel, financing or humanitarian channels restore essential services.`,sources:[S("Cuba report","https://www.investing.com/news/world-news/how-cubans-keep-going-despite-us-pressure-and-fuel-blockade-4723893")],learn:L("Energy scarcity affects sanitation through pumps, trucks, refrigeration and treatment plants.",["Pressure may force policy change.","Civilian hardship can deepen without political movement.","Migration can shift costs to neighbors."],"Watch blackouts, water access and maritime migration.")}],
"Africa / Middle East":[{h:"Hezbollah rejection clouds the Lebanon ceasefire",proseHTML:`The proposed ceasefire links a halt in fighting to Lebanese state control and a wider Iran diplomatic sequence. <span class='change'>Hezbollah rejected core disarmament terms, exposing the gap between interstate diplomacy and armed-group compliance.</span> If enforcement fails, displaced civilians cannot safely return and negotiations with Iran lose their main demonstration case. Mediators now need monitoring arrangements that Lebanon can implement without triggering internal conflict.`,sources:[S("AP","https://apnews.com/article/06ea585ce43fd28e26c4d21d46a4df83"),S("Diplomacy report","https://www.investing.com/news/world-news/lebanon-ceasefire-raises-hopes-of-progess-for-iran-deal-4726027")],learn:L("A ceasefire is durable only when command structures and verification mechanisms can enforce it.",["State view: sovereignty requires one chain of arms.","Hezbollah view: disarmament removes deterrence.","Mediator view: sequencing may matter more than immediate maximal terms."],"Watch monitoring, withdrawal lines and Lebanese cabinet action.")},{h:"Eastern Congo combines war, sanctions and epidemic risk",proseHTML:`Eastern Congo was already facing armed conflict and mass displacement. <span class='change'>New sanctions and an Ebola flare-up now overlap with insecurity that limits humanitarian access.</span> These crises reinforce one another: displacement weakens surveillance, disease complicates aid operations and sanctions may alter armed-group incentives slowly. Access guarantees are the immediate measure of whether diplomacy changes conditions.`,sources:[S("Sanctions","https://ca.marketscreener.com/news/us-imposes-sanctions-on-commanders-over-fighting-in-eastern-congo-ce7f5ddede8aff26"),S("WHO","https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605")],learn:L("Overlapping security and health emergencies require shared logistics and trusted local partners.",["Sanctions impose costs on commanders.","Sanctions alone rarely protect civilians quickly.","Health cooperation can create limited neutral space."],"Watch access corridors, vaccination and ceasefire compliance.")}],
"Europe / EU":[{h:"Ukraine and Moldova clear a major EU accession gate",proseHTML:`Both countries had candidate status but faced political resistance to opening every negotiating cluster. <span class='change'>EU members agreed to the next accession step, restoring momentum to a process tied to wartime reform.</span> Accession is not immediate membership, yet progress anchors legal and economic reforms and signals long-term integration. The durability of that signal depends on benchmarks, financing and unanimity at later stages.`,sources:[S("EU Ukraine page","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en"),S("Member agreement","https://wsau.com/2026/06/03/all-eu-members-greenlight-first-step-in-accession-talks-ukraine-pm-says/")],learn:L("<span class='jargon'>Accession clusters (groups of EU law and policy chapters)</span> open and close only after benchmarks are met.",["Security: integration raises the cost of abandonment.","Reform: conditionality can improve governance.","Skeptical: unanimity leaves many veto points."],"Watch the negotiating timetable and reform benchmarks.")}],
"China":[{h:"Tiananmen anniversary sharpens the memory divide",proseHTML:`Beijing suppresses public commemoration of the 1989 crackdown while Taiwan and Western governments preserve it as a human-rights issue. <span class='change'>The anniversary produced renewed official calls for China to confront the record.</span> The dispute is not only historical; it reflects competing claims about legitimacy, censorship and the political identity of Taiwan and Hong Kong. Watch whether commemorations prompt new diplomatic or domestic restrictions.`,sources:[S("US statement","https://www.state.gov/anniversary-of-the-tiananmen-square-massacre/"),S("Taiwan response","https://www.investing.com/news/world-news/taiwan-presses-china-to-confront-tiananmen-past-4725620")],learn:L("Control of public memory can reinforce present-day political authority.",["Rights view: remembrance supports accountability.","Beijing view: external statements are interference.","Taiwan view: the anniversary distinguishes political systems."],"Watch censorship, arrests and official cross-strait rhetoric.")}],
"War / Conflicts":[{h:"House couples Ukraine aid with pressure on Russia",proseHTML:`Ukraine's defenses depend on predictable external financing and scarce air-defense systems. <span class='change'>The House advanced aid while lawmakers pressed for stronger economic and military pressure on Russia.</span> The package can stabilize near-term supply, but delivery schedules matter more than authorization during an active campaign. Watch Senate timing, contracting and the allocation of interceptors across theaters.`,sources:[S("AP","https://apnews.com/article/c01c9e068b63d195d26e3134ed586a71"),S("Air-defense scarcity","https://www.theguardian.com/world/2026/jun/02/patriot-missile-shortage-window-vulnerability-russia-exploiting-ukraine")],learn:L("Appropriations authorize money; battlefield effect requires production, transport and training.",["Aid raises Ukraine's staying power.","Scarcity forces tradeoffs among allies.","Pressure may improve or reduce negotiating space."],"Watch Senate passage and delivery calendars.")},{h:"Declared ceasefires fail the civilian test",proseHTML:`Diplomatic announcements in Gaza and Lebanon have repeatedly coexisted with strikes and disputed violations. <span class='change'>New casualties showed that civilian safety still lags behind ceasefire language.</span> Each incident can collapse trust, block returns and give spoilers an argument against compliance. The decisive indicators are verified reductions in attacks, humanitarian access and functioning monitoring channels.`,sources:[S("Gaza report","https://www.investing.com/news/world-news/israeli-strikes-kill-nine-people-in-gaza-medics-say-4725745"),S("AP regional report","https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae")],learn:L("Ceasefires need shared definitions, attribution procedures and remedies for violations.",["Optimists see imperfect pauses as a path to de-escalation.","Skeptics see ambiguity as cover for continued force.","Humanitarian actors judge access and casualty trends."],"Watch monitors, aid flows and civilian return rates.")}]};

"US Economy":[wire["US Economy"][0],wire["US Economy"][1],{h:"Labor data shift from resilience toward slower hiring",proseHTML:`The week's releases collectively weakened the picture of a labor market absorbing high rates without damage. <span class='change'>Claims rose and hiring indicators softened before the payroll report.</span> That makes revisions and wage growth central to the rate outlook.`,sources:[S("BLS","https://www.bls.gov/news.release/pdf/empsit.pdf")],learn:L("No single indicator defines a turn.",["Cuts may arrive sooner.","Inflation may keep policy tight.","Revisions can change the narrative."],"Watch payroll revisions.")}],
"US Politics":[wire["US Politics"][0],wire["US Politics"][1],{h:"Supreme Court preserves agency enforcement tools",proseHTML:`Businesses continued challenging how federal agencies adjudicate and enforce rules. <span class='change'>The Court left important enforcement mechanisms intact while deciding narrower disputes.</span> The result preserves administrative capacity but leaves constitutional litigation active.`,sources:[S("Court docket","https://m.investing.com/news/stock-market-news/factboxtop-cases-on-the-us-supreme-courts-docket-4727195?ampMode=1")],learn:L("Administrative law defines how agencies turn statutes into enforceable decisions.",["Capacity supports consistent enforcement.","Due process constrains agencies.","Narrow rulings prolong uncertainty."],"Watch next term's docket.")}],
"Healthcare":[wire.Healthcare[0],wire.Healthcare[1],{h:"Measles exposes erosion beneath coverage figures",proseHTML:`National vaccination averages can hide local gaps and weak delivery systems. <span class='change'>Fresh analysis of Bangladesh's outbreak tied resurgence to years of institutional erosion.</span> The lesson is that procurement, trust and surveillance matter alongside headline coverage.`,sources:[S("Essay","https://www.project-syndicate.org/commentary/measles-outbreak-in-bangladesh-reflects-institutional-failures-that-long-went-unnoticed-by-m-niaz-asadullah-and-zia-sadique-2026-06"),S("WHO measles","https://www.who.int/news-room/fact-sheets/detail/measles")],learn:L("Measles quickly reveals immunity gaps because it is highly contagious.",["Campaigns can close gaps.","Weak systems recreate them.","Outbreak data can target resources."],"Watch vaccination catch-up.")}],

const analytical=[
{tag:"Middle East",headline:"Lebanon's ceasefire is an implementation test for the Iran exit",deck:"The diplomatic sequence depends on whether armed actors accept verifiable limits.",image:headline.image,imageAlt:headline.imageAlt,imageCredit:"NASA",imageCreditUrl:headline.imageCreditUrl,skeletonHTML:`<b>Baseline:</b> regional talks could announce pauses without resolving command, missiles or border control. <b>Shift:</b> Lebanon is now the first operational test of a broader de-escalation sequence. <b>Stakes:</b> credible monitoring could unlock negotiations; failure would show that interstate bargains cannot bind armed groups.`,stats:["A ceasefire must coordinate state forces, Hezbollah and external guarantors.","Oil and shipping markets are pricing implementation risk, not only supply volume.","Civilian return depends on verified security, services and unexploded-ordnance clearance."],sideA:["Diplomatic bridge","A phased deal can trade immediate quiet for later disarmament steps."],sideB:["Spoiler risk","Ambiguous sequencing lets each side accuse the other of first violation."],sideC:["State capacity","Lebanon's institutions may be the binding constraint."],sources:[S("AP","https://apnews.com/article/06ea585ce43fd28e26c4d21d46a4df83"),S("CFR","https://www.cfr.org/articles/trumps-project-freedom-isnt-going-to-open-the-strait-of-hormuz")]},
{tag:"US Institutions",headline:"The Iran vote tests whether dissent can become war authority",deck:"A chamber majority is politically important but legally incomplete.",image:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/United_States_Capitol_west_front_edit2.jpg/1280px-United_States_Capitol_west_front_edit2.jpg",imageAlt:"United States Capitol",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:United_States_Capitol_west_front_edit2.jpg",skeletonHTML:`<b>Baseline:</b> presidents have accumulated operational control while Congress controls appropriations and formal authorization. <b>Move:</b> the House passed a direct rebuke. <b>Impact:</b> the Senate and veto process will reveal whether public costs can overcome institutional inertia.`,stats:["The House vote was 215-208.","Four Republicans joined Democrats.","A veto override requires two-thirds support in each chamber."],sideA:["Constraint","The vote rebuilds legislative ownership of war."],sideB:["Flexibility","Command decisions cannot depend on slow congressional cycles."],sideC:["Price politics","Fuel costs may move votes more than doctrine."],sources:[S("AP","https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536"),S("White House","https://www.whitehouse.gov/wp-content/uploads/2026/05/SAP-HCR86.pdf")]},

{tag:"Europe",headline:"EU accession is becoming Ukraine's second security guarantee",deck:"Integration cannot stop missiles, but it can anchor institutions and investment.",image:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Flag_of_Europe.svg/1280px-Flag_of_Europe.svg.png",imageAlt:"European Union flag",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Flag_of_Europe.svg",skeletonHTML:`<b>Baseline:</b> NATO membership remains politically difficult during war. <b>Shift:</b> accession negotiations regained momentum. <b>Stakes:</b> conditional reform, market access and legal convergence can make long-term abandonment more costly even without an immediate defense clause.`,stats:["Every negotiating cluster requires benchmarks and unanimous political decisions.","Temporary protection has integrated millions of Ukrainians into EU labor markets.","Reconstruction finance depends on credible governance and legal alignment."],sideA:["Anchor","Accession locks in democratic and market reforms."],sideB:["False comfort","A long process cannot substitute for military protection."],sideC:["Leverage","Veto points give member states repeated bargaining power."],sources:[S("European Commission","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en"),S("Eurostat","https://ec.europa.eu/eurostat/statistics-explained/index.php?title=Temporary_protection_for_persons_fleeing_Ukraine_-_monthly_statistics")]},
{tag:"Climate & Food",headline:"El Nino can turn an energy shock into an Asian food shock",deck:"Weather, fertilizer and export policy can compound one another.",image:"https://public.wmo.int/sites/default/files/styles/featured_image_x1_768x512/public/2026-06/Thumbnails%202026.jpg?h=d1cb525d&itok=Wyg1jPYm",imageAlt:"WMO El Nino climate graphic",imageCredit:"WMO",imageCreditUrl:"https://public.wmo.int/news/media-centre/wmo-prepare-el-nino",skeletonHTML:`<b>Baseline:</b> food systems entered the season with volatile fuel and fertilizer costs. <b>Change:</b> WMO confirmed El Nino conditions while Asian crops faced heat and rainfall stress. <b>Impact:</b> simultaneous yield losses and export controls could transmit local weather into regional inflation and hunger.`,stats:["El Nino shifts risk rather than producing one uniform global outcome.","Rice markets are especially sensitive to concentrated Asian production and trade.","Energy prices affect irrigation, fertilizer, processing and freight."],sideA:["Adaptation","Forecasts allow planting and reserve adjustments."],sideB:["Compound shock","Poor households cannot absorb simultaneous food and fuel inflation."],sideC:["Policy amplifier","Export bans may matter more than aggregate crop loss."],sources:[S("WMO","https://public.wmo.int/news/media-centre/wmo-prepare-el-nino"),S("FAO prices","https://www.fao.org/worldfoodsituation/foodpricesindex/en/")]}];

const editions={wire:["The Wire","Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer."],weekly:["The Weekly","The week in consequential developments, grouped like The Wire but selected for events still shaping the map today."],analytical:["The Analytical","Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points."],opinion:["The Opinion","Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."]};
const src=a=>`<div class="sources">${a.map(x=>`<a href="${x.u}" target="_blank" rel="noopener">${x.n} ↗</a>`).join("")}</div>`;
const learn=x=>`<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>${x.context}</p><h4>Three angles</h4><ul>${x.angles.map(a=>`<li>${a}</li>`).join("")}</ul><h4>What to watch</h4><p>${x.watch}</p></div></details>`;
function renderGroups(data){return Object.entries(data).map(([topic,items])=>`<details class="topic"><summary><span>${topic}</span><span class="count">${items.length} ${items.length===1?"story":"stories"}</span></summary><div class="stack">${items.map(x=>`<article class="wire-item"><h3 class="wire-headline">${x.h}</h3><p class="wire-prose">${x.proseHTML}</p>${src(x.sources)}${learn(x.learn)}</article>`).join("")}</div></details>`).join("")}
function renderAnalytical(){return analytical.map(x=>`<details class="afile"><summary><div><div class="tag">${x.tag}</div><h3>${x.headline}</h3><p class="deck">${x.deck}</p></div></summary><div class="analysis-body"><img class="analysis-img" src="${x.image}" alt="${x.imageAlt}"><div class="credit"><a href="${x.imageCreditUrl}" target="_blank" rel="noopener">Image: ${x.imageCredit} ↗</a></div><p class="walk">${x.skeletonHTML}</p><div class="stats"><h4>Key Stats With Setup</h4><ul>${x.stats.map(s=>`<li>${s}</li>`).join("")}</ul></div><h4 class="angles-title" style="margin-top:17px">Three Angles</h4><div class="angles">${[["a",x.sideA],["b",x.sideB],["c",x.sideC]].map(([c,v])=>`<div class="angle ${c}"><strong>${v[0]}</strong>${v[1]}</div>`).join("")}</div>${src(x.sources)}</div></details>`).join("")}
function renderOpinion(){return opinion.map(x=>`<article class="opinion-card"><div class="tag">${x.tag}</div><h3>${x.title}</h3><div class="by">${x.author} · ${x.pub}</div><p class="thesis">${x.thesis}</p><p>${x.text}</p><div class="op-grid"><div class="op-box"><strong>The Claim</strong>${x.claim}</div><div class="op-box"><strong>Why It Matters</strong>${x.matters}</div><div class="op-box"><strong>Pushback</strong>${x.pushback}</div></div>${src([x.source])}</article>`).join("")}
const nav=document.getElementById("nav"),content=document.getElementById("content");Object.entries(editions).forEach(([k,v])=>{const b=document.createElement("button");b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById("edition").textContent=editions[k][0];document.getElementById("description").textContent=editions[k][1];document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.edition===k));content.innerHTML=k==="wire"?renderGroups(wire):k==="weekly"?renderGroups(weekly):k==="analytical"?renderAnalytical():renderOpinion()}
