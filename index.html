<!DOCTYPE html><html lang=en><head><meta charset=utf-8><meta name=viewport content=width=device-width,initial-scale=1><title>Dig | June 28, 2026</title><style>:root{--bg:#f8f4ed;--paper:#fffdf7;--rail:#eee6da;--ink:#6b5a4a;--title:#5d4b3d;--muted:#655f56;--faint:#91887d;--rule:#ddd3c6;--accent:#7b5843;--surface:#f6f0e8;--link:#7b5843;--a:#617b8a;--b:#9a6764;--c:#728063}[data-theme=dark]{--bg:#151412;--paper:#1d1c19;--rail:#201f1c;--ink:#f3eee7;--title:#f3eee7;--muted:#d2c7b8;--faint:#a99b8b;--rule:#39342e;--accent:#caa77d;--surface:#191815;--link:#caa77d;--a:#8eaeba;--b:#c58d88;--c:#9fad86}*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 Inter,system-ui,Segoe UI,Arial,sans-serif}.app{width:100%;max-width:none;margin:0;min-height:100vh;display:grid;grid-template-columns:238px minmax(0,1fr)}.rail{position:sticky;top:0;height:100vh;background:var(--rail);border-right:1px solid var(--rule);padding:30px 22px;display:flex;flex-direction:column}.brand-word{font:normal clamp(3rem,4.2vw,3.75rem)/.9 Georgia,Charter,serif;color:var(--title)}.rail-date{margin:16px 0 30px;color:var(--muted);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase}.nav{display:grid;gap:4px}.nav button,.theme{border:0;background:transparent;color:var(--muted);text-align:left;padding:9px 10px;font:inherit;cursor:pointer;border-left:2px solid transparent}.nav button.active{color:var(--title);border-color:var(--accent);background:var(--paper)}.theme{margin-top:auto;border-top:1px solid var(--rule);padding-top:16px}.main{padding:38px 42px 70px;min-width:0}.top{max-width:1050px;border-bottom:1px solid var(--rule);padding-bottom:25px}.kicker,.label,.tag{color:var(--accent);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}h1{font:normal clamp(2.2rem,3.8vw,3rem)/1.05 Georgia,Charter,serif;color:var(--title);margin:5px 0}.desc{max-width:780px;color:var(--muted);margin:0}.compiled{color:var(--faint);font-size:.76rem;margin-top:8px}.headline{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,430px);gap:28px;align-items:center;max-width:1050px;padding:28px 0;border-bottom:1px solid var(--rule)}.headline h2{font:normal 1.85rem/1.12 Georgia,Charter,serif;color:var(--title);margin:8px 0}.headline p{color:var(--muted);margin:0}.headline-photo,.analysis-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--surface)}.credit,.wire-sources{font-size:.75rem;color:var(--faint);margin-top:7px}.credit a,.wire-sources a{color:var(--link);text-decoration:none;border-bottom:1px solid var(--link);margin-right:12px}.content{max-width:1050px;padding-top:12px}.topic,.afile{border-bottom:1px solid var(--rule)}summary{list-style:none;cursor:pointer}summary::-webkit-details-marker{display:none}.topic>summary{display:grid;grid-template-columns:1fr auto auto;gap:16px;align-items:center;padding:17px 0;color:var(--title);font-weight:650}.topic>summary:after,.afile>summary:after{content:'+';color:var(--faint);font-size:1.1rem}.topic[open]>summary:after,.afile[open]>summary:after{content:'-'}.count{color:var(--faint);font-size:.76rem;font-weight:400}.stack{max-width:800px}.wire-item{padding:22px 0;border-top:1px solid var(--rule)}.wire-headline{font:normal 1.32rem/1.22 Georgia,Charter,serif;color:var(--title);margin:0 0 9px}.wire-prose{margin:0;color:var(--ink)}.change{color:var(--title);font-weight:650}.jargon{border-bottom:1px dotted var(--faint)}.learn{margin-top:12px;background:var(--surface);border-left:2px solid var(--rule);padding:0 14px}.learn summary{padding:10px 0;color:var(--accent);font-size:.78rem;font-weight:650}.learn-body{padding:0 0 13px}.learn-body h4{margin:11px 0 3px;color:var(--title);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em}.learn-body p,.learn-body ul{margin:0}.learn-body ul{padding-left:18px}.afile>summary{display:grid;grid-template-columns:1fr auto;gap:20px;padding:22px 0}.afile h3{font:normal 1.38rem/1.2 Georgia,Charter,serif;color:var(--title);margin:5px 0}.deck{color:var(--muted);margin:0}.analysis-body{max-width:900px;padding:0 0 27px}.walk{margin:18px 0;color:var(--ink)}.stats{background:var(--surface);border-left:2px solid var(--accent);padding:15px 18px}.stats h4,.angles-title{margin:0 0 8px;color:var(--title);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em}.stats ul{margin:0;padding-left:18px}.angles{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:14px}.angle{padding:13px;border:1px solid var(--rule);background:var(--paper)}.angle.a{border-top:2px solid var(--a)}.angle.b{border-top:2px solid var(--b)}.angle.c{border-top:2px solid var(--c)}.angle strong{display:block;color:var(--title);margin-bottom:4px}.opinion-card{max-width:850px;border-bottom:1px solid var(--rule);padding:24px 0}.opinion-card h3{font:normal 1.5rem/1.2 Georgia,Charter,serif;color:var(--title);margin:5px 0}.by{color:var(--faint);font-size:.78rem}.thesis{color:var(--title);font-style:italic}.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.op-box{background:var(--surface);padding:12px;border-top:2px solid var(--rule)}.op-box strong{display:block;color:var(--title);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.footer{max-width:1050px;margin-top:34px;padding-top:16px;border-top:1px solid var(--rule);color:var(--faint);font-size:.74rem}@media(max-width:760px){.app{display:block}.rail{position:relative;width:100%;height:auto;padding:22px}.nav{grid-template-columns:repeat(2,1fr)}.theme{margin-top:15px}.main{padding:27px 21px}.headline{grid-template-columns:1fr}.angles,.op-grid{grid-template-columns:1fr}}</style></head><body><div class=app><aside class=rail><div class=brand-word>Dig</div><div class=rail-date>Sunday, June 28, 2026</div><nav class=nav id=nav></nav><button class=theme id=theme>Theme: Light</button></aside><main class=main><header class=top><div class=kicker>Morning Briefing</div><h1 id=edition></h1><p class=desc id=description></p><div class=compiled>Compiled June 28, 2026 - 8:30 a.m. ET - America/New_York</div></header><section class=headline id=headline></section><section class=content id=content></section><footer class=footer>Dig - Compiled June 28, 2026 - America/New_York</footer></main></div><script>const S=(n,u)=>({n,u}),L=(context,angles,watch)=>({context,angles,watch}),W=(h,proseHTML,sources,learn)=>({h,proseHTML,sources,learn});const img={hormuz:`https://commons.wikimedia.org/wiki/Special:Redirect/file/Strait_of_Hormuz.jpg`,venezuela:`https://commons.wikimedia.org/wiki/Special:Redirect/file/La_Guaira,_Venezuela.jpg`,heat:`https://commons.wikimedia.org/wiki/Special:Redirect/file/Heat_wave_in_Europe.jpg`,ebola:`https://collection.nam.ac.uk/images/960/228000-228999/228459.jpg`,taiwan:`https://commons.wikimedia.org/wiki/Special:Redirect/file/South_China_Sea_claims_map.jpg`,servers:`https://commons.wikimedia.org/wiki/Special:Redirect/file/Wikimedia_Servers-0051_17.jpg`,ukraine:`https://commons.wikimedia.org/wiki/Special:Redirect/file/Flag_of_Ukraine.svg`};const headline={topic:`Middle East`,h:`US-Iran strikes put the Hormuz peace framework at risk`,deck:`Fresh attacks around Gulf bases and shipping routes are turning a vague ceasefire memorandum into a test of energy security, diplomacy and escalation control.`,image:img.hormuz,imageAlt:`Map or view of the Strait of Hormuz`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/File:Strait_of_Hormuz.jpg`};const wire={'US Economy':[W(`Markets refocus on jobs data after oil swings`,`Energy prices had briefly eased as traders bet that Gulf shipping would normalize, but the renewed U.S.-Iran exchange keeps the <span class=jargon>Strait of Hormuz (the narrow Gulf waterway that carries a large share of seaborne oil and liquefied natural gas)</span> at the center of inflation risk. <span class=change>Investors now enter the week balancing lower recent crude prices against a jobs report that could reset expectations for the Federal Reserve.</span> The distinction matters because the <span class=jargon>Federal Reserve (the U.S. central bank that sets short-term interest rates)</span> can look through one energy shock, but it is less likely to cut rates if payrolls and wages keep service prices firm. The concrete thing to watch is whether energy volatility reaches gasoline, freight and inflation expectations before Friday labor data arrives.`,[S(`Guardian Gulf analysis`,`https://www.theguardian.com/world/2026/jun/28/escalating-us-iran-strikes-threaten-interim-peace-agreement`),S(`Wall Street outlook`,`https://timesofindia.indiatimes.com/business/international-business/wall-street-outlook-jobs-data-fed-rate-bets-to-test-us-stock-rally-after-strong-first-half/articleshow/132053134.cms`)],L(`The economic channel is not just the oil price; it is insurance, freight, consumer expectations and central-bank confidence.`,[`Soft landing: a calm jobs report lets markets keep expecting gradual rate relief.`,`Inflation scare: a Hormuz incident can push energy and shipping costs higher before data improves.`,`Political economy: Gulf escalation gives both parties a new argument over inflation management.`],`Watch payrolls, wage growth, Brent crude, tanker traffic and Fed speakers.`))],'US Politics':[W(`Supreme Court final week becomes a presidential-power test`,`The Supreme Court is ending its term with several cases tied directly to executive authority after already allowing the administration to move forward on parts of its immigration agenda. <span class=change>Axios reported that three of the eight remaining cases test President Trump’s power, including birthright citizenship, removal of federal officials and election-law disputes.</span> The cases matter because they could change how quickly a president can reshape immigration rules, independent agencies and voting rules before lower courts finish ordinary review. The next signal is whether the Court writes narrow case-specific opinions or broad language that lets future administrations move faster.`,[S(`Axios Supreme Court preview`,`https://www.axios.com/2026/06/28/supreme-court-trump-birthright-citizenship`),S(`AP court term friction`,`https://apnews.com/article/e956f6a00f05f1d5f21cf824909a6bf7`)],L(`<span class=jargon>Birthright citizenship (citizenship for nearly everyone born on U.S. soil under the 14th Amendment)</span> is both a constitutional doctrine and an immigration-policy flashpoint.`,[`Executive case: presidents need room to implement national mandates quickly.`,`Constraint case: courts and agencies exist to prevent unilateral rewriting of law.`,`Campaign case: every ruling will be translated into immigration and democracy messaging.`],`Watch the wording of concurrences, class-action remedies and agency-removal rules.`))],Healthcare:[W(`Congo Ebola response is losing track of confirmed patients`,`Congo has handled Ebola before, but Ituri’s conflict, displacement camps and weak access make the current outbreak harder than a normal medical response. <span class=change>Africa CDC says nearly 300 people who tested positive are unaccounted for, with 1,118 confirmed DRC cases and 291 deaths reported as of Friday.</span> That matters because this is the <span class=jargon>Bundibugyo strain (an Ebola virus species without an approved vaccine or specific licensed treatment)</span>, so tracing and isolation are the main tools until trials begin. The humanitarian risk is that inaccessible camps become invisible transmission zones before treatment centers can expand beyond 95% occupancy.`,[S(`Guardian DRC Ebola`,`https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc`),S(`WHO Ebola overview`,`https://www.who.int/health-topics/ebola`)],L(`<span class=jargon>Contact tracing (finding and monitoring people exposed to an infected patient)</span> fails when confirmed cases cannot be located.`,[`Containment: local health-worker recruitment can rebuild trust and map cases.`,`Failure: missing positives make infection chains mathematically harder to break.`,`Regional: Uganda and South Sudan face the clearest spillover risk.`],`Watch donor delivery, treatment-center beds, drug trials and South Sudan border surveillance.`)),W(`French Ebola case highlights health-worker exposure`,`Imported Ebola cases usually pose low public risk when isolation is fast, but they reveal how field outbreaks reach European systems. <span class=change>French authorities confirmed that a doctor who had worked in Congo tested positive after returning, triggering isolation and contact monitoring.</span> The case matters because humanitarian missions depend on health workers accepting field risk, and each exported case can tighten travel monitoring around already difficult response zones. The next operational question is whether monitoring rules protect communities without slowing the aid rotations Congo needs.`,[S(`AP France Ebola case`,`https://apnews.com/article/b6a854bf4ee2a0137c4fbd052f335bf9`),S(`Le Monde Ebola monitoring`,`https://www.lemonde.fr/en/le-monde-africa/article/2026/06/26/monitoring-increases-after-france-reports-first-diagnosed-ebola-case_6754909_124.html`)],L(`<span class=jargon>Incubation period (the time between infection and symptoms)</span> explains why Ebola monitoring usually lasts 21 days.`,[`Preparedness: isolation hospitals can stop secondary transmission.`,`Aid-risk: fear and quarantine burdens can reduce field staffing.`,`Messaging: clear explanation prevents stigma against responders.`],`Watch French contact checks and DRC outbound travel rules.`))],Climate:[W(`Europe heatwave moves east after record deaths and records`,`European heat policy used to treat 2003-style summers as reference disasters, but the baseline is shifting toward recurring emergencies. <span class=change>The Guardian reported Poland, Czechia and Slovakia bracing for 40C-plus conditions after western Europe set records; AP reported roughly 1,000 additional deaths in France and more than 1,300 heat-related deaths across Europe since June 21.</span> The story matters because heat is now stressing hospitals, rail, nuclear cooling, schools and outdoor work at the same time. The next concrete test is whether governments convert emergency cooling into permanent building, labor and grid rules.`,[S(`Guardian heat moves east`,`https://www.theguardian.com/environment/2026/jun/28/temperature-records-tumble-across-europe-as-heatwave-moves-east`),S(`AP France heat deaths`,`https://apnews.com/article/61f444317600cf1bd9af5af84cb582bd`)],L(`<span class=jargon>Heat stress (the combined effect of heat, humidity, sunlight and wind on the body)</span> can be deadlier than temperature alone.`,[`Adaptation: cooling centers and heat rules can cut deaths quickly.`,`Mitigation: attribution strengthens the case that fossil-fuel warming is a health threat.`,`Equity: renters, elderly people and outdoor workers face the highest risk.`],`Watch death estimates, hospital demand, rail disruptions and workplace-temperature rules.`))],'Tech / AI':[W(`Shenzhen robotaxi law turns AI labor displacement concrete`,`AI labor debates often focus on office work, but China is moving quickly in physical automation. <span class=change>FT reported Shenzhen will legalize robotaxis from July 1, alarming nearly 400,000 taxi and ride-hailing drivers in a city already testing Baidu and Pony.ai services.</span> The policy matters because it shows how <span class=jargon>embodied AI (AI systems installed in machines that act in the physical world)</span> can collide with low-margin gig work before white-collar automation dominates headlines. The next issue is whether city rules make robotaxis complementary capacity or direct wage-cutting competition.`,[S(`FT Shenzhen robotaxis`,`https://www.ft.com/content/b1445598-e5e3-4530-9e82-e0155c44106b`),S(`FT robots argument`,`https://www.ft.com/content/794aa75d-5188-4036-91ca-7fc70b61faf8`)],L(`Robotaxis are an AI-governance test because the harms are not abstract: they touch fares, insurance, congestion, safety and driver income.`,[`Productivity: automation can lower transport costs and fill labor shortages.`,`Worker risk: saturated gig markets can absorb the shock through lower earnings.`,`Urban policy: permits, data reporting and safety liability become the real governance tools.`],`Watch July 1 implementation, driver protests and accident reporting.`)),W(`Anthropic-Alibaba dispute pushes model access into security policy`,`The frontier AI race increasingly depends on access to high-quality model outputs, not only chips and data centers. <span class=change>Anthropic accused Alibaba-linked users of creating 25,000 fake accounts and generating 28.8 million Claude exchanges to distill capabilities between April and June.</span> <span class=jargon>Model distillation (training or tuning one model using outputs from another model)</span> can be legitimate inside a company, but unauthorized distillation turns API abuse into a strategic-technology issue. Congress now has a concrete example for arguments over identity checks, export controls and whether model outputs should be treated like controlled capability.`,[S(`Tom's Hardware Anthropic report`,`https://www.tomshardware.com/tech-industry/artificial-intelligence/anthropic-claims-that-chinas-alibaba-illicitly-distilled-its-models-from-april-to-june-2026-says-effort-involved-25-000-fake-accounts-and-28-8-million-exchanges-on-claude`),S(`FT Anthropic Alibaba`,`https://www.ft.com/content/8496c940-fdc7-4554-bc8d-7bcc93e7d75c`)],L(`Distillation lowers the cost of catching up because the second model learns from the first model's answers rather than raw data alone.`,[`Security: labs will argue account screening must match chip controls.`,`Competition: incumbents can overuse security claims to protect market share.`,`Governance: API logs and payment identities become AI policy infrastructure.`],`Watch Senate AI hearings, Alibaba's response and tighter access controls.`))],'Latin America':[W(`Venezuela quake toll makes disaster response a diplomacy test`,`Venezuela’s northern coast entered the earthquakes with vulnerable buildings, uneven state capacity and a newly U.S.-aligned interim government. <span class=change>AP and Guardian updates put the death toll at at least 1,430 after magnitude 7.2 and 7.5 quakes, with thousands injured and tens of thousands still unaccounted for.</span> The disaster matters beyond rescue because the U.S. has pledged a rapid State Department-led response after shrinking <span class=jargon>USAID (the former U.S. foreign-aid agency infrastructure)</span>, making Venezuela a test of whether Washington can still deliver humanitarian capacity. The next 48 hours are decisive for survivors trapped in rubble and for the politics of who controls aid and rebuilding.`,[S(`AP Venezuela rescues`,`https://apnews.com/article/61a42ee8bd25b533ecfa323665a3483d`),S(`Guardian quake toll`,`https://www.theguardian.com/world/2026/jun/27/venezuela-earthquakes-death-toll-rises-jorge-rodriguez`),S(`Guardian US aid policy`,`https://www.theguardian.com/us-news/2026/jun/28/venezuelan-earthquakes-test-trumps-new-western-hemisphere-policy-after-gutting-of-usaid`)],L(`Disasters become geopolitical when foreign rescue teams, airfields, ports and aid money all move through political authorities.`,[`Humanitarian: fast search teams save lives before the survival window closes.`,`Diplomatic: U.S. aid can rebuild influence in a newly friendly Venezuela.`,`Governance: restricted access or politicized aid can damage legitimacy.`],`Watch missing-person totals, airport repair, U.S. DART deployment and UN damage estimates.`)),W(`Mexico World Cup celebrations reveal persistent cartel insecurity`,`Mexico is hosting a global sports event while large parts of the country still organize public life around cartel risk. <span class=change>AP reported that World Cup joy is muted in violent regions such as Michoacan, Sinaloa, Tamaulipas and Veracruz, where many residents are avoiding public gatherings despite national celebrations.</span> The story matters because security performance during the tournament is also a test of President Claudia Sheinbaum’s claim that violence is improving after the killing of CJNG leader El Mencho earlier this year. The next signal is whether tourist zones stay calm while smaller cities continue absorbing kidnappings, extortion and fear.`,[S(`AP Mexico World Cup security`,`https://apnews.com/article/a57e6d07b88ec4f24bd1988eb9e71a26`),S(`CJNG background`,`https://www.reuters.com/world/americas/`) ],L(`<span class=jargon>CJNG (Jalisco New Generation Cartel, one of Mexico's most powerful criminal organizations)</span> remains a security threat despite leadership losses.`,[`State-capacity: high-profile events can concentrate police where cameras are.`,`Local reality: businesses outside host cities may still lose revenue to fear.`,`Politics: tournament security gives Sheinbaum a visible test.`],`Watch violence around fan zones, cartel succession signs and local business reports.`))],'Africa / Middle East':[W(`Iran and U.S. strikes threaten the interim peace memorandum`,`The U.S.-Iran ceasefire framework was already fragile because it tried to cover Hormuz shipping, sanctions, nuclear oversight and Lebanon in language both sides could interpret differently. <span class=change>Iran launched missile and drone attacks toward U.S. sites in Bahrain and Kuwait after new U.S. strikes on Iranian military systems, and both sides accused the other of endangering the deal.</span> The immediate stakes are military and economic: Gulf bases, oil flows and regional mediators are all exposed if the memorandum collapses. The next concrete watch point is whether Qatar and Pakistan can restart talks before another maritime incident creates pressure for wider strikes.`,[S(`Guardian escalation`,`https://www.theguardian.com/world/2026/jun/28/escalating-us-iran-strikes-threaten-interim-peace-agreement`),S(`Guardian Gulf hostilities`,`https://www.theguardian.com/world/2026/jun/28/fresh-hostilities-gulf-us-iran-memorandum-interpretations-lebanon-ceasefire-strait-of-hormuz`)],L(`<span class=jargon>Memorandum of understanding (a diplomatic text that records commitments but may be less detailed than a treaty)</span> can fail when core terms remain undefined.`,[`Diplomacy: vague text can create room for compromise.`,`Escalation: vague text can also let each side claim the other violated first.`,`Energy: shipping insurers may react before diplomats resolve wording.`],`Watch mediator statements, IRGC activity, Bahrain/Kuwait base alerts and tanker movements.`)),W(`Nigeria farming-community attack shows insecurity beyond the northeast`,`Nigeria’s security crisis is often associated with Boko Haram and ISWAP in the northeast, but armed gangs and local militias also threaten farming belts farther west. <span class=change>AP reported at least 15 people killed in Talata Mafara, Zamfara state, after gunmen attacked a farming community on Friday.</span> The attack follows other June killings in Zamfara and Plateau, showing that rural insecurity is a national food, displacement and governance problem rather than a single insurgency. The next test is whether Abuja can protect farming communities before ransom, illegal mining and forced taxation deepen local state collapse.`,[S(`AP Zamfara attack`,`https://apnews.com/article/42ebca34cbda130591a0ad176de4ae68`),S(`AP Plateau attack`,`https://apnews.com/article/e86ed867efc97cc5952685d44ca9acbd`)],L(`<span class=jargon>Banditry (organized armed violence often involving kidnapping, extortion and village raids)</span> overlaps with insurgency but is not identical to it.`,[`Security: military deployments can suppress attacks if intelligence improves.`,`Food: farmers who cannot safely plant or harvest create price and hunger pressure.`,`Governance: repeated attacks erode trust in local and federal authorities.`],`Watch arrests, displacement figures and food-price effects in northern states.`))],'Europe / EU':[W(`Serbia president says he will resign as protests force election gamble`,`Serbia’s government has faced more than a year of student-led protests over corruption, media pressure and democratic backsliding after the Novi Sad train-station disaster. <span class=change>AP reported that President Aleksandar Vucic says he will resign within weeks, potentially triggering early presidential and parliamentary elections while leaving open a move to prime minister.</span> The announcement matters because Serbia is an EU candidate that still resists full alignment with sanctions on Russia, so a domestic legitimacy crisis becomes a European foreign-policy issue. The next question is whether the opposition can organize fast enough to turn protest energy into an electoral vehicle.`,[S(`AP Serbia Vucic`,`https://apnews.com/article/af12b9ce0a06568444ad41d388e6e232`),S(`Guardian Ukraine briefing with Serbia note`,`https://www.theguardian.com/world/2026/jun/28/ukraine-war-briefing-ballistic-missile-attack-in-kyiv-forces-residents-into-shelters`)],L(`<span class=jargon>EU candidate country (a state formally recognized as seeking European Union membership)</span> must meet rule-of-law and democratic standards before accession.`,[`Democratic opening: elections could channel protests into representation.`,`Tactical reset: Vucic may resign to return with a stronger parliamentary role.`,`Geopolitics: Brussels and Moscow will both read the result as a regional signal.`],`Watch election timing, opposition lists and EU statements on media freedom.`))],China:[W(`China coast guard pressure near Taiwan raises quarantine fears`,`Taiwan conflict planning often focuses on invasion, but coercion can begin with commercial shipping rules and coast guard claims. <span class=change>WSJ reported that China’s coast guard asserted authority over foreign ships east of Taiwan during a five-day operation, drawing rebukes from the U.S. and European governments.</span> The move matters because a slow maritime quarantine could force shippers and insurers to decide whether Taiwan is accessible before governments define a blockade. The next thing to watch is whether China repeats the operation, boards vessels or pairs it with carrier transits.`,[S(`WSJ Taiwan coast guard`,`https://www.wsj.com/world/asia/chinas-assertions-of-authority-over-foreign-ships-near-taiwan-draw-u-s-rebuke-d0546eb0`),S(`AP Fujian transit`,`https://apnews.com/article/1967779925e8f5192f42498d4379438e`)],L(`<span class=jargon>Gray-zone tactic (coercion below the threshold of open war)</span> can change behavior without triggering an immediate military response.`,[`Deterrence: allied tracking and public rebukes can prevent normalization.`,`Coercion: China can make shipping riskier without firing first.`,`Market: semiconductor supply chains may react to insurance risk before navies move.`],`Watch commercial routing, coast guard notices and Taiwanese military exercises.`))],'War / Active Conflicts':[W(`Ukraine expands refinery campaign as Russia hits Kyiv`,`Ukraine has spent the week widening a long-range strike campaign aimed at Russian fuel and logistics, while Moscow continues missile and drone attacks on Ukrainian cities. <span class=change>AP reported Ukrainian drones ignited a major refinery in Slavyansk-na-Kubani, while the Guardian said Russian ballistic missiles hit Kyiv early Sunday and killed civilians in other regions.</span> The war is shifting toward infrastructure pressure: refineries, rail, power and air defenses now shape bargaining leverage as much as front-line villages. The next measure is whether refinery damage creates fuel shortages that Russia cannot offset without weakening military supply.`,[S(`AP refinery strike`,`https://apnews.com/article/88370faa1a49504438388f2854d7afd3`),S(`Guardian Ukraine briefing`,`https://www.theguardian.com/world/2026/jun/28/ukraine-war-briefing-ballistic-missile-attack-in-kyiv-forces-residents-into-shelters`)],L(`<span class=jargon>Long-range strike campaign (attacks beyond the front line against logistics, energy or command targets)</span> tries to change an opponent's capacity over time.`,[`Ukraine case: hitting refineries taxes Kremlin revenue and fuel supply.`,`Russia case: urban missile strikes pressure civilians and air defense stocks.`,`Ethics case: infrastructure attacks raise civilian-risk questions when debris and outages spread.`],`Watch Russian fuel rationing, Ukrainian drone production and air-defense intercept rates.`))],Flex:[W(`South China Sea pressure grows around Scarborough Shoal`,`The South China Sea dispute often moves through small, repeated facts on the water rather than dramatic declarations. <span class=change>Recent FT and AP-linked reporting describes China tightening control around Scarborough Shoal, including barriers and larger coast guard presence near a feature claimed by the Philippines.</span> The issue matters because Scarborough sits near Luzon and affects Philippine fishing, U.S. alliance credibility and China’s effort to normalize administrative control of disputed waters. The next concrete signal is whether Manila receives sustained allied patrol support or is left to absorb coast-guard pressure alone.`,[S(`FT Scarborough analysis`,`https://www.ft.com/content/d5191b00-dccb-465e-8afb-e61cc8260f93`),S(`AP background on China reserve`,`https://apnews.com/article/china-philippines-scarborough-shoal-nature-reserve`) ],L(`<span class=jargon>Scarborough Shoal (a disputed reef and lagoon west of Luzon also known as Panatag Shoal or Huangyan Dao)</span> is strategically important because it sits inside the Philippines' claimed exclusive economic zone.`,[`Alliance: U.S.-Philippine patrols can raise costs for Beijing.`,`Gray-zone: barriers and coast guard vessels alter control without formal annexation.`,`Livelihood: fishing access makes sovereignty disputes immediately local.`],`Watch Philippine resupply efforts, U.S. patrols and Chinese environmental-rule enforcement.`))]};const weekly={'US Economy':[W(`Fed path stayed tied to jobs and oil risk all week`,`This week kept the U.S. macro story in a narrow channel: investors wanted softer inflation evidence while Gulf risk threatened to reprice energy. <span class=change>Markets finished the week looking toward payrolls and Fed signaling after oil swung on Hormuz news and AI-linked equities drove much of the stock rally.</span> That matters because a strong jobs report would make rate cuts harder to justify even if energy prices calm. The next weekly anchor is whether inflation expectations stay contained while the Gulf ceasefire frays.`,[S(`Wall Street outlook`,`https://timesofindia.indiatimes.com/business/international-business/wall-street-outlook-jobs-data-fed-rate-bets-to-test-us-stock-rally-after-strong-first-half/articleshow/132053134.cms`),S(`Guardian Gulf analysis`,`https://www.theguardian.com/world/2026/jun/28/escalating-us-iran-strikes-threaten-interim-peace-agreement`)],L(`The week’s economic theme was uncertainty layering: geopolitics, jobs data and AI valuations all pointed in different directions.`,[`Optimist: lower oil and stable hiring can preserve the rally.`,`Skeptic: one Hormuz shock can quickly revive inflation anxiety.`,`Fed angle: service inflation and wages still matter more than one commodity move.`],`Watch payrolls, Brent crude and Fed communication.`)),W(`AI and chips kept market concentration in focus`,`The market week again showed how much investor confidence depends on a narrow set of AI, semiconductor and cloud names. <span class=change>Reports on Anthropic-Alibaba distillation, Chinese supercomputing advances and Apple’s interest in Chinese memory underscored that AI growth is tied to geopolitics and supply chains.</span> That matters because a stock rally led by strategic technologies can be vulnerable to export-control decisions, congressional scrutiny and China-related supply shocks. The next issue is whether earnings guidance treats AI spending as durable revenue or as a costly arms race.`,[S(`Wired China supercomputer`,`https://www.wired.com/story/china-defies-us-restrictions-and-builds-worlds-fastest-supercomputer`),S(`Verge Apple memory report`,`https://www.theverge.com/tech/958707/apple-ram-buy-memory-blacklisted-china-cxmt`)],L(`AI market concentration turns policy risk into market risk.`,[`Bullish: AI infrastructure keeps capex and earnings strong.`,`Bearish: export controls and supply shocks can hit margins.`,`China angle: substitution pressure rises when controls bite.`],`Watch chip-policy waivers, earnings calls and capex revisions.`))],'US Politics':[W(`The Court’s immigration rulings set up the term-ending power fight`,`Earlier in the week, the Supreme Court let the Trump administration advance hardline immigration policies involving asylum and temporary protections. <span class=change>By Sunday, attention had shifted to a final-week docket that could determine birthright citizenship, agency removals and election-law limits.</span> The weekly importance is that courts are deciding not only policy outcomes but the speed at which presidents can change policy before full trials end. The next watch point is whether universal injunction limits make class actions the new procedural battlefield.`,[S(`AP Supreme Court divisions`,`https://apnews.com/article/e956f6a00f05f1d5f21cf824909a6bf7`),S(`Axios Supreme Court preview`,`https://www.axios.com/2026/06/28/supreme-court-trump-birthright-citizenship`)],L(`The procedural question is as consequential as the merits: who can block a national policy, and for whom?`,[`Executive: nationwide relief can overempower one district judge.`,`Rights: limited relief can leave similarly situated people exposed.`,`Institutional: the Court is rewriting how litigation constrains presidents.`],`Watch class-certification moves and emergency applications.`)),W(`Immigration remained the clearest domestic-policy conflict`,`The week showed immigration moving through courts, agencies and campaign messaging at once. <span class=change>Supreme Court decisions on temporary protections and asylum gave the administration more operating room while birthright citizenship remained pending.</span> That matters because immigration policy affects courts, state budgets, labor markets and foreign relations simultaneously. The next concrete signal is whether DHS implementation changes outpace lower-court challenges.`,[S(`AP asylum ruling`,`https://apnews.com/article/d36d0092617c7115780c06de38e2000f`),S(`Le Monde immigration rulings`,`https://www.lemonde.fr/en/international/article/2026/06/26/us-supreme-court-clears-way-for-trump-administration-s-anti-immigration-policies_6754895_4.html`)],L(`<span class=jargon>DHS (Department of Homeland Security, the U.S. department that oversees immigration enforcement and border agencies)</span> will turn court permission into operational rules.`,[`Security: faster border control may reduce administrative backlogs.`,`Humanitarian: fewer hearings can increase removal risk for vulnerable people.`,`Federalism: states will keep suing over fiscal and rights impacts.`],`Watch DHS notices and state attorney-general lawsuits.`))],Healthcare:[W(`Ebola became the week’s clearest global-health alarm`,`The largest health story of the week was not a new pathogen but a control failure in a known disease. <span class=change>Nearly 300 confirmed Ebola-positive people were unaccounted for in DRC, while France confirmed an imported health-worker case and WHO-linked projections warned of major spread if access fails.</span> This matters because the Bundibugyo strain lacks the vaccine cushion available in some prior outbreaks. The next weekly milestone is whether local recruitment, donor money and treatment trials arrive before transmission accelerates in displacement camps.`,[S(`Guardian DRC Ebola`,`https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc`),S(`AP France Ebola case`,`https://apnews.com/article/b6a854bf4ee2a0137c4fbd052f335bf9`)],L(`Public health is inseparable from security when health workers cannot reach displaced people.`,[`Containment: local workers may reach contacts outsiders cannot.`,`Spillover: Uganda and South Sudan face higher risk if tracing fails.`,`Funding: pledged money that is not delivered is not capacity.`],`Watch donor disbursement and trial starts.`)),W(`Heat deaths made public health and climate overlap`,`Europe’s heatwave turned climate exposure into an immediate health-system burden. <span class=change>AP reported around 1,000 additional deaths in France and more than 1,300 across Europe since June 21, while emergency systems faced record strain.</span> The weekly importance is that health planning, housing, labor rules and energy planning are now part of heat policy. The next thing to watch is whether countries report deaths quickly enough to guide targeted protections for elderly and isolated people.`,[S(`AP France heat deaths`,`https://apnews.com/article/61f444317600cf1bd9af5af84cb582bd`),S(`Guardian heat east`,`https://www.theguardian.com/environment/2026/jun/28/temperature-records-tumble-across-europe-as-heatwave-moves-east`)],L(`Heat mortality often appears after the peak, so public-health surveillance is itself a preparedness tool.`,[`Health: early warnings can direct home checks and cooling.`,`Equity: isolated elderly residents bear disproportionate risk.`,`Infrastructure: hospitals fail if transport, power and staffing fail together.`],`Watch national mortality bulletins and hospital occupancy.`))],Climate:[W(`Europe’s heatwave became an attribution-policy moment`,`The week’s climate story was unusually direct: extreme heat records, excess deaths and attribution science arrived together. <span class=change>World Weather Attribution scientists said the western Europe heatwave would have been nearly impossible without fossil-fuel-driven warming, and the heat then moved east toward 40C-plus records.</span> The weekly significance is that climate policy is no longer only about future emissions; it is now about near-term building codes, labor safety and urban cooling. The next policy fight is whether governments fund adaptation at the same scale as emergency response.`,[S(`Guardian attribution`,`https://www.theguardian.com/environment/2026/jun/26/europe-heatwave-impossible-without-climate-crisis-scientists`),S(`Guardian heat east`,`https://www.theguardian.com/environment/2026/jun/28/temperature-records-tumble-across-europe-as-heatwave-moves-east`)],L(`<span class=jargon>Attribution science (methods that estimate how climate change changed the odds or severity of an event)</span> gives policymakers causal evidence.`,[`Adaptation: heat plans can save lives now.`,`Mitigation: attribution strengthens emissions-cut arguments.`,`Labor: maximum-temperature standards may become mainstream.`],`Watch workplace rules and emergency mortality reviews.`)),W(`Heat started to look like an energy-security issue`,`High temperatures strain power grids, cooling demand and thermal power plants that need cool water for operation. <span class=change>European reports this week linked heat to rail disruption, nuclear cooling stress, wildfire risk and emergency-service overload.</span> That matters because climate stress can reduce energy supply just as demand for cooling spikes. The next thing to watch is whether grid operators impose conservation requests or power curbs as heat moves east.`,[S(`AP heat infrastructure`,`https://apnews.com/article/61f444317600cf1bd9af5af84cb582bd`),S(`Guardian productivity heat`,`https://www.theguardian.com/business/2026/jun/26/extreme-heat-europe-productivity-economic-growth`)],L(`The energy lesson is that climate adaptation must cover both demand and supply.`,[`Grid: cooling demand stresses peak load.`,`Nuclear: river temperatures can limit reactor output.`,`Transport: rails and roads built for cooler climates deform or shut down.`],`Watch power warnings and reactor curtailments.`))],'Tech / AI':[W(`AI’s physical turn became visible in China`,`This week’s AI coverage moved beyond chatbots to machines acting in streets and factories. <span class=change>Shenzhen prepared to legalize robotaxis from July 1, while FT analysis argued that robots, not chatbots, may deliver AI’s largest productivity gains.</span> The weekly significance is that automation will be judged through safety, insurance, labor displacement and city rules, not only model benchmarks. The next concrete test is whether China’s robotaxi rollout triggers driver protests or rapid consumer adoption.`,[S(`FT Shenzhen robotaxis`,`https://www.ft.com/content/b1445598-e5e3-4530-9e82-e0155c44106b`),S(`FT robots essay`,`https://www.ft.com/content/794aa75d-5188-4036-91ca-7fc70b61faf8`)],L(`Physical AI makes governance local: permits, accident reports, streets and workers.`,[`Productivity: controlled environments make robotics commercially attractive.`,`Labor: drivers and logistics workers feel direct competition.`,`Policy: cities become the first regulators.`],`Watch Shenzhen rules and deployment scale.`)),W(`The U.S.-China AI race widened beyond chips`,`The week produced three linked signals: alleged model distillation, Chinese supercomputing gains and supply-chain waiver debates. <span class=change>Anthropic accused Alibaba of industrial-scale Claude extraction, Wired reported China’s new LineShine supercomputer leading benchmarks, and Apple reportedly sought permission to use blacklisted Chinese memory.</span> That matters because export controls are no longer only about GPUs; they include outputs, memory, supercomputers, cloud access and domestic substitution. The next policy question is whether Washington tightens controls or creates waivers for consumer supply chains.`,[S(`Tom's Hardware Anthropic`,`https://www.tomshardware.com/tech-industry/artificial-intelligence/anthropic-claims-that-chinas-alibaba-illicitly-distilled-its-models-from-april-to-june-2026-says-effort-involved-25-000-fake-accounts-and-28-8-million-exchanges-on-claude`),S(`Wired supercomputer`,`https://www.wired.com/story/china-defies-us-restrictions-and-builds-worlds-fastest-supercomputer`),S(`Verge Apple memory`,`https://www.theverge.com/tech/958707/apple-ram-buy-memory-blacklisted-china-cxmt`)],L(`Tech rivalry is now a stack: chips, memory, models, data centers, accounts and legal permissions.`,[`Control: more chokepoints give Washington leverage.`,`Backfire: controls can accelerate Chinese self-reliance.`,`Business: U.S. firms still want access to Chinese components.`],`Watch Commerce rulings and Senate hearings.`))],'Latin America':[W(`Venezuela’s earthquake dominated the hemisphere`,`The week’s Latin America story is now a humanitarian disaster and a U.S. policy test. <span class=change>The death toll rose above 1,400 after twin quakes struck northern Venezuela, while Washington pledged rescue teams, a Navy presence and $150 million in aid under a State Department-led model.</span> The weekly significance is that disaster response will shape Venezuela’s domestic legitimacy and U.S. influence after January’s political transition. The next watch point is whether aid distribution looks coordinated or politicized.`,[S(`Guardian toll`,`https://www.theguardian.com/world/2026/jun/27/venezuela-earthquakes-death-toll-rises-jorge-rodriguez`),S(`Guardian U.S. policy test`,`https://www.theguardian.com/us-news/2026/jun/28/venezuelan-earthquakes-test-trumps-new-western-hemisphere-policy-after-gutting-of-usaid`)],L(`The earthquake turns governance capacity into daily evidence citizens can see.`,[`Humanitarian: rescue speed is the first legitimacy test.`,`Geopolitical: U.S. aid can rebuild regional influence.`,`Economic: UN damage estimates near 6% of GDP imply years of reconstruction.`],`Watch survivor rescues, damage assessments and aid access.`)),W(`Mexico’s tournament security stayed politically important`,`The World Cup gave Mexico a global stage, but AP reporting showed the event did not erase cartel insecurity in several regions. <span class=change>Residents in violent states were avoiding public celebrations even as host cities projected national confidence.</span> The weekly significance is that security success cannot be measured only by calm around stadiums; it must include daily fear, extortion and local commerce. The next thing to watch is whether tournament policing draws resources away from non-host regions.`,[S(`AP Mexico World Cup`,`https://apnews.com/article/a57e6d07b88ec4f24bd1988eb9e71a26`)],L(`Mega-events often reveal uneven state capacity: safe showcases can coexist with unsafe peripheries.`,[`Government: visible calm supports claims of progress.`,`Critique: residents outside host cities still organize life around violence.`,`Economy: fear limits match-day business and tourism spillovers.`],`Watch regional incident reports and fan-zone security.`))],'Africa / Middle East':[W(`The Gulf ceasefire entered its most dangerous week`,`The U.S.-Iran framework was supposed to create a negotiation window, but the week ended with strikes, counterstrikes and competing interpretations of Hormuz obligations. <span class=change>Iran and the U.S. each accused the other of violating the agreement after attacks around Gulf bases and shipping.</span> The weekly significance is that a loosely worded memorandum is now being tested by the exact issues it left vague: Lebanon, sanctions, nuclear monitoring and maritime control. The next thing to watch is whether mediators can produce a clarifying text rather than another broad promise.`,[S(`Guardian escalation`,`https://www.theguardian.com/world/2026/jun/28/escalating-us-iran-strikes-threaten-interim-peace-agreement`),S(`Guardian memorandum analysis`,`https://www.theguardian.com/world/2026/jun/28/fresh-hostilities-gulf-us-iran-memorandum-interpretations-lebanon-ceasefire-strait-of-hormuz`)],L(`This is an extemp-ready case of ambiguity: useful for getting a deal, dangerous for enforcing it.`,[`Diplomacy: ambiguity can keep parties talking.`,`Security: ambiguity lets each side claim self-defense.`,`Energy: unclear transit rules create market risk.`],`Watch mediator language and Oman maritime proposals.`)),W(`Nigeria’s rural security crisis kept spreading`,`Multiple attacks this week in Zamfara and Plateau showed violence continuing across farming communities outside the better-known northeast insurgency theater. <span class=change>AP reported at least 15 killed in Zamfara on Friday after a separate Plateau attack killed at least 20 earlier in the week.</span> The weekly significance is that insecurity now threatens food production, local taxation, displacement and government credibility. The next watch point is whether arrests and protection plans follow or communities are left to self-defense.`,[S(`AP Zamfara`,`https://apnews.com/article/42ebca34cbda130591a0ad176de4ae68`),S(`AP Plateau`,`https://apnews.com/article/e86ed867efc97cc5952685d44ca9acbd`)],L(`Nigeria’s violence is not one conflict; it is overlapping insurgency, banditry, farmer-herder tension and criminal taxation.`,[`Security: intelligence-led policing is more useful than episodic deployments.`,`Food: unsafe farms reduce output and raise prices.`,`Politics: repeated funerals undermine Tinubu’s security promises.`],`Watch federal reinforcements and displacement figures.`))],'Europe / EU':[W(`Serbia’s Vucic turned protest pressure into an election gamble`,`After months of student-led protests and EU concern over rule-of-law backsliding, Serbia’s president announced he would step down within weeks. <span class=change>AP reported Vucic may be positioning for early presidential and parliamentary elections and possibly a more powerful prime-minister role.</span> The weekly significance is that Serbia’s internal politics affect EU enlargement, Russia sanctions and Balkan stability. The next concrete question is whether the opposition can turn protests into a credible electoral list before the ruling party controls the calendar.`,[S(`AP Vucic resignation`,`https://apnews.com/article/af12b9ce0a06568444ad41d388e6e232`),S(`Guardian Ukraine briefing`,`https://www.theguardian.com/world/2026/jun/28/ukraine-war-briefing-ballistic-missile-attack-in-kyiv-forces-residents-into-shelters`)],L(`Vucic’s move may be both concession and strategy.`,[`Opposition: early elections can reward protest momentum.`,`Incumbent: controlling timing can split challengers.`,`EU: rule-of-law progress remains the membership gate.`],`Watch election dates and protest coordination.`)),W(`Europe’s heatwave became a governing crisis`,`From France to Germany to central Europe, the heatwave forced governments to manage deaths, schools, trains, energy and public messaging. <span class=change>Record or near-record temperatures, excess deaths and emergency-service strain turned weather into a cross-government stress test.</span> The weekly significance is that Europe’s historically temperate infrastructure is not built for repeated 40C events. The next thing to watch is whether the EU frames heat adaptation as climate spending, health spending or industrial competitiveness.`,[S(`AP heat deaths`,`https://apnews.com/article/61f444317600cf1bd9af5af84cb582bd`),S(`Guardian heat east`,`https://www.theguardian.com/environment/2026/jun/28/temperature-records-tumble-across-europe-as-heatwave-moves-east`)],L(`The EU angle is coordination: health, energy, labor and climate policy are split across different authorities.`,[`Health: early warnings can cut deaths.`,`Energy: cooling and nuclear constraints collide.`,`Politics: heat makes climate policy less abstract.`],`Watch Commission adaptation proposals and national mortality reports.`))],China:[W(`China’s Taiwan pressure focused on shipping authority`,`The week’s Taiwan story was a coast-guard operation rather than a missile crisis, but that is why it matters. <span class=change>China asserted authority over foreign commercial vessels east of Taiwan, and Western governments publicly rebuked the move as destabilizing.</span> The weekly significance is that Beijing can test quarantine mechanics without declaring a blockade. The next thing to watch is whether insurers, shipping firms or ports change behavior before governments do.`,[S(`WSJ Taiwan coast guard`,`https://www.wsj.com/world/asia/chinas-assertions-of-authority-over-foreign-ships-near-taiwan-draw-u-s-rebuke-d0546eb0`),S(`AP Fujian transit`,`https://apnews.com/article/1967779925e8f5192f42498d4379438e`)],L(`A quarantine scenario blurs law enforcement and military coercion.`,[`Deterrence: allied statements can keep norms visible.`,`Coercion: repeated checks can normalize Chinese jurisdiction.`,`Economics: Taiwan supply-chain risk may reprice quickly.`],`Watch repeat operations and vessel insurance.`)),W(`China’s AI self-reliance story strengthened`,`China’s technology week included supercomputing claims, robotaxi policy and continued pressure around AI model access. <span class=change>Wired reported a Chinese supercomputer topping benchmark rankings despite U.S. restrictions, while Shenzhen’s robotaxi rules showed commercial deployment moving quickly.</span> The weekly importance is that China is not simply waiting for U.S. export controls to loosen; it is building domestic alternatives and fielding applications. The next question is whether domestic hardware can scale economically or only produce prestige breakthroughs.`,[S(`Wired supercomputer`,`https://www.wired.com/story/china-defies-us-restrictions-and-builds-worlds-fastest-supercomputer`),S(`FT Shenzhen robotaxis`,`https://www.ft.com/content/b1445598-e5e3-4530-9e82-e0155c44106b`)],L(`Self-reliance is strongest when hardware, software and deployment all move together.`,[`China: controls can accelerate domestic substitution.`,`U.S.: controls still limit access to top global supply chains.`,`Market: cheap deployment can matter more than benchmark leadership.`],`Watch TOP500 scrutiny, chip supply and robotaxi adoption.`))],'War / Active Conflicts':[W(`Ukraine’s long-range campaign defined the week’s war map`,`The Ukraine war week was marked by long-range strikes, not major territorial announcements. <span class=change>Ukraine hit Russian refineries and energy assets, including Slavyansk-na-Kubani, while Russia launched ballistic and drone attacks on Kyiv and other Ukrainian regions.</span> The weekly significance is that both sides are trying to make the war more expensive away from the front: fuel, air defense, rail and civilian resilience are all becoming pressure points. The next test is whether Russia can protect refineries without pulling air defenses from occupied territory.`,[S(`AP refinery strike`,`https://apnews.com/article/88370faa1a49504438388f2854d7afd3`),S(`Guardian 40-day blitz`,`https://www.theguardian.com/world/2026/jun/26/ukraine-war-briefing-zelenskyy-40-day-russia-blitz`)],L(`Long-range strike capacity has become a bargaining chip because diplomacy remains stalled.`,[`Ukraine: refinery strikes target revenue and logistics.`,`Russia: city strikes pressure morale and defenses.`,`Escalation: civilian casualties on both sides complicate moral narratives.`],`Watch fuel shortages and drone production.`)),W(`Belarus and NATO-adjacent risks stayed in the background`,`The week’s Ukraine briefings included Putin-Lukashenko talks and Ukrainian warnings about Belarusian involvement in Russian attacks. <span class=change>Although not the main front, Belarus remained a staging and signaling concern as Russia faced wider Ukrainian strikes.</span> The weekly importance is that a northern-front scare can force Ukraine to disperse defenses even without a major Belarusian offensive. The next thing to watch is equipment movement and whether Belarus keeps claiming neutrality while enabling Russian operations.`,[S(`Guardian Ukraine briefing`,`https://www.theguardian.com/world/2026/jun/28/ukraine-war-briefing-ballistic-missile-attack-in-kyiv-forces-residents-into-shelters`),S(`Guardian 40-day blitz`,`https://www.theguardian.com/world/2026/jun/26/ukraine-war-briefing-zelenskyy-40-day-russia-blitz`)],L(`Belarus matters as a pressure front even when no invasion follows.`,[`Ukraine: must defend against possibilities, not only current attacks.`,`Russia: Belarus offers geography and political theater.`,`NATO: spillover risk rises when air and drone routes approach borders.`],`Watch satellite imagery and Ukrainian evacuation alerts.`))],Flex:[W(`Scarborough Shoal remained a gray-zone test`,`The week’s South China Sea developments showed China using environmental rules, barriers and coast guard presence to shape facts around Scarborough Shoal. <span class=change>Reporting from AP, FT and regional monitors pointed to tighter Chinese control near a feature Manila also claims.</span> The weekly significance is that the dispute is a practical test of the U.S.-Philippine alliance and the meaning of international maritime law. The next thing to watch is whether allied patrols stay consistent after the news cycle moves on.`,[S(`FT Scarborough`,`https://www.ft.com/content/d5191b00-dccb-465e-8afb-e61cc8260f93`),S(`AP China reserve background`,`https://apnews.com/article/china-philippines-scarborough-shoal-nature-reserve`)],L(`Gray-zone maritime disputes are built from repetition.`,[`China: administrative control can be normalized.`,`Philippines: fishing access makes sovereignty concrete.`,`Alliance: credibility depends on persistent presence.`],`Watch patrol tempo and barrier reports.`))]};const analytical=[{tag:`Middle East security`,headline:`The U.S.-Iran memorandum is failing at its undefined edges`,deck:`The problem is not only new strikes; it is that Hormuz, Lebanon and inspections were never made enforceable enough.`,image:img.hormuz,imageAlt:`Strait of Hormuz`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/File:Strait_of_Hormuz.jpg`,skeletonHTML:`<b>Baseline:</b> the April ceasefire and later memorandum tried to pause a costly U.S.-Iran conflict while negotiators handled Hormuz access, sanctions relief, nuclear oversight and Lebanon. <b>Change:</b> new U.S. strikes on Iranian military sites and Iranian missile/drone attacks toward Bahrain and Kuwait exposed that each side defines violation differently. <b>Mechanism:</b> the memo used broad language on safe passage and regional de-escalation, so Iran can claim maritime control while the U.S. claims freedom of navigation; Lebanon adds a second ambiguity because Israeli and Hezbollah ceasefire texts do not fully overlap with Tehran's claims. <b>Stakes:</b> a collapsed framework would raise energy risk, expose Gulf states, strengthen hardliners in Tehran and Washington, and make mediator states look unable to enforce their own text.`,stats:[`Guardian reporting says the latest strikes came only about 10 days after a U.S.-Iran memorandum meant to stabilize the conflict.`,`The Strait of Hormuz remains central because a major share of seaborne oil and liquefied natural gas moves through or around that choke point.`,`Iran's latest response targeted U.S. positions in Bahrain and Kuwait but caused no confirmed casualties in the Guardian account.`],sideA:[`Ambiguity buys time`,`A broad memorandum can keep adversaries talking when a detailed treaty would fail immediately.`],sideB:[`Ambiguity invites violations`,`If Hormuz and Lebanon are undefined, each side can escalate while claiming compliance.`],sideC:[`Markets judge first`,`Insurers and shippers may impose costs before diplomats formally declare the deal dead.`],sources:[S(`Guardian escalation`,`https://www.theguardian.com/world/2026/jun/28/escalating-us-iran-strikes-threaten-interim-peace-agreement`),S(`Guardian memorandum analysis`,`https://www.theguardian.com/world/2026/jun/28/fresh-hostilities-gulf-us-iran-memorandum-interpretations-lebanon-ceasefire-strait-of-hormuz`)]},{tag:`Disaster governance`,headline:`Venezuela’s quake response is now a state-capacity and U.S.-aid test`,deck:`The rescue story is also about airfields, legitimacy and whether post-USAID disaster policy can work.`,image:img.venezuela,imageAlt:`La Guaira on Venezuela's coast`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/File:La_Guaira,_Venezuela.jpg`,skeletonHTML:`<b>Baseline:</b> Venezuela's infrastructure and institutions were already stressed after years of crisis and a 2026 political transition. <b>Change:</b> twin magnitude 7.2 and 7.5 earthquakes struck the northern coast, pushing the death toll above 1,400 and leaving large missing-person uncertainty. <b>Mechanism:</b> rescue depends on ports, airport access, heavy equipment, military order, social trust and foreign teams; the United States is testing a State Department-led aid model after reducing USAID capacity. <b>Stakes:</b> successful rescue could stabilize a friendly interim government and restore U.S. credibility in Latin America, while failure could turn disaster grief into legitimacy collapse.`,stats:[`AP and Guardian reports put the death toll at at least 1,430, with thousands injured.`,`The UN damage estimate cited by the Guardian reached $6.7 billion, roughly 6% of Venezuela's GDP.`,`The U.S. response reportedly includes more than 250 disaster-response personnel and $150 million in aid.`],sideA:[`Aid diplomacy works`,`Rapid rescue can save lives and show that U.S. hemispheric policy still has capacity.`],sideB:[`Aid capacity was hollowed`,`A fast pledge cannot fully replace years of lost USAID expertise and local networks.`],sideC:[`Reconstruction politics`,`Who controls rebuilding funds may matter more than who arrives first.`],sources:[S(`AP rescues`,`https://apnews.com/article/61a42ee8bd25b533ecfa323665a3483d`),S(`Guardian toll`,`https://www.theguardian.com/world/2026/jun/27/venezuela-earthquakes-death-toll-rises-jorge-rodriguez`),S(`Guardian aid policy`,`https://www.theguardian.com/us-news/2026/jun/28/venezuelan-earthquakes-test-trumps-new-western-hemisphere-policy-after-gutting-of-usaid`)]},{tag:`Climate adaptation`,headline:`Europe’s heatwave turns climate into health, labor and grid policy`,deck:`Attribution is now colliding with hospital data and infrastructure failures.`,image:img.heat,imageAlt:`Heatwave image for Europe`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/File:Heat_wave_in_Europe.jpg`,skeletonHTML:`<b>Baseline:</b> Europe has warmed rapidly while much housing, rail, health and power infrastructure was designed for cooler summers. <b>Change:</b> a record heatwave moved from western to eastern Europe, with AP reporting roughly 1,000 additional deaths in France and scientists saying the event would have been nearly impossible without climate change. <b>Mechanism:</b> heat stress overloads bodies, hospitals, outdoor labor, tracks, roads and thermal power plants at the same time, so adaptation cannot sit in one ministry. <b>Stakes:</b> governments must decide whether to treat heat as emergency weather or as a permanent economic and public-health risk requiring building codes, workplace rules and grid investment.`,stats:[`AP reported roughly 1,000 additional deaths in France during the heatwave and more than 1,300 heat-related deaths across Europe since June 21.`,`The Guardian reported Poland, Czechia and Slovakia bracing for 40C-plus conditions as the heat moved east.`,`World Weather Attribution said the western Europe heatwave would have been nearly impossible without fossil-fuel-driven warming.`],sideA:[`Adaptation can save lives`,`Cooling centers, home checks and heat labor rules reduce deaths quickly.`],sideB:[`Adaptation is not enough`,`If emissions keep rising, each infrastructure upgrade chases a moving hazard.`],sideC:[`Productivity politics`,`Heat gives climate policy a pocketbook argument through lost output and work limits.`],sources:[S(`AP heat deaths`,`https://apnews.com/article/61f444317600cf1bd9af5af84cb582bd`),S(`Guardian heat east`,`https://www.theguardian.com/environment/2026/jun/28/temperature-records-tumble-across-europe-as-heatwave-moves-east`),S(`Guardian attribution`,`https://www.theguardian.com/environment/2026/jun/26/europe-heatwave-impossible-without-climate-crisis-scientists`)]},{tag:`Public health security`,headline:`Congo’s Ebola outbreak is an access crisis before it is a technology crisis`,deck:`The missing-patient problem shows why medicine cannot outrun conflict and displacement.`,image:img.ebola,imageAlt:`Ebola treatment facility`,imageCredit:`National Army Museum`,imageCreditUrl:`https://collection.nam.ac.uk/detail.php?acc=2017-07-5-154`,skeletonHTML:`<b>Baseline:</b> Congo has Ebola response experience, but Ituri's conflict and displacement camps restrict tracing, isolation and safe treatment. <b>Change:</b> Africa CDC says nearly 300 confirmed Ebola-positive people are unaccounted for, while the outbreak has passed 1,100 confirmed DRC cases. <b>Mechanism:</b> the Bundibugyo strain lacks a licensed vaccine, so the response depends on locating contacts, opening beds, reaching inaccessible camps and starting treatment trials. <b>Stakes:</b> failure would create a regional health-security problem for Uganda and South Sudan while making global responders more cautious after France confirmed an exported health-worker case.`,stats:[`Guardian reported 1,118 confirmed DRC cases and 291 deaths, plus 20 cases and two deaths in Uganda.`,`WHO-linked projections cited by the Guardian warned of about 8,210 cases and 1,420 deaths by mid-September in a central scenario.`,`Only about 13% of $910 million pledged to the response had reportedly been delivered.`],sideA:[`Local tracing can recover control`,`Recruiting local workers can reach people outside formal health systems.`],sideB:[`Conflict breaks the model`,`No vaccine or trial can work if health teams cannot reach camps and missing patients.`],sideC:[`Border ethics`,`Travel controls can slow spread but also isolate communities and discourage reporting.`],sources:[S(`Guardian DRC Ebola`,`https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc`),S(`AP France Ebola`,`https://apnews.com/article/b6a854bf4ee2a0137c4fbd052f335bf9`),S(`WHO Ebola overview`,`https://www.who.int/health-topics/ebola`)]},{tag:`AI governance`,headline:`The AI race is moving from model demos to accounts, streets and supply chains`,deck:`The week’s AI stories show governance shifting into practical chokepoints.`,image:img.servers,imageAlt:`Rows of servers in a data center`,imageCredit:`Wikimedia Commons`,imageCreditUrl:`https://commons.wikimedia.org/wiki/File:Wikimedia_Servers-0051_17.jpg`,skeletonHTML:`<b>Baseline:</b> AI competition was often framed around frontier chatbots and GPU access. <b>Change:</b> this week brought Anthropic's claim that Alibaba abused Claude accounts, Shenzhen's robotaxi legalization, China's supercomputer benchmark claim and Apple supply-chain waiver reporting. <b>Mechanism:</b> strategic capability now moves through APIs, account verification, memory chips, supercomputing, city permits and automated vehicles. <b>Stakes:</b> governments must regulate AI as an operating ecosystem while avoiding rules that freeze competition or accelerate Chinese self-reliance.`,stats:[`Anthropic alleged 25,000 fake accounts and 28.8 million Claude exchanges in a distillation campaign.`,`FT reported Shenzhen has nearly 400,000 taxi and ride-hailing drivers facing robotaxi competition.`,`Wired reported China's LineShine supercomputer outperformed the previous top-ranked U.S. system by more than 20% on benchmark claims.`],sideA:[`Control the chokepoints`,`Identity checks, export rules and supply-chain scrutiny can slow strategic leakage.`],sideB:[`Overcontrol backfires`,`Restrictions can entrench incumbents and accelerate domestic alternatives in China.`],sideC:[`Local deployment rules matter`,`Robotaxis show cities may become as important as national AI offices.`],sources:[S(`Tom's Hardware Anthropic`,`https://www.tomshardware.com/tech-industry/artificial-intelligence/anthropic-claims-that-chinas-alibaba-illicitly-distilled-its-models-from-april-to-june-2026-says-effort-involved-25-000-fake-accounts-and-28-8-million-exchanges-on-claude`),S(`FT Shenzhen robotaxis`,`https://www.ft.com/content/b1445598-e5e3-4530-9e82-e0155c44106b`),S(`Wired supercomputer`,`https://www.wired.com/story/china-defies-us-restrictions-and-builds-worlds-fastest-supercomputer`)]}];const opinion=[{tag:`Guardian Analysis`,title:`Fresh hostilities in Gulf suggest U.S.-Iran memorandum was too broadly worded`,author:`Patrick Wintour`,pub:`The Guardian - June 28, 2026`,thesis:`The argument is that the ceasefire framework is collapsing because it avoided defining the hardest issues clearly enough.`,text:`The piece responds to renewed U.S.-Iran strikes and the dispute over Hormuz and Lebanon obligations. It matters because it distinguishes the verified fact of new military exchanges from the analytical claim that the memorandum's ambiguity caused them. For extemp, the article is useful because it turns a breaking conflict into an institutional argument about diplomatic design. The strongest pushback is that ambiguity may have been the only way to get any pause in fighting, so the flaw may be political will rather than drafting.`,claim:`A vague memorandum created space for both sides to claim compliance while escalating.`,matters:`It gives speakers a clean framework for arguing why some ceasefires fail.`,pushback:`No detailed text may have been achievable under battlefield pressure.`,source:S(`Read the Guardian analysis`,`https://www.theguardian.com/world/2026/jun/28/fresh-hostilities-gulf-us-iran-memorandum-interpretations-lebanon-ceasefire-strait-of-hormuz`)},{tag:`Climate Argument`,title:`Too hot for work: why extreme heat threatens Europe’s productivity`,author:`Guardian business analysis`,pub:`The Guardian - June 26, 2026`,thesis:`The argument is that heat should be treated as economic policy, not only disaster response.`,text:`The piece responds to a European heatwave that is closing schools, straining hospitals and disrupting work. It matters because it links climate adaptation to output, labor rights and infrastructure rather than treating heat as a temporary weather shock. For extemp, it supplies a strong causal chain from emissions to workplace rules and growth. The strongest pushback is that productivity estimates can change if firms rapidly adapt schedules, buildings and technology.`,claim:`Heat rules and infrastructure upgrades are now growth policy.`,matters:`It bridges climate evidence with macroeconomic and labor arguments.`,pushback:`Adaptation could reduce the measured productivity damage over time.`,source:S(`Read the Guardian analysis`,`https://www.theguardian.com/business/2026/jun/26/extreme-heat-europe-productivity-economic-growth`)},{tag:`Financial Times AI`,title:`Robots, not chatbots, will realise AI's potential`,author:`Financial Times editorial/analysis`,pub:`Financial Times - June 28, 2026`,thesis:`The argument is that physical AI in factories, logistics and care may matter more economically than conversational software.`,text:`The piece responds to a year in which AI hype has centered on language models while Chinese cities and manufacturers push physical automation. It matters because it shifts the debate from prompts and essays to supply chains, labor shortages and capital equipment. For extemp, the article helps explain why AI policy must include robotics, safety and worker transition rather than only data privacy or copyright. The strongest pushback is that robots are expensive, slower to deploy and more regulated than software models.`,claim:`Embodied AI will deliver the more durable productivity gains.`,matters:`It widens AI speeches beyond chatbots and frontier labs.`,pushback:`Hardware deployment costs and safety rules may slow the productivity payoff.`,source:S(`Read the FT piece`,`https://www.ft.com/content/794aa75d-5188-4036-91ca-7fc70b61faf8`)},{tag:`Ukraine Ethics`,title:`Morale bombing Moscow is not justified`,author:`Christian Enemark`,pub:`The Guardian - June 25, 2026`,thesis:`The argument is that Ukraine should not let long-range strikes blur the line between military targets and civilian punishment.`,text:`The piece responds to Ukraine's widening drone campaign against Russian infrastructure and the risk of civilian harm around those attacks. It matters because it separates the legality of striking war-supporting assets from the moral danger of talking about bringing pain to ordinary civilians. For extemp, it provides a strong counterweight to purely strategic arguments for hitting refineries and cities. The strongest pushback is that Russia's own attacks on Ukrainian civilians and infrastructure create intense pressure for Ukraine to impose reciprocal costs.`,claim:`Ukraine should preserve civilian immunity even while striking legitimate military infrastructure.`,matters:`It gives a moral-law angle to the long-range strike debate.`,pushback:`A defensive war may still require deep strikes that unavoidably create civilian risk.`,source:S(`Read the Guardian letter`,`https://www.theguardian.com/world/2026/jun/25/morale-bombing-moscow-is-not-justified`)}];const editions={wire:[`The Wire`,`Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer.`],weekly:[`The Weekly`,`The week in consequential developments, grouped like The Wire but selected for events still shaping the map today.`],analytical:[`The Analytical`,`Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points.`],opinion:[`The Opinion`,`Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged.`]};const src=a=>`<div class=wire-sources>`+a.map(x=>`<a href=${x.u} target=_blank rel=noopener>${x.n} &#8599;</a>`).join(``)+`</div>`;const learn=x=>`<details class=learn><summary>Learn more</summary><div class=learn-body><h4>Deeper context</h4><p>${x.context}</p><h4>Three angles</h4><ul>${x.angles.map(a=>`<li>${a}</li>`).join(``)}</ul><h4>What to watch</h4><p>${x.watch}</p></div></details>`;function renderGroups(data){return Object.entries(data).map(([topic,items])=>`<details class=topic><summary><span>${topic}</span><span class=count>${items.length} ${items.length===1?`story`:`stories`}</span></summary><div class=stack>${items.map(x=>`<article class=wire-item><h3 class=wire-headline>${x.h}</h3><p class=wire-prose>${x.proseHTML}</p>${src(x.sources)}${learn(x.learn)}</article>`).join(``)}</div></details>`).join(``)}function renderAnalytical(){return analytical.map(x=>`<details class=afile><summary><div><div class=tag>${x.tag}</div><h3>${x.headline}</h3><p class=deck>${x.deck}</p></div></summary><div class=analysis-body><img class=analysis-img src=${x.image} alt='${x.imageAlt}'><div class=credit><a href=${x.imageCreditUrl} target=_blank rel=noopener>Image: ${x.imageCredit} &#8599;</a></div><p class=walk>${x.skeletonHTML}</p><div class=stats><h4>Key Stats With Setup</h4><ul>${x.stats.map(s=>`<li>${s}</li>`).join(``)}</ul></div><h4 class=angles-title style=margin-top:17px>Three Angles</h4><div class=angles>${[[`a`,x.sideA],[`b`,x.sideB],[`c`,x.sideC]].map(([c,v])=>`<div class='angle ${c}'><strong>${v[0]}</strong>${v[1]}</div>`).join(``)}</div>${src(x.sources)}</div></details>`).join(``)}function renderOpinion(){return opinion.map(x=>`<article class=opinion-card><div class=tag>${x.tag}</div><h3>${x.title}</h3><div class=by>${x.author} - ${x.pub}</div><p class=thesis>${x.thesis}</p><p>${x.text}</p><div class=op-grid><div class=op-box><strong>The Claim</strong>${x.claim}</div><div class=op-box><strong>Why It Matters</strong>${x.matters}</div><div class=op-box><strong>Pushback</strong>${x.pushback}</div></div>${src([x.source])}</article>`).join(``)}const nav=document.getElementById(`nav`),content=document.getElementById(`content`);Object.entries(editions).forEach(([k,v])=>{const b=document.createElement(`button`);b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById(`edition`).textContent=editions[k][0];document.getElementById(`description`).textContent=editions[k][1];document.querySelectorAll(`.nav button`).forEach(b=>b.classList.toggle(`active`,b.dataset.edition===k));content.innerHTML=k===`wire`?renderGroups(wire):k===`weekly`?renderGroups(weekly):k===`analytical`?renderAnalytical():renderOpinion()}document.getElementById(`headline`).innerHTML=`<div><div class=label>Headline of the Day - ${headline.topic}</div><h2>${headline.h}</h2><p>${headline.deck}</p></div><figure style=margin:0><img class=headline-photo src=${headline.image} alt='${headline.imageAlt}'><figcaption class=credit><a href=${headline.imageCreditUrl} target=_blank rel=noopener>Image: ${headline.imageCredit} &#8599;</a></figcaption></figure>`;const saved=localStorage.getItem(`dig-theme`),root=document.documentElement,toggle=document.getElementById(`theme`);function setTheme(t){root.dataset.theme=t;toggle.textContent=`Theme: `+t[0].toUpperCase()+t.slice(1);localStorage.setItem(`dig-theme`,t)}setTheme(saved||`light`);toggle.onclick=()=>setTheme(root.dataset.theme===`light`?`dark`:`light`);show(`wire`);</script></body></html>
