const headline={topic:"Middle East",h:"A strike on Beirut puts two ceasefires at risk",deck:"Israel's first attack near the capital since Washington announced a Lebanon truce has renewed the danger of Iranian retaliation and a wider return to war.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Beirut%20skyline.jpg",imageAlt:"The skyline of Beirut, Lebanon",imageCredit:"Laura C. Ellis / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Beirut_skyline.jpg"};
const wire={
"US Economy":[
{h:"May hiring beats forecasts and narrows the Fed's room to ease",proseHTML:`The labor market entered May with economists expecting a sharper slowdown as high energy prices and restrictive interest rates weighed on demand. <span class='change'>Employers added 172,000 jobs, more than double the Reuters consensus forecast of 85,000, while unemployment held at 4.3%.</span> Leisure and hospitality, local government and health care accounted for much of the gain, which means the headline is strong but not evenly distributed across sectors. The report gives the <span class='jargon'>Federal Reserve (the US central bank, which sets short-term interest rates)</span> more reason to hold rates steady while it assesses war-driven inflation, and makes the next consumer-price report the clearest test of whether resilience is becoming renewed overheating.`,sources:[S("BLS", "https://www.bls.gov/news.release/archives/empsit_06052026.htm"),S("Reuters", "https://www.marketscreener.com/news/us-posts-another-month-of-strong-job-gains-in-may-unemployment-rate-steady-at-4-3-ce7f5dddde81f625")],learn:L("Payroll growth measures jobs at establishments; the unemployment rate comes from a separate household survey, so the two can diverge without either being false.",["Soft-landing case: hiring can remain positive without reigniting wages.","Hawkish case: strong demand plus expensive oil can keep inflation sticky.","Distribution case: concentrated gains may conceal weakness in office and manufacturing work."],"Watch May CPI, wage revisions, labor-force participation and the Fed's June guidance.")},
{h:"A jobs surprise turns the AI selloff into a rates story",proseHTML:`Semiconductor shares had already weakened after a long valuation run and concern about whether AI spending would produce profits quickly enough. <span class='change'>The Nasdaq fell 4.2% on Friday as the payroll surprise pushed long-term Treasury yields higher and intensified expectations of a more hawkish Fed.</span> High-growth stocks are especially sensitive to the <span class='jargon'>discount rate (the interest rate used to value future earnings in today's dollars)</span>, so rising yields reduce what distant profits are worth even if chip demand remains strong. The next question is whether the decline stays concentrated in expensive technology shares or becomes a broader tightening of financial conditions for households and smaller firms.`,sources:[S("Reuters", "https://www.livemint.com/market/wall-street-slumps-as-chips-slide-robust-jobs-data-stokes-fears-of-hawkish-fed/amp-11780685605057.html"),S("BLS", "https://www.bls.gov/news.release/archives/empsit_06052026.htm")],learn:L("Bond yields affect mortgage rates, corporate borrowing and equity valuations, turning one labor report into a wider financial shock.",["Correction case: crowded AI trades were vulnerable to any rates surprise.","Contagion case: higher yields can pressure credit and housing beyond technology.","Fundamental case: strong employment still supports consumption and revenue."],"Watch Treasury yields, credit spreads and whether chip shares stabilize before CPI.")}
],
"US Politics":[
{h:"Republican dissent becomes a governing constraint for Trump",proseHTML:`Congressional Republicans had usually challenged President Donald Trump in isolated votes without forming a durable opposition bloc. <span class='change'>Over the past week, different Republican groups joined rebukes over the Iran war, White House ballroom funding, a $1.8 billion anti-weaponization fund, domestic surveillance and a Ukraine aid and Russia sanctions bill.</span> The coalitions are issue-specific, but their accumulation matters because narrow majorities let a small number of defectors block legislation or force concessions. Midterm pressure is the common incentive: members can support the administration broadly while distancing themselves from policies that carry visible fiscal, constitutional or foreign-policy costs at home.`,sources:[S("Reuters", "https://www.internazionale.it/ultime-notizie-reuters/2026/06/06/trump-faces-new-republican-resistance-in-congress-as-midterm-pressures-build"),S("AP war-powers vote", "https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536")],learn:L("A congressional majority is a collection of shifting coalitions; dissent becomes decisive when margins are small and the president cannot replace every member's electoral incentives.",["Institutional view: Congress is recovering leverage over spending and war.","Electoral view: lawmakers are managing local risk rather than rejecting Trump.","Policy view: cross-party votes can survive only if the Senate and veto math align."],"Watch Senate action on Ukraine and Iran, plus whether dissent spreads to routine budget votes.")}
],
"Healthcare":[
{h:"WHO launches a $518 million race to contain Ebola",proseHTML:`The Bundibugyo Ebola outbreak in the Democratic Republic of Congo and Uganda had already been declared an international health emergency, with conflict and distrust disrupting tracing and safe burials. <span class='change'>The World Health Organization and Africa CDC announced a $518 million, six-month plan for treatment, surveillance, border screening and preparedness in neighboring states.</span> Officials describe the outbreak as the fourth largest on record and say responders are still catching up, which makes financing speed as important as the pledged total. Because <span class='jargon'>ring vaccination (vaccinating contacts and contacts of contacts around a confirmed case)</span> depends on fast case detection, insecurity can turn a geographically limited outbreak into a regional emergency even before international travel produces exported cases.`,sources:[S("Reuters", "https://www.investing.com/news/world-news/who-announces-518-million-sixmonth-plan-to-fight-ebola-4728744"),S("WHO", "https://www.who.int/news-room/headlines")],learn:L("Bundibugyo is a species of Ebola virus for which response tools are less established than for the better-known Zaire strain.",["Funding case: rapid logistics and staffing can break transmission chains.","Security case: medical capacity fails if teams cannot reach communities.","Trust case: local leaders may determine whether families report illness early."],"Watch confirmed cases, unexplained deaths, border detections and donor disbursements.")},
{h:"Unsafe food is measured as a mass-casualty health problem",proseHTML:`Food safety is often treated as a restaurant-inspection issue, even though contamination also travels through water systems, informal markets and international supply chains. <span class='change'>WHO's updated estimate attributes 866 million illnesses and 1.5 million deaths each year to unsafe food, with young children carrying the highest risk.</span> The number combines bacterial, viral, parasitic and chemical hazards, so prevention requires laboratories, sanitation and traceability rather than one universal intervention. Governments will now face pressure to translate a global burden estimate into national surveillance, because weak reporting can make the problem appear smaller precisely where the health system is least able to absorb it.`,sources:[S("WHO headlines", "https://www.who.int/news-room/headlines"),S("WHO food safety", "https://www.who.int/health-topics/food-safety")],learn:L("Foodborne disease includes long-term complications and deaths, not only short gastrointestinal illness.",["Prevention case: sanitation and inspection avert hospital costs.","Equity case: informal vendors and poor households need support, not only penalties.","Measurement case: better surveillance can initially make reported disease rise."],"Watch country-level burden estimates and funding for laboratories and clean water.")}
],
"Climate":[
{h:"El Niño odds jump as governments enter the preparation window",proseHTML:`The tropical Pacific moved out of La Niña earlier this year, but the strength and timing of the next warm phase remained uncertain. <span class='change'>The World Meteorological Organization now puts the probability of El Niño at 80% for June through August and about 90% later in the forecast period, with a moderate or possibly strong event expected.</span> <span class='jargon'>El Niño (periodic warming of the central and eastern equatorial Pacific that shifts global rainfall and temperature patterns)</span> does not produce the same weather everywhere, but it can raise the risk of heat, drought, flood and crop disruption across multiple regions at once. The practical deadline is before impacts peak: reservoir rules, food reserves, cooling plans and early-warning systems take months to adjust.`,sources:[S("Reuters", "https://m.investing.com/news/world-news/un-urges-the-world-to-ready-for-extreme-heat-risk-from-el-nino-4721357?ampMode=1"),S("NOAA", "https://www.nesdis.noaa.gov/about/k-12-education/oceans-coasts/what-el-nino")],learn:L("El Niño is a forecastable risk pattern, not a guarantee that every historically associated disaster will occur.",["Preparedness view: seasonal forecasts can reduce deaths and crop losses.","Uncertainty view: regional outcomes depend on other ocean and atmospheric patterns.","Climate view: background warming raises the ceiling for heat extremes."],"Watch the next NOAA and WMO updates, monsoon forecasts and national heat plans.")}
],
"Tech / AI":[
{h:"US chip controls move from destination to ownership",proseHTML:`American export rules had restricted advanced AI processors shipped to China, while overseas subsidiaries of Chinese companies could still create a diversion route. <span class='change'>US authorities moved to halt Nvidia chip shipments to Chinese-owned firms outside China, shifting compliance toward who ultimately controls the buyer rather than only where the package lands.</span> That requires <span class='jargon'>beneficial-ownership screening (identifying the people or entities that ultimately own or control a company)</span>, a harder task for chipmakers, distributors and cloud providers than checking an address. The approach may close a security loophole, but uneven allied enforcement could reroute transactions through jurisdictions with weaker corporate disclosure.`,sources:[S("Reuters", "https://www.nst.com.my/amp/business/corporate/2026/06/1452639/us-takes-step-halt-nvidia-ai-chip-shipments-chinese-firms"),S("Reuters analysis", "https://www.investing.com/news/economic-indicators/arm-holdings-ceo-says-us-would-have-difficulty-banning-ai-cpu-chip-exports-to-china-4721161")],learn:L("Graphics processors can be controlled through performance thresholds; general-purpose CPUs are harder to separate cleanly into civilian and AI categories.",["Security case: ownership rules reduce easy circumvention.","Industry case: compliance costs and false positives can grow quickly.","China case: tighter controls accelerate domestic substitution and smuggling incentives."],"Watch Commerce Department guidance, allied adoption and enforcement cases.")},
{h:"Nvidia brings the AI competition onto the personal computer",proseHTML:`Most generative AI workloads have run in remote data centers because large models require expensive processors and memory. <span class='change'>Nvidia introduced a new processor platform intended to run more AI agents directly on laptops and desktops, challenging Apple, Intel and Qualcomm in the PC market.</span> <span class='jargon'>On-device AI (models that run locally rather than sending every task to a cloud server)</span> can reduce latency and improve privacy, but it also raises device prices and shifts scarce memory and chip capacity away from other electronics. Adoption will depend less on benchmark demonstrations than on whether software developers build useful applications that work reliably without constant cloud access.`,sources:[S("Reuters", "https://ca.investing.com/news/stock-market-news/nvidia-launches-new-chip-to-bring-ai-directly-to-personal-computers-4667868"),S("Arm interview", "https://www.marketscreener.com/news/arm-holdings-ceo-says-us-would-have-difficulty-banning-ai-cpu-chip-exports-to-china-ce7f5dded98bfe27")],learn:L("Local inference moves some computing cost from the provider's data center to hardware purchased by the user.",["Privacy case: sensitive tasks can stay on the device.","Cost case: premium hardware may outrun useful software.","Supply case: AI PCs add pressure to already tight memory markets."],"Watch PC launch prices, battery performance and developer support.")}
],
"Latin America":[
{h:"Peru votes in a runoff with the region's political direction at stake",proseHTML:`Peru reached its presidential runoff after a fragmented first round and years of turnover, conflict between presidents and Congress, and low public trust. <span class='change'>Voters are choosing Sunday between conservative Keiko Fujimori and leftist Roberto Sánchez, with polls placing them in a statistical tie.</span> Fujimori offers a market-oriented economic team, while Sánchez draws on the rural appeal associated with former president Pedro Castillo; the choice therefore tests both Peru's institutional fatigue and Latin America's recent rightward movement. A close result will make the speed and transparency of the count crucial, because the winner must govern through a divided legislature and address insecurity without another cycle of executive-legislative paralysis.`,sources:[S("Reuters", "https://www.investing.com/news/commodities-news/peru-votes-in-tight-presidential-runoff-in-test-of-latin-americas-rightward-shift-4729663"),S("Reuters guide", "https://ae.marketscreener.com/news/peru-s-june-7-presidential-runoff-ce7f5ddddf88ff27")],learn:L("Peru's repeated presidential crises have often come from constitutional conflict between an unpopular executive and a fragmented Congress.",["Rightward-shift case: security and market stability favor Fujimori.","Anti-establishment case: rural exclusion sustains Sánchez's coalition.","Governability case: congressional bargaining may matter more than ideology."],"Watch the electoral authority's count, concession statements and congressional alliances.")}
],
"Africa / Middle East":[
{h:"Israel strikes Beirut and reopens the regional escalation chain",proseHTML:`Washington's latest Lebanon framework was supposed to reduce fighting enough to support a broader agreement ending the US-Iran war. <span class='change'>Israel struck Beirut's southern outskirts on Sunday for the first time since the plan was announced, after accusing Hezbollah of continued attacks; an Iranian lawmaker threatened retaliation.</span> Iran has tied any wider peace deal to an end to the Lebanon war, so a local exchange can now disrupt negotiations over sanctions, shipping and the Strait of Hormuz. The immediate test is whether Washington can restore restraint before Iran acts, because retaliation against Israel or Gulf states would reconnect fronts that mediators have tried to separate.`,sources:[S("AP", "https://apnews.com/article/28d80744e192ae0d5cce73a5a08af906"),S("Reuters", "https://ca.marketscreener.com/news/us-eyes-iranian-assets-for-gulf-allies-reconstruction-source-says-ce7f5dd2dd8bf226"),S("Axios", "https://www.axios.com/2026/06/07/israel-strikes-lebanon-beirut-iran-response-trump")],learn:L("The Lebanon track involves Israel, Lebanon's government, Hezbollah, Iran and the United States, but those actors do not share one command structure or definition of compliance.",["Deterrence case: Israel argues violations require immediate costs.","Diplomacy case: strikes weaken the intermediaries needed to enforce a truce.","Regional case: Iran can retaliate indirectly or through Gulf pressure."],"Watch Iranian military signals, Hezbollah fire and any emergency US-Israel contacts.")},
{h:"Guinea's ruling coalition converts a coup transition into legislative control",proseHTML:`Mamady Doumbouya seized power in 2021 and later won a seven-year presidential term after major opposition parties were dissolved. <span class='change'>Provisional results now give his Generation for Modernity and Development coalition and allies at least 100 of 147 National Assembly seats.</span> The vote restores an elected legislature on paper, but exclusion of leading opposition organizations limits its ability to check the presidency. Guinea is a major bauxite exporter, so concentrated power can accelerate mining and infrastructure decisions while increasing governance and contract risk for communities and investors.`,sources:[S("Reuters", "https://uk.marketscreener.com/news/guinea-president-s-coalition-wins-legislative-majority-results-show-ce7f5dd2d98cf22d"),S("African Union", "https://au.int/sites/default/files/pressreleases/45838-pr-Communique_-_Presidential_Election_in_the_Republic_of_Guinea_-_Janvier_2026.pdf")],learn:L("Bauxite is the principal ore used to make aluminum, giving Guinea strategic importance to global industrial supply chains.",["Stability case: a large majority can pass budgets and mining rules quickly.","Democracy case: opposition exclusion weakens the mandate.","Resource case: mining revenue can fund development or deepen patronage."],"Watch final seat certification, legal challenges and new mining policy.")}
],
"Europe / EU":[
{h:"Europe answers dependence on US technology with an industrial-policy package",proseHTML:`European governments have regulated digital platforms aggressively but still rely on American cloud providers and Asian semiconductor supply chains. <span class='change'>The European Commission proposed a Cloud and AI Development Act and a Chips Act 2.0 to expand domestic capacity and keep sensitive data and infrastructure under European control.</span> The policy reflects <span class='jargon'>technological sovereignty (the ability to operate critical digital systems without unacceptable dependence on foreign suppliers)</span>, especially in defense and government services. Its credibility will turn on money, electricity and procurement: rules can favor European firms, but they cannot by themselves create hyperscale clouds, advanced fabs or enough low-cost power.`,sources:[S("Reuters", "https://www.investing.com/news/stock-market-news/eu-targets-big-tech-dependence-with-madeineurope-drive-4724170"),S("European Commission outlook", "https://europa.eu/newsroom/ecpc-failover/pdf/ip-26-1120_en.pdf")],learn:L("Industrial policy uses subsidies, procurement, standards and regulation to shape where strategic production occurs.",["Resilience case: local capacity reduces geopolitical exposure.","Efficiency case: duplicating global infrastructure can be costly.","Competition case: procurement may help European challengers reach scale."],"Watch funding totals, state-aid approvals and which cloud workloads receive sovereignty rules.")},
{h:"Eurozone contraction raises the cost of strategic ambition",proseHTML:`Europe entered 2026 with moderate growth projections and large spending demands for defense, energy and technology. <span class='change'>Revised data showed the eurozone economy contracted 0.2% in the first quarter from the previous quarter, below expectations for growth.</span> A weak starting point limits tax revenue and makes governments more sensitive to borrowing costs just as they are being asked to invest more. The European Central Bank must now separate demand weakness from war-driven energy inflation, because responding to one can worsen the other.`,sources:[S("Eurostat", "https://ec.europa.eu/eurostat/web/products-euro-indicators"),S("Reuters market context", "https://www.investing.com/analysis/june-outlook-central-banks-hormuz-and-politics-set-the-market-agenda-200681242")],learn:L("Quarterly GDP revisions can change the direction of growth after more complete national data arrive.",["Stimulus case: contraction supports easier financial conditions.","Inflation case: imported energy costs can block rate relief.","Fiscal case: weak growth sharpens tradeoffs among defense, welfare and investment."],"Watch the ECB meeting, energy prices and second-quarter business surveys.")}
],
"China":[
{h:"A Dutch frigate transit keeps the Taiwan Strait multinational",proseHTML:`US naval passages through the Taiwan Strait are common, while European transits are less frequent and therefore carry a distinct diplomatic signal. <span class='change'>China said it deployed naval and air forces to track the Dutch frigate HNLMS De Ruyter as it crossed the strait.</span> Beijing treats such passages as security provocations, while the Netherlands and other maritime powers frame them as exercises of navigation rights in international waters. The episode matters because repeated participation by non-US allies makes the dispute less bilateral, but also creates more opportunities for an unsafe encounter or retaliatory economic pressure.`,sources:[S("Reuters", "https://ca.marketscreener.com/news/china-s-military-says-it-tracked-dutch-frigate-in-taiwan-strait-ce7f5dddd18ef225"),S("Dutch Defence", "https://english.defensie.nl/topics/international-cooperation")],learn:L("A Taiwan Strait transit does not recognize Taiwanese sovereignty; it asserts a legal view about navigation through the waterway.",["Rules case: multinational passages normalize open navigation.","Escalation case: more ships and aircraft increase accident risk.","Alliance case: European participation broadens deterrence beyond Washington."],"Watch Chinese exercises, Dutch statements and future European transits.")}
],
"War / Active Conflicts":[
{h:"A drone strike near Chornobyl adds nuclear risk to the Ukraine air war",proseHTML:`Russia and Ukraine have repeatedly attacked energy and military infrastructure, but nuclear sites require a higher safety margin because even limited damage can create public panic and complex containment work. <span class='change'>Ukraine said a Russian drone struck a spent-fuel storage facility near the Chornobyl plant on Sunday, while monitors reported no radiation increase and Russia denied responsibility.</span> <span class='jargon'>Spent nuclear fuel (used reactor fuel that remains radioactive and must be cooled and contained)</span> is protected by engineered barriers, so the absence of a release does not make the strike strategically trivial. Independent inspection and verified damage assessment are now essential to prevent misinformation and to determine whether air-defense or deconfliction rules need to change.`,sources:[S("Reuters", "https://ca.marketscreener.com/news/russian-drone-hit-nuclear-fuel-storage-facility-near-chornobyl-ukraine-says-ce7f5dd2dd8ef626"),S("IAEA Ukraine updates", "https://www.iaea.org/newscenter/focus/ukraine")],learn:L("Radiation readings show whether material escaped; they do not by themselves reveal structural damage or future safety risk.",["Attribution case: deliberate targeting would breach a major safety norm.","Military case: drones can miss or be diverted by defenses.","Information case: rapid independent monitoring limits panic and propaganda."],"Watch IAEA access, imagery of the site and follow-up radiation readings.")},
{h:"US House links Ukraine aid to a harder Russia policy",proseHTML:`Ukraine's battlefield position depends on reliable ammunition and air-defense deliveries, while Congress has been divided over long-term support. <span class='change'>The House passed legislation combining new aid for Ukraine with stronger sanctions on Russia, despite White House opposition and an expected veto fight.</span> Authorization does not immediately place equipment in the field, but it can stabilize contracts and signal that congressional support is broader than the president's position. The Senate timetable, veto arithmetic and allocation of scarce interceptors across Ukraine and the Middle East will determine the military effect.`,sources:[S("Reuters Connect", "https://www.reutersconnect.com/item/refile-us-house-backs-russia-sanctions-ukraine-aid-in-latest-blow-to-trump/dGFnOnJldXRlcnMuY29tLDIwMjY6bmV3c21sX1ZBNjIzOTA1MDYyMDI2UlAx"),S("AP", "https://apnews.com/article/c01c9e068b63d195d26e3134ed586a71")],learn:L("Appropriations provide legal funding authority; delivery still depends on inventories, production, contracting and training.",["Deterrence case: predictable aid raises Russia's expected cost.","Constraint case: finite air-defense stocks force cross-theater tradeoffs.","Institutional case: Congress can sustain policy even amid executive resistance."],"Watch Senate passage, a veto response and delivery schedules.")}
]};
const weekly={
"US Economy":[...wire["US Economy"],{h:"Energy inflation changes the meaning of strong growth",proseHTML:`Before the Iran war, policymakers expected disinflation to create room for lower rates even if growth stayed positive. <span class='change'>This week combined resilient hiring with oil near elevated wartime levels, increasing the risk that demand and supply pressures reinforce each other.</span> Strong employment helps households absorb prices, but it can also let firms pass higher transport and input costs through to consumers. The next inflation report will show whether energy remains a sector shock or is spreading into services and expectations.`,sources:[S("BLS jobs", "https://www.bls.gov/news.release/archives/empsit_06052026.htm"),S("S&P week ahead", "https://www.spglobal.com/content/dam/spglobal/mi/en/documents/news-insights/research/2026/06/6232977_6232937_0.1.pdf")],learn:L("Central banks distinguish temporary relative-price shocks from broad inflation that changes wages and expectations.",["Resilience: incomes can support consumption.","Inflation: strong demand can prolong price pressure.","Global: expensive dollars and oil strain importers."],"Watch CPI, consumer expectations and the Fed's projections.") }],
"US Politics":[...wire["US Politics"],{h:"The House invokes war powers against the Iran campaign",proseHTML:`Congress had criticized the Iran war without assembling a chamber majority for a direct institutional challenge. <span class='change'>The House voted 215-208 for a resolution directing an end to US hostilities, with four Republicans joining Democrats.</span> The measure faces a difficult Senate path and a likely veto, but it establishes a recorded test of the <span class='jargon'>War Powers Resolution (the 1973 framework intended to limit unauthorized presidential hostilities)</span>. Its political force will grow if deployments, casualties or fuel prices rise before the midterms.`,sources:[S("AP", "https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536"),S("White House position", "https://www.whitehouse.gov/wp-content/uploads/2026/05/SAP-HCR86.pdf")],learn:L("War-powers votes can matter politically even when veto math prevents an immediate legal change.",["Congressional authority: legislators must own prolonged war.","Executive authority: commanders need operational flexibility.","Electoral pressure: visible costs can move members faster than doctrine."],"Watch the Senate vote and any restrictions attached to funding.")},{h:"Trump moves to make Todd Blanche attorney general",proseHTML:`The Justice Department had been operating under acting leadership while handling politically sensitive prosecutions and regulatory cases. <span class='change'>Trump said he would nominate Todd Blanche for attorney general, setting up a Senate confirmation fight over independence and loyalty.</span> The office directs federal prosecution, antitrust policy and the government's position in major constitutional litigation, so recusal and chain-of-command commitments will matter as much as biography. Hearings will show whether Republican dissent is limited to spending and war or extends to institutional appointments.`,sources:[S("Axios", "https://www.axios.com/2026/06/04/trump-nominate-todd-blanche-attorney-general"),S("Reuters report", "https://www.ksl.com/article/51506817/trump-says-he-will-nominate-todd-blanche-as-us-attorney-general")],learn:L("The attorney general is a political appointee leading a department expected to apply criminal law without personal direction from the president.",["Accountability: presidents need leaders who execute elected policy.","Independence: criminal enforcement must resist personal retaliation.","Senate: confirmation can produce enforceable public commitments."],"Watch committee scheduling, recusals and holdout senators.")}],
"Healthcare":[...wire.Healthcare,{h:"The outbreak reaches beyond clinics into diplomacy",proseHTML:`The India-Africa Forum Summit was intended to deepen trade and strategic ties at a moment of growing competition for African partnerships. <span class='change'>India and the African Union postponed the gathering as Ebola spread and officials tried to reduce travel and health-system risk.</span> The decision shows how an outbreak can impose diplomatic and economic costs before widespread international transmission occurs. Rescheduling will depend on sustained case decline and credible regional surveillance, not merely a one-day reduction in suspected cases.`,sources:[S("Al Jazeera / Reuters", "https://www.aljazeera.com/news/2026/5/21/india-africa-summit-postponed-as-ebola-spreads-to-m23-held-dr-congo-area"),S("WHO", "https://www.who.int/news-room/headlines")],learn:L("Public-health events affect diplomacy through travel risk, staffing, insurance and political optics.",["Precaution: postponement protects delegates and host systems.","Cost: delay weakens momentum and commerce.","Signal: confidence returns only with transparent surveillance."],"Watch a new summit date and WHO risk assessments.")}],
"Climate":[...wire.Climate,{h:"Crop markets begin pricing a multi-region weather risk",proseHTML:`Food markets entered the season with high fuel and fertilizer costs linked to the Middle East conflict. <span class='change'>This week's El Niño warning added the possibility of simultaneous rainfall and heat disruptions across Asian and African growing regions.</span> The danger is not one failed harvest but correlated losses followed by export restrictions that transmit local shortages into world prices. Governments are now deciding whether to build reserves early or risk amplifying panic through late emergency buying.`,sources:[S("Reuters", "https://www.internazionale.it/ultime-notizie-reuters/2026/06/02/analysis-a-strong-el-nino-may-be-imminent-climate-change-will-make-its-effects-worse"),S("FAO prices", "https://www.fao.org/worldfoodsituation/foodpricesindex/en/")],learn:L("Food shocks become global when weather, energy and trade policy move in the same direction.",["Preparation: forecasts support reserves and planting changes.","Market risk: export bans can magnify modest losses.","Humanitarian risk: aid budgets buy less when freight and staples rise together."],"Watch rice policy, monsoon forecasts and FAO price data.")},{h:"Summer grid risk shifts from total capacity to deliverability",proseHTML:`North American systems may have enough annual generation yet still fail during a narrow heat-wave peak or local transmission bottleneck. <span class='change'>Summer reliability assessments emphasized generator outages, fuel security and the timing and location of rapidly growing data-center demand.</span> <span class='jargon'>Resource adequacy (having enough deliverable electricity at the moment and place of peak demand)</span> therefore cannot be measured by nameplate capacity alone. Utilities will be judged on demand response, transmission coordination and whether large new customers pay for the upgrades they require.`,sources:[S("FERC", "https://www.ferc.gov/sites/default/files/2026-05/26_Summer%20Assessment_0529.pdf"),S("NERC", "https://www.nerc.com/globalassets/our-work/assessments/2026-summer-reliability-assessment-snapshot.pdf")],learn:L("Electricity must be produced and delivered in real time, making location and timing decisive.",["Capacity: new generation improves margins.","Grid: transmission delays can strand supply.","Demand: flexible loads can cover short peaks."],"Watch heat forecasts, emergency alerts and utility tariffs for data centers.")}],
"Tech / AI":[...wire["Tech / AI"],{h:"AI memory demand begins to reach ordinary electronics",proseHTML:`Data-center builders have paid premiums for high-performance memory, encouraging manufacturers to prioritize the most profitable products. <span class='change'>Analysts warned this week that memory prices have risen roughly sixfold over the past year and are pushing cost pressure into PCs, phones and cloud services.</span> The effect may appear as higher retail prices, thinner manufacturer margins or delayed product launches rather than one clean inflation statistic. The broader implication is that the AI investment boom can crowd out non-AI hardware even before its electricity and labor effects are fully visible.`,sources:[S("Reuters discussion", "https://www.reddit.com/r/stocks/comments/1tvusy2/ai_chipflation_spreading_from_data_centers_to/"),S("ASML / Reuters", "https://www.marketscreener.com/news/asml-ceo-sees-tight-supply-in-booming-chip-market-as-ai-demand-soars-ce7f5ad9db8cf120")],learn:L("Memory is a shared input across servers, phones, vehicles and consumer devices, so allocation choices propagate across industries.",["Investment: high prices fund new capacity.","Inflation: shortages raise costs before factories arrive.","Cycle: aggressive expansion can later create oversupply."],"Watch contract memory prices and device launch delays.")}],
"Latin America":[...wire["Latin America"],{h:"Colombia's runoff opens under a dispute over electoral trust",proseHTML:`Colombia moved into its presidential runoff with polarization high but an established audit and observer system. <span class='change'>President Gustavo Petro alleged fraud and election authorities rejected the claim, forcing administrators to defend the process before the final vote.</span> Premature accusations can reduce acceptance even when procedures remain intact, especially if candidates prepare supporters to treat defeat as proof of manipulation. Observer access, transparent audits and rapid publication of precinct records will determine whether rhetoric becomes an institutional crisis.`,sources:[S("OAS observers", "https://www.oas.org/fpdb/press/2026_EOM_Colombia_Presidential_Elections_Second_Report_ENG.pdf"),S("El País", "https://elpais.com/america-colombia/elecciones-presidenciales/2026-06-04/resultados-de-las-elecciones-en-colombia-2026-en-vivo.html")],learn:L("Election legitimacy rests on procedures that can be checked independently and accepted by losing campaigns.",["Vigilance: challenges can expose real irregularities.","Trust: unsupported claims pre-contaminate the result.","Observers: external records can lower factual disagreement."],"Watch audit access, campaign violence and concession statements.")},{h:"Cuba's fuel shortage becomes a water and sanitation crisis",proseHTML:`Cuba's energy shortage had already reduced transport and electricity, but essential urban systems also depend on diesel and reliable power. <span class='change'>During the week, waste collection, water pumping and refrigeration deteriorated further under the fuel blockade.</span> That converts an energy squeeze into public-health and migration pressure because hospitals, treatment plants and municipal fleets fail together. The next meaningful change would be a protected humanitarian fuel channel or financing arrangement that restores essential services without waiting for a wider political settlement.`,sources:[S("Reuters report", "https://www.investing.com/news/world-news/how-cubans-keep-going-despite-us-pressure-and-fuel-blockade-4723893")],learn:L("Fuel scarcity reaches health through pumps, trucks, cold chains and backup generators.",["Pressure: hardship may force policy concessions.","Humanitarian: civilians absorb costs before leaders move.","Regional: migration externalizes the crisis to neighbors."],"Watch blackouts, water access and maritime departures.")}],
"Africa / Middle East":[...wire["Africa / Middle East"],{h:"Eastern Congo combines sanctions, war and epidemic response",proseHTML:`Washington-backed mediation had not stopped fighting between M23 and the FDLR in eastern Congo, where displacement already weakened public services. <span class='change'>The United States sanctioned commanders from both armed groups as Ebola responders tried to operate in the same insecure territory.</span> Sanctions can restrict finance and travel, but they rarely create immediate humanitarian access; disease control needs local ceasefires, roads and trusted teams now. The overlap matters because displacement hides cases, outbreaks complicate aid logistics and armed actors can use access as leverage.`,sources:[S("Reuters", "https://www.investing.com/news/world-news/us-imposes-sanctions-on-commanders-over-fighting-in-eastern-congo-4722871"),S("WHO", "https://www.who.int/news-room/headlines")],learn:L("M23 and the FDLR fight on opposing sides of a regional conflict involving Congo and Rwanda; Rwanda denies UN allegations that it backs M23.",["Sanctions: targeted costs may change commander incentives.","Access: designations do not protect health corridors.","Regional: diplomacy must address security and disease simultaneously."],"Watch Uvira, vaccination access and implementation of sanctions.")}],
"Europe / EU":[...wire["Europe / EU"],{h:"Ukraine and Moldova regain momentum toward EU membership",proseHTML:`Both countries had candidate status but faced political resistance to opening and advancing every negotiating cluster. <span class='change'>EU governments moved the process forward this week, restoring a reform anchor tied to law, markets and governance.</span> Accession remains a long, unanimous process rather than an immediate security guarantee, but each benchmark makes institutional and economic integration harder to reverse. The next test is whether member states keep the process technical or use veto points for unrelated bargaining.`,sources:[S("European Commission Ukraine", "https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en"),S("European Commission Moldova", "https://enlargement.ec.europa.eu/enlargement-policy/moldova_en")],learn:L("EU accession proceeds through policy clusters, benchmarks and unanimous member-state decisions.",["Anchor: conditionality supports reform and investment.","Delay: a long process can create frustration without security.","Leverage: each veto point invites national bargaining."],"Watch cluster openings and rule-of-law benchmarks.")}],
"China":[...wire.China,wire["Tech / AI"][0],{h:"Taiwan's trade reorientation becomes strategically visible",proseHTML:`China and Hong Kong had long been Taiwan's largest combined trade destination, even as technology security pushed firms to diversify. <span class='change'>First-quarter exports to the United States nearly doubled, making the US Taiwan's top trade partner for the first time in roughly 25 years.</span> AI hardware demand explains part of the shift, while export controls and de-risking policies change where firms place capacity and customers. Greater US exposure can reduce dependence on China but also makes Taiwan more vulnerable to American demand cycles and bargaining over semiconductor investment.`,sources:[S("Taiwan trade statistics", "https://service.mof.gov.tw/public/Data/statistic/bulletin/115/2026_06_WTO.pdf"),S("Taiwan economic data", "https://www.trade.gov.tw/english/")],learn:L("Trade concentration can create leverage for the buyer as well as resilience for the seller.",["Diversification: lower China exposure reduces coercion risk.","Concentration: US demand becomes a larger single vulnerability.","Industrial policy: investment conditions may follow market access."],"Watch monthly exports and semiconductor investment commitments.")}],
"War / Active Conflicts":[...wire["War / Active Conflicts"],wire["Africa / Middle East"][0]]};
const analytical=[
{tag:"Middle East",headline:"Why the Beirut strike threatens the entire Iran exit",deck:"A ceasefire architecture cannot hold when the armed actor at its center rejects the bargain and outside powers retain separate red lines.",image:headline.image,imageAlt:headline.imageAlt,imageCredit:headline.imageCredit,imageCreditUrl:headline.imageCreditUrl,skeletonHTML:`<b>Baseline:</b> Washington tried to separate and then sequence the Iran and Lebanon fronts, using reduced fire in Lebanon to create room for sanctions, shipping and nuclear talks. <b>Immediate change:</b> Israel struck Beirut after accusing Hezbollah of violations, while Iran again signaled that Lebanon is part of any wider deal. <b>Mechanism:</b> Hezbollah is not controlled by Lebanon's negotiators, Israel does not accept a withdrawal without security guarantees, and Iran can retaliate across several theaters. <b>Why it matters:</b> one local strike can raise oil, insurance and food costs globally because it changes expectations about the Strait of Hormuz and a return to full US-Iran fighting. <b>Proof test:</b> a durable process needs verified lines, a channel for alleged violations and a sequence that gives each actor a reason not to strike first.`,stats:["Israel's June 7 strike was the first near Beirut since the latest US-supported Lebanon plan was announced.","Iran has made an end to fighting in Lebanon a condition of a broader settlement with Washington.","The conflict is already raising fuel and transport costs that the World Food Programme says are pushing millions closer to hunger."],sideA:["Phased diplomacy","A limited pause can survive violations if mediators rapidly investigate incidents and trade restraint for concrete withdrawals."],sideB:["Spoiler structure","Excluding Hezbollah from a bargain about Hezbollah ensures that enforcement will fail at the first disputed attack."],sideC:["Economic coercion","Hormuz and fuel prices may become the leverage that forces political compromise even when battlefield incentives do not."],sources:[S("AP Beirut strike", "https://apnews.com/article/28d80744e192ae0d5cce73a5a08af906"),S("Reuters", "https://ca.marketscreener.com/news/us-eyes-iranian-assets-for-gulf-allies-reconstruction-source-says-ce7f5dd2dd8bf226"),S("WFP / Reuters", "https://www.internazionale.it/ultime-notizie-reuters/2026/06/05/middle-east-conflict-pushing-millions-into-hunger-wfp-says")]},
{tag:"US Economy",headline:"The payroll surprise changes the Fed's risk map",deck:"The central bank now faces stronger demand at the same time that war raises energy and goods costs.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/United%20States%20Capitol%20-%20west%20front.jpg",imageAlt:"The west front of the United States Capitol",imageCredit:"Architect of the Capitol / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:United_States_Capitol_-_west_front.jpg",skeletonHTML:`<b>Baseline:</b> markets expected hiring to slow enough for the Fed to prioritize growth over inflation. <b>Change:</b> May payrolls rose 172,000 against an 85,000 consensus while unemployment stayed at 4.3%. <b>Transmission:</b> stronger labor demand supports consumption, raises bond yields and reduces the present value of long-duration technology earnings. <b>Conflict overlay:</b> energy prices add a supply shock, so the Fed cannot assume that solid growth is disinflationary. <b>Why it matters:</b> households may see mortgage and credit costs remain high even while employment looks healthy. <b>Proof test:</b> if CPI broadens beyond energy and wages accelerate, the hawkish case strengthens; if inflation cools and gains remain concentrated, the Fed can wait.`,stats:["Payrolls increased by 172,000 in May after an upwardly revised 179,000 in April.","The unemployment rate remained 4.3%, separating labor resilience from a renewed hiring boom.","The Nasdaq fell 4.2% after the report as yields rose and expensive semiconductor shares led losses."],sideA:["Soft landing","Employment income can sustain demand while supply chains and productivity absorb price pressure."],sideB:["Second inflation wave","Strong demand and costly energy can keep rates high or force renewed tightening."],sideC:["Composition problem","Headline strength may coexist with weakness if gains remain concentrated in a few service and public sectors."],sources:[S("BLS", "https://www.bls.gov/news.release/archives/empsit_06052026.htm"),S("Reuters jobs", "https://www.marketscreener.com/news/us-posts-another-month-of-strong-job-gains-in-may-unemployment-rate-steady-at-4-3-ce7f5dddde81f625"),S("Reuters markets", "https://www.livemint.com/market/wall-street-slumps-as-chips-slide-robust-jobs-data-stokes-fears-of-hawkish-fed/amp-11780685605057.html")]},
{tag:"Ukraine",headline:"The Chornobyl strike tests the boundary between conventional war and nuclear danger",deck:"No radiation release occurred, but repeated attacks near nuclear infrastructure erode the margin that makes accidents unlikely.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Chernobyl%20nuclear%20plant.jpg",imageAlt:"The Chornobyl nuclear power plant in Ukraine",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Chernobyl_nuclear_plant.jpg",skeletonHTML:`<b>Baseline:</b> Ukraine's nuclear facilities operate under wartime stress, with external power, staffing and physical protection treated as safety-critical. <b>Change:</b> Kyiv said a Russian drone struck spent-fuel storage near Chornobyl; radiation monitors showed no increase and Moscow denied responsibility. <b>Risk chain:</b> a direct hit, interception debris or loss of support systems can damage barriers even without an immediate release. <b>Political stakes:</b> nuclear allegations generate rapid public fear and can be used for escalation narratives before inspectors arrive. <b>Why it matters:</b> the norm against fighting around nuclear sites protects every state that relies on reactors and stored fuel. <b>Proof test:</b> imagery, IAEA access and engineering inspection must distinguish superficial damage from a degraded containment function.`,stats:["Radiation monitoring showed no spike after the reported June 7 strike.","Spent fuel remains radioactive after leaving a reactor and requires durable cooling and containment systems.","Chornobyl is decommissioned, but its waste and damaged reactor structures still require continuous management."],sideA:["Safety resilience","Engineered barriers and monitoring worked, showing that one strike need not become a radiological event."],sideB:["Normalization risk","Repeated near-misses make a serious accident more likely and weaken a global taboo."],sideC:["Verification contest","Independent inspectors may matter as much as military retaliation because attribution and damage claims shape escalation."],sources:[S("Reuters", "https://ca.marketscreener.com/news/russian-drone-hit-nuclear-fuel-storage-facility-near-chornobyl-ukraine-says-ce7f5dd2dd8ef626"),S("IAEA", "https://www.iaea.org/newscenter/focus/ukraine"),S("Commons image", "https://commons.wikimedia.org/wiki/File:Chernobyl_nuclear_plant.jpg")]},
{tag:"Global Health",headline:"Ebola control is becoming a state-capacity test",deck:"Money can buy vaccines, laboratories and transport, but not automatic access or community trust.",image:"https://www.cdc.gov/ebola/media/images/2024/04/Ebola_virus_purple.jpg",imageAlt:"Colorized Ebola virus particles",imageCredit:"CDC",imageCreditUrl:"https://www.cdc.gov/ebola/about/index.html",skeletonHTML:`<b>Baseline:</b> Ebola containment requires fast diagnosis, isolation, contact tracing, safe burial and trusted communication. <b>Change:</b> WHO and Africa CDC launched a $518 million plan while describing the outbreak as the fourth largest on record and admitting the response is still catching up. <b>Operational constraint:</b> fighting in eastern Congo blocks roads, displaces contacts and makes security escorts necessary, yet visibly militarized health work can suppress cooperation. <b>Regional stakes:</b> Uganda and neighboring states need border screening without turning fear into indiscriminate closure. <b>Why it matters:</b> each delayed case multiplies the tracing burden and raises the cost of containment. <b>Proof test:</b> falling unexplained deaths and shorter time from symptoms to isolation would show that surveillance is overtaking transmission.`,stats:["The joint response plan seeks $518 million for six months of containment and regional preparedness.","WHO says the outbreak is already the fourth largest on record.","Suspected-case totals can fall sharply when laboratory tests rule people out, so confirmed cases and unexplained deaths are more useful trend measures."],sideA:["Scale now","Large coordinated funding can expand laboratories, treatment and border readiness before spread accelerates."],sideB:["Access first","Money will underperform if armed groups, distrust and weak roads prevent early reporting."],sideC:["Regional diplomacy","Health corridors may create limited cooperation even where political mediation has stalled."],sources:[S("Reuters", "https://www.investing.com/news/world-news/who-announces-518-million-sixmonth-plan-to-fight-ebola-4728744"),S("WHO", "https://www.who.int/news-room/headlines"),S("US sanctions / Congo", "https://www.investing.com/news/world-news/us-imposes-sanctions-on-commanders-over-fighting-in-eastern-congo-4722871")]},
{tag:"Climate & Food",headline:"El Niño can turn several local shortages into one global price shock",deck:"The key risk is correlation: weather, energy and export policy can fail at the same time.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/El%20Nino%20regional%20impacts.png",imageAlt:"Map illustrating common regional impacts of El Niño",imageCredit:"NOAA / Wikimedia Commons",imageCreditUrl:"https://www.noaa.gov/education/resource-collections/weather-atmosphere/el-nino",skeletonHTML:`<b>Baseline:</b> food systems already face expensive fuel, fertilizer and humanitarian transport because of the Middle East war. <b>Change:</b> WMO now sees an 80% chance of El Niño in June-August and roughly 90% later, with a moderate or possibly strong event. <b>Transmission:</b> altered monsoons and heat can affect rice, palm oil, coffee, livestock and hydropower across different regions; governments then amplify scarcity if they restrict exports. <b>Human stakes:</b> poor households spend a larger share of income on food and energy, while aid agencies must buy and move supplies with fixed budgets. <b>Why it matters:</b> simultaneous shocks can move inflation and instability faster than annual crop totals suggest. <b>Proof test:</b> rainfall anomalies, crop-condition data and trade policy will reveal whether the forecast is becoming a price event.`,stats:["WMO estimates an 80% probability of El Niño during June-August 2026 and about 90% later in the forecast window.","WHO and WFP reporting already links the Middle East conflict to higher food and transport costs.","El Niño events typically last nine to 12 months, so agricultural effects can cross more than one planting season."],sideA:["Forecast advantage","Governments can adjust reserves, planting and early-warning systems before peak impacts."],sideB:["Compound shock","Climate change, war and export controls can overwhelm adaptation and humanitarian budgets."],sideC:["Policy amplifier","Trade restrictions and panic procurement may determine prices more than the global harvest total."],sources:[S("Reuters / WMO", "https://m.investing.com/news/world-news/un-urges-the-world-to-ready-for-extreme-heat-risk-from-el-nino-4721357?ampMode=1"),S("NOAA", "https://www.nesdis.noaa.gov/about/k-12-education/oceans-coasts/what-el-nino"),S("FAO", "https://www.fao.org/worldfoodsituation/foodpricesindex/en/")] }];
const opinion=[
{tag:"Guardian Foreign Affairs",title:"Trump's failure to maintain ceasefires is part of the new world disorder",author:"Simon Tisdall",pub:"The Guardian · June 7, 2026",thesis:"Ceasefires fail when leaders substitute announcements and force for professional, enforceable diplomacy.",text:`Tisdall argues that the collapsing Lebanon, Iran, Gaza and Ukraine tracks reveal a wider loss of organized peace processes, trusted intermediaries and respect for international rules. The argument is live because Israel's new Beirut strike followed a ceasefire announcement almost immediately. It matters beyond Trump because fragmented wars increasingly involve states and armed groups that no single negotiator can command. The strongest challenge is that process cannot substitute for leverage: diplomacy also fails when combatants still believe time and force favor them.`,claim:"Durable peace requires institutions, sequencing and enforcement, not a headline truce.",matters:"Connects repeated ceasefire failures to a weakened international order.",pushback:"Professional diplomacy still needs credible costs for parties that prefer continued war.",source:S("Read column", "https://www.theguardian.com/commentisfree/2026/jun/07/donald-trump-ceasefire-failure-ukraine-iran-gaza-lebanon-gaza")},
{tag:"Chatham House Analysis",title:"Iran and the US both think they are winning. They are both losing",author:"Sanam Vakil",pub:"The Guardian · June 4, 2026",thesis:"A ceasefire that limits all-out war without creating direct negotiation can harden into an unstable, expensive stalemate.",text:`Vakil separates endurance from victory: Iran retains leverage and regime survival, while Washington retains overwhelming force, but neither has converted those assets into a settlement. The latest Gulf exchanges and Lebanon escalation support her warning that the pause can absorb limited violence while accumulating political and economic costs. The argument matters because each side's belief that time is favorable reduces urgency for compromise. Pushback is that a managed stalemate can still be preferable to a rushed agreement if verification and domestic consent are not ready.`,claim:"Mutual overconfidence is the central barrier to a durable US-Iran bargain.",matters:"Explains why repeated violations have not yet produced either peace or total war.",pushback:"Delay may create bargaining space and prevent a weak deal from collapsing immediately.",source:S("Read essay", "https://www.theguardian.com/commentisfree/2026/jun/04/iran-us-winning-war-truth-losing-ceasefire")},
{tag:"Project Syndicate",title:"The Iran War Is Fueling a Global Debt Shock",author:"Moussa Faki Mahamat",pub:"Project Syndicate · June 4, 2026",thesis:"Food and energy inflation is becoming a sovereign borrowing crisis for countries that did not cause the war.",text:`Mahamat argues that higher import bills and interest rates force developing governments to spend more on debt service just as households need food and fuel support. The argument is timely because WFP says transport and commodity costs are already pushing millions closer to hunger. Its extemp value is the causal chain from a regional security crisis to budgets, health and climate investment across the Global South. The limitation is variation: exporters, countries with reserves and governments with targeted subsidies will not experience the same debt transmission.`,claim:"Treat the Middle East war as a development-finance emergency, not only an energy shock.",matters:"Shows how distant conflict can crowd out public services through borrowing costs.",pushback:"Country exposure differs sharply, so blanket debt relief may be poorly targeted.",source:S("Read essay", "https://www.project-syndicate.org/commentary/iran-war-price-shock-global-debt-shock-by-moussa-faki-mahamat-2026-06")},
{tag:"Project Syndicate",title:"Trump Wants to Privatize His Presidential Records",author:"Mark J. Rozell and Mitchel A. Sollenberger",pub:"Project Syndicate · June 3, 2026",thesis:"The Justice Department's attack on the Presidential Records Act would weaken a post-Watergate accountability system.",text:`The authors argue that declaring the <span class='jargon'>Presidential Records Act (the 1978 law making official presidential records public property)</span> unconstitutional would let presidents control evidence needed for oversight and history. The issue is live because a federal judge ordered compliance, creating a legal conflict while war and affordability dominate attention. The argument matters because transparency rules deter abuse only if administrations cannot redefine official records as personal property. Pushback is that constitutional separation-of-powers questions are real, and Congress cannot supervise every confidential presidential communication without limits.`,claim:"Presidential records are a public accountability asset, not private property.",matters:"Highlights a structural power change hidden beneath larger daily controversies.",pushback:"Archival access must still protect executive confidentiality and national security.",source:S("Read essay", "https://www2.project-syndicate.org/commentary/trump-justice-department-wrong-to-declare-presidential-records-act-unconstitutional-by-mark-j-rozell-and-mitchel-a-sollenberger-2026-06")},
{tag:"Pacific Essay",title:"Australia must engage Solomon Islands with mutual respect",author:"Connor Graham",pub:"The Guardian · June 3, 2026",thesis:"Canberra should treat Honiara as a political partner, not merely terrain in strategic competition with China.",text:`Graham argues that a change of government in Solomon Islands cannot be understood only through Beijing-Washington rivalry. The piece responds to a Pacific environment where security agreements, climate finance and development assistance are routinely filtered through great-power competition. It matters because paternalistic policy can produce the very resentment and diversification that Australia seeks to prevent. The counterargument is that strategic infrastructure and policing ties have regional consequences, so Australia cannot pretend that every bilateral choice is insulated from security competition.`,claim:"Respectful partnership is a more durable source of influence than pressure framed around China.",matters:"Adds local agency to a debate often reduced to a two-power contest.",pushback:"Regional security externalities still justify scrutiny of opaque foreign agreements.",source:S("Read essay", "https://www.theguardian.com/commentisfree/2026/jun/03/australia-solomon-islands-relationship-matthew-wale-china-beijing") }];
const editions={wire:["The Wire","Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer."],weekly:["The Weekly","The week in consequential developments, grouped like The Wire but selected for events still shaping the map today."],analytical:["The Analytical","Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points."],opinion:["The Opinion","Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."]};
const src=a=>`<div class="sources">${a.map(x=>`<a href="${x.u}" target="_blank" rel="noopener">${x.n} ↗</a>`).join("")}</div>`;
const learn=x=>`<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>${x.context}</p><h4>Three angles</h4><ul>${x.angles.map(a=>`<li>${a}</li>`).join("")}</ul><h4>What to watch</h4><p>${x.watch}</p></div></details>`;
function renderGroups(data){return Object.entries(data).map(([topic,items])=>`<details class="topic"><summary><span>${topic}</span><span class="count">${items.length} ${items.length===1?"story":"stories"}</span></summary><div class="stack">${items.map(x=>`<article class="wire-item"><h3 class="wire-headline">${x.h}</h3><p class="wire-prose">${x.proseHTML}</p>${src(x.sources)}${learn(x.learn)}</article>`).join("")}</div></details>`).join("")}
function renderAnalytical(){return analytical.map(x=>`<details class="afile"><summary><div><div class="tag">${x.tag}</div><h3>${x.headline}</h3><p class="deck">${x.deck}</p></div></summary><div class="analysis-body"><img class="analysis-img" src="${x.image}" alt="${x.imageAlt}"><div class="credit"><a href="${x.imageCreditUrl}" target="_blank" rel="noopener">Image: ${x.imageCredit} ↗</a></div><p class="walk">${x.skeletonHTML}</p><div class="stats"><h4>Key Stats With Setup</h4><ul>${x.stats.map(s=>`<li>${s}</li>`).join("")}</ul></div><h4 class="angles-title" style="margin-top:17px">Three Angles</h4><div class="angles">${[["a",x.sideA],["b",x.sideB],["c",x.sideC]].map(([c,v])=>`<div class="angle ${c}"><strong>${v[0]}</strong>${v[1]}</div>`).join("")}</div>${src(x.sources)}</div></details>`).join("")}
function renderOpinion(){return opinion.map(x=>`<article class="opinion-card"><div class="tag">${x.tag}</div><h3>${x.title}</h3><div class="by">${x.author} · ${x.pub}</div><p class="thesis">${x.thesis}</p><p>${x.text}</p><div class="op-grid"><div class="op-box"><strong>The Claim</strong>${x.claim}</div><div class="op-box"><strong>Why It Matters</strong>${x.matters}</div><div class="op-box"><strong>Pushback</strong>${x.pushback}</div></div>${src([x.source])}</article>`).join("")}
const nav=document.getElementById("nav"),content=document.getElementById("content");Object.entries(editions).forEach(([k,v])=>{const b=document.createElement("button");b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById("edition").textContent=editions[k][0];document.getElementById("description").textContent=editions[k][1];document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.edition===k));content.innerHTML=k==="wire"?renderGroups(wire):k==="weekly"?renderGroups(weekly):k==="analytical"?renderAnalytical():renderOpinion()}
document.getElementById("headline").innerHTML=`<div><div class="label">Headline of the Day · ${headline.topic}</div><h2>${headline.h}</h2><p>${headline.deck}</p></div><figure style="margin:0"><img class="headline-photo" src="${headline.image}" alt="${headline.imageAlt}"><figcaption class="credit"><a href="${headline.imageCreditUrl}" target="_blank" rel="noopener">Image: ${headline.imageCredit} ↗</a></figcaption></figure>`;
const saved=localStorage.getItem("dig-theme"),root=document.documentElement,toggle=document.getElementById("theme");function setTheme(t){root.dataset.theme=t;toggle.textContent=`Theme: ${t[0].toUpperCase()+t.slice(1)}`;localStorage.setItem("dig-theme",t)}setTheme(saved||"light");toggle.onclick=()=>setTheme(root.dataset.theme==="light"?"dark":"light");show("wire");
</script></body></html>
