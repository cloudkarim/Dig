const headline={topic:"Middle East / Energy",h:"A Lebanon ceasefire test becomes the gate to broader Iran diplomacy",deck:"The agreement lowered oil prices, but Hezbollah's rejection and continued Israeli strikes made implementation - not announcement - the decisive question.",image:"https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041",imageAlt:"Satellite view of the Strait of Hormuz between Iran and Oman",imageCredit:"NASA",imageCreditUrl:"https://www.nasa.gov/image-article/strait-of-hormuz/"};
const intros={wire:"Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer.",weekly:"The week in consequential developments, grouped like The Wire but selected for events still shaping the map today.",analytical:"Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points.",opinion:"Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."};
const titles={wire:"The Wire",weekly:"The Weekly",analytical:"The Analytical",opinion:"The Opinion"};
const wire=[
{topic:"US Economy",stories:[
{h:"Jobless claims rise before a high-stakes payroll report",proseHTML:`The US labor market has slowed from its post-pandemic pace without yet producing broad layoffs, a balance that has let the Federal Reserve keep rates steady while watching inflation. <span class="change">New unemployment claims rose more than expected to a four-month high, while a Reuters survey estimated May payroll growth at about 85,000 after 115,000 in April.</span> First-quarter productivity was also revised lower, though the longer trend remained firmer than the quarterly figure. Friday's payroll, unemployment, and wage data will show whether the economy is moving from controlled cooling toward a sharper employment break that could reopen the rate-cut debate.`,sources:[S("Reuters labor","https://ca.marketscreener.com/news/us-weekly-jobless-claims-increase-to-four-month-high-worker-productivity-revised-down-ce7f5ddcd08bf226"),S("BLS schedule","https://www.bls.gov/news.release/pdf/empsit.pdf")],learn:L("Claims are a fast but noisy measure; payrolls, unemployment, hours, and wages provide the broader labor-market picture.",["Fed angle: weaker hiring helps only if inflation expectations also cool.","Household angle: a low-hire environment can feel weak before layoffs surge.","AI angle: productivity gains could preserve output with slower headcount growth."],"Watch the May payroll total, revisions, unemployment rate, wage growth, and labor-force participation at 8:30 a.m. ET.")},
{h:"Oil relief remains conditional on Middle East implementation",proseHTML:`Energy markets have treated every regional ceasefire headline as provisional because the Strait of Hormuz remains severely disrupted and military exchanges continue around the Gulf. <span class="change">Oil gave back part of its recent rise after Israel and Lebanon announced a US-mediated ceasefire, but Reuters reported that the strait still carries only a fraction of normal traffic and that Iran talks remain incomplete.</span> A sustained decline would ease gasoline, freight, fertilizer, and headline inflation pressure; another breakdown would reach consumers through more than fuel alone. The market's next verdict will come from tanker movements and insurance costs rather than diplomatic wording.`,sources:[S("Reuters ceasefire","https://www.investing.com/news/world-news/lebanon-ceasefire-raises-hopes-of-progess-for-iran-deal-4726027"),S("Reuters markets","https://www.investing.com/news/economy-news/oil-jumps-on-mideast-missiles-while-ai-bulls-carry-stocks-higher-4723282")],learn:L("Hormuz normally carries roughly one-fifth of global oil and liquefied natural gas flows, plus major fertilizer feedstocks.",["Inflation: cheaper crude can quickly improve headline data.","Shipping: insurers may stay cautious even after politicians declare calm.","Diplomacy: Iran retains leverage while commercial transit remains impaired."],"Watch Brent crude, verified tanker passages, maritime insurance premiums, and weekend US-Iran talks.")}
]},
{topic:"US Politics",stories:[
{h:"House passes first Iran war-powers rebuke",proseHTML:`Congress has repeatedly struggled to enforce its constitutional role in decisions over military force, especially once a president has already begun operations. <span class="change">The House voted 215-208 to approve a war-powers resolution directing an end to US hostilities with Iran, with four Republicans joining Democrats.</span> The measure now faces an uncertain Senate path and an expected presidential veto, so it does not itself stop operations. Its significance is political and institutional: gasoline prices, a prolonged deployment, and stalled diplomacy have created the first successful chamber-level break with the administration over the three-month war.`,sources:[S("AP war powers","https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536"),S("White House position","https://www.whitehouse.gov/wp-content/uploads/2026/05/SAP-HCR86.pdf")],learn:L("The <span class="jargon">War Powers Resolution (the 1973 law requiring notification and generally limiting unauthorized hostilities)</span> has rarely forced a president to withdraw forces.",["Congress: the vote reasserts legislative ownership of war decisions.","Executive: the White House says a ceasefire ended the statutory clock.","Diplomatic: officials argue visible limits could weaken bargaining leverage."],"Watch the Senate vote, veto arithmetic, and whether courts are asked to define continuing hostilities.")},
{h:"Trump moves to install Todd Blanche permanently at Justice",proseHTML:`Todd Blanche became acting attorney general after President Trump fired Pam Bondi in April, placing the Justice Department under a former personal defense lawyer who had already served as deputy attorney general. <span class="change">Trump said he will nominate Blanche, 51, to lead the department permanently.</span> Blanche previously won Senate confirmation as deputy attorney general by 52-46, but a new confirmation fight will focus on prosecutorial independence, politically sensitive investigations, and the department's relationship with federal judges. The nomination also turns an acting arrangement into a direct institutional test for Republican senators.`,sources:[S("Reuters","https://www.ksl.com/article/51506817/trump-says-he-will-nominate-todd-blanche-as-us-attorney-general"),S("Axios","https://www.axios.com/2026/06/04/trump-nominate-todd-blanche-attorney-general")],learn:L("The attorney general is both a presidential appointee and the head of a department expected to apply federal law impartially.",["Loyalty: presidents are entitled to choose senior legal officials.","Independence: a former personal lawyer creates unusually sharp conflict concerns.","Senate: confirmation hearings can force disclosure of enforcement priorities."],"Watch the formal nomination, Judiciary Committee schedule, and Republican questions about recusal and independence.")}
]},
{topic:"Healthcare",stories:[
{h:"Attack on Congo Ebola burial team raises transmission risk",proseHTML:`Safe burials are a core Ebola-control measure because bodies remain highly infectious, but those protocols depend on community trust in responders. <span class="change">Residents in Katana, eastern Democratic Republic of Congo, attacked a specialized burial team, forced it to abandon a coffin, and later handled the body themselves, according to the health ministry.</span> Reuters reported more than 360 confirmed cases and at least 62 deaths in Congo, with additional cases in Uganda. The incident turns a security and trust failure into an epidemiological threat: one contested burial can generate new exposure chains while armed control and misinformation make contact tracing harder.`,sources:[S("Reuters","https://uk.marketscreener.com/news/congo-reports-attack-on-ebola-burial-team-as-cases-rise-ce7f5ddcd18bff24"),S("WHO outbreak","https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605")],learn:L("Bundibugyo is a rarer Ebola virus species without an approved species-specific vaccine or treatment, so classic containment tools carry more weight.",["Trust: coercive response can drive cases underground.","Conflict: rebel control fragments public-health authority.","Regional: cross-border movement requires shared surveillance."],"Watch new cases linked to Katana, attacks on clinics, Uganda tracing, and emergency funding.")},
{h:"WHO puts the hidden scale of unsafe food at 1.5 million deaths",proseHTML:`Foodborne illness is often counted as isolated diarrhea or poisoning rather than as a global systems problem involving sanitation, inspection, supply chains, and antimicrobial resistance. <span class="change">WHO released new estimates that unsafe food causes about 866 million illnesses and 1.5 million deaths each year, with young children facing the highest risk.</span> The burden is concentrated where refrigeration, clean water, laboratory surveillance, and regulatory enforcement are weakest. The policy implication is that food safety belongs in development and health-security budgets, not only in consumer inspection agencies after outbreaks occur.`,sources:[S("WHO release","https://www.who.int/news-room/headlines"),S("WHO food safety","https://www.who.int/health-topics/food-safety")],learn:L("Foodborne disease includes bacterial, viral, parasitic, and chemical hazards that can travel from farms and water systems through processing and retail.",["Prevention: sanitation and cold chains avert disease before hospitals are involved.","Equity: children in low-capacity systems bear disproportionate mortality.","Trade: weak traceability can spread local contamination across borders."],"Watch the detailed WHO burden report, country surveillance upgrades, and financing for laboratories and clean water.")}
]},
{topic:"Climate / Energy",stories:[
{h:"El Nino crop stress spreads across Asia before peak season",proseHTML:`Farmers across Asia entered the planting season already facing expensive fertilizer and diesel because of the Iran-war energy shock. <span class="change">Reuters found dry weather disrupting wheat, rice, and palm-oil production from India and Australia to Thailand and Indonesia as WMO raised the probability of El Nino during June-August to 80 percent and near or above 90 percent later in the year.</span> Wheat prices have risen about 20 percent in 2026, so weather damage would compound an existing input-cost shock rather than begin from a normal baseline. The risk is a transmission chain from rainfall deficits to lower planting, food inflation, subsidy pressure, and import stress in poorer countries.`,sources:[S("Reuters crops","https://www.marketscreener.com/news/hot-weather-hurts-asian-crops-as-powerful-el-nino-takes-shape-ce7f5ddcda8cf525"),S("WMO","https://public.wmo.int/news/media-centre/wmo-prepare-el-nino")],learn:L("<span class="jargon">El Nino (periodic warming of the central and eastern tropical Pacific that shifts global rainfall and temperature patterns)</span> affects regions differently and does not guarantee drought everywhere.",["Food: importers face higher prices if several crop belts fail together.","Fiscal: governments may expand subsidies or export controls.","Climate: warmer background conditions amplify heat and water stress."],"Watch monsoon onset, Australian wheat rainfall, Thai rice planting, and fertilizer availability.")},
{h:"Summer grid warnings move from capacity to timing",proseHTML:`North American grids generally have enough nameplate generation for ordinary summer demand, but heat waves, drought, plant outages, transmission limits, and fast data-center growth can coincide at the wrong hour. <span class="change">Federal and reliability assessments warned that early heat overlapping with maintenance outages and drought could strain several regions, while US authorities have repeatedly delayed plant retirements to preserve more than 4 gigawatts of capacity.</span> The practical issue is not simply annual electricity supply; it is whether power is available in the right place during evening peaks. Reliability decisions will affect household bills, emissions, and the pace at which utilities connect new AI loads.`,sources:[S("FERC assessment","https://www.ferc.gov/sites/default/files/2026-05/26_Summer%20Assessment_0529.pdf"),S("NERC snapshot","https://www.nerc.com/globalassets/our-work/assessments/2026-summer-reliability-assessment-snapshot.pdf")],learn:L("<span class="jargon">Resource adequacy (whether enough power can be delivered during peak demand)</span> depends on transmission, fuel, weather, and outage timing, not only total generating capacity.",["Reliability: keeping old plants open can reduce near-term blackout risk.","Cost: emergency capacity and grid upgrades raise bills.","Transition: repeated delays can lock in fossil generation."],"Watch regional heat forecasts, PJM and ERCOT alerts, forced outages, and data-center connection rules.")}
]},
{topic:"Tech / AI",stories:[
{h:"US chip controls target Chinese-owned buyers outside China",proseHTML:`Advanced-chip export controls have focused on shipments into China, leaving room for Chinese companies to buy through foreign subsidiaries or third-country data centers. <span class="change">The Commerce Department issued guidance closing that ownership loophole for top Nvidia and AMD accelerators, including Blackwell, Rubin, and MI350x products.</span> The <span class="jargon">BIS (Bureau of Industry and Security, the Commerce Department export-control agency)</span> move shifts enforcement from geography toward corporate control and end users. Its effectiveness will depend on ownership tracing, foundry due diligence, and cooperation in transshipment hubs rather than on the rule text alone.`,sources:[S("Reuters","https://www.investing.com/news/stock-market-news/us-takes-step-to-halt-nvidia-ai-chip-shipments-to-chinese-firms-outside-china-4717939"),S("Industry report","https://www.tomshardware.com/tech-industry/us-closes-loophole-that-allowed-chinese-owned-subsidiaries-located-outside-china-to-buy-ai-chips-report-claims-that-hundreds-of-thousands-of-advanced-ai-chips-have-been-acquired-through-bis-blind-spot")],learn:L("Export controls work only if regulators can identify beneficial ownership and prevent remote access, resale, and false end-user declarations.",["Security: closing subsidiaries can slow military and frontier-model access.","Commerce: broader checks add cost and uncertainty for legitimate buyers.","Enforcement: Taiwan, Malaysia, Singapore, and cloud providers become pivotal."],"Watch BIS enforcement cases, foundry guidance, and whether controls expand to remote cloud compute.")}
]},
{topic:"Latin America",stories:[
{h:"Colombia election authority rebuts Petro's fraud claim",proseHTML:`Colombia's presidential first round sent right-wing Abelardo de la Espriella and leftist Ivan Cepeda toward a polarized runoff, while President Gustavo Petro challenged the preliminary count. <span class="change">The national registry said file hashes from May 26, May 31, and June 4 were identical, rebutting Petro's claim that roughly 885,000 voter records had been added or altered.</span> Petro also backed away from a proposed constituent-assembly drive after broad criticism. The immediate stakes are not only who wins the runoff but whether both camps accept administrative evidence and preserve confidence in a close election.`,sources:[S("El Pais results","https://elpais.com/america-colombia/elecciones-presidenciales/2026-06-04/resultados-de-las-elecciones-en-colombia-2026-en-vivo.html"),S("OAS mission","https://www.oas.org/fpdb/press/2026_EOM_Colombia_Presidential_Elections_Second_Report_ENG.pdf")],learn:L("A cryptographic hash is a digital fingerprint used to show whether a file changed; matching hashes strongly support file integrity.",["Institutional: technical evidence can contain a legitimacy crisis only if leaders accept it.","Electoral: fraud rhetoric may mobilize supporters before the runoff.","Security: armed-group violence makes trust in administration especially important."],"Watch runoff polling, observer reports, campaign violence, and Petro's public language.")}
]},
{topic:"Africa / Middle East",stories:[
{h:"Hezbollah rejection clouds the new Lebanon ceasefire",proseHTML:`US-mediated talks produced an agreement between Israel and Lebanon requiring Hezbollah fire to stop and its fighters to leave areas south of the Litani River. <span class="change">Hezbollah rejected the terms, Israel said it would keep striking for now, and fighting killed Lebanese civilians, an Israeli soldier, and a UN peacekeeper even as Lebanese troops entered one vacated village.</span> Lebanon's government lacks the easy capacity to disarm Hezbollah by force, while Israel has not set a full withdrawal timetable. That means the agreement is a framework among states whose success depends on an armed group that did not consent to it.`,sources:[S("AP","https://apnews.com/article/06ea585ce43fd28e26c4d21d46a4df83"),S("Reuters","https://www.investing.com/news/world-news/lebanon-ceasefire-raises-hopes-of-progess-for-iran-deal-4726027")],learn:L("The Litani River is a longstanding reference line in UN-backed arrangements intended to keep armed groups away from the Israel-Lebanon border.",["Lebanese state: the deal could expand sovereign control if backed with resources.","Hezbollah: withdrawal under fire is framed as surrender.","Israel: continued strikes can weaken compliance incentives."],"Watch verifiable Israeli withdrawals, Lebanese army deployments, Hezbollah fire, and talks scheduled later in June.")},
{h:"Cuba's fuel blockade becomes a sanitation emergency",proseHTML:`Cuba's fuel shortage has already produced long blackouts, transport cuts, and reduced hospital and municipal services. <span class="change">AP reported that stalled garbage collection has left refuse accumulating across Havana during hot weather, adding disease and pest risks to the electricity crisis.</span> Reuters has described the broader economy as a full-scale crisis after US pressure cut oil flows and previous suppliers stopped shipments. The second-order effect is visible governance failure: when trucks, pumps, refrigeration, and disposal systems stop together, an energy shock becomes a public-health and legitimacy problem.`,sources:[S("AP Havana","https://apnews.com/article/609fcae75153ad25e50283b912debd1b"),S("Reuters Cuba","https://www.investing.com/news/world-news/how-cubans-keep-going-despite-us-pressure-and-fuel-blockade-4723893")],learn:L("Cuba's grid relies heavily on aging oil-fired plants and imported fuel, leaving few substitutes when both generation and transport supplies tighten.",["Humanitarian: sanitation and food spoilage can raise preventable illness.","Pressure: Washington argues economic coercion can force political change.","Resilience: informal transport and neighborhood systems cushion but cannot replace fuel."],"Watch oil deliveries, blackout duration, protests, hospital conditions, and hurricane-season preparedness.")}
]},
{topic:"Europe / EU",stories:[
{h:"Ukraine and Moldova clear a major EU accession gate",proseHTML:`Ukraine and Moldova have completed screening work for EU membership, but opening negotiation clusters requires unanimity among all 27 member states. <span class="change">The EU presidency said every member backed preparations to open the first cluster, covering rule of law and democratic standards, after Ukraine and Hungary reached an agreement on minority rights.</span> The step does not guarantee membership or a date, but it converts a politically blocked process into a formal reform track. For Ukraine, accession is becoming both a wartime morale commitment and a postwar economic-security anchor.`,sources:[S("Reuters","https://wsau.com/2026/06/03/all-eu-members-greenlight-first-step-in-accession-talks-ukraine-pm-says/"),S("EU enlargement","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],learn:L("EU accession clusters group negotiating chapters; the fundamentals cluster covers courts, rights, public administration, procurement, and democratic institutions.",["Ukraine: movement rewards reforms and signals durable Western integration.","EU: enlargement can strengthen security but strain budgets and governance.","Hungary: minority-rights bargains show how one member can set conditions."],"Watch the formal intergovernmental conference, benchmarks, and whether June talks open on schedule.")}
]},
{topic:"China / Asia",stories:[
{h:"Tiananmen anniversary sharpens the US-China memory divide",proseHTML:`China suppresses public discussion of the military crackdown that ended the 1989 Tiananmen protests, while foreign governments and Taiwan mark the anniversary as a human-rights issue. <span class="change">Beijing accused Secretary of State Marco Rubio of smearing China's political system after he said censorship could not erase the memory; Taiwan separately urged China to confront the history.</span> The exchange will not change trade policy by itself, but it shows how strategic competition now includes control over historical narrative and political legitimacy. It also reinforces Taiwan's effort to contrast its democracy with mainland authoritarian rule.`,sources:[S("Reuters","https://www.investing.com/news/world-news/taiwan-presses-china-to-confront-tiananmen-past-4725620"),S("US statement","https://www.state.gov/anniversary-of-the-tiananmen-square-massacre/")],learn:L("The June 4 crackdown remains censored in mainland media and education, while commemorations have also been constrained in Hong Kong.",["Rights: remembrance challenges state control of political history.","Diplomacy: annual statements reinforce an ideological divide.","Taiwan: the anniversary supports democratic identity and soft power."],"Watch censorship enforcement, Hong Kong prosecutions, and whether the clash spills into trade or summit planning.")}
]},
{topic:"War / Active Conflicts",stories:[
{h:"House couples Ukraine aid with pressure on Russia",proseHTML:`US support for Ukraine has become entangled with the administration's search for negotiations and Republican resistance to new commitments. <span class="change">The House passed a bill 226-195 providing more than $1 billion in security and reconstruction aid, making another $8 billion available through defense loans, and targeting major parts of Russia's economy with sanctions.</span> Supporters forced the vote through a discharge petition, bypassing leadership. The result shows a cross-party majority for additional pressure even as the White House argues that congressionally fixed measures could reduce flexibility in talks.`,sources:[S("AP","https://apnews.com/article/c01c9e068b63d195d26e3134ed586a71"),S("EU accession step","https://uk.marketscreener.com/news/ukraine-s-zelenskiy-pledges-clear-timetable-of-talks-on-eu-membership-ce7f5dddd981f02c")],learn:L("A discharge petition lets a House majority force a bill to the floor despite committee or leadership opposition.",["Deterrence: aid and sanctions can raise Russia's cost of prolonging war.","Diplomacy: fixed pressure may strengthen or complicate negotiations.","Congress: the vote reveals foreign-policy coalitions outside party leadership."],"Watch Senate action, White House response, sanctions targets, and air-defense deliveries.")}
]}
];
const weekly=[
{topic:"US Economy",stories:[
{h:"Labor data shifted from resilience toward slower hiring",proseHTML:`US job openings rose strongly in April, but claims later reached a four-month high and economists marked down expected May payroll growth. <span class="change">The week's combined signal was not mass layoffs but a labor market with fewer easy hires and more sensitivity to Friday's report.</span> That matters because the Fed needs cooling demand without a collapse while oil keeps inflation risk elevated.`,sources:[S("Reuters claims","https://ca.marketscreener.com/news/us-weekly-jobless-claims-increase-to-four-month-high-worker-productivity-revised-down-ce7f5ddcd08bf226"),S("BLS","https://www.bls.gov/news.release/pdf/empsit.pdf")],learn:L("A low-hire, low-fire market can weaken worker bargaining before unemployment jumps.",["Soft landing remains possible.","Revisions could reveal hidden weakness.","Oil limits the Fed's room to respond."],"Watch payrolls, wages, and revisions.")},
{h:"AI stocks and oil told different economic stories",proseHTML:`Technology shares pushed major indexes toward records while renewed Gulf fighting sent crude higher and lifted bond yields. <span class="change">The week exposed a split between concentrated AI optimism and economy-wide exposure to fuel, freight, and financing costs.</span> Strong benchmarks therefore did not mean broad relief for households or import-heavy businesses.`,sources:[S("Reuters markets","https://www.investing.com/news/economy-news/oil-jumps-on-mideast-missiles-while-ai-bulls-carry-stocks-higher-4723282"),S("IMF outlook","https://www.imf.org/en/Publications/WEO")],learn:L("Large technology companies can lift capitalization-weighted indexes even when many sectors face weaker margins.",["Bull: AI spending supports investment.","Bear: oil and yields squeeze demand.","Distribution: index gains may stay narrow."],"Watch market breadth, gasoline, and Treasury yields.")}
]},
{topic:"US Politics",stories:[
{h:"Congress broke with Trump twice on foreign policy",proseHTML:`The House first approved an Iran war-powers resolution and then passed a Ukraine aid-and-sanctions bill over leadership objections. <span class="change">Together, the votes showed that shifting coalitions can still constrain the White House agenda even in a Republican-led chamber.</span> Neither measure is guaranteed to become law, but both create political costs and a clearer congressional record.`,sources:[S("AP Iran vote","https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536"),S("AP Ukraine bill","https://apnews.com/article/c01c9e068b63d195d26e3134ed586a71")],learn:L("Discharge petitions and privileged war-powers procedures can bypass leadership control.",["Institutional: Congress is testing dormant authorities.","Partisan: small Republican defections matter in a narrow House.","Electoral: fuel prices connect foreign policy to midterms."],"Watch Senate votes and veto threats.")},
{h:"Justice Department leadership moved toward a confirmation fight",proseHTML:`Pam Bondi's April firing left Todd Blanche running the Justice Department in an acting role. <span class="change">Trump's decision to nominate his former personal lawyer permanently made DOJ independence a formal Senate question rather than an internal staffing issue.</span> The hearings will become a proxy debate over politically sensitive prosecutions and executive control.`,sources:[S("Reuters","https://www.ksl.com/article/51506817/trump-says-he-will-nominate-todd-blanche-as-us-attorney-general"),S("Axios","https://www.axios.com/2026/06/04/trump-nominate-todd-blanche-attorney-general")],learn:L("Senate confirmation does not eliminate presidential control, but it forces public commitments and testimony.",["Experience: Blanche has prosecutorial and management credentials.","Conflict: personal representation raises trust concerns.","Oversight: hearings can define recusal expectations."],"Watch committee documents and hearing dates.")},
{h:"Supreme Court preserved agency enforcement tools",proseHTML:`After earlier decisions limiting administrative power, companies challenged the SEC's disgorgement authority and the FCC's process for imposing fines. <span class="change">The Court rejected both challenges on June 4 and separately backed a generic drugmaker in a patent dispute involving a narrow, or skinny, label.</span> The rulings show the Court is not uniformly dismantling agencies and may protect lower-cost generic entry.`,sources:[S("Reuters docket","https://m.investing.com/news/stock-market-news/factboxtop-cases-on-the-us-supreme-courts-docket-4727195?ampMode=1"),S("Reuters generics","https://www.investing.com/news/stock-market-news/us-supreme-court-backs-generic-drugmaker-in-skinny-label-patent-case-4726976")],learn:L("Disgorgement returns ill-gotten gains; a skinny label omits patented uses from a generic drug's approved instructions.",["Agency: procedural limits do not erase enforcement.","Business: FCC fines survive initial agency assessment.","Health: generic makers gain patent clarity."],"Watch remaining June cases on executive power and citizenship.")}
]},
{topic:"Healthcare",stories:[
{h:"Ebola response entered a trust-and-security phase",proseHTML:`WHO leaders urged safe burials and treatment as the Bundibugyo outbreak grew across Congo and Uganda. <span class="change">Attacks on burial teams and protests over a US quarantine facility in Kenya showed that response legitimacy is now as important as medical logistics.</span> With no approved species-specific vaccine, hidden exposure and delayed reporting carry outsized risk.`,sources:[S("Reuters burial attack","https://uk.marketscreener.com/news/congo-reports-attack-on-ebola-burial-team-as-cases-rise-ce7f5ddcd18bff24"),S("WHO","https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605")],learn:L("Outbreak control fails when communities avoid clinics or handle infectious bodies outside protocols.",["Trust can stop chains.","Conflict fragments authority.","Travel controls can provoke backlash."],"Watch attack-linked cases and cross-border tracing.")},
{h:"Measles exposed slow erosion beneath high coverage figures",proseHTML:`Bangladesh once stood as a vaccination success, but gaps among mobile, urban-poor, and hard-to-reach children accumulated after pandemic disruption and declining trust. <span class="change">The government launched an emergency campaign targeting more than 1.2 million children in 18 high-risk districts as suspected cases exceeded 62,000 in 2025-26.</span> The lesson extends beyond Bangladesh: national averages can conceal clusters below the roughly 95 percent coverage needed for measles herd protection.`,sources:[S("Project Syndicate","https://www.project-syndicate.org/commentary/measles-outbreak-in-bangladesh-reflects-institutional-failures-that-long-went-unnoticed-by-m-niaz-asadullah-and-zia-sadique-2026-06"),S("WHO measles","https://www.who.int/news-room/fact-sheets/detail/measles")],learn:L("Measles is so contagious that small immunity gaps can sustain outbreaks.",["Supply: campaigns need reliable vaccines.","Demand: misinformation and fatigue reduce uptake.","Governance: aggregate coverage can hide exclusion."],"Watch second-dose completion and campaign reach.")}
]},
{topic:"Climate / Energy",stories:[
{h:"WMO told governments to prepare for El Nino",proseHTML:`Pacific subsurface waters warmed sharply after a weak La Nina period. <span class="change">WMO put the chance of El Nino in June-August at 80 percent and continuation later in 2026 near or above 90 percent, with above-normal temperatures forecast across almost the entire globe.</span> Seasonal warnings give governments lead time for drought, flood, heat, crop, and health planning, but only if budgets move before damage appears.`,sources:[S("WMO","https://public.wmo.int/news/media-centre/wmo-prepare-el-nino"),S("UN Geneva","https://www.ungeneva.org/en/news-media/news/2026/06/119205/el-nino-confirmed-set-fuel-more-extreme-weather-says-wmo")],learn:L("El Nino shifts rainfall differently by region and interacts with climate change rather than replacing it.",["Preparedness: early warnings can reduce deaths.","Agriculture: planting choices must move now.","Finance: humanitarian needs can be pre-positioned."],"Watch monsoons, Horn of Africa rain, and ocean temperatures.")},
{h:"Asia's farms absorbed weather and war shocks together",proseHTML:`Dry conditions reduced planting prospects across major Asian crop regions while fertilizer and diesel remained expensive. <span class="change">Reuters reported wheat prices about 20 percent higher in 2026 and identified stress across Indian, Australian, Thai, and Indonesian production zones.</span> A synchronized crop shortfall would be more politically dangerous than a single-country failure because importers have fewer substitutes.`,sources:[S("Reuters crops","https://www.marketscreener.com/news/hot-weather-hurts-asian-crops-as-powerful-el-nino-takes-shape-ce7f5ddcda8cf525"),S("FAO food prices","https://www.fao.org/worldfoodsituation/foodpricesindex/en/")],learn:L("Food shocks spread through trade restrictions, currencies, fertilizer, and transport as well as harvest volume.",["Consumers face inflation.","Farmers face input scarcity.","Governments may restrict exports."],"Watch rice policy, wheat yields, and fertilizer shipments.")}
]},
{topic:"Tech / AI",stories:[
{h:"Chip controls moved from borders to ownership",proseHTML:`Chinese firms could use overseas subsidiaries to buy advanced accelerators without the licenses required for direct China sales. <span class="change">US guidance closed that route, while Taiwan pursued separate smuggling cases involving servers and forged documents.</span> The enforcement frontier is now beneficial ownership, cloud access, and transshipment rather than a simple destination list.`,sources:[S("Reuters control","https://www.investing.com/news/stock-market-news/us-takes-step-to-halt-nvidia-ai-chip-shipments-to-chinese-firms-outside-china-4717939"),S("AP Taiwan probe","https://apnews.com/article/175dfa061ade223086872c5810905815")],learn:L("Hardware rules leak when buyers can reorganize or rent compute remotely.",["Controls can raise evasion cost.","Broad rules can burden neutral markets.","Partner enforcement determines results."],"Watch BIS cases and cloud-compute rules.")},
{h:"Data-center opposition became an AI policy constraint",proseHTML:`AI infrastructure growth is increasingly visible through electricity bills, water demand, land use, and transmission construction. <span class="change">Google proposed water standards, Microsoft promoted closed-loop cooling, and analysts documented rising public opposition as projects reached local permitting decisions.</span> The political bargain is shifting from national enthusiasm for AI toward demands that developers pay for the infrastructure and disclose site-level impacts.`,sources:[S("Axios water","https://www.axios.com/2026/06/03/google-pushes-water-standards-data-center-backlash"),S("Project Syndicate","https://www.project-syndicate.org/commentary/democratic-opposition-to-ai-data-centers-could-protect-us-from-bubble-by-angela-huyue-zhang-2026-06")],learn:L("Data centers are local physical facilities even when their services are global.",["Growth: delays can constrain AI deployment.","Equity: ratepayers resist subsidizing private loads.","Innovation: cooling and power design can reduce impact."],"Watch disclosure rules, interconnection queues, and local elections.")}
]},
{topic:"Latin America",stories:[
{h:"Colombia's runoff opened with an election-integrity dispute",proseHTML:`The first round produced a close ideological contest and immediate claims by President Petro that voter files were manipulated. <span class="change">The registry published matching hashes and rejected the allegation, while Petro's camp dropped a constituent-assembly push.</span> The week made institutional acceptance, not only candidate platforms, central to the runoff.`,sources:[S("El Pais","https://elpais.com/america-colombia/elecciones-presidenciales/2026-06-04/resultados-de-las-elecciones-en-colombia-2026-en-vivo.html"),S("OAS","https://www.oas.org/fpdb/press/2026_EOM_Colombia_Presidential_Elections_Second_Report_ENG.pdf")],learn:L("Close elections become dangerous when leaders attack neutral administration without evidence.",["Transparency can restore trust.","Claims may still mobilize bases.","Observers matter in the runoff."],"Watch audits, debates, and campaign violence.")},
{h:"Cuba's energy crisis spread into ordinary urban services",proseHTML:`Fuel shortages and blackouts had already cut transport, tourism, and industrial activity. <span class="change">This week Reuters chronicled household survival under the blockade and AP showed garbage accumulation turning the shortage into a sanitation emergency.</span> The crisis demonstrates how energy denial cascades through food, health, municipal services, and political stability.`,sources:[S("Reuters","https://www.investing.com/news/world-news/how-cubans-keep-going-despite-us-pressure-and-fuel-blockade-4723893"),S("AP","https://apnews.com/article/609fcae75153ad25e50283b912debd1b")],learn:L("Aging oil-based infrastructure gives Cuba little buffer when imports collapse.",["Sanctions seek leverage.","Civilians bear service losses.","Informal adaptation has limits."],"Watch fuel arrivals, protests, and public-health alerts.")}
]},
{topic:"Africa / Middle East",stories:[
{h:"Lebanon became the hinge in Iran diplomacy",proseHTML:`Iran linked a broader settlement to an end to Israeli operations in Lebanon, while Israel sought security zones free of Hezbollah. <span class="change">US-mediated state-to-state terms were announced, but Hezbollah rejected them and Israel kept striking.</span> The week showed why a ceasefire label is weaker than verified withdrawal, command compliance, and enforceable sequencing.`,sources:[S("Reuters","https://www.investing.com/news/world-news/lebanon-ceasefire-raises-hopes-of-progess-for-iran-deal-4726027"),S("AP","https://apnews.com/article/06ea585ce43fd28e26c4d21d46a4df83")],learn:L("The agreement joins several conflicts whose actors do not share one chain of command.",["Diplomacy can separate files.","Hezbollah can veto through force.","Israel can undermine trust through continued strikes."],"Watch south-Lebanon verification and Iran talks.")},
{h:"Eastern Congo combined war, sanctions, and epidemic risk",proseHTML:`US mediation has not ended fighting involving M23, government forces, and other armed groups. <span class="change">Washington sanctioned commanders accused of driving conflict, while an attack on an Ebola burial team showed how armed fragmentation directly weakens disease containment.</span> Minerals diplomacy, civilian protection, and public health are therefore parts of the same governance problem.`,sources:[S("Reuters sanctions","https://ca.marketscreener.com/news/us-imposes-sanctions-on-commanders-over-fighting-in-eastern-congo-ce7f5ddede8aff26"),S("Reuters Ebola","https://uk.marketscreener.com/news/congo-reports-attack-on-ebola-burial-team-as-cases-rise-ce7f5ddcd18bff24")],learn:L("Sanctions can isolate commanders but do not automatically change battlefield incentives.",["Security affects tracing.","Mineral interests complicate mediation.","Local trust determines health access."],"Watch sanctions enforcement and M23-held outbreak areas.")},
{h:"Sudan's war continued to widen beyond Darfur",proseHTML:`The army and RSF-centered alliance remained locked across Kordofan and Blue Nile, with displacement rising along the Ethiopian border. <span class="change">The week's reported attack around Al-Barka reinforced that Blue Nile is an active front rather than a peripheral spillover.</span> A wider front stretches humanitarian access and raises the risk of regional involvement.`,sources:[S("Security Council Report","https://www.securitycouncilreport.org/atf/cf/%7B65BFCF9B-6D27-4E9C-8CD3-CF6E4FF96FF9%7D/2026_06_forecast.pdf"),S("Africa Center","https://africacenter.org/daily-media-review/africa-media-review-for-june-4-2026/")],learn:L("Blue Nile borders Ethiopia and South Sudan and has its own history of rebellion and displacement.",["Regionalization increases escalation risk.","Access worsens with more fronts.","Drones alter rear-area security."],"Watch Roseires, Kurmuk, and aid corridors.")}
]},
{topic:"Europe / EU",stories:[
{h:"Ukraine and Moldova regained accession momentum",proseHTML:`Hungarian objections had blocked the opening of the fundamentals cluster despite completed screening. <span class="change">An agreement on minority rights cleared unanimous support for preparations to open negotiations.</span> The step keeps enlargement credible while placing rule-of-law benchmarks at the center.`,sources:[S("Reuters","https://wsau.com/2026/06/03/all-eu-members-greenlight-first-step-in-accession-talks-ukraine-pm-says/"),S("EU","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],learn:L("Unanimity gives each member leverage over accession stages.",["Credibility rewards reforms.","Costs create future resistance.","Minority rights can unlock vetoes."],"Watch formal cluster opening.")},
{h:"EU debated narrower protection for Ukrainian fighting-age men",proseHTML:`The Temporary Protection Directive gives millions of Ukrainians residence and work rights through March 2027. <span class="change">Ministers broadly discussed limiting new access for military-age men, while preserving protection already granted.</span> The proposal exposes tension between refugee protection and Ukraine's manpower needs.`,sources:[S("Reuters","https://uk.marketscreener.com/news/eu-considers-limiting-protection-for-ukrainian-men-of-fighting-age-ce7f5ddddb8af222"),S("Eurostat","https://ec.europa.eu/eurostat/statistics-explained/index.php?title=Temporary_protection_for_persons_fleeing_Ukraine_-_monthly_statistics")],learn:L("Temporary protection is collective status, distinct from individual asylum claims.",["Ukraine seeks manpower.","EU states face legal obligations.","Restrictions may create unequal treatment."],"Watch a Commission proposal and legal review.")}
]},
{topic:"China / Asia",stories:[
{h:"Taiwan's deterrence planning emphasized blockade survival",proseHTML:`Chinese military pressure increasingly includes patrols and scenarios designed to isolate the island rather than only a direct amphibious assault. <span class="change">Reuters calculations reported Taiwan plans to lift its anti-ship missile arsenal above 1,800 by early 2029.</span> The buildout aims to make a blockade or invasion more costly, but survivability, targeting, and resupply matter as much as inventory.`,sources:[S("Regional brief","https://www.fdd.org/overnight-brief/june-4-2026/"),S("Taiwan defense","https://www.mnd.gov.tw/English/")],learn:L("Anti-ship missiles support asymmetric defense by threatening larger naval platforms from dispersed launchers.",["Deterrence raises expected cost.","China can target launch networks.","US delivery timelines remain critical."],"Watch procurement, dispersal, and exercises.")},
{h:"The Tiananmen anniversary revived ideological competition",proseHTML:`Beijing's domestic censorship contrasts with annual statements from Washington and Taipei. <span class="change">This year China directly attacked Rubio's statement while Taiwan urged historical accountability.</span> The dispute reinforces the political-system dimension of US-China rivalry alongside trade and military competition.`,sources:[S("Reuters","https://www.investing.com/news/world-news/taiwan-presses-china-to-confront-tiananmen-past-4725620"),S("US State Department","https://www.state.gov/anniversary-of-the-tiananmen-square-massacre/")],learn:L("Memory politics shapes legitimacy and democratic identity.",["China defends narrative control.","Taiwan differentiates its system.","US statements signal values competition."],"Watch censorship and diplomatic retaliation.")}
]},
{topic:"War / Active Conflicts",stories:[
{h:"Air-defense scarcity linked Ukraine, Iran, and Taiwan",proseHTML:`Patriot and THAAD interceptors are demanded simultaneously for Ukraine, Gulf bases, Israel, and Indo-Pacific plans. <span class="change">Reporting this week emphasized Russia's effort to exploit Ukraine's Patriot shortage while Congress pushed additional aid.</span> The strategic constraint is industrial: promises across theaters exceed near-term replacement capacity.`,sources:[S("Guardian","https://www.theguardian.com/world/2026/jun/02/patriot-missile-shortage-window-vulnerability-russia-exploiting-ukraine"),S("AP aid bill","https://apnews.com/article/c01c9e068b63d195d26e3134ed586a71")],learn:L("Layered defense combines expensive interceptors with cheaper guns, electronic warfare, and counter-drone systems.",["Production can restore endurance.","Cost exchange may favor attackers.","Allocation creates alliance tradeoffs."],"Watch contracts, deliveries, and strike intensity.")},
{h:"Declared ceasefires failed the civilian test",proseHTML:`Gaza, Lebanon, and Iran all had declared pauses or frameworks, yet strikes and combat continued. <span class="change">Israeli strikes killed at least nine Palestinians in Gaza on June 4, while Lebanon fighting continued after the new agreement.</span> For civilians, aid access, withdrawal, and casualty trends are more meaningful than the legal label attached to the conflict.`,sources:[S("Reuters Gaza","https://www.investing.com/news/world-news/israeli-strikes-kill-nine-people-in-gaza-medics-say-4725745"),S("AP ceasefires","https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae")],learn:L("A ceasefire can be partial, conditional, geographically limited, or repeatedly violated.",["Humanitarian metrics test reality.","Ambiguous terms enable blame shifting.","Monitoring can reduce disputes."],"Watch aid flows, verified violations, and withdrawals.")}
]}
];
const analytical=[
{tag:"Middle East / Energy",headline:"Lebanon's ceasefire is an implementation test for the entire Iran exit",deck:"A state-to-state agreement cannot stabilize markets unless Hezbollah, Israel, Lebanon, Iran, and commercial shippers change behavior in sequence.",image:"https://www.nasa.gov/wp-content/uploads/2023/03/iss064e046338.jpg?w=1041",imageAlt:"Satellite view of the Strait of Hormuz",imageCredit:"NASA",imageCreditUrl:"https://www.nasa.gov/image-article/strait-of-hormuz/",skeletonHTML:`<strong>Baseline:</strong> Iran has tied a durable settlement with Washington to an end to Israel's Lebanon campaign, while Israel says any withdrawal must leave Hezbollah unable to fire from the south. <strong>Move:</strong> US-mediated talks produced ceasefire terms between Israel and Lebanon, but Hezbollah rejected them and Israel continued strikes. <strong>Shift:</strong> The negotiation has moved from finding words acceptable to governments toward sequencing actions by actors that do not share one command structure. <strong>Why it matters:</strong> If Israeli withdrawal, Lebanese deployment, Hezbollah cessation, and Hormuz reopening cannot be verified in parallel, each side can claim compliance while retaining a reason to keep fighting. Commercial insurers will discount the agreement until physical risk falls.`,stats:["The House war-powers resolution passed 215-208, showing domestic pressure on the US timetable.","Reuters reported roughly one-fifth of global oil and LNG normally moves through Hormuz, which remains severely disrupted.","AP reported more than 3,500 deaths and over 1.2 million displaced in Lebanon during the conflict."],sideA:{label:"Side A - sequencing can work",text:"A narrow, monitored exchange of withdrawals and security-zone deployments can lower risk before every political dispute is solved."},sideB:{label:"Side B - absent consent is fatal",text:"Hezbollah's rejection and Israel's continuing strikes mean the principal battlefield actors have not accepted the same deal."},sideC:{label:"Wildcard - markets verify first",text:"Tanker traffic, insurance premiums, and oil prices may reveal real compliance faster than official statements."},sources:[S("Reuters","https://www.investing.com/news/world-news/lebanon-ceasefire-raises-hopes-of-progess-for-iran-deal-4726027"),S("AP","https://apnews.com/article/06ea585ce43fd28e26c4d21d46a4df83"),S("CFR","https://www.cfr.org/articles/trumps-project-freedom-isnt-going-to-open-the-strait-of-hormuz")]},
{tag:"US Institutions",headline:"The Iran vote tests whether Congress can convert dissent into war authority",deck:"The House created a historic rebuke, but vetoes, Senate procedure, and disputed definitions of hostilities still favor the executive.",image:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/United_States_Capitol_west_front_edit2.jpg/1280px-United_States_Capitol_west_front_edit2.jpg",imageAlt:"West front of the United States Capitol",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:United_States_Capitol_west_front_edit2.jpg",skeletonHTML:`<strong>Baseline:</strong> The Constitution divides war powers between Congress and the commander in chief, but modern presidents often initiate force and dare Congress to assemble veto-proof opposition later. <strong>Move:</strong> The House passed a resolution directing an end to Iran hostilities, the first chamber-level approval of such a constraint during this war. <strong>Shift:</strong> The political coalition has crossed from protest votes into formal passage, yet the administration argues an April ceasefire ended the 60-day clock even while strikes and blockades continue. <strong>Why it matters:</strong> The dispute is now about definitions and remedies: what counts as hostilities, whether a concurrent resolution has legal force, and whether Congress will attach limits to money or authorizations if a veto defeats the standalone measure.`,stats:["The House vote was 215-208, with four Republicans joining Democrats.","The war began February 28 and has continued through intermittent ceasefires and renewed strikes.","The House separately passed Ukraine aid and Russia sanctions 226-195 through a leadership-bypassing process."],sideA:{label:"Side A - Congress is reawakening",text:"A successful House vote changes incentives and can build toward funding limits or a bipartisan authorization."},sideB:{label:"Side B - the veto remains decisive",text:"Without two-thirds majorities or control of appropriations, the president can continue relying on commander-in-chief claims."},sideC:{label:"Wildcard - diplomacy may moot the case",text:"A real Iran settlement could end operations before courts or Congress resolve the constitutional dispute."},sources:[S("AP war powers","https://apnews.com/article/iran-war-powers-vote-house-9aaadea35f9523c818802286a6553536"),S("White House","https://www.whitehouse.gov/wp-content/uploads/2026/05/SAP-HCR86.pdf"),S("Congressional Record","https://www.govinfo.gov/content/pkg/CREC-2026-03-04/pdf/CREC-2026-03-04-house.pdf")]},
{tag:"Public Health / Conflict",headline:"Congo's Ebola response is now a contest over trusted authority",deck:"Burial violence shows why epidemiology cannot be separated from armed control, local legitimacy, and international presence.",image:"https://www.cdc.gov/ebola/media/images/2024/04/Ebola_virus_purple.jpg",imageAlt:"Microscopic image of Ebola virus",imageCredit:"CDC",imageCreditUrl:"https://www.cdc.gov/ebola/about/index.html",skeletonHTML:`<strong>Baseline:</strong> Ebola can be contained through diagnosis, isolation, contact tracing, safe burials, protective equipment, and trusted community communication. <strong>Move:</strong> Residents attacked a burial team in M23-controlled Katana and handled an infectious body after responders fled. <strong>Shift:</strong> The outbreak is no longer only a capacity problem; it is a sovereignty problem in places where the health ministry, rebels, international agencies, and communities do not recognize one another's authority. <strong>Why it matters:</strong> Bundibugyo Ebola lacks an approved species-specific vaccine, so every hidden exposure matters more. Heavy-handed security can protect teams but also deepen avoidance, while weak protection invites more attacks and interrupted tracing.`,stats:["Reuters reported more than 360 confirmed Congo cases and at least 62 deaths by June 4.","More than a dozen cases were reported in neighboring Uganda, increasing the cross-border burden.","The Katana body was handled by community members after the specialized team abandoned the coffin, creating direct exposure risk."],sideA:{label:"Side A - classic control can still win",text:"Ebola transmission chains can be broken if treatment, tracing, burials, and local communication operate consistently."},sideB:{label:"Side B - fragmentation outruns medicine",text:"Armed rule, misinformation, and attacks can hide cases faster than international teams can expand capacity."},sideC:{label:"Wildcard - regional facilities backfire",text:"Quarantine infrastructure may improve readiness but provoke resistance if communities see it as foreign and coercive."},sources:[S("Reuters","https://uk.marketscreener.com/news/congo-reports-attack-on-ebola-burial-team-as-cases-rise-ce7f5ddcd18bff24"),S("WHO","https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605"),S("ECDC","https://www.ecdc.europa.eu/en/ebola-outbreak-democratic-republic-congo-and-uganda")]},
{tag:"Europe / Ukraine",headline:"EU accession is becoming Ukraine's second security guarantee",deck:"Opening the fundamentals cluster links wartime endurance to courts, minority rights, markets, and postwar state capacity.",image:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Flag_of_Europe.svg/1280px-Flag_of_Europe.svg.png",imageAlt:"European Union flag",imageCredit:"Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Flag_of_Europe.svg",skeletonHTML:`<strong>Baseline:</strong> Ukraine seeks military protection now and economic-political integration later; EU accession can provide market access, investment rules, institutional reform, and a durable Western anchor without functioning as a defense treaty. <strong>Move:</strong> All 27 states backed preparations to open the first negotiation cluster after Hungary and Ukraine reached a minority-rights agreement. <strong>Shift:</strong> Enlargement moved from symbolic candidacy into measurable rule-of-law benchmarks, even as EU ministers debated reducing new temporary protection for Ukrainian military-age men. <strong>Why it matters:</strong> Europe is trying to align three policies that can conflict: protect refugees, sustain Ukraine's manpower, and demand reforms strict enough to preserve EU credibility. Failure on any one can weaken the others.`,stats:["More than 4.33 million Ukrainians benefit from EU temporary protection.","Germany hosts about 29 percent of that population, followed by Poland and Czechia.","The first cluster covers rule of law and democratic standards, the core tests that open and close the accession process."],sideA:{label:"Side A - accession strengthens endurance",text:"A credible path rewards reform, anchors investment, and tells Ukrainians that wartime sacrifice leads to institutional membership."},sideB:{label:"Side B - promises can outrun capacity",text:"War, reconstruction costs, agriculture, migration, and voting rules could produce backlash if deadlines are politically inflated."},sideC:{label:"Wildcard - manpower policy reshapes asylum",text:"Limiting new protection for fighting-age men could help Ukraine while creating legal and moral divisions inside Europe."},sources:[S("Reuters accession","https://wsau.com/2026/06/03/all-eu-members-greenlight-first-step-in-accession-talks-ukraine-pm-says/"),S("Reuters protection","https://uk.marketscreener.com/news/eu-considers-limiting-protection-for-ukrainian-men-of-fighting-age-ce7f5ddddb8af222"),S("EU enlargement","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")]},
{tag:"Climate / Food Security",headline:"El Nino can turn the Iran energy shock into an Asian food shock",deck:"Weather, fertilizer, diesel, currencies, and trade policy are converging before the main harvest outcomes are known.",image:"https://public.wmo.int/sites/default/files/styles/featured_image_x1_768x512/public/2026-06/Thumbnails%202026.jpg?h=d1cb525d&itok=Wyg1jPYm",imageAlt:"WMO illustration for the 2026 El Nino outlook",imageCredit:"World Meteorological Organization",imageCreditUrl:"https://public.wmo.int/news/media-centre/wmo-prepare-el-nino",skeletonHTML:`<strong>Baseline:</strong> Asian food systems depend on seasonal rainfall, imported fuel and fertilizer, and trade between surplus and deficit countries. <strong>Move:</strong> WMO forecast an 80 percent chance of El Nino in June-August, while Reuters found dry conditions already reducing planting prospects across India, Australia, Thailand, and Indonesia. <strong>Shift:</strong> The climate risk arrives while Hormuz disruption has raised fertilizer and diesel costs and wheat is already about 20 percent higher this year. <strong>Why it matters:</strong> Governments may respond with subsidies, export controls, and stock releases that protect domestic consumers but amplify scarcity abroad. The most vulnerable states face both higher import bills and more expensive borrowing.`,stats:["WMO put later-2026 El Nino continuation probabilities near or above 90 percent.","Tropical Pacific subsurface temperatures exceeded 6 degrees Celsius above average in monitored areas.","Reuters reported wheat prices roughly 20 percent higher since the start of 2026."],sideA:{label:"Side A - forecasts create time",text:"Governments can pre-position seed, fertilizer, cash support, grain stocks, and drought plans before losses become famine risks."},sideB:{label:"Side B - compound shocks overwhelm buffers",text:"Weather damage plus fuel, fertilizer, debt, and currency pressure can exhaust normal subsidy and import tools."},sideC:{label:"Wildcard - policy drives contagion",text:"Export bans and panic buying may spread the shock faster than harvest losses themselves."},sources:[S("WMO","https://public.wmo.int/news/media-centre/wmo-prepare-el-nino"),S("Reuters crops","https://www.marketscreener.com/news/hot-weather-hurts-asian-crops-as-powerful-el-nino-takes-shape-ce7f5ddcda8cf525"),S("FAO prices","https://www.fao.org/worldfoodsituation/foodpricesindex/en/")]}
];
const opinion=[
{label:"Project Syndicate / Global Economy",title:"The Iran War Is Fueling a Global Debt Shock",author:"Moussa Faki Mahamat",publication:"Project Syndicate",date:"June 4, 2026",subtitle:"The war's food and energy shock is raising borrowing costs for countries that neither caused nor can easily absorb the conflict.",proseHTML:`The essay begins from verified price pressure flowing from Hormuz disruption and asks why the damage is becoming fiscal rather than remaining a temporary commodity shock. Mahamat argues that higher import bills, inflation, and interest rates are squeezing developing governments simultaneously, leaving less money for health, food support, and climate resilience. The perspective matters because it moves analysis beyond oil-import dependence toward debt-service capacity and unequal crisis transmission. The strongest challenge is that domestic policy choices, creditor structures, and preexisting debt vulnerability still determine which states suffer most.`,claim:"A Middle East supply shock is becoming a Global South debt emergency that requires coordinated relief, not only more oil supply.",matters:"It connects war, inflation, sovereign borrowing, and development spending in one causal chain.",pushback:"Not every debt problem is externally caused, and broad relief can weaken incentives for fiscal reform.",sources:[S("Read essay","https://www.project-syndicate.org/commentary/iran-war-price-shock-global-debt-shock-by-moussa-faki-mahamat-2026-06")]},
{label:"Project Syndicate / Public Health",title:"How Measles Came Roaring Back",author:"M. Niaz Asadullah and Zia Sadique",publication:"Project Syndicate",date:"June 4, 2026",subtitle:"Bangladesh's outbreak reflects years of institutional erosion rather than one failed procurement decision.",proseHTML:`Bangladesh built a celebrated community-vaccination system, but national coverage figures concealed lower protection among mobile, poor, and geographically excluded children. The authors argue that pandemic disruption, underinvestment, second-dose dropout, misinformation, and disrupted government programs accumulated until measles exposed the weakness. Their argument is useful because it distinguishes a visible trigger from a long deterioration in the institutions that sustain herd immunity. The counterpressure is that the current government still bears responsibility for sequencing reforms without interrupting urgent vaccine supply and outreach.`,claim:"Successful immunization is a permanent maintenance task; complacency can quietly rebuild the conditions for epidemic spread.",matters:"It gives speakers a governance explanation for outbreaks that avoids blaming only individual vaccine hesitancy.",pushback:"Institutional history should not excuse recent administrative decisions that worsened supply and campaign delays.",sources:[S("Read essay","https://www.project-syndicate.org/commentary/measles-outbreak-in-bangladesh-reflects-institutional-failures-that-long-went-unnoticed-by-m-niaz-asadullah-and-zia-sadique-2026-06")]},
{label:"Project Syndicate / AI",title:"Democracy vs. Data Centers",author:"Angela Huyue Zhang",publication:"Project Syndicate",date:"June 3, 2026",subtitle:"Local opposition may be the strongest available check on an AI infrastructure boom whose costs are socialized before its returns are proven.",proseHTML:`AI developers are racing to secure electricity, water, land, and transmission capacity while communities experience the buildout through bills, noise, construction, and resource competition. Zhang argues that permitting fights and public opposition can function as a decentralized defense against overinvestment and weak accountability. The argument matters because it reframes resistance not simply as anti-technology obstruction but as a market-discipline mechanism when national policy is captured by growth promises. The limitation is that fragmented local vetoes can also block genuinely productive infrastructure and push development toward jurisdictions with weaker safeguards.`,claim:"Democratic friction can force AI investors to internalize infrastructure costs and test whether projected demand is real.",matters:"It links the AI bubble debate to utility regulation, land use, and local political power.",pushback:"Local opposition may protect incumbents, slow clean infrastructure, and shift projects rather than improve them.",sources:[S("Read essay","https://www.project-syndicate.org/commentary/democratic-opposition-to-ai-data-centers-could-protect-us-from-bubble-by-angela-huyue-zhang-2026-06")]},
{label:"Project Syndicate / Climate",title:"The Right Incentives for Climate Action",author:"Paula Carvalho Pereda",publication:"Project Syndicate",date:"June 3, 2026",subtitle:"Energy shocks strengthen the case for enforceable standards and pricing that prevent short-term security choices from locking in decades of emissions.",proseHTML:`Governments responding to the Iran shock are subsidizing fuel and expanding fossil infrastructure, choices that can be rational in the short run but costly over a 30- or 40-year asset life. Pereda argues that the central climate failure is misaligned incentives and weak enforcement, using Brazilian vehicle standards and satellite monitoring of deforestation as evidence that measurable rules can change behavior. The essay adds a practical policy lens to abstract climate pledges: markets can deliver lower-cost adjustment after governments price externalities and enforce standards. The pushback is political feasibility, because visible local costs often arrive before dispersed global benefits.`,claim:"Markets become climate solutions only after policy makes emitters bear costs and rewards measurable compliance.",matters:"It offers concrete tools - standards, pricing, information, and monitoring - for keeping energy security from defeating decarbonization.",pushback:"Even well-designed incentives can fail where institutions are weak or voters reject near-term energy costs.",sources:[S("Read essay","https://www.project-syndicate.org/commentary/incentives-not-markets-are-problem-for-climate-by-paula-carvalho-pereda-2026-06")]},
{label:"Project Syndicate / Alliances",title:"Building Alliances of America's Allies",author:"Richard Haass",publication:"Project Syndicate",date:"June 2, 2026",subtitle:"US partners should build denser ties with one another because Washington can no longer be treated as the automatic organizer of every coalition.",proseHTML:`America's traditional allies have structured defense and diplomacy around dependable US leadership, but current policy explicitly rejects carrying the old order alone. Haass argues that middle powers should create stronger bilateral and regional arrangements that can operate with less American direction. The idea is live as Europe manages Ukraine, Asian states hedge around China, and Congress disputes the president's wars. The strongest challenge is that allied coalitions may lack US intelligence, logistics, nuclear deterrence, and political unity when a real crisis arrives.`,claim:"The friends of the United States need alliances among themselves, not only separate spokes connected to Washington.",matters:"It provides a strategy for adaptation that is more concrete than either nostalgia for US primacy or abrupt strategic autonomy.",pushback:"Parallel alliances can fragment command, duplicate spending, and still depend on US capabilities at the decisive moment.",sources:[S("Read essay","https://www.project-syndicate.org/commentary/americas-traditional-allies-must-build-own-partnerships-by-richard-haass-2026-06")]}
];
function sourceHTML(sources=[]){return `<div class="wire-sources"><span class="sources-label">Sources</span>${sources.map(s=>`<a class="source-link" href="${s.url}" target="_blank" rel="noopener noreferrer">${s.name}</a>`).join("")}</div>`}
function learnHTML(learn){if(!learn)return "";return `<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>${learn.context}</p><h4>Three angles</h4><ul>${learn.angles.map(a=>`<li>${a}</li>`).join("")}</ul><h4>What to watch</h4><p>${learn.watch}</p></div></details>`}
function renderHeadline(){document.getElementById("headlineDay").innerHTML=`<div class="headline-copy"><div class="headline-label">${headline.topic}</div><h2>${headline.h}</h2><p>${headline.deck}</p></div><figure class="headline-media"><img class="headline-photo" src="${headline.image}" alt="${headline.imageAlt}" loading="eager"><figcaption class="image-credit">Image: <a class="source-link" href="${headline.imageCreditUrl}" target="_blank" rel="noopener noreferrer">${headline.imageCredit}</a></figcaption></figure>`}
function renderWireList(list){return list.map(group=>`<details class="topic"><summary><span class="topic-label">${group.topic}</span><span class="topic-count">${group.stories.length} ${group.stories.length===1?"story":"stories"}</span></summary><div class="topic-body">${group.stories.map(story=>`<article class="wire-item"><h2 class="wire-headline">${story.h}</h2><p class="wire-prose">${story.proseHTML}</p>${sourceHTML(story.sources)}${learnHTML(story.learn)}</article>`).join("")}</div></details>`).join("")}
function imageHTML(item){if(!item.image)return "";return `<figure class="analytical-image"><img src="${item.image}" alt="${item.imageAlt||""}" loading="lazy"><figcaption class="image-credit">Image: <a class="source-link" href="${item.imageCreditUrl||item.image}" target="_blank" rel="noopener noreferrer">${item.imageCredit||"Source"}</a></figcaption></figure>`}
function renderAnalytical(){return analytical.map(item=>`<details class="analytical-file"><summary><div class="analytical-summary"><div class="analytical-tag">${item.tag}</div><h2>${item.headline}</h2><p class="analytical-deck">${item.deck}</p></div></summary><div class="analytical-body">${imageHTML(item)}<p class="skeleton">${item.skeletonHTML}</p><section class="stats-block"><h3>Key Stats With Setup</h3>${item.stats.map(s=>`<p>${s}</p>`).join("")}</section><div class="angles-title">Three Angles</div><div class="angles-grid"><div class="angle angle-a"><strong>${item.sideA.label}</strong>${item.sideA.text}</div><div class="angle angle-b"><strong>${item.sideB.label}</strong>${item.sideB.text}</div><div class="angle angle-c"><strong>${item.sideC.label}</strong>${item.sideC.text}</div></div>${sourceHTML(item.sources)}</div></details>`).join("")}
function renderOpinion(){return opinion.map(item=>`<article class="opinion-card"><div class="opinion-label">${item.label}</div><h2>${item.title}</h2><p class="opinion-meta">${item.author} - ${item.publication}, ${item.date}</p><p class="opinion-subtitle"><strong>${item.subtitle}</strong></p><p class="opinion-prose">${item.proseHTML}</p><div class="opinion-boxes"><div class="opinion-box"><strong>The Claim</strong>${item.claim}</div><div class="opinion-box"><strong>Why It Matters</strong>${item.matters}</div><div class="opinion-box"><strong>Pushback</strong>${item.pushback}</div></div>${sourceHTML(item.sources)}</article>`).join("")}
function renderTab(tab){document.querySelectorAll(".tab-btn").forEach(btn=>btn.classList.toggle("active",btn.dataset.tab===tab));document.getElementById("editionTitle").textContent=titles[tab];document.getElementById("editionDesc").textContent=intros[tab];const content=document.getElementById("content");if(tab==="wire")content.innerHTML=renderWireList(wire);if(tab==="weekly")content.innerHTML=renderWireList(weekly);if(tab==="analytical")content.innerHTML=renderAnalytical();if(tab==="opinion")content.innerHTML=renderOpinion()}
function applyTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem("dig-theme",theme);document.getElementById("themeToggle").textContent=`Theme: ${theme==="dark"?"Dark":"Light"}`}
function initTheme(){applyTheme(localStorage.getItem("dig-theme")||"light")}
document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>renderTab(btn.dataset.tab)));
document.getElementById("themeToggle").addEventListener("click",()=>applyTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"));
renderHeadline();initTheme();renderTab("wire");
</script>
</body>
</html>
