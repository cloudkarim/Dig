le></head><body><div class="utility"><div class="wrap"><span>Sunday, June 7, 2026 · New York</span><span>Independent Daily Briefing · Edition 158</span></div></div><header class="mast wrap"><h1>Dig</h1><p>Signal, consequence, argument</p></header><nav class="nav"><a href="#wire">The Wire</a><a href="#weekly">The Weekly</a><a href="#analysis">Analytical</a><a href="#opinion">Opinion</a></nav><main id="app" class="wrap loading">Opening today's edition...</main><footer class="footer wrap"><b>Dig</b><span>Compiled June 7, 2026</span></footer><script>const E=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),LK=a=>`<div class="sources">${(a||[]).map(x=>`<a href="${E(x.u)}" target="_blank">${E(x.n)}</a>`).join('')}</div>`,ST=x=>`<article class="story"><div class="label">Developing</div><h3>${E(x.h)}</h3><p>${x.proseHTML}</p><div class="context"><b>Context</b><p>${E(x.learn.context)}</p><ul>${x.learn.angles.map(a=>`<li>${E(a)}</li>`).join('')}</ul><b>Watch</b> ${E(x.learn.watch)}</div>${LK(x.sources)}</article>`,TOP=o=>Object.entries(o).map(([k,v])=>`<div class="topic"><div class="topic-title">${E(k)}<br><small>${v.length} ${v.length===1?'story':'stories'}</small></div><div class="story-grid">${v.map(ST).join('')}</div></div>`).join(''),HEAD=(id,t,p)=>`<div class="section-title" id="${id}"><h2>${t}</h2><p>${p}</p></div>`;function R(d){let all=[...Object.values(d.wire).flat(),...Object.values(d.weekly).flat()],dig=all.slice(0,3);let lead=`<section class="lead"><div><div class="label">${E(d.headline.topic)} · Lead story</div><h2>${E(d.headline.h)}</h2><p class="deck">${E(d.headline.deck)}</p></div><figure><img src="${E(d.headline.image)}" alt="${E(d.headline.imageAlt)}"><figcaption>${E(d.headline.imageCredit)}</figcaption></figure><aside class="digest">${dig.map((x,i)=>`<article><div class="label">Also today · 0${i+1}</div><h3>${E(x.h)}</h3></article>`).join('')}</aside></section><div class="numbers"><span><b>${all.lengt f2dd').then(r=>r.json()).then(j=>{let s=decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))),a=s.indexOf('const S='),b=s.indexOf('const src=',a),d=Function(s.slice(a,b)+';return {headline,wire,weekly,analytical,opinion}')();R(d)}).catch(()=>app.textContent='The edition could not load. Please refresh.');</script></body></html>
