const wire={
"US Economy":[
W("Gas relief lifts confidence, but households still describe an economy under strain","The University of Michigan's consumer survey had fallen for four consecutive months as the Iran war raised fuel and food costs. <span class='change'>Its preliminary June sentiment index rose to 48.9 from 44.8 in May as average gasoline prices eased from roughly $4.50 to about $4.10 a gallon.</span> The rebound was broad but strongest among lower-income households, which spend a larger share of income on fuel, and the index remains near levels associated with severe economic stress. The result shows how quickly a geopolitical price shock reaches voters, while the still-low level warns that one month of cheaper gasoline has not repaired purchasing power or confidence.",[S("Guardian","https://www.theguardian.com/business/2026/jun/12/consumer-sentiment-june-data-gas-prices"),S("Axios","https://www.axios.com/2026/06/12/gas-prices-consumer-sentiment")],"The <span class='jargon'>consumer sentiment index (a survey-based measure of household views on personal finances and the economy)</span> often moves before spending, but mood and actual consumption can diverge.",["Relief case: lower gasoline prices free cash for other purchases.","Inflation case: sentiment can reverse if an Iran deal fails and oil rebounds.","Distribution case: strong employment can coexist with deep stress among renters and lower-income workers."],"Watch the final June survey, retail sales, gasoline prices and the Federal Reserve's June 17 guidance."),
W("Oil markets trade diplomacy minute by minute","The Strait of Hormuz remained far below normal traffic after months of war, keeping a large risk premium in energy prices. <span class='change'>Brent crude fell from about $93 to below $85 after President Trump said planned strikes were cancelled and a U.S.-Iran agreement was close, then moved back above $89 when Washington and Tehran disputed the terms.</span> The whipsaw matters because oil feeds directly into gasoline, freight, airfares and inflation expectations before any physical shipment changes. A signed memorandum would still need verified reopening procedures, sanctions sequencing and security for tankers before the market could treat the supply shock as over.",[S("Guardian oil","https://www.theguardian.com/business/2026/jun/12/global-oil-prices-trump-us-iran-deal-brent-crude-strait-of-hormuz"),S("AP deal","https://apnews.com/article/7085e386e1c40ee6cfe634210970143f")],"A <span class='jargon'>risk premium (the extra price buyers pay for the possibility of disruption)</span> can fall on diplomacy even before physical supply returns.",["Bull case: a verified reopening restores Gulf exports and lowers inflation.","Bear case: contradictory terms make the selloff premature.","Market-structure case: inventories and covert shipments can cushion a partial closure only temporarily."],"Watch tanker traffic, insurance rates, Iranian approval and whether sanctions relief is tied to measurable compliance."))],
"US Politics":[
W("Section 702 expires after the House rejects a short extension","Congress has repeatedly renewed <span class='jargon'>Section 702 (the Foreign Intelligence Surveillance Act authority used to collect communications of foreign targets abroad without individual warrants)</span>, while privacy advocates seek warrants for searches involving Americans. <span class='change'>The House rejected a short extension 198-218, allowing the statute to expire at midnight while lawmakers left Washington until June 23.</span> Existing annual court certifications can keep current collection operating into 2027, so the immediate effect is not a complete intelligence blackout. The lapse nevertheless weakens the legal foundation for new directives and forces a sharper choice between national-security continuity and limits on searches of incidentally collected U.S. communications.",[S("Guardian politics","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates"),S("Guardian vote","https://www.theguardian.com/us-news/live/2026/jun/11/democrats-republicans-midterms-tech-laws-scotus-latest-news-updates")],"Collection targets foreigners overseas, but an American's messages can be swept in when that person communicates with a target.",["Security case: a statutory gap complicates recruitment of providers and new targeting.","Privacy case: existing certifications give Congress time to add a warrant rule.","Governance case: personnel disputes should not substitute for a durable surveillance statute."],"Watch House action after June 23, any warrant amendment and intelligence-agency guidance to communications providers."),
W("Courts order Trump's name removed from the Kennedy Center","The president's appointed board added his name to the national performing-arts center without an act of Congress. <span class='change'>A federal judge denied the board's last-minute request to pause an order requiring removal of the Trump name by Friday, holding that Congress alone can rename the institution.</span> The dispute is narrower than broader fights over presidential control, but it tests whether political appointees can convert management authority into power over a congressionally chartered institution's legal identity. Compliance, appeal and the cost of reversing signage will show whether the ruling remains a symbolic rebuke or becomes a durable limit.",[S("AP latest","https://apnews.com/article/b222d1ae6a3d206b67ca5abb145dc711"),S("Guardian live","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates")],"The Kennedy Center is a federally chartered memorial whose statutory name is set by Congress.",["Separation-of-powers case: boards cannot rewrite statutes.","Management case: administrations normally have broad control over federal branding.","Political case: cultural institutions are becoming proxies for disputes over executive power."],"Watch the appeal, physical removal of the lettering and whether Congress considers a naming bill."))],
"Healthcare":[
W("Multistate listeria investigation expands around recalled soft cheese","Foodborne <span class='jargon'>Listeria monocytogenes (a bacterium that can cause invasive illness, miscarriage, meningitis and death)</span> is especially dangerous for pregnant people, older adults and immunocompromised patients. <span class='change'>Officials linked recalled Clover Hill Dairy ricotta and requesón to nine illnesses, eight hospitalizations and one death, with products distributed under several labels across at least six jurisdictions.</span> The Maryland plant's license was suspended and consumers were told to identify plant number 24-128, because bulk cheese may have been repackaged under other brands. The long incubation period means the case count can grow after sales stop, making label tracing, refrigerator cleaning and rapid reporting more important than the initial recall date alone.",[S("Simply Recipes summary","https://www.simplyrecipes.com/listeria-outbreak-ricotta-cheese-june-11997231"),S("FDA recalls","https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts")],"Listeria can persist on cold surfaces and symptoms may appear well after exposure, so investigators often find additional cases after a recall begins.",["Recall case: plant closure and broad product removal should stop new exposure.","Detection case: repackaging and mild untested illness can hide the true scale.","Equity case: multilingual warnings matter because the products were sold under several regional brands."],"Watch CDC case updates, downstream distributor recalls and whether whole-genome sequencing identifies more linked patients."))],
"Climate":[
W("Northeast heat and drought turn a weather event into a health and fire test","Parts of the Mid-Atlantic and Northeast entered June with expanding drought and limited early-season heat acclimatization. <span class='change'>Forecasts put more than 100 million people in a corridor of temperatures 10 to 15 degrees above normal, with heat indices near or above 100°F and more than 40 daily records at risk.</span> Connecticut's moderate drought area rose from 29% to about 52% in one week, increasing brush-fire risk even where thunderstorms provide short bursts of rain. The immediate burden will fall on outdoor workers, older adults, schools and power systems, while the fire danger depends on whether storms deliver sustained rainfall rather than lightning and wind.",[S("Heat forecast","https://nypost.com/2026/06/08/us-news/record-high-temps-threaten-to-roast-over-100-million-people-along-east-coast/"),S("NWS heat safety","https://www.weather.gov/safety/heat")],"The <span class='jargon'>heat index (how hot conditions feel when humidity limits sweat evaporation)</span> can be materially higher than the measured air temperature.",["Preparedness case: cooling centers and worker rules can prevent many deaths.","Infrastructure case: peak electricity demand can expose grid weaknesses.","Compound-risk case: drought, wind and thunderstorms can increase fire starts even during humid heat."],"Watch heat advisories, overnight minimum temperatures, emergency-room visits and drought-monitor updates."))],
"Tech / AI":[
W("World Bank warns that the AI productivity boom may widen the development gap","Artificial intelligence can raise productivity only where firms and governments have electricity, computing capacity, skilled workers and useful local data. <span class='change'>The World Bank said many poorer economies enter the AI transition after repeated shocks with emerging-market growth slowing to 3.6% in 2026 and per-capita gains at their weakest since the pandemic.</span> Countries without cloud access or local-language datasets may pay for imported AI services while capturing little of the higher-value development work. The result could turn a technology associated with leapfrogging into another channel through which debt, infrastructure gaps and language inequality compound.",[S("Axios","https://www.axios.com/2026/06/12/ai-world-bank-iran-energy-economy"),S("World Bank GEP","https://www.worldbank.org/en/publication/global-economic-prospects")],"<span class='jargon'>Compute infrastructure (data centers, chips, power and networks needed to train or run AI systems)</span> is concentrated in a small group of countries and firms.",["Leapfrog case: cloud tools can spread expertise without building every layer locally.","Divergence case: scarce power, capital and data keep poorer countries as customers rather than producers.","Policy case: shared regional compute and open local-language data can reduce the entry barrier."],"Watch World Bank financing, regional data-center projects and whether AI investment reaches public services rather than only export sectors."))],
"Latin America":[
W("Cuba promises investment reforms as fuel shortages deepen","Cuba's state-centered economy has struggled with blackouts, food shortages, low productivity and tighter U.S. pressure on oil supplies. <span class='change'>President Miguel Díaz-Canel announced reforms intended to attract foreign capital, involve Cubans abroad and decentralize administration, while acknowledging that the island currently meets only about 40% of its oil needs.</span> Possible steps include reducing mandatory state intermediaries and offering tariff relief for imported production inputs, but the government gave no detailed timetable. The credibility test is whether private and diaspora investors gain enforceable operating space, because vague openings have repeatedly failed to overcome currency instability, state bottlenecks and sanctions risk.",[S("AP Cuba","https://apnews.com/article/cbffe7cf4f435569e1a6d7e42a2bb5fd"),S("AP latest","https://apnews.com/article/b222d1ae6a3d206b67ca5abb145dc711")],"Cuba's <span class='jargon'>state intermediary system (rules requiring many firms to trade through state entities)</span> can add delay, cost and political control to imports and exports.",["Reform case: diaspora capital and direct trade can revive production quickly.","Skeptical case: announcements without property and currency reform will not unlock confidence.","Humanitarian case: even partial reform can improve food, medicine and fuel distribution."],"Watch implementing decrees, remittance rules, private import rights and electricity availability."),
W("Keiko Fujimori wins Peru's presidency by a razor-thin margin","Peru has cycled through repeated presidential removals and confrontations with Congress, making the legitimacy of the June 7 runoff unusually important. <span class='change'>Keiko Fujimori was declared the narrow winner with just over half the vote after a count decided by a very small margin.</span> She inherits a fragmented bicameral legislature, an extortion and organized-crime crisis, and the polarizing legacy of her father Alberto Fujimori's authoritarian presidency. The result may move policy rightward on security and markets, but governability will depend less on the campaign mandate than on whether she can avoid the executive-legislative breakdown that consumed her predecessors.",[S("WSJ","https://www.wsj.com/world/americas/the-daughter-of-a-dictator-wins-power-in-peru-d384158d"),S("ONPE","https://www.onpe.gob.pe/")],"<span class='jargon'>Fujimorismo (the political movement built around Alberto Fujimori and continued by Keiko Fujimori)</span> combines market-oriented economics, hard-line security and a contested democratic record.",["Stability case: a clear security agenda can restore state authority.","Legitimacy case: the tiny margin and family legacy invite immediate opposition.","Institutional case: Congress, courts and regional governments may matter more than presidential ideology."],"Watch concession and challenge statements, cabinet appointments, congressional alliances and the July 28 transfer of power."))],
"Africa / Middle East":[
W("U.S. and Iran converge on a text but still describe different deals","Three months of war left the Strait of Hormuz constrained, sanctions intact and ceasefires across Iran and Lebanon repeatedly violated. <span class='change'>Pakistan's prime minister said Washington and Tehran had agreed final wording, while U.S. officials called the package 80-85% complete and Iran said nuclear negotiations would occur only after an interim agreement is implemented.</span> Reported elements include phased reopening of Hormuz, performance-based sanctions relief, frozen assets and a later 60-day nuclear track. The contradiction is substantive: Washington says dismantlement is embedded in the bargain, while Tehran says that issue remains for later, and Israel rejects withdrawal from occupied zones that Iran says must be included.",[S("AP","https://apnews.com/article/7085e386e1c40ee6cfe634210970143f"),S("Guardian live","https://www.theguardian.com/world/live/2026/jun/12/middle-east-crisis-live-us-iran-israel-lebanon-trump-hormuz-oil-peace-deal-doubt-latest-news-updates")],"A <span class='jargon'>memorandum of understanding (a negotiated framework that may precede a detailed binding agreement)</span> can stop fighting while leaving verification and sequencing unresolved.",["Breakthrough case: phased rewards create a path from truce to nuclear limits.","Spoiler case: Israel, Hezbollah or a Gulf incident can break a deal they did not fully negotiate.","Sequencing case: the order of sanctions relief, uranium removal and reopening Hormuz is the agreement's real substance."],"Watch formal approval in Tehran and Washington, a signing venue, tanker rules and whether Lebanon language survives the final text."),
W("Congo term-limit proposal triggers clashes in Kinshasa","The Democratic Republic of Congo is already managing the M23 war in the east, displacement and an Ebola outbreak while President Félix Tshisekedi's second term runs to 2028. <span class='change'>Police and rival demonstrators clashed in Kinshasa after an opposition coalition protested a bill that could permit constitutional revision and open a path to a third presidential term.</span> The constitution currently shields term limits from amendment, but supporters argue that major institutional dysfunction justifies broader revision. Changing the rules amid armed conflict would shift political energy from state capacity and peace efforts toward regime survival, with risks for donor confidence and national cohesion.",[S("AP Congo","https://apnews.com/article/f3ffbaaa242ff6dcf185ab1f54d86976"),S("UN Congo","https://news.un.org/en/tags/democratic-republic-congo")],"A <span class='jargon'>constitutional entrenchment clause (a rule declaring certain provisions unamendable)</span> is designed to stop temporary majorities from removing core democratic safeguards.",["Referendum case: voters should decide the institutional design.","Democratic-risk case: incumbents can use crisis conditions to extend power.","Security case: elite conflict in Kinshasa distracts from eastern Congo and humanitarian response."],"Watch the bill's text, opposition arrests, referendum procedures and positions from the constitutional court and regional partners."))],
"Europe / EU":[
W("EU sets Monday start for Ukraine and Moldova membership talks","Ukraine applied for European Union membership days after Russia's 2022 full-scale invasion, but progress required unanimity and reforms on courts, corruption and democratic governance. <span class='change'>The 27 member states agreed to open formal negotiations with Ukraine and Moldova in Luxembourg on Monday.</span> Accession will still take years and each negotiating cluster can be blocked, yet the opening converts political solidarity into a structured legal process. It also gives Kyiv a postwar security and investment anchor at a moment when NATO membership remains unavailable.",[S("AP EU","https://apnews.com/article/6cd2ec3d41bd45c8115c6ee41eb1a114"),S("EU enlargement","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")],"The <span class='jargon'>acquis communautaire (the full body of EU law that candidate countries must adopt and enforce)</span> is negotiated in policy clusters rather than accepted in one step.",["Security case: accession makes Ukraine's European future harder to reverse.","Standards case: a rushed process could weaken rule-of-law conditions.","Intermediate case: associate membership may deliver market access before voting rights."],"Watch Monday's conference, the first negotiating cluster and whether member states support staged membership."),
W("UK output contracts as the Iran shock reaches services","Britain had grown 0.3% in March but remained exposed to imported energy costs and weak household demand. <span class='change'>Official data showed gross domestic product fell 0.1% in April, with services down 0.2% as the Iran war disrupted travel, events and confidence.</span> Construction maintenance rose, but new building fell, undercutting hopes that investment would offset consumption weakness. The Bank of England now faces the same supply-shock dilemma as the Fed: higher energy inflation argues for restraint or tightening, while shrinking activity argues against making credit more expensive.",[S("Guardian UK GDP","https://www.theguardian.com/business/2026/jun/12/uk-economy-gdp-shrank-april-iran-war-held-back-growth"),S("ONS GDP","https://www.ons.gov.uk/economy/grossdomesticproductgdp")],"Monthly <span class='jargon'>GDP (gross domestic product, the value of goods and services produced)</span> is volatile, but it can reveal where an external shock first enters the economy.",["Temporary-shock case: restored energy flows could reverse the contraction.","Stagflation case: weak output and high prices can persist together.","Political case: low growth intensifies Labour's leadership and fiscal pressures."],"Watch May GDP, inflation, the Bank of England decision and business investment."))],
"China":[
W("Taiwan opposition leader makes cross-strait dialogue her case in Washington","Taiwan's governing party emphasizes deterrence and closer U.S. ties, while the opposition Kuomintang argues that communication with Beijing lowers the risk of war. <span class='change'>KMT leader Cheng Li-wun used a Washington visit to defend talks with China, reject permanent independence and support defense while U.S. lawmakers weigh a roughly $14 billion arms package.</span> Her position exposes Taiwan's central strategic debate: whether dialogue reduces miscalculation or signals that coercion works. The controversy is sharpened by the opposition-led reduction of a proposed defense budget from about $40 billion to $25 billion.",[S("AP Taiwan","https://apnews.com/article/13c4c9c7f1bb0b358a4b3df1ceea0bf0"),S("Taiwan defense ministry","https://www.mnd.gov.tw/English/")],"The <span class='jargon'>Kuomintang or KMT (Taiwan's main opposition party, historically rooted in Chinese nationalism)</span> favors more engagement with Beijing than the governing Democratic Progressive Party.",["Dialogue case: regular channels reduce the chance of accidental escalation.","Deterrence case: weaker budgets can encourage Chinese pressure.","Domestic-politics case: Washington meetings can legitimize both engagement and defense if handled transparently."],"Watch the arms package, Taiwan's final defense budget and any Cheng meeting with senior U.S. officials."))],
"War / Active Conflicts":[
W("Ukraine's drone campaign creates a fuel crisis in occupied Crimea","Russia relies on the R-280 corridor, the Chonhar crossing and sea routes to move fuel and military cargo into Crimea and the southern front. <span class='change'>Ukraine said drone strikes critically damaged the Chonhar Bridge and cut military cargo traffic on the corridor by 71% over two weeks, while fuel stations in Sevastopol and Yevpatoriya ran dry or rationed supplies.</span> Kyiv is using repeated medium-range attacks to reduce throughput rather than waiting for one decisive battlefield breakthrough. The strategic test is whether shortages constrain Russian operations or only impose civilian inconvenience and repair costs that Moscow can absorb.",[S("Guardian Ukraine","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("IAEA Ukraine","https://www.iaea.org/newscenter/focus/ukraine")],"A <span class='jargon'>logistics interdiction campaign (repeated attacks intended to slow supplies before they reach combat units)</span> succeeds through cumulative delay and scarcity, not necessarily territorial capture.",["Asymmetric case: cheap drones force costly dispersal and repairs.","Resilience case: Russia can reroute supply and punish Ukrainian infrastructure.","Negotiation case: visible logistics pressure may improve Kyiv's leverage without changing the front line."],"Watch fuel availability, bridge repairs, front-line tempo and Russian retaliation against rail and energy systems."),
W("Lebanon fighting collides with the proposed Iran settlement","Ceasefire language has not stopped Israel from holding security zones in Lebanon or Hezbollah from resisting Israeli advances. <span class='change'>Hezbollah reported direct engagements near Majdal Zoun as Israel said it struck 310 Hezbollah targets in a week and rejected withdrawal from occupied zones.</span> Iran says ending the Lebanon war belongs in the U.S.-Iran framework, while Israel says it is not a party to that bargain. A deal that reduces U.S.-Iran fire but leaves the Israel-Hezbollah front outside an enforceable mechanism may lower oil risk without ending civilian displacement or regional escalation.",[S("Guardian Middle East","https://www.theguardian.com/world/live/2026/jun/12/middle-east-crisis-live-us-iran-israel-lebanon-trump-hormuz-oil-peace-deal-doubt-latest-news-updates"),S("AP regional ceasefires","https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae")],"A <span class='jargon'>security zone (territory held or controlled to create military depth)</span> may reduce immediate cross-border fire while creating an occupation dispute that sustains resistance.",["Linkage case: Iran has leverage to restrain Hezbollah as part of a broader settlement.","Autonomy case: Israel and Hezbollah can reject terms negotiated by others.","Humanitarian case: partial de-escalation can still reopen aid and return routes even without final borders."],"Watch Israeli withdrawal language, Hezbollah orders, Lebanese government deployment and whether mediators establish verification."))]

const weekly={
"US Economy":[
W("The May inflation shock erased the case for a near-term Fed cut","Inflation had already accelerated as the Iran war raised energy and transport costs. <span class='change'>May CPI reached 4.2% year over year, while core inflation was 2.9% and energy generated most of the monthly increase.</span> The gap shows a supply-led shock, but a strong labor market gives firms more room to pass costs through. The Fed is likely to hold on June 17 and focus on whether energy pressure spreads into wages and services.",[S("BLS CPI","https://www.bls.gov/cpi/"),S("Guardian CPI","https://www.theguardian.com/business/2026/jun/10/inflation-report-rate")],"Central banks can suppress demand but cannot directly create oil supply.",["Hold to protect credibility.","Avoid over-tightening a supply shock.","Use targeted fiscal relief rather than broad stimulus."],"Watch core services, wages, inflation expectations and Fed projections."),
W("Strong hiring complicated the slowdown story","Employers entered May with high borrowing costs but continued demand in services and local government. <span class='change'>Payrolls rose 172,000, more than twice the consensus forecast, and unemployment held at 4.3%.</span> The resilience reduces recession risk but makes inflation harder to extinguish because household income and labor demand remain firm. It also hides sectoral weakness, including losses in financial services and real wage pressure from energy inflation.",[S("BLS jobs","https://www.bls.gov/news.release/archives/empsit_06052026.htm"),S("Kiplinger","https://www.kiplinger.com/investing/economy/jobs-report-may-2026-what-to-expect")],"The <span class='jargon'>payroll survey (an employer-based count of jobs)</span> and unemployment rate come from different surveys and can diverge.",["Soft landing: hiring supports consumption.","Inflation risk: demand stays too strong.","Unevenness: headline gains conceal household stress."],"Watch revisions, real wages, jobless claims and June hiring."))],
"US Politics":[
W("Congress funded a larger immigration enforcement system","Executive orders can redirect enforcement, but detention beds, transport and staffing require appropriations. <span class='change'>The House approved roughly $70 billion for immigration enforcement as inspectors criticized conditions in a major detention facility.</span> The package could rapidly expand operational capacity while increasing due-process, medical-care and contractor oversight risks. Senate changes and litigation will decide how much becomes durable infrastructure.",[S("AP latest","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8"),S("ICE standards","https://www.ice.gov/detention-standards")],"Appropriations translate legal authority into beds, personnel and contracts.",["Deterrence and capacity.","Rights and oversight.","Federal-state implementation."],"Watch Senate action, inspections and detention lawsuits."),
W("National-security powers became entangled with a personnel fight","Section 702 renewal was already divided over privacy and warrant requirements. <span class='change'>The nomination and attempted interim appointment of intelligence leaders hardened opposition until the House rejected even a short extension.</span> Current certifications continue, but the lapse exposes how temporary renewals allow unrelated political disputes to threaten durable policy. Congress must now decide whether reform is the price of a stable authorization.",[S("Guardian","https://www.theguardian.com/us-news/live/2026/jun/11/democrats-republicans-midterms-tech-laws-scotus-latest-news-updates"),S("ODNI","https://www.dni.gov/")],"Section 702 is both a foreign-intelligence tool and a recurring Fourth Amendment controversy.",["Continuity first.","Warrant reform first.","Separate appointments from statute."],"Watch the June 23 return and any bipartisan warrant compromise."))],
"Healthcare":[
W("Ebola policy widened from outbreak control to travel ethics","Bundibugyo Ebola cases in Congo and Uganda required tracing, protective equipment and treatment capacity. <span class='change'>The U.S. response added travel restrictions, Title 42 measures and a proposed quarantine site in Kenya, drawing criticism from health experts.</span> Blanket restrictions can deter disclosure and redirect resources from the outbreak zone even when they buy preparedness time. The better test is whether policy speeds detection without weakening trust and field staffing.",[S("Le Monde","https://www.lemonde.fr/en/environment/article/2026/06/10/ebola-virus-us-strategy-deemed-excessive-and-unethical-by-health-experts_6754297_114.html"),S("WHO Ebola","https://www.who.int/health-topics/ebola")],"Ebola spreads through direct contact with infected bodily fluids, not routine airborne exposure.",["Maximum precaution.","Surveillance and trust.","Burden-shifting to Kenya."],"Watch confirmed cases, court challenges and traveler guidance."),
W("The ricotta recall showed why food tracing remains difficult","Soft cheese can support Listeria growth in refrigeration and may be repackaged through distributors. <span class='change'>Testing connected Clover Hill Dairy products to a multistate cluster with severe illness and death.</span> Plant-number warnings were more useful than brand lists because the same cheese appeared under several labels. The outbreak will remain active as investigators match genetic sequences and delayed diagnoses.",[S("Recall summary","https://www.eatingwell.com/fda-announces-recall-on-cheese-listeria-outbreak-11996234"),S("FDA","https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts")],"Whole-genome sequencing can connect patients and food samples that are separated by time and place.",["Traceability improved.","Repackaging obscures exposure.","High-risk groups need targeted warnings."],"Watch case counts and secondary recalls."))],
"Climate":[
W("Solar generation crossed coal in the United States","Coal once dominated U.S. electricity while solar was a marginal source. <span class='change'>Federal data showed solar surpassing coal in national generation for the first time.</span> The milestone reflects utility projects, rooftops and coal retirements, though gas still supplies firm capacity. Transmission, storage and permitting now matter more than panel cost alone.",[S("EIA","https://www.eia.gov/electricity/monthly/"),S("AP latest","https://apnews.com/article/d67daaffd060aaafc038d9ee6584e9a8")],"Generation measures actual electricity produced, not nameplate capacity.",["Market transition.","Reliability constraint.","Large regional differences."],"Watch storage additions, grid queues and revised EIA data."),
W("El Niño forecasts opened an Asian preparation window","Food, fertilizer and power systems were already strained by the energy shock. <span class='change'>The World Meteorological Organization put El Niño odds at 80% before September and 90% before November.</span> Drought, heat, wildfire smoke and altered monsoons can hit rice, hydropower and public health at the same time. Reservoir management, food reserves and early warnings can reduce losses before the forecast becomes an emergency.",[S("Guardian","https://www.theguardian.com/environment/2026/jun/05/el-nino-asia-unpredictable-extreme-weather-climate-change-crisis"),S("WMO","https://wmo.int/topics/el-nino-la-nina")],"El Niño changes probabilities and regional patterns; it does not guarantee one outcome everywhere.",["Forecasts enable preparation.","Local uncertainty remains high.","War costs reduce adaptation capacity."],"Watch monsoon rainfall, reservoirs and crop forecasts."))],
"Tech / AI":[
W("Washington chose AI acceleration over mandatory review","Frontier models are improving faster than enforceable evaluation systems. <span class='change'>The White House requested voluntary pre-release review, accelerated Pentagon adoption and discussed possible federal equity stakes in AI firms.</span> That combination gives government more access but no automatic power to stop a release. Public ownership could create leverage for safety or make the regulator financially dependent on growth.",[S("Guardian TechScape","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic"),S("NIST","https://www.nist.gov/itl/ai-risk-management-framework")],"Frontier models are the most capable general-purpose systems available at a given time.",["Competition requires speed.","Voluntary review lacks teeth.","Ownership blurs regulator and investor."],"Watch implementing guidance, procurement contracts and investment proposals."),
W("Taiwan considered criminalizing AI-chip diversion to China","U.S. controls target high-performance accelerators, but complete servers can be rerouted through complex supply chains. <span class='change'>Taiwan considered controls covering all Chinese customers above a computing threshold and new criminal penalties for unauthorized exports.</span> The approach could close a server-smuggling gap because Taiwanese firms assemble much of the world's advanced AI infrastructure. It could also intensify Chinese pressure and raise compliance costs for legitimate regional trade.",[S("Tom's Hardware","https://www.tomshardware.com/tech-industry/taiwan-weighs-criminal-ban-on-ai-chip-exports-to-all-of-china-as-us-trade-talks-continue"),S("Taiwan trade ministry","https://www.trade.gov.tw/English/")],"An export-control performance threshold regulates chips by computing power rather than brand name.",["Close diversion routes.","Drive substitution and retaliation.","Align U.S.-Taiwan enforcement."],"Watch the final threshold, penalties and Beijing's response."))],
"Latin America":[
W("Peru's runoff exposed a legitimacy problem before inauguration","Years of executive turnover left voters skeptical of both the presidency and Congress. <span class='change'>The June 7 contest was decided by a margin tiny enough to keep counting and challenges central for days.</span> The eventual Fujimori victory creates a legal winner but not a broad mandate. Crime policy, congressional bargaining and transparent adjudication will determine whether the transfer reduces or reproduces instability.",[S("AP count","https://apnews.com/article/34fd4442c382c64381b50e971966c5cd"),S("ONPE","https://www.onpe.gob.pe/")],"Narrow results are not evidence of fraud, but they require transparent procedures and restraint.",["Patient counting protects legitimacy.","Polarization can outlast certification.","Congress constrains either program."],"Watch final certification and coalition-building."),
W("The oil shock forced Caribbean governments into fiscal tradeoffs","Small import-dependent economies cannot absorb high fuel prices through monetary policy alone. <span class='change'>The Dominican Republic proposed about $800 million a year in new taxes while maintaining fuel subsidies already costing roughly $350 million in 2026.</span> The package tries to protect low-income households and preserve fiscal credibility, but higher business and travel taxes can slow investment. It is a clear example of a distant war becoming a domestic budget choice.",[S("AP Dominican Republic","https://apnews.com/article/90e92024e1e5b0bc17c5037ac1910dd7"),S("World Bank Caribbean","https://www.worldbank.org/en/country/caribbean")],"Fuel subsidies cap consumer prices by transferring the cost to the public budget.",["Protect households now.","Avoid permanent subsidy debt.","Broaden enforcement before raising rates."],"Watch congressional approval and the oil-price assumption."))],
"Africa / Middle East":[
W("Iran diplomacy swung between strikes and a near-deal","The April ceasefire reduced direct fire but left Hormuz, sanctions, nuclear material and Lebanon unresolved. <span class='change'>A new U.S.-Iran exchange hit radar sites and Gulf bases before mediators produced an interim framework that both sides now describe differently.</span> The week showed that military escalation can accelerate bargaining while also multiplying spoilers. Gulf states gained leverage because they absorb attacks and control frozen assets and logistics.",[S("AP deal","https://apnews.com/article/7085e386e1c40ee6cfe634210970143f"),S("Guardian","https://www.theguardian.com/world/2026/jun/10/middle-east-peace-talks-iran-strikes")],"Ceasefires manage violence; settlements resolve the disputes that restart it.",["Coercion created compromise.","Coercion nearly destroyed talks.","Gulf mediators became indispensable."],"Watch signatures, verification and Lebanon."),
W("Congo's constitutional fight added a capital-city crisis","Eastern war and disease already stretched the Congolese state. <span class='change'>A term-limit revision proposal united opposition groups and produced street clashes in Kinshasa.</span> Even before a referendum, the initiative changes elite incentives by making the 2028 succession uncertain. Donors and regional partners must now manage democratic backsliding risk alongside security cooperation.",[S("AP Congo","https://apnews.com/article/f3ffbaaa242ff6dcf185ab1f54d86976"),S("UN DRC","https://news.un.org/en/tags/democratic-republic-congo")],"Entrenched constitutional clauses are meant to prevent incumbents from changing the rules of succession.",["Popular sovereignty.","Incumbent entrenchment.","Security distraction."],"Watch parliament, courts and protest restrictions."))],
"Europe / EU":[
W("Europe moved from Ukraine solidarity to accession procedure","Support for Ukraine had centered on weapons, sanctions and financial aid. <span class='change'>EU ambassadors agreed to open formal membership talks with Ukraine and Moldova.</span> The process supplies reform benchmarks and a long-term economic anchor even without a wartime NATO guarantee. Unanimity means every stage can still become leverage for individual member states.",[S("AP EU","https://apnews.com/article/6cd2ec3d41bd45c8115c6ee41eb1a114"),S("EU","https://enlargement.ec.europa.eu/")],"Accession negotiations test whether candidate law and institutions can implement the EU acquis.",["Strategic enlargement.","Standards must remain strict.","Staged membership may bridge the gap."],"Watch Monday's opening and first reform benchmarks."),
W("European diplomats cautiously reopened a Moscow channel","U.S.-led Ukraine talks had stalled while Russia rejected a Zelenskyy meeting. <span class='change'>British, French and German ambassadors met Russian officials in Moscow to press for direct negotiations.</span> The contact does not imply agreement, but it shows Europe seeking a role after being sidelined from earlier channels. Its value will depend on whether it produces agenda-setting rather than parallel messaging.",[S("Guardian Ukraine","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("Guardian Putin","https://www.theguardian.com/world/2026/jun/05/putin-rejects-zelenskyys-offer-to-meet-and-reaffirms-ukraine-war-aims")],"The E3 refers to Britain, France and Germany acting together on major security diplomacy.",["Europe must shape its security order.","Moscow can use talks to divide allies.","Contact can clarify rather than concede."],"Watch whether foreign ministers or leaders follow the ambassadors."))],
"China":[
W("China's oil demand became a shock absorber for Hormuz","China entered the war with large reserves and rapidly growing electric transport. <span class='change'>Its import reduction of roughly 3 million barrels a day helped offset missing Gulf supply and limited the global price spike.</span> The adjustment shows how industrial policy and inventories can create geopolitical flexibility. A return to normal Chinese buying before Hormuz fully reopens could quickly tighten the market again.",[S("Oil analysis","https://nypost.com/2026/06/11/world-news/how-3-million-missing-oil-barrels-are-keeping-global-economy-afloat/"),S("IEA","https://www.iea.org/topics/oil-market-report")],"Strategic stocks and demand management can temporarily replace physical imports.",["Reserves bought time.","Imports may rebound sharply.","EV adoption reduces oil exposure."],"Watch Chinese customs data and refinery runs."),
W("Taiwan's opposition made dialogue part of the deterrence debate","Cross-strait policy had increasingly emphasized arms, civil defense and U.S. coordination. <span class='change'>KMT leader Cheng Li-wun argued in Washington that talks with Beijing are necessary for peace while defending a smaller military budget.</span> The week clarified that Taiwan's argument is not simply defense versus surrender, but how military readiness and political signaling interact. Beijing will test whether engagement reflects confidence or vulnerability.",[S("AP Taiwan","https://apnews.com/article/13c4c9c7f1bb0b358a4b3df1ceea0bf0"),S("Taiwan MND","https://www.mnd.gov.tw/English/")],"Deterrence combines capability, credibility and communication.",["Dialogue lowers miscalculation.","Budget cuts weaken credibility.","Both tools can be mutually reinforcing."],"Watch arms sales and party polling."))],
"War / Active Conflicts":[
W("Ukraine shifted pressure from trenches to Russia's supply system","The 1,000-kilometer front remained difficult to move at acceptable cost. <span class='change'>Ukraine increased attacks on refineries, factories, bridges, tankers and the R-280 corridor, producing fuel shortages in Crimea.</span> The campaign seeks cumulative operational friction and dispersal of Russian air defenses. Success requires persistent effects on sortie rates and logistics, not only visible explosions.",[S("Guardian","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("AP strikes","https://apnews.com/article/4a158f6273807683d48692dedb4121b8")],"Deep strikes trade territory-focused warfare for attacks on the system sustaining the front.",["Asymmetric leverage.","Russia can absorb and retaliate.","Sanctions amplify physical damage."],"Watch refinery output, cargo traffic and front-line operations."),
W("The Middle East's separate ceasefires behaved like one conflict system","Gaza, Lebanon and Iran had different actors and documents but shared weapons, diplomacy, energy markets and humanitarian capacity. <span class='change'>This week brought direct U.S.-Iran fire, deeper Lebanon fighting and a proposed package attempting to link Hormuz, nuclear talks and Israeli withdrawal.</span> The linkage can create a comprehensive settlement or give every front a veto. Civilians experience the combined result through displacement, prices and aid access regardless of diplomatic labels.",[S("AP ceasefires","https://apnews.com/article/3338e5a13a57333ca2a56b89041360ae"),S("Guardian live","https://www.theguardian.com/world/live/2026/jun/12/middle-east-crisis-live-us-iran-israel-lebanon-trump-hormuz-oil-peace-deal-doubt-latest-news-updates")],"Linked conflicts share leverage even when command structures are separate.",["Comprehensive bargaining.","Too many spoilers.","Humanitarian sequencing first."],"Watch aid access, withdrawals and enforcement mechanisms."))]

const analytical=[
{tag:"Middle East Diplomacy",headline:"The Iran framework is a sequencing problem disguised as a peace announcement",deck:"The text can stop immediate fire, but only implementation can reconcile incompatible public descriptions.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Beirut_skyline.jpg",imageAlt:"Beirut skyline representing the linked Lebanon and Iran fronts",imageCredit:"Laura C. Ellis / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Beirut_skyline.jpg",skeletonHTML:"<b>Baseline:</b> the April ceasefire reduced direct U.S.-Iran fire but left Hormuz restrictions, sanctions, frozen assets, nuclear material and Israel-Hezbollah fighting unresolved. <b>Move:</b> after another exchange of strikes, mediators produced a text that Pakistan calls final, Washington calls mostly complete and Tehran describes as an interim step before nuclear talks. <b>Mechanism:</b> Iran receives economic benefits only after performance, while the United States seeks uranium removal and maritime access; Iran seeks sanctions relief, sovereignty over Hormuz and an end to the Lebanon war. <b>Stakes:</b> the order of compliance determines whether either side can claim it surrendered first. <b>Proof test:</b> a durable deal requires a signed text, named verifier, shipping protocol, timetable for assets and nuclear material, and a mechanism for Israeli or Hezbollah violations.",stats:["Brent moved from about $93 to below $85 on the initial announcement, showing how much supply risk is embedded in price.","The proposed technical phase is expected to run roughly 60 days, during which nuclear and sanctions details would be negotiated or implemented.","Regional sources said the UAE could release $10 billion to $20 billion in Iranian funds, illustrating the scale of Gulf leverage."],sideA:["Phased peace","Performance-based rewards let both sides test compliance without trusting a final grand bargain."],sideB:["Paper truce","Public disagreement over nuclear terms and Lebanon means the same text may carry incompatible expectations."],sideC:["Mediator power","Pakistan, Oman, Qatar, the UAE and Switzerland may matter more than formal great-power diplomacy because they control channels, venues and assets."],sources:[S("AP","https://apnews.com/article/7085e386e1c40ee6cfe634210970143f"),S("Guardian live","https://www.theguardian.com/world/live/2026/jun/12/middle-east-crisis-live-us-iran-israel-lebanon-trump-hormuz-oil-peace-deal-doubt-latest-news-updates"),S("Guardian oil","https://www.theguardian.com/business/2026/jun/12/global-oil-prices-trump-us-iran-deal-brent-crude-strait-of-hormuz")]},
{tag:"Global Economy",headline:"Hormuz has turned energy security into a development crisis",deck:"Even falling oil prices leave poorer states with debt, fertilizer and AI-investment damage already in motion.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/El_Nino_regional_impacts.png",imageAlt:"Map showing climate and food-system exposure across regions",imageCredit:"NOAA / Wikimedia Commons",imageCreditUrl:"https://www.noaa.gov/education/resource-collections/weather-atmosphere/el-nino",skeletonHTML:"<b>Baseline:</b> developing economies entered 2026 with high debt, weak post-pandemic income growth and limited fiscal room. <b>Change:</b> the Iran war disrupted oil, gas and fertilizer routes while the World Bank cut global growth to 2.5% and emerging-market growth to 3.6%. <b>Transmission:</b> higher import bills weaken currencies; central banks keep rates high; debt service crowds out health, education, climate adaptation and digital infrastructure; fertilizer costs raise food prices with a lag. <b>Stakes:</b> countries least able to invest in AI and clean energy also face the largest cost of stabilizing basic consumption. <b>Proof test:</b> watch whether a Hormuz reopening lowers fertilizer and sovereign borrowing costs, not just headline crude.",stats:["The World Bank forecasts 2.5% global growth in 2026, the weakest pace since the pandemic.","Global fertilizer prices could rise as much as 38%, affecting planting decisions after energy markets stabilize.","Emerging and developing economies are forecast to grow 3.6%, with per-capita income growth the weakest since the pandemic."],sideA:["Fast normalization","A verified deal can quickly lower oil, inflation expectations and pressure on central banks."],sideB:["Scarring remains","Debt, cancelled investment and food-production costs persist after spot oil falls."],sideC:["Technology divide","The same fiscal squeeze prevents poorer states from building the compute, power and skills needed to capture AI productivity."],sources:[S("World Bank report","https://www.worldbank.org/en/publication/global-economic-prospects"),S("Guardian growth","https://www.theguardian.com/business/2026/jun/11/global-growth-slow-lowest-level-pandemic-world-bank"),S("Axios AI gap","https://www.axios.com/2026/06/12/ai-world-bank-iran-energy-economy")]},
{tag:"Ukraine / Europe",headline:"Accession and logistics pressure form Ukraine's two-track strategy",deck:"Kyiv is seeking durable European integration while making Russian occupation more expensive today.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Flags_of_EU_and_Ukraine.jpg",imageAlt:"European Union and Ukrainian flags in Kyiv",imageCredit:"Yakovlev Sergey / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Flags_of_EU_and_Ukraine.jpg",skeletonHTML:"<b>Baseline:</b> battlefield movement is slow, NATO membership is unavailable during war and U.S.-led peace talks have stalled. <b>Change:</b> EU states agreed to open membership talks while Ukrainian drones disrupted the R-280 corridor, Chonhar Bridge, refineries and fuel supply in Crimea. <b>Mechanism:</b> accession creates legal and investment commitments over years; interdiction creates immediate operational cost without requiring a breakthrough. <b>Stakes:</b> together they challenge Russia's theory that time favors occupation by raising current costs and improving Ukraine's future institutional anchor. <b>Proof test:</b> the strategy works if logistics disruption affects Russian combat tempo and EU negotiations keep advancing through rule-of-law benchmarks.",stats:["Ukraine's drone command said military cargo traffic on the R-280 corridor fell 71% over two weeks.","All 27 EU members agreed to open talks, and every later negotiating step will also require unanimous support.","Fuel shortages were visible in occupied Crimea across road, rail and sea supply routes."],sideA:["Time can favor Kyiv","Cumulative logistics damage and EU integration improve leverage without risky frontal offensives."],sideB:["Russia can absorb cost","Moscow has strategic depth, oil income and escalation options against Ukrainian cities."],sideC:["Conditional integration","EU leverage may improve Ukrainian institutions, but stalled clusters could produce frustration without full membership."],sources:[S("AP EU","https://apnews.com/article/6cd2ec3d41bd45c8115c6ee41eb1a114"),S("Guardian Ukraine","https://www.theguardian.com/world/2026/jun/12/ukraine-war-briefing-france-germany-and-uk-make-push-in-moscow-for-peace-talks"),S("EU Ukraine","https://enlargement.ec.europa.eu/enlargement-policy/ukraine_en")]},
{tag:"US Law & Security",headline:"Section 702's lapse exposes the cost of governing by temporary extension",deck:"Collection continues for now, but Congress has postponed the core privacy bargain until it became a deadline crisis.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/United_States_Capitol_-_west_front.jpg",imageAlt:"West front of the United States Capitol",imageCredit:"Architect of the Capitol / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:United_States_Capitol_-_west_front.jpg",skeletonHTML:"<b>Baseline:</b> Section 702 permits warrantless targeting of foreigners abroad, while incidentally collected American communications can later be searched. <b>Change:</b> a 198-218 House vote rejected a short extension amid disputes over warrants and intelligence leadership. <b>Mechanism:</b> existing Foreign Intelligence Surveillance Court certifications remain valid into 2027, but a statutory lapse complicates new directives, provider cooperation and long-term planning. <b>Stakes:</b> both sides can overstate the immediate effect: collection does not instantly stop, but legal uncertainty is not costless. <b>Proof test:</b> a durable settlement needs clear targeting rules, auditability, a standard for U.S.-person queries and consequences for misuse.",stats:["The House vote was 198-218, below even a simple majority and far below the two-thirds threshold used for the fast-track bill.","Existing annual certifications can continue into March 2027, limiting the immediate operational gap.","Lawmakers are not scheduled to return until June 23, ensuring at least a short statutory lapse."],sideA:["Security continuity","Foreign-intelligence collection is too central to expose to expiration and provider uncertainty."],sideB:["Constitutional correction","The lapse creates leverage for a warrant requirement before Americans' messages are searched."],sideC:["Process failure","Recurring short extensions let appointments and tactical disputes overwhelm careful surveillance design."],sources:[S("Guardian politics","https://www.theguardian.com/us-news/live/2026/jun/12/donald-trump-fisa-kennedy-center-iran-ufc-white-house-latest-news-updates"),S("Guardian vote","https://www.theguardian.com/us-news/live/2026/jun/11/democrats-republicans-midterms-tech-laws-scotus-latest-news-updates"),S("ODNI","https://www.dni.gov/")]},
{tag:"AI Political Economy",headline:"The AI race is dividing countries before productivity gains arrive",deck:"Voluntary safety at the frontier and missing infrastructure elsewhere create opposite governance problems.",image:"https://commons.wikimedia.org/wiki/Special:Redirect/file/Wikimedia_Servers-0051_17.jpg",imageAlt:"Rows of server racks in a data center",imageCredit:"Victor Grigas / Wikimedia Commons",imageCreditUrl:"https://commons.wikimedia.org/wiki/File:Wikimedia_Servers-0051_17.jpg",skeletonHTML:"<b>Baseline:</b> frontier AI capacity is concentrated in U.S. firms and a small number of chip, cloud and energy systems. <b>Change:</b> Washington shifted toward voluntary model review and military acceleration while the World Bank warned that poorer economies lack compute, skills and local-language data. <b>Mechanism:</b> rich states debate how to restrain capability; poorer states face the prior problem of access and bargaining power. <b>Stakes:</b> safety rules can entrench incumbents, but no rules can externalize cyber and labor risks; meanwhile imported AI can drain rents from countries that do not own infrastructure. <b>Proof test:</b> useful governance must produce auditable model standards at the top and affordable regional compute, data and training below it.",stats:["The proposed U.S. pre-release review is voluntary rather than a licensing gate.","The World Bank projects emerging-market and developing-economy growth at 3.6% in 2026.","U.S. firms control a dominant share of global advanced compute, while many low-income countries still face unreliable electricity and limited local-language datasets."],sideA:["Accelerate adoption","Speed and scale are necessary for strategic competition and broad productivity gains."],sideB:["Build enforceable safety","Voluntary review cannot overcome incentives to release first and disclose less."],sideC:["Development compact","Shared compute, open data and skills financing may matter more globally than choosing between pause and acceleration."],sources:[S("Guardian TechScape","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic"),S("Axios World Bank","https://www.axios.com/2026/06/12/ai-world-bank-iran-energy-economy"),S("NIST","https://www.nist.gov/itl/ai-risk-management-framework")]}
];
const opinion=[
{tag:"Le Monde Editorial",title:"Trump's powerlessness in the Iranian trap",author:"Editorial Board",pub:"Le Monde · June 9, 2026",thesis:"Military escalation strengthened Iran's bargaining leverage and exposed the limits of personalized coercive diplomacy.",text:"The editorial argues that the campaign failed to produce regime collapse or a clean strategic victory and instead allowed Tehran to use Hormuz as leverage over the global economy. The emerging agreement makes the thesis live because Washington may accept a phased bargain after months of claiming that force would compel decisive surrender. The argument matters as a warning that destructive capacity is not the same as political control. The strongest pushback is that without military and economic pressure Iran may never have entered a performance-based negotiation at all.",claim:"Trump converted overwhelming military power into an expensive negotiation on terms Iran can still contest.",matters:"Separates battlefield damage from the political ability to impose a durable settlement.",pushback:"Coercion may have created the urgency and asset leverage that made the current framework possible.",source:S("Read editorial","https://www.lemonde.fr/en/opinion/article/2026/06/09/trump-s-powerlessness-in-the-iranian-trap_6754283_23.html")},
{tag:"Guardian Foreign Affairs",title:"Trump's failure to maintain ceasefires is part of the new world disorder",author:"Simon Tisdall",pub:"The Guardian · June 7, 2026",thesis:"Headline truces fail when leaders neglect verification, sequencing and institutions.",text:"Tisdall links recurring violence in Iran, Lebanon, Gaza and Ukraine to a style of diplomacy centered on declarations rather than enforceable architecture. The argument is newly relevant because the proposed U.S.-Iran memorandum still leaves nuclear sequencing, Israeli withdrawal and shipping rules disputed. Its value is to explain why a ceasefire can reduce immediate fire without resolving the incentives that restart it. Pushback is that even excellent process cannot manufacture compromise when armed actors still believe force will improve their terms.",claim:"Durable peace requires mechanisms and patient implementation, not leader-to-leader spectacle.",matters:"Provides a common explanation for several formally separate ceasefires that keep producing combat.",pushback:"Institutions are ineffective without coercive leverage and willing parties.",source:S("Read column","https://www.theguardian.com/commentisfree/2026/jun/07/donald-trump-ceasefire-failure-ukraine-iran-gaza-lebanon-gaza")},
{tag:"Guardian Editorial",title:"Ukraine and the prospects of peace: time to ramp up pressure on Putin",author:"Editorial Board",pub:"The Guardian · June 9, 2026",thesis:"Ukraine's improving strike capacity gives Europe reason to increase support rather than negotiate from assumed defeat.",text:"The editorial argues that Russia's stalled territorial progress and Ukraine's deep-strike campaign have changed the immediate balance enough to justify stronger sanctions and air-defense support. The EU decision to open accession talks adds an institutional version of the same strategy: make time less favorable to Moscow. The argument matters because it rejects the claim that aid only delays an inevitable outcome. Its limitation is that logistics pain and European integration do not erase Russia's manpower, industrial depth or escalation options.",claim:"Sustained European pressure can improve the terms of eventual negotiations.",matters:"Reframes Ukraine as a contest in which outside policy still changes leverage.",pushback:"Higher pressure may increase costs without producing mutually acceptable territorial terms.",source:S("Read editorial","https://www.theguardian.com/commentisfree/2026/jun/09/the-guardian-view-on-ukraine-and-the-prospects-of-peace-time-to-ramp-up-the-pressure-on-putin-")},
{tag:"Technology Column",title:"All signs point to Trump pushing AI growth",author:"Blake Montgomery",pub:"The Guardian · June 9, 2026",thesis:"The administration's safety language is secondary to military adoption, strategic competition and the financial upside of AI firms.",text:"Montgomery reads voluntary model review, Pentagon acceleration and possible federal equity stakes as parts of a growth-first policy. The argument is live because frontier labs can benefit commercially from safety pauses while poorer countries lack the infrastructure to participate at all. It matters because government could become regulator, buyer and shareholder at once. Pushback is that procurement and ownership can create leverage for stronger disclosure and testing if those conditions are explicit rather than assumed.",claim:"Expect U.S. policy to maximize capability and company value before it constrains frontier development.",matters:"Connects national security, market incentives and safety governance in one framework.",pushback:"A government stake could impose conditions unavailable to a distant regulator.",source:S("Read column","https://www.theguardian.com/technology/2026/jun/08/trump-ai-growth-anthropic")}
];
const editions={wire:["The Wire","Last 24 hours, grouped by topic. Open a topic for the story stack; each story keeps its own nested Learn more drawer."],weekly:["The Weekly","The week in consequential developments, grouped like The Wire but selected for events still shaping the map today."],analytical:["The Analytical","Strategy-desk files for extemp prep: deeper causality, key numbers, competing arguments, and concrete watch points."],opinion:["The Opinion","Fresh argument-driven essays and columns: what serious writers are claiming, why the argument is live, and where it can be challenged."]};
const src=a=>'<div class="sources">'+a.map(x=>'<a href="'+x.u+'" target="_blank" rel="noopener">'+x.n+' ↗</a>').join('')+'</div>';
const learn=x=>'<details class="learn"><summary>Learn more</summary><div class="learn-body"><h4>Deeper context</h4><p>'+x.context+'</p><h4>Three angles</h4><ul>'+x.angles.map(a=>'<li>'+a+'</li>').join('')+'</ul><h4>What to watch</h4><p>'+x.watch+'</p></div></details>';
function renderGroups(data){return Object.entries(data).map(([topic,items])=>'<details class="topic"><summary><span>'+topic+'</span><span class="count">'+items.length+' '+(items.length===1?'story':'stories')+'</span></summary><div class="stack">'+items.map(x=>'<article class="wire-item"><h3 class="wire-headline">'+x.h+'</h3><p class="wire-prose">'+x.proseHTML+'</p>'+src(x.sources)+learn(x.learn)+'</article>').join('')+'</div></details>').join('')}
function renderAnalytical(){return analytical.map(x=>'<details class="afile"><summary><div><div class="tag">'+x.tag+'</div><h3>'+x.headline+'</h3><p class="deck">'+x.deck+'</p></div></summary><div class="analysis-body"><img class="analysis-img" src="'+x.image+'" alt="'+x.imageAlt+'"><div class="credit"><a href="'+x.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+x.imageCredit+' ↗</a></div><p class="walk">'+x.skeletonHTML+'</p><div class="stats"><h4>Key Stats With Setup</h4><ul>'+x.stats.map(s=>'<li>'+s+'</li>').join('')+'</ul></div><h4 class="angles-title" style="margin-top:17px">Three Angles</h4><div class="angles">'+[["a",x.sideA],["b",x.sideB],["c",x.sideC]].map(([c,v])=>'<div class="angle '+c+'"><strong>'+v[0]+'</strong>'+v[1]+'</div>').join('')+'</div>'+src(x.sources)+'</div></details>').join('')}
function renderOpinion(){return opinion.map(x=>'<article class="opinion-card"><div class="tag">'+x.tag+'</div><h3>'+x.title+'</h3><div class="by">'+x.author+' · '+x.pub+'</div><p class="thesis">'+x.thesis+'</p><p>'+x.text+'</p><div class="op-grid"><div class="op-box"><strong>The Claim</strong>'+x.claim+'</div><div class="op-box"><strong>Why It Matters</strong>'+x.matters+'</div><div class="op-box"><strong>Pushback</strong>'+x.pushback+'</div></div>'+src([x.source])+'</article>').join('')}
const nav=document.getElementById("nav"),content=document.getElementById("content");Object.entries(editions).forEach(([k,v])=>{const b=document.createElement("button");b.textContent=v[0];b.dataset.edition=k;b.onclick=()=>show(k);nav.appendChild(b)});function show(k){document.getElementById("edition").textContent=editions[k][0];document.getElementById("description").textContent=editions[k][1];document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.edition===k));content.innerHTML=k==="wire"?renderGroups(wire):k==="weekly"?renderGroups(weekly):k==="analytical"?renderAnalytical():renderOpinion()}
document.getElementById("headline").innerHTML='<div><div class="label">Headline of the Day · '+headline.topic+'</div><h2>'+headline.h+'</h2><p>'+headline.deck+'</p></div><figure style="margin:0"><img class="headline-photo" src="'+headline.image+'" alt="'+headline.imageAlt+'"><figcaption class="credit"><a href="'+headline.imageCreditUrl+'" target="_blank" rel="noopener">Image: '+headline.imageCredit+' ↗</a></figcaption></figure>';
const saved=localStorage.getItem("dig-theme"),root=document.documentElement,toggle=document.getElementById("theme");function setTheme(t){root.dataset.theme=t;toggle.textContent='Theme: '+t[0].toUpperCase()+t.slice(1);localStorage.setItem("dig-theme",t)}setTheme(saved||"light");toggle.onclick=()=>setTheme(root.dataset.theme==="light"?"dark":"light");show("wire");
</script></body></html>
